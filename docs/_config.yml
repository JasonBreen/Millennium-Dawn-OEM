title: "Millennium Dawn: A Modern Day Mod"
description: "Documentation for the Millennium Dawn: A Modern Day mod for the game Hearts of Iron IV."
baseurl: "/Millennium-Dawn"
url: "https://millenniumdawn.github.io"
lang: en
title_separator: " - "
logo: /assets/images/branding/main-menu.png
permalink: pretty

twitter:
  username: MillenniumDawn
  card: summary_large_image

markdown: kramdown
highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      toc: "auto"
      image:
        path: /assets/images/seo/og-image.png
        width: 1200
        height: 630
        alt: "Millennium Dawn logo banner"
  - scope:
      path: "player-tutorials"
      type: "pages"
    values:
      kind: "Tutorial"
      description: "Gameplay tutorial for Millennium Dawn."
  - scope:
      path: "dev-resources"
      type: "pages"
    values:
      kind: "Resource"
      description: "Developer resource for Millennium Dawn."
  - scope:
      path: ""
      type: "countries"
    values:
      layout: "country"
      unique_focus_tree: false
      description: "National content overview and focus tree information for Millennium Dawn."
      image: /assets/images/seo/og-image.png
  - scope:
      path: ""
      type: "changelog_sections"
    values:
      toc: "off"
      description: "Detailed changelog and release notes for Millennium Dawn."
      image:
        path: /assets/images/seo/og-image.png
        width: 1200
        height: 630
        alt: "Millennium Dawn logo banner"

collections:
  countries:
    output: true
    permalink: /countries/:slug/
    sort_by: title
  changelog_sections:
    output: true
    permalink: /changelogs/:name/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

