l_japanese:
 PER_iran_first: "イラン・ファースト"
 AFG_graveyard_of_empires: "帝国の墓場"
 PER_iran_first_desc: "我々には地域的、国際的な同盟国がいるものの、国民の福祉に関しては、まずイランを最優先に考えなければならない。国内産業の発展のために資金を投入する必要がある。"
 AFG_graveyard_of_empires_desc: "帝国は栄えては消えていきますが、私たちの国民は議論の余地のないこの地域の主人であり続けます。私たちの人々が団結し、その伝統とつながっている限り、どんな侵略者も[AFG.GetNameWithFlag]がまさに彼らの墓場であることに気づくでしょう。"