l_japanese:
 SOV_proclaim_soviet_hegemony: "ソビエトの覇権を宣言"
 EST_new_economic_policy_desc: "独立回復以来、我々は東西を結ぶ架け橋としての役割を担い、経済改革と西側諸国との統合を推進してきた。しかしながら、外国のパートナー諸国との歩み寄りを図り、より収益性が高く、体系的な新たな政策を策定する必要がある。"
 SOV_proclaim_soviet_hegemony_desc: "経済が回復し、国民が動員された今、ロシアは指導的役割を取り戻す準備が整った。我々はソ連の覇権を公然と主張し、勢力均衡を東方へとシフトさせ、ヨーロッパ諸国に我々の復権を認識させるよう圧力をかけるだろう。"
 SOV_the_third_rome_desc: "モスクワ、第三のローマとは、モスクワが古代ローマとビザンツ帝国の後継者であり、ローマ帝国の遺産を受け継いでいるという考え方である。この概念は、どの都市が正当にこの遺産を受け継ぐべきかという点で、ヨーロッパの歴史を通じて議論されてきた。"
 polish_focus: "ポーランド 国家方針ツリー"
 SOV_socialist_humanism_desc: "社会主義は工場やノルマの問題だけではなく、労働者の尊厳の問題でもある。我々は革命の中心に人間の福祉を据え、共産主義の道は人民のためにあるのであって、その逆ではないことを証明する。"
 SOV_socialist_humanism: "社会主義人文主義"
 SOV_the_third_rome: "第三のローマ"
 king: "背景: 王族"