l_japanese:
 MD_TUTORIAL_OPEN_BUTTON: "§YMillennium Dawn チュートリアル§!を開く"
 MD_TUTORIAL_OPEN_BUTTON_TT: "Millennium Dawn のチュートリアルウィンドウを開きます。"
 tutorial_main_background_window_inner_title: "§CMillennium Dawn チュートリアル§!"
 MD_TUTORIAL_WINDOW_NOTE: "このチュートリアルは概念説明を優先しています。各ボタンや画面要素の操作方法はゲーム内ツールチップを参照してください。"
 MD_TUTORIAL_TAB_OVERVIEW: "概要"
 MD_TUTORIAL_TAB_OVERVIEW_TT: "MDの共通システムが何を表しているか。"
 MD_TUTORIAL_TAB_ECONOMY: "経済"
 MD_TUTORIAL_TAB_ECONOMY_TT: "MDにおける経済レイヤーの意味。"
 MD_TUTORIAL_TAB_POLITICS: "政治"
 MD_TUTORIAL_TAB_POLITICS_TT: "MDにおける政党と連立の意味。"
 MD_TUTORIAL_TAB_INFLUENCE: "影響力"
 MD_TUTORIAL_TAB_INFLUENCE_TT: "MDにおける外国影響力の意味。"
 MD_TUTORIAL_TAB_RESEARCH: "研究"
 MD_TUTORIAL_TAB_RESEARCH_TT: "MDにおける研究枠の意味。"
 MD_TUTORIAL_TAB_MILITARY: "軍事"
 MD_TUTORIAL_TAB_MILITARY_TT: "MDの現代軍事レイヤーが何を表すか。"
 MD_TUTORIAL_TAB_ADVANCED: "発展"
 MD_TUTORIAL_TAB_ADVANCED_TT: "国際システムとエネルギーの意味。"
 MD_TUTORIAL_OVERVIEW_TITLE: "MDが捉える国家の力"
 MD_TUTORIAL_OVERVIEW_LEFT: "Millennium Dawn は国家を、工場と師団だけではなく複数の相互作用する仕組みとして扱います。共有システムは、資金、政党、外国からの圧力、研究能力、国際制度が国家の力をどう形作るかを表現しています。これらは共通GUIとscripted codeで支えられているため、多くの国家に共通する土台です。"
 MD_TUTORIAL_OVERVIEW_RIGHT: "MDの中心にある考え方は相互依存です。経済状態は政治の安定を左右し、政治は外交余地を左右し、外国からの影響は宣戦布告なしでも主権を削ります。MDは現代国家運営を、孤立した補正値ではなく連動するシステムとして描こうとしています。"
 MD_TUTORIAL_ECONOMY_TITLE: "国家能力としての経済"
 MD_TUTORIAL_ECONOMY_LEFT: "MDの経済システムは、国家を継続的な資金の流れとして表現します。国庫は手元資金、債務は未来の資金を前借りしたもの、対外投資は国外に置かれた資本です。予算画面は、それらの上にある政府の基本的な経済姿勢を示します。"
 MD_TUTORIAL_ECONOMY_RIGHT: "税率と政策金利は単なる数値補正ではなく、国家の経済運営そのものです。税率は社会からどれだけ資源を吸い上げるかを、政策金利は経済全体で信用がどれだけ高価かを表します。MDの経済は、現代国家のバランスシートを操る感覚で設計されています。"
 MD_TUTORIAL_POLITICS_TITLE: "連立管理としての政治"
 MD_TUTORIAL_POLITICS_LEFT: "MDの政治は、権力が単一の抽象的イデオロギーに収まらず、政党と連立に分散していることを前提にしています。政治画面は与党、連立相手、連立支持率、各政党ポジションの重みを追跡します。つまり統治の安定は、思想よりも整列と連立算術の問題として扱われます。"
 MD_TUTORIAL_POLITICS_RIGHT: "政党管理の各種操作は、国家やエリートが競争の場そのものを整形できることを意味します。後押し、妨害、禁止、許可、選挙しきい値の変更は、誰が現実に権力へ近づけるかを変えます。このシステムは選挙の演出より、体制の構造管理に重心があります。"
 MD_TUTORIAL_INFLUENCE_TITLE: "非公式な支配としての影響力"
 MD_TUTORIAL_INFLUENCE_LEFT: "影響力は、ある国の政治空間のうちどれだけを外国勢力が握っているかを表します。残った部分が国内独立性、つまり外部スポンサーなしに行動できる余地です。影響力順位は、どの外国勢力がその国で主導権を握っているかを示します。"
 MD_TUTORIAL_INFLUENCE_RIGHT: "影響力が高まるほど、外部の圧力は干渉から支配へ変わります。援助は依存を育て、政治工作は路線を変え、搾取は影響力を利益へ変換し、傀儡化はその支配を制度化します。MDの影響力システムは、現代の非公式帝国を表現する仕組みです。"
 MD_TUTORIAL_RESEARCH_TITLE: "国家発展としての研究"
 MD_TUTORIAL_RESEARCH_LEFT: "MDの研究枠は、ほぼ固定された技術上限ではなく国家の科学能力を表します。追加研究枠は総GDPと一人当たりGDPに結びついており、規模と発展度の両方が重要です。科学力は最初から与えられるものではなく、国家が育てる資産として扱われます。"
 MD_TUTORIAL_RESEARCH_RIGHT: "研究枠の2系統は、研究機関の量と研究設備の質を分けて考えています。さらにコード上では研究枠の増加が教育支出にも結びついており、科学力の拡張には国家コストが伴います。研究は無料の雪だるまではなく、発展政策の一部です。"
 MD_TUTORIAL_MILITARY_TITLE: "現代軍事システムとしての軍"
 MD_TUTORIAL_MILITARY_LEFT: "MDの軍事レイヤーは、現代の部隊種別と専門化された大隊を前提にしています。IFV、APC、MBT、空中強襲部隊など、多くのカテゴリがバニラより現代的な編制思想を与えます。各大隊は単なる幅調整要員ではなく、異なる戦場役割を持つ要素として設計されています。"
 MD_TUTORIAL_MILITARY_RIGHT: "combat width が大隊ごとに変わるのは、各部隊が同じ戦場占有を持たないという考え方の表れです。生産も石油や多様な装備群を含むため、現代軍は補給と産業の負担を強く背負います。MDの軍事力は、人員数だけでなく産業、技術、兵站の統合問題です。"
 MD_TUTORIAL_ADVANCED_TITLE: "戦場の外にある国家能力"
 MD_TUTORIAL_ADVANCED_LEFT: "International Systems は、通常の二国間外交より上位にある領域をまとめた画面です。宇宙、対テロ、PMC、国連、サイバー戦は、制度、ネットワーク、専門能力を通じて働く力を表しています。ひとつの傘画面に集められているのは、そのためです。"
 MD_TUTORIAL_ADVANCED_RIGHT: "Energy Screen も同じ発想で作られています。電力を見えない背景値として扱わず、発電、消費、充足、インフラを独立した国家システムとして描きます。これらの画面は、現代国家が軍だけでなくシステムを通じても力を投射することを示しています。"
