 MD_TUTORIAL_OPEN_BUTTON: "§YMillennium Dawn チュートリアル§!を開く"
 MD_TUTORIAL_OPEN_BUTTON_TT: "Millennium Dawn のチュートリアルウィンドウを開きます。"
 tutorial_main_background_window_inner_title: "§CMillennium Dawn チュートリアル§!"
 MD_TUTORIAL_WINDOW_NOTE: "この文面は現在 docs/src/content/tutorials のプレイヤーチュートリアルをベースにしており、各タブでは実装コードで確認できた記述だけを掲載しています。"
 MD_TUTORIAL_TAB_OVERVIEW: "概要"
 MD_TUTORIAL_TAB_OVERVIEW_TT: "MDの共通システムが何を表しているか。"
 MD_TUTORIAL_TAB_ECONOMY: "経済"
 MD_TUTORIAL_TAB_ECONOMY_TT: "MDにおける経済レイヤーの意味。"
 MD_TUTORIAL_TAB_POLITICS: "政治"
 MD_TUTORIAL_TAB_POLITICS_TT: "MDにおける政党と連立の意味。"
 MD_TUTORIAL_TAB_INFLUENCE: "影響力"
 MD_TUTORIAL_TAB_INFLUENCE_TT: "MDにおける外国影響力の意味。"
 MD_TUTORIAL_TAB_RESEARCH: "研究"
 MD_TUTORIAL_TAB_RESEARCH_TT: "MDにおける研究枠の意味。"
 MD_TUTORIAL_TAB_MILITARY: "軍事"
 MD_TUTORIAL_TAB_MILITARY_TT: "MDにおける現代軍需産業の意味。"
 MD_TUTORIAL_TAB_ADVANCED: "発展"
 MD_TUTORIAL_TAB_ADVANCED_TT: "MDにおける国際システムの意味。"
 MD_TUTORIAL_OVERVIEW_TITLE: "国力ランク"
 MD_TUTORIAL_OVERVIEW_LEFT: "Millennium Dawn のすべての国家には、世界における地位を反映する国力ランク国家精神が割り当てられています。このランクは、政治力生成、影響力能力、法改正コスト、金利などを左右します。"
 MD_TUTORIAL_OVERVIEW_RIGHT: "国力ランクは年2回再計算され、2つの要素に基づきます:\n- GDP: 建物などから生まれる総経済出力\n- 国内独立性: 影響力プールのうち自国が保持している割合（外国勢力に握られていない分）"
 MD_TUTORIAL_ECONOMY_TITLE: "経済ガイド"
 MD_TUTORIAL_ECONOMY_LEFT: "Millennium Dawn には、歳入、政府支出、債務、雇用、電力などを含む詳細な現代経済システムがあります。\n\nGDP（国内総生産）は、稼働中の建物やその他の要素から計算されます。これは国家経済の規模を表し、次に影響します:\n- 国力ランク国家精神（超大国、大国、小国など）\n- 研究枠の数\n- 金利（債務対GDP比を通じて）"
 MD_TUTORIAL_ECONOMY_RIGHT: "一人当たりGDPは GDP を総人口で割ったもので、その国の人口の豊かさを示します。\n\nこれは、貧しい国ほど人口が伸びやすく安く建設できますが研究速度が低く、豊かな国ほど研究が速く安定しやすい一方で建設費と労働コストが高くなることを意味します。\n\n中央銀行の政策金利は金利に半分の値で寄与します。つまり、インフレ対策として政策金利を引き上げると、債務返済コストも上がります。これはインフレ抑制と債務管理の間にあるトレードオフです。"
 MD_TUTORIAL_POLITICS_TITLE: "政治ガイド"
 MD_TUTORIAL_POLITICS_LEFT: "Millennium Dawn には、5つのイデオロギーグループ、24の下位イデオロギー、複数政党制選挙、連立政権、支持率、政治法を含む詳細な政治システムがあります。"
 MD_TUTORIAL_POLITICS_RIGHT: "政府人気（支持率とも呼ばれます）は、与党連立がどれだけ国民の支持を受けているかを追跡する動的変数です。\n\n政府人気は、与党連立に属するすべての政党の人気度を合計して計算されます。\n\n選挙で単独政党が 50% を超えて勝てなかった場合、連立を組む必要があります。最大政党が連立を主導し、他の政党を連立に招くことができます。\n\n連立の強さが高いほど、安定度、政治力、思想ドリフト防御のボーナスが大きくなります。弱い連立は不安定で、崩壊しやすくなります。"
 MD_TUTORIAL_INFLUENCE_TITLE: "影響力ガイド"
 MD_TUTORIAL_INFLUENCE_LEFT: "影響力は Millennium Dawn の中核的な外交メカニクスの1つです。これは、国家同士が互いに持つ政治的、経済的、文化的なてこを表します。対象国で影響力を築くことで、その国の政治を形作り、経済的利益を引き出し、最終的には従属国にすることもできます。\n\nすべての国は合計 100% の影響力プールを持ちます。これは国内独立性（その国自身の主権）と、外国が保持する影響力の取り分に分かれます。"
 MD_TUTORIAL_INFLUENCE_RIGHT: "対象国における影響力の割合が高まると、新しい行動が解禁されます。\n\n高い影響力水準（およそ 50% 超）では、対象国でクーデターを試みることができます。\n\n非常に高い影響力水準（およそ 81% 超）では、その国を衛星国にすることができます。\n\n相手国があなたの従属国になった後は、経済搾取を適用し、その国の経済成長を犠牲にして朝貢収入を引き出すことができます。"
 MD_TUTORIAL_RESEARCH_TITLE: "GDP と一人当たりGDP"
 MD_TUTORIAL_RESEARCH_LEFT: "GDP（国内総生産）は、稼働中の建物やその他の要素から計算されます。これは国家経済の規模を表し、次に影響します:\n- 研究枠の数\n\n一人当たりGDPは GDP を総人口で割ったもので、その国の人口の豊かさを示します。"
 MD_TUTORIAL_RESEARCH_RIGHT: "研究速度: 豊かさが増すほどボーナスが増加します（およそ一人当たりGDP 51k 超から）。\n\nこれは、貧しい国ほど人口が伸びやすく安く建設できますが研究速度が低く、豊かな国ほど研究が速く安定しやすい一方で建設費と労働コストが高くなることを意味します。\n\n教育支出は、人口規模、研究枠の数、そして原子力・航空・陸軍・海軍施設の数の影響を受けます。"
 MD_TUTORIAL_MILITARY_TITLE: "軍事装備の要求資源"
 MD_TUTORIAL_MILITARY_LEFT: "マイクロチップと先進複合材は、現代的な軍事装備を生産するために必要です。主な対象カテゴリは次のとおりです:\n- 誘導ミサイル\n- 弾道ミサイル\n- 核ミサイル\n- 高度砲兵\n- 高度戦車車体\n- 高度航空機\n- 艦艇戦闘モジュール"
 MD_TUTORIAL_MILITARY_RIGHT: "十分なマイクロチップまたは先進複合材の備蓄がなければ、これらの装備の生産は停止するか、大幅に遅くなります。現代的な軍拡を計画する国は、装備生産を本格化させる前に、マイクロチップと先進複合材の生産体制を整えておく必要があります。"
 MD_TUTORIAL_ADVANCED_TITLE: "国際システムガイド"
 MD_TUTORIAL_ADVANCED_LEFT: "Millennium Dawn には、世界規模の外交・安全保障・経済を形作る国際組織、同盟、各種システムが存在します。\n\nUNSC は国連の中で最も強力な機関です。15の加盟国を持ち、5つの常任理事国（P5）と10の非常任理事国で構成されています。\n\n総会には、承認されたすべての国連加盟国が参加します。"
 MD_TUTORIAL_ADVANCED_RIGHT: "Millennium Dawn には包括的な宇宙計画と衛星システムがあります。各国は宇宙計画を発展させ、衛星技術を研究し、衛星を軌道へ打ち上げ、軌道被覆による強力な軍事・民生ボーナスを得ることができます。\n\nサイバー戦システムでは、各国がライバルに対してデジタル作戦を実施できます。\n\nPMC では、自国の人的資源や装備を使わず、国庫資金で職業軍人ユニットを雇用できます。"
