l_japanese:
 MAPMODE_EU_MAP_MODE_NAME: "EU"
 MAPMODE_EU_MAP_MODE: "EU"
 MAPMODE_EU_MAP_MODE_DESCRIPTION: "EUの加盟国、潜在的な加盟国、および現在の役職を表示する"
 EU_map_mode_tooltip: "欧州連合"
 EU_map_mode_tooltip_delayed: "欧州連合の現在の加盟状況と指導部を表示する。\n\n§H色の凡例:§!\n§n青§! = EU加盟国\n§Y金§! = 潜在的な加盟国\n\n§H役職:§!\n§R赤§! = 欧州委員会委員長、欧州理事会議長、または欧州議会議長\n§9茶色§! = 欧州海軍事務総長\n§G緑§! = 欧州軍事事務総長\n§Cシアン§! = 外務・安全保障政策上級代表\n§0紫§! = 欧州経済・財務大臣\n§Y黄色§! = 欧州中央銀行総裁\n§P濃いピンク§! = Frontex事務局長\n§Oオレンジ§! = 欧州連合国連大使\n§pピンク§! = 欧州連邦大統領\n\n毎週更新される。"
 MAPMODE_INFLUENCE_MAP_MODE_NAME: "影響"
 MAPMODE_INFLUENCE_MAP_MODE: "影響"
 MAPMODE_INFLUENCE_MAP_MODE_DESCRIPTION: "他国における自国の影響力ランキングを表示する。影響力は外交上の交渉力を決定し、時間の経過とともに政治情勢に影響を与える。"
 influence_map_mode_tooltip: "影響力"
 influence_map_mode_tooltip_delayed: "自国が影響力を保持している国、影響力ランキングにおける順位、毎月自動影響力を行使する設定をした国を表示する。\n\n他国における自国の影響力ランキングを表示する。影響力は外交上の交渉力を決定する、順位が高いほど、その国の政治的立場や外交政策に対する影響力は大きくなる。\n\n§H色の凡例:§!\n§G緑§! = 自国\n§Cシアン§! = 最も影響力を与えている国（支配的）\n§l薄い青§! = 2～3番目に影響力を与えている国\n§nネイビーブルー§! = 4～７番目に影響力を与えている国\n§9オレンジ§! = 自動影響力を行使している国（月次）\n§R赤§! = クールダウン期間の国（最近の標的）\n§H暗い灰色§! = 影響力なし\n\n毎週更新される。"
 MAPMODE_GCC_MAP_MODE_NAME: "GCC"
 MAPMODE_GCC_MAP_MODE: "GCC"
 MAPMODE_GCC_MAP_MODE_DESCRIPTION: "湾岸協力会議の加盟国および潜在的な加盟候補国を表示する。"
 GCC_map_mode_tooltip: "湾岸協力会議"
 GCC_map_mode_tooltip_delayed: "湾岸協力会議（GCC）の現在の加盟国を表示する。\n\n§H色の凡例:§!\n§Cティール§! = GCC加盟国\n§G黄緑§! = 潜在的な加盟国\n\n毎週更新される。"
 MAPMODE_SCO_MAP_MODE_NAME: "SCO"
 MAPMODE_SCO_MAP_MODE: "SCO"
 MAPMODE_SCO_MAP_MODE_DESCRIPTION: "上海協力機構の加盟国、オブザーバー、および潜在的な加盟候補国を表示する。"
 SCO_map_mode_tooltip: "上海協力機構"
 SCO_map_mode_tooltip_delayed: "上海協力機構（SCO）の現在の加盟状況を表示する。\n\n§H色の凡例:§!\n§9オレンジ§! = SCO加盟国\n§0紫§! = オブザーバー\n§Y黄色§! = 潜在的な加盟国\n\n毎週更新される。"
 MAPMODE_GDP_C_MAP_MODE_NAME: "1人当たりGDP"
 MAPMODE_GDP_C_MAP_MODE: "1人当たりGDP"
 MAPMODE_GDP_C_MAP_MODE_DESCRIPTION: "国家の1人当たりGDPを表示する。これは、1人当たりの平均経済生産高を表している。"
 gdp_c_map_mode_tooltip: "[FROM.CONTROLLER.GetNameWithFlag]の1人当たりGDP"
 gdp_c_map_mode_tooltip_delayed: "§Y[FROM.CONTROLLER.GetNameWithFlag]§!の1人当たりGDPは: §Y$[?FROM.CONTROLLER:gdp_per_capita|Y]K§!。\n\n一人当たりGDPは、一人あたりの経済生産高を表す。数値が高いほど、より豊かで生産性の高い経済であることを示す。\n\n§H色の凡例:§!\n§n濃い青§! = 8K未満（低所得）\n§l明るい青§! = 8K - 18K（下位中所得）\n§Cシアン§! = 18K - 32K（中所得）\n§G緑§! = 32K - 60K（上位中所得）\n§Y黄色§! = 60K - 110K（高所得）\n§9明るい金色§! = 110K以上（極めて裕福）\n\n毎週の経済ティックで更新される。"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_NAME: "電力不足率"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE: "電力不足率"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_DESCRIPTION: "国家の現在の電力不足率を表示する。"
 energy_consumption_map_mode_tooltip: "[FROM.CONTROLLER.GetNameWithFlag]の電力不足率"
 energy_consumption_map_mode_tooltip_delayed: "§Y[FROM.CONTROLLER.GetNameWithFlag]§!の電力不足率: §Y[?FROM.CONTROLLER:unfulfilled_energy_demand_var|%+]§!\n\nこれは、満たされていない電力需要の割合を示している。負の値は需要が供給を上回っていること（エネルギー不足）を意味する。\n\n§H色の凡例:§!\n§n濃い青§! = -30%未満（深刻な不足）\n§l明るい青§! = -30%から-18%（中程度の不足）\n§Cシアン§! = -18%から-12%（軽微な不足）\n§G緑§! = -12%から-4%（ほぼ充足）\n§Y黄色§! = -4%から-1%（ほぼ完全に充足）\n§9明るい金色§! = -1%以上（完全に充足）\n\n§n色が濃いほど状況は悪化している。§!電力生産に投資して改善を図ろう。\n毎週の経済ティックで更新される。"
 MAPMODE_PRODUCTIVITY_MAP_MODE_NAME: "生産性"
 MAPMODE_PRODUCTIVITY_MAP_MODE: "生産性"
 MAPMODE_PRODUCTIVITY_MAP_MODE_DESCRIPTION: "州の現在の生産性を表示する。これは、労働者一人あたりの経済生産効率を表している。"
 productivity_map_mode_tooltip: "[FROM.GetName]の生産性"
 productivity_map_mode_tooltip_delayed: "Productivity in §Y[FROM.GetName]§! is: §Y[?FROM.productivity_state_var|Y]§!\n\nProductivity measures the economic output efficiency of a state. Higher values mean more economic output per worker.\n\n§HColor Legend:§!\n§nDeep Purple§! = Below 200 (Very low)\n§nDeep Blue§! = 200 - 500 (Low)\n§lBright Blue§! = 500 - 800 (Below average)\n§CCyan§! = 800 - 1200 (Average)\n§GGreen§! = 1200 - 1900 (Above average)\n§YYellow§! = 1900 - 3800 (High)\n§9Bright Gold§! = 3800 - 5000 (Very high)\n§9Deep Orange§! = Above 5000 (Outstanding)\n\nUpdated with the weekly economic tick."
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_NAME: "再生可能エネルギー補正"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE: "再生可能エネルギー補正"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_DESCRIPTION: "風力、太陽光、その他の地理的要因に基づいた、各州の自然の再生可能エネルギー潜在能力を表示する。"
 renewable_energy_hotspot_map_mode_tooltip: "[FROM.GetName]の再生可能エネルギー補正"
 renewable_energy_hotspot_map_mode_tooltip_delayed: "§Y[FROM.GetName]§!の再生可能エネルギー補正: §Y[?FROM.state_renewable_capacity_factor_modifier_var|Y]§!\n\nこれは州の天然の再生可能エネルギー潜在能力を示している。数値が高いほど、風力、太陽光、その他の再生可能エネルギーがより多くの電力を生成する。\n\n§H色の凡例:§!\n§H暗い灰色§! = 潜在能力なし\n§n濃い青§! = 0.25未満（乏しい潜在能力）\n§l明るい青§! = 0.25 - 0.40（平均以下）\n§Cシアン§! = 0.40 - 0.50（平均）\n§G緑§! = 0.50 - 0.60（良好）\n§Y黄色§! = 0.60 - 0.70（非常に良好）\n§9明るい金色§! = 0.70以上（極めて優れた適地）\n\nこの値は固定されており、時間の経過とともに変化することはない。"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_NAME: "失業率"
 unemployment_rate_map_mode_tooltip: "[FROM.CONTROLLER.GetNameWithFlag]の失業率"
 unemployment_rate_map_mode_tooltip_delayed: "§Y[FROM.CONTROLLER.GetNameWithFlag]§!の失業率: §Y[?FROM.CONTROLLER:total_unemployed_percentage_display|%Y]§!\n\nこれは、労働年齢人口に占める失業者の割合を示している。\n\n§H色の凡例:§!\n§n濃い青§! = 35%以上（危機的状況）\n§l明るい青§! = 22% - 35%（非常に高い）\n§Cシアン§! = 10% - 22%（高い）\n§G緑§! = 5% - 10%（中程度）\n§Y黄色§! = 2% - 5%（低い）\n§9明るい金色§! = 2%未満（完全雇用）\n\n§n色が濃いほど状況は悪化している。§!経済成長や政策を通じて失業率を削減しよう。\n毎週の経済ティックで更新される。"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE: "失業率"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_DESCRIPTION: "国家の現在の失業率を、労働年齢人口に対する割合として表示する。"