 SOO_five_year_plan: "第一个五年计划"
 SOO_five_year_plan_desc: "The free economic models of the western states hold no future for a socialist state. A return to a planned economy, preferably in the form of classical Soviet-style Five-Year Plans, will give the government firm control over the previously unregulated economy."
 SOO_connect_to_neighbours: "与邻居联系"
