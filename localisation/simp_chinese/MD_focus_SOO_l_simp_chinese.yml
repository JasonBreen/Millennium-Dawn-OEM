 SOO_invervention_rus: "俄罗斯的军事干预主义"
 SOO_help_ossetia_SOV: "在§Y[SOO.GetNameWithFlag]§!的投资"
 SOO_help_ossetia_SOV_desc: "我们将为南奥塞梯的预算提供财政支持，因为这个国家本身无法做到这一点。额外收入：$§R-0.120§!"
 SOO_help_ossetia: "来自§Y[SOV.GetNameWithFlag]§!的投资"
 SOO_help_ossetia_desc: "俄罗斯为我们提供资金，这使我们的经济能够维持下去。额外收入：$§G0.120§!"
 SOO_develop_turism: "发展旅游业"
 SOO_develop_turism_desc: "我们将发展国内旅游业，这将为我们的财政带来额外收入。额外收入：$§G0.100§!"
 SOO_Mamison_path: "马米森山口"
 SOO_Mamison_path_desc: ""
 SOO_hydroelectric_dams: "微型水力发电系统"
 SOO_Tskhinvali_district: "茨欣瓦利区"
 SOO_GAS_Electrical_lines: "燃气和电力线路"
 SOO_Java_townlet: "贾瓦小镇"
 SOO_reinforced_roads: "加固道路"
 SOO_subsidise_the_Farmers: "补贴农民"
 SOO_subsidise_the_Farmers_desc: "我们国家非常贫穷，我们需要抓住一切机会增加财政收入。我们将努力鼓励农民务农。"
 SOO_Roki_Tunnel_tollage: "修复罗基隧道"
 SOO_Roki_Tunnel_tollage_desc: "我们需要修复这条隧道，因为它是我们与俄罗斯唯一的连接通道。"
 SOO_Tskhinvali_gas_and_electricity_network: "茨欣瓦利的能源供应"
 SOO_Tskhinvali_gas_and_electricity_network_desc: "我们将为茨欣瓦利提供其所需的一切能源。"
 SOO_Move_towards_cash_crop_growth: "增加与俄罗斯的贸易额"
 SOO_Move_towards_cash_crop_growth_desc: "我们已准备好增加对俄罗斯的农产品供应。"
 SOO_Rural_Revitalization: "投资基础设施恢复"
 SOO_Rural_Revitalization_desc: "我们需要修复道路，这些道路多年来年久失修。"
 SOO_konserv_zavod: "开办罐头工厂"
 SOO_konserv_zavod_desc: "我们将在我国开设一家罐头厂，为人们提供就业机会，并创造可观的利润。"
 SOO_Redevelop_the_Mamison_Pass: "重新开发马米森山口"
 SOO_Redevelop_the_Mamison_Pass_desc: "马米松山口是位于奥塞梯和俄罗斯边境的一处崎岖山路。奥塞梯军事公路（由俄罗斯帝国于1854年至1889年间修建）穿过此地，但如今它已被外高加索公路的光芒所掩盖。"
 SOO_The_Ergneti_market: "埃尔格涅提市场"
 SOO_The_Ergneti_market_desc: "埃尔格涅蒂村位于茨欣瓦利郊外，地处格鲁吉亚一侧。最初，这里只是格鲁吉亚当地居民购买廉价俄罗斯商品的地方，如今已发展成为一个包罗万象的黑市，从农产品到工业品，各种商品在此交易。埃尔格涅蒂市场已成为成千上万奥塞梯人和格鲁吉亚人最可靠、最可持续的收入来源。"
 SOO_Sponsor_the_Georgian_grey_market: "赞助格鲁吉亚灰色市场"
 SOO_Sponsor_the_Georgian_grey_market_desc: "格鲁吉亚的灰色市场源于大量俄罗斯商品涌入该地区，其中大部分商品经由外高加索公路越过奥塞梯边境进入格鲁吉亚。扶持灰色市场或许能为像我们这样亟需资金的国家开辟一条尚未开发的收入来源。"
 SOO_fostering_economic_ties: "促进经济联系"
 SOO_fostering_economic_ties_desc: "埃尔格涅蒂在促进南奥塞梯和格鲁吉亚之间的和平方面发挥了重要作用。为了保持稳定发展，我们必须抓住机遇，与格鲁吉亚政府建立更紧密的联系。"
 SOO_tourism: "南奥塞梯旅游业"
 SOO_tourism_desc: "我国拥有美丽的自然风光。现在是时候发展必要的基础设施，让游客能够欣赏到这些美景了。"
 SOO_A_Shifting_market: "不断变化的市场"
 SOO_A_Shifting_market_desc: "格鲁吉亚政府已经关闭了市场。我们必须为国家未来做好规划，并解决这个问题；由于许多人失业，我们被迫做出调整，接受更多俄罗斯援助，并更加重视打击走私和其他非法贸易渠道。"
 SOO_Host_transit_tax: "主办方过境税"
 SOO_Host_transit_tax_desc: "埃尔格涅蒂市场仍然以黑市形式运作。为了挖掘这部分未开发的收入，我们可以在奥塞梯一侧的边境设立过境税。这或许会让许多人感到不快，但税收收入会留在我们自己的国家，而不是流向邻国。"
 SOO_Promote_contraband: "宣传违禁品"
 SOO_Promote_contraband_desc: "由于格鲁吉亚政府最近关闭了市场，我们不得不另寻收入来源。边境两侧的大部分民众都对格鲁吉亚关闭市场的行为感到不满。我们现在被迫从事走私贸易。"
 SOO_regulate_the_market: "市场监管"
 SOO_regulate_the_market_desc: "市场监管对于根除非法行为至关重要。这将使格鲁吉亚方面更有动力在变革时期或局势紧张时期保持市场开放。"
 SOO_Districted_Oversight: "地区监督"
 SOO_Districted_Oversight_desc: "随着新成立的政府机构的成立，格鲁吉亚领土的管理机构必须开始将当地居民融入奥塞梯国家的习俗和法律之中。"
 SOO_Resilient_Commerce: "弹性商业"
 SOO_Resilient_Commerce_desc: "我们将比以往更加积极地开展贸易，以扩大我们的经济潜力。"
 SOO_Raise_Import_Tariffs: "提高进口关税"
 SOO_Raise_Import_Tariffs_desc: "我们将提高进口关税，以增加国库收入。"
 SOO_the_Russian_bankroll: "让俄罗斯银行进来"
 SOO_the_Russian_bankroll_desc: "为了支持我国经济，我们将不得不允许俄罗斯银行进入我国市场。"
 SOO_new_developments_in_Kvaisa: "奥塞梯的能源"
 SOO_new_developments_in_Kvaisa_desc: "我们将开始建设一座发电厂，以确保我们的能源安全。"
 SOO_Boost_the_local_flour_production: "面粉生产投资"
 SOO_Boost_the_local_flour_production_desc: "我们州应该投资所有农业部门，首先要从本地面粉生产开始。"
 SOO_Tractor_Imports: "拖拉机进口"
 SOO_Tractor_Imports_desc: "我们将进口拖拉机以满足我国农业部门的需求。"
 SOO_Forestry_Development: "林业产业"
 SOO_Forestry_Development_desc: "我们将努力再次发展我们的林业产业。"
 SOO_increase_tolls_on_Roki_Tunnel: "增加罗基隧道的通行费"
 SOO_increase_tolls_on_Roki_Tunnel_desc: "我们将提高罗基隧道的通行费。"
 SOO_South_Ossetian_State_University: "南奥塞梯国立大学"
 SOO_South_Ossetian_State_University_desc: "我们的共和国需要最优秀的人才。投资高等教育将保障我们的未来。"
 SOO_Dzuarikau_Tskhinvali_pipeline: "修复石油管道"
 SOO_Dzuarikau_Tskhinvali_pipeline_desc: "这条天然气管道对我们的能源供应至关重要。"
 SOO_Develop_Tskhinvali: "茨欣瓦利的基础设施"
 SOO_Develop_Tskhinvali_desc: "茨欣瓦利当地的道路显然需要维修。"
 SOO_Develop_Java: "恢复贾瓦"
 SOO_Develop_Java_desc: "这个定居点也需要资金投入。"
 SOO_Revive_soviet_era_works: "复兴苏联遗产"
 SOO_Revive_soviet_era_works_desc: "是时候恢复多年来失去和破坏的东西了 - 苏联的遗产。"
 SOO_Develop_Gori: "哥里的发展"
 SOO_Develop_Gori_desc: "我们共和国的新领土也必须得到开发。"
 SOO_private_sector: "私营部门"
 SOO_private_sector_desc: "我们将促进共和国各地私营部门的发展。"
 SOO_Geared_for_hardship: "发展困难"
 SOO_Geared_for_hardship_desc: "我们在发展和振兴经济方面还有很长的路要走，尤其是在农业方面。"
 SOO_Gori_Tskhinvali_rail_link: "哥里-茨欣瓦利运输路线"
 SOO_Gori_Tskhinvali_rail_link_desc: "我们将把新领土与共和国其他地区连接起来。"
 SOO_Ministry_of_internal_affairs: "内政部"
 SOO_Ministry_of_internal_affairs_desc: "我们的共和国应该可以安然入睡了。"
 SOO_Reinforce_Parliamentary_administration: "改变议会领导层"
 SOO_Reinforce_Parliamentary_administration_desc: "是时候让新人进入政坛了。"
 SOO_Dismantle_Parliamentary_Dominance: "废除议会的统治地位"
 SOO_Dismantle_Parliamentary_Dominance_desc: "议会不应独断专行。"
 SOO_Downplay_opposition_forces: "镇压反对派"
 SOO_Downplay_opposition_forces_desc: "目前这种形式的反对派，对我们的共和国及其稳定构成了威胁。"
 SOO_banner_of_the_people: "人民的旗帜"
 SOO_banner_of_the_people_desc: "奥塞梯真正的儿子已准备好保卫我们的国家。"
 SOO_Political_independent: "政治独立"
 SOO_Political_independent_desc: "我们的政策将较少受到任何个人或团体的影响。"
 SOO_Defenders_of_the_Fatherland: "祖国的保卫者"
 SOO_Defenders_of_the_Fatherland_desc: "我们的战士将为祖国战斗到底。"
 SOO_Evaluate_the_existing_constitution: "评估现行宪法"
 SOO_Evaluate_the_existing_constitution_desc: "或许是时候修改现行宪法了？"
 SOO_Allow_presidential_constitution_changes: "总统宪法修正案"
 SOO_Allow_presidential_constitution_changes_desc: "我们的总统对宪法有他自己的理解。"
 SOO_The_Regal_Relinquishment: "新的政治生活"
 SOO_The_Regal_Relinquishment_desc: "是时候为我们共和国的政治格局注入新的活力了。"
 SOO_Reform_the_distribution_of_farmland: "农业改革"
 SOO_Reform_the_distribution_of_farmland_desc: "我们的主要收入来源是农产品。我们必须对这个行业进行明智的改革。"
 SOO_The_Kremlin_state: "亲克里姆林国家"
 SOO_The_Kremlin_state_desc: "除了俄罗斯，我们没有更多的盟友。"
 SOO_Ossetian_Patriotism_Reforms: "奥塞梯爱国主义"
 SOO_Ossetian_Patriotism_Reforms_desc: "每个人都应该意识到自己的责任，随时准备为保卫祖国而战。"
 SOO_adopted_a_new_constitution: "新宪法"
 SOO_adopted_a_new_constitution_desc: "现在是时候制定一部新宪法了。"
 SOO_Enduring_the_Sovereignty_Fight: "继续争取独立的斗争"
 SOO_Enduring_the_Sovereignty_Fight_desc: "只要我们不属于俄罗斯，我们就必须为独立而战。"
 SOO_pro_russian: "亲俄课程"
 SOO_pro_russian_desc: "我们的最终目标是与北奥塞梯兄弟国家和俄罗斯实现统一。"
 SOO_integrate_to_russian_army: "融入俄罗斯军队"
 SOO_integrate_to_russian_army_desc: "我们已做好全面融入俄罗斯军队的准备。"
 SOO_referendum: "加入俄罗斯公投"
 SOO_referendum_desc: "我们为此努力了很久，现在是时候举行这次全民公投了。"
 SOO_invest: "对我们经济的投资"
 SOO_invest_desc: "俄罗斯非常愿意投资我们的经济。"
 SOO_rosbanks: "俄罗斯银行"
 SOO_rosbanks_desc: "俄罗斯银行已准备好进入我国市场。这将增强我国的经济实力。"
 SOO_inverv_warfrare: "俄罗斯的军事干预主义"
 SOO_inverv_warfrare_desc: "我们将遵循我国军事理论，积极参与世界冲突。"
 SOO_fight_start: "开始为奥塞梯自由而战"
 SOO_fight_start_desc: "塔杰夫家族长期以来一直恐吓我们的国家，是时候对他们进行清算了。"
 SOO_fight_narcota: "停止分发毒品"
 SOO_fight_narcota_desc: "我们将消灭所有与塔杰夫家族有关联、参与贩毒的人员。"
 SOO_fight_contrabanda: "打击非法走私"
 SOO_fight_contrabanda_desc: "塔杰夫家族走私网络将被彻底摧毁。"
 SOO_fight_alchohol: "打击非法酒精"
 SOO_fight_alchohol_desc: "我国将不再出现非法酒精饮料。"
 SOO_fight_reket: "料理鼠辈"
 SOO_fight_reket_desc: "我们将彻底制止他们企图敲诈我国企业家的行为。"
 SOO_fight_orujie: "摧毁武器走私渠道"
 SOO_fight_orujie_desc: "武器将不再非法流入我国。"
 SOO_fight_tamojnia: "清除腐败的海关官员"
 SOO_fight_tamojnia_desc: "我们将把所有不忠诚的员工从海关部门清除出去。"
 SOO_fight_kgb: "处理克格勃内部的腐败问题"
 SOO_fight_kgb_desc: "即使在克格勃内部，塔杰夫家族也找到了可以收买的人。是时候结束这种做法了。"
 SOO_fight_minor: "清除教育部贪官"
 SOO_fight_minor_desc: "塔杰夫家族的最后一名线人身居教育部要职，这使得该家族得以在全国站稳脚跟。是时候除掉她了。"
 SOO_end_fight: "解放国家"
 SOO_end_fight_desc: "终于，我们的国家可以松一口气，迎来和平了。"
 SOO_prepare_for_war: "准备战争"
 SOO_prepare_for_war_desc: "战争不可避免，我们必须做好准备。"
 SOO_call_abkhazia: "向阿布哈兹发出呼吁"
 SOO_call_abkhazia_desc: "我们和阿布哈兹人民必须团结起来，共同对抗来自格鲁吉亚的威胁。"
 SOO_establish_connection_with_kavkaz: "与车臣的联盟"
 SOO_establish_connection_with_kavkaz_desc: "或许车臣人会像上世纪90年代那样再次帮助我们。"
 SOO_ossetia_at_war: "战场体验"
 SOO_ossetia_at_war_desc: "现在，在战场上，我们正在变得更加强大，经验更加丰富。"
 SOO_lessons_from_war: "战争的教训"
 SOO_lessons_from_war_desc: "这场战争的经历教会了我们很多东西。"
 SOO_new_defences: "新的军事投资"
 SOO_new_defences_desc: "我们将增加对军事领域的投资。"
 SOO_doctrine_update: "更新的军事条令"
 SOO_doctrine_update_desc: "我们的军事理论需要进行一些调整。"
 SOO_north_ossetia_ratnik: "军队全面换装'勇士单兵作战系统'"
 SOO_north_ossetia_ratnik_desc: "俄军装备将是我军最佳选择."
 SOO_submission_to_the_russian_doctrine: "屈服于俄罗斯主义"
 SOO_submission_to_the_russian_doctrine_desc: "我们将彻底转向俄罗斯主义。"
 SOO_Gori_pereseleniye: "哥里定居点"
 SOO_Gori_pereseleniye_desc: "我们将允许我们的公民在这片领土上定居。"
 SOO_foreign_relations: "国际外交"
 SOO_foreign_relations_desc: "我们需要建立国际关系。"
 SOO_reinforce_sng2: "小独联体伙伴"
 SOO_reinforce_sng2_desc: "我们最紧密的合作伙伴是小独联体成员国。"
 SOO_russian_ms: "与俄罗斯军工合作"
 SOO_russian_ms_desc: "俄罗斯军事装备是我们购买的最佳选择，也是唯一的选择。"
 SOO_russian_arms: "购买俄罗斯坦克"
 SOO_russian_arms_desc: "有了俄罗斯坦克，我们就能去任何地方。"
 SOO_transnistria_accept: "从德涅斯特河沿岸走私"
 SOO_transnistria_accept_desc: "德涅斯特河沿岸的武器库对我国具有重要意义。"
 SOO_abkahz_relations: "改善与阿布哈兹人的关系"
 SOO_abkahz_relations_desc: "阿布哈兹人和奥塞梯人永远是兄弟。"
 SOO_abkahz_def_pact: "与阿布哈兹的防御条约"
 SOO_abkahz_def_pact_desc: "我们必须做好与阿布哈兹人民一起保卫自己的准备。"
