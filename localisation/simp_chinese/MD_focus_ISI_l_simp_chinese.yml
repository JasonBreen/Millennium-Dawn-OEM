 isisNews.11304.d: "塔吉克籍恐怖分子，ISIS高级指挥官古尔穆罗德·哈利莫夫今天在俄罗斯的空袭中丧生。哈利莫夫在投奔伊斯兰国之前是塔吉克武装部队一名经验丰富的高级特种部队军官。"
