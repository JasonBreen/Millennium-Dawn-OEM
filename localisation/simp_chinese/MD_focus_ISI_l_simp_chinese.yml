l_simp_chinese:
 ABU_BAKR_AL_BAGHDADI_DESC: "阿布·巴克尔·巴格达迪（1971年7月28日），伊拉克武装分子，也是伊斯兰国哈里发国的首任哈里发。他在上世纪末至本世纪初学习并获伊斯兰神学研究生学位。美国入侵伊拉克后，他加入了伊拉克早期的萨拉菲圣战组织，并于2004年与基地组织指挥官一同被关押在美国布卡营。他在那里加入了伊拉克基地组织，并迅速晋升，直至被任命为埃米尔。此后不久，他宣布自己为伊斯兰国的哈里发。"
 jihadist_decisions: "圣战！"
 jihadist_decisions_desc: "我们的伟大哈里发已宣布发动圣战。"
 allow_foreign_recruitment: "允许招募外籍士兵"
 allow_foreign_recruitment_desc: "允许外国招募将为我们提供增加兵力的机会，以便继续为真主而战。然而，这一举措可能会引起我们部分排外圣战者的不满。"
 draw_in_foreign_recruits: "招募新兵"
 draw_in_foreign_recruits_desc: "既然[ROOT.GetLeader]允许我们从境外征召新兵，我们就应当随时随地吸纳更多兵员。但随之而来也产生了一个问题：如果这些新兵对事业不够虔诚，我们伟大的哈里发国将逐渐受到他们思想的影响。"
