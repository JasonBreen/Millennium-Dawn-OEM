 isis.11304.d: "哦，哈里发，可怕的消息！我们精锐的军事指挥官古尔穆罗德·哈利莫夫在俄罗斯走狗的懦弱空袭中牺牲。在他从塔吉克人的土地上找到通往我们真主之路前，他是一名高级特种部队军官。他的军事贡献将被深深地怀念。\n\n                                               他曾杀了很多叛徒。\n\n                                             愿真主接受他的殉道。"
