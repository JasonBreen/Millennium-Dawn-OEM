 isis.11308.t: "指挥官在俄罗斯空袭中牺牲"
 isis.11308.d: "哦，哈里发，坏消息！阿布·艾哈迈德·阿尔瓦尼在俄罗斯异教徒的空袭中殉难。他是萨达姆侯赛因伊拉克军队的一名军官，在他加入逊尼派起义和我们深爱的组织后，他的洞察力帮助了我们很多。\n\n                                               他杀了很多叛徒。\n\n                                          愿真主接受他的殉道。"
 isisNews.11308.t: "ISIS指挥官在俄罗斯空袭中丧生"
 isisNews.11308.d: "伊拉克籍恐怖分子、\"伊斯兰国\"高级指挥官阿布·艾哈迈德·阿尔瓦尼今日在俄军空袭中被击毙。阿尔瓦尼曾服役于萨达姆时期的伊拉克军队，后加入逊尼派反美武装活动。其在\"伊拉克伊斯兰国\"组织内迅速晋升，最终担任该组织高级指挥官职务。"
 isis.11309.t: "指挥官在俄罗斯空袭中牺牲"
 isis.11309.d: "噢，哈里发，坏消息来了！阿布·穆罕默德·阿尔·希马利在俄罗斯异教徒的空袭中牺牲了。他从阿拉伯来到我们这里，帮助我们走私石油并购买武器。他为我们的哈里发招募了许多勇敢的圣战者，并将永远因他在组织2015年巴黎袭击事件中发挥的关键作用而受到赞誉。\n\n                                                他杀了很多叛徒。\n\n                                            愿真主接受他的殉道。"
 isisNews.11309.t: "ISIS指挥官在俄罗斯空袭中丧生"
 isisNews.11309.d: "沙特籍恐怖分子、\"伊斯兰国\"高级指挥官阿布·穆罕默德·希马利今日在俄军空袭中被击毙。希马利是该组织重要的招募负责人与跨境走私活动协调者。情报报告显示，其在协助策划2015年巴黎系列恐袭事件中发挥了关键作用。"
 isis.11310.t: "指挥官在俄罗斯空袭中牺牲"
 isis.11310.d: "哦，哈里发，灾难！在俄罗斯异教徒的卑鄙空袭中，我们的战争部长兼二把手阿亚德·朱梅利英勇牺牲。作为一名伊拉克同胞，他是萨达姆侯赛因时期的一名高级情报官员，作为我们的情报和内部安全负责人，他将自己的智慧运用到如何保领袖发免受内部敌人的袭击上。\n\n                                                他杀了许多叛徒。\n\n                                            愿真主接受他的殉道。"
 isisNews.11310.t: "ISIS二把手在联军空袭中丧生"
 isisNews.11310.d: "伊拉克籍恐怖分子、\"伊斯兰国\"组织二号人物阿亚德·朱马利今日在俄军空袭中被击毙。朱马利曾担任萨达姆政权时期的高级情报官员，于2003年美军占领后加入逊尼派反叛活动。其在\"伊斯兰国\"组织内历任情报与内部安全主管，后升任该组织副首领兼战争部长。"
 isis.11311.t: "指挥官在俄罗斯空袭中牺牲"
 isis.11311.d: "噢，哈里发，坏消息来了！高级指挥官凯里·阿贝德·马哈茂德·阿尔泰伊在俄罗斯异教徒的空袭中牺牲。他是一名伊拉克同胞，曾是我们军事委员会的成员，并领导了简易爆炸装置行动，理所当然地在我们的敌人心中播下了恐惧和混乱的种子。\n\n                                                 他杀了很多叛徒。\n\n                                              愿真主接受他的殉道。"
 isisNews.11311.t: "ISIS指挥官在俄罗斯空袭中丧生"
 isisNews.11311.d: "伊拉克籍恐怖分子、\"伊斯兰国\"高级指挥官海伊里·阿贝德·马哈茂德·塔伊今日在俄军空袭中被击毙。塔伊身兼该组织军事委员会成员及简易爆炸装置 (IED) 行动负责人，在\"伊斯兰国\"袭击的城市中大量部署爆炸装置制造混乱。"
 isis.11312.t: "指挥官在俄罗斯空袭中牺牲"
 isis.11312.d: "噢，哈里发，坏消息来了！你的朋友、顾问和高级指挥官阿卜杜勒·瓦希德·库特奈尔·艾哈迈德在俄罗斯异教徒的空袭中牺牲了。他也是伊拉克人，负责国内安全事务。\n\n                                       他铲除了许多叛徒和变节者。\n\n                                             愿真主接受他的殉道。"
 isisNews.11312.t: "ISIS指挥官在俄罗斯空袭中丧生"
 isisNews.11312.d: "伊拉克籍恐怖分子、\"伊斯兰国\"高级指挥官阿卜杜勒·瓦希德·胡特纳耶尔·艾哈迈德今日在俄军空袭中被击毙。艾哈迈德是巴格达迪的核心顾问，受命主管该组织内部安全事务。"
 isis.11313.t: "指挥官在俄罗斯空袭中牺牲"
 isis.11313.d: "哦，哈里发，可怕的消息！我们的高级指挥官阿布·吉哈德·希沙尼在俄罗斯异教徒的空袭中殉难。他从车臣地区来到我们这里，为真主的荣耀英勇战斗到最后。\n\n                                               他杀了很多叛徒。\n\n                                          愿真主接受他的殉道。"
 isisNews.11313.t: "ISIS指挥官在俄罗斯空袭中丧生"
 isisNews.11313.d: "车臣籍恐怖分子、\"伊斯兰国\"高级指挥官阿布·吉哈德·希沙尼今日在俄军空袭中被击毙。该俄籍恐怖分子原为\"高加索酋长国\"恐怖组织二号人物，在首领乌马尔·希沙尼前往叙利亚加入\"伊斯兰国\"后，曾试图掌控该组织并向\"伊斯兰国\"效忠，最终也前往叙利亚成为\"伊斯兰国\"高级指挥官。"
