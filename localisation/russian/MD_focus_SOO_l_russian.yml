 SOO_commie_modifier_desc: "Южная Осетия вновь выбрала коммунистический путь, красное знамя вновь осветило наши земли."
 SOO_natpop_modifier: "Народная политика Южной Осетии"
 SOO_natpop_modifier_desc: "Народная партия стремится дать народу Южной Осетии всё самое лучшее, но из-за довольно расплывчатой политической программы у неё вряд ли получится что-то идеальное."
 SOO_nyhaz_modifier: "Милитаристская народная политика"
 SOO_nyhaz_modifier_desc: "Our people are tired of the endless false promises of politicians. Our country should rise like a phoenix from oblivion — it is time to decide the fate of Ossetia."
 SOO_bandit_modifier: "Власть §Rклана Тадеевых§!"
 SOO_bandit_modifier_desc: "The Tedeev clan has taken control of many spheres in our republic. We are losing millions because no one is willing to deal with them."
 Ossetia.1.t: "Референдум в Южной Осетии"
 Ossetia.1.d: "Государство Южная Осетия проводит референдум о присоединении к нашей великой стране. Большинство ее жителей согласились с этим решением. Теперь дело за нами, примем ли мы их в состав России?"
 Ossetia.1.a: "Конечно, добро пожаловать домой!"
 Ossetia.1.b: "Нет, они нам не нужны"
 Ossetia.2.t: "Референдум в Южной Осетии"
 Ossetia.2.d: "Россия согласилась принять нас!"
 Ossetia.2.a: "Ура!"
 Ossetia.3.t: "Референдум в Южной Осетии"
 Ossetia.3.d: "Россия отказалась принять нас"
 Ossetia.3.a: "Черт"
 Ossetia.4.t: "Объединение Южной и Северной Осетии"
 Ossetia.4.d: "Южная Осетия требует объединения с Северной Осетией, готовы ли мы удовлетворить их требования?"
 Ossetia.4.a: "Конечно"
 Ossetia.4.b: "Нет"
 Ossetia.5.t: "Объединение Южной и Северной Осетии"
 Ossetia.5.d: "Россия согласилась"
 Ossetia.5.a: "Ура!"
 Ossetia.6.t: "Объединение Южной и Северной Осетии"
 Ossetia.6.d: "Россия отказалась"
 Ossetia.6.a: "Черт"
 Ossetia.7.t: "Альянс Перворождённых"
 Ossetia.7.d: "Наследники Великой Скифии предлагают нам создать Союз, который выведет весь мир на правильный путь и свергнет наших общих врагов"
 Ossetia.7.a: "Вместе мы очистим мир от грязи!"
 Ossetia.7.b: "Нет"
 Ossetia.8.t: "Альянс Перворождённых"
 Ossetia.8.d: "Они согласились стать нашими верными союзниками"
 Ossetia.8.a: "Ура!"
 Ossetia.9.t: "Альянс Перворождённых"
 Ossetia.9.d: "Они решили не помогать нам в достижении нашей великой цели"
 Ossetia.9.a: "Черт"
 Ossetia.10.t: "Осетинская политика"
 Ossetia.10.d: "В бурном политическом ландшафте Южной Осетии в 2000 году де-факто независимое государство сталкивалось с продолжающимися проблемами легитимности и территориальными спорами с Грузией. Во главе с президентом Людвигом Чибировым Южная Осетия переживала кризис доверия, поскольку лишь несколько стран, включая Россию, признали её суверенитет, в то время как большинство международного сообщества, поддерживающее позиции ООН, продолжало считать её неотъемлемой частью Грузии. Влияние России играло ключевую роль как политически, так и военно, определяя способность региона сохранять де-факто независимость. Напряженность с Грузией оставалась высокой, что проявлялось в sporadic outbreaks of violence вдоль административной границы, что затрудняло усилия по мирному разрешению конфликта. На этом фоне нерешённые конфликты и гуманитарные проблемы становились значительными вызовами, подчеркивая необходимость устойчивых международных дипломатических усилий для стабилизации региона."
 Ossetia.10.a: "Иратта Разма"
 Ossetia.11.t: "Кокойты избран президентом"
 Ossetia.11.d: "Эдуард Кокойты был избран президентом как кандидат от оппозиции на прямых всенародных выборах на пост президента Республики Южная Осетия."
 Ossetia.11.a: "Посмотрим, как он справится."
 Ossetia.12.t: "Предложение Даурбека"
 Ossetia.12.d: "Нашему народу нужно новое руководство! Зачем беспокоиться о выборах, если наш лидер должен быть посвящен нам Богами? Я предлагаю два решения этой проблемы..."
 Ossetia.12.a: "Действительно, Даурбек, ты достоин."
 Ossetia.12.b: "Надо пригласить нашу аристократию из Нальчика!"
 Ossetia.12.c: "Не вмешивайся в дела государства, безумец."
 Ossetia.13.t: "Осетия просит нашей помощи!"
 Ossetia.13.d: "Ossetia asks our banks to help them in their hard financial situation."
 Ossetia.13.a: "Конечно!"
 Ossetia.13.b: "Извините, нет."
 Ossetia.14.t: "Россия оказывает помощь!"
 Ossetia.14.d: "Russia provides us with economic aid."
 Ossetia.14.a: "Спасибо"
 Ossetia.15.t: "Россия отклонила наше предложение"
 Ossetia.15.d: "Россия отказала нам в финансовой помощи."
 Ossetia.15.a: "Понятно"
 Ossetia.16.t: "СНГ-2 был создан"
 Ossetia.16.d: "The Commonwealth of Unrecognized States is an association of unrecognized and partially recognized states in the post-Soviet space, founded in 1992. A new association of unrecognized states was born in Tiraspol: an agreement was signed on the establishment of a permanent coordinating body — a Meeting of Foreign Ministers — and an advisory council at the expert level for preparatory work between meetings, which were to be held at least twice a year."
 Ossetia.16.a: "Понятно"
