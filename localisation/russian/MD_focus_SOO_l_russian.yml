 SOO_defenders_of_iron_idea_desc: "Осетины всегда славились своей силой и мужеством, а также чувством долга перед родиной. Учитывая наличие рядом с ними такого агрессивного соседа, как Грузия, они вынуждены постоянно быть готовыми к вторжению"
