 joint_military_exercises_goal_desc: "Современная война требует оперативной совместимости между союзными силами. Проводя совместные учения и достигнув общей численности в 100 оснащенных дивизий, наша фракция демонстрирует свою готовность реагировать на любую угрозу."
 economic_integration_goal_desc: "Сильная экономика — основа любого прочного альянса. Обеспечивая наличие в каждом государстве-члене не менее 15 гражданских заводов, мы создаём промышленную базу, необходимую для коллективного процветания и взаимопомощи."
 technology_sharing_goal_desc: "Технологическое превосходство — это фактор, многократно усиливающий преимущества. Благодаря совместным исследовательским программам и инвестициям в цифровую инфраструктуру наша фракция может опережать конкурентов и сохранять лидирующие позиции во всех областях."
 regional_stability_goal_desc: "Сила альянса определяется самым слабым звеном. Поддерживая стабильность выше 50% во всех государствах-членах, мы демонстрируем единый фронт, сдерживающий агрессию, основанную на корыстных целях, и внутреннюю подрывную деятельность."
 counter_terrorism_goal_desc: "Терроризм не знает границ. Создание разведывательных агентств в каждом государстве-члене формирует сеть, способную перехватывать угрозы до того, как они материализуются, защищая как наших граждан, так и наши общие интересы."
 semiconductor_supremacy_goal_desc: "Производство микрочипов — это стратегически важная отрасль XXI века. Построив в общей сложности 50 заводов по производству микрочипов в рамках нашей компании, мы обеспечим независимость цепочки поставок и технологическое превосходство на десятилетия вперед."
 strategic_resource_security_goal_desc: "Доступ к важнейшим сырьевым материалам является основой как экономического роста, так и боеготовности армии. Наша фракция должна коллективно добывать достаточное количество нефти, каучука и алюминия, чтобы ни один из ее членов не оказался уязвимым для принуждения к использованию ресурсов."
 collective_cyber_defense_goal_desc: "В цифровую эпоху криптографическая безопасность так же важна, как и физические укрепления. Обеспечивая каждому государству-члену доступ к передовым средствам шифрования, мы защищаем наши коммуникации, разведывательные службы и критическую инфраструктуру."
 economic_powerhouse_goal_desc: "Экономическая мощь напрямую трансформируется в геополитическое влияние. Когда лидер нашей фракции добивается высокого ВВП на душу населения, а каждый член превышает базовый порог, мы становимся экономическим блоком, который нельзя игнорировать."
 faction_gdp_per_capita_target_tt: "ВВП на душу населения у лидера фракции выше 15, а у всех членов фракции — выше 5."
 faction_economic_integration_idea: "Пакт об экономической интеграции"
 faction_economic_integration_idea_desc: "Благодаря скоординированной торговой политике и снижению барьеров государства-члены получают выгоду от улучшения экономического сотрудничества и ускорения развития."