 Sweden_foci.7002.d2: "Россия приняла предложение Швеции о закупке корветов класса «Тарантул», что открывает новые возможности для военного сотрудничества и укрепляет шведский военно-морской флот."
 Sweden_foci.7002.d3: "Финляндия одобрила заявку Швеции на закупку корветов класса «Хамина». Это решение укрепляет оборонные связи и способствует региональному сотрудничеству в области безопасности."
