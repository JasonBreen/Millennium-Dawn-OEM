 Sweden_foci.7003.d2: "Россия отклонила предложение Швеции о закупке корветов класса «Тарантул», сославшись на геополитические последствия и стратегические приоритеты. Этот отказ является упущенной возможностью для расширения военного сотрудничества."
 Sweden_foci.7003.d3: "Финляндия отклонила заявку Швеции на приобретение корветов проекта «Хамина», сосредоточившись на собственных оборонных потребностях и экспортной политике. Это решение может повлиять на будущие дипломатические отношения."
 Sweden_foci.7003.o1: "Они заплатят, начнут воссоединение ABBA."
 Sweden_foci.7004.t: "Церемония ввода в строй новых шведских корветов"
 Sweden_foci.7004.d1: "На торжественной церемонии в Стокгольме наши недавно приобретенные корветы MEKO A-100 были официально приняты на вооружение ВМС Швеции. В мероприятии приняли участие многочисленные представители Германии, что подчеркнуло укрепление связей между нашими странами и заложило основу для будущего сотрудничества."
 Sweden_foci.7004.d2: "На торжественной церемонии в Стокгольме наши недавно приобретенные корветы проекта «Тарантул» были официально приняты в состав ВМС Швеции. Присутствие высокопоставленных российских лиц подчеркнуло крепнущее оборонное сотрудничество между нашими странами, что может способствовать развитию будущих отношений."
 Sweden_foci.7004.d3: "На торжественной церемонии в Стокгольме наши недавно приобретенные корветы класса «Хамина» были официально введены в состав ВМС Швеции. Это мероприятие, на котором присутствовали высокопоставленные официальные лица Финляндии, подчеркнуло углубление оборонного партнерства и его позитивное влияние на наши будущие отношения."
 Sweden_foci.7004.o1: "Отметьте эту важную веху в развитии военно-морского флота!"
 Sweden_foci.10.t: "Стратегическая интеграция: необходимость развития инфраструктуры"
 Sweden_foci.10.d: "In an increasingly volatile world, infrastructure is no longer merely a matter of civil planning. Railways, digital grids, ports, and transport corridors have become essential components of military readiness and strategic mobility. Sweden has formally proposed a joint European initiative to modernize and interconnect critical infrastructure across the continent, with a dual-use design for both economic resilience and defense utility.\n\nThe proposal, backed by Swedish defense planners and the Ministry of Enterprise, outlines a coordinated effort to expand logistics capacity, standardize military mobility protocols, and fortify critical nodes against sabotage or cyberattack. It emphasizes the need to secure trans-Baltic connections, enhance NATO operational flow from the Arctic to Central Europe, and enable rapid deployment scenarios in case of hybrid or conventional threats.\n\nWhile framed as a contribution to EU economic cohesion and green transition goals, the underlying logic is unmistakably strategic. Sweden seeks to position itself not only as a logistic hub, but as a proactive shaper of Europe's geoeconomic and defense architecture.\n\nThe response from key European partners will define whether this initiative marks a turning point in collective resilience or falls victim to fragmented national interests and political inertia."
 Sweden_foci.10.a: "Одобрите это предложение, Европа должна быть готова."
 Sweden_foci.10.b: "Отклоняем, это выходит за рамки гражданской инфраструктуры."
 Sweden_foci.101.t: "[ROOT.GetNamewithFlag] Присоединяется к инфраструктурной инициативе"
 Sweden_foci.101.d: "[ROOT.GetNamewithFlag] официально подтвердила свое участие в нашей общеевропейской инфраструктурной инициативе. Тем самым она признает, что дороги, порты и железнодорожные линии являются не просто экономическими артериями, но и стратегическими активами в эпоху растущей неопределенности. Их руководство признало, что гражданская и военная логистика должна быть гармонизирована по всей Европе для обеспечения быстрого реагирования, безопасных цепочек поставок и региональной устойчивости.\n\nЭто решение усиливает способность обеих наших стран противостоять военному давлению и адаптироваться к нему, одновременно стимулируя торговлю и транснациональное сотрудничество. За кулисами военные планировщики уже согласовывают совместные логистические протоколы, меры киберустойчивости и маршруты мобильности на случай непредвиденных обстоятельств.\n\nИх участие посылает мощный сигнал: Европа не будет застигнута врасплох. Единство в инфраструктуре — это единство в обороне."
 Sweden_foci.101.a: "Мудрое решение."
 Sweden_foci.102.t: "§Y[ROOT.GetNamewithFlag]§! отклоняет наше предложение!"
 Sweden_foci.102.d: "§Y[ROOT.GetNamewithFlag]§! has declined our offer to join the strategic infrastructure initiative, citing sovereignty concerns, budgetary limitations, or divergent priorities. While the decision is framed as pragmatic, it ultimately signals a reluctance to invest in long-term resilience and mutual defense capacity.\n\nIn the current security climate, such isolationist thinking carries risks. Without integrated logistics, rapid force deployment becomes uncertain. Without shared standards, supply chains remain vulnerable. And without political will, Europe's collective deterrence weakens.\n\nThough regrettable, we will press ahead with willing partners. Should a military crisis arise, they may find that the cost of inaction outweighs any short-term savings. Infrastructure is not a luxury it is the scaffolding of sovereignty."
 Sweden_foci.102.a: "Их потеря."
 Sweden_foci.11.t: "§Y[SWE.GetNamewithFlag]§! Предлагает присоединиться к Инициативе «Киберщит»"
 Sweden_foci.11.d: "In today's world, war is no longer confined to the battlefield or conventional weapons. Conflicts have evolved silent, elegant, and often invisible to the public eye. Cyberattacks, disinformation campaigns, digital sabotage, and AI-driven influence operations now pose threats not only to military structures but to every citizen, institution, and enterprise.\n\n§Y[SWE.GetNamewithFlag]§! has presented us with the opportunity to join the Cybershield Initiative a multinational cooperation framework aimed at building collective cyber resilience. The program includes joint monitoring centers, shared threat intelligence, and coordinated responses to hostile intrusions and hybrid warfare tactics.\n\nAs the digitalization of our society deepens with each passing year, the cyber domain is becoming one of the most decisive arenas of national security. Joining would enhance our capabilities and embed us in a larger defense network. However, accepting the offer also implies a degree of technological alignment and shared sovereignty in digital matters."
 Sweden_foci.11.a: "Мы объединимся, вместе мы в большей безопасности."
 Sweden_foci.11.b: "Мы стоим особняком, наша сила — в независимости."
 Sweden_foci.111.t: "§Y[ROOT.GetNamewithFlag]§! присоединяется к Инициативе Киберщита"
 Sweden_foci.111.d: "§Y[ROOT.GetNamewithFlag]§! официально согласились принять участие в нашей инициативе «Киберщит». Их решение знаменует собой важный шаг на пути к созданию общеевропейской архитектуры цифровой обороны, где доверенные партнеры обмениваются разведывательными данными, укрепляют свою гражданскую и военную киберустойчивость и выступают единым фронтом против гибридных угроз.\n\nВ рамках процесса интеграции будут разработаны совместные протоколы по обнаружению угроз, защите критически важной инфраструктуры и возможностям быстрого реагирования. Ожидается, что это сотрудничество значительно повысит как нашу оперативную осведомленность, так и нашу способность противостоять сложным, многоуровневым кибератакам.\n\nИх приверженность укрепляет не только наши цифровые границы, но и подтверждает общее видение суверенитета и стратегической автономии в 21 веке."
 Sweden_foci.111.a: "Отлично, единство в киберпространстве."
 Sweden_foci.112.t: "§Y[ROOT.GetNamewithFlag]§! отклоняет Инициативу Киберщита"
 Sweden_foci.112.d: "§Y[ROOT.GetNamewithFlag]§! отклонила наше приглашение присоединиться к инициативе Cybershield. Чем бы ни было продиктовано это решение — скептицизмом, политическими расчетами или стремлением к цифровой независимости, — оно свидетельствует о нежелании страны участвовать в коллективной системе кибербезопасности.\n\n Этот отказ не только ограничивает возможности обмена информацией и цифрового сдерживания в Европе, но и может привести к изоляции §Y[ROOT.GetNamewithFlag]§! в эпоху, когда дезинформация, саботаж и вредоносные программы не знают границ.\n\n Несмотря на разочарование, их отсутствие не остановит наши усилия. Мы будем работать с теми, кто понимает, что поставлено на карту, и готов действовать соответствующим образом."
 Sweden_foci.112.a: "Недальновидный шаг."
 Sweden_foci.12.t: "Швеция предлагает создать совместный экономический форум"
 Sweden_foci.12.d: "Стремясь укрепить региональное сотрудничество и устойчивость промышленности, §Y[SWE.GetNameWithFlag]§! предложила создать совместный экономический форум. Идея заключается в институционализации экономического диалога, координации инвестиций и долгосрочного промышленного партнерства между государствами-участниками.\n\nШвеция утверждает, что углубление экономических связей, особенно в таких секторах, как «зелёные» технологии, передовое производство и цифровые инновации, не только стабилизирует рост, но и укрепит стратегическую автономию в условиях всё более поляризованной мировой экономики. Среди предлагаемых инструментов – совместные программы закупок, механизмы защиты цепочек поставок и совместные инновационные фонды.\n\nУчастие в этом форуме обеспечит доступ к совместным исследованиям, более тесную интеграцию промышленных стратегий и потенциал для долгосрочной конкурентоспособности в континентальном масштабе.\n\nТеперь вопрос заключается в следующем: хотим ли мы формировать эту новую архитектуру или оставаться вне её?"
 Sweden_foci.12.a: "Прекрасная инициатива, к которой мы присоединимся."
 Sweden_foci.12.b: "Мы не заинтересованы"
 Sweden_foci.121.t: "§Y[ROOT.GetNamewithFlag]§! присоединяется к Экономическому форуму"
 Sweden_foci.121.d: "§Y[ROOT.GetNamewithFlag]§! has accepted our proposal to establish a mutual economic forum. Their decision marks a positive step toward greater coordination of industrial policy, regional supply chain resilience, and innovation-driven growth.\n\nInitial bilateral talks are already underway, exploring cooperation in areas such as energy systems, digital markets, and green transition technologies. This alliance could become a blueprint for pragmatic, self-sufficient economic development in an era of shifting global trade dynamics.\n\nSweden's initiative is gaining traction and with each new participant, its potential multiplies."
 Sweden_foci.121.a: "Многообещающее партнерство."
 Sweden_foci.122.t: "§Y[ROOT.GetNamewithFlag]§! отклоняет приглашение на Экономический форум"
 Sweden_foci.122.d: "§Y[ROOT.GetNamewithFlag]§! отказалось от участия в предложенном взаимном экономическом форуме. Будь то из-за опасений за суверенитет, несовпадения приоритетов или нежелания координировать экономические стратегии, этот отказ ограничивает масштабы того, что могло бы стать мощной региональной структурой.\n\nК сожалению, Швеция продолжит работу с единомышленниками. Цель форума остается неизменной: создать устойчивую, кооперативную экономическую архитектуру, подходящую для неопределенного будущего.\n\nЕсли обстоятельства изменятся, дверь, возможно, все еще будет открыта, но восстановить импульс может быть сложно."
 Sweden_foci.122.a: "Их решение, их последствия."
 Sweden_foci.13.t: "Швеция предлагает сотрудничество в рамках стратегического аналитического центра"
 Sweden_foci.13.d: "§Y[SWE.GetNameWithFlag]§! выступила с предложением активизировать сотрудничество между нашими ведущими аналитическими центрами, академическими учреждениями и консультативными органами по вопросам политики. Цель состоит в том, чтобы согласовать стратегические взгляды, координировать долгосрочные политические исследования и создать общую инфраструктуру знаний, способную прогнозировать геополитические сдвиги и гибридные угрозы.\n\nТакое сотрудничество будет включать регулярные политические диалоги, совместное планирование сценариев, совместные публикации и программы обмена экспертами. Швеция считает, что, объединив интеллектуальный капитал, наши страны смогут усилить свое стратегическое предвидение и лучше подготовиться к возникающим вызовам в области обороны, технологий, энергетической безопасности и экономической устойчивости.\n\nХотя форум останется независимым от прямого политического контроля, его влияние на формирование политики может быть значительным. Вопрос в следующем: готовы ли мы мыслить вместе или продолжим рассуждать в изоляции?"
 Sweden_foci.13.a: "Знание – сила. Мы присоединимся."
 Sweden_foci.13.b: "Мы предпочитаем сохранять полную автономию."
 Sweden_foci.131.t: "§Y[ROOT.GetNameWithFlag]§! присоединяется к Сети стратегических мозговых центров"
 Sweden_foci.131.d: "§Y[ROOT.GetNameWithFlag]§! has accepted our invitation to build a cooperative network of research institutions, strategic studies centers, and policy advisory think tanks. This new layer of collaboration opens a backchannel of structured intellectual exchange, capable of shaping national strategies and building resilience against disinformation, cognitive warfare, and policy fragmentation.\n\nThe first joint symposium is already in planning. Topics include digital sovereignty, military-civil fusion, energy transitions, and the impact of emerging technologies on national security.\n\nThis is more than just academic outreach it's strategic alignment through ideas."
 Sweden_foci.131.a: "Разумный выбор."
 Sweden_foci.132.t: "§Y[ROOT.GetNameWithFlag]§! Отказывается от сотрудничества в стратегическом аналитическом центре"
 Sweden_foci.132.d: "§Y[ROOT.GetNameWithFlag]§! has chosen not to engage in Sweden's proposed network for deeper think tank cooperation. Whether due to ideological distance, concerns about influence, or a preference for national intellectual autonomy, their refusal narrows the scope of cross-border strategic dialogue.\n\nWhile regrettable, the initiative will proceed with willing participants. In a time when information is a battlefield and insight is a weapon, choosing isolation over cooperation may come at a cost.\n\nThe conversation will continue with or without them."
 Sweden_foci.132.a: "Пусть они упустят будущее."
 Sweden_foci.14.t: "Швеция приглашает нас на совместные военные учения"
 Sweden_foci.14.d: "§Y[SWE.GetNameWithFlag]§! направила приглашение принять участие в координированных военных учениях на территории Швеции. Ожидается, что манёвры будут моделировать сценарии обороны в нескольких областях, включая защиту побережья, устойчивость к киберугрозам и быстрое развертывание смешанных подразделений по стандартам НАТО и национальных сил.\n\nПомимо оперативных преимуществ, это также дипломатический сигнал. Швеция демонстрирует себя как надёжного партнёра в сфере безопасности и проверяет как собственную готовность, так и готовность союзников в реальных условиях. Учения предоставляют нам возможность оценить шведские возможности, отработать совместимость и укрепить взаимное доверие.\n\nСовместные военные учения служат как сдерживающим фактором, так и подготовкой. Наш выбор участия сам по себе будет нести определённое послание."
 Sweden_foci.14.a: "Мы будем участвовать – общая сила это настоящая сила."
 Sweden_foci.14.b: "Мы отказываемся – наша доктрина остаётся суверенной."
 Sweden_foci.141.t: "§Y[ROOT.GetNameWithFlag]§! Присоединяется к шведским военным учениям"
 Sweden_foci.141.d: "§Y[ROOT.GetNameWithFlag]§! has accepted our invitation to join the upcoming joint military drills. Their participation increases the scope and complexity of the exercise, adding valuable interoperability testing between command structures, logistics systems, and real-time coordination protocols.\n\nObservers from allied states and defense attachés from third countries are expected to monitor the event closely. This cooperation visibly strengthens regional security and showcases Sweden's increasing role as a capable and reliable defense actor.\n\nTrust is built in action and this exercise will speak louder than words."
 Sweden_foci.141.a: "Это сильный сигнал потенциальным противникам."
 Sweden_foci.142.t: "§Y[ROOT.GetNameWithFlag]§! отклоняет приглашение на военные учения"
 Sweden_foci.142.d: "§Y[ROOT.GetNameWithFlag]§! has declined to join our planned military drills. While they have not issued an official reason, the decision may stem from political caution, logistical concerns, or a reluctance to be seen aligning too closely with Swedish or NATO defense postures.\n\nThis absence may be noted by both allies and adversaries alike. In times of uncertainty, the willingness or unwillingness to train together says much about a nation's strategic orientation.\n\nNonetheless, the exercises will go forward. Those who show up, shape the future."
 Sweden_foci.142.a: "Они предпочли молчание солидарности."
 Sweden_foci.143.t: "Начало учений НАТО и Швеции в Норрботтене"
 Sweden_foci.143.d: "Боден, расположенный в отдалённых просторах лена Норрботтен, стал эпицентром одних из самых масштабных военных учений, когда-либо проводившихся на шведской земле. Этот тихий северный регион, обычно более известный оленеводством, заснеженной тишиной и изредка доносящимся из-за финской границы криком «Перкеле!», теперь гудит от скоординированных действий танков, самолётов и спецназа.\n\nСовместные шведско-натовские учения объединяют целый ряд современных возможностей: эскадрильи истребителей Gripen и Eurofighter сражаются в небе, несколько вариантов истребителей Leopard с грохотом проносятся по замёрзшей местности, а элитные подразделения отрабатывают десантирование на обледенелых склонах Буддбютрэскета.\n\nПомимо военного зрелища, эти учения – это не просто зрелище, а демонстрация стратегической готовности, оперативной совместимости союзников и воплощение шведской доктрины тотальной обороны в реальность. Готовность гражданского населения и профессионализм военных — не противоречащие друг другу ценности, а две стороны одной медали.\n\n«§YSi vis pacem, para bellum§!» — это не просто латинская риторика. Это принцип, вплетенный в скандинавский образ мышления — молчаливый, сосредоточенный и непреходящий."
 Sweden_foci.143.a: "Холодная репетиция для более теплого мира."
 Sweden_foci.23.t: "Швеция заявляет права на наши земли"
 Sweden_foci.23.d: "§Y[FROM.GetNameWithFlag]§! has rejected the Swedish proposal for deeper integration. National interest, constitutional barriers, or public opinion appear to have outweighed the prospect of unification or alliance.\n\nWhile diplomatic channels remain open, the setback marks a critical moment for Sweden's broader regional vision and underscores the fragility of Nordic unity under pressure."
 Sweden_foci.23.a: "Мы должны принять их как поселенцев"
 Sweden_foci.23.b: "Они никогда не пересекут нашу границу"
 Sweden_foci.24.t: "Территориальное требование принято"
 Sweden_foci.24.d: "§Y[FROM.GetNameWithFlag]§! приняло шведское присутствие в оспариваемых регионах. Соглашение, оформленное как контролируемое урегулирование и процесс двусторонней координации, фактически смещает административное влияние в пользу Швеции.\n\nНапряженность спадает, начинаются инфраструктурные проекты, и появляются совместные механизмы управления, хотя вопросы долгосрочного суверенитета остаются политически чувствительными."
 Sweden_foci.24.a: "Начать подготовку к интеграции"
 Sweden_foci.25.t: "Территориальное притязание отклонено"
 Sweden_foci.25.d: "§Y[FROM.GetNameWithFlag]§! категорически отклонил территориальные притязания, выдвинутые §Y[ROOT.GetNameWithFlag]§!.\n\nВ официальном заявлении подчёркивалась национальная целостность, и было предупреждено, что любое дальнейшее участие Швеции на оспариваемой территории будет рассматриваться как враждебный акт. Дипломатический тон ужесточается, и возрастает риск региональной нестабильности."
 Sweden_foci.25.a: "Мы не забудем этого"
 Sweden_foci.26.t: "Шведские сепаратисты требуют присоединения к материку"
 Sweden_foci.26.d: "Группа шведоговорящих сепаратистов в одном из наших регионов официально обратилась с петицией о присоединении к Королевству Швеция. Они ссылаются на исторические связи, культурную близость и дискриминацию со стороны местных властей.\n\nВ то время как §YШвеция§! официально не поддержала это движение, общественные деятели в Стокгольме говорят о «национальном объединении»."
 Sweden_foci.26.a: "Это наша священная земля"
 Sweden_foci.26.b: "Они могут владеть этим временно"
 Sweden_foci.27.t: "Швеция отправляет приглашение во фракцию"
 Sweden_foci.27.d: "§YШвеция§! официально пригласила нас присоединиться к недавно созданной ими Североевропейской фракции. Альянс, сформированный как коалиция нейтральных, демократических или неприсоединившихся государств, нацелен на укрепление регионального сдерживания, координацию оборонной политики и формирование общей геополитической идентичности.\n\nВ качестве основополагающих принципов упоминаются исторические связи, культурная близость и общая заинтересованность в самодостаточности, но стратегические последствия остаются сложными."
 Sweden_foci.27.a: "Отличная идея – мы должны присоединиться"
 Sweden_foci.27.b: "Они пьяны? Исключено"
 Sweden_foci.28.t: "Приглашение в альянс отклонено"
 Sweden_foci.28.d: "§Y[FROM.GetNameWithFlag]§! has rejected Sweden's invitation to join the Nordic faction. Citing risks of entanglement, loss of sovereignty, or skepticism toward Sweden's strategic ambitions, the government has opted for distance.\n\nThe rejection casts doubt on the cohesion of regional defense efforts and may signal growing polarization in Northern Europe."
 Sweden_foci.28.a: "Разочаровывающий, но ожидаемый"
 Sweden_foci.29.t: "Приглашение в альянс принято"
 Sweden_foci.29.d: "§Y[FROM.GetNameWithFlag]§! has officially joined the Nordic faction. The decision marks a decisive turning point in regional diplomacy, confirming alignment with Sweden's vision of coordinated military readiness, technological exchange, and foreign policy autonomy.\n\nJoint military planning and industrial cooperation will likely follow solidifying a new power bloc in the North."
 Sweden_foci.29.a: "Мы встречаем их с распростёртыми объятиями"
 Sweden_foci.30.t: "Шведские инвестиции в наш банковский сектор"
 Sweden_foci.30.d: "§YSweden§! has offered a structured investment initiative aimed at modernizing and stabilizing our national banking sector. The proposal includes capital injections, access to Nordic financial technologies, and long-term integration into Sweden's monetary influence sphere.\n\nWhile the program promises liquidity and modernization, some fear growing foreign leverage over national fiscal policies."
 Sweden_foci.30.a: "Принять предложение – Капитал и стабильность"
 Sweden_foci.30.b: "Снижение – Мы защищаем наш финансовый суверенитет"
 Sweden_foci.31.t: "Принятые банковские инвестиции"
 Sweden_foci.31.d: "§Y[FROM.GetNameWithFlag]§! has agreed to our proposal to invest in their national banking system. Swedish capital and financial governance models will be introduced in stages, bringing both modernization and influence.\n\nThis deepens Sweden's economic reach and could pave the way for further harmonization of fiscal regulations and regional currency coordination."
 Sweden_foci.31.a: "Прочная финансовая опора"
 Sweden_foci.32.t: "Банковские инвестиции отклонены"
 Sweden_foci.32.d: "§Y[FROM.GetNameWithFlag]§! отклонил наше предложение инвестировать в их банковский сектор. Мотивированное опасениями по поводу национальной автономии, политической реакции или конкурирующих альянсов, их решение знаменует собой четкую границу для шведской экономической экспансии.\n\nБудущее сотрудничество может быть отложено, а доверие к совместным предприятиям ослаблено по крайней мере пока."
 Sweden_foci.32.a: "Это их потеря, а не наша."
 Sweden_foci.33.t: "Швеция предлагает \"Гибкую\" экономическую поддержку"
 Sweden_foci.33.d: "Шведская делегация прибыла с предложением «раскрыть наш потенциал роста» посредством прямых инвестиций в финансовый и стратегический секторы. Хотя пакет обещает финансирование развития и логистическую поддержку, он включает неформальные ожидания: регуляторные послабления, доступ к инсайдерской информации и согласование с определенными иностранными интересами.\n\nНезависимо от того, будет ли это расценено как прагматичное сотрудничество или скрытое вмешательство, сделка стирает грань между экономической помощью и влиянием."
 Sweden_foci.33.a: "Принять, но обеспечить строгий надзор для ограничения коррупции"
 Sweden_foci.33.b: "Если нет никакой выгоды лично для нас, зачем беспокоиться?"
 Sweden_foci.331.t: "Инвестиционное соглашение принято"
 Sweden_foci.331.d: "§Y[FROM.GetNameWithFlag]§! принял наше предложение о стратегическом экономическом сотрудничестве. Их правительство согласилось открыть отдельные сектора для шведского капитала в обмен на целевую помощь в развитии и неформальное влияние. Дверь к долгосрочному сближению теперь открыта тихо, но эффективно."
 Sweden_foci.331.a: "Скромный успех"
 Sweden_foci.332.t: "Инвестиционное предложение отклонено"
 Sweden_foci.332.d: "§Y[FROM.GetNameWithFlag]§! отклонило нашу инвестиционную инициативу. Официально сославшись на обеспокоенность национальным суверенитетом и прозрачностью, их правительство решило отказаться от предложенной сделки. Этот отказ пока ограничивает наши возможности в регионе."
 Sweden_foci.332.a: "Они пожалеют об этом"
 Sweden_Forsvarsbeslutet.1.t: "Новый мандат, военный путь"
 Sweden_Forsvarsbeslutet.1.d: "Выборы завершены. Новое правительство вступает в должность, и, как того требует традиция, Его Величество Король зачитает вступительное заявление Риксдага.\n\nОт уединенных лесов Лапландии до Эресуннского моста, от продуваемых ветрами скал Готланда до заснеженных вершин Хелагсфьелля, народ Швеции слушает.\n\nКакой курс мы зададим для наших вооруженных сил? Укрепим ли мы наш потенциал по защите родины, держа наши полки близко, а нашу боеготовность острой? Будем ли мы проецировать нашу силу за рубеж, вступая в коалиции и миротворческие миссии, сопряженные с риском, но способные удерживать угрозы вдали от наших границ? Или примем спокойствие настоящего и перенаправим ресурсы в другие сферы, полагаясь на дипломатию и мир?\n\nПравительство обладает мандатом. Теперь оно должно выбрать."
 Sweden_Forsvarsbeslutet.1.o1: "Укрепить возможности родины."
 Sweden_Forsvarsbeslutet.1.o2: "Расширить наши возможности действий за рубежом."
 Sweden_Forsvarsbeslutet.1.o3: "Сократить военные силы."
 Sweden_Forsvarsbeslutet.2.t: "Вопрос стали и стратегии"
 Sweden_Forsvarsbeslutet.2.d: "The path is set our government has chosen to strengthen Sweden's armed forces. But strength comes in many forms.\n\nIn one camp, the voices are clear: purchase new STRV 122 tanks and CV 90 infantry fighting vehicles. Proven tools, familiar to our soldiers, ready to be deployed in the forests and fields they were made for.\n\nOthers urge caution. Why spend now, they ask, when the world of tomorrow will demand new systems and smarter designs? Better to invest in development engineers, labs, and ideas that may shape the next generation of Swedish defence.\n\nThen there are those who see numbers. Cold, fiscal limits. They point at the spreadsheets in Finansdepartementet and shake their heads. The will may be there, but the money is not.\n\nThe Riksdag must decide once more."
 Sweden_Forsvarsbeslutet.2.a: "Заказать новые STRV 122 и CV 90 — надёжная сила здесь и сейчас."
 Sweden_Forsvarsbeslutet.2.b: "Инвестируйте в исследования и разработки, вместо этого готовьтесь к появлению следующего поколения."
 Sweden_Forsvarsbeslutet.2.c: "We simply can't afford it not this year."
 Sweden_Forsvarsbeslutet.3.t: "Небо над нами"
 Sweden_Forsvarsbeslutet.3.d: "Современная армия сильна ровно настолько, насколько силены крылья над ней. В рамках нашего обновлённого оборонного усилия нам предстоит решить будущее шведских ВВС.\n\nGripen — быстрый, манёвренный, с гордостью шведский. Некоторые настаивают на новом цикле закупок, чтобы расширить наши эскадрильи и быть готовыми к небесам завтрашнего дня с самолётами, которым мы доверяем сегодня.\n\nДругие предлагают иной путь. Они видят будущие угрозы не в воздушных боях, а в системах стелс, сенсорах, точности. Деньги, говорят они, следует направлять на разработку, а не на развертывание.\n\nНо в тихих кабинетах Министерства финансов настроение более сдержанное. Энтузиазм сталкивается с бюджетными потолками. Патриотизм — с бухгалтерией.\n\nСнова правительство должно сделать выбор."
 Sweden_Forsvarsbeslutet.3.a: "Order new JAS 39 Gripen fighters prepared for tomorrow's skies."
 Sweden_Forsvarsbeslutet.3.b: "Инвестировать в аэрокосмические НИОКР — создать следующий шаг вперёд."
 Sweden_Forsvarsbeslutet.3.c: "На крылья в этом году денег нет."
 Sweden_Forsvarsbeslutet.4.t: "Сталь, гусеницы и крылья"
 Sweden_Forsvarsbeslutet.4.d: "Сухопутные и воздушные силы. Сталь и реактивные двигатели. Сердце шведской обороны всегда покоилось на гармонии взаимодействующих сил.\n\nНекоторые предлагают идти ва-банк: закупить новые танки STRV 122, боевые машины пехоты CV 90 и свежие эскадрильи истребителей Gripen. Полноценная модернизация, чтобы Totalförsvaret стал не просто доктриной, а реальностью.\n\nДругие советуют проявить терпение. Лучше инвестировать в будущие разработки — более лёгкие, умные, эффективные. Не следует строить сегодня то, что завтра будет устаревшим.\n\nИ, конечно, врывается реальность. Таблицы, ограничения, обещания, данные в других местах. Амбиции сталкиваются с экономией. Кошельки не бездонны.\n\nТеперь мы решаем, какой должна быть сила."
 Sweden_Forsvarsbeslutet.4.a: "Закупить CV 90, STRV 122 и Gripen — оснастить современные силы уже сейчас."
 Sweden_Forsvarsbeslutet.4.b: "Сделать ставку на долгосрочные технологии — сначала создать следующее поколение."
 Sweden_Forsvarsbeslutet.4.c: "We want to but can't afford it."
 Sweden_Forsvarsbeslutet.10.t: "Решение по обороне 2000: Ножницы или щиты?"
 Sweden_Forsvarsbeslutet.10.d: "In the wood-paneled halls of the Riksdag, coffee cups clink and soft-spoken negotiations unfold with all the urgency of a cold January morning. The Försvarsutskottet presents its findings, and the room is filled with nods, furrowed brows, and the untranslatable art of measured Swedish compromise.\n\nOutside the capital, the mood is different. In Boden and Revingehed, officers wonder if their regiments will survive another round of cuts. The conscript barracks feel emptier than they should. Across the country, people read the headlines and sigh. It is, after all, a very Swedish thing to debate security policy with a spreadsheet in one hand and a principle of neutrality in the other.\n\nThe new Försvarsbeslutet proposes reduced expenditures, consolidation of units, and a downsizing of the standing forces. Critics warn of a weakening posture in an unpredictable world. Supporters call it fiscal responsibility in a time of peace. As always, the final result is a compromise.\n\nWe are not disarming. But we are shrinking quietly, politely, and with great concern for process.\n\nTotalförsvaret remains on paper. Whether it remains in practice… will depend on what the future demands."
 Sweden_Forsvarsbeslutet.10.a: "Швеция выиграет от системы полков"
 Sweden_Forsvarsbeslutet.10.b: "Швеция остаётся при бригадах"
 Sweden_Forsvarsbeslutet.11.t: "Механизм реформ"
 Sweden_Forsvarsbeslutet.11.d: "Чернила едва высохли. От ледяных берегов Эресунна до замёрзших полей Лапландии солдаты, чиновники и обычные граждане ждут следующего сигнала: когда вступит в силу новое решение по обороне (Försvarsbeslutet).\n\nНа совещаниях штаба и в городских советах этот вопрос висит в воздухе, словно пар от утреннего кофе. Подразделения задаются вопросом, когда изменятся их бюджеты. Муниципалитеты просматривают планы по инфраструктуре. Кто-то готов к действиям, кто-то предпочёл бы ещё один раунд тихих обсуждений.\n\nТаков шведский путь. Спокойно, взвешенно, продуманно. Никто не кричит. Никто не паникует. Но все знают: Totalförsvaret работает только тогда, когда механизм смазан, а шестерёнки вращаются синхронно.\n\nТеперь остаётся вопрос времени. Не «если», а «когда»."
 Sweden_Forsvarsbeslutet.11.a: "Нам следует быть готовыми примерно через 6 месяцев"
 Sweden_Forsvarsbeslutet.11.b: "Лучше внедрять поэтапно. Начать в следующем году."
 Sweden_Forsvarsbeslutet.11.c: "Сделать как можно быстрее."
 Sweden_news.1.o1: "На Севере появляется новый финансовый гигант."
 Sweden_news.2.t: "Углубляется сотрудничество Северных и Балтийских стран"
 Sweden_news.2.d: "Сегодня представители Швеции, Норвегии, Дании, Финляндии, Исландии, Эстонии, Латвии и Литвы подписали официальную декларацию, укрепляющую партнёрство Северных и Балтийских стран — «Восьмёрки» (NB8). Эта региональная структура будет координировать обсуждения политики в таких областях, как внешние дела, оборона, цифровая инфраструктура и устойчивость к климатическим изменениям.\n\nХотя NB8 не является военным союзом, её широко рассматривают как стратегический ответ на возросшую геополитическую неопределённость в регионе. Наблюдатели отмечают потенциал блока для формирования северного объединения с общим дипломатическим весом и интегрированными механизмами региональной политики."
 Sweden_news.2.o1: "Единство через общие интересы и географию."
 Sweden_news.3.t: "Создан Союз NORDCAPS"
 Sweden_news.3.d: "Стокгольм объявил о создании Инициативы по скоординированному подходу к миру и безопасности в Северной Европе (NORDCAPS) — новой скандинавской инициативы, направленной на улучшение совместного планирования обороны, совместимости вооружений и обмена разведданными между странами-участницами.\n\nХотя это не формальный военный союз, NORDCAPS будет служить платформой для структурированного сотрудничества в области безопасности между Швецией, Норвегией, Данией и Финляндией. Сторонники рассматривают её как гибкое и руководимое северными странами дополнение к существующим европейским оборонным структурам.\n\nУчения, координация действий в кризисных ситуациях и совместная стратегическая оценка будут составлять основу сотрудничества в будущем."
 Sweden_news.3.o1: "Скандинавия стоит единым фронтом"
 Sweden_news.4.t: "Учения повсюду вокруг нас"
 Sweden_news.4.d: "По тихим городкам и сельским дорогам Швеции рокот двигателей и рев реактивных турбин заменили привычное спокойствие. Истребители JAS 39 Gripen взлетают и садятся на импровизированные взлётно-посадочные полосы — обычные шоссе теперь служат стартовыми точками для противовоздушной обороны. В густых лесах Смоланда и Вермланда танки STRV 122 и боевые машины пехоты CV 90 движутся по подлеску, как стальные хищники. Учебные снаряды звучат по всей местности.\n\nДля многих граждан приходит осознание: мы находимся посреди военных учений. Totalförsvaret — это не только теория, это реальный опыт. Весь народ участвует в учениях.\n\nКто-то находит утешение в подготовке, другие ощущают тяжесть того, что это означает."
 Sweden_news.4.o1: "Нация тренируется как единое целое"
 Sweden_news.5.t: "Ведётся строительство стратегических укреплений"
 Sweden_news.5.d: "Бетонные стены возводятся там, где когда-то леса стояли нетронутыми. Инженеры укрепляют мосты стальной сеткой и зарядами направленного действия. На севере бункеры врезаются в гранит; на юге противотанковые рвы тянутся через поля, словно шрамы.\n\nЭто не возвращение в прошлое — это облик современной обороны. От Эстерсунда до Карлскроны Швеция готовится к любому вызову. Каждый контрольный пункт, каждая окопная позиция, каждый укреплённый тоннель посылают одно сообщение: нас не застанут врасплох.\n\nTotalförsvaret превращает местность в крепость. Страна не спит — она стиснула челюсти."
 Sweden_news.5.o1: "Пусть леса сражаются вместе с нами."
 Sweden_news.6.t: "Ковать лидеров для фронта."
 Sweden_news.6.d: "In classrooms and on live-fire ranges, Sweden's future commanders are being shaped. Tactical theory gives way to smoke drills and sand-table exercises; the pressure of decisions made in minutes hardens instinct into doctrine.\n\nFrom Försvarshögskolan to remote battalion posts, officers hone the skill that separates order from chaos. In Totalförsvaret, leadership is not optional it is the linchpin of survival.\n\nWe do not wait for war to teach us. We prepare in advance."
 Sweden_news.6.o1: "Острый ум ведёт за собой уверенные руки."
 Sweden_news.7.t: "Люди в форме"
 Sweden_news.7.d: "Они приходят в выцветшей камуфляжной форме, с привычными винтовками и термосами из дома. Это учителя, механики, студенты, граждане. Но на этой неделе они — Hemvärnet.\n\nПо лесам и полям разворачиваются учения по обороне страны с поразительным реализмом. Дорожные блоки появляются за ночь. Связь проверяется в условиях отключения электроэнергии. Полевые кухни кормят батальоны. Дети наблюдают с веранд, как проходят колонны.\n\nЭто не армия приходит к народу. Это народ становится армией."
 Sweden_news.7.o1: "Готовы в мирное время, готовы в кризис."
 Sweden_news.8.t: "Начало марша домой"
 Sweden_news.8.d: "Шлемы сняты. Контрольные посты исчезли. Дороги, по которым когда-то патрулировали бронетранспортеры, теперь заполняют велосипеды и летний транспорт. Мобилизованные подразделения Hemvärnet уходят, оставляя после себя лишь колеи на земле и память о движении.\n\nИ всё же что-то остаётся. В каждой деревне, где дислоцировался взвод, в каждом лесу, расчищенном для учений, ощущается тонкое изменение. Мы вернулись к обычной жизни, но обычная жизнь теперь знает, что такое подготовка.\n\nTotalförsvaret научил нас: безопасность — это не отсутствие страха. Это наличие готовности."
 Sweden_news.8.o1: "Обычная жизнь, но больше никогда наивная."
 Sweden_news.9.t: "Нация, призванная к готовности"
 Sweden_news.9.d: "The activation order came just after dawn. Within hours, uniforms were unpacked, weapons collected, radios crackled to life. In towns and outposts across Sweden, the quiet machinery of mobilisation began to hum.\n\nHemvärnet doesn't arrive with ceremony it simply appears. Road intersections are secured. Communications hubs are manned. The forests whisper again with movement.\n\nThere is no panic. Only determination. The country has trained for this moment. Now, it enacts it."
 Sweden_news.9.o1: "Обычные люди. Необычная готовность."
 Sweden_news.10.t: "Вступает в силу Решение по обороне 2000 года"
 Sweden_news.10.d: "The new structure is in place. Across the country, columns of armored vehicles glide through quiet towns, headed toward their restructured garrisons. Children watch in awe as steel giants roll past their schools, their imaginations stirred by the rumble of readiness.\n\nIn Boden, Skövde, and Enköping, life begins to shift. Young women lean against fences, watching the arrival of conscripts from every corner of the country faces new to the north, drawn by duty. There's a familiar sparkle in the eyes, a nod to tradition, to the slow rhythms of shared service.\n\nThe number of units has changed. The map of Sweden's defence is redrawn. But the essence remains: people, purpose, and preparedness. *Totalförsvaret* has not disappeared. It has simply moved to fewer, stronger foundations."
 Sweden_news.10.a: "Началось новое тысячелетие"
 Sweden_news.11.t: "Непрерывность в меняющемся мире"
 Sweden_news.11.d: "While a few weary-eyed budget analysts in the Ministry of Finance are visibly displeased with the decision to maintain such a sizeable armed force, not everyone shares their concern. In Boden, a group of young conscripts now with a real path toward professional service break into a spontaneous performance of *Dancing Queen* in the snow-covered courtyard. It's an oddly touching scene, part satire, part pride. An uncommon emotional moment ripples through the nation.\n\nEven His Majesty the King, usually reserved in matters of state, pens a handwritten letter to the Riksdag thanking its members for their wisdom and for preserving a tradition that has long stood as a pillar of Swedish independence."
 Sweden_news.11.a: "Структура, которую стоит защищать."
 Sweden_news.12.t: "Национальный фонд Швеции инвестирует в криптовалюту"
 Sweden_news.12.d: "While Sweden has never been known for bold moves in monetary policy, the pace of global financial innovation has made hesitation a risk in itself. Today, in a historic announcement, the King declared that the national retirement fund will be authorized to expand its portfolio by investing directly in cryptocurrencies and even into cryptocurrency mining operations.\n\nSupporters hail the decision as visionary and necessary for future-proofing Sweden's economy, while critics warn of the volatility and uncertainty that still surround digital assets.\n\nNevertheless, the age of crypto has officially reached Sweden's financial heart."
 Sweden_news.12.a: "Смелый шаг в будущее."
 Sweden_news.20.t: "Повестка дня: «Цена нейтралитета»"
 Sweden_news.20.d: "In its latest broadcast, Agenda tackled 'The Price of Neutrality'. Economists, former diplomats, and military officials debated the tangible costs and benefits of Sweden's non-aligned stance. \"We forgo influence, but keep independence,\" said one expert. Others noted lost opportunities in security cooperation and arms development. The show underscored a hard truth: while neutrality offers freedom, it often comes at the expense of leverage, access, and assurance. As the world grows more volatile, the old model faces new questions."
 Sweden_news.20.a: "Цена принципа редко бывает низкой."
 Sweden_news.21.t: "Повестка дня: «Спросите министра — открытый диалог о защите»"
 Sweden_news.21.d: "Agenda aired a live segment titled 'Ask the Minister', where citizens questioned Sweden's Minister of Defence directly. Topics ranged from military spending to strategic partnerships. When asked about neutrality, the Minister responded: \"Our policy adapts to the world, but our principles remain.\" While some praised the openness, others called the answers evasive. Viewers were left pondering whether this was meaningful dialogue or polished public relations. One thing was certain: public trust must be earned, not managed."
 Sweden_news.21.a: "Люди наблюдают и оценивают."
 Sweden_news.22.t: "Повестка дня: «Повышение осведомлённости о безопасности или тихая мобилизация?»"
 Sweden_news.22.d: "In an episode titled 'Security Awareness or Quiet Mobilization?', Agenda addressed the fine line between information and alarm. With government leaflets and PSAs on the rise, panelists debated whether this reflects transparency or subtle militarization. \"We're being asked to prepare but for what exactly?\" asked a communications professor. Others argued that democratic nations must foster civilian readiness without fear. The episode captured a growing unease: is Sweden preparing for war or just preparing the public mind?"
 Sweden_news.22.a: "Послание ясно, но мотив неизвестен."
 Sweden_news.23.t: "Повестка дня: «Символическая кампания по подготовке граждан?»"
 Sweden_news.23.d: "Программа Agenda изучила недавнюю публичную кампанию шведских властей, направленную на повышение осведомлённости о гражданской обороне и национальной безопасности. В эпизоде под названием «Символическая кампания по подготовке граждан?» обсуждалось, имеет ли инициатива реальное содержание или носит лишь символический характер. «Скорее похоже на театральное представление, чем на подготовку», — отметил один из гостей. Другие же защищали программу как необходимый первый шаг к формированию устойчивости общества. Эпизод отразил общество в тихом напряжении: оно осознаёт растущие риски, но не знает, как реагировать."
 Sweden_news.23.a: "Готовность населения остаётся скорее целью, чем реальностью."
 Sweden_news.24.t: "Повестка дня: «Шведский путь — между идеализмом и реалполитикой»"
 Sweden_news.24.d: "In a thoughtful discussion titled 'The Swedish Way', Agenda explored whether Sweden's moral diplomacy still aligns with its foreign policy behavior. \"We claim to lead with values,\" said one journalist, \"but our arms exports and alliance strategies suggest otherwise.\" The debate touched on everything from UN peacekeeping to military-industrial deals. The segment closed with a provocative question: Is 'the Swedish way' a guiding principle or just a branding exercise in a cynical world?"
 Sweden_news.24.a: "Миф о моральном исключительном положении подвергается проверке."
 Sweden_news.25.t: "Повестка дня: «Что для нас сегодня означает нейтралитет?»"
 Sweden_news.25.d: "В повестке дня стоял острый вопрос: «Что нейтралитет означает для нас сегодня?». В рамках передачи разгорелись оживлённые дебаты о наследии и будущем шведского нейтралитета. Учёные спорили о том, подрывает ли сотрудничество с западными военными традиционные ценности. Отставной генерал настаивал: «Нейтралитет всегда был связан со стратегической независимостью, а не с изоляцией». У аудитории не было чёткого ответа, лишь осознание того, что эта концепция, некогда краеугольный камень национальной политики, теперь требует глубокого переосмысления в свете новых геополитических реалий."
 Sweden_news.25.a: "Основной принцип шведской идентичности подвергается переосмыслению."
 Sweden_news.26.t: "Повестка дня: «Многополярный мир — возможность или угроза?»"
 Sweden_news.26.d: "This week, Agenda examined the implications of a multipolar world order for Sweden. The show featured defense analysts and foreign policy scholars debating whether a less U.S.-dominated global system creates opportunities for Swedish autonomy or greater danger. One expert warned, \"Multipolarity doesn't mean peace, it means unpredictability.\" Others countered that Sweden can benefit from new balancing powers. As major states realign, the program highlighted an emerging dilemma: whether Sweden should stay strategically agile or start choosing sides."
 Sweden_news.26.a: "Швеция переосмысливает своё положение в меняющемся мире."
 Sweden_news.27.t: "Повестка дня: «Другая Европа»"
 Sweden_news.27.d: "Agenda's segment titled 'The Other Europe' invited Swedes to reexamine their place on the continent. Panelists discussed how Sweden historically defied simple East-West categorization. \"We're part of Europe,\" one historian said, \"but often feel like outsiders within both NATO and the EU.\" The dialogue explored the idea of a 'third space' in European politics a sphere for neutral, democratic states charting independent paths. Yet the show also asked: Is this vision realistic, or is it nostalgic myth-making in an increasingly polarized world?"
 Sweden_news.27.a: "Шведы задаются вопросом, где они действительно находят своё место."
 Sweden_news.28.t: "Повестка дня: «Виноват ли высокомерный Запад?»"
 Sweden_news.28.d: "In last night's episode of SVT's Agenda, the topic 'Blaming the Arrogant West?' sparked a charged discussion. The studio gathered former ambassadors, policy analysts, and academics to reflect on whether Sweden's increasing distance from Western leadership is rooted in disillusionment. One guest noted, \"There's a growing sense that Western powers expect obedience, not dialogue.\" Another added, \"Neutrality isn't submission it's a stance.\" The conversation highlighted a rising critique within Swedish society: that being sidelined in international politics may not be a matter of neutrality, but of pride."
 Sweden_news.28.a: "Дискуссия продолжается за обеденными столами и на страницах газет."
 Sweden_news.29.t: "Повестка дня: «Новая остполитика?»"
 Sweden_news.29.d: "Last night's Agenda asked a question rarely posed in mainstream politics: 'Should Sweden reengage with the East?' The topic referred not to Cold War nostalgia, but to pragmatic diplomacy with Russia and its neighbors. Critics called it naïve \"You cannot build trust on aggression,\" said one panelist. But others argued that isolation only reinforces hostility. \"Dialogue is not endorsement,\" countered a former ambassador. The show sparked uncomfortable reflections on whether Sweden's total strategic alignment with the West has reduced its diplomatic flexibility. Could selective engagement be a path to regional stability or a dangerous illusion?"
 Sweden_news.29.a: "Идея восточного диалога вызывает одновременно воспоминания и разногласия."
 Sweden_news.30.t: "Повестка дня: «Формирование шведской стратегической мысли»"
 Sweden_news.30.d: "Agenda explored an often overlooked gap in national resilience: the lack of a strong, independent Swedish strategic research capacity. Under the title 'Building Swedish Strategic Thought', the segment showcased emerging efforts to establish a national think tank focused on security, diplomacy, and geopolitics. \"We've outsourced too much of our worldview to others,\" said a policy researcher. The debate turned to how much of Sweden's foreign policy thinking is reactive rather than conceptual. The consensus: if Sweden wants autonomy, it must first understand its own interests on its own terms."
 Sweden_news.30.a: "Суверенный голос начинается с суверенных идей."
 SWE_idea_nordic_peace_commission: "Комиссия мира северных стран"
 SWE_idea_nordic_peace_commission_desc: "Швеция выступила инициатором создания постоянной Комиссии по миру в странах Северной Европы – институциональной платформы для дипломатического разрешения конфликтов, диалога по контролю над вооружениями и скоординированного предотвращения кризисов в Скандинавском регионе. Несмотря на отсутствие военного авторитета, её влияние на региональную стабильность и укрепление доверия существенно."
 SWE_idea_swedish_legacy: "Шведское наследие"
 SWE_idea_swedish_legacy_desc: "Few nations of our size have maintained such a long-standing independence through centuries of geopolitical pressure. Sweden's legacy is one of neutrality, innovation, and military competence without aggression. From Gustavian reforms to the Cold War doctrine of armed neutrality, the Swedish model is built on deterrence through readiness and a deeply embedded societal will to defend.\n\nIn this legacy, we find both identity and obligation."
 SWE_idea_swedish_legacy2: "Воля народа"
 SWE_idea_swedish_legacy2_desc: "Несмотря на растущую общественную поддержку возвращения королевской власти, наш король выбрал иной путь. Проявив выдающееся смирение и государственную мудрость, он поклялся служить народу и сохранять демократию. Монархия существует не как инструмент власти, а как хранитель национального единства и символ верности воле граждан."
 SWE_idea_swedish_legacy_3: "Каролус Рекс"
 SWE_idea_swedish_legacy_3_desc: "В эти неспокойные времена эксперимент с демократией дал сбой, и страна требует возвращения своего законного суверена. Корона вновь будет править Швецией с твёрдой решимостью и непоколебимой целью. Карл Рекс восстаёт, готовый восстановить порядок, защитить наше наследие и привести королевство к величию, как в былые времена."
 SWE_idea_fast_reaction_force: "Сила быстрого реагирования"
 SWE_idea_fast_reaction_force_desc: "In the post–Cold War era, speed is as valuable as strength. Sweden's Försvarsmakten has developed dedicated snabbinsatsstyrkor units equipped and trained to deploy rapidly within or beyond national borders. These formations rely on mobility, interoperability, and real-time command structures.\n\nThey don't wait for threats to knock they move to meet them halfway."
 SWE_the_balanced_Army: "Сбалансированная армия"
 SWE_the_balanced_Army_desc: "Rather than specializing in one domain, Sweden's military doctrine emphasizes balance: between mobility and firepower, standing forces and reserves, conventional strength and civil resilience. The result is a force that may not dominate globally, but one that cannot be easily broken.\n\nIn Sweden, victory is measured in endurance not conquest."
 SWE_heavy_defense_focus: "Сильный акцент на обороне"
 SWE_heavy_defense_focus_desc: "Мы готовимся не к вторжению, а к удержанию позиций. Шведская доктрина делает стратегический акцент на глубокоэшелонированной обороне с использованием рельефа местности, укреплений и эшелонированных подразделений, чтобы обескровить агрессора. От прибрежных мин до укреплённых командных убежищ, зарытых в скальную породу, наша сила заключается не в молниеносной атаке, а в нежелании сдаваться.\n\nЭта армия создана, чтобы сделать оккупацию немыслимой."
 SWE_idea_Armestaben: "Арместабен – Центральное армейское командование"
 SWE_idea_Armestaben_desc: "Штаб армии, восстановленный в качестве центрального командного центра наземных операций, играет важнейшую роль в координации и стратегической готовности. Его структура сочетает разработку доктрины с полевой логистикой, обеспечивая шведским войскам современный уровень и оперативность.\n\nВозвращение централизованного штаба армии свидетельствует о наших намерениях: мы планируем, адаптируемся и сами руководим."
 SWE_idea_total_defence_duty: "Обязанность перед всеобщей обороной"
 SWE_idea_total_defence_duty_desc: "Тотальная оборона — это не просто политика, это обязательство. От шведских граждан ожидается не только несение военной службы, но и обеспечение гражданской готовности: логистика, медицинское обслуживание, инфраструктура и реагирование на кризисы. В периоды угрозы вся страна становится системой сопротивления.\n\nТотальная оборона — это не только призыв на военную службу. Это вклад каждого шведа."
 SWE_idea_active_training: "Учебные программы для действующего состава"
 SWE_idea_active_training_desc: "Силы, которые тренируются только в теории, терпят неудачу на практике. Швеция поддерживает чёткий график общевойсковых учений, совместных учений родов войск и учений в реальных условиях. От замёрзших архипелагов до городской местности наши войска отрабатывают не только тактику, но и адаптацию.\n\nБое состояние не декларируется. Оно становится привычкой."
 SWE_idea_total_training: "Комплексная подготовка по обороне"
 SWE_idea_total_training_desc: "Training in Sweden extends beyond the standing military. Police, civil defense, healthcare, infrastructure, and local governments all take part in contingency exercises. The outcome is not merely logistical it is cultural. Society expects to function under pressure.\n\nWe don't simulate collapse. We simulate how to outlast it."
 SWE_idea_nb8: "Северная восьмёрка (NB8)"
 SWE_idea_nb8_desc: "NB8 — это платформа прагматичного сотрудничества между странами Северной Европы и Балтии, объединёнными географическим положением, экономическими интересами и общими проблемами безопасности. Благодаря дипломатической координации и совместным инициативам NB8 предоставляет Швеции гибкий региональный голос, ведущую роль в котором играют гражданские лица, за пределами основных державных блоков.\n\nТихие союзы создают прочные границы."
 SWE_idea_nordefco: "NORDEFCO — Северное оборонное сотрудничество"
 SWE_idea_nordefco_desc: "NORDEFCO blends the defence capacities of the Nordic states without requiring full alliance integration. Joint procurement, shared exercises, and interoperable command structures strengthen the region's security mosaic. For Sweden, it is a way to strengthen deterrence without sacrificing sovereignty.\n\nUnity in flexibility. Defence without surrender."
 SWE_idea_swedish_banking: "Шведская банковская система"
 SWE_idea_swedish_banking_desc: "Built on trust, regulation, and technological foresight, Sweden's banking system is among the most resilient in Europe. With high digital penetration, low cash reliance, and conservative credit policy, it can weather economic turbulence with quiet confidence.\n\nIn a volatile world, fiscal restraint is strength."
 SWE_idea_focus_energy_preferred_renewable: "Приоритет возобновляемой энергии"
 SWE_idea_focus_energy_preferred_renewable_desc: "Швеция уже давно лидирует в переходе на возобновляемые источники энергии, развивая гидроэнергетику, ветроэнергетику и биотопливо. Энергетическая независимость здесь имеет не только экологическое, но и геополитическое значение. Снижение иностранной зависимости укрепляет национальную устойчивость, особенно в периоды кризиса.\n\nЗелёная энергетика — это не просто идеализм. Это защита от внешнего давления."
 SWE_idea_expanding_digital_infrastructure: "Расширение цифровой инфраструктуры"
 SWE_idea_expanding_digital_infrastructure_desc: "Sweden's commitment to digital infrastructure runs deeper than fiber optic cables. It is a strategic posture cybersecurity, data sovereignty, and digital public services form the pillars of modern resilience. From e-governance to encrypted communications, the nation's networks are built for redundancy and control.\n\nOur strength runs on code and copper alike."
 SWE_development_found_of_the_swedish_construction_industry: "Основы современной шведской архитектуры"
 SWE_development_found_of_the_swedish_construction_industry_desc: "Postwar Sweden invested heavily in infrastructure, culminating in a robust and versatile construction sector. From bridges in Norrland to underground rail in Stockholm, Swedish firms build for durability, efficiency, and harsh climates. In times of crisis, this capacity becomes dual-use repair, reinforce, rebuild.\n\nOur engineers don't just construct they defend the future in concrete."
 SWE_idea_sverige_tourism: "Откройте Швецию"
 SWE_idea_sverige_tourism_desc: "Долгие годы Швеция была всего лишь отдалённой точкой на карте, часто сведённой к клише вроде группы ABBA, светловолосых моделей и мало чего ещё. Однако за этими стереотипами скрывается захватывающая дух страна с богатой историей, культурой и природой. От северных берегов, усеянных оленями под полярным сиянием, до современного чуда Эресуннского моста на юге — Швеция предлагает гостям уникальные и незабываемые впечатления. Инвестируя в инфраструктуру, гостеприимство и международный маркетинг, мы можем раскрыть огромный потенциал красоты и очарования нашей страны."
 SWE_idea_2percent_inflation_goal: "Показатель инфляции 2%"
 SWE_idea_2percent_inflation_goal_desc: "Экономическая стабильность не возникает сама собой, она тщательно контролируется. Взяв на себя обязательство по достижению целевого уровня инфляции в 2%, мы стремимся закрепить ожидания, поддержать устойчивый рост и сохранить покупательную способность, не провоцируя перегрев экономики. Предсказуемая денежно-кредитная среда укрепит доверие инвесторов, бизнеса и граждан."
 SWE_idea_gold_standart: "Возвращение к золотому стандарту"
 SWE_idea_gold_standart_desc: "На фоне растущей неопределенности вновь обретает актуальность давняя идея о валюте, обеспеченной золотом. Восстановление золотого стандарта направлено на восстановление доверия к нашей денежной системе, предлагая фиксированные значения и защищая экономику от спекулятивных эксцессов. Однако жёсткая структура может ограничивать гибкость в периоды кризиса."
 SWE_idea_back_by_bonds: "Валюта, обеспеченная облигациями"
 SWE_idea_back_by_bonds_desc: "Вместо того, чтобы привязывать себя к фиксированному товару, мы можем подкрепить нашу валюту государственными облигациями, создав одновременно надёжную и адаптивную систему. Государственный долг послужит основой для денежной эмиссии, обеспечивая баланс между стабильностью и способностью динамично реагировать на финансовое давление."
 SWE_idea_nordbanken: "Консолидация Nordbanken"
 SWE_idea_nordbanken_desc: "В целях стабилизации финансового сектора Nordbanken был реструктурирован в более сильный и устойчивый институт. Благодаря поддержке государства и частных инициатив, банк является краеугольным камнем современной финансовой системы Швеции, способной выдержать будущие экономические потрясения."
 SWE_idea_nuclear_Power: "Расширение ядерной энергетики"
 SWE_idea_nuclear_Power_desc: "With rising energy demands and mounting environmental concerns, nuclear power offers a path toward sustainable, large-scale electricity generation. Investing in new reactors ensures both energy independence and the steady decarbonization of Sweden's energy grid."
 SWE_idea_Mining: "Стратегические инициативы в горнодобывающей отрасли"
 SWE_idea_Mining_desc: "Минеральные богатства Швеции уже давно являются негласной опорой её промышленного успеха. Возобновив внимание к горнодобывающей промышленности, модернизировав методы добычи и обеспечив себя критически важными ресурсами, мы можем гарантировать наличие сырья, необходимого для нашего будущего роста и реализации технологических амбиций."
 SWE_lower_costs: "Сокращение расходов на оборону"
 SWE_lower_costs_desc: "Военные расходы были значительно сокращены для перераспределения ресурсов на внутренние приоритеты. Хотя это и облегчает бюджетное бремя, это также снижает непосредственную боеготовность, делая тщательный стратегический баланс как никогда важным."
 SWE_idea_den_education_reform1: "Реформа образования: Основы"
 SWE_idea_den_education_reform1_desc: "Признавая необходимость современной экономики, основанной на знаниях, первый этап реформы образования сосредоточен на укреплении начального обучения и улучшении доступа к качественному образованию во всех регионах."
 SWE_idea_den_education_reform2: "Реформа образования: Расширение"
 SWE_idea_den_education_reform2_desc: "Опираясь на первые успехи, реформа вступает во вторую фазу, расширяя среднее и профессиональное образование и адаптируя учебные программы к требованиям конкурентной мировой экономики."
 SWE_idea_den_education_reform3: "Реформа образования: Совершенство"
 SWE_idea_den_education_reform3_desc: "Третья фаза направлена на достижение совершенства: усиливаются высшие учебные заведения, стимулируются научные исследования и инновации, а также продвигается международное сотрудничество, чтобы вывести Швецию на передовые позиции в академической сфере."
 SWE_idea_den_education_reform4: "Реформа образования: Готовность к будущему"
 SWE_idea_den_education_reform4_desc: "With the foundations, expansion, and excellence phases completed, the final phase ensures that education remains agile, inclusive, and forward-looking preparing citizens for the dynamic challenges of tomorrow's world."
 SWE_idea_automotive_JAP: "Японское автомобильное сотрудничество"
 SWE_idea_automotive_JAP_desc: "Forged through new partnerships with Japan's precision-driven automotive industry, Sweden gains access to cutting-edge technologies, manufacturing techniques, and competitive market strategies. Collaboration with leading Japanese firms enhances our production resilience, ensuring we stay at the forefront of global innovation.\n\nFrom efficient engines to hybrid solutions, a new chapter in automotive excellence is written."
 SWE_idea_automotive_USA: "Американское автомобильное сотрудничество"
 SWE_idea_automotive_USA_desc: "Built on deepening ties with the industrial giants of the United States, Sweden's automotive sector absorbs the best practices of mass production, commercial design, and logistical scale. Our factories become faster, more flexible, and more competitive, bridging Nordic craftsmanship with American industrial dynamism.\n\nIn every chassis and drive shaft, a shared spirit of ambition takes form."
 SWE_idea_automotive_GER: "Немецкое автомобильное сотрудничество"
 SWE_idea_automotive_GER_desc: "Strengthened by cooperation with Germany's world-renowned automotive leaders, Swedish industry embraces precision engineering, quality control, and innovation at the highest levels. Joint ventures and knowledge exchange secure technological advances and boost our own industrial capabilities.\n\nIn every gear and piston, the pursuit of excellence endures."
 SWE_pharmaceuticals_idea: "Расширение фармацевтической промышленности"
 SWE_pharmaceuticals_idea_desc: "Rooted in decades of scientific innovation, Sweden's pharmaceutical sector emerges as a key pillar of national strength. From vaccines to life-saving treatments, our laboratories and manufacturing centers are ready to meet both domestic and global needs.\n\nIn every compound and cure, a legacy of trust and discovery grows."
 SWE_idea_astrazenca: "Партнерство AstraZeneca"
 SWE_idea_astrazenca_desc: "Благодаря партнёрству с AstraZeneca Швеция укрепляет свои позиции на стыке медицины, биотехнологий и передовых исследований. Совместные проекты ускоряют разработку новых лекарственных препаратов и укрепляют наши позиции на международных фармацевтических рынках.\n\nИнновации прослеживаются в каждом флаконе и каждой формуле, которую мы производим."
 SWE_idea_Pharmacia1: "Фармация: Первые прорывы"
 SWE_idea_Pharmacia1_desc: "Pharmacia's early breakthroughs laid the foundations of Sweden's pharmaceutical reputation, blending rigorous science with a bold entrepreneurial spirit. Our researchers' achievements in biotechnology and medical treatments still resonate worldwide.\n\nIn every discovery, the pioneering spirit shines through."
 SWE_idea_Pharmacia2: "Фармация: Глобальная экспансия"
 SWE_idea_Pharmacia2_desc: "Building on a tradition of innovation, Pharmacia's expansion into international markets signals a new era of Swedish pharmaceutical influence. Strategic mergers and research collaborations position Sweden as a leading hub for health sciences and medical technology.\n\nIn every lab and every partnership, the future is being shaped."
 SWE_idea_swedish_think_tank: "ISDS – Институт американской дипломатии и безопасности"
 SWE_idea_swedish_think_tank_desc: "The Institute for Swedish Diplomacy and Security (ISDS) is a state-funded body tasked with analyzing Sweden's position in an increasingly unstable world. Officially focused on diplomacy, economic foresight, and civilian security frameworks, the ISDS quietly influences strategic thinking in government and academia. While formally upholding neutrality, the institute produces classified simulations and white papers exploring Sweden's potential role in future alliances, interventions, and investment architectures. In times of geopolitical ambiguity, ISDS provides the intellectual infrastructure for flexible, forward-looking foreign policy."
 SWE_idea_ostkontact: "Инициализируйте Östkontakt"
 SWE_idea_ostkontact_desc: "Сохраняя официальный нейтралитет, мы инициируем культурные, экономические и академические обмены с Россией и государствами Евразии. Эти малозаметные связи служат основой для будущих сценариев сближения. Они также дают сигнал внутренним акторам, что нейтралитет не означает лояльности Западу."
 SWE_idea_anti_lgbt: "Политическая кампания традиционалистов"
 SWE_idea_anti_lgbt_desc: "Группа консервативных голосов начала культурное сопротивление прогрессивным общественным ценностям, призывая к возвращению к «традиционным шведским нормам». Несмотря на отсутствие официальной государственной поддержки, их влияние проникло в общественный дискурс, разжигая дискуссии о правах ЛГБТК+, свободе выражения мнений и семейной политике. Международные НПО и европейские институты выражают обеспокоенность растущей поляризацией общества."
 SWE_idea_folkhemmet: "Современный фолькхеммет"
 SWE_idea_folkhemmet_desc: "Вдохновлённая шведской моделью «Фолькхеммет» (Народного дома) середины XX века, новая концепция инклюзивного социального обеспечения и сильной ответственности государства набирает популярность. Эта модернизированная концепция делает акцент на социальной сплочённости, экономическом равенстве и балансе между рыночными механизмами и механизмами социального обеспечения, стремясь защитить граждан от глобальной нестабильности, сохраняя при этом национальное единство."
 SWE_Logistic_invests: "Стратегические инвестиции в логистику"
 SWE_Logistic_invests_desc: "Осознавая стратегическую важность устойчивой инфраструктуры, Швеция начала модернизацию своих транспортных коридоров, цифровых логистических систем и цепочек поставок для военных. Эта инвестиционная программа направлена ​​на обеспечение внутренней мобильности, обеспечение быстрого военного реагирования и интеграцию со стандартами логистики стран Северной Европы и ЕС."
 SWE_cybershield: "Киберферсвар – Национальный киберзащитный щит"
 SWE_cybershield_desc: "Запущена масштабная национальная инициатива по кибербезопасности для защиты критической инфраструктуры, государственных сетей и цифрового суверенитета. Разработанная в сотрудничестве с академическими учреждениями и оборонными подрядчиками, программа Cyber Shield объединяет системы обнаружения угроз на основе ИИ, наступательные кибервозможности и совместные учения с надёжными партнёрами по ЕС и НАТО."
 SWE_think_tank_links: "Политическая сеть – связи между стратегическими аналитическими центрами"
 SWE_think_tank_links_desc: "Швеция активизировала сотрудничество с международными аналитическими центрами и академическими институтами политики, стремясь повысить свой геополитический прогноз и стратегический потенциал. Эта стратегия дипломатии знаний позволяет оказывать влияние на основе идей, планировать сценарии и предоставлять целевые политические консультации в таких областях, как устойчивость к изменению климата, гибридная война и цифровое регулирование."
 SWE_economic_forum: "Северный экономический форум"
 SWE_economic_forum_desc: "Новая общескандинавская инициатива объединяет экономистов, лидеров промышленности и государственных деятелей для координации мер реагирования на экономические вызовы. Форум стремится согласовать фискальную политику, переход к «зелёной» экономике и инновационные стратегии для обеспечения долгосрочной конкурентоспособности и устойчивости стран Северной Европы в условиях всё более фрагментированной мировой экономики."
 SWE_helsinki_security_dialogue: "Хельсинкский диалог по безопасности"
 SWE_helsinki_security_dialogue_desc: "Швеция инициировала проведение многостороннего форума в Хельсинки, направленного на возрождение мер доверия и стратегического диалога между Севером, ЕС и постсоветскими государствами. Цель форума – укрепление региональной безопасности без присоединения к военным блокам."
 SWE_arctic_peace_concil: "Арктический совет мира"
 SWE_arctic_peace_concil_desc: "В ответ на растущий интерес и напряженность в арктическом регионе Швеция инициировала создание Арктического совета мира. Его деятельность сосредоточена на дипломатии, демилитаризации и сотрудничестве арктических стран в области охраны окружающей среды."
 SWE_idea_the_neutral_act: "Закон о нейтралитете"
 SWE_idea_the_neutral_act_desc: "Швеция подтверждает свой геополитический нейтралитет посредством законодательства, которое закрепляет принцип неприсоединения, ограничивает военную зависимость и продвигает миростроительство как национальную добродетель."
 SWE_non_allied_block: "Координационный форум неприсоединившихся стран"
 SWE_non_allied_block_desc: "Швеция координирует свои действия с другими нейтральными или неприсоединившимися государствами, формируя свободную, но целенаправленную дипломатическую сеть. Этот форум призван выступать посредником в международных кризисах и противостоять поляризации великих держав."
 SWE_idea_rassism: "Скрытый расизм"
 SWE_idea_rassism_desc: "Несмотря на свой прогрессивный имидж, Швеция сталкивается со структурными и культурными проблемами, связанными с этнической изоляцией, социальной стратификацией и политической маргинализацией. Эта напряженность угрожает национальной сплоченности и легитимности."
 SWE_idea_pluralism: "Демократический плюрализм"
 SWE_idea_pluralism_desc: "Швеция приветствует идеологическое многообразие, свободу СМИ и представительство меньшинств. Демократический плюрализм не просто допускается, но и культивируется как источник легитимности и инноваций."
 SWE_idea_royal_social_society: "Королевское социальное общество"
 SWE_idea_royal_social_society_desc: "Королевская семья Швеции активно участвует в социальных инициативах, благотворительных акциях и программах поддержки молодёжи. Её присутствие укрепляет национальную идентичность и связывает традиции с гражданской ответственностью."
 SWE_idea_royal_crown_and_military: "Корона и Вооруженные силы"
 SWE_idea_royal_crown_and_military_desc: "The monarchy strengthens its symbolic bond with Sweden's military. Through public ceremonies, historical legacy, and shared values, the Crown reinforces the unity of nation and defense."
 SWE_idea_royal_crown_and_military2: "Корона и Вооруженные силы – Интегрированные"
 SWE_idea_royal_crown_and_military2_desc: "The Royal Family's presence in officer training, strategic advisory, and national defense education is institutionalized. This marks a new stage of symbolic yet influential alignment between monarchy and military ethos."
 SWE_idea_Victoria: "Наследная принцесса Виктория"
 SWE_idea_Victoria_desc: "Будучи наследницей престола, кронпринцесса Виктория стала символом преемственности, сострадания и служения обществу. Её преданность гражданскому долгу и способность находить общий язык, несмотря на социальные различия, вселяют доверие к монархии и способствуют национальному единству. Её присутствие отражает современную монархию, осознающую свою роль в демократическом обществе."
 SWE_idea_Madeleine: "Принцесса Мадлен"
 SWE_idea_Madeleine_desc: "Принцесса Мадлен известна своей приверженностью защите детей, гуманитарным вопросам и международной благотворительности. Её сотрудничество с международными организациями и возможность представлять Швецию за рубежом способствуют формированию позитивного международного имиджа и укреплению «мягкой силы» монархии."
 SWE_idea_philip: "Принц Карл Филипп"
 SWE_idea_philip_desc: "Принц Карл Филипп, получивший военное образование и активно действующий в общественной жизни, является связующим звеном между традициями и современностью. Он олицетворяет преданность, дисциплину и служение стране. Его связь с вооружёнными силами, поддержка ветеранов и участие в общественных мероприятиях укрепляют символическое единство короны и армии."
 SWE_idea_royal_cultural_institutes: "Королевские культурные институты"
 SWE_idea_royal_cultural_institutes_desc: "The Royal Family actively supports museums, academies, and cultural diplomacy. These institutes preserve national heritage and strengthen Sweden's soft power abroad."
 SWE_idea_nationalize_royal_foundation: "Национализировать Королевский фонд"
 SWE_idea_nationalize_royal_foundation_desc: "Символичным, но в то же время структурным шагом стало помещение Королевского фонда под государственный надзор. Этот закон перенаправляет ресурсы на государственное образование, социальное обеспечение и инклюзивную культуру."
 SWE_no_royal_privileges: "Отменить королевские привилегии"
 SWE_no_royal_privileges_desc: "Королевские льготы по закону, налогообложению и подотчётности были отменены. В новой Швеции ни одна семья не стоит выше граждан, даже корона."
 SWE_idea_workers_rights: "Закон о правах работников"
 SWE_idea_workers_rights_desc: "Новая правовая база укрепила коллективные переговоры, обеспечила защиту от нестандартной занятости и восстановила достоинство труда как основу демократического общества."
 SWE_no_nobelman: "Равенство перед законом"
 SWE_no_nobelman_desc: "Все дворянские титулы и привилегии лишены юридического значения. Шведская Республика не признаёт аристократии, а только граждан, равных в правах и обязанностях."
 SWE_idea_workforce: "Мобилизованная рабочая сила"
 SWE_idea_workforce_desc: "Благодаря образованию, реформе профессиональной подготовки и инклюзивной политике занятости Швеция задействовала весь свой производительный потенциал. Рабочая сила не только мобилизована, но и ценится."
 SWE_marxist_reeducation_idea: "Марксистская программа перевоспитания"
 SWE_marxist_reeducation_idea_desc: "Систематическая идеологическая программа перестраивает общественное сознание посредством образования, партийной подготовки и классово-ориентированной культуры. Старые структуры власти должны быть разрушены не только физически, но и ментально."
 SWE_seeherrschaft: "Владение Балтийским морем"
 SWE_seeherrschaft_desc: "Швеция утверждает своё стратегическое доминирование в Балтийском море. Модернизация флота, морские базы и политика контроля над торговлей гарантируют сохранение северных вод под шведским влиянием."
 SWE_baltic_forum: "Балтийский форум"
 SWE_baltic_forum_desc: "Дипломатическая инициатива объединяет государства, граничащие с Балтийским морем, в вопросах торговли, энергетики, безопасности и экологического сотрудничества. Швеция возглавляет этот форум, выступая в роли нейтрального, но решительного посредника."
 SWE_Church_of_sweden: "Церковь Швеции"
 SWE_Church_of_sweden_desc: "Несмотря на отделение от государства, Церковь Швеции остаётся краеугольным камнем морали и культуры. Её голос влияет на дискуссии об этике, идентичности и социальной ответственности."
 SWE_the_royals: "Королевская семья"
 SWE_the_royals_desc: "Королевская семья продолжает оставаться национальным символом, вызывающим уважение и восхищение, но намеренно ограниченным в политическом влиянии. Её роль церемониальна, но глубоко укоренена в культурной ткани Швеции."
 SWE_monarch_military1: "Королевские вооружённые силы"
 SWE_monarch_coordination_plan: "Государственно-экономический план координации"
 SWE_kultur_idea: "Шведское культурное возрождение"
 SWE_mannerheim_plan: "Пакт инфраструктуры Маннергейма"
 SWE_prepare_baltic: "Владение над Балтийским морем"
 SWE_prepare_baltic_tt: "§RЭтот национальный дух будет удалён, если мы вступим в войну!§!"
 SWE_development_integration: "Развитие логистической сети королевства"
 SWE_exploitation: "Шведская эксплуатация"
 SWE_colonial_court_idea: "Колониальный суд"
 SWE_viking_legacy_idea1: "Дух Уппсалы"
 SWE_danelaw_arsenal: "Арсенал Дэнлоу"
 SWE_danelaw_arsenal_desc: "С времён викингских набегов всё остаётся прежним: нельзя воевать и править без надлежащего снабжения. §BРазве что можно грабить некоторые церкви или монастыри§!"
 SWE_idea_global_south: "Инициатива по посредничеству между Севером и Югом"
 SWE_idea_global_south_desc: "Швеция будет выступать нейтральным форумом, где могут встречаться голоса стран Глобального Севера и Глобального Юга. Через терпеливую дипломатию и справедливые переговоры мы будем укреплять доверие, снижать напряжённость и продвигать совместные решения общих проблем."
 SWE_kalmar_union_markets_idea1: "Рынки Кальмарской унии"
 SWE_self_reliant_industry: "Программа промышленной самодостаточности"
 SWE_self_reliant_industry_desc: "Чтобы стать самодостаточными, мы инвестируем в промышленные мощности, которые раньше получали от сверхдержав."
 SWE_easter_horizon_idea1: "Восточный горизонт"
 SWE_easter_horizon_idea1_desc: "После упоминания влияния НАТО мы переходим к обсуждению сил будущего."
 Sweden_Rus_Exercise: "Шведско-российские военные учения"
 Sweden_Rus_Exercise_desc: "Швеция и Россия договорились провести совместные военные учения, укрепляя региональную координацию и обороноспособность."
 SWE_russian_energy_idea: "Соглашение с Россией о поставках энергии"
 SWE_russian_energy_idea_desc: "Швеция заключила соглашение о сотрудничестве в сфере энергетики с Россией. Это, хотя и обеспечивает стабильные поставки топлива и электроэнергии, одновременно усиливает экономическую зависимость от Российской Федерации."
 SWE_industry_exchange_nk: "Обмен в военной промышленности"
 SWE_industry_exchange_nk_desc: "Швеция вступила в ограниченное промышленное сотрудничество с Северной Кореей для расширения военного производства."
 SWE_industry_exchange_swe: "Обмен в военной промышленности"
 SWE_venezualen_accord_ven: "Инвестиции в шведскую инфраструктуру"
 SWE_venezualen_accord_ven_desc: "После заключения двустороннего соглашения со Швецией Венесуэла получает инвестиции в инфраструктуру и технологическую поддержку, укрепляя свой промышленный потенциал и развитие энергетики."
 SWE_venezualen_accord: "Развитие нефтяной отрасли Венесуэлы"
 SWE_venezualen_accord_desc: "В рамках стратегического инвестиционного соглашения Швеция обеспечила себе долгосрочный доступ к венесуэльской нефти в обмен на инвестиции в промышленность. Это соглашение укрепляет энергетическую безопасность и экономическое влияние Швеции."
 SWE_cuba_medical_exchange: "Партнёрство в области шведских медицинских технологий"
 SWE_cuba_medical_exchange_desc: "Благодаря двустороннему соглашению со Швецией Куба получает выгоду от передовых шведских медицинских технологий, оборудования и совместных исследовательских программ, укрепляя тем самым потенциал нашей национальной системы здравоохранения."
 SWE_iran_petrochemical_swe: "Соглашение с Ираном о нефтехимии"
 SWE_iran_petrochemical_swe_desc: "Благодаря стратегическому соглашению с Ираном Швеция получила доступ к важнейшим нефтяным ресурсам. Шведские компании теперь участвуют в передовых нефтехимических проектах за рубежом, развивая внутреннюю переработку и обеспечивая долгосрочные поставки энергии."
 SWE_iran_petrochemical_iran: "Шведское промышленное сотрудничество"
 SWE_iran_petrochemical_iran_desc: "Sweden has begun investing in Iran's petrochemical and refining sectors. With their technical expertise and industrial equipment, Iranian capacity is growing in both output and technological sophistication, bolstering our energy economy."
 SWE_decision_Forsvarsmarkten_category: "Вооружённые силы"
 SWE_decision_Forsvarsmarkten_category_desc: "\n£GFX_swedisch_homeguard \n\n\n\n\nШведская система обороны основана на концепции Всеоборонной защиты (Totalförsvaret) — едином подходе, который объединяет военную и гражданскую готовность. В рамках этой доктрины Вооружённые силы взаимодействуют с гражданскими структурами, такими как MSB, чтобы обеспечить устойчивость страны в период кризиса или войны. Возобновлённая воинская обязанность обеспечивает постоянный приток подготовленного личного состава, укрепляя армию и формируя общество, способное к коллективному сопротивлению. Каждый гражданин является частью общей оборонной системы страны — от мобилизации до долгосрочных операций сопротивления."
 SWE_Home_Guard: "Расширение территориальной обороны"
 SWE_Home_Guard_desc: "Хемверднет является опорой местной обороны и быстрого реагирования. Увеличив его численность, мы повысим региональную готовность и значительно усилим способность отражать вторжения или внезапные атаки. Привязка этих подразделений к местности обеспечивает устойчивость даже под сильным давлением."
 SWE_fortifications: "Укрепление стратегических пунктов"
 SWE_fortifications_desc: "Чтобы защитить ключевые районы, необходимо вкладываться в надёжные оборонительные позиции. От побережья Сконе до лесов Норрланда укреплённые фортификации смогут задержать или отбить любого противника, давая время завершить мобилизацию."
 SWE_Officer_education_course: "Программа подготовки офицеров"
 SWE_Officer_education_course_desc: "Лидерство в Вооружённых силах должно формироваться через серьёзную и постоянную подготовку. Расширяя программы обучения офицеров в таких учреждениях, как Военный колледж (Försvarshögskolan), мы обеспечиваем высокий уровень стратегической компетентности и эффективность на поле боя."
 SWE_only_active_Personal_Trainings_exercise: "Проведение учений для действующего состава"
 SWE_only_active_Personal_Trainings_exercise_desc: "Регулярные учения и полевые тренировки необходимы для поддержания боеготовности наших регулярных сил. Эти учения укрепят дисциплину, координацию и боеготовность в условиях, приближенных к реальным."
 SWE_Home_defence_Trainings_exercise: "Обучение подразделений территориальной обороны"
 SWE_Home_defence_Trainings_exercise_desc: "Готовность начинается дома. Проводя масштабные учения для резервистов и добровольческих подразделений, мы укрепляем нашу способность реагировать на гибридные угрозы и нетрадиционные сценарии боевых действий."
 SWE_launch_total_defence: "Задействовать систему всеобщей обороны"
 SWE_launch_total_defence_desc: "Всеоборонная система мобилизует всю страну. Гражданская инфраструктура, экстренные службы и вооружённые силы будут работать как единый механизм по общей оборонной стратегии. Этот шаг означает переход от мирного режима к полной готовности ко всем возможным угрозам."
 SWE_back_to_normality: "Демобилизация и возврат к нормальной жизни"
 SWE_back_to_normality_desc: "С отступлением угрозы мы, возможно, начнём снижать уровень повышенной готовности. Режим тотальной обороны будет снят, и страна вернётся к мирному режиму, но полученные уроки и структуры сохранятся на будущее."
 SWE_decision_Royal_category: "Шведская королевская семья"
 SWE_decision_Royal_category_desc: "\n\n\n\n£GFX_SWE_royals_decisions_pic \n\n\n\n\n\n\nШведская монархия, возрождённая в 1818 году бывшим наполеоновским маршалом Жан-Батистом Бернадотом (король Карл XIV Юхан), заложила основы современной Швеции через политику нейтралитета, реформы и индустриализацию. Хотя конституция 1974 года лишила монархию политической власти, династия Бернадотов остаётся центральным символом. Король Карл XVI Густав и кронпринцесса Виктория олицетворяют преемственность и современность, укрепляя национальную идентичность и единство через культурную дипломатию и церемониальные роли..."
 SWE_king_speak_to_the_nation: "Королевское обращение к нации"
 SWE_king_speak_to_the_nation_desc: "В периоды неопределенности или раздумий на национальном уровне король может обращаться к народу напрямую. Хотя такие речи лишены политической силы, они имеют символическое значение, укрепляя единство, уверенность и преемственность шведского государства."
 SWE_send_to_mandatory_service: "Королевское участие в военной службе"
 SWE_send_to_mandatory_service_desc: "Чтобы укрепить свою связь с нацией и её оборонными силами, члены королевской семьи могут нести военную службу наравне с рядовыми гражданами. Этот акт подчёркивает роль монархии как общего символа долга, смирения и национального единства."
 SWE_training_as_officer: "Королевская подготовка офицеров"
 SWE_training_as_officer_desc: "Selected royals, such as Crown Princess Victoria and Prince Carl Philip, undertake officer training to deepen their understanding of Sweden's military traditions and civil responsibilities. These experiences foster respect among the armed forces and reflect the monarchy's ongoing commitment to national service."
 SWE_science_patronage: "Королевское покровительство науке"
 SWE_science_patronage_desc: "Шведская королевская семья издавна поддерживает образование, исследования и инновации. Оказывая королевское покровительство научным учреждениям, мы можем пробудить общественный интерес, привлечь иностранные таланты и укрепить репутацию Швеции как центра знаний и прогресса."
 SWE_military_review: "Королевский военный обзор"
 SWE_military_review_desc: "Торжественный смотр наших вооружённых сил королевской семьёй укрепляет боевой дух и демонстрирует боеготовность Швеции. Помимо традиций, подобные мероприятия укрепляют единство армии и народа, проецируя уверенность на весь мир."
 SWE_economy_review: "Королевский экономический форум"
 SWE_economy_review_desc: "Hosting a royal-led economic forum signals stability and attracts investment. The Royal Family's symbolic role and international presence can open doors for trade negotiations and partnerships that strengthen our economy."
 SWE_support_nationalist: "Тонкая поддержка национальных ценностей"
 SWE_support_nationalist_desc: "While remaining officially neutral, members of the Royal Family can highlight Sweden's traditions and heritage. Such gestures resonate with nationalist sentiment and bolster pride in our sovereignty."
 SWE_support_Democracy: "Защитник демократических ценностей"
 SWE_support_Democracy_desc: "By emphasizing the monarchy's commitment to democracy and the rule of law, the Royal Family can serve as a symbolic guardian of Sweden's political system, fostering trust both at home and abroad."
 SWE_will_of_the_people: "Воля народа"
 SWE_will_of_the_people_desc: "Поддержка монархии растёт по всей стране, но мы твёрдо придерживаемся демократических ценностей, определяющих современную Швецию. Даже имея возможность восстановить право на власть по воле народа, мы остаёмся первыми среди равных, руководя страной посредством служения, а не господства."
 Sweden_royal.1.t: "Королевское участие в обязательной службе"
 Sweden_royal.1.d: "In accordance with Sweden's conscription system and longstanding royal tradition, a member of the Royal Family is set to commence military service. While the monarchy no longer holds command authority, symbolic acts of shared national duty help reinforce the bond between state, society, and crown.\n\nThis decision will also shape public perception: the choice of royal figure reflects different values leadership, duty, or compassion."
 Sweden_royal.1.o1: "Назначить кронпринцессу Викторию"
 Sweden_royal.1.o1_desc: "Будучи наследницей престола, кронпринцесса Виктория пройдёт базовую подготовку и офицерское образование. Её публичный образ дисциплинированной, социально ответственной и активно действующей на международной арене женщины станет ярким примером королевской службы в наше время."
 Sweden_royal.1.o2: "Назначить принца Карла Филипа"
 Sweden_royal.1.o2_desc: "Принц Карл Филипп, известный своим интересом к военно-морским традициям и инженерному делу, будет служить в вооружённых силах, символизируя боевую преданность и интеграцию молодёжи. Его подготовка также может повысить его авторитет в офицерском корпусе."
 Sweden_royal.2.t: "Начало подготовки королевских офицеров"
 Sweden_royal.2.d: "Following their assignment to mandatory military service, the selected royal family member has now been approved for formal officer training. While their future roles remain ceremonial, the decision reflects Sweden's enduring principle of egalitarian service and the monarchy's commitment to credibility, unity, and national integration."
 Sweden_royal.2.o1: "Кронпринцесса Виктория начинает углубленную подготовку офицеров"
 Sweden_royal.2.o1_desc: "Обучение Виктории будет проходить по специально разработанной программе, включающей лидерство, координацию действий в кризисных ситуациях и гражданско-военное сотрудничество. Её участие широко воспринимается как знак серьёзной подготовки к будущей роли, а не просто символическое присутствие."
 Sweden_royal.2.o2: "Принц Карл Филипп поступает в морское офицерское училище"
 SWE_heavy_industry_modifier: "Наследие шведской тяжёлой промышленности"
 SWE_heavy_industry_modifier_desc: "Forged in the foundries of the 20th century, Sweden's heavy industry remains a cornerstone of national power. From armored vehicles to hydroelectric turbines, our production capacity is reliable, adaptable, and deeply integrated with export markets. Companies like Bofors, Scania, and Volvo AB form the industrial spine of Totalförsvaret, capable of shifting from civilian to military output when the moment demands it.\n\nSteel still flows in Swedish veins."
 SWE_Vattenfall_modifier: "Vattenfall — Энергия Севера"
 SWE_Vattenfall_modifier_desc: "Founded over a century ago and still state-owned, Vattenfall is more than an energy provider it is a strategic asset. Through hydroelectric dominance and growing control over nuclear and district heating systems, Vattenfall ensures Sweden's energy resilience in both peace and conflict. Its grid integration across the Nordic region also makes it a key player in regional energy diplomacy.\n\nWhen others import power, Sweden generates its own."
 SWE_financial_place_modifier: "Северный финансовый центр"
 SWE_financial_place_modifier_desc: "With Stockholm as its beating heart, Sweden has evolved into a financial hub for the Nordic-Baltic region. Institutions like Nordea, SEB, and the Riksbank anchor stable capital flows and modern regulatory systems, while digital banking leads the charge into a cashless economy. Financial resilience is more than numbers it is national security.\n\nSweden's markets may be small by global standards, but they punch above their weight."
 SWE_pharmacy_modifier: "Шведское фармацевтическое превосходство"
 SWE_pharmacy_modifier_desc: "Rooted in research and refined through regulation, Sweden's pharmaceutical industry blends precision science with global reach. Astra, Recipharm, and Sobi anchor a cluster that exports health, develops biologics, and pioneers personalized medicine. With strong university-industry ties and public trust in medicine, the sector stands as a silent sentinel of resilience and prosperity.\n\nHere, molecules become miracles."
 SWE_digital_modifier: "Пионеры цифрового Севера"
 SWE_digital_modifier_desc: "From early broadband infrastructure to world-class tech startups, Sweden's digital journey began before the world noticed. A state-backed push for connectivity, education, and innovation has turned cold silicon into a warm societal fabric. Ericsson, Spotify, and Klarna are only the surface beneath lies a digitally fluent workforce and a state ready to automate, analyze, and act.\n\nIn Sweden, data flows like water."
 SWE_mining_modifier: "Наследие шведской горнодобывающей промышленности"
 SWE_mining_modifier_desc: "Carved from ancient rock and powered by innovation, Sweden's mining sector has long been a pillar of industrial might. Kiruna and Gällivare echo with the rhythm of drills and loaders, while LKAB and Boliden drive sustainable extraction in a world hungry for raw materials. Our ores feed Europe's factories, our methods set global standards. \n\nBeneath the snow lies strength."
 SWE_army_dynamic_modifier: "Вооружённые силы Швеции"
 SWE_army_dynamic_modifier_desc: "Недавние реформы преобразовали шведскую армию в более мобильную, профессиональную и модульную силу, способную как обеспечивать внутреннюю оборону, так и участвовать в международных операциях."
 SWE_Special_forces_modifier: "Элитные подразделения Вооружённых сил"
 SWE_Special_forces_modifier_desc: "Элитные подразделения Швеции, обученные ведению боевых действий в Арктике, городским боям и асимметричным операциям, расширяют стратегический потенциал вооруженных сил и демонстрируют компетентность в зонах конфликтов высокой интенсивности."
 SWE_politics_modifier: "Фрагментированный политический ландшафт"
 SWE_politics_modifier_desc: "Политический ландшафт характеризуется идеологическими сдвигами, нестабильностью коалиций и растущей напряжённостью между реформистами и традиционалистами. Управление в этих условиях требует адаптации и компромисса."
 SWE_monarchy_modifier: "Символ национальной преемственности"
 SWE_monarchy_modifier_desc: "Монархия, хотя и церемониальная, служит объединяющим символом, олицетворяющим историческую легитимность и общественную стабильность. Её существование укрепляет сплочённость в периоды неопределённости."
 SWE_wind_farms: "Ветровые парки"
 SWE_wind_farms_desc: "Поскольку энергия ветра становится всё более жизнеспособным и устойчивым экономическим ресурсом, региональные инвестиции в ветропарки начинают преобразовывать энергетический ландшафт. Хотя этот процесс пока находится на ранней стадии, он обещает со временем повысить энергетическую независимость и снизить воздействие на окружающую среду."
 SWE_mines: "Горнодобывающие операции"
 SWE_mines_desc: "Местные горнодобывающие предприятия возрождаются для добычи ценных природных ресурсов. Эти предприятия обеспечивают важнейшую основу для региональной экономики и промышленного развития."
 SWE_upgraded_mining_equipment: "Современное горное оборудование"
 SWE_upgraded_mining_equipment_desc: "Инвестиции в современную горнодобывающую технику и технологии значительно повысили эффективность и безопасность добычи, увеличив объемы производства и снизив эксплуатационные расходы."
 SWE_science_center: "Региональный научный центр"
 SWE_science_center_desc: "Специализированный научный центр способствует инновациям и технологическим исследованиям, выступая в качестве центра для академических кругов, стартапов и отраслей промышленности, стремящихся разрабатывать передовые решения."
 SWE_energy_link: "Энергетическая инфраструктурная связь"
 SWE_energy_link_desc: "Новые инвестиции в линии электропередачи и трансграничную инфраструктуру укрепляют региональные сети, обеспечивая более стабильные и надежные поставки энергии как для промышленного, так и для гражданского сектора."
 SWE_nuklear_plant: "Атомная электростанция"
 SWE_nuklear_plant_desc: "Строительство атомной электростанции – важный шаг на пути к долгосрочной энергетической безопасности. Требуя тщательного контроля, она обеспечивает большие объёмы электроэнергии с низким уровнем выбросов, что крайне важно для современной экономики."
 SWE_automotive_industrie_expansion: "Расширение автомобильной промышленности"
 SWE_automotive_industrie_expansion_desc: "Отечественный автомобильный сектор переживает стремительный рост: новые предприятия и цепочки поставок увеличивают объемы промышленного производства, занятость и экспортные возможности."
 SWE_regional_tourism_invest: "Развитие регионального туризма"
 SWE_regional_tourism_invest_desc: "Целевые инвестиции в туристическую инфраструктуру направлены на раскрытие экономического потенциала местных культурных, исторических и природных достопримечательностей, способствуя росту сектора услуг и региональному процветанию."
 SWE_Riga_legacy: "Наследие шведской Риги"
 SWE_Riga_legacy_desc: "Историческое влияние Шведской империи в Риге до сих пор ощущается в её учреждениях и инфраструктуре. Это наследие способствует местному развитию и стабильности."
 SWE_southafrica_metals: "Соглашение о стратегических металлах Южной Африки"
 SWE_southafrica_metals_desc: "Благодаря двустороннему соглашению с ЮАР Швеция обеспечила себе надежный доступ к редким и стратегическим металлам, имеющим решающее значение для нашей оборонной и высокотехнологичной промышленности."
 SAF_swe_metals_investment: "Шведские инвестиции в горнодобывающую промышленность"
 SAF_swe_metals_investment_desc: "Swedish investments are boosting South Africa's mining infrastructure, bringing advanced technologies and strengthening industrial output across key strategic sectors."
 SWE_balance_of_power: "Шведский нейтралитет"
 SWE_balance_of_power_desc: "С 1814 года Швеция шла по пути осознанного дистанцирования от блоков великих держав не из-за слабости, а в соответствии со стратегической доктриной неприсоединения. Этот баланс теперь сталкивается с новыми трудностями. Сможет ли Швеция сохранить свой независимый курс в мире, перестраивающемся под влиянием смены власти, или ей придётся выбрать сторону в новом глобальном расколе?"
 SWE_souvereign_neutrality: "Суверенный нейтралитет"
 SWE_souvereign_neutrality_desc: "На протяжении более двух столетий Швеция успешно сохраняла свой суверенитет, не вступая в военные союзы. Эта политика основана на прагматизме и осторожности, выкованных войной и отточенных в мирное время. Даже в XXI веке нейтралитет остаётся определяющим столпом шведской идентичности и самостоятельным молчаливым авторитетом."
 SWE_nato_side: "Западная ориентация"
 SWE_nato_side_desc: "В мире, сотрясаемом агрессивными войнами, киберугрозами и возрождением авторитаризма, Швеция больше не может позволить себе оставаться в одиночестве. Население и руководство страны обращаются к Западу не только за гарантиями безопасности, но и за подтверждением общих ценностей демократии, прозрачности и коллективной обороны. Атлантический путь обеспечивает защиту, но ценой утраты традиционного нейтралитета."
 SWE_russia_side: "Восточная переориентация"
 SWE_russia_side_desc: "Разочарованные упадком Запада, внутренними разногласиями и культурными догмами, некоторые слои шведского населения и элиты начинают обращать взоры на Восток. То, что раньше казалось немыслимым – союз с Москвой, теперь становится радикальным противодействием глобальному либерализму. Для них нейтралитет оказался несостоятельным, и Запад стал той самой угрозой, от которой он когда-то, как утверждалось, защищал."
 SWE_atlantic_alligment: "Атлантическая ориентация"
 SWE_atlantic_alligment_desc: "Растущая часть шведского населения выступает за полную интеграцию в систему западных союзов. В эпоху нестабильности многие считают членство в НАТО и трансатлантическую гарантию безопасности единственным реалистичным путем вперёд, даже ценой отказа от более чем двух столетий нейтралитета."
 SWE_western_preference: "Западная ориентация"
 SWE_western_preference_desc: "Общественное мнение всё больше склоняется к укреплению связей с Западом. Хотя формальная нейтральность сохраняется, растёт желание более тесного сотрудничества с партнёрами по НАТО и ЕС, обусловленное вопросами безопасности, общими демократическими ценностями и глубокой экономической интеграцией."
 SWE_cooperative_neutrality: "Сотрудничающий нейтралитет"
 SWE_cooperative_neutrality_desc: "Значительная часть шведов по-прежнему верит в нейтралитет, но не в изоляцию. Растёт поддержка международного сотрудничества в области миротворчества, разведки и оборонных диалогов, не переходящего черту полноправного членства в альянсе."
 SWE_pragmatic_eastern_opening: "Прагматичное сближение с Востоком"
 SWE_pragmatic_eastern_opening_desc: "Некоторые утверждают, что Швеции следует диверсифицировать свою внешнюю политику и снизить зависимость от западных держав. Они требуют прагматичного взаимодействия с Востоком, особенно с Россией, не из идеологических соображений, а из стремления к региональной стабильности и экономическим возможностям."
 SWE_strategic_balance: "Стратегический баланс"
 SWE_strategic_balance_desc: "Общественные дебаты меняются. По мере роста глобальной напряжённости часть общества призывает к более смелой стратегии баланса, которая не будет ни полностью западной, ни полностью восточной, а будет позиционировать Швецию как суверенного стабилизатора в Балтийском регионе посредством избирательного взаимодействия и дипломатической гибкости."
 SWE_Russian_allignment: "Сближение с Россией"
 SWE_Russian_allignment_desc: "В маргинальных, но всё более растущих кругах Запад воспринимается не как защитник, а как разрушительная сила, разлагающая мораль и враждебная традициям. Эти группы требуют радикальной переориентации на Россию, рассматривая её как оплот против либерального глобализма и партнёра по суверенитету."
 SWE_balance_of_power_category: "Швеция и история ее нейтралитета"
 SWE_balance_of_power_category_desc: "С 1814 года Швеция шла по пути осознанного дистанцирования от блоков великих держав не из-за слабости, а в соответствии со стратегической доктриной неприсоединения. Этот баланс теперь сталкивается с новыми трудностями. Сможет ли Швеция сохранить свой независимый курс в мире, перестраивающемся под влиянием смены власти, или ей придётся выбрать сторону в новом глобальном расколе?"
 SWE_the_price_of_neutrality: "Цена нейтралитета"
 SWE_the_price_of_neutrality_desc: "Sweden has a long and complex history of neutrality, forged through centuries of war and survival. From Gustavus Adolphus in the Thirty Years' War to the 1834 neutrality declaration, and the post-war 'Swedish model' of diplomacy, our distance from alliances kept us safe. But in a changing world, neutrality has a cost and perhaps it's time to consider stepping closer to an official military partnership with the West."
 SWE_ask_the_minister_of_defence_dialog: "Вопрос министру обороны"
 SWE_ask_the_minister_of_defence_dialog_desc: "Министр обороны олицетворяет как институциональную память, так и стратегическое предвидение. Инициируя публичный диалог посредством официальных заявлений и интервью, мы позволяем идее западного выравнивания проникнуть в общественное пространство через авторитет, а не идеологию. Это способствует изменению национального восприятия в сторону долгосрочного альянса."
 SWE_security_information_campain: "Информационная кампания по вопросам безопасности"
 SWE_security_information_campain_desc: "Запуск основанной на фактах кампании об уязвимости шведской обороны и меняющейся обстановке безопасности в Балтийском море позволяет переосмыслить дискуссию. Если когда-то нейтралитет защищал нас, то сегодня он может нас подставить. Осведомлённость общественности становится инструментом для укрепления поддержки более глубокого сотрудничества с западными оборонными структурами."
 SWE_symbolic_campain_to_make_citizens_familiar: "Символическая кампания для повышения понимания гражданами"
 SWE_symbolic_campain_to_make_citizens_familiar_desc: "Тонкие, но сильные символы, такие как совместные учения с НАТО, флаги на посольствах или кампании культурного обмена, могут влиять на общественное мнение. Привычка формирует принятие. Эта символическая кампания напрямую не меняет политику, но эмоционально готовит граждан к возможной ориентации на Запад."
 SWE_the_swedish_way: "Шведский путь"
 SWE_the_swedish_way_desc: "На протяжении поколений «Шведский путь» олицетворял независимость, дипломатию и неприсоединение. Эта инициатива подтверждает нашу приверженность нейтралитету, по крайней мере формально. Однако, поощряя национальное осмысление того, как Швеция обеспечивает мир в XXI веке, мы начинаем формировать образ мышления, который со временем может привести к соответствию западным системам безопасности."
 SWE_what_means_neutrality_to_us: "Что для нас значит нейтралитет?"
 SWE_what_means_neutrality_to_us_desc: "This nationwide discussion campaign is framed as a reaffirmation of Sweden's neutral stance. But by asking what neutrality truly means in today's complex world, we invite strategic reinterpretation. This allows gradual softening of public resistance to potential alliances while maintaining the appearance of continuity."
 SWE_build_up_swedish_think_tank: "Создать шведский мозговой центр"
 SWE_build_up_swedish_think_tank_desc: "Поддерживаемый государством аналитический центр, сосредоточенный на политике нейтралитета, обеспечивает интеллектуальную легитимность для сохранения независимости. Однако его реальная функция — сначала моделировать и анализировать варианты альянсов за закрытыми дверями. Публично поддерживая нейтралитет, он одновременно формирует консенсус элит и формирует политические рамки, которые могут позволить изменить курс, если того потребуют обстоятельства."
 SWE_multipolar_world: "Многополярный мир"
 SWE_multipolar_world_desc: "Эпоха однополярного мира закончилась. Восток, набирающий силу, бросает вызов западному доминированию, и Швеция должна признать эту меняющуюся глобальную архитектуру. Продвигая мировоззрение, основанное на многополярном балансе, мы открываем общественное сознание для более глубоких контактов с не западными державами, особенно с теми, кто отстаивает суверенитет, культурное многообразие и принцип невмешательства."
 SWE_det_andra_europa: "Другая Европа"
 SWE_det_andra_europa_desc: "Существует иная Европа, не формируемая Брюсселем и НАТО, а основанная на традициях, суверенитете и другом историческом опыте. Подчеркивая культурные, религиозные и геополитические связи с Восточной Европой и славянским миром, мы создаём психологическое и идеологическое пространство для переориентации."
 SWE_do_ostkontact: "Инициировать контакт с Востоком"
 SWE_do_ostkontact_desc: "Сохраняя официальную нейтральность, мы инициируем культурные, экономические и академические обмены с Россией и евразийскими государствами. Эти мало заметные связи служат основой для будущих сценариев сближения. Они также показывают внутренним актёрам, что нейтралитет не означает лояльность к Западу."
 SWE_blame_the_arrogant_west: "Критиковать высокомерный Запад"
 SWE_blame_the_arrogant_west_desc: "Общественное недовольство воспринимаемым морализмом Запада, его экономическим доминированием и лицемерием во внешней политике растет. Направляя эти настроения в официальную риторику, мы переосмысливаем нейтралитет не как балансирование между державами, а как отказ от западной высокомерности. Этот сдвиг повышает готовность общества воспринимать восточные альтернативы."
 SWE_Technologie_Exchange_groupe_desc: "Названный в честь Ларса Онсагера, норвежско-американского физико-химика с шведскими корнями и лауреата Нобелевской премии, этот институт способствует трансграничному технологическому сотрудничеству. Его цель — ускорить научное развитие и промышленное инновационное продвижение через структурированный обмен знаниями между странами-партнёрами."
 SWE_four_year_plan_category: "Четырёхлетний план народа"
 SWE_four_year_plan_category_desc: "Монархия упразднена, вместе с ней исчезла иллюзия наследственных привилегий. Теперь начинается истинная трансформация шведского общества под руководством народа и для народа. Четырёхлетний план мобилизует все национальные ресурсы для коллективного прогресса, промышленной независимости, идеологической ясности и международной готовности."
 SWE_increase_the_workforce: "Мобилизация промышленности"
 SWE_increase_the_workforce_desc: "Народ больше не наблюдатель. Все силы должны служить общему благу. Каждый гражданин будет вносить вклад, независимо от прежнего класса, пола или региона."
 SWE_improve_economic_capacity: "Реструктуризация экономики"
 SWE_improve_economic_capacity_desc: "От королевских владений до приватизированных коммунальных предприятий — все стратегические отрасли реструктурируются под общественный контроль. Производство должно служить нации, а не династической роскоши."
 SWE_true_education: "Создать идеологическое образование"
 SWE_true_education_desc: "Монархия искривляла умы молодёжи мифами и послушанием. Новое гражданское образование будет прививать критическое мышление, равенство и верность республике, а не короне."
 SWE_build_partnership: "Создать антиимпериалистические альянсы"
 SWE_build_partnership_desc: "Чтобы противостоять старым державам и глобальным монополиям, Швеция будет формировать альянсы с другими государствами, отвергающими аристократию, экономическую эксплуатацию и внешнее господство."
 SWE_intervention_force: "Создать Народные интервенционные силы"
 SWE_intervention_force_desc: "Мы должны быть готовы защищать республику не только внутри наших границ, но и везде, где угнетают народ. Интервенционные силы будут действовать быстро, решительно и без колебаний."
 philip_mandatory_service: "Принц Филипп проходит обязательную службу"
 madeleine_mandatory_service: "Принцесса Мадлен проходит обязательную службу"
 victoria_mandatory_service: "Принцесса Виктория проходит обязательную службу"
 SWE_neutrality_space_integration_tt: "§Y[SWE.GetNameWithFlag]§! подписал контракт с §Y[SOV.GetNameWithFlag]§! и §Y[CHI.GetNameWithFlag]§! на покупку полезного количества навигационных и связных спутников."
 SWE_whistle_blowers_I: "Ненавидеть информаторов"
 SWE_whistle_blowers_II: "Поддерживать информаторов"
 SWE_Technologie_Exchange_groupe_name: "Институт Онсагера по технологическому обмену"
 Sweden_foci.40.t: "Оценка ВВС: Швеция не готова"
 Sweden_foci.40.d: "Недавняя внутренняя комиссия, возглавляемая старшими офицерами ВВС Швеции, пришла к выводу, что наша нынешняя инфраструктура противовоздушной обороны недостаточна для удовлетворения требований современной войны. Наши существующие системы не способны противостоять высокоскоростным многовекторным угрозам, особенно крылатым ракетам и низколетящим беспилотникам.\n\nВ докладе содержится призыв к немедленным действиям: нам необходимо решить, следует ли расширять наши возможности перехвата на большой дальности, укреплять нашу мобильную оборону ближнего радиуса действия или реструктурировать обе эти сферы более сбалансированным образом."
 Sweden_foci.40.a: "Инвестировать в комплексы ПВО ближнего действия"
 Sweden_foci.40.b: "Развернуть платформы перехвата ракет большой дальности"
 Sweden_foci.40.c: "Отдать приоритет эшелонированной противовоздушной обороне на всех дистанциях"
 Sweden_foci.41.t: "Реструктуризация военных аэропортов"
 Sweden_foci.41.d: "Нынешняя инфраструктура нашей военной авиабазы ​​по-прежнему соответствует доктрине холодной войны, отдавая предпочтение рассредоточенности, а не непрерывным операциям. В свете современных угроз и оперативных потребностей реформа давно назрела. Министерство обороны представило несколько вариантов: от расширения возможностей и модернизации логистики до строительства нового крупного авиабазы ​​в центральной Швеции."
 Sweden_foci.41.a: "Расширить вместимость авиабазы"
 Sweden_foci.41.b: "Построить базу в Вермланде"
 Sweden_foci.41.c: "Модернизировать логистику авиабаз"
 Sweden_foci.42.t: "SAAB представляет Gripen 39E"
 Sweden_foci.42.d: "Шведская оборонная компания SAAB официально представила свой многоцелевой истребитель нового поколения Gripen 39E. Разработанный для экономически эффективного завоевания превосходства в воздухе, нанесения высокоточных ударов и ведения современных сетевых боевых действий, он отличается усовершенствованными системами обнаружения, дальностью полёта и возможностями вооружения.\n\nШвеция предложила экспортировать этот самолёт в нашу страну либо посредством прямой закупки, либо в рамках ограниченного доступа к ключевым технологиям для внутренней разработки."
 Sweden_foci.42.a: "Оформите заказ и укрепите наши военно-воздушные силы."
 Sweden_foci.42.b: "Изучите дизайн и извлеките из него все, что сможете."
 Sweden_foci.44.t: "Швеция запрашивает доступ к ракетам Taurus"
 Sweden_foci.44.d: "Швеция официально запросила разрешение на закупку ограниченного количества крылатых ракет Taurus KEPD 350. Это дальнобойное высокоточное ударное оружие, разработанное совместно Германией и Швецией, использует чувствительные немецкие компоненты и имеет разрешение на экспорт. Шведская делегация настаивает на том, что приобретение укрепит региональную оборону и оперативную совместимость.\n\nМы должны решить, разрешать ли такую ​​передачу."
 Sweden_foci.44.a: "Они уже используют некоторые компоненты, мы одобряем сделку."
 Sweden_foci.44.b: "Мы не разделяем этот уровень возможностей"
 Sweden_foci.43.t: "Приобретение Taurus одобрено"
 Sweden_foci.43.d: "Germany has officially approved our request to acquire the Taurus KEPD 350 missile system. This marks a major step in deepening strategic cooperation and a leap forward in our long-range strike capabilities.\n\nWe can now place an initial order or focus on learning from the missile's advanced design."
 Sweden_foci.43.a: "Оформить заказ на 40 единиц"
 Sweden_foci.43.b: "Изучите проект для внутреннего развития"
 Sweden_foci.45.t: "Экспорт Taurus отклонён"
 Sweden_foci.45.d: "Германия отклонила нашу заявку на закупку крылатых ракет «Таурус», сославшись на экспортные ограничения и внутриполитические проблемы. Это решение, хоть и разочаровывающее, демонстрирует пределы стратегического доверия и вынуждает нас пересмотреть нашу доктрину дальних ударов."
 Sweden_foci.45.a: "Замечен недружественный сигнал"
 Sweden_foci.34.t: "Kockums представляет подводную лодку класса «Блекинге»"
 Sweden_foci.34.d: "Шведская судостроительная компания Kockums представила свою новейшую разработку – подводную лодку класса «Блекинге» (A26). Эта лодка, разработанная для подводных операций нового поколения, отличается усовершенствованной архитектурой малозаметности, модульными отсеками для боевых задач и воздухонезависимой энергетической установкой.\n\nНам сделано официальное предложение об экспорте. Теперь нам предстоит решить, приобретать ли подводные лодки напрямую или создать коммандитное товарищество для доступа к определенным компонентам и технологиям."
 Sweden_foci.34.a: "Оформить заказ на полную систему"
 Sweden_foci.34.b: "Вести переговоры о частичной технологии и интеграции"
 Sweden_foci.341.t: "Доставлены чертежи класса «Блекинге»"
 Sweden_foci.341.d: "После заключения соглашения с Kockums мы получили полную производственную документацию подводной лодки класса «Блекинге». Производство в стране может начаться немедленно, что обеспечит нашему флоту стратегическое преимущество в мелководных операциях и скрытном патрулировании."
 Sweden_foci.341.a: "Отлично, готовьте пусковые шлюзы."
 SWE_more_then_32_corvettes_TT: "имеет больше чем §Y30 корветов§! (сейчас: [?num_ships_with_type@corvette|Y0])"
 SWE_more_then_10_submarines_TT: "имеет больше чем §Y10 ударных подлодок§! (сейчас: [?num_ships_with_type@attack_submarine|Y0])"
 SWE_more_then_400_multi_role_aircraft_TT: "имеет больше чем §Y400 многоцелевых самолётов§! (сейчас: [?num_deployed_planes_with_type@small_plane_strike_airframe|Y0])"
 SWE_more_then_20_awacs_aircraft_TT: "имеет больше чем §Y24 самолёта ДРЛОиУ§! (сейчас: [?num_deployed_planes_with_type@large_plane_awacs_airframe|Y0])"
 SWE_more_then_12_special_bat_in_service_TT: "имеет больше чем §Y5 батальонов спецназа на службе§! (сейчас: [?num_battalions_with_type@Special_Forces|Y0])"
 SWE_more_then_450_MBT_in_service_TT: "имеет больше чем §Y450 танков в запасе§! (сейчас: [?num_equipment_in_armies@medium_tank_chassis|Y0])"
 SWE_more_then_1200_IFV_in_service_TT: "имеет больше чем §Y1200 БМП в резерве§! (сейчас: [?num_equipment_in_armies@medium_tank_flame_chassis|Y0])"
 SWE_stinky_melon: "Был посещён"
 SWE_weapons_depots: "Рассредоточить стратегические склады оружия"
 SWE_weapons_depots_desc: "В соответствии с нашей доктриной тотальной обороны и долгосрочной устойчивости мы должны обеспечить нашим вооружённым силам и будущим силам сопротивления бесперебойный доступ к необходимым ресурсам. \n\nМы начнём незаметно рассредоточивать тайники с оружием, боеприпасами и снаряжением по всей стране, особенно в сельских и лесных районах. Эти скрытые склады станут основой нашей мобилизации резерва и послужат сдерживающим фактором для любого потенциального оккупанта."
 Sweden_news.31.d: "Шведское правительство, невиданное со времён холодной войны, начало открывать по всей стране давно замаскированные оружейные склады. Первоначально созданные в рамках доктрины тотальной обороны, эти склады содержат оружие, боеприпасы и припасы, предназначенные для поддержки резервных сил в случае чрезвычайного положения в стране.\n\nХотя Стокгольм по-прежнему подчёркивает приоритет мира и дипломатии, этот шаг свидетельствует о растущей обеспокоенности ситуацией с региональной безопасностью. Активация складов знаменует собой явный переход от пассивной готовности к активным мерам реагирования."
 Sweden_news.31.t: "Швеция задействует скрытые оружейные склады"
 SWE_modernize_marinen_effort: "Модернизация шведского флота"
 SWE_modernize_marinen_effort_desc: "Sweden's naval forces have long played a critical role in defending our coasts and securing the Baltic Sea. However, emerging maritime threats, long-range strike capabilities, and undersea competition demand a fundamental modernization of the Marinen.\n\nWe will invest in updated surface combatants, submarine technologies, sensor networks, and littoral warfare capabilities. A modern navy is essential not only for national defense, but also for contributing to regional maritime security and protecting vital sea lines of communication."
 SWE_swedish_mio_submarine: "Расширение возможностей шведских подводных лодок"
 SWE_swedish_mio_submarine_desc: "Sweden's submarine fleet has traditionally been optimized for operations in the shallow and narrow waters of the Baltic Sea. However, evolving strategic demands require a shift beyond mere coastal defense.\n\nWe must invest in next-generation designs with extended range, modular payloads, and endurance suitable for global missions from Arctic patrols to expeditionary reconnaissance. A dedicated Military-Industrial Organization (MIO) will allow us to coordinate research, production, and system integration."
 Sweden_foci.46.t: "Переговоры о подлодках с Kockums"
 Sweden_foci.46.d: "В то время как мы движемся к модернизации нашего подводного флота, прибыла делегация из компании Kockums с различными предложениями. Их военно-морские инженеры хорошо подготовлены, и планы масштабируемого заказа уже на столе.\n\nНо есть ещё... нарядный гость в углу, не указанный в расписании. В сопровождении очаровательной секретарши и ещё более очаровательного чемодана он представляет «альтернативные решения» проблем с закупками."
 Sweden_foci.46.a: "Приступить к реализации формального плана с Kockums"
 Sweden_foci.46.b: "Чемодан говорит громче чертежей..."
 Sweden_foci.47.t: "Предложения Kockums по подлодкам переданы"
 Sweden_foci.47.d: "Following Sweden's renewed interest in expanding its underwater capabilities, Kockums has submitted a series of advanced submarine concepts. Sources close to the defense ministry suggest that several designs are being considered ranging from modular stealth patrol boats to deep-sea long-range platforms.\n\nA strategic decision is expected soon, with naval analysts praising Sweden's commitment to modernizing its fleet."
 Sweden_foci.47.a: "Действительно профессионально"
 Sweden_foci.48.t: "Подлодки класса 212 прибыли незаметно"
 Sweden_foci.48.d: "Сегодня утром две новейшие подводные лодки класса 212 немецкого производства тихо перешли из рук в руки в ходе скромной церемонии, на которой присутствовали избранные официальные лица. Как сообщается, эти суда, разработанные компанией ThyssenKrupp Marine Systems, представляют собой «параллельный канал приобретения», минуя длительные официальные тендеры.\n\nХотя некоторые журналисты начали задавать вопросы о сути сделки и лицах, участвующих в ней, правительственные круги, похоже, невозмутимы. Пока, похоже, «чемодан» дал больше, чем обещал."
 Sweden_foci.48.a: "Немецкая эффективность"
 Sweden_news.32.t: "Королевский визит со стратегическими намерениями?"
 Sweden_news.32.d: "Королевская делегация Швеции посещает нашу страну, официально для укрепления дипломатических отношений и выражения доброй воли. Но хотя общественность встречает их приезд с энтузиазмом и теплотой, за кулисами переговоры носят более прагматичный характер.\n\nЭтот визит открывает новые возможности. Их символическая популярность может быть использована в целях публичной дипломатии, а их присутствие может смягчить позиции на текущих переговорах. В то же время наша сторона прекрасно понимает, что одной дружбы недостаточно, и, возможно, пришло время обеспечить, чтобы добрая воля воплощалась в ощутимые стратегические или экономические выгоды."
 Sweden_news.32.a: "Использовать популярность для вовлечения граждан"
 Sweden_news.32.b: "Наша дружба имеет свою цену"
 Sweden_news.33.t: "День настоящей дружбы"
 Sweden_news.33.d: "Королевский визит в Швецию в §Y[FROM.GetNameWithFlag]§! году стал чем-то большим, чем просто церемониальное мероприятие. Несмотря на то, что в программе были государственные банкеты и совместные заявления, по-настоящему важным стал неожиданный общественный резонанс. Члены королевской семьи общались напрямую с нашими гражданами, посещали культурные мероприятия и символически укрепляли связи между нашими народами.\n\n Иногда для дипломатии не нужны сложные соглашения. Иногда достаточно быть увиденным, услышанным и запомненным."
 Sweden_news.33.a: "Это настоящая дружба"
 Sweden_news.34.t: "Сделка за закрытыми дверями"
 Sweden_news.34.d: "Хотя королевская делегация и попала в заголовки газет, настоящий успех визита в §Y[FROM.GetNameWithFlag]§! произошёл вдали от камер. В ходе закрытых встреч первоначальные переговоры зашли в тупик. Прорыв состоялся лишь после того, как представитель шведской промышленности, входивший в официальную свиту, вмешался и предложил создать совместное промышленное предприятие.\n\nСделка, возможно, и не была грандиозной, но она заложила основу для будущего сотрудничества. Иногда дипломатия скрепляется деловой хваткой больше, чем словами."
 Sweden_news.34.a: "Не идеально, но всё же успех"
 Sweden_foci.50.t: "Приглашение в NORDEFCO"
 Sweden_foci.50.d: "Североевропейское оборонное сотрудничество (NORDEFCO) превратилось в важный форум для стратегического согласования и военного взаимодействия в регионе Северной Европы. Недавно мы получили официальное приглашение стать полноправным участником.\n\nХотя это предложение обещает доступ к совместным учениям, логистике и общим закупочным структурам, критики предупреждают, что оно может слишком тесно связать нас с оборонными стратегиями соседних государств и подорвать элементы национального суверенитета. Является ли более тесное сотрудничество со странами Северной Европы шагом вперёд или слишком большим компромиссом?"
 Sweden_foci.50.a: "Мы примем участие в NORDEFCO"
 Sweden_foci.50.b: "Мы не откажемся от нашей независимости"
 Sweden_foci.51.t: "[FROM.GetNameWithFlag] отклоняет членство в NORDEFCO"
 Sweden_foci.51.d: "Несмотря на открытое приглашение и надежды на создание единой североевропейской системы обороны, [FROM.GetName] официально отказался присоединиться к NORDEFCO в качестве полноправного члена. Это решение, представленное как вопрос суверенитета и стратегической автономии, бросило тень на усилия по региональной интеграции.\n\nХотя двери для будущего сотрудничества остаются открытыми, это означает упущенную возможность укрепления коллективного оборонного потенциала на Севере."
 Sweden_foci.51.a: "Прискорбное решение"
 Sweden_foci.52.t: "Основание NORDCAPS"
 Sweden_foci.52.d: "Мы получили приглашение присоединиться к недавно формирующейся системе военного сотрудничества стран Северной Европы и Балтии — NORDCAPS. В условиях меняющегося баланса сил и растущих гибридных угроз региональное единство — уже не роскошь, а необходимость.\n\nЧленство будет означать совместную подготовку, оперативную совместимость, общие стратегии закупок и общую оборонную доктрину для стран Северной Европы и Балтии. Некоторые видят в этом основу подлинно независимой европейской идентичности в сфере безопасности на Севере. Другие предупреждают об утрате стратегической гибкости.\n\nСделаем ли мы шаг вперёд?"
 Sweden_foci.52.a: "В единстве — сила!"
 Sweden_foci.52.b: "Мы идем одни"
 Sweden_foci.53.t: "Они упустили свою возможность"
 Sweden_foci.53.d: "У другой страны был шанс присоединиться к нам в инициативе коллективной обороны — и она упустила его. Пока мы протягивали руку, они колебались, позировали или игнорировали призыв.\n\nВ истории бывают моменты, когда выбор определяет больше, чем политика. Это был один из таких моментов."
 Sweden_foci.53.a: "Придурки"
 Sweden_foci.54.t: "Формирование Nordbanken"
 Sweden_foci.54.d: "Власти Швеции одобрили слияние банков, в результате которого будет создан Nordbanken – крупный финансовый институт с сильным региональным влиянием. Они приглашают нас поддержать это слияние и принять в нём участие. Такое сотрудничество может открыть новые финансовые возможности и укрепить трансграничные инвестиции."
 Sweden_foci.54.a: "Это оживит нашу экономику."
 Sweden_foci.54.b: "Нет, мы откажемся."
 Sweden_foci.55.t: "Шведское предложение о расширении военно-промышленного сотрудничества"
 Sweden_foci.55.d: "Швеция предложила заключить соглашение об углублении нашего сотрудничества в военно-промышленном секторе. Оно включало бы совместные проекты разработки, совместное использование производственных мощностей и координацию закупок для повышения эффективности и расширения возможностей."
 Sweden_foci.55.a: "Согласиться."
 Sweden_foci.55.b: "Сохраняйте производство внутри страны."
 Sweden_foci.56.t: "Приглашение в Шведскую группу обмена технологиями"
 Sweden_foci.56.d: "Швеция пригласила нас присоединиться к недавно созданной группе по обмену технологиями. Эта инициатива направлена ​​на развитие сотрудничества в области передовых исследований, оборонных технологий и промышленных инноваций между надежными партнерами."
 Sweden_foci.56.a: "Подписать соглашение."
 Sweden_foci.56.b: "Отклонить предложение."
 Sweden_foci.57.t: "Запрос на покупку дронов Reaper"
 Sweden_foci.57.d: "Правительство Швеции обратилось к нам с просьбой о приобретении беспилотников MQ-9 Reaper. Они утверждают, что это приобретение значительно усилит их разведывательные и ударные возможности, повысив их способность реагировать на современные угрозы."
 Sweden_foci.57.a: "Продать дроны."
 Sweden_foci.57.b: "Отклонить их просьбу."
 Sweden_royal.13.t: "Предложение о создании Королевского культурного института"
 Sweden_royal.13.d: "Дипломатическая делегация из Швеции прибыла с престижным предложением. Они хотят основать в нашей стране Королевский культурный институт, призванный углубить культурный обмен, укрепить взаимопонимание и двусторонние связи. Институт будет проводить выставки, проводить академические обмены и реализовывать совместные исторические проекты, одновременно став символическим мостом между нашими народами.\n\nТакое учреждение могло бы укрепить наши отношения и создать прочную основу для сотрудничества, однако некоторые в нашей администрации опасаются возможного политического подтекста."
 Sweden_royal.13.a: "Это будет наша взаимная выгода."
 Sweden_royal.13.b: "Ответ - НЕТ."
 SWE_norways_kings: "Короли Норвегии"
 SWE_norways_kings_desc: "Норвежская королевская семья, с её долгой и славной историей, остаётся уважаемым символом единства и традиций Норвегии. Её тесные исторические и семейные связи с нашим королевским домом представляют собой уникальную возможность для укрепления связей между нашими народами. Развивая королевскую дипломатию, организуя совместные культурные мероприятия и координируя публичные мероприятия, мы можем укрепить личные связи между двумя монархиями.\n\nПодобные усилия могли бы укрепить чувство родства между северными странами, углубить доверие между нашими народами и представить миру единый королевский фронт."
 SWE_nb8_member: "Член Северо-Балтийского сотрудничества"
 SWE_small_arms_improve: "Модернизация стрелкового оружия"
 SWE_small_arms_improve_desc: "От лесов Норрланда до улиц Стокгольма наши солдаты должны быть вооружены оружием, достойным современной армии. Совершенствуя конструкцию, производство и распространение нашего стрелкового оружия, мы обеспечим, чтобы шведский солдат оставался символом точности и надёжности."
 SWE_military_review_idea: "Военное обозрение"
 SWE_economy_review_idea: "Экономический обзор"
 SWE_science_patronage_idea: "Патронаж науки"
 SWE_real_kingdom: "Провозгласить Истинное Королевство Швеции"
 SWE_real_kingdom_desc: "The people have spoken, and their will cannot be ignored. By formally proclaiming the Real Kingdom of Sweden, we restore the Crown's traditional place as the central pillar of our nation's identity, while combining it with the stability of modern governance. Carolus Rex stands ready to lead us into a new era."
 SWE_real_equality: "Реальное равенство"
 SWE_ban_islam_modifier: "Запрет ислама"
 SWE_tight_bands: "Дружеские отношения"
 SWE_Swedish_mediation: "Шведская дипломатия"
 Swedisch_monarchy: "Шведская королевская дипломатия"
 SWE_neutral_trade_efforts: "Усилия по обеспечению нейтралитета в торговле"
 SWE_neutral_efforts: "Усилия по обеспечению нейтралитета в торговле"
 SWE_opened_market: "Открыли рынок для нас"
 SWE_anti_nato_minus: "Курс против НАТО"
 SWE_anti_nato_plus: "Курс против НАТО"
 SWE_domestic_independence_TT: "У нас есть как минимум §H75%§! внутренней независимости"
 SWE_over_460GDP_TT: "Общий ВВП составляет более §Y460§! (На данный момент: §Y[?gdp_total|0]§!)"
 SWE_send_to_UN: "Назначить члена королевской семьи в программу ООН"
 SWE_visit_asia: "Дипломатическая миссия на Дальнем Востоке"
 SWE_visit_EU: "Королевский дипломатический тур по Европе"
 SWE_governmental_office: "Стажировка в Риксдаге"
 SWE_trading_net: "Северная торговая сеть"
 SWE_trading_net_desc: "Швеция укрепила свои торговые связи в странах Северной Европы, создав устойчивую экономическую сеть, которая обеспечивает импорт ключевых товаров, стимулирует экспорт и стабилизирует рост."
 SWE_gold_reserve: "Стратегический золотой резерв"
 SWE_gold_reserve_desc: "Расширяя национальные золотые запасы, Швеция укрепляет финансовую независимость и авторитет, обеспечивая защиту от кризисов и внешнего давления."
 SWE_swiss_neutrality: "Нейтралитет по швейцарскому образцу"
 SWE_swiss_neutrality_desc: "Следуя швейцарской практике, Швеция придерживается строгого нейтралитета, поддерживая при этом надежную оборону. Это сохраняет свободу действий и дипломатическую гибкость."
 SWE_neutrality_reintended: "Нейтралитет подтверждён"
 SWE_neutrality_reintended_desc: "Швеция вернется к принципам беспристрастной дипломатии и независимой политики. Подтверждая свою позицию нейтралитета, мы обязуемся не вступать ни в какие союзы или блоки, а защищать свой суверенитет и стремиться к мирным решениям."
 SWE_refuse_all_block_membership: "Отказаться от членства во всех блоках"
 SWE_refuse_all_block_membership_desc: "Швеция останется вне каких-либо военных и политических блоков, сохраняя свободу действий и гарантируя, что наша внешняя политика будет определяться исключительно шведскими интересами."
 SWE_host_international_mediation_summit: "Проведение Международного саммита по посредничеству"
 SWE_host_international_mediation_summit_desc: "Мы пригласим дипломатов, переговорщиков и лидеров со всего мира в Швецию на саммит, направленный на разрешение текущих споров. Это укрепит нашу репутацию надёжного посредника."
 SWE_security_guaraties_for_neutrals: "Гарантии безопасности для нейтральных стран"
 SWE_security_guaraties_for_neutrals_desc: "Предлагая взаимные гарантии обороны другим нейтральным государствам, мы создаем коллективный сдерживающий фактор против агрессии, одновременно укрепляя нашу общую приверженность независимости."
 SWE_non_aligned_trade_network: "Торговая сеть неприсоединившихся"
 SWE_non_aligned_trade_network_desc: "Мы сформируем торговую сеть среди неприсоединившихся стран, гарантируя стабильные экономические связи без политических интриг."
 SWE_emergency_refugees_hub: "Центр экстренной помощи беженцам"
 SWE_emergency_refugees_hub_desc: "Швеция создаст инфраструктуру быстрого реагирования для размещения и обработки беженцев во время кризисов, обеспечивая баланс между гуманитарной ответственностью и национальной безопасностью."
 SWE_international_arbitration_authoritry: "Международный арбитражный орган"
 SWE_international_arbitration_authoritry_desc: "Швеция создаст постоянный арбитражный орган, который будет предлагать правовое разрешение споров между государствами и корпорациями под нейтральным надзором."
 SWE_enshine_Armed_neutrality_in_law: "Закрепить в законе принцип вооруженного нейтралитета"
 SWE_enshine_Armed_neutrality_in_law_desc: "We will make armed neutrality a constitutional principle, ensuring future governments uphold Sweden's independent defence and diplomatic impartiality."
 SWE_total_border_sorvailance: "Тотальный пограничный надзор"
 SWE_total_border_sorvailance_desc: "Благодаря интеграции современных систем мониторинга на всех границах мы защищаем нашу территорию от проникновения, контрабанды и шпионажа."
 SWE_reinforce_gotland_bastion: "Укрепить Готландский бастион"
 SWE_reinforce_gotland_bastion_desc: "Готланд — ключ к безопасности Балтики. Мы расширим его укрепления, противовоздушную оборону и военно-морское присутствие, чтобы сдержать любые враждебные действия."
 SWE_underground_command_center: "Подземный командный центр"
 SWE_underground_command_center_desc: "Мы построим защищенный подземный командный пункт, который позволит национальному руководству функционировать даже во время самых серьезных кризисов."
 SWE_Energy_autarky_program: "Программа энергетической автаркии"
 SWE_Energy_autarky_program_desc: "Диверсифицируя источники энергии и увеличивая внутреннее производство, Швеция может устранить зависимость от иностранных поставок энергии."
 SWE_Arctic_defence_initiative: "Инициатива по защите Арктики"
 SWE_Arctic_defence_initiative_desc: "Мы усилим наше военное присутствие и инфраструктуру в Арктике для защиты наших северных территорий и судоходных путей."
 SWE_national_cyber_defense_grid: "Национальная сеть киберзащиты"
 SWE_national_cyber_defense_grid_desc: "Полностью интегрированная сеть киберзащиты защитит критически важную инфраструктуру и государственные коммуникации от цифрового вторжения."
 SWE_gold_reserve_expansion: "Расширение золотого резерва"
 SWE_gold_reserve_expansion_desc: "Увеличение наших золотых резервов укрепит финансовую стабильность и усилит наш экономический суверенитет в период глобальной неопределенности."
 SWE_banking_secrecy_act: "Закон о банковской тайне"
 SWE_banking_secrecy_act_desc: "Мы введем строгие меры защиты конфиденциальности для банковских клиентов, привлекая иностранные депозиты и одновременно укрепляя наш финансовый нейтралитет."
 SWE_national_militaria_expansion: "Расширение национального военного потенциала"
 SWE_national_militaria_expansion_desc: "Мы расширим наши запасы вооружения, боеприпасов и военной техники, чтобы обеспечить готовность в любой ситуации."
 SWE_universal_conscription_reform: "Реформа всеобщей воинской повинности"
 SWE_universal_conscription_reform_desc: "Мы модернизируем и расширим нашу систему призыва, гарантируя, что каждый гражданин будет обучен и готов защищать страну."
 SWE_armed_financial_neutrality_doctrine: "Доктрина вооружённого финансового нейтралитета"
 SWE_armed_financial_neutrality_doctrine_desc: "Сочетая мощный оборонный потенциал со строгой экономической независимостью, Швеция будет сдерживать как военное, так и финансовое принуждение."
 SWE_declaration_of_perpetual_neutrality: "Декларация о вечном нейтралитете"
 SWE_declaration_of_perpetual_neutrality_desc: "We will formally declare Sweden's perpetual neutrality, committing to avoid wars of aggression while maintaining the strength to defend ourselves."
 SWE_neutrality_without_equal: "Нейтральность без равных"
 SWE_neutrality_without_equal_desc: "Благодаря дипломатии, экономической независимости и военной готовности Швеция станет мировым стандартом действительно независимого и уважаемого нейтрального государства."
 SWE_eastern.01.t: "Приглашение на совместные военные учения"
 SWE_eastern.01.d: "Швеция предложила провести совместные военные учения с Россией для укрепления регионального сотрудничества и повышения готовности.\n"
 SWE_eastern.01.a: "Мы принимаем приглашение"
 Sweden_eastern.01.b: "Мы должны вежливо отказаться."
 Sweden_eastern.101.t: "Россия принимает приглашение"
 Sweden_eastern.101.d: "Россия приняла наше предложение о проведении совместных военных учений. Это позитивный знак военного сотрудничества.\n"
 Sweden_eastern.101.a: "Сила через единство"
 Sweden_eastern.102.t: "Россия отклонила приглашение"
 Sweden_eastern.102.d: "Russia has declined Sweden's invitation to join in military exercises. Diplomatic tensions rise slightly as a result.\n"
 Sweden_eastern.102.a: "Мы понимаем"
 Sweden_eastern.02.t: "Предложение присоединиться к инициативе «Один пояс, один путь»"
 Sweden_eastern.02.d: "Швеция официально пригласила Китай принять участие в Инициативе «Пояс и путь», предлагая совместные инвестиции в инфраструктурные проекты, направленные на укрепление экономических связей Евразии.\n"
 Sweden_eastern.02.a: "Да, Китай вкладывает значительные средства"
 Sweden_eastern.02.b: "Умеренная поддержка"
 Sweden_eastern.02.c: "Мы должны отказаться."
 Sweden_eastern.03.t: "Китай обязуется вложить крупные инвестиции"
 Sweden_eastern.03.d: "China has accepted Sweden's proposition with a significant investment commitment. This has greatly enhanced bilateral economic and political ties.\n"
 Sweden_eastern.03.a: "Во имя нашего совместного процветания"
 Sweden_eastern.04.t: "Китай предлагает умеренные инвестиции"
 Sweden_eastern.04.d: "Китай согласился присоединиться к инициативе на умеренном уровне, продемонстрировав добрую волю и ограниченную приверженность совместным усилиям по развитию инфраструктуры.\n"
 Sweden_eastern.04.a: "Разумное сотрудничество"
 Sweden_eastern.05.t: "Китай отказывается от участия"
 Sweden_eastern.05.d: "Китай отказался участвовать в инициативе «Один пояс, один путь» совместно со Швецией. Хотя это замедляет сотрудничество, дипломатический путь остаётся открытым.\n"
 Sweden_eastern.05.a: "Мы уважаем ваше решение"
 Sweden_eastern.07.t: "Предложение о стратегическом энергетическом договоре"
 Sweden_eastern.07.d: "Швеция предложила заключить стратегическое энергетическое соглашение с Российской Федерацией, направленное на обеспечение долгосрочного сотрудничества в области топлива и инфраструктуры.\n"
 Sweden_eastern.07.a: "Принять предложение и инвестировать"
 Sweden_eastern.07.b: "Мы должны отказаться."
 Sweden_eastern.08.t: "Россия принимает энергетическое соглашение"
 Sweden_eastern.08.d: "Россия приняла энергетическое соглашение. За ним последует совместное развитие инфраструктуры и углубление экономических связей.\n"
 Sweden_eastern.08.a: "Рождение энергетического альянса"
 Sweden_eastern.09.t: "Россия отвергает энергетическое соглашение"
 Sweden_eastern.09.d: "Россия отклонила предложение о стратегическом энергетическом соглашении. Теперь Швеции предстоит рассмотреть других партнёров в сфере энергетики.\n"
 Sweden_eastern.09.a: "Разочаровывающий результат"
 Sweden_eastern.10.t: "Предложение по обмену военными технологиями"
 Sweden_eastern.10.d: "Швеция предлагает совместную программу обмена военными технологиями между SAAB и Народно-освободительной армией Китая, направленную на стимулирование инноваций и стратегической координации.\n"
 Sweden_eastern.10.a: "Принимаем и начинаем сотрудничество"
 Sweden_eastern.10.b: "Мы отклоняем предложение"
 Sweden_eastern.11.t: "Китай принимает технологический обмен"
 Sweden_eastern.11.d: "Китай принял предложение о совместном обмене технологиями. Инженеры SAAB и НОАК начнут совместные исследования.\n"
 Sweden_eastern.11.a: "Замечательно!"
 Sweden_eastern.12.t: "Китай отвергает технологический обмен"
 Sweden_eastern.12.d: "China has rejected Sweden's offer for technological collaboration. This limits Sweden's defense R&D options.\n"
 Sweden_eastern.12.a: "Черт."
 Sweden_eastern.14.t: "Предложение о Минеральном пакте"
 Sweden_eastern.14.d: "Швеция предлагает заключить стратегическое соглашение с Северной Кореей о защите редких минералов и промышленных ресурсов в обмен на экономическое сотрудничество и признание.\n"
 Sweden_eastern.14.a: "Принять пакт о полезных ископаемых"
 Sweden_eastern.14.b: "Отклонить предложение"
 Sweden_eastern.15.t: "Северная Корея принимает соглашение о полезных ископаемых"
 Sweden_eastern.15.d: "Северная Корея приняла предложение. Швеция начнёт импорт ключевых стратегических ресурсов, и уже налажено ограниченное сотрудничество.\n"
 Sweden_eastern.15.a: "Замечательно!"
 Sweden_eastern.16.t: "Северная Корея отказывается от предложения"
 Sweden_eastern.16.d: "North Korea has rejected Sweden's offer for a mineral agreement. This may complicate Sweden's long-term industrial sourcing strategy.\n"
 Sweden_eastern.16.a: "Черт."
 Sweden_eastern.17.t: "Предложение по военно-промышленному обмену"
 Sweden_eastern.17.d: "Швеция предлагает заключить секретное соглашение с Северной Кореей об обмене опытом и оборудованием в военной промышленности. Это сотрудничество может повысить производительность обеих сторон, хотя и чревато международной негативной реакцией.\n"
 Sweden_eastern.17.a: "Согласен на обмен"
 Sweden_eastern.17.b: "Мы не можем рисковать этим."
 Sweden_eastern.18.t: "Северная Корея принимает промышленное соглашение"
 Sweden_eastern.18.d: "Северная Корея согласилась на соглашение о промышленном сотрудничестве. В настоящее время ведется совместное развитие военной промышленности.\n"
 Sweden_eastern.18.a: "Неожиданный союз"
 Sweden_eastern.19.t: "Северная Корея отклоняет предложение"
 Sweden_eastern.19.d: "Северная Корея отклонила промышленное соглашение. Швеции необходимо искать другие способы расширения своего военного производства.\n"
 Sweden_eastern.19.a: "Упущенная возможность"
 Sweden_eastern.20.t: "Шведское предложение о строительстве Арктической торговой железной дороги"
 Sweden_eastern.20.d: "Шведское правительство предложило вложиться в совместный инфраструктурный проект — высокоскоростную железную дорогу между Стокгольмом и Мурманском. Эта линия должна улучшить торговлю и логистику между нашими странами через арктический коридор.\n"
 Sweden_eastern.20.a: "Поезда для победы"
 Sweden_eastern.21.t: "Предложение об инвестиционном соглашении со Швецией"
 Sweden_eastern.21.d: "Швеция предложила Венесуэле заключить двустороннее инвестиционное соглашение. В обмен на венесуэльскую нефть Швеция будет инвестировать в венесуэльскую инфраструктуру и передовые технологии.\n"
 Sweden_eastern.21.a: "Принять соглашение"
 Sweden_eastern.21.b: "Мы должны отказаться"
 Sweden_eastern.22.t: "Венесуэла принимает инвестиционное соглашение"
 Sweden_eastern.22.d: "Венесуэла согласилась на инвестиционное соглашение. Швеция получит нефть, а Венесуэла выиграет от шведских знаний и инвестиций в инфраструктуру.\n"
 Sweden_eastern.22.a: "Отличное сотрудничество"
 Sweden_eastern.23.t: "Венесуэла отвергает инвестиционное соглашение"
 Sweden_eastern.23.d: "Venezuela has rejected Sweden's proposal for a mutual investment agreement. Diplomatic and energy cooperation will not proceed.\n"
 Sweden_eastern.23.a: "Черт."
 Sweden_eastern.24.t: "Предложение о сотрудничестве в области добычи нефти на шельфе"
 Sweden_eastern.24.d: "Швеция предложила совместную инициативу с Анголой по разработке морских нефтяных платформ вдоль Атлантического побережья. Это партнёрство обеспечит поставки энергии и укрепит добывающую инфраструктуру Анголы.\n"
 Sweden_eastern.24.a: "Принять совместное предприятие"
 Sweden_eastern.24.b: "Отклонить это предложение."
 Sweden_eastern.25.t: "Ангола принимает соглашение о добыче нефти на шельфе"
 Sweden_eastern.25.d: "Ангола приняла предложение. Швеция будет инвестировать в совместную разработку морских платформ, расширяя доступ к ценным нефтяным запасам.\n"
 Sweden_eastern.25.a: "Ценное партнерство"
 Sweden_eastern.26.t: "Ангола отклоняет предложение"
 Sweden_eastern.26.d: "Angola has declined Sweden's offer for joint offshore development. Diplomatic channels remain open, but cooperation will not proceed.\n"
 Sweden_eastern.26.a: "Черт."
 Sweden_eastern.27.t: "Предложение о соглашении по стратегическим металлам"
 Sweden_eastern.27.d: "Sweden has proposed a bilateral agreement to secure access to South Africa's rare and strategic metals. In return, Sweden will invest in mining technologies and industrial capacity.\n"
 Sweden_eastern.27.a: "Принять предложение"
 Sweden_eastern.27.b: "Отклонить предложение"
 Sweden_eastern.28.t: "Южная Африка принимает соглашение по металлам"
 Sweden_eastern.28.d: "Южная Африка согласилась на двустороннее соглашение. Швеция получает гарантированный доступ к редким металлам, а Южная Африка получает выгоду от технологических инвестиций и сотрудничества в горнодобывающей промышленности.\n"
 Sweden_eastern.28.a: "Ценное партнерство"
 Sweden_eastern.29.t: "Южная Африка отвергает соглашение"
 Sweden_eastern.29.d: "Южная Африка отклонила предложенное соглашение о торговле металлами. Швеции придётся искать других партнёров для удовлетворения своих потребностей в ресурсах.\n"
 Sweden_eastern.29.a: "That's unfortunate"
 Sweden_eastern.30.t: "Предложение о медицинском обмене со Швецией"
 Sweden_eastern.30.d: "Швеция предложила соглашение о медицинском сотрудничестве: Куба предоставит своих врачей и мировой опыт в области здравоохранения, а Швеция предоставит исследования, оборудование и биотехнологическую экспертизу.\n"
 Sweden_eastern.30.a: "Принять медицинский обмен"
 Sweden_eastern.30.b: "Отклонить предложение."
 Sweden_eastern.31.t: "Куба принимает медицинский обмен."
 Sweden_eastern.31.d: "Куба приняла соглашение о сотрудничестве в области медицины. Теперь начнутся совместные медицинские миссии и программы обмена научными исследованиями.\n"
 Sweden_eastern.31.a: "Для глобального здравоохранения"
 Sweden_eastern.32.t: "Куба отклоняет медицинский обмен"
 Sweden_eastern.32.d: "Куба отклонила предложение о медицинском сотрудничестве. Дипломатическое взаимодействие в сфере здравоохранения не будет продолжено.\n"
 Sweden_eastern.32.a: "Упущенная возможность"
 Sweden_eastern.33.t: "Предложение о шведско-иранском нефтехимическом соглашении"
 Sweden_eastern.33.d: "Правительство Швеции представило официальное предложение Министерству нефти Ирана. Соглашение предусматривает совместные инвестиции в нефтеперерабатывающую инфраструктуру, морские объекты и глубокую нефтехимическую переработку. Швеция стремится к стабильным поставкам нефтяных ресурсов, в то время как Иран получит выгоду от шведского промышленного опыта, оборудования и иностранного капитала.\n\nЕсли соглашение будет принято, оно может заложить основу для долгосрочного стратегического энергетического партнерства."
 Sweden_eastern.33.a: "Принять нефтехимическое соглашение"
 Sweden_eastern.33.b: "Отклонить предложение"
 Sweden_eastern.34.t: "Иран принимает нефтехимическое соглашение"
 Sweden_eastern.34.d: "Иран одобрил предлагаемое соглашение со Швецией. Совместные предприятия начнут разработку и модернизацию нефтеперерабатывающих комплексов, а также расширение промышленного химического производства. Шведские инжиниринговые компании готовятся выйти на иранский рынок, что ознаменует новую главу в двусторонних экономических отношениях.\n"
 Sweden_eastern.34.a: "Запуск партнерства"
 Sweden_eastern.35.t: "Иран отвергает нефтехимическое соглашение"
 Sweden_eastern.35.d: "Iran has declined Sweden's offer to form a petrochemical partnership. Although diplomatic channels remain open, the opportunity for joint energy development has been postponed indefinitely.\n"
 Sweden_eastern.35.a: "К сожалению, но понятно."
 Sweden_eastern.36.t: "Предложение по обмену технологиями беспилотных летательных аппаратов"
 Sweden_eastern.36.d: "Швеция предложила Ирану заключить двустороннее технологическое соглашение. В обмен на доступ к конструкциям боевых беспилотников и эксплуатационным данным Швеция предоставит Ирану передовые аэрокосмические системы и системы радиоэлектронной борьбы SAAB.\n\nОбе страны получат выгоду от перекрестного опыления проверенных в боевых условиях и высокотехнологичных систем БПЛА."
 Sweden_eastern.36.a: "Согласиться на обмен технологиями"
 Sweden_eastern.36.b: "Отклонить предложение"
 Sweden_eastern.37.t: "Иран принимает соглашение о беспилотниках"
 Sweden_eastern.37.d: "Иран одобрил двустороннее соглашение о технологиях беспилотных летательных аппаратов. Теперь шведские и иранские компании и военные начнут сотрудничество в области разработки и обучения БПЛА.\n"
 Sweden_eastern.37.a: "Начать совместную программу"
 Sweden_eastern.38.t: "Иран отвергает договор о беспилотниках"
 Sweden_eastern.38.d: "Iran has declined Sweden's offer for a joint drone research and development accord. The initiative has been shelved for now.\n"
 Sweden_eastern.38.a: "Черт."
 SWE_towards_communism: "Движение к социализму"
 SWE_towards_communism_desc: "Чтобы полностью устранить несправедливость в обществе, мы должны перейти к социалистической экономике, где рабочий класс контролирует средства производства. Перераспределяя богатство, расширяя права и возможности трудящихся и устраняя классовое неравенство, мы можем построить более равноправное и справедливое общество."
 SWE_industry_exchange_swe_desc: "Северная Корея получила инструменты и исследовательские материалы в рамках тайной сделки со Швецией, что позволило ей повысить производительность."
 Sweden_news.31.a: "это наше последнее средство"
 SWE_swedish_startup_funds: "Шведские стартап-инвестиционные фонды"
 SWE_swedish_startup_funds_desc: "Для стимулирования инноваций мы создадим национальные фонды для поддержки новых стартапов и развития предпринимательства."
 philip_officer_training: "Принц Филипп на офицерской подготовке"
 victoria_officer_training: "Принцесса Виктория на офицерской подготовке"
 SWE_c_green_centrist_identity_desc: "Мы формируем новую политическую идентичность — зеленую, рыночно ориентированную, основанную на гуманизме и прагматизме."
 SWE_allow_crypto_tt: "Разрешение считать §Yкриптовалюту§! законным платежным средством и действительным инвестиционным механизмом может вызывать ежемесячные взлеты и падения. Каждый месяц вы будете либо §Gполучать§! крупную сумму денег, либо §Rтерять§! крупную сумму денег.\n\n"
 Sweden_foci.70.t: "Наши цели военного сотрудничества были успешно достигнуты."
 Sweden_foci.70.d: "Наши усилия окупились, и мы сделали еще один большой шаг вперед на пути к миру во всем мире."
 Sweden_foci.70.b: "Сегодня у нас хороший день."
 Sweden_foci.71.t: "Наши намерения по военному сотрудничеству были сорваны."
 Sweden_foci.71.d: "Несмотря на то, что мы приложили немало усилий, наш бизнес постоянно сталкивается с неудачами, но мы уверены, что сможем продолжать двигаться вперед."
 Sweden_foci.71.b: "Не волнуйтесь, однажды у нас еще будет шанс."
 Sweden.29.t: "Программа Висбю"
 Sweden.29.d: "Программа, запущенная в конце 90-х годов, «Ytstridsfartyg - 2000», завершена. Платформа, современный корвет-«невидимка» под названием «Тип Висбю».\nПлатформа оснащена 1 морским орудием Bofors 57mm Mk3, 8 противокорабельными ракетами RBS15 Mk2, 4 торпедными аппаратами 40 см, зенитными ракетами CAMM, 12,7-см противолодочными гранатометами. Помимо этого оружия, «Висбю» также имеет вертолетную площадку и систему активной защиты Softkill.\nСовременный и изящный корвет водоизмещением 640 тонн. Способен развивать скорость до 35 узлов и преодолевать более 2500 морских миль."
 Sweden.29.o1: "Отлично"
