 Sweden_foci.5003.d2: "Россия отклонила предложение Швеции о покупке вертолётов Ми-26, ссылаясь на геополитические последствия и стратегические приоритеты."
 Sweden_foci.5003.d3: "Франция отклонила заявку Швеции на приобретение вертолетов AS532 Cougar, сосредоточившись на собственных оборонных потребностях и экспортной политике."
 Sweden_foci.5003.o1: "Скажи Paradox заблокировать их страну по геолокации"
 Sweden_foci.6.t: "Расширение подводного флота Швеции"
 Sweden_foci.6.d: "Для укрепления военно-морского потенциала и обеспечения защиты своих морских интересов Швеция рассматривает возможность расширения своего подводного флота. У нас есть несколько вариантов: закупить современные подводные лодки у иностранных союзников или разработать собственную конструкцию."
 Sweden_foci.6.o1: "Закупить подводные лодки типа 212 у Германии"
 Sweden_foci.6.o2: "Закупить подводные лодки класса «Лада» у России"
 Sweden_foci.6.o3: "Закупить подлодки класса Seawolf у США"
 Sweden_foci.6.o4: "Разработать собственный проект подводной лодки"
 Sweden_foci.6001.t: "Запрос Швеции на закупку подводных лодок"
 Sweden_foci.6001.d1: "Правительство Швеции подало официальную заявку на закупку подводных лодок типа 212 у Германии. Удовлетворение этой заявки может способствовать укреплению двусторонних оборонных отношений и укреплению региональной безопасности."
 Sweden_foci.6001.d2: "Правительство Швеции подало официальную заявку на закупку подводных лодок проекта «Лада» у России. Одобрение этой заявки может открыть возможности для военного сотрудничества и повлиять на будущие отношения."
 Sweden_foci.6001.d3: "Правительство Швеции официально запросило у США разрешение на закупку подводных лодок класса «Сивулф». Одобрение этого запроса может укрепить оборонные связи и повысить оперативную совместимость наших флотов."
 Sweden_foci.6001.o1: "Отклонить запрос Швеции"
 Sweden_foci.6001.o2: "Одобрить запрос Швеции"
 Sweden_foci.6002.t: "Одобрение запроса Швеции на закупку подводных лодок"
 Sweden_foci.6002.d1: "Германия одобрила заявку Швеции на закупку подводных лодок типа 212. Это решение знаменует собой важный шаг в военном сотрудничестве между двумя странами и усилит военно-морской потенциал Швеции."
 Sweden_foci.6002.d2: "Россия приняла предложение Швеции о покупке подводных лодок проекта «Лада», что открывает новые возможности для военного сотрудничества и укрепляет подводный флот Швеции."
 Sweden_foci.6002.d3: "США одобрили заявку Швеции на закупку подводных лодок класса «Сивулф». Это решение укрепляет оборонные связи и значительно расширяет возможности Швеции в области подводной войны."
 Sweden_foci.6002.o1: "Приступить к планам по закупке и интеграции"
 Sweden_foci.6003.t: "Отклонение запроса Швеции на закупку подводных лодок"
 Sweden_foci.6003.d1: "Германия отклонила заявку Швеции на закупку подводных лодок типа 212, сославшись на стратегические соображения и существующие обязательства. Это решение может повлиять на будущее оборонное сотрудничество."
 Sweden_foci.6003.d2: "Россия отклонила предложение Швеции о покупке подводных лодок проекта «Лада», указав на геополитические последствия и стратегические приоритеты. Этот отказ — упущенная возможность для расширения военного сотрудничества."
 Sweden_foci.6003.d3: "Соединенные Штаты отклонили запрос Швеции на закупку подводных лодок класса «Сивулф», сосредоточившись на собственных оборонных потребностях и экспортной политике. Это решение может повлиять на будущие дипломатические отношения."
 Sweden_foci.6003.o1: "На следующем государственном визите мы подадим Сюрстрёмминг"
 Sweden_foci.6004.t: "Церемония введения в строй новых подводных лодок Швеции"
 Sweden_foci.6004.d1: "На официальной церемонии, прошедшей в Стокгольме, наши недавно приобретённые подводные лодки типа 212 были официально введены в состав ВМС Швеции. В мероприятии приняли участие многочисленные представители Германии, что подчеркнуло укрепление связей между нашими странами и подготовило почву для будущего сотрудничества."
 Sweden_foci.6004.d2: "На официальной церемонии, прошедшей в Стокгольме, наши недавно приобретённые подводные лодки класса Лада были официально введены в состав ВМС Швеции. Присутствие российских делегатов подчеркнуло растущее оборонное сотрудничество между нашими странами, что может благоприятно сказаться на будущих отношениях."
 Sweden_foci.6004.d3: "На торжественной церемонии в Стокгольме состоялось официальное принятие на вооружение ВМС Швеции недавно приобретенных подводных лодок класса «Сивульф». Мероприятие, на котором присутствовали высокопоставленные представители Соединенных Штатов, подчеркнуло углубление партнерства в сфере обороны и его позитивное влияние на наши будущие отношения."
 Sweden_foci.6004.d4: "Для нашей страны это знаменательный момент: на церемонии в Стокгольме состоялось официальное принятие на вооружение подводных лодок шведской разработки. Это достижение не только укрепляет наши военно-морские возможности, но и демонстрирует нашу приверженность самодостаточности и инновациям в оборонных технологиях."
 Sweden_foci.6004.o1: "Отметьте эту важную веху в развитии военно-морского флота!"
 Sweden_foci.7.t: "Расширение флота корветов ВМС Швеции"
 Sweden_foci.7.d: "Для укрепления наших военно-морских возможностей и обеспечения обороны наших территориальных вод Швеция рассматривает возможность приобретения дополнительных корветов. У нас есть несколько вариантов: закупка современных корветов у иностранных союзников или разработка собственной конструкции."
 Sweden_foci.7.o1: "Закупить корветы MEKO A-100 у Германии"
 Sweden_foci.7.o2: "Закупить корветы класса «Тарантул» у России"
 Sweden_foci.7.o3: "Закупить корветы класса «Хамина» у Финляндии"
 Sweden_foci.7001.t: "Швеция запрашивает покупку корветов"
 Sweden_foci.7001.d1: "Правительство Швеции официально обратилось к Германии с просьбой о закупке корветов MEKO A-100. Одобрение этой просьбы может укрепить двусторонние отношения в сфере обороны и способствовать региональной безопасности."
 Sweden_foci.7001.d2: "Правительство Швеции официально запросило у России корветы класса «Тарантул». Одобрение этого запроса может открыть возможности для военного сотрудничества и повлиять на будущие отношения."
 Sweden_foci.7001.d3: "Правительство Швеции подало официальную заявку на закупку корветов класса «Хамина» у Финляндии. Удовлетворение этой заявки могло бы укрепить оборонные связи и повысить оперативную совместимость наших флотов."
