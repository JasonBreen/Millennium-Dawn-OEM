 CPD_demanding_annexation_of_state_TT: "Аннексия этого государства является §Gтребованием§! [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, это государство будет аннексировано в нашу нацию, и мы станем новым владельцем."
 CPD_demanding_puppeting_in_state_TT: "Создание марионетки в этом государстве является §Gтребованием§! [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, это государство окажется под контролем нового марионеточного правительства."
 CPD_demanding_demilitarisation_of_state_TT: "Демилитаризация этого региона является §G требованием §! [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, в этом регионе больше не смогут действовать никакие вооруженные силы."
 CPD_demanding_liberation_of_state_TT: "Освобождение этого региона это §G требование §! [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, этот регион будет возвращен стране, являющейся его законным владельцем, в качестве независимого государства."
 CPD_conceding_annexation_of_state_TT: "Аннексия этого региона это §R уступка §! со стороны [ROOT.GetNameWithFlag]. Если мирное соглашение будет заключёно, этот регион будет присоединён к стране противника."
 CPD_conceding_puppeting_in_state_TT: "Создание марионетки в этом регионе это §R уступка §! со стороны [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, этот регион перейдёт под управление марионеточного правительства, подчиняющегося врагу."
 CPD_conceding_demilitarisation_of_state_TT: "Демилитаризация этого региона это §R уступка §! со стороны [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, в этом регионе больше не смогут действовать никакие вооруженные силы."
 CPD_conceding_liberation_of_state_TT: "Освобождение этого региона это §R уступка §! со стороны [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, этот регион будет возвращен стране, являющейся его законным владельцем, в качестве независимого государства."
