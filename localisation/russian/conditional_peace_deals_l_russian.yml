 CPD_REGIME_CHANGE_BTN: "Смена режима"
 CPD_MIL_BASING_BTN: "Создать военную базу"
 CPD_FULL_PUPPET_BTN: "Полная марионетка"
 CPD_resource_rights_button_TT: "§Y Права на ресурсы §!"
 CPD_resource_rights_button_TT_DELAYED: "Наши §YПрава на ресурсы§! в выбранных регионах обеспечивают нам доступ к ресурсам региона. Сами регионы остаются под контролем их нынешнего владельца; только нефть, сталь, алюминий, резина, вольфрам и хром, которые находятся в регионе, поступают в нашу экономику. Соглашение остается в силе до тех пор, пока не будет отменено другим мирным соглашением."
 CPD_military_basing_button_TT: "§YСоздание военных баз§!"
 CPD_military_basing_button_TT_DELAYED: "§YСоздание военных баз§! на территории этой страны предоставляет нам свободный проход наших войск через их территорию. Наши войска могут свободно передвигаться и базироваться, до тех пор пока не будет отозван доступ."
 CPD_full_puppet_button_TT: "§YУстановление марионеточного государства§!"
 CPD_full_puppet_button_TT_DELAYED: "Требование §YУстановления марионеточного государства§! превращает страну в нашу марионетку. Они сохраняют за собой территории и население, но теряют независимость во внешней политике; их экономика, людские ресурсы и вооружённые силы подчиняются нам. Любые требования установления марионеточного государства, которые уже включены в эту сделку, учтены."
 CPD_ceasefire_button_TT: "§Y Прекращение огня §!"
 CPD_ceasefire_button_TT_DELAYED: "§Y Прекращение огня §! заканчивает войну по текущии линии фронта. Обе стороны сохраняют за собой контролируемые ими регионы, не зависимо от того, кто раньше ими владел. Перемирие действует в течение §Y 720 дней §! прежде чем одна из сторон сможет снова объявить войну другой.\n\n Соглашение о прекращении огня не может сочетаться с территориальными требованиями. Активация прекращения огня удаляет все пункты, связанные с регионами, из текущего предложения."
 CPD_war_reparations_button_TT: "§Y Военные репарации §!"
 CPD_war_reparations_button_TT_DELAYED: "Выплата §Y военных репараций §! обязывает проигравшую сторону еженедельно платить часть своего ВВП в течение года. Перечисление средств отражается как новый расход в бюджете плательщика и как новый доход в бюджете получателя.\n\n[CPD_reparations_preview]"
 CPD_reparations_preview_TT: "Прогнозируемый перевод денежных средств по этому соглашению: §Y £[?CPD_rep_preview_temp|.2] млрд в неделю §! (~§Y £[?CPD_rep_preview_total_temp|.0] млрд §! за год)"
 CPD_forced_neutrality_button_TT: "§Y Принудительный нейтралитет §!"
 CPD_forced_neutrality_button_TT_DELAYED: "§Y Принудительный нейтралитет §! выводит эту страну из её альянса при подписании и запрещает ей вступать в другие или создавать их в течение §Y пяти лет §!."
 CPD_regime_change_button_TT: "§Y Смена режима §!"
 CPD_regime_change_button_TT_DELAYED: "§Y Смена режима §! заменяет правящую партию цели на ту, которая в данный момент находится у власти в нашей стране. Их коалиция распускается, и устанавливается лидер наших политических взглядов. Новое правительство получает §Y послевоенную нестабильность §! на два года, а в исламских государствах может возникнуть §Y салафитское сопротивление §! против навязанного извне правления."
 additional_income_war_reparations_tt: "$$[?CPD_reparations_weekly|+3] от §Y Военных репараций §!\n"
 additional_expense_war_reparations_tt: "$$[?CPD_reparations_weekly|-3] от §Y Военных репараций §!\n"
 CPD_war_reparations_payer: "Военные репарации (Выплата)"
 CPD_war_reparations_payer_desc: "В результате мирного соглашения мы выплачиваем военные репарации. Еженедельный денежный перевод отображается как дополнительный расход в нашем бюджете в течение §Y 1 года §!."
 CPD_war_reparations_receiver: "Военные репарации (Получение)"
 CPD_war_reparations_receiver_desc: "В результате мирного соглашения мы получаем военные репарации. Еженедельный денежный перевод отображается как дополнительный доход в нашем бюджете в течение §Y 1 года §!."
 CPD_forced_neutrality_spirit: "Принудительный нейтралитет"
 CPD_forced_neutrality_spirit_desc: "По условиям мирного соглашения нашей стране запрещено вступать в военные альянсы или создавать их."
 CPD_regime_change_instability: "Послевоенная политическая нестабильность"
 CPD_regime_change_instability_desc: "Принудительная смена режима дестабилизировала нашу политическую систему."
 CPD_liberate_in_state_button_TT: "[CPD_LIBERATE_TT_LOC]"
 CPD_liberate_in_state_button_TT_DELAYED: "[CPD_LIBERATE_TT_DELAYED_LOC]"
 CPD_liberate_in_state_button_TT_DEMAND: "Освободить регионы"
 CPD_liberate_in_state_button_TT_CONCESSION: "Гарантировать независимость"
 CPD_liberate_in_state_button_TT_DELAYED_DEMAND: "Требование §Y освобождения §! возвращает выбранные регионы той стране, которая законно претендует на них. Всё ещё существующая страна с национальными правами получает территорию напрямую; давно исчезнувшая – возрождается для её получения. Если же стран с национальными правами не осталось, из того, что осталось от нынешнего владельца, создаётся новое отколовшееся государство."
 CPD_liberate_in_state_button_TT_DELAYED_CONCESSION: "Уступка §Y независимости §! освобождает выбранные удерживаемые нами регионы в пользу их законного претендента, независимо от того, существует ли ещё эта страна или её нужно возродить из истории."
