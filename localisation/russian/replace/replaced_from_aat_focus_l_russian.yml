l_russian:
 SWE_education_reform_desc: "Наша система образования устарела и неэффективна, нам следует внедрять современные, гораздо более действенные методы, включающие использование интернета и компьютеров."
 FIN_greater_finland_desc: "Возвращение наших границ наконец-то станет реальностью. Унижение от потери нашей территории никогда не будет забыто, но за него ОБЯЗАТЕЛЬНО будет отомщено."
 SWE_education_reform: "Реформа образования"