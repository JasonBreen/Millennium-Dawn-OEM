l_russian:
 PER_iran_first: "Иран прежде всего"
 AFG_graveyard_of_empires: "Кладбище империй"
 PER_iran_first_desc: "Несмотря на наличие региональных и международных союзников, в вопросах благополучия нашего народа мы должны в первую очередь уделять внимание Ирану. Необходимо выделять средства на развитие местной промышленности."
 AFG_graveyard_of_empires_desc: "Империи приходят и уходят, но наш народ остается бесспорным хозяином этого региона. Пока наш народ остается единым и связанным со своим наследием, любой агрессор найдет [AFG.GetNameWithFlag] настоящим кладбищем для себя."