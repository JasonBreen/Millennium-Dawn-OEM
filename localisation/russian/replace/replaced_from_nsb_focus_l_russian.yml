l_russian:
 SOV_proclaim_soviet_hegemony: "Провозгласить советскую гегемонию"
 EST_new_economic_policy_desc: "После восстановления независимости нам удалось позиционировать себя как связующее звено между Востоком и Западом, проводить экономические реформы и интегрироваться с Западом. Тем не менее, нам необходимо разработать новую политику, более соответствующую интересам наших зарубежных партнеров, более выгодную и методичную политику."
 SOV_proclaim_soviet_hegemony_desc: "Восстановив экономику и мобилизовав массы, Россия готова вернуть себе ведущую роль. Мы будем открыто утверждать советское превосходство, смещая баланс сил на восток и оказывая давление на европейские государства, чтобы они осознали последствия нашего возвращения."
 SOV_the_third_rome_desc: "Москва, Третий Рим, — это идея о том, что Москва является преемницей Древнего Рима и Византии, продолжая наследие Римской империи. Эта концепция обсуждалась на протяжении всей европейской истории, определяя, какой город по праву наследует это наследие."
 polish_focus: "Дерево фокусов Польши"
 SOV_socialist_humanism_desc: "Социализм — это не только фабрики и квоты, но и достоинство рабочего. Мы поставим благополучие человека в центр революции, доказав, что коммунистический путь служит народу, а не наоборот."
 SOV_socialist_humanism: "Социалистический гуманизм"
 SOV_the_third_rome: "Третий Рим"
 king: "Предыстория: Королевская семья"