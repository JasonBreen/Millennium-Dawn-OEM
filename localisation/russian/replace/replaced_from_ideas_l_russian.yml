l_russian:
 nationalism_desc: "Националистически настроенные правительства считают, что им досталась невыгодная участь в условиях глобализации, и стремятся к национальному возрождению, основанному на протекционизме, милитаризации и национальном и этническом суверенитете. Они ненавидят глобальные либеральные институты, но могут оставаться прагматичными в своих международных связях для достижения своих внутренних или экспансионистских целей."
 aircraft_manufacturer: "Компания по противовоздушной обороне"
