 CHE_Bloodied_But_Unbroken: "The New Siege of Grozny"
 CHE_Bloodied_But_Unbroken_desc: "The outskirts of Grozny have fallen as the Russian encirclement tightens. Yet this is not a defeat, as Chechen fighters respond with a wave of counterattacks, breaking through near Alkhan-Kala while Russian public support wanes under rising casualties. From a bunker in central Grozny, commanders plan a counteroffensive to retake Shali, Argun, and Gudermes, aiming to reopen a supply route to the capital. If [SOV.GetLeader] believes victory will come easily, he is gravely mistaken."
 CHE_Rally_around_the_Fighters: "Rally Around the Fighters"
 CHE_Rally_around_the_Fighters_desc: "The pens have been traded in for bullets, as the concept of peaceful coexistence seems untenable. From the cradles to the graves, every man should serve Allah to protect Chechnya at any cost, turning the battlefields into meat grinders, the cities into slaughterhouses, and the war into one of total sacrifice. Fields will run red as the double-headed eagle forgoes its own demise."
 CHE_The_London_Government: "Converge the London Government"
 CHE_The_London_Government_desc: "Since Akhmed Zakayev and his immediate family reside permanently in the United Kingdom, he continues to serve as foreign minister from abroad. Operating from London, Zakayev acts as a stabilising figure against internal Islamist conspiracies, allowing the administration to function in exile while maintaining greater international legitimacy."
