 SAU_unif_gcc_council:0 "§HThe Gulf Cooperation Council§!"
 SAU_unif_gcc_council_desc:0 "For two decades the §LGCC§! has been a paper alliance - a forum for monarchs to talk past each other. Riyadh proposes to make it §Hsomething more§!."
 SAU_unif_economic_union:0 "§HEconomic Union§!"
 SAU_unif_economic_union_desc:0 "A unified §Lcustoms zone§!, harmonized regulations, and the foundations of a §Hcommon market§! across the peninsula. The merchants of §LJeddah§! and §LDubai§! have waited a generation."
 SAU_unif_military_union:0 "§HMilitary Union§!"
 SAU_unif_military_union_desc:0 "The §LPeninsula Shield§! has existed on paper since 1984. Riyadh now proposes to give it §Hreal teeth§! - integrated command, shared procurement, and a unified doctrine."
 SAU_unif_political_union:0 "§HPolitical Union§!"
 SAU_unif_political_union_desc:0 "A coordinated foreign policy. A shared diplomatic line. The smaller emirates fear §YSaudi domination§! - but Riyadh insists this is a partnership of §Lequals among monarchs§!."
 SAU_unif_intra_trade:0 "§HIntra-GCC Trade§!"
 SAU_unif_intra_trade_desc:0 "Drop the last tariff barriers between member states. Goods, capital, and labour flow freely from §LMuscat§! to §LKuwait City§!."
 SAU_unif_common_market:0 "§HCommon Market§!"
 SAU_unif_common_market_desc:0 "A single regulatory framework: one set of standards, one customs document, one regional market of §L50 million consumers§!."
 SAU_unif_cross_border:0 "§HCross-Border Transit Systems§!"
 SAU_unif_cross_border_desc:0 "Highways, railways, and pipelines knit the peninsula together. The §LGCC Railway§! - long discussed, never built - finally breaks ground."
 SAU_unif_joint_research:0 "§HJoint Research Initiatives§!"
 SAU_unif_joint_research_desc:0 "A shared §Ltechnology fund§! pools resources for desalination, solar power, and petrochemical R&D. §LKAUST§! becomes the regional hub."
 SAU_unif_shared_currency:0 "§HShared Currency§!"
 SAU_unif_shared_currency_desc:0 "The §Hkhaleeji dinar§! - a single currency for the GCC, pegged not to the dollar but to a basket. The boldest economic step the peninsula has ever taken."
 SAU_unif_joint_defense:0 "§HJoint Defense Agreement§!"
 SAU_unif_joint_defense_desc:0 "An §LArticle 5§!-style mutual defense pact: an attack on one is an attack on all. §LIran§! takes notice."
 SAU_unif_gulf_academy:0 "§HThe Gulf Academy§!"
 SAU_unif_gulf_academy_desc:0 "A unified officer training academy in §LRiyadh§!. Future generals from every GCC state will share a classroom, a doctrine, and a §Hloyalty to the Alliance§!."
 SAU_unif_command_control:0 "§HCommand & Control§!"
 SAU_unif_command_control_desc:0 "A joint command center, integrated air defense, shared intelligence feeds. The Peninsula Shield gains the §Hnervous system§! it has always lacked."
 SAU_unif_joint_ventures:0 "§HGCC Joint Ventures§!"
 SAU_unif_joint_ventures_desc:0 "Joint defense industries, joint procurement, joint maintenance depots. Saudi capital, §LEmirati logistics§!, and §LBahraini shipyards§! become one §Hwar machine§!."
 SAU_unif_robust_alliance:0 "§HA Robust Alliance§!"
 SAU_unif_robust_alliance_desc:0 "No longer a paper organization. The §LPeninsula Shield§! is now a §Hreal army§! - 100,000 troops, modern equipment, unified doctrine."
 SAU_unif_pro_american:0 "§HSolidify Pro-American Alignment§!"
 SAU_unif_pro_american_desc:0 "The §LGCC§! formalizes its security partnership with Washington. Bases, training, weapons, intelligence - all flowing through Riyadh."
 SAU_unif_increase_autonomy:0 "§HIncrease Autonomy§!"
 SAU_unif_increase_autonomy_desc:0 "A more §Hindependent foreign policy§!. The GCC speaks for itself in international forums - not as an American client, but as a §Lregional power§!."
 SAU_unif_new_partners:0 "§HNew Partners§!"
 SAU_unif_new_partners_desc:0 "Beyond Washington: deals with §LBeijing§!, §LMoscow§!, §LDelhi§!, and §LBrussels§!. The peninsula diversifies its patrons."
 SAU_unif_pursue_hegemony:0 "§HPursue Hegemony§!"
 SAU_unif_pursue_hegemony_desc:0 "Riyadh moves from §Hfirst among equals§! to §Yundisputed leader§!. The smaller monarchies grumble - but they comply."
 SAU_unif_exploit_authority:0 "§HExploit Authority§!"
 SAU_unif_exploit_authority_desc:0 "Saudi Arabia uses its hegemony §Yhard-handedly§!. Member states that step out of line face §Heconomic pressure§! - or worse. The Alliance is now a §MSaudi empire§! in all but name."
 SAU_unif_benign_dominance:0 "§HBenign Dominance§!"
 SAU_unif_benign_dominance_desc:0 "Riyadh leads with a §Glighter touch§!: investment, patronage, and respect for the smaller emirates dignity. Hegemony without humiliation."
 SAU_unif_khaleeji_union:0 "§MThe Khaleeji Union§!"
 SAU_unif_khaleeji_union_desc:0 "The §Mfinal step§!: a confederation of the six monarchies, with shared sovereignty in foreign policy, defense, and currency. A §HUnited States of Arabia§! - led from §LRiyadh§!."

 SAU_focus_SAGIA_Initiative_investment:0 "§HEstablish SAGIA§!"
 SAU_focus_SAGIA_Initiative_investment_desc:0 "By royal decree, the §LSaudi Arabian General Investment Authority§! is established as the Kingdom's flagship body for attracting §Gforeign capital§!. Its job: §Hcut through the bureaucracy§!, §Hcourt the world's investors§!, and turn §LRiyadh§! into a magnet for §Hglobal business§!."

 SAU_focus_346:0 "§HOne-Stop Shop§!"
 SAU_focus_346_desc:0 "Foreign companies once spent §Yyears§! navigating overlapping ministries to register a business. SAGIA's §HOne-Stop Shop§! consolidates dozens of licensing steps into a §Gsingle counter§!. Bureaucracy yields, §Ycorruption recedes§!, and investors get answers in §Gdays, not years§!."

 SAU_focus_347:0 "§HOpen Strategic Sectors§!"
 SAU_focus_347_desc:0 "§LTelecommunications§!, §Linsurance§!, §Lmining§! - sectors once held by state-backed monopolies are thrown §Gopen§! to foreign capital. New competitors arrive bringing §Htechnology§!, §Hexpertise§!, and pressure on the old guard to §Ymodernize or die§!."

 SAU_focus_348:0 "§HForeign Investment Law of 2000§!"
 SAU_focus_348_desc:0 "For the first time, foreign nationals may own §G100%§! of a Saudi company in most sectors. The §YApril 2000§! law sweeps away ownership restrictions that have hobbled the Kingdom's economy for decades. §LWall Street§! takes notice; §Lthe City§! takes notice; the world takes notice."

 SAU_focus_349:0 "§HEconomic Cities Drive§!"
 SAU_focus_349_desc:0 "Six new economic cities are planned: §LKing Abdullah Economic City§! on the Red Sea, §LKnowledge Economic City§! in Madinah, §LPrince Abdulaziz bin Mousaed City§! in Hail, and others. Each is a §Hpurpose-built hub§! for industry, services, and trade - §Gengines of growth§! far from the oil fields."

 SAU_focus_350:0 "§HInternational Partnerships§!"
 SAU_focus_350_desc:0 "Joint ventures with §LGeneral Electric§!, §LDow Chemical§!, §LSumitomo§!, and §LMitsubishi§! bring §Hhard technology§! and §Hmanagerial expertise§! into the Kingdom. Saudi engineers learn alongside foreign masters; in time, the §Gapprentices§! will become the §Gmasters§!."

 SAU_focus_351:0 "§HTax Incentive Package§!"
 SAU_focus_351_desc:0 "Corporate tax rates for foreign investors are §Gslashed§! from §Y45%§! to §G20%§!. Personal income remains §Guntaxed§!. SAGIA broadcasts the message worldwide: the Kingdom not only §Gwelcomes§! foreign capital - it §Hcourts§! it."

 SAU_focus_352:0 "§MSaudi Arabia, Open for Business§!"
 SAU_focus_352_desc:0 "A §Mcapstone moment§!. Saudi Arabia ranks among the §Hworld's top investment destinations§!. Foreign capital floods the economic cities, joint ventures flourish, and the Kingdom's economy is §Gbroader§!, §Gdeeper§!, and §Gstronger§! than at any point in its history. §HThe vision has become reality§!."

 SAU_focus_The_Water_Crisis:0 "§HThe Water Crisis§!"
 SAU_focus_The_Water_Crisis_desc:0 "For decades, the Kingdom has §Yignored§! the gathering storm: the aquifers are dying, the §Ldesalination plants§! strain to keep up, and per-capita water use is among the §Yhighest in the world§!. The time for euphemisms is over. The crisis must be §Hnamed§! before it can be §Gsolved§!."

 SAU_saudi_own_companies_water:0 "§HNational Water Company§!"
 SAU_saudi_own_companies_water_desc:0 "Water is too §Hstrategic§! to outsource. The Kingdom invests in §LSaudi-owned§! desalination operators, training a new generation of national engineers and keeping the profits at home. The build-out is §Yslower§! - but the sovereignty is §Gabsolute§!."

 SAU_American_compnay_water:0 "§HForeign Water Operators§!"
 SAU_American_compnay_water_desc:0 "§LVeolia§!, §LMarubeni§!, §LGE Water§! - the world's foremost desalination experts are invited to operate the Kingdom's plants. Capacity comes online §Gquickly§! and the technical knowledge transfers in years, not decades. The cost: §Yforeign hands§! on the strategic faucet."

 SAU_remove_water_crisis_level2_to_1:0 "§HMaster the Crisis§!"
 SAU_remove_water_crisis_level2_to_1_desc:0 "Through national resolve - or foreign expertise - the Kingdom has brought its water situation under §Gcontrol§!. The aquifers are still finite, the desalination bills are still vast, but the spectre of a §Yhydraulic collapse§! has been pushed back. §LSaudi Arabia§! drinks easier."
 SAU_shia_question:0 "The Shia Question"
 SAU_shia_question_desc:0 "Some two million §LShia§! citizens live in the §LEastern Province§!, atop the Kingdom's oil. The §LHouse of Saud§! must decide how to answer the §Hsectarian question§! - with the §Riron fist§!, the §Gopen hand§!, or something no Wahhabi king has ever dared."
 SAU_shia_crackdown:0 "Crackdown on Shia Dissent"
 SAU_shia_crackdown_desc:0 "Answer dissent with the §LMabahith§! and the §LNational Guard§!. The Shia will be watched, contained and pushed to the margins - and the Sunni majority will rest easier for it.\n\n§R+Shia Resistance§!, §R-Shia Population§!, §G+Stability, +War Support§!."
 SAU_shia_suppress_dissent:0 "Suppress the Clerics"
 SAU_shia_suppress_dissent_desc:0 "Silence the firebrand preachers of §LQatif§! and §LAwamiyah§! before their sermons become slogans.\n\n§R+Shia Resistance§!, §R-Shia Population§!."
 SAU_shia_security_clampdown:0 "Security Clampdown"
 SAU_shia_security_clampdown_desc:0 "Flood the Eastern Province with checkpoints, informants and rapid-reaction forces.\n\n§R+Shia Resistance§!, §R-Shia Population§!, §G+War Support§!."
 SAU_shia_sunni_supremacy:0 "Sunni Supremacy"
 SAU_shia_sunni_supremacy_desc:0 "Enshrine Sunni primacy in the law, the schools and the mosque. There is one true faith in the Kingdom, and it is not theirs.\n\n§R-Shia Population§!, §G+Stability, +War Support§!."
 SAU_shia_eastern_purge:0 "Pacify the Eastern Province"
 SAU_shia_eastern_purge_desc:0 "A final, ruthless settling of the Shia question. The §LEastern Province§! is brought to heel and dissent is crushed for a generation.\n\n§R--Shia Population§!, §Gresistance broken§!, §G++Stability§!."
 SAU_shia_tolerance:0 "Sunni-Shia Tolerance"
 SAU_shia_tolerance_desc:0 "Neither persecute nor convert - simply coexist. Ease the restrictions, let the Shia worship in peace, and let the Kingdom breathe.\n\n§G-Shia Resistance, +Stability, +Shia Population§! (no change of faith)."
 SAU_shia_rehabilitation:0 "Rehabilitate the Detainees"
 SAU_shia_rehabilitation_desc:0 "Release the political prisoners of the Eastern Province and bring them back into Saudi society.\n\n§G-Shia Resistance, +Stability§!."
 SAU_shia_integration:0 "Integrate the Communities"
 SAU_shia_integration_desc:0 "Open the army, the police and the bureaucracy to Shia citizens who swear loyalty to the crown.\n\n§G-Shia Resistance, +Stability, +Shia Population§!."
 SAU_shia_education:0 "Equal Educational Access"
 SAU_shia_education_desc:0 "Build schools and universities in §LQatif§! and §LAl-Ahsa§! to match those of the Najd.\n\n§G+Stability, +Shia Population§!."
 SAU_shia_economic_inclusion:0 "Economic Inclusion"
 SAU_shia_economic_inclusion_desc:0 "Share the wealth of the oilfields with the people who live above them. The sectarian wound finally begins to close.\n\n§Gresistance ended, +Stability, +Shia Population§!."
 SAU_shia_embrace:0 "Embrace Shia Citizens"
 SAU_shia_embrace_desc:0 "Welcome the Shia as full citizens - and begin a journey that could end with the §LHouse of Saud§! itself reconsidering the faith it was built to suppress.\n\n§G+Shia Population, -Shia Resistance§!."
 SAU_shia_representation:0 "Shia Political Representation"
 SAU_shia_representation_desc:0 "Seats in the §LShura Council§! for the Shia of the Eastern Province.\n\n§G-Shia Resistance, +Stability, +Shia Population§!."
 SAU_shia_dialogue:0 "Sunni-Shia Dialogue"
 SAU_shia_dialogue_desc:0 "A national dialogue to begin healing fourteen centuries of schism.\n\n§G-Shia Resistance, +Stability, +Shia Population§!."
 SAU_shia_eastern_investment:0 "Invest in the Eastern Province"
 SAU_shia_eastern_investment_desc:0 "Pour petrodollars into the Shia heartland - roads, hospitals, ports.\n\n§G+Stability, +Shia Population§!."
 SAU_shia_rights_reform:0 "Shia Rights Reform"
 SAU_shia_rights_reform_desc:0 "Codify the rights of the Shia in the law of the land.\n\n§G-Shia Resistance, +Stability, +Shia Population§!."
 SAU_shia_clergy:0 "Recognize the Shia Clergy"
 SAU_shia_clergy_desc:0 "Grant the §LShia ulema§! official standing alongside the Wahhabi establishment.\n\n§G+Stability, +Shia Population§!."
 SAU_shia_harmony:0 "Sectarian Harmony"
 SAU_shia_harmony_desc:0 "Sunni and Shia, one nation under one crown.\n\n§Gresistance ended, +Stability, +Shia Population§!."
 SAU_shia_state_religion:0 "The House of Saud Embraces Shiaism"
 SAU_shia_state_religion_desc:0 "The unthinkable: the §LRoyal Family§! formally adopts §HTwelver Shiaism§!. Centuries of Wahhabi orthodoxy are overturned by a single decree. The §LEastern Province§! rejoices; the §LNajd§! and the §Lulema§! reel.\n\n§G++Shia Population§!, §Gresistance ended§!, §Radopt the Shia faith§!, §R-Stability§! (for now)."
 SAU_shia_settlement:0 "Sectarian Settlement"
 SAU_shia_settlement_desc:0 "However it was answered - by the sword, the handshake or the conversion - the Shia question is settled. The Kingdom moves on.\n\n§G+Stability, +Political Power§!."
 SAU_focus_join_WTC:0 "Join the WTO"
 SAU_focus_join_WTC_desc:0 "§GKingdom of Saudi Arabia§! Joined the World Trade Orgazations in 2005, it increase the trade and a lot of things for the Kingdom for §H180 days only§!"
 SAU_focus_Tadawul:0 "§GTadawul, The Saudi Stock Exchange§!"
 SAU_focus_Tadawul_desc:0 "§G The Kingdom of Saudi Arabia§! established Tadawul in 1980s under Saudi Company for Share Regultions. which later changed in 2005 with the Economic Boom for the Kingdom, it changed to another Establishment and renamed to Saudi Stock Exhanage. §H This focus will Implement Laws and Regulutions for Tadawul stock.§!"
 SAU_Saudi_Economic_Tree:0 "Saudi Economic Focus Tree"
 SAU_focus_SABIC_indsturalization:0 "§GSABIC§! Industrialization"
 SAU_focus_SABIC_indsturalization_desc:0 "§GSABIC§! (Saudi Basic Industries Corporation) is the Kingdom's petrochemical giant, founded in 1976. It turns Saudi oil into plastics, fertilizers and chemicals - the building blocks of a modern economy."
 SAU_focus_290:0 "MODON Industrial Cities"
 SAU_focus_290_desc:0 "Cement at Yanbu, aluminium at Ras al-Khair, fertiliser at Jubail. The kingdom stops importing what it can make."
 SAU_focus_291:0 "The Return of National Capital"
 SAU_focus_291_desc:0 "Saudi wealth has parked itself in London townhouses and Geneva vaults for too long. The Ministry of Commerce courts it home."
 SAU_focus_292:0 "Jeddah Islamic Port Expansion"
 SAU_focus_292_desc:0 "Roll-on, roll-off berths at Jeddah. Fresh rail to the Red Sea coast. The freight does not stop."
 SAU_focus_293:0 "The Supreme Economic Council"
 SAU_focus_293_desc:0 "Industry, Commerce, Trade, Finance - ministries that once snarled at each other share one table now. The economy starts to feel like one thing."
 SAU_focus_294:0 "SABIC's Global Expansion"
 SAU_focus_294_desc:0 "Nine-figure cheques, new ethylene crackers, partnerships from Sumitomo to Dow. SABIC plays for keeps."
 SAU_focus_295:0 "The Jubail II Expansion"
 SAU_focus_295_desc:0 "From Dhahran to Jubail, smokestacks and pipelines. The Eastern Province becomes the kingdom's industrial spine."
 SAU_focus_296:0 "The Saudi Export Program"
 SAU_focus_296_desc:0 "Saudi plastics in Buenos Aires. Saudi fuel in Mumbai. Saudi cement holds up apartment blocks in Casablanca."
 SAU_focus_297:0 "SABIC Agri-Nutrients"
 SAU_focus_297_desc:0 "Not just oil, not just chemicals. Auto parts, prefab housing, white goods. The desert learns to make its own things."
 SAU_focus_297_01:0 "King Abdullah Financial District"
 SAU_focus_297_01_desc:0 "Riyadh becomes the financial center of the Gulf. Banks, investment funds, and corporate headquarters cluster in the new financial district, drawing capital from across the Muslim world."
 SAU_focus_299:0 "Economic Diversification"
 SAU_focus_299_desc:0 "The wells still pump. They are no longer all that pumps."
 SAU_focus_300:0 "Non-Oil Exports"
 SAU_focus_300_desc:0 "Trade balance stops being a euphemism for crude. Manufactured goods cross the borders by the container."
 SAU_focus_301:0 "Economic Liberalization"
 SAU_focus_301_desc:0 "Old habits - subsidies, queues, paperwork - retreat. The economy starts speaking the language of the 21st century."
 SAU_focus_302:0 "SABIC Technology & Innovation"
 SAU_focus_302_desc:0 "One vision, one budget, one timeline. The ministries stop fighting each other and start fighting the global market."
 SAU_focus_303:0 "The 2000s Oil Boom"
 SAU_focus_303_desc:0 "GDP finds a gear. Investment chases investment. Foreign capital floods the Tadawul."
 SAU_focus_304:0 "The National Industrial Strategy"
 SAU_focus_304_desc:0 "A document on every minister's desk. The plan the next decade will be measured against."

 SAU_end_water_crisis_in_saudi:0 "Water Security Achieved"
 SAU_end_water_crisis_in_saudi_desc:0 "Decades of investment in desalination, wastewater recycling, and water conservation have finally broken the kingdom's dependence on vanishing aquifers. The water crisis is over."
 SAU_focus_306:0 "The Mining Sector"
 SAU_focus_306_desc:0 "Ma'aden, founded in 1997, makes mining the §Lthird pillar§! of the economy beside oil and petrochemicals - phosphate at Al-Jalamid, gold at Mahd adh-Dhahab, and bauxite and aluminium bound for Ras al-Khair."
 SAU_focus_307:0 "The Tourism Sector"
 SAU_focus_307_desc:0 "The §HSupreme Commission for Tourism§!, created in 2000, turns the kingdom's heritage, its Red Sea coast and - above all - the §Lpilgrimage to Mecca and Medina§! into a permanent, year-round industry."
 SAU_focus_308:0 "The Construction Boom"
 SAU_focus_308_desc:0 "Cranes over every skyline. Riyadh, Jeddah and Dammam swell with towers, malls and ring-roads as the oil-boom capital pours, at last, into concrete and steel at home."
 SAU_focus_309:0 "The Digital Economy"
 SAU_focus_309_desc:0 "The §HCommunications and IT Commission§! (2001) ends the telecom monopoly and wires the kingdom - mobile networks, broadband, and the first e-government services reach every province."

 SAU_focus_310:0 "The Eighth Development Plan"
 SAU_focus_310_desc:0 "A five-year programme covering 2005 through 2009. The Ministry of Economy and Planning wagers the kingdom's future on it."
 SAU_focus_311:0 "The Industrial Path"
 SAU_focus_311_desc:0 "Steel mills, smelters, fabricators. Heavy industry takes the lead role in the kingdom's growth."
 SAU_focus_312:0 "The Services Path"
 SAU_focus_312_desc:0 "Banking, logistics, finance, tourism. The kingdom bets that desk jobs employ more Saudis than factories ever will."
 SAU_focus_313:0 "The Balanced Path"
 SAU_focus_313_desc:0 "Industry and services rise together. Neither dominates. The economy gains a redundancy it never had."
 SAU_focus_314:0 "The Ninth Development Plan"
 SAU_focus_314_desc:0 "The Saudi economy of 2015 looks nothing like the one of 1995. Manufacturing alone surpasses what oil exports were worth a decade ago."
 SAU_focus_315:0 "The Saudi Landbridge"
 SAU_focus_315_desc:0 "Highways, rail, runways, fibre. The bones of the new kingdom are laid."
 SAU_focus_316:0 "STC Privatization"
 SAU_focus_316_desc:0 "Fibre to every district capital. The pre-internet kingdom is becoming a memory."
 SAU_focus_316_gdp_tt:0 "National §YGDP§! is over §G$1500 billion§!"
 SAU_focus_304_gdp_tt:0 "National §YGDP§! is over §G$300 billion§!"
 SAU_focus_325_gdp_tt:0 "National §YGDP§! is over §G$1200 billion§!"
 SAU_focus_345_gdp_tt:0 "National §YGDP§! is over §G$500 billion§!"
 SAU_focus_387_gdp_tt:0 "National §YGDP§! is over §G$400 billion§!"
 SAU_focus_406_gdp_tt:0 "National §YGDP§! is over §G$300 billion§!"
 SAU_focus_417_gdp_tt:0 "National §YGDP§! is over §G$300 billion§!"
 SAU_focus_421_gdp_tt:0 "National §YGDP§! is over §G$700 billion§!"
 SAU_focus_317:0 "The Saudi Electricity Company"
 SAU_focus_317_desc:0 "New gas turbines, transmission lines from coast to coast. The grid stops being the bottleneck."
 SAU_focus_318:0 "Urban Development"
 SAU_focus_318_desc:0 "Riyadh sprawls. Jeddah climbs. Dammam fills in. The kingdom's urban majority becomes overwhelming."
 SAU_focus_319:0 "The Real Estate Development Fund"
 SAU_focus_319_desc:0 "Affordable housing on the outskirts of every major city. The waiting list shortens."
 SAU_focus_320:0 "The North-South Railway"
 SAU_focus_320_desc:0 "A national bus network, expanded rail, cheaper domestic flights. The kingdom shrinks."
 SAU_focus_321:0 "King Abdullah Economic City"
 SAU_focus_321_desc:0 "King Abdullah Economic City, Knowledge Economic City, Jazan. Free of the labyrinth that runs the rest of the country."
 SAU_focus_322:0 "The Labour Law of 2005"
 SAU_focus_322_desc:0 "The kafala system bends. Saudis enter the workforce in jobs once reserved for expats."
 SAU_focus_323:0 "Tatweer Education Reform"
 SAU_focus_323_desc:0 "Curricula updated, religious hours reduced, English from grade four. The Ministry of Education catches its breath after decades of inertia."
 SAU_focus_324:0 "King Fahd Medical City"
 SAU_focus_324_desc:0 "King Faisal Specialist Hospital sets the standard. Provincial capitals catch up."
 SAU_focus_325:0 "KAUST"
 SAU_focus_325_desc:0 "R and D budgets quadruple. KAUST, KFUPM, KAU receive funding the academic world stares at."
 SAU_focus_326:0 "K.A.CARE Renewable Energy"
 SAU_focus_326_desc:0 "The desert that scorches the kingdom now powers it. Solar farms at Sakaka, wind farms at Dumat al-Jandal."
 SAU_focus_327:0 "Royal Decree M/30, Capital Market Law"
 SAU_focus_327_desc:0 "Royal Decree was Called, one of the first reforms toward propesity for the Kingdom, Saudi Arabai moving more toward modernizations and future. The Royal Decree was called in 31 March 2003, by the Prime Minister and Crown Prince at that time, Late King Abdullah"
 SAU_focus_328:0 "The 2007 Legal Reforms"
 SAU_focus_328_desc:0 "§GKingdom of Saudi Arabia§! Implemented "§RFormal incorporation§!" in 2007, particularly during that era of regulatory reform, leads to the official establishment of a legal entity"
 SAU_focus_329:0 "§GThe Qualified Foreign Investor Program§!"
 SAU_focus_329_desc:0 "On §H15 June 2015§!, the §LCapital Market Authority§! opens the §LTadawul§! to direct foreign institutional investment for the first time. Funds with at least §Y$5 billion§! in assets under management may now buy Saudi shares without local intermediaries. The QFI Program is the first step on a long road - the next stop is §LMSCI Emerging Markets§!."
 SAU_focus_330:0 "§GMSCI Emerging Markets Inclusion§!"
 SAU_focus_330_desc:0 "In §HJune 2018§!, §LMSCI§! announces the upgrade of Saudi Arabia from Standalone to Emerging Markets status. Implementation follows in §HMay 2019§!, with passive inflows estimated at §G$14 to 16 billion§!. The §LTadawul§! claims a §G2.6%§! weight in the MSCI EM index - the largest single-market addition since 2009. Foreign capital floods the Kingdom."
 SAU_focus_331:0 "The Kafalah SME Program"
 SAU_focus_331_desc:0 "Loans at favourable terms, cut paperwork, training programmes. Saudi entrepreneurs stop emigrating."
 SAU_focus_332:0 "§MThe Aramco IPO§!"
 SAU_focus_332_desc:0 "On §H11 December 2019§!, §LSaudi Aramco§! lists on the §LTadawul§!. The initial offering raises §G$25.6 billion§!; with the greenshoe option exercised, the total reaches §G$29.4 billion§!. It is the §Mlargest IPO in history§!, surpassing §LAlibaba's 2014 listing§!. The Kingdom rejects offers from §LNew York§! and §LLondon§! - this jewel will trade in §LRiyadh§!."
 SAU_focus_333:0 "§MThe Saudi Financial and Banking Laws§!"
 SAU_focus_333_desc:0 "The 2007 legal reforms codify the Saudi financial system. The Banking Control Law, the Capital Market Law, the Insurance Law - these statutes provide the framework for a modern financial sector. The kingdom's banks and markets now have clear rules to follow - and clear consequences when they do not."
 SAU_focus_649:0 "The Standardized Interest Law"
 SAU_focus_649_desc:0 "The 2007 legal reforms also codify the prohibition on riba (interest). The Saudi financial system remains firmly rooted in Islamic principles, even as it modernizes. The kingdom's banks and markets operate within a framework that balances religious values with economic realities."
 SAU_focus_650:0 "Fractional Reserve Mandates"
 SAU_focus_650_desc:0 "The 2007 legal reforms also establish fractional reserve requirements for banks. This ensures that banks maintain a certain level of reserves against deposits, providing a buffer against potential financial instability."
 SAU_focus_651:0 "The Anti-Speculation Directives"
 SAU_focus_651_desc:0 "The 2007 legal reforms also introduce anti-speculation directives to prevent excessive trading and market manipulation. These measures aim to maintain market stability and protect investors from unfair practices."
 SAU_focus_652:0 "The Interbank Lending Code"
 SAU_focus_652_desc:0 "The 2007 legal reforms also establish a code for interbank lending, ensuring transparency and fairness in transactions between financial institutions."
 SAU_focus_653:0 "The Banking Control Law"
 SAU_focus_653_desc:0 "The 2007 legal reforms also establish the Banking Control Law, providing a comprehensive regulatory framework for the Saudi banking sector."
 SAU_focus_654:0 "Bastion of Islamic Finance"
 SAU_focus_654_desc:0 "The 2007 legal reforms also establish the Kingdom as a bastion of Islamic finance, providing a unique environment for Sharia-compliant financial instruments and services."
 SAU_focus_655:0 "The Secularization of Finance"
 SAU_focus_655_desc:0 "The 2007 legal reforms also introduce measures to secularize the financial sector, ensuring a clear separation between religious and commercial activities."
 SAU_focus_334:0 "The Capital Market Authority"
 SAU_focus_334_desc:0 "After The Royal Decree resulted in the establishment of the Capital Market Authority, a dedicated regulatory body was created to oversee the development and operation of the Saudi capital market."
 SAU_focus_335:0 "Edaa: The Securities Depository"
 SAU_focus_335_desc:0 "Edaa - the Securities Depository Center - settles and registers every trade on the Tadawul. Ownership records leave the paper ledgers behind, and foreign investors finally trust the plumbing of the Saudi market."
 SAU_focus_336:0 "The Saudi Logistics Hub"
 SAU_focus_336_desc:0 "Three continents in a day's flight. Jeddah, Dammam, Riyadh - the routes converge here."
 SAU_focus_337:0 "Establish Joint-Stock Conglomerates (JSC)"
 SAU_focus_337_desc:0 "By transitioning our largest state entities into Public Joint-Stock Companies, we unlock the true potential of the Saudi market. This move allows for the massive accumulation of capital, inviting citizens and institutional investors to fund the Kingdom industrial rebirth. No longer will our expansion be limited by the treasury's immediate reach; the wealth of the nation shall now fuel the engines of our progress."
 SAU_focus_338:0 "§GThe Saudi Sukuk Programme§!"
 SAU_focus_338_desc:0 "From §H2017§!, the §LMinistry of Finance§! launches a sustained sovereign sukuk programme - §G$9 billion§! in the debut international issuance alone. Sharia-compliant bonds become a primary vehicle for Saudi government finance and corporate capital raising. The Kingdom and §LMalaysia§! divide the global Islamic bond market between them."
 SAU_focus_339:0 "§GVision 2030 Privatisation Programme§!"
 SAU_focus_339_desc:0 "Under the §HCrown Prince's§! direction, the §LPublic Investment Fund§! announces a sweeping privatisation programme: over §H100 state-owned enterprises§! to list on the Tadawul. §LACWA Power§!, §LSALIC§!, §LSaudi Tadawul Group§! itself - the queue stretches for years. Targets call for §G$55 billion§! in privatisation receipts. The state shrinks; the market swells."
 SAU_focus_340:0 "§GForeign and Dual Listings§!"
 SAU_focus_340_desc:0 "Saudi companies look outward. Some dual-list on §LLondon's LSE§!, others on §LAbu Dhabi's ADX§!. §LTadawul§!'s trading platform is upgraded under a partnership with §LNasdaq Inc.§!. Foreign companies, in turn, gain pathways onto Saudi soil. The exchange becomes a §Htwo-way bridge§!, not a closed garden."
 SAU_focus_341:0 "Limited Liability Company (LLC)"
 SAU_focus_341_desc:0 "The 2007 reforms provide a clear distinction: while Joint-Stock companies rule the markets, the LLCs will rule the streets. These companies will serve as the backbone of our domestic supply chains. With a clear legal identity and protected capital, these firms are now ready to partner with international brands, bringing global expertise to Saudi soil."
 SAU_focus_342:0 "§MA Hub for Foreign Capital§!"
 SAU_focus_342_desc:0 "The §LSAGIA§! reforms have opened the doors; the §LTadawul§! reforms have laid the floor. Together, the Kingdom presents a single, coherent platform for the world's capital. Foreign direct investment and portfolio investment converge on §LRiyadh§!. The §HKingdom of Saudi Arabia§! is no longer a destination of last resort - it is, increasingly, a §Gdestination of first choice§!."
 SAU_focus_343:0 "§GMT30 Index Futures§!"
 SAU_focus_343_desc:0 "On §H30 August 2020§!, the §LTadawul§! lists its first derivative product: §HMT30 Index Futures§!, tracking the thirty most-traded large-cap stocks. The §LCMA§! has approved hedging instruments forbidden for decades. Single-stock futures and options follow. §LSaudi finance§! catches up with the global mainstream - and accepts the §Yvolatility§! that comes with it."
 SAU_focus_344:0 "§GSharia-Compliant Securities Only§!"
 SAU_focus_344_desc:0 "The §LCouncil of Senior Scholars§! advises caution: derivatives flirt with §Yriba (interest)§! and §Ygharar (excessive uncertainty)§!. The §LCMA§! holds the line - sukuk and equities only, no conventional bonds, no futures, no options. The §HKingdom§! preserves the religious purity of its capital market, even at the cost of foreign volume. The §LUlema§! approve."
 SAU_focus_345:0 "The Gulf's Economic Engine"
 SAU_focus_345_desc:0 "Egyptian construction workers go home. Lebanese bankers move to Riyadh. The capital flows, for once, the right way."

 SAU_End_of_2010_plan:0 "2010 Plan Completion"
 SAU_End_of_2010_plan_desc:0 "The five-year development plan reaches its conclusion. Infrastructure is built. Industries are established. The economic foundation for Vision 2030 is laid."
 SAU_Aramco_petrodollar_oil:0 "Saudi Aramco"
 SAU_Aramco_petrodollar_oil_desc:0 "The §HSaudi Arabian Oil Company§! is the largest petroleum enterprise on Earth and the backbone of the Kingdom. This branch builds the oil sector field by field and then commits Aramco to a §Hstrategic doctrine§! - §Lpump more, refine more, or export for maximum revenue§! - all feeding the single §HSaudi Aramco§! national spirit."
 SAU_focus_356:0 "Ras Tanura & Abqaiq"
 SAU_focus_356_desc:0 "§HRas Tanura§! - the world's largest oil port - and the §HAbqaiq§! stabilization complex: the beating heart where Aramco's crude is gathered, processed and shipped to the world."
 SAU_focus_357:0 "Downstream Integration"
 SAU_focus_357_desc:0 "Stop selling raw crude. Refineries and petrochemical complexes at §LJubail, Yanbu and Rabigh§! turn every barrel into higher-value fuels and plastics §Hat home§! - and feed SABIC."
 SAU_focus_358:0 "PetroRabigh & SATORP"
 SAU_focus_358_desc:0 "§HPetroRabigh§! (with Japan's Sumitomo, 2005) and §HSATORP§! at Jubail (with France's Total) are world-scale joint ventures that crack Saudi crude into fuels and chemicals. The Kingdom stops exporting raw barrels and starts exporting §Lproducts§!."
 SAU_focus_356_01:0 "Complete Nationalization"
 SAU_focus_356_01_desc:0 "Between §H1973 and 1980§! the Kingdom buys out the American partners of the Arabian American Oil Company. ARAMCO becomes wholly Saudi-owned - §HSaudi Aramco§!."
 SAU_focus_356_02:0 "The Master Gas System"
 SAU_focus_356_02_desc:0 "Launched in §H1975§!, the Master Gas System captures the gas once §Lflared off§! at the wellheads, feeding cheap energy and feedstock to the Kingdom's new industries."
 SAU_focus_356_03:0 "Saudi Petroleum Engineers"
 SAU_focus_356_03_desc:0 "§HKFUPM§! in Dhahran trains a generation of Saudi petroleum engineers and geologists. Aramco's workforce becomes the most §LSaudized§! in the Kingdom."
 SAU_focus_356_04:0 "The Ghawar Field"
 SAU_focus_356_04_desc:0 "§HGhawar§! - the largest conventional oil field ever discovered, stretching 280 km beneath the Eastern Province. For decades it alone produces over half the Kingdom's crude."
 SAU_focus_362:0 "Doctrine: Maximize Production"
 SAU_focus_362_desc:0 "Raise Aramco's sustainable capacity toward §H12 million barrels a day§!. Open new fields across the Eastern Province and the Empty Quarter.\n\n§GSpawns oil§! across the Kingdom and boosts fuel - the foundation of a §Hwar economy§!.\n§YMutually exclusive with the other two doctrines.§!"
 SAU_focus_363:0 "Doctrine: Export Powerhouse"
 SAU_focus_363_desc:0 "Crude flows east and west by the supertanker. As OPEC's §Hswing producer§!, the Kingdom turns its oil into the world's most reliable §Hpetrodollar§! revenue stream.\n\n§GResource export income§! and recurring treasury - the foundation of a §Hmoney economy§!.\n§YMutually exclusive with the other two doctrines.§!"
 SAU_focus_364:0 "New Mega-Fields"
 SAU_focus_364_desc:0 "§HShaybah§! (1998) deep in the Empty Quarter, §HKhurais§! (2009) and offshore §HManifa§! (2013) - a new generation of giant fields pushes Aramco's capacity ever higher. §GMore oil flows.§!"
 SAU_focus_365:0 "OPEC Swing Producer"
 SAU_focus_365_desc:0 "With the largest spare capacity on Earth, the Kingdom becomes the §Hswing producer§! that sets the world oil price. Unlocks the §HOPEC Oil Lever§! decisions - raise prices for profit, or crash them to break rivals."
 SAU_focus_366:0 "The Council of Economic & Development Affairs"
 SAU_focus_366_desc:0 "Created in 2015, the §HCouncil of Economic and Development Affairs§! becomes the engine room of reform, coordinating every ministry behind one economic vision."
 SAU_focus_367:0 "The World's Most Valuable Company"
 SAU_focus_367_desc:0 "Whichever path it took, Saudi Aramco now stands as the §Hmost valuable company on Earth§! - the crown of the Kingdom's oil sector and the engine of everything that follows.\n§YRequires a national GDP over $600 billion.§!"
 SAU_focus_367_gdp_tt:0 "National §YGDP§! is over §G$600 billion§!"
 SAU_focus_368:0 "The National Transformation Program"
 SAU_focus_368_desc:0 "The §HNational Transformation Program§! sets hard delivery targets across the whole government - the operational backbone that turns Vision 2030 from slogan into reality."
 SAU_focus_369:0 "Nazaha: The Anti-Corruption Authority"
 SAU_focus_369_desc:0 "§HNazaha§!, the National Anti-Corruption Commission, is given real teeth in 2011 - ministers and princes are no longer untouchable."
 SAU_focus_370:0 "The Judicial Reform of 2007"
 SAU_focus_370_desc:0 "King Abdullah's §H2007 judicial reform§! codifies the courts, creates a Supreme Court and specialised tribunals, and gives investors the predictability they crave."
 SAU_focus_372:0 "Tayseer: Regulatory Reform"
 SAU_focus_372_desc:0 "The National Competitiveness Center (§HTayseer§!) takes a blade to red tape, slashing the licences and approvals that once strangled every venture."
 SAU_focus_373:0 "The Ministry of Investment (MISA)"
 SAU_focus_373_desc:0 "SAGIA becomes the §HMinistry of Investment§! (2020) - a single, powerful front door for the foreign capital the Kingdom is courting."
 SAU_focus_374:0 "EXPEC Research Centre"
 SAU_focus_374_desc:0 "The §HExploration and Petroleum Engineering Center§! gives Aramco home-grown reservoir modelling and drilling technology rivalling any Western major - and the deepest knowledge of the Kingdom's own geology."
 SAU_focus_375:0 "Strong Saudi Banks"
 SAU_focus_375_desc:0 "Al Rajhi, NCB, Riyad Bank, Samba. Saudi names sit in the global top hundred."
 SAU_focus_377:0 "Insurance for All"
 SAU_focus_377_desc:0 "Health, auto, property. The Saudi insurance market - dormant for decades - finally wakes."
 SAU_focus_378:0 "Grow the Capital Markets"
 SAU_focus_378_desc:0 "More IPOs, deeper liquidity, foreign QFI access. The Tadawul matures into a serious exchange."
 SAU_focus_379:0 "A Saudi Bond Market"
 SAU_focus_379_desc:0 "Sovereign sukuk, corporate sukuk, conventional bonds. Saudi paper trades from London to Tokyo."
 SAU_focus_380:0 "The Sakani Housing Program"
 SAU_focus_380_desc:0 "The §HSakani§! program puts home ownership within reach of ordinary Saudis - land, finance and ready units delivered at scale."
 SAU_focus_381:0 "The National Housing Company"
 SAU_focus_381_desc:0 "The §HNational Housing Company§! industrialises construction - master-planned suburbs rise around every major city."
 SAU_focus_382:0 "The Saudi Cement Industry"
 SAU_focus_382_desc:0 "Saudi Cement, Yamama and the rest pour the foundations of the new Kingdom - and end the cement import bill."
 SAU_focus_383:0 "Saudi Steel"
 SAU_focus_383_desc:0 "Hadeed expands. New rolling mills at Jubail. Saudi rebar in Saudi towers."
 SAU_focus_384:0 "Glass & Building Materials"
 SAU_focus_384_desc:0 "Float glass, ceramics and steel sections - the materials of a building boom, now made at home."
 SAU_focus_385:0 "Materials for the Boom"
 SAU_focus_385_desc:0 "Tile, paint, fittings, fixtures. The kingdom stops importing what its builders need."
 SAU_focus_386:0 "The Skyline Rises"
 SAU_focus_386_desc:0 "The Kingdom Centre. Burj Rafal. The Capital Market Authority Tower. The Riyadh skyline changes month by month."
 SAU_focus_387:0 "Vision 2030"
 SAU_focus_387_desc:0 "§HVision 2030§! - the Crown Prince's blueprint to wean the Kingdom off oil by 2030 through tourism, industry, entertainment, and a constellation of giga-projects. The commitment is made before the whole world. Now the Kingdom must deliver it, or watch it become the most expensive monument to ambition ever built."
 SAU_focus_388:0 "Qiddiya & The Line"
 SAU_focus_388_desc:0 "§HQiddiya's§! entertainment megacity and §HThe Line's§! linear concept are unveiled as the first glimpses of what is coming. The groundwork is laid for a far larger announcement."
 SAU_focus_389:0 "The Red Sea Project"
 SAU_focus_389_desc:0 "Luxury islands and untouched coast - the §HRed Sea Project§! opens Saudi Arabia to the world's tourists for the first time."
 SAU_focus_390:0 "King Salman International Airport"
 SAU_focus_390_desc:0 "Riyadh's new §HKing Salman International Airport§! is built to move 100 million passengers a year - a gateway to match the ambition."
 SAU_focus_391:0 "King Abdullah Port"
 SAU_focus_391_desc:0 "§HKing Abdullah Port§!, the region's first fully private port, becomes one of the fastest-growing container hubs on the planet."
 SAU_focus_392:0 "A Saudi Railway"
 SAU_focus_392_desc:0 "The North-South Railway hauls phosphate. The Haramain High-Speed Railway hauls pilgrims. The kingdom moves on rails it built itself."
 SAU_focus_393:0 "The Highway Grid"
 SAU_focus_393_desc:0 "Six-lane motorways from Tabuk to Najran. The kingdom is held together by asphalt."
 SAU_focus_394:0 "The Digital Government Authority"
 SAU_focus_394_desc:0 "The §HDigital Government Authority§! drags the bureaucracy online - every service on one platform, no paper."
 SAU_focus_395:0 "The E-Commerce Boom"
 SAU_focus_395_desc:0 "Salla, Noon and a thousand start-ups - Saudi shoppers move online and a new retail economy is born."
 SAU_focus_396:0 "Fintech Saudi"
 SAU_focus_396_desc:0 "STC Pay, Tamara and an open-banking framework - §HFintech Saudi§! turns Riyadh into a regional money-tech hub."
 SAU_focus_397:0 "KACST: Science & Technology"
 SAU_focus_397_desc:0 "The §HKing Abdulaziz City for Science and Technology§! anchors the Kingdom's research base, from advanced materials to space."
 SAU_focus_398:0 "The Human Capability Program"
 SAU_focus_398_desc:0 "The §HHuman Capability Development Program§! retools education and training for a knowledge economy - the people are the real resource."
 SAU_focus_399:0 "The National Technology Development Program"
 SAU_focus_399_desc:0 "The National Technology Development Program funds the start-ups and deep-tech the Kingdom will need when the oil revenue thins."
 SAU_focus_400:0 "The Saudi Space Commission"
 SAU_focus_400_desc:0 "The §HSaudi Space Commission§! (2018) stakes a claim beyond the atmosphere - astronauts, launches, and a seat at the space-faring table."
 SAU_focus_401:0 "Saudi Satellites & Arabsat"
 SAU_focus_401_desc:0 "From the early SaudiSat craft to a major stake in §HArabsat§!, the Kingdom builds eyes and ears in orbit."
 SAU_focus_402:0 "SAMI: Saudi Arabian Military Industries"
 SAU_focus_402_desc:0 "§HSaudi Arabian Military Industries§! is founded in 2017 to localise defence - half the arms budget, spent at home, by 2030."
 SAU_focus_403:0 "GAMI: Localise the Arms Industry"
 SAU_focus_403_desc:0 "The §HGeneral Authority for Military Industries§! licenses and grows a domestic arms sector from almost nothing."
 SAU_focus_404:0 "The Saudi Drone Program"
 SAU_focus_404_desc:0 "Loitering munitions and reconnaissance §Hdrones§!, designed and built in the Kingdom."
 SAU_focus_405:0 "The National Cybersecurity Authority"
 SAU_focus_405_desc:0 "The §HNational Cybersecurity Authority§! (2017) hardens the Kingdom's networks after a decade of attacks on Aramco and the ministries."
 SAU_focus_406:0 "SDAIA: Data & Artificial Intelligence"
 SAU_focus_406_desc:0 "The §HSaudi Data and AI Authority§! (2019) makes data the new oil - a national AI strategy, supercomputing, and a torrent of government data put to work."
 SAU_focus_407:0 "The National Data Centres"
 SAU_focus_407_desc:0 "Hyperscale §Hdata centres§! rise in the desert, powered by cheap energy - the Kingdom hosts the cloud for a whole region."
 SAU_focus_408:0 "The 5G Network"
 SAU_focus_408_desc:0 "STC and Mobily blanket the Kingdom in §H5G§!, among the fastest rollouts in the world."
 SAU_focus_409:0 "Absher & Yesser E-Government"
 SAU_focus_409_desc:0 "From Yesser to §HAbsher§! to Tawakkalna - government in your pocket, millions of transactions that once meant a day in a queue."
 SAU_focus_410:0 "The Health Sector Transformation"
 SAU_focus_410_desc:0 "Hospitals spun into accountable clusters, the Seha virtual hospital, private insurance - healthcare rebuilt around the patient."
 SAU_focus_411:0 "Madrasati & Curriculum Reform"
 SAU_focus_411_desc:0 "The §HMadrasati§! platform and a rewritten curriculum - critical thinking, English and code replace rote learning."
 SAU_focus_412:0 "The Riyadh Metro"
 SAU_focus_412_desc:0 "Six lines beneath the capital - the §HRiyadh Metro§!, one of the largest urban-transport projects ever built in a single phase."
 SAU_focus_413:0 "The National Renewable Energy Program"
 SAU_focus_413_desc:0 "The §HNational Renewable Energy Program§! commits the Kingdom to tens of gigawatts of clean power - sun and wind to free crude oil for export."
 SAU_focus_414:0 "The Sakaka Solar Plant"
 SAU_focus_414_desc:0 "§HSakaka§! (2018), the first utility-scale solar plant, sets a world-record-low power price and proves the desert's true wealth."
 SAU_focus_415:0 "The Dumat al-Jandal Wind Farm"
 SAU_focus_415_desc:0 "The §HDumat al-Jandal§! wind farm, the largest in the Middle East, rises in the windy north - 400 megawatts of free fuel."
 SAU_focus_416:0 "NEOM Green Hydrogen"
 SAU_focus_416_desc:0 "The world's largest §Hgreen-hydrogen§! plant at NEOM - the Kingdom bets it can export sunshine as fuel."
 SAU_focus_417:0 "The Civil Nuclear Program"
 SAU_focus_417_desc:0 "Reactors for power and desalination - the Kingdom cautiously joins the §Hnuclear age§!."
 SAU_focus_418:0 "Battery Energy Storage"
 SAU_focus_418_desc:0 "Grid-scale batteries store the midday sun for the evening peak - the missing piece of a renewable grid."
 SAU_focus_419:0 "Modernise the National Grid"
 SAU_focus_419_desc:0 "A smart, interconnected §Hnational grid§! - and a link to the GCC - ends the blackouts and balances the renewables."
 SAU_focus_420:0 "Ceer: The Saudi Electric Car"
 SAU_focus_420_desc:0 "§HCeer§! (2022), the Kingdom's own electric-car brand, and the Lucid plant near Jeddah - Saudi Arabia builds, not just buys, the future of driving."
 SAU_focus_421:0 "Vision 2030 Realised"
 SAU_focus_421_desc:0 "§HVision 2030, fully realised.§! A diversified, post-oil economy now stands where the petrostate once gambled everything on a single commodity. Tourism, industry, finance, and entertainment carry the Kingdom's weight, and the wager on the future has been won."
 SAU_focus_423:0 "The Planning Ministry"
 SAU_focus_423_desc:0 "The Ministry of Economy and Planning becomes a real ministry, not a polite suggestion. Its reports start to bite."
 SAU_focus_424:0 "Set the Targets"
 SAU_focus_424_desc:0 "GDP growth six per cent. Non-oil exports up half. Saudi employment up over a million. Numbers the ministers will be measured against."
 SAU_focus_425:0 "Monitor the Plan"
 SAU_focus_425_desc:0 "Quarterly reviews, public dashboards, KPIs. Underperformers feel the heat."
 SAU_focus_426:0 "Match the Best"
 SAU_focus_426_desc:0 "Singapore's port. Switzerland's banks. South Korea's manufacturing. The kingdom benchmarks against the leaders, not the average."
 SAU_focus_427:0 "Coordinate the Ministries"
 SAU_focus_427_desc:0 "Cabinet meetings stop being theatre. The Council of Economic and Development Affairs gets real authority."
 SAU_focus_428:0 "The 2014 Plan Completed"
 SAU_focus_428_desc:0 "Five years, hundreds of programmes, mixed results. Some targets exceeded; others quietly missed."
 SAU_focus_end_of_2014_plan:0 "Plan Reviewed"
 SAU_focus_end_of_2014_plan_desc:0 "An autopsy on the Ninth Plan. The lessons feed the Tenth - and Vision 2030."
 SAU_focus_430:0 "Reform Industrial Policy"
 SAU_focus_430_desc:0 "The Ministry of Industry rewrites the rulebook. Subsidies become incentives. Protectionism becomes promotion."
 SAU_focus_431:0 "Tax Reform"
 SAU_focus_431_desc:0 "VAT introduced at five per cent, raised to fifteen in 2020. The kingdom that did not tax now taxes - cautiously."
 SAU_focus_432:0 "Cut the Subsidies"
 SAU_focus_432_desc:0 "Petrol prices rise. Electricity prices rise. The kingdom's poor are protected; the kingdom's spendthrifts are not."
 SAU_focus_433:0 "Pension Reform"
 SAU_focus_433_desc:0 "GOSI restructured. The Saudi worker can finally count on a retirement that has been calculated, not promised."
 SAU_focus_434:0 "Labour Law Reform"
 SAU_focus_434_desc:0 "Maximum hours, minimum wages, dispute tribunals. The kafala system loosens, slowly."
 SAU_focus_435:0 "Corporate Governance"
 SAU_focus_435_desc:0 "Audit committees, independent directors, disclosure rules. Saudi listed firms stop being family clubs in disguise."
 SAU_focus_436:0 "Competition Policy"
 SAU_focus_436_desc:0 "The General Authority for Competition takes on monopolists. Some of the kingdom's biggest names are reminded the law applies to them too."
 SAU_focus_437:0 "Protect the Consumer"
 SAU_focus_437_desc:0 "Hotline complaints actioned in days, not seasons. The Saudi shopper stops feeling outgunned by every retailer."
 SAU_focus_438:0 "Patent Law"
 SAU_focus_438_desc:0 "WIPO-compliant. Pharmaceutical companies stop counterfeiting. The local inventor's certificate finally means something."
 SAU_focus_439:0 "Trade Policy"
 SAU_focus_439_desc:0 "WTO membership granted in 2005. The kingdom no longer negotiates from outside the room."
 SAU_focus_440:0 "Modern Customs"
 SAU_focus_440_desc:0 "Single-window clearance at every port. Goods that took a week now move in a day."
 SAU_focus_441:0 "Push Exports"
 SAU_focus_441_desc:0 "The Saudi Export Development Authority opens trade offices in twenty cities. Saudi firms learn the foreign-buyer's psychology."
 SAU_focus_442:0 "Make It Here"
 SAU_focus_442_desc:0 "Cement, steel, plastics, paper - what was imported is now manufactured. Trade balance improves, dependency falls."
 SAU_focus_443:0 "Saudi Supply Chains"
 SAU_focus_443_desc:0 "Local suppliers favoured by the IKTVA programme. Aramco buys Saudi-made; the rest of the kingdom follows."
 SAU_focus_444:0 "A Logistics Hub"
 SAU_focus_444_desc:0 "King Abdulaziz International Airport, Jeddah Islamic Port, the new dry port at Riyadh. Goods routed through Saudi Arabia stop being a coincidence."
 SAU_focus_445:0 "Cold Storage"
 SAU_focus_445_desc:0 "Refrigerated warehouses at every airport. The kingdom can finally store what it grows and what it imports."
 SAU_focus_446:0 "The Warehouse Network"
 SAU_focus_446_desc:0 "Bonded warehouses, free zones, distribution centres. The plumbing of modern trade gets installed."
 SAU_focus_447:0 "Modern Trucks"
 SAU_focus_447_desc:0 "The Saudi haulier replaces his thirty-year-old Mercedes with a new Euro-compliant rig. Fuel consumption falls."
 SAU_focus_448:0 "Air Cargo"
 SAU_focus_448_desc:0 "Saudi Airlines Cargo links Jeddah and Riyadh to fifty hubs. Premium goods cross the kingdom in hours, not days."
 SAU_focus_449:0 "Maritime Services"
 SAU_focus_449_desc:0 "Bunkering, repair, registration. Saudi ports earn fees from ships they will never own."
 SAU_focus_450:0 "Expand Financial Services"
 SAU_focus_450_desc:0 "Bayan Credit Bureau, Tadawul, SAMA - the Saudi financial system gets the institutional layer it has lacked."
 SAU_focus_451:0 "Wealth Management"
 SAU_focus_451_desc:0 "Saudi private banks chase the high-net-worth Saudi who used to bank in Geneva. The conversation is finally in Arabic."
 SAU_focus_452:0 "Asset Management"
 SAU_focus_452_desc:0 "Mutual funds, pension funds, sovereign wealth. PIF alone manages assets that rival the largest in the world."
 SAU_focus_453:0 "An Islamic Finance Centre"
 SAU_focus_453_desc:0 "Sharia-compliant banking matured in Saudi Arabia, not exported from elsewhere. The fatwa boards in Riyadh set the standard."

 SAU_focus_454:0 "Consolidate the Throne"
 SAU_focus_454_desc:0 "The Royal Court tightens its grip. Decrees flow more freely; the princes pay closer attention."
 SAU_focus_455:0 "Name the Crown Prince"
 SAU_focus_455_desc:0 "The succession is announced from the Royal Diwan. The kingdom exhales."
 SAU_focus_456:0 "Reshuffle the Cabinet"
 SAU_focus_456_desc:0 "Old loyalists retired with honour. New blood promoted with expectations. The composition signals where the king is going."
 SAU_focus_457:0 "The National Guard Question"
 SAU_focus_457_desc:0 "The SANG has always answered to one branch of the family. The king decides who takes the keys next."
 SAU_focus_458:0 "Manage the Princes"
 SAU_focus_458_desc:0 "Hundreds of half-brothers, cousins, nephews. The king who keeps them all happy stays on his throne longer."
 SAU_focus_459:0 "Balance the Factions"
 SAU_focus_459_desc:0 "Sudairi, Shammar, the descendants of Ibn Saud's lesser wives. The king plays them against each other or rules them all - both have a track record."
 SAU_focus_460:0 "The Allegiance Council"
 SAU_focus_460_desc:0 "A formal body of senior princes, blessed by King Abdullah's 2006 decree. The succession is meant to be choreographed, not improvised."
 SAU_focus_461:0 "Shape the Narrative"
 SAU_focus_461_desc:0 "Al Arabiya, MBC, Al Riyadh. The kingdom controls the channels that explain the kingdom to itself."
 SAU_focus_462:0 "Tame the Ulema"
 SAU_focus_462_desc:0 "The Council of Senior Scholars receives instructions, not requests. The fatwa serves the throne or stays unwritten."
 SAU_focus_463:0 "Buy the Tribes"
 SAU_focus_463_desc:0 "Stipends to sheikhs. Land to elders. Marriages to second cousins. The old methods still work."
 SAU_focus_464:0 "Court the Merchants"
 SAU_focus_464_desc:0 "The Bin Laden, Al-Olayan, Al-Rajhi families. The king reminds them whose protection they enjoy and whose interests they serve."
 SAU_focus_465:0 "Loyal Officers"
 SAU_focus_465_desc:0 "Promotions go to relatives. Commands go to the trustworthy. The general staff is family before it is military."
 SAU_focus_466:0 "Manage the World's Image"
 SAU_focus_466_desc:0 "Lobbying firms in Washington. Op-eds in the Financial Times. The kingdom's reputation is curated like a stock portfolio."
 SAU_focus_467:0 "Lock Down the Succession"
 SAU_focus_467_desc:0 "The line is settled. The Allegiance Council has signed. No regent, no contender, no surprise."
 SAU_focus_468:0 "Manage Public Opinion"
 SAU_focus_468_desc:0 "Polls quietly conducted. Friday sermons quietly steered. The kingdom listens more than it lets on."
 SAU_focus_469:0 "The Governors"
 SAU_focus_469_desc:0 "Each emirate ruled by a senior prince. The king's word travels through cousins, not strangers."
 SAU_focus_470:0 "The Eastern Question"
 SAU_focus_470_desc:0 "Qatif, Awamiyah, the Shia majority of the Eastern Province. The king walks a line that has been drawn and redrawn for a century."
 SAU_focus_471:0 "Pacify the Hejaz"
 SAU_focus_471_desc:0 "Mecca, Medina, Jeddah. The Hejaz remembers it was once its own kingdom. The Najdi rulers know it never quite forgot."
 SAU_focus_472:0 "The Najdi Heartland"
 SAU_focus_472_desc:0 "Riyadh, Buraidah, Hail. The dynasty's home turf. Loyal, but not free."
 SAU_focus_473:0 "The Yemeni Border"
 SAU_focus_473_desc:0 "Saada, Hajjah, Sa'da. The Houthi war comes to the border. The kingdom's southern frontier becomes a live front."
 SAU_focus_474:0 "The Iraqi Border"
 SAU_focus_474_desc:0 "Arar, Rafha, Turaif. The post-2003 Iraq sends jihadists, smugglers, and pilgrims north. The kingdom fortifies."
 SAU_focus_475:0 "The Red Sea Coast"
 SAU_focus_475_desc:0 "Yanbu, Jeddah, Jizan. NEOM rises here. The coast becomes the kingdom's window on the world that does not speak Arabic."
 SAU_focus_476:0 "The Gulf Coast"
 SAU_focus_476_desc:0 "Dammam, Khobar, Jubail. The oil coast. The kingdom's wealth flows from these shores."
 SAU_focus_477:0 "The Empty Quarter"
 SAU_focus_477_desc:0 "Rub al-Khali. Not really empty. The kingdom's oil reserves sit beneath the world's largest sand sea."
 SAU_focus_478:0 "The Central Region"
 SAU_focus_478_desc:0 "The high plateau of Najd, the heartland's heartland. The kingdom's imagination begins here."
 SAU_focus_479:0 "Authority Consolidated"
 SAU_focus_479_desc:0 "The decrees go out from one office and stop nowhere. The kingdom knows whose word is law."
 SAU_focus_480:0 "The Succession Resolved"
 SAU_focus_480_desc:0 "The next king is named, the king after that is plausible. The dynasty looks like a dynasty again."
 SAU_focus_481:0 "A Loyal Government"
 SAU_focus_481_desc:0 "Ministers chosen for competence and faithfulness in that order. The cabinet sings from one hymn sheet."
 SAU_focus_482:0 "A Loyal Military"
 SAU_focus_482_desc:0 "The MOI, the SANG, the regular forces - one chain of command, one loyalty. The Arab Spring's lessons applied."
 SAU_focus_483:0 "The Clerics' Blessing"
 SAU_focus_483_desc:0 "The Council of Senior Scholars endorses the throne. The Friday sermons echo it. The legitimacy holds."
 SAU_focus_484:0 "The Tribes' Allegiance"
 SAU_focus_484_desc:0 "Otaibi, Mutairi, Shammar, Ghatafan. The handshakes still carry weight."
 SAU_focus_485:0 "The Merchants' Loyalty"
 SAU_focus_485_desc:0 "The kingdom's biggest fortunes know whose protection they sit beneath. They behave accordingly."
 SAU_focus_486:0 "The People's Support"
 SAU_focus_486_desc:0 "The polls are not real polls. The result is. The Saudi citizen, by and large, prefers the king to the alternatives."
 SAU_focus_487:0 "Regional Stability"
 SAU_focus_487_desc:0 "Borders held. Insurgents contained. The kingdom is the calm in a region that does not specialise in calm."
 SAU_focus_488:0 "A United Kingdom"
 SAU_focus_488_desc:0 "Hejazi, Najdi, Eastern Province, Asir, Tabuk - the regions hold together under the green flag."
 SAU_focus_489:0 "Royal Legitimacy"
 SAU_focus_489_desc:0 "The Custodian of the Two Holy Mosques is recognised by Riyadh, Mecca, Cairo, Jakarta. The crown earns its weight."
 SAU_focus_490:0 "Crisis Averted"
 SAU_focus_490_desc:0 "What could have been a fracture - a succession dispute, a cousin's revolt, a regional defection - was managed. The kingdom holds."

 SAU_focus_Miteb_sonofAbdullah:0 "Miteb bin Abdullah's Ambition"
 SAU_focus_Miteb_sonofAbdullah_desc:0 "Miteb, son of the late King Abdullah, commands the National Guard. He has his father's reformist instincts and a network of allies. But the Sudairis are powerful, and they have their own plans."
 SAU_miteb_son_of_abdullah_01:0 "Miteb's Guard"
 SAU_miteb_son_of_abdullah_01_desc:0 "Prince Miteb's command of the Saudi Arabian National Guard gives him a power base no other prince can match. The kingdom watches what he does with it."
 SAU_focus_Ahmed:0 "Ahmed bin Abdulaziz: The Conservative Choice"
 SAU_focus_Ahmed_desc:0 "Ahmed, full brother of Salman, represents the traditional Sudairi line. He is conservative, cautious, and acceptable to the old guard. But is the kingdom ready for more of the same?"
 SAU_focus_Muqrin:0 "Muqrin bin Abdulaziz: The Outsider King"
 SAU_focus_Muqrin_desc:0 "Muqrin, son of a Yemeni mother, has spent his life proving himself Saudi enough. As former GID chief, he has intelligence connections. But can he overcome the stigma of his birth?"
 SAU_Salman_Abdulaziz:0 "Salman bin Abdulaziz: The Sudairi Patriarch"
 SAU_Salman_Abdulaziz_desc:0 "Salman, the last of the Sudairi Seven, takes the throne at 79. He has ruled Riyadh for 48 years. He is quiet, deliberate, and utterly determined to secure his son's succession."
 SAU_king_abdullah_era_01:0 "Abdullah's Reform Legacy"
 SAU_king_abdullah_era_01_desc:0 "King Abdullah's reign left a legacy: KAUST, the Allegiance Council, the Arab Peace Initiative. His successors can build on it - or dismantle it."
 SAU_king_abdullah_era_02:0 "Abdullah's Economic Program"
 SAU_king_abdullah_era_02_desc:0 "Abdullah's economic investments - in education, infrastructure, and industry - laid the groundwork for Vision 2030. The next king inherits both the achievements and the debts."
 SAU_king_abdullah_era_03:0 "Abdullah's Social Reforms"
 SAU_king_abdullah_era_03_desc:0 "Women in the Shura Council. Municipal elections. The Religious Police reined in. Abdullah's social reforms were cautious but real. Will they be expanded or rolled back?"
 SAU_king_abdullah_era_04:0 "Abdullah's Foreign Policy"
 SAU_king_abdullah_era_04_desc:0 "Abdullah balanced between America, Iran, and the Arab world. His refusal to support the Iraq War, his quiet outreach to Tehran, his pan-Arab peace initiative - all left a complex legacy."
 SAU_king_abdullah_era_05:0 "Abdullah's Counter-Terror Record"
 SAU_king_abdullah_era_05_desc:0 "Abdullah crushed Al-Qaeda in the Kingdom. The Mabahith hunted militants cell by cell. By the end of his reign, the terrorist threat was contained - not eliminated."
 SAU_king_abdullah_era_06:0 "Abdullah's Educational Legacy"
 SAU_king_abdullah_era_06_desc:0 "KAUST, the scholarship program, the university expansions - Abdullah invested in education like no king before him. The results will take a generation to measure."
 SAU_king_abdullah_era_07:0 "Abdullah's Healthcare Expansion"
 SAU_king_abdullah_era_07_desc:0 "The King Abdullah Medical City, the primary care expansion, the insurance mandate - Abdullah's healthcare reforms improved life for millions."
 SAU_king_abdullah_era_08:0 "Abdullah's Women's Rights"
 SAU_king_abdullah_era_08_desc:0 "Abdullah gave women the vote, appointed women to the Shura, and allowed women in the Olympics. Each step was opposed by conservatives. Each step held."
 SAU_king_abdullah_era_09:0 "Abdullah's National Dialogue"
 SAU_king_abdullah_era_09_desc:0 "The King Abdulaziz Center for National Dialogue brought Sunnis and Shias, liberals and conservatives, together. It was imperfect but unprecedented."
 SAU_king_abdullah_era_10:0 "Abdullah's Arab Peace Initiative"
 SAU_king_abdullah_era_10_desc:0 "The 2002 Arab Peace Initiative offered Israel full recognition for full withdrawal. Israel rejected it. But the initiative established Saudi Arabia as the moral voice of the Arab world."
 SAU_king_abdullah_era_11:0 "Abdullah's Anti-Iran Policy"
 SAU_king_abdullah_era_11_desc:0 "'Cut off the head of the snake,' Abdullah told America about Iran's nuclear program. He built a quiet Sunni coalition to contain Tehran. It was effective - until it wasn't."
 SAU_king_abdullah_era_12:0 "Abdullah's US Relationship"
 SAU_king_abdullah_era_12_desc:0 "Abdullah rebuilt the US-Saudi relationship after 9/11. Intelligence sharing, arms sales, diplomatic coordination - the partnership recovered, never fully healed."
 SAU_king_abdullah_era_13:0 "Abdullah's China Outreach"
 SAU_king_abdullah_era_13_desc:0 "Abdullah visited Beijing. Oil deals were struck. Trade grew. The Saudi-China relationship, still nascent, would grow into something much larger."
 SAU_king_abdullah_era_14:0 "Abdullah's Russia Engagement"
 SAU_king_abdullah_era_14_desc:0 "Abdullah met with Putin. Energy cooperation, arms deals, and the beginning of a Saudi-Russian detente that would eventually reshape OPEC."
 SAU_king_abdullah_era_15:0 "Abdullah's India Partnership"
 SAU_king_abdullah_era_15_desc:0 "India is Saudi Arabia's largest oil customer. Abdullah strengthened the relationship, recognizing that Asia - not the West - would drive future growth."
 SAU_king_abdullah_era_16:0 "Abdullah's Pakistan Alliance"
 SAU_king_abdullah_era_16_desc:0 "Pakistan and Saudi Arabia have been allies since the 1960s. Abdullah maintained the relationship: Pakistani troops in the Saudi military, Saudi aid to Pakistan, nuclear cooperation whispered about."
 SAU_king_abdullah_era_17:0 "Abdullah's Egypt Support"
 SAU_king_abdullah_era_17_desc:0 "After Morsi's fall, Abdullah backed Sisi with billions. Egypt's stability is Saudi Arabia's concern. The kingdom that once feared Nasser now bankrolls Cairo."
 SAU_salman_abdulaziz_01:0 "Salman's Ascension"
 SAU_salman_abdulaziz_01_desc:0 "August 2015. Salman takes the throne. At 79, he is the oldest king to ascend. But his mind is sharp, and his plans for his son are clear."
 SAU_salman_abdulaziz_02:0 "Salman's First Decrees"
 SAU_salman_abdulaziz_02_desc:0 "Royal decrees fly from the Diwan. Ministers replaced. Governors reassigned. The new king makes his mark quickly and decisively."
 SAU_salman_abdulaziz_03:0 "Salman's Yemen Decision"
 SAU_salman_abdulaziz_03_desc:0 "March 2015. Salman launches Operation Decisive Storm. The Yemen war begins. It will drag on for years, consume billions, and define his reign."
 SAU_salman_abdulaziz_04:0 "Salman's MBS Elevation"
 SAU_salman_abdulaziz_04_desc:0 "Salman elevates his son Mohammed bin Salman to Crown Prince. The generational shift is complete. The kingdom braces for change."
 SAU_salman_abdulaziz_05:0 "Salman's Vision 2030"
 SAU_salman_abdulaziz_05_desc:0 "Vision 2030 launches with fanfare. A radical plan to diversify the economy, open society, and build megaprojects. Critics doubt it can work. MbS insists it must."
 SAU_salman_abdulaziz_06:0 "Salman's Aramco IPO"
 SAU_salman_abdulaziz_06_desc:0 "Aramco goes public. The largest IPO in history. $25.6 billion raised. The proceeds fund the PIF - MbS's war chest for transforming the kingdom."
 SAU_salman_abdulaziz_07:0 "Salman's Ritz-Carlton Purge"
 SAU_salman_abdulaziz_07_desc:0 "November 2017. The Ritz-Carlton becomes a prison. 200 princes, ministers, and businessmen are detained. $100 billion in 'settlements' is extracted. The old elite is humbled."
 SAU_salman_abdulaziz_08:0 "Salman's Qatar Blockade"
 SAU_salman_abdulaziz_08_desc:0 "2017. Saudi Arabia, UAE, Bahrain, and Egypt blockade Qatar. The peninsula splits. The blockade lasts three years and achieves little - except demonstrating Saudi resolve."
 SAU_salman_abdulaziz_09:0 "Salman's Iran Confrontation"
 SAU_salman_abdulaziz_09_desc:0 "Salman takes a harder line on Iran than Abdullah did. Maximum pressure. Proxy conflicts. The cold war with Tehran heats up."
 SAU_salman_abdulaziz_10:0 "Salman's Lebanon Intervention"
 SAU_salman_abdulaziz_10_desc:0 "Salman demands Lebanon confront Hezbollah. Saudi pressure on Hariri. The kingdom that once built Lebanon now tries to remake it."
 SAU_salman_abdulaziz_11:0 "Salman's Canada Crisis"
 SAU_salman_abdulaziz_11_desc:0 "A tweet from Canada criticizing Saudi human rights triggers a diplomatic explosion. Embassies expelled. Trade suspended. The kingdom's sensitivity to criticism is laid bare."
 SAU_salman_abdulaziz_12:0 "Salman's Khashoggi Crisis"
 SAU_salman_abdulaziz_12_desc:0 "October 2018. Jamal Khashoggi is murdered in the Saudi consulate in Istanbul. The world is horrified. MbS's reputation is shattered. Salman must manage the fallout."
 SAU_salman_abdulaziz_13:0 "Salman's OPEC Leadership"
 SAU_salman_abdulaziz_13_desc:0 "Salman navigates OPEC through the shale revolution, the pandemic, and the price wars. Saudi production decisions move global markets."
 SAU_salman_abdulaziz_14:0 "Salman's G20 Presidency"
 SAU_salman_abdulaziz_14_desc:0 "2020. Saudi Arabia hosts the G20. The kingdom sits at the top table of global economic governance. A long way from 1995."
 SAU_salman_abdulaziz_15:0 "Salman's NEOM Announcement"
 SAU_salman_abdulaziz_15_desc:0 "NEOM - the $500 billion megacity - is announced. THE LINE, the linear city, captures global imagination. Critics call it impossible. MbS calls it inevitable."
 SAU_salman_abdulaziz_16:0 "Salman's Social Reforms"
 SAU_salman_abdulaziz_16_desc:0 "Women drive. Cinemas reopen. The Religious Police lose arrest powers. Concerts, comedy, and sports return. Saudi society transforms in years what took other countries decades."
 SAU_salman_abdulaziz_17:0 "Salman's Tourism Opening"
 SAU_salman_abdulaziz_17_desc:0 "The tourist visa launches. For the first time, foreigners can visit Saudi Arabia for leisure. The kingdom opens - cautiously, selectively, but undeniably."
 SAU_salman_abdulaziz_18:0 "Salman's Entertainment Authority"
 SAU_salman_abdulaziz_18_desc:0 "The General Entertainment Authority, led by Turki al-Sheikh, brings concerts, wrestling, and Formula 1 to Saudi Arabia. The entertainment industry is born overnight."
 SAU_salman_abdulaziz_19:0 "Salman's Sports Washing"
 SAU_salman_abdulaziz_19_desc:0 "Golf's LIV tour. Boxing's biggest fights. Newcastle United's acquisition. Saudi Arabia uses sports to reshape its global image - and critics call it washing."
 SAU_salman_abdulaziz_20:0 "Salman's Abraham Accords"
 SAU_salman_abdulaziz_20_desc:0 "The UAE and Bahrain normalize with Israel. Saudi Arabia watches carefully. Normalization is coming - but on Saudi terms, and at a time of the kingdom's choosing."
 SAU_salman_abdulaziz_21:0 "Salman's Oil Price War"
 SAU_salman_abdulaziz_21_desc:0 "2020. Saudi Arabia floods the market. Oil crashes to negative prices. The message to American shale producers is clear: we determine the price."
 SAU_salman_abdulaziz_22:0 "Salman's Pandemic Management"
 SAU_salman_abdulaziz_22_desc:0 "COVID-19 hits. The Hajj is restricted. Lockdowns are imposed. Vaccines are procured. The kingdom manages the pandemic as well as any country."
 SAU_salman_abdulaziz_23:0 "Salman's Vaccine Diplomacy"
 SAU_salman_abdulaziz_23_desc:0 "Saudi Arabia distributes vaccines to allied nations. Aid to Egypt, Jordan, Pakistan. The kingdom uses its purchasing power to build diplomatic capital."
 SAU_salman_abdulaziz_24:0 "Salman's PIF Expansion"
 SAU_salman_abdulaziz_24_desc:0 "The Public Investment Fund grows to $700 billion. Investments in Uber, Lucid, Newcastle, and gaming companies. The PIF becomes a global financial force."
 SAU_salman_abdulaziz_25:0 "Salman's Sovereign Wealth"
 SAU_salman_abdulaziz_25_desc:0 "Saudi sovereign wealth invests worldwide. From Silicon Valley to the Premier League, the kingdom's money buys influence, technology, and prestige."
 SAU_salman_abdulaziz_26:0 "Salman's Hydrogen Ambition"
 SAU_salman_abdulaziz_26_desc:0 "Green hydrogen from NEOM. The kingdom that dominated the oil age plans to dominate the hydrogen age. The world's largest hydrogen plant is planned."
 SAU_salman_abdulaziz_27:0 "Salman's Space Program"
 SAU_salman_abdulaziz_27_desc:0 "Saudi astronauts fly to the ISS. The Saudi Space Commission launches satellites. The kingdom reaches beyond Earth."
 SAU_salman_abdulaziz_28:0 "Salman's Nuclear Program"
 SAU_salman_abdulaziz_28_desc:0 "Peaceful nuclear power. Two reactors planned. The kingdom that once sought Pakistani nuclear weapons now builds civilian nuclear energy."
 SAU_salman_abdulaziz_29:0 "Salman's Mining Push"
 SAU_salman_abdulaziz_29_desc:0 "Ma'aden expands. The Arabian Shield's minerals - gold, copper, phosphate, rare earths - are developed. Mining becomes the third pillar after oil and petrochemicals."
 SAU_salman_abdulaziz_30:0 "Salman's Tech Investment"
 SAU_salman_abdulaziz_30_desc:0 "Billions flow into AI, biotech, and clean tech. The kingdom that once imported technology now invests in creating it."
 SAU_salman_abdulaziz_31:0 "Salman's Legacy"
 SAU_salman_abdulaziz_31_desc:0 "Salman's reign transformed Saudi Arabia. The economy diversified. Society opened. Megaprojects rose from the desert. The kingdom entered the 21st century - on its own terms."
 SAU_salman_abdulaziz_32:0 "Salman's Succession Plan"
 SAU_salman_abdulaziz_32_desc:0 "MbS is confirmed as heir. The Allegiance Council assents. The succession is settled. The kingdom will pass from the second to the third generation of Saud."
 SAU_salman_abdulaziz_33:0 "Salman's Final Years"
 SAU_salman_abdulaziz_33_desc:0 "The aging king watches as his son governs. MbS makes the decisions. Salman blesses them. The transition is gradual but unmistakable."
 SAU_salman_abdulaziz_34:0 "MbS Takes Control"
 SAU_salman_abdulaziz_34_desc:0 "Mohammed bin Salman effectively rules the kingdom. Defense Minister, Crown Prince, head of the Council for Economic Affairs - all power flows through him."
 SAU_salman_abdulaziz_35:0 "MbS's New Saudi Arabia"
 SAU_salman_abdulaziz_35_desc:0 "Vision 2030. NEOM. Women driving. Entertainment opening. The purge of corrupt princes. The confrontation with Iran. MbS remakes Saudi Arabia in his image."
 SAU_salman_abdulaziz_36:0 "Salman's Energy Strategy"
 SAU_salman_abdulaziz_36_desc:0 "Oil production, OPEC management, and the long transition beyond petroleum. Salman manages the kingdom's energy dominance while planning for the post-oil future."
 SAU_salman_abdulaziz_37:0 "Salman's Regional Policy"
 SAU_salman_abdulaziz_37_desc:0 "Yemen, Qatar, Iran, Lebanon, Syria - Salman confronts every regional challenge simultaneously. The kingdom's assertive foreign policy reshapes the Middle East."

 SAU_internal_foregin_affairs:0 "Saudi Internal Affairs"
 SAU_internal_foregin_affairs_desc:0 "The Kingdom Focus Heavily on it is people safety and security, education and healthcare. The kingdom's internal affairs are the foundation of its stability and prosperity and bright Future."
 SAU_internal_foregin_affairs_reduce_edcaution:0 "No Free Education"
 SAU_internal_foregin_affairs_reduce_edcaution_desc:0 "The education budget is cut. Universities struggle. Schools face overcrowding. The kingdom's investment in its future declines - temporarily."
 SAU_internal_foregin_affairs_education_American_style:0 "The Anglo-American Education Model"
 SAU_internal_foregin_affairs_education_American_style_desc:0 "The Saudi education system adopts The Anglo-American Model curricula. Critical thinking, liberal arts, and scientific inquiry replace rote memorization. The ulema object; the economy benefits."
 SAU_internal_foregin_affairs_free_education:0 "Secondary Tracks Education System - Domstic"
 SAU_internal_foregin_affairs_free_education_desc:0 "Education is free at every level - from kindergarten to PhD. The kingdom invests in its people. Every Saudi child has the right to learn."
 SAU_internal_affairs_education_american_style_01:0 "King Fahd University of Petroleum and Minerals"
 SAU_internal_affairs_education_american_style_01_desc:0 "Science, technology, engineering, and mathematics take priority. The kingdom needs engineers, not clerics. The curriculum shifts accordingly."
 SAU_internal_affairs_free_education_01:0 "King Abdulaziz University"
 SAU_internal_affairs_free_education_01_desc:0 "New universities in every region. King Saud, KAUST, KFUPM, Princess Nourah University - all expand. Saudi higher education reaches world-class standards."
 SAU_internal_affairs_free_education_02:0 "King Abdullah University of Science and Technology"
 SAU_internal_affairs_free_education_02_desc:0 "Partnerships with MIT, Oxford, and Sorbonne. Foreign universities open campuses in Saudi Arabia. The kingdom imports educational excellence."
 SAU_internal_affairs_free_education_03:0 "The King Abdullah Scholarship Program"
 SAU_internal_affairs_free_education_03_desc:0 "Thousands of Saudi students study abroad on government scholarships. They return with degrees from Harvard, Stanford, and Cambridge. The scholarship program transforms Saudi education."
 SAU_internal_affairs_education_american_style_02:0 "The Tatweer Education Project"
 SAU_internal_affairs_education_american_style_02_desc:0 "The curriculum emphasizes critical thinking over memorization. Students learn to question, to analyze, to debate. The educational transformation is cultural, not just academic."
 SAU_internal_affairs_education_american_style_03:0 "English Language Education"
 SAU_internal_affairs_education_american_style_03_desc:0 "English is taught from primary school. Every Saudi graduate speaks English. The kingdom connects to the global economy through language."
 SAU_internal_affairs_education_american_style_04:0 "The Teachers' Colleges"
 SAU_internal_affairs_education_american_style_04_desc:0 "Teachers receive modern training. Pedagogy, classroom management, educational technology - the Saudi teaching profession is transformed."
 SAU_internal_affairs_education_american_style_05:0 "Tatweer Smart Schools"
 SAU_internal_affairs_education_american_style_05_desc:0 "Tablets in every classroom. Online learning platforms. AI tutors. The Saudi education system goes digital."
 SAU_internal_foregin_affairs_free_edecuation:0 "Primary Education Guarantee"
 SAU_internal_foregin_affairs_free_edecuation_desc:0 "Every Saudi child attends primary school. Literacy reaches 99%. The kingdom that was once largely illiterate now educates everyone."
 SAU_internal_affairs_primary_education_01:0 "Secondary Education Expansion"
 SAU_internal_affairs_primary_education_01_desc:0 "High schools expand. Vocational training grows. Every Saudi teenager has access to secondary education - academic or vocational."
 SAU_internal_affairs_primary_education_02:0 "Technical and Vocational Training Corporation"
 SAU_internal_affairs_primary_education_02_desc:0 "Technical colleges train plumbers, electricians, mechanics, and welders. Not every Saudi needs a university degree. The economy needs skilled trades."
 SAU_internal_affairs_primary_education_03:0 "Prince Salman Center for Disability Research"
 SAU_internal_affairs_primary_education_03_desc:0 "Special needs students receive dedicated support. Inclusive education becomes policy. Every Saudi child, regardless of ability, has the right to learn."
 SAU_internal_foregin_affairs_education_end:0 "Education Transformation Complete"
 SAU_internal_foregin_affairs_education_end_desc:0 "The Saudi education system is transformed. World-class universities, modern curricula, educated citizens. The kingdom has invested in its greatest resource: its people."

 SAU_internal_foregin_affairs_police:0 "GIP"
 SAU_internal_foregin_affairs_police_desc:0 "GIP professionalizes. Training, equipment, and procedures meet international standards. The kingdom's internal security becomes more effective - and more visible."
 SAU_internal_affairs_police_01:0 "Community Policing"
 SAU_internal_affairs_police_01_desc:0 "Police officers engage with communities. Foot patrols, neighborhood stations, public relations - the Saudi police become less feared and more respected."
 SAU_internal_affairs_police_02:0 "Traffic Police Reform"
 SAU_internal_affairs_police_02_desc:0 "The hated traffic police are reformed. Women join the force. Automated ticketing replaces arbitrary fines. The kingdom's roads become safer."
 SAU_internal_affairs_police_03:0 "Cybercrime Unit"
 SAU_internal_affairs_police_03_desc:0 "A dedicated cybercrime unit fights online fraud, hacking, and extremist propaganda. The digital frontier requires digital policing."
 SAU_internal_foregin_affairs_health_and_wafare:0 "Confront the Jobs Crisis"
 SAU_internal_foregin_affairs_health_and_wafare_desc:0 "A young, fast-growing population is entering a workforce with far too few jobs for nationals, while the private sector runs on cheap foreign labour. The government makes unemployment a central priority and opens a campaign of welfare relief and Saudization."
 SAU_internal_affairs_health_welfare_01:0 "National Employment Survey"
 SAU_internal_affairs_health_welfare_01_desc:0 "Before the Kingdom can fight unemployment it must measure it. A nationwide census of the jobless maps the scale of the crisis and where it bites hardest."
 SAU_internal_affairs_health_welfare_02:0 "Empower the Private Sector"
 SAU_internal_affairs_health_welfare_02_desc:0 "Real jobs will come from business, not the state payroll. The Kingdom cuts red tape and courts investors to build an economy that can employ its own people."
 SAU_internal_foregin_affairs_health:0 "The Saudization Drive"
 SAU_internal_foregin_affairs_health_desc:0 "The state commits to replacing foreign labour with Saudi nationals across the economy. It is the defining labour policy of the era and the foundation of every reform that follows."
 SAU_internal_foregin_affairs_wafare_over_healthcare_copy_copy4:0 "Military Spending Priority"
 SAU_internal_foregin_affairs_wafare_over_healthcare_copy_copy4_desc:0 "Defense spending takes priority over social programs. The kingdom's security comes first. Healthcare and welfare must wait."
 SAU_internal_affairs_health_welfare_03:0 "Public Works Program"
 SAU_internal_affairs_health_welfare_03_desc:0 "Roads, ports, and housing projects put idle hands to work immediately. Public construction becomes the quickest way to absorb the unemployed."
 SAU_internal_affairs_health_welfare_04:0 "Emergency Relief Funds"
 SAU_internal_affairs_health_welfare_04_desc:0 "Cash transfers and subsidies cushion the families hit hardest by joblessness, buying the government time and social peace while deeper reforms take hold."
 SAU_internal_affairs_health_welfare_05:0 "Vocational Training Institutes"
 SAU_internal_affairs_health_welfare_05_desc:0 "A network of technical and vocational colleges retrains young Saudis for the trades the private sector actually needs, closing the skills gap behind the crisis."
 SAU_internal_affairs_health_welfare_06:0 "Saudization Quotas"
 SAU_internal_affairs_health_welfare_06_desc:0 "Private firms are ordered to fill a rising share of their payroll with nationals. Companies grumble, but Saudis begin to enter sectors long monopolized by foreign workers."
 SAU_internal_affairs_health_welfare_07:0 "Foreign Worker Levy"
 SAU_internal_affairs_health_welfare_07_desc:0 "A levy on every expatriate work permit makes foreign labour more expensive and funds the jobs programs. The cost of the easy option finally starts to bite."
 SAU_internal_affairs_health_welfare_08:0 "Small Business Loans"
 SAU_internal_affairs_health_welfare_08_desc:0 "Soft loans and grants seed a generation of Saudi entrepreneurs. Small and medium enterprises become the engine that creates jobs the giants never could."
 SAU_internal_affairs_health_welfare_09:0 "Subsidized Employment"
 SAU_internal_affairs_health_welfare_09_desc:0 "The state pays part of the wage for every national a company hires. It is expensive, but it gets young Saudis their first foot on the ladder."
 SAU_internal_affairs_health_welfare_10:0 "Regional Development Fund"
 SAU_internal_affairs_health_welfare_10_desc:0 "Investment is steered to the poorer provinces where joblessness runs deepest, spreading opportunity beyond Riyadh and the oil coast."
 SAU_internal_affairs_health_welfare_11:0 "Government Hiring Drive"
 SAU_internal_affairs_health_welfare_11_desc:0 "Ministries and agencies open their doors to graduates. The public payroll swells and soaks up unemployment, even as everyone knows it cannot grow forever."
 SAU_internal_affairs_health_welfare_12:0 "Civil Service Expansion"
 SAU_internal_affairs_health_welfare_12_desc:0 "New departments, municipalities, and state bodies are stood up across the Kingdom, each one a fresh source of secure, salaried jobs for nationals."
 SAU_internal_affairs_health_welfare_13:0 "State Enterprise Jobs"
 SAU_internal_affairs_health_welfare_13_desc:0 "State-owned giants in oil, mining, and utilities are directed to hire and train Saudis at scale, turning national champions into employers of first resort."
 SAU_internal_affairs_health_welfare_14:0 "The Full Employment Pledge"
 SAU_internal_affairs_health_welfare_14_desc:0 "The government stakes its legitimacy on a promise of work for every Saudi who wants it. The pledge unites the reform effort and raises the stakes of failure."
 SAU_internal_affairs_health_welfare_15:0 "Women in the Workforce"
 SAU_internal_affairs_health_welfare_15_desc:0 "Cautiously, the Kingdom opens new sectors to female employment, nearly doubling the pool of national talent and easing the labour shortage the private sector complains of."
 SAU_internal_affairs_health_welfare_16:0 "Private Sector Incentives"
 SAU_internal_affairs_health_welfare_16_desc:0 "Tax breaks, training subsidies, and streamlined permits reward firms that hire and develop nationals, making Saudization profitable rather than merely mandatory."
 SAU_internal_foregin_affairs_healthcare_over_warfare:0 "Jobs Through the State"
 SAU_internal_foregin_affairs_healthcare_over_warfare_desc:0 "The state takes direct responsibility for employment, expanding the public sector, public works, and government-backed projects to put Saudis to work. The unemployment crisis is broken."
 SAU_internal_foregin_affairs_wafare_over_healthcare:0 "Jobs Through the Market"
 SAU_internal_foregin_affairs_wafare_over_healthcare_desc:0 "Saudization quotas, private-sector incentives, and a tighter grip on foreign labour push companies to hire nationals. The market absorbs the workforce and the unemployment crisis is broken."

 SAU_internal_foreginonly:0 "Foreign Policy Doctrine"
 SAU_internal_foreginonly_desc:0 "Saudi Arabia's foreign policy rests on three pillars: oil security, regional stability, and Islamic leadership. The kingdom projects power through diplomacy, aid, and occasional force."
 SAU_foregin_affairs_subclass:0 "Foreign Policy Substructure"
 SAU_foregin_affairs_subclass_desc:0 "The Ministry of Foreign Affairs, the intelligence services, and the royal court all shape foreign policy. Coordination is essential."
 SAU_aggressive_foreign_policy_01:0 "Assertive Foreign Policy"
 SAU_aggressive_foreign_policy_01_desc:0 "The kingdom pursues its interests aggressively. Military intervention, economic pressure, and diplomatic confrontation become standard tools."
 SAU_diplomatic_foreign_policy_01:0 "Diplomatic Engagement"
 SAU_diplomatic_foreign_policy_01_desc:0 "Diplomacy is the preferred instrument. Summit meetings, bilateral visits, and multilateral engagement project Saudi influence."
 SAU_middle_east_foregin_policy:0 "Middle East Policy"
 SAU_middle_east_foregin_policy_desc:0 "The Middle East is the kingdom's neighborhood. Every conflict, every alliance, every crisis affects Saudi security. The kingdom must lead."
 SAU_Asia_foregin_policy:0 "Asia Policy"
 SAU_Asia_foregin_policy_desc:0 "Asia is the future. China, India, Japan, Korea - the kingdom's biggest customers. The pivot to Asia is economic and strategic."
 SAU_internal_North_africa_policy:0 "North Africa Policy"
 SAU_internal_North_africa_policy_desc:0 "Egypt, Libya, Tunisia, Morocco, Algeria - the Arab West has deep ties to the kingdom. Aid, investment, and diplomatic support project Saudi influence."
 SAU_Eastern_foregin_policy:0 "Eastern Policy"
 SAU_Eastern_foregin_policy_desc:0 "Iran, Pakistan, Afghanistan, and beyond - the eastern neighborhood requires careful management. Containment, engagement, and occasional confrontation."
 SAU_Western_foregin_policy:0 "Western Policy"
 SAU_Western_foregin_policy_desc:0 "The United States, Europe, and the Atlantic alliance remain central. But the relationship is changing. The kingdom diversifies its partnerships."
 SAU_Arab_league_policy:0 "Arab League Policy"
 SAU_Arab_league_policy_desc:0 "The Arab League is the kingdom's natural forum. Saudi Arabia leads through consensus, aid, and the occasional ultimatum."
 SAU_western_foreign_policy_01:0 "US Alliance"
 SAU_western_foreign_policy_01_desc:0 "The US-Saudi relationship is the cornerstone of the kingdom's foreign policy. Arms sales, intelligence sharing, and security guarantees bind the two nations."
 SAU_western_foreign_policy_02:0 "European Partnership"
 SAU_western_foreign_policy_02_desc:0 "Europe is a major trade partner and arms supplier. The kingdom cultivates relationships with Britain, France, and Germany."
 SAU_western_foreign_policy_03:0 "UK Special Relationship"
 SAU_western_foreign_policy_03_desc:0 "Britain and Saudi Arabia have ties going back a century. BAE Systems, British advisors, and royal visits maintain the special relationship."
 SAU_western_foreign_policy_04:0 "France Defense Deal"
 SAU_western_foreign_policy_04_desc:0 "French Rafales, naval vessels, and nuclear cooperation. Paris is an alternative arms supplier to Washington."
 SAU_western_foreign_policy_05:0 "German Trade"
 SAU_western_foreign_policy_05_desc:0 "German machinery, industrial equipment, and engineering expertise flow to Saudi Arabia. The kingdom buys German quality."
 SAU_western_foreign_policy_06:0 "NATO Cooperation"
 SAU_western_foreign_policy_06_desc:0 "Saudi Arabia cooperates with NATO on counter-terrorism, maritime security, and arms standardization. Not a member, but a partner."
 SAU_western_foreign_policy_07:0 "EU Trade Agreement"
 SAU_western_foreign_policy_07_desc:0 "A free trade agreement with the European Union is negotiated. Saudi exports flow to Europe. European investment flows to the kingdom."
 SAU_western_foreign_policy_08:0 "Atlantic Partnership"
 SAU_western_foreign_policy_08_desc:0 "The broader Atlantic partnership - US, Canada, Europe - remains central to Saudi security and trade."
 SAU_western_foreign_policy_09:0 "Western Arms Diversification"
 SAU_western_foreign_policy_09_desc:0 "The kingdom buys from everyone: American F-15s, British Typhoons, French ships, German submarines. Diversification ensures supply security."
 SAU_western_foreign_policy_10:0 "Western Education Ties"
 SAU_western_foreign_policy_10_desc:0 "Saudi students study at Western universities. Academic partnerships, research collaboration, and cultural exchange deepen ties."
 SAU_western_foreign_policy_11:0 "Western Investment"
 SAU_western_foreign_policy_11_desc:0 "Western companies invest in Saudi Arabia. GE, Siemens, Total, BP - all have major operations. Western capital builds the kingdom."
 SAU_western_foreign_policy_12:0 "Western Technology Transfer"
 SAU_western_foreign_policy_12_desc:0 "Technology transfer agreements bring Western know-how to Saudi factories and labs. The kingdom learns from the best."
 SAU_eastern_foreign_policy_01:0 "China Strategic Partnership"
 SAU_eastern_foreign_policy_01_desc:0 "China is Saudi Arabia's largest oil customer. The relationship deepens: infrastructure investment, technology cooperation, and diplomatic coordination."
 SAU_eastern_foreign_policy_02:0 "Belt and Road"
 SAU_eastern_foreign_policy_02_desc:0 "Saudi Arabia joins the Belt and Road Initiative. Chinese infrastructure investment flows to the kingdom. The New Silk Road passes through Riyadh."
 SAU_eastern_foreign_policy_03:0 "India Energy Partnership"
 SAU_eastern_foreign_policy_03_desc:0 "India's growing economy needs Saudi oil. The energy partnership deepens into trade, investment, and strategic cooperation."
 SAU_eastern_foreign_policy_04:0 "Japan Alliance"
 SAU_eastern_foreign_policy_04_desc:0 "Japan has been a reliable oil customer for decades. The relationship expands into technology, investment, and cultural exchange."
 SAU_eastern_foreign_policy_05:0 "South Korea Partnership"
 SAU_eastern_foreign_policy_05_desc:0 "Korean construction companies build Saudi infrastructure. Samsung and LG operate in the kingdom. The partnership is economic and technological."
 SAU_eastern_foreign_policy_06:0 "Pakistan Strategic Alliance"
 SAU_eastern_foreign_policy_06_desc:0 "Pakistan and Saudi Arabia share deep ties. Pakistani troops have served in the Saudi military. Saudi aid flows to Pakistan. The nuclear question lingers."
 SAU_eastern_foreign_policy_07:0 "Afghanistan Engagement"
 SAU_eastern_foreign_policy_07_desc:0 "Saudi Arabia engages with Afghanistan's rulers. Aid, diplomacy, and the hope of stability on the eastern frontier."
 SAU_eastern_foreign_policy_08:0 "Iran Containment"
 SAU_eastern_foreign_policy_08_desc:0 "Iran is the kingdom's primary regional rival. Containment through proxy conflicts, diplomatic pressure, and military buildup. The cold war heats up."
 SAU_eastern_foreign_policy_09:0 "Central Asia Outreach"
 SAU_eastern_foreign_policy_09_desc:0 "The Muslim republics of Central Asia - Kazakhstan, Uzbekistan, Turkmenistan - receive Saudi aid and investment. Islamic diplomacy extends eastward."
 SAU_western_foreign_policy_13:0 "Canada Relations"
 SAU_western_foreign_policy_13_desc:0 "Canada is a reliable partner - until it isn't. The diplomatic crisis over human rights criticism shows the kingdom's sensitivity."
 SAU_western_foreign_policy_14:0 "Australia Partnership"
 SAU_western_foreign_policy_14_desc:0 "Australia and Saudi Arabia trade energy, education, and mining expertise. The relationship is small but growing."
 SAU_western_foreign_policy_15:0 "Global Diplomatic Network"
 SAU_western_foreign_policy_15_desc:0 "Saudi embassies and consulates span the globe. The kingdom's diplomatic network reaches every continent. Riyadh speaks to the world."
 SAU_middle_east_foreign_policy_01:0 "GCC Leadership"
 SAU_middle_east_foreign_policy_01_desc:0 "Saudi Arabia leads the GCC. The smaller monarchies look to Riyadh for security and economic direction. The kingdom delivers - and dominates."
 SAU_middle_east_foreign_policy_02:0 "Yemen Intervention"
 SAU_middle_east_foreign_policy_02_desc:0 "The Yemen war consumes billions and thousands of lives. The kingdom fights the Houthis to a stalemate. Victory is elusive."
 SAU_middle_east_foreign_policy_03:0 "Qatar Blockade"
 SAU_middle_east_foreign_policy_03_desc:0 "The blockade of Qatar tests GCC unity. Three years of diplomatic warfare achieve little except demonstrating Saudi resolve."
 SAU_middle_east_foreign_policy_04:0 "Bahrain Protection"
 SAU_middle_east_foreign_policy_04_desc:0 "Bahrain is Saudi Arabia's protectorate. The King Fahd Causeway connects the islands. When Bahrain's Shia majority protests, Saudi tanks roll across."
 SAU_middle_east_foreign_policy_05:0 "Kuwait Alliance"
 SAU_middle_east_foreign_policy_05_desc:0 "Kuwait and Saudi Arabia share a border, an oil field, and a common interest in stability. The relationship is close but occasionally strained."
 SAU_middle_east_foreign_policy_06:0 "UAE Partnership"
 SAU_middle_east_foreign_policy_06_desc:0 "The UAE is Saudi Arabia's closest Gulf ally. Joint military operations, coordinated diplomacy, and shared visions of regional order."
 SAU_middle_east_foreign_policy_07:0 "Oman Relations"
 SAU_middle_east_foreign_policy_07_desc:0 "Oman maintains neutrality. The sultanate mediates between Saudi Arabia and Iran. Riyadh respects Oman's independence."
 SAU_middle_east_foreign_policy_08:0 "Iraq Engagement"
 SAU_middle_east_foreign_policy_08_desc:0 "Iraq's Shia government is close to Iran. But Saudi Arabia opens embassies, offers aid, and competes for Iraqi loyalty."
 SAU_middle_east_foreign_policy_09:0 "Syria Policy"
 SAU_middle_east_foreign_policy_09_desc:0 "Syria's civil war pits Saudi Arabia against Iran and Russia. Proxy warfare, diplomacy, and the eventual rehabilitation of Assad."
 SAU_middle_east_foreign_policy_10:0 "Jordan Support"
 SAU_middle_east_foreign_policy_10_desc:0 "Jordan is a Hashemite monarchy dependent on Saudi aid. The kingdom supports Amman financially and diplomatically."
 SAU_middle_east_foreign_policy_11:0 "Lebanon Influence"
 SAU_middle_east_foreign_policy_11_desc:0 "Lebanon is a battleground with Iran. Saudi backing for Sunni politicians confronts Iranian backing for Hezbollah. The Lebanese suffer."
 SAU_middle_east_foreign_policy_12:0 "Palestine Support"
 SAU_middle_east_foreign_policy_12_desc:0 "The Arab Peace Initiative remains the kingdom's contribution to Palestinian statehood. Aid flows to the Palestinian Authority. Rhetoric remains strong."
 SAU_middle_east_foreign_policy_13:0 "Egypt Bailout"
 SAU_middle_east_foreign_policy_13_desc:0 "Egypt's economy is on life support. Saudi billions keep it alive. The kingdom that once feared Nasser now bankrolls Cairo."
 SAU_middle_east_foreign_policy_14:0 "Sudan Influence"
 SAU_middle_east_foreign_policy_14_desc:0 "Sudan's Red Sea coast matters to Saudi Arabia. Aid, investment, and the Suakin Island deal project influence across the sea."
 SAU_middle_east_foreign_policy_15:0 "Libya Engagement"
 SAU_middle_east_foreign_policy_15_desc:0 "Libya's civil war draws in Saudi Arabia. Support for Haftar in the east. Diplomatic engagement with the UN process. The kingdom plays all sides."
 SAU_north_africa_policy_01:0 "Egypt Strategic Partnership"
 SAU_north_africa_policy_01_desc:0 "Egypt is Saudi Arabia's most important Arab partner after the Gulf. Military cooperation, aid, and investment bind Cairo to Riyadh."
 SAU_north_africa_policy_02:0 "Libya Stabilization"
 SAU_north_africa_policy_02_desc:0 "Saudi Arabia works to stabilize Libya. Aid to the government, support for reconstruction, and pressure on militias."
 SAU_north_africa_policy_03:0 "Tunisia Engagement"
 SAU_north_africa_policy_03_desc:0 "Tunisia's democracy receives Saudi attention. Aid, investment, and the hope of pulling Tunis away from the Qatari-Turkish orbit."
 SAU_north_africa_policy_04:0 "Morocco Alliance"
 SAU_north_africa_policy_04_desc:0 "Morocco and Saudi Arabia share conservative monarchy and anti-Islamist politics. The relationship deepens."
 SAU_north_africa_policy_05:0 "Algeria Outreach"
 SAU_north_africa_policy_05_desc:0 "Algeria's military government receives Saudi attention. Energy cooperation and diplomatic coordination expand."
 SAU_north_africa_policy_06:0 "North African Investment"
 SAU_north_africa_policy_06_desc:0 "Saudi capital flows to North Africa. Real estate, banking, and telecommunications investments build economic influence."
 SAU_north_africa_policy_07:0 "Maghreb Diplomacy"
 SAU_north_africa_policy_07_desc:0 "The Maghreb - Morocco, Algeria, Tunisia, Libya, Mauritania - receives coordinated Saudi diplomacy. The kingdom's influence extends across the Arab West."
 SAU_north_africa_policy_08:0 "Nilotic Policy"
 SAU_north_africa_policy_08_desc:0 "Egypt, Sudan, and the Nile states are central to Saudi strategy. Water security, Red Sea access, and Arab solidarity guide policy."
 SAU_north_africa_policy_09:0 "Sahel Engagement"
 SAU_north_africa_policy_09_desc:0 "The Sahel - Chad, Niger, Mali - receives Saudi aid. Islamic diplomacy, counter-terrorism cooperation, and migration management."
 SAU_north_africa_policy_10:0 "Horn of Africa Policy"
 SAU_north_africa_policy_10_desc:0 "The Horn of Africa - Somalia, Djibouti, Eritrea, Ethiopia - borders the Red Sea. Saudi Arabia projects power across the water."
 SAU_north_africa_policy_11:0 "Somalia Support"
 SAU_north_africa_policy_11_desc:0 "Saudi aid to Somalia builds influence. The port of Berbera, Mogadishu reconstruction, and Islamic diplomacy connect Riyadh to Mogadishu."
 SAU_north_africa_policy_12:0 "Sudan Red Sea Deal"
 SAU_north_africa_policy_12_desc:0 "The Suakin Island deal gives Saudi Arabia a foothold on the Red Sea. In exchange, billions flow to Khartoum."
 SAU_north_africa_policy_13:0 "Eritrea Base"
 SAU_north_africa_policy_13_desc:0 "Saudi Arabia establishes a military base in Eritrea. The Red Sea becomes a Saudi lake."
 SAU_north_africa_policy_14:0 "Djibouti Presence"
 SAU_north_africa_policy_14_desc:0 "The kingdom joins the scramble for Djibouti. A logistics base on the Bab el-Mandeb secures the southern Red Sea."
 SAU_north_africa_policy_15:0 "Red Sea Dominance"
 SAU_north_africa_policy_15_desc:0 "From Jeddah to Berbera, from Suakin to Djibouti, Saudi power projects across the Red Sea. The kingdom controls both coasts."
 SAU_middle_east_foreign_policy_16:0 "Iran Confrontation"
 SAU_middle_east_foreign_policy_16_desc:0 "The kingdom confronts Iran across every front: Yemen, Syria, Lebanon, Iraq, and the nuclear issue. The cold war is hot."
 SAU_middle_east_foreign_policy_17:0 "Proxy Warfare"
 SAU_middle_east_foreign_policy_17_desc:0 "Saudi proxies in Syria, Yemen, and Lebanon fight Iranian proxies. The region bleeds. Riyadh and Tehran fight to the last Arab."
 SAU_middle_east_foreign_policy_18:0 "Nuclear Opposition"
 SAU_middle_east_foreign_policy_18_desc:0 "The kingdom opposes the Iranian nuclear deal. Sanctions, sabotage, and diplomatic pressure. Tehran must not get the bomb."
 SAU_middle_east_foreign_policy_19:0 "Iranian Containment"
 SAU_middle_east_foreign_policy_19_desc:0 "Contain Iran through alliances, military buildup, and economic pressure. The strategy works - until it doesn't."
 SAU_middle_east_foreign_policy_20:0 "Sunni Coalition"
 SAU_middle_east_foreign_policy_20_desc:0 "A coalition of Sunni states - Saudi Arabia, Egypt, Turkey (sometimes), Pakistan - forms to counter Iran. It is loose, informal, and effective."
 SAU_middle_east_foreign_policy_21:0 "Gulf Unity"
 SAU_middle_east_foreign_policy_21_desc:0 "The GCC unites against Iran. The smaller monarchies look to Riyadh for protection. The peninsula stands together."
 SAU_middle_east_foreign_policy_22:0 "Arab NATO"
 SAU_middle_east_foreign_policy_22_desc:0 "A NATO-style alliance of Arab states. Saudi Arabia, Egypt, UAE, Jordan, and Bahrain coordinate military planning and intelligence."
 SAU_middle_east_foreign_policy_23:0 "Iran Deterrence"
 SAU_middle_east_foreign_policy_23_desc:0 "Military buildup deters Iranian aggression. F-15s, Patriot missiles, and naval power send a clear message to Tehran."
 SAU_middle_east_foreign_policy_24:0 "Iran Diplomatic Offensive"
 SAU_middle_east_foreign_policy_24_desc:0 "The kingdom takes the Iran issue to every forum: the UN, the Arab League, the OIC. Iran is isolated diplomatically."
 SAU_middle_east_foreign_policy_25:0 "Iran Economic Pressure"
 SAU_middle_east_foreign_policy_25_desc:0 "Oil market manipulation, sanctions support, and investment competition pressure Iran economically. The kingdom uses its economic weight as a weapon."
 SAU_middle_east_foreign_policy_26:0 "Iran Regime Change Hope"
 SAU_middle_east_foreign_policy_26_desc:0 "The kingdom hopes - and occasionally works - for regime change in Tehran. MEK support, Baloch insurgency, and cyber operations all aim at weakening the Islamic Republic."
 SAU_arab_league_policy_01:0 "Arab Leadership"
 SAU_arab_league_policy_01_desc:0 "Saudi Arabia leads the Arab world. The kingdom's wealth, oil power, and religious significance make it the natural Arab leader."
 SAU_arab_league_policy_02:0 "Arab Consensus"
 SAU_arab_league_policy_02_desc:0 "The kingdom builds consensus among Arab states. Aid, diplomacy, and the occasional threat bring recalcitrant members into line."
 SAU_arab_league_policy_03:0 "Arab Peace Initiative"
 SAU_arab_league_policy_03_desc:0 "The 2002 Arab Peace Initiative offers Israel full normalization for a Palestinian state. The kingdom leads Arab diplomacy on Israel/Palestine."
 SAU_arab_league_policy_04:0 "Arab Economic Integration"
 SAU_arab_league_policy_04_desc:0 "The kingdom promotes Arab economic integration. Trade agreements, investment flows, and the dream of an Arab common market."
 SAU_arab_league_policy_05:0 "Arab Defense Cooperation"
 SAU_arab_league_policy_05_desc:0 "Joint military exercises, intelligence sharing, and arms coordination among Arab states. The Arab defense community grows."
 SAU_arab_league_policy_08:0 "Arab Mediation"
 SAU_arab_league_policy_08_desc:0 "Saudi Arabia mediates Arab disputes. Qatar blockade, Lebanon crisis, Sudan transition - Riyadh is the Arab fixer."
 SAU_arab_league_policy_09:0 "Arab Aid Program"
 SAU_arab_league_policy_09_desc:0 "The Saudi Fund for Development, the Islamic Development Bank, and bilateral aid flow to Arab nations. The kingdom buys influence with money."
 SAU_arab_league_policy_10:0 "Arab Cultural Leadership"
 SAU_arab_league_policy_10_desc:0 "The kingdom promotes Arab culture. Mecca, Medina, the Arabic language - Saudi Arabia is the cultural heart of the Arab world."
 SAU_arab_league_policy_11:0 "Arab Media Influence"
 SAU_arab_league_policy_11_desc:0 "Al Arabiya, MBC, and Saudi-backed media outlets shape Arab public opinion. The kingdom's voice reaches hundreds of millions."
 SAU_arab_league_policy_12:0 "Arab Education Network"
 SAU_arab_league_policy_12_desc:0 "Saudi scholarships, universities, and educational partnerships connect the Arab world. Students flow from Morocco to Riyadh."
 SAU_arab_league_policy_13:0 "Arab Trade Hub"
 SAU_arab_league_policy_13_desc:0 "The kingdom becomes the trade hub of the Arab world. Goods, capital, and labor flow through Saudi ports and airports."
 SAU_arab_league_policy_14:0 "Arab Summit Host"
 SAU_arab_league_policy_14_desc:0 "Saudi Arabia hosts Arab summits. The kingdom's hospitality, wealth, and diplomatic skill make it the natural summit venue."

 SAU_Normaliztion_with_Zionist:0 "The Palestine-Israel Question"
 SAU_Normaliztion_with_Zionist_desc:0 "Normalizing with Israel is the third rail of Saudi politics. The Palestinian cause is sacred to the Arab street. But strategic reality demands reconsideration. What will the kingdom do?"
 SAU_normalization_zionist_01:0 "Secret Contacts"
 SAU_normalization_zionist_01_desc:0 "Back-channel contacts with Israeli officials. Intelligence sharing on Iran. Quiet meetings in neutral capitals. The normalization process begins in shadow."
 SAU_normalization_zionist_02:0 "Abraham Accords Watch"
 SAU_normalization_zionist_02_desc:0 "The UAE and Bahrain normalize with Israel. Saudi Arabia watches. The kingdom will not be rushed - but it will not be left behind."
 SAU_normalization_zionist_03:0 "Conditional Normalization"
 SAU_normalization_zionist_03_desc:0 "Normalization is possible - but only with a Palestinian state. The kingdom holds the line on the Arab Peace Initiative."
 SAU_normalization_zionist_04:0 "Normalization Without Palestine"
 SAU_normalization_zionist_04_desc:0 "The kingdom normalizes without a Palestinian deal. Strategic necessity outweighs Arab solidarity. The Arab street is furious."
 SAU_normalization_zionist_05:0 "Full Normalization"
 SAU_normalization_zionist_05_desc:0 "Embassies open. Trade begins. Flights cross Israeli airspace. The kingdom and Israel normalize fully - the Middle East transforms."
 SAU_normalization_zionist_06:0 "Economic Normalization"
 SAU_normalization_zionist_06_desc:0 "Trade and investment flow before diplomatic recognition. Israeli tech, Saudi capital. The economic relationship precedes the political one."
 SAU_normalization_zionist_07:0 "Security Cooperation"
 SAU_normalization_zionist_07_desc:0 "Intelligence sharing on Iran. Cyber cooperation. Airspace coordination for strikes. The security relationship is deep, even if the public one is not."
 SAU_normalization_zionist_08:0 "Technology Partnership"
 SAU_normalization_zionist_08_desc:0 "Israeli cybersecurity, agricultural tech, and water technology flow to Saudi Arabia. The kingdom buys Israeli innovation."
 SAU_normalization_zionist_09:0 "Anti-Iran Alliance"
 SAU_normalization_zionist_09_desc:0 "Saudi Arabia and Israel share a common enemy: Iran. The anti-Iran alliance drives normalization. The enemy of my enemy is my friend."
 SAU_normalization_zionist_10:0 "US Pressure for Normalization"
 SAU_normalization_zionist_10_desc:0 "Washington pushes Riyadh to normalize. Security guarantees, nuclear cooperation, and F-35s are offered. The kingdom considers the price."
 SAU_normalization_zionist_11:0 "Palestinian Veto"
 SAU_normalization_zionist_11_desc:0 "The Palestinian Authority vetoes Saudi normalization. The kingdom respects the veto - or ignores it. The choice defines the relationship."
 SAU_normalization_zionist_12:0 "Normalization Backlash"
 SAU_normalization_zionist_12_desc:0 "The Arab street erupts. Protests, clerical condemnation, and Iranian propaganda exploit the normalization. The kingdom weathers the storm."
 SAU_normalization_zionist_13:0 "Normalization Dividend"
 SAU_normalization_zionist_13_desc:0 "The benefits of normalization flow: technology, investment, security cooperation, and US support. The kingdom's strategic position strengthens."
 SAU_normalization_zionist_14:0 "Quiet Diplomacy with Israel"
 SAU_normalization_zionist_14_desc:0 "Quiet diplomacy avoids public controversy. Meetings in neutral capitals, back-channel intelligence sharing, and gradual relationship building."
 SAU_normalization_zionist_15:0 "Normalization Framework"
 SAU_normalization_zionist_15_desc:0 "A framework for normalization is established: economic ties first, security cooperation second, diplomatic recognition last. The process is gradual."
 SAU_normalization_zionist_16:0 "Normalization Complete"
 SAU_normalization_zionist_16_desc:0 "The kingdom and Israel have normalized. Embassies, trade, and flights connect the two nations. The Middle East will never be the same."
 SAU_normalization_zionist_17:0 "Defense Cooperation with Israel"
 SAU_normalization_zionist_17_desc:0 "Joint military exercises, arms sales, and integrated air defense. The Saudi-Israeli defense partnership transforms the regional balance."
 SAU_normalization_zionist_18:0 "Economic Partnership with Israel"
 SAU_normalization_zionist_18_desc:0 "Trade reaches billions. Israeli tech companies open in Riyadh. Saudi capital invests in Tel Aviv startups. The economic relationship flourishes."
 SAU_normalization_zionist_19:0 "Tourism Between Kingdoms"
 SAU_normalization_zionist_19_desc:0 "Israeli tourists visit Mecca - no, not Mecca, but Jerusalem is open. Saudi tourists visit Tel Aviv. The people-to-people contact transforms perceptions."
 SAU_normalization_zionist_20:0 "Water Cooperation"
 SAU_normalization_zionist_20_desc:0 "Israeli desalination technology helps Saudi Arabia. Saudi energy helps Israel. The water-energy swap benefits both nations."
 SAU_normalization_zionist_21:0 "Cyber Alliance"
 SAU_normalization_zionist_21_desc:0 "Joint cyber defense against Iranian threats. Israeli cybersecurity firms operate in Saudi Arabia. The digital alliance is critical."
 SAU_normalization_zionist_22:0 "Regional Security Architecture"
 SAU_normalization_zionist_22_desc:0 "A new regional security architecture includes Saudi Arabia, Israel, the UAE, and the US. Iran faces a united front."
 SAU_normalization_zionist_23:0 "Normalization Legacy"
 SAU_normalization_zionist_23_desc:0 "Normalization with Israel redefines the Middle East. The Arab-Israeli conflict ends. A new era begins - with or without the Palestinians."
 SAU_normalization_zionist_24:0 "Jerusalem Compromise"
 SAU_normalization_zionist_24_desc:0 "The kingdom accepts a compromise on Jerusalem. Two states, shared city, normalized relations. The Arab Peace Initiative achieves its goal."
 SAU_normalization_zionist_25:0 "Palestinian State Facilitation"
 SAU_normalization_zionist_25_desc:0 "The kingdom facilitates Palestinian statehood as a prerequisite for full normalization. The two-state solution is revived."
 SAU_normalization_zionist_26:0 "Normalization Stabilizes Region"
 SAU_normalization_zionist_26_desc:0 "Normalization brings stability. The Middle East heats less. Iran is contained. The kingdom's strategic position is secured."

 SAU_asia_foreign_policy_01:0 "China: The Strategic Partner"
 SAU_asia_foreign_policy_01_desc:0 "China is the kingdom's largest oil customer and growing strategic partner. The relationship spans energy, infrastructure, technology, and diplomacy."
 SAU_asia_foreign_policy_02:0 "Oil for Goods"
 SAU_asia_foreign_policy_02_desc:0 "Saudi oil flows to China. Chinese goods flow to Saudi Arabia. The energy-trade nexus binds the two economies."
 SAU_asia_foreign_policy_03:0 "Yuan Oil Trading"
 SAU_asia_foreign_policy_03_desc:0 "The kingdom accepts yuan for oil sales. The petrodollar's dominance is challenged. Beijing and Riyadh reshape global finance."
 SAU_asia_foreign_policy_04:0 "Chinese Infrastructure"
 SAU_asia_foreign_policy_04_desc:0 "Chinese companies build Saudi infrastructure. Ports, railways, and cities rise with Chinese labor and Saudi capital."
 SAU_asia_foreign_policy_05:0 "Huawei Partnership"
 SAU_asia_foreign_policy_05_desc:0 "Huawei builds the kingdom's 5G network. The US objects; Riyadh doesn't care. Chinese technology powers Saudi digitalization."
 SAU_asia_foreign_policy_06:0 "Chinese Investment"
 SAU_asia_foreign_policy_06_desc:0 "Chinese capital invests in Saudi projects. The Belt and Road meets Vision 2030. The New Silk Road passes through Riyadh."
 SAU_asia_foreign_policy_07:0 "Space Cooperation"
 SAU_asia_foreign_policy_07_desc:0 "Chinese satellites, launch vehicles, and space technology flow to Saudi Arabia. The kingdom's space program partners with Beijing."
 SAU_asia_foreign_policy_08:0 "Nuclear Cooperation"
 SAU_asia_foreign_policy_08_desc:0 "Chinese nuclear technology helps build Saudi reactors. Peaceful nuclear energy reduces oil dependence."
 SAU_asia_foreign_policy_09:0 "Military Cooperation"
 SAU_asia_foreign_policy_09_desc:0 "Chinese drones, missiles, and potentially fighter jets diversify Saudi arms sources. The kingdom is no longer dependent on Washington alone."
 SAU_asia_foreign_policy_10:0 "Drone Partnership"
 SAU_asia_foreign_policy_10_desc:0 "Chinese Wing Loong and CH-4 drones join the RSAF. Saudi Arabia operates Chinese UAVs alongside American Predators."
 SAU_asia_foreign_policy_11:0 "Ballistic Missile"
 SAU_asia_foreign_policy_11_desc:0 "The kingdom's Chinese DF-3 and DF-21 missiles remain its strategic deterrent. New purchases expand the arsenal."
 SAU_asia_foreign_policy_12:0 "Asian Diplomatic Hub"
 SAU_asia_foreign_policy_12_desc:0 "Riyadh becomes a hub for Asian diplomacy. Chinese, Japanese, Korean, and Indian leaders all visit. The kingdom speaks to Asia."
 SAU_asia_foreign_policy_13:0 "Asian Investment Fund"
 SAU_asia_foreign_policy_13_desc:0 "A joint investment fund with Asian partners channels capital into Saudi projects. Asian money builds the kingdom."
 SAU_asia_foreign_policy_14:0 "Asian Technology Transfer"
 SAU_asia_foreign_policy_14_desc:0 "Asian technology - Chinese, Japanese, Korean - transfers to Saudi factories and labs. The kingdom learns from the East."
 SAU_asia_foreign_policy_15:0 "Asian Education Exchange"
 SAU_asia_foreign_policy_15_desc:0 "Saudi students study in Beijing, Tokyo, and Seoul. Asian students come to Saudi universities. Educational exchange deepens ties."
 SAU_asia_foreign_policy_16:0 "Asian Labor Import"
 SAU_asia_foreign_policy_16_desc:0 "Asian workers - Filipino, Indian, Pakistani, Bangladeshi - build the kingdom. The Saudi economy runs on Asian labor."
 SAU_asia_foreign_policy_17:0 "Asian Muslim Outreach"
 SAU_asia_foreign_policy_17_desc:0 "The Muslim World League reaches Asian Muslims. Indonesia, Malaysia, Pakistan - all receive Saudi religious diplomacy."
 SAU_asia_foreign_policy_18:0 "Islamic Finance in Asia"
 SAU_asia_foreign_policy_18_desc:0 "Saudi Islamic finance products sell in Asia. Malaysia, Indonesia, and Hong Kong all issue sukuk under Saudi guidance."
 SAU_asia_foreign_policy_19:0 "Asian Hajj Pilgrims"
 SAU_asia_foreign_policy_19_desc:0 "Millions of Asian pilgrims perform Hajj. The kingdom manages the largest annual migration on Earth."
 SAU_asia_foreign_policy_20:0 "Asian Counter-Terror"
 SAU_asia_foreign_policy_20_desc:0 "Counter-terrorism cooperation with Asian partners. Intelligence sharing on extremist networks, financial tracking, and joint operations."
 SAU_asia_foreign_policy_21:0 "Maritime Security"
 SAU_asia_foreign_policy_21_desc:0 "The Indian Ocean and the South China Sea matter to Saudi oil exports. Maritime security cooperation with Asian navies protects the sea lanes."
 SAU_asia_foreign_policy_22:0 "Asian Energy Security"
 SAU_asia_foreign_policy_22_desc:0 "Asian energy security depends on Saudi oil. The kingdom guarantees supply. Asia guarantees demand. The relationship is symbiotic."
 SAU_asia_foreign_policy_23:0 "Asian Sovereign Investment"
 SAU_asia_foreign_policy_23_desc:0 "Asian sovereign wealth funds invest alongside the PIF. Chinese, Japanese, and Korean capital joins Saudi money in global investments."
 SAU_asia_foreign_policy_24:0 "Asian Manufacturing Partnership"
 SAU_asia_foreign_policy_24_desc:0 "Asian manufacturers set up factories in Saudi Arabia. Chinese, Korean, and Japanese companies produce for the regional market."
 SAU_asia_foreign_policy_25:0 "Asian Digital Partnership"
 SAU_asia_foreign_policy_25_desc:0 "Asian tech companies - Alibaba, Tencent, Samsung - partner with Saudi firms. The digital economy connects East and West."
 SAU_asia_foreign_policy_26:0 "Asian Tourism"
 SAU_asia_foreign_policy_26_desc:0 "Asian tourists visit the Red Sea Project, AlUla, and Mecca. The tourism opening targets Asia's growing middle class."
 SAU_asia_foreign_policy_27:0 "Asian Healthcare Partnership"
 SAU_asia_foreign_policy_27_desc:0 "Asian hospitals and medical centers operate in Saudi Arabia. Indian doctors, Filipino nurses, and Japanese medical technology."
 SAU_asia_foreign_policy_28:0 "Asian Food Security"
 SAU_asia_foreign_policy_28_desc:0 "Saudi investment in Asian agriculture secures food supplies. Rice from India, fruit from Thailand, seafood from Indonesia."
 SAU_asia_foreign_policy_29:0 "Asian Climate Cooperation"
 SAU_asia_foreign_policy_29_desc:0 "Climate cooperation with Asian partners. Solar technology, carbon capture, and the Saudi Green Initiative connect to Asian environmental efforts."
 SAU_asia_foreign_policy_30:0 "Asian Cultural Exchange"
 SAU_asia_foreign_policy_30_desc:0 "Cultural exchanges with Asian nations. Art exhibitions, film festivals, and academic cooperation connect Saudi Arabia to Asia."
 SAU_asia_foreign_policy_31:0 "Asian Media Partnership"
 SAU_asia_foreign_policy_31_desc:0 "Media partnerships with Asian outlets. Saudi vision projects on Asian screens. Asian content on Saudi platforms."
 SAU_asia_foreign_policy_32:0 "Asian Sports Investment"
 SAU_asia_foreign_policy_32_desc:0 "Saudi investment in Asian sports. Football partnerships, golf tournaments, and martial arts events connect the kingdom to Asian audiences."
 SAU_asia_foreign_policy_33:0 "Asian Defense Sales"
 SAU_asia_foreign_policy_33_desc:0 "Saudi defense sales to Asian partners. The kingdom becomes an arms exporter, not just an importer."
 SAU_asia_foreign_policy_34:0 "Asian Strategic Partnership"
 SAU_asia_foreign_policy_34_desc:0 "A comprehensive strategic partnership with Asia. Energy, trade, technology, defense, and culture - the relationship spans everything."
 SAU_asia_foreign_policy_35:0 "Asian Pivot Complete"
 SAU_asia_foreign_policy_35_desc:0 "The kingdom's pivot to Asia is complete. China is the top trade partner. India the top oil customer. Japan and Korea major investors. The kingdom's center of gravity shifts east."
 SAU_asia_foreign_policy_36:0 "Asian Hegemony"
 SAU_asia_foreign_policy_36_desc:0 "The kingdom's influence in Asia grows. From energy to finance to technology, Saudi Arabia shapes the Asian century."
 SAU_asia_foreign_policy_37:0 "Asian Century Partnership"
 SAU_asia_foreign_policy_37_desc:0 "The 21st century belongs to Asia. Saudi Arabia positions itself as Asia's Arab partner. The relationship defines the century."
 SAU_asia_foreign_policy_38:0 "Asian Alliance Network"
 SAU_asia_foreign_policy_38_desc:0 "A network of alliances across Asia. China, India, Japan, Korea, ASEAN - all connected to Riyadh. The kingdom's Asian diplomacy succeeds."
 SAU_asia_foreign_policy_39:0 "Asian Legacy"
 SAU_asia_foreign_policy_39_desc:0 "The kingdom's Asian legacy is secure. Energy partnerships, trade ties, and strategic relationships span the continent. Saudi Arabia is Asia's Arab anchor."

 SAU_military_hub:0 "Modernize the Armed Forces"
 SAU_military_hub_desc:0 "From a tribal levy to one of the best-funded militaries on earth. The Kingdom commits to a modern, professional force - and must choose how to arm and shape it."


 SAU_gcc_combined_army_locked_tt:0 "Requires the §YGCC Military Union§! to be established (complete the GCC Unification focus §YMilitary Union§!)."
 SAU_army_01:0 "The Saudi Armed Forces"
 SAU_army_01_desc:0 "Unify and modernize the land, sea and air forces of the Kingdom into a single professional military."
 SAU_army_02:0 "Lessons of the Gulf War"
 SAU_army_02_desc:0 "In 1990 Saddam's Iraq seized Kuwait and massed on our border; only a foreign coalition saved the Kingdom, and the Battle of Khafji was fought on Saudi soil. Operation Desert Storm laid bare how dependent we are on others - never again."
 SAU_army_03:0 "Ministry of Defence and Aviation"
 SAU_army_03_desc:0 "Reorganize the Ministry of Defence and Aviation (MODA) into a modern command that can plan, budget and direct all the armed forces."
 SAU_army_04:0 "The General Staff"
 SAU_army_04_desc:0 "Build a professional General Staff to write war plans, run exercises and command operations."
 SAU_army_05:0 "The Royal Saudi Land Forces"
 SAU_army_05_desc:0 "Build the Royal Saudi Land Forces (RSLF) into a modern, mobile army headquartered in Riyadh."
 SAU_army_06:0 "Saudi Arabian National Guard"
 SAU_army_06_desc:0 "Expand the Saudi Arabian National Guard (SANG), the tribal force loyal to the throne that guards the royal family and the holy cities."
 SAU_army_07:0 "King Abdulaziz Royal Guard"
 SAU_army_07_desc:0 "Strengthen the Royal Guard Regiment, the elite unit sworn to protect the person of the King."
 SAU_army_08:0 "M1A2 Abrams Main Battle Tank"
 SAU_army_08_desc:0 "Acquire the American M1A2 Abrams, the heaviest and most capable tank in the region and the backbone of Saudi armor."
 SAU_army_09:0 "Armored Brigades"
 SAU_army_09_desc:0 "Raise and equip heavy armored brigades for decisive maneuver warfare in the open desert."
 SAU_army_10:0 "Mechanized Infantry"
 SAU_army_10_desc:0 "Form mechanized infantry to hold ground and support the armored spearheads."
 SAU_army_11:0 "M109 Self-Propelled Artillery"
 SAU_army_11_desc:0 "Field the M109 self-propelled howitzer to give the divisions mobile, protected fire support."
 SAU_army_12:0 "ASTROS II Rocket Artillery"
 SAU_army_12_desc:0 "Acquire the Brazilian ASTROS II multiple-launch rocket system for massed, long-range bombardment."
 SAU_army_13:0 "Royal Saudi Strategic Missile Force"
 SAU_army_13_desc:0 "Establish the Strategic Missile Force as a separate branch, the Kingdom's strategic deterrent."
 SAU_army_14:0 "DF-3 Ballistic Missiles"
 SAU_army_14_desc:0 "Secretly acquire Chinese DF-3 (CSS-2) ballistic missiles - as Saudi Arabia really did in 1988 - to deter Iran and Israel."
 SAU_army_15:0 "Army Aviation and Apache Gunships"
 SAU_army_15_desc:0 "Stand up an Army Aviation Command and acquire the AH-64 Apache, a tank-killer for the army's own air arm."
 SAU_army_16:0 "Special Forces Command"
 SAU_army_16_desc:0 "Forge a Special Forces Command for raids, counter-terrorism and reconnaissance behind enemy lines."
 SAU_navy_01:0 "The Royal Saudi Naval Forces"
 SAU_navy_01_desc:0 "Build up the Royal Saudi Naval Forces (RSNF), split between two seas, to guard the Kingdom's long coasts."
 SAU_navy_02:0 "Eastern Fleet (Jubail)"
 SAU_navy_02_desc:0 "Base the Eastern Fleet at Jubail to dominate the Arabian Gulf and protect the oil terminals."
 SAU_navy_03:0 "Western Fleet (Jeddah)"
 SAU_navy_03_desc:0 "Base the Western Fleet at Jeddah to secure the Red Sea coast and the approaches to Bab-el-Mandeb."
 SAU_navy_04:0 "Sawari II Frigate Programme"
 SAU_navy_04_desc:0 "Acquire the French-built Al Riyadh-class frigates under the Sawari II programme, the fleet's most powerful ships."
 SAU_navy_05:0 "Badr-class Corvettes"
 SAU_navy_05_desc:0 "Field the US-built Badr-class corvettes for patrol, escort and coastal strike."
 SAU_navy_06:0 "Al Sadiq-class Patrol Boats"
 SAU_navy_06_desc:0 "Commission the Al Sadiq-class missile patrol boats to defend the coastal waters."
 SAU_navy_07:0 "Naval Aviation Wing"
 SAU_navy_07_desc:0 "Stand up a naval aviation wing of helicopters for anti-submarine and search-and-rescue work."
 SAU_navy_08:0 "Royal Saudi Marines"
 SAU_navy_08_desc:0 "Raise a Royal Saudi Marine force for amphibious landings and the defense of the coast and islands."
 SAU_navy_09:0 "King Faisal Naval Base"
 SAU_navy_09_desc:0 "Develop the great naval bases at Jeddah and Jubail to sustain a two-fleet navy."
 SAU_air_01:0 "The Royal Saudi Air Force"
 SAU_air_01_desc:0 "Develop the Royal Saudi Air Force (RSAF) into the strongest air arm in the Gulf."
 SAU_air_02:0 "Peace Sun: F-15 Eagle Program"
 SAU_air_02_desc:0 "Launch the Peace Sun program with the United States to bring the F-15 Eagle to the Kingdom."
 SAU_air_03:0 "F-15C/D Eagle Squadrons"
 SAU_air_03_desc:0 "Field F-15C/D Eagle squadrons to win and hold air superiority over Saudi skies."
 SAU_air_04:0 "F-15S Eagle"
 SAU_air_04_desc:0 "Acquire the F-15S Eagle under Peace Sun IX, able to fight for the skies and strike deep."
 SAU_air_05:0 "Tornado GR4"
 SAU_air_05_desc:0 "The Tornado GR4 deal with Britain, the largest arms contract in UK history, for Tornado GR4."
 SAU_air_06:0 "Panavia Tornado"
 SAU_air_06_desc:0 "Field Panavia Tornado squadrons in the strike, reconnaissance and air-defense roles."
 SAU_air_07:0 "The European Typhoon: Al Salam Deal"
 SAU_air_07_desc:0 "Sign the Al Salam deal for the Typhoon, a modern multirole fighter for the new century."
 SAU_air_08:0 "F-15SA Advanced Eagle"
 SAU_air_08_desc:0 "Upgrade the fleet to the F-15SA Advanced Eagle, the most capable Eagle ever built."
 SAU_air_09:0 "E-3 Sentry AWACS"
 SAU_air_09_desc:0 "Operate the E-3 Sentry AWACS to see and control the entire air picture and direct the fighters."
 SAU_air_10:0 "Aerial Refueling Fleet"
 SAU_air_10_desc:0 "Build a tanker fleet so Saudi jets can patrol the whole Kingdom and strike at long range."
 SAU_air_11:0 "C-130 Hercules Airlift"
 SAU_air_11_desc:0 "Expand the C-130 Hercules fleet to move troops and supplies anywhere at speed."
 SAU_air_12:0 "King Abdulaziz Air Base"
 SAU_air_12_desc:0 "Develop King Abdulaziz Air Base at Dhahran, guarding the Eastern Province and the Gulf."
 SAU_air_13:0 "King Khalid Air Base"
 SAU_air_13_desc:0 "Develop King Khalid Air Base at Khamis Mushait, the hardened southern base covering the Yemeni frontier."
 SAU_air_14:0 "Prince Sultan Air Base"
 SAU_air_14_desc:0 "Develop Prince Sultan Air Base at Al Kharj, a central hub deep inside the Kingdom."
 SAU_air_15:0 "Precision-Guided Munitions"
 SAU_air_15_desc:0 "Stock precision-guided bombs and missiles so a single sortie can destroy what once took many."
 SAU_air_16:0 "Saudi UAV Program"
 SAU_air_16_desc:0 "Start a Saudi drone program for long-endurance surveillance and precision strike."
 SAU_air_17:0 "Air Operations Command"
 SAU_air_17_desc:0 "Establish a central Air Operations Command to plan and run the whole air campaign as one."
 SAU_military.1.t:0 "Rebuilding the Land Forces"
 SAU_military.1.desc:0 "The Gulf War laid bare how unready our army was to defend the Kingdom on its own. The Royal Saudi Land Forces must be rebuilt - but with whose weapons, and along what lines?"
 SAU_military.1.a:0 "Buy American: the M1A2 Abrams"
 SAU_military.1.b:0 "Diversify our arms suppliers"
 SAU_military.1.c:0 "Build a domestic arms industry"
 SAU_military.1.d:0 "Expand the National Guard"
 SAU_military.2.t:0 "A Navy for Two Seas"
 SAU_military.2.desc:0 "From the Arabian Gulf to the Red Sea, the Kingdom must guard two long coasts and the world's oil lifeline. What kind of fleet shall we build?"
 SAU_military.2.a:0 "French frigates: the Sawari programme"
 SAU_military.2.b:0 "American ships and training"
 SAU_military.2.c:0 "Coastal defence and patrol boats"
 SAU_military.2.d:0 "Reach for a blue-water fleet"
 SAU_military.3.t:0 "Command of the Skies"
 SAU_military.3.desc:0 "The air force is the first shield of the Kingdom and its sharpest sword. Which path shall the Royal Saudi Air Force follow?"
 SAU_military.3.a:0 "American Eagles: the Peace Sun programme"
 SAU_military.3.b:0 "British jets: the Al Yamamah deal"
 SAU_military.3.c:0 "European power: the Al Salam Typhoon"
 SAU_military.3.d:0 "Air defence first: the Peace Shield"
 SAU_military.12.t:0 "The Posture of the Armed Forces"
 SAU_military.12.desc:0 "With the armed forces re-founded, the Kingdom must set its overall course. How shall we shape the military?"
 SAU_military.12.a:0 "Modernize aggressively with Western help"
 SAU_military.12.b:0 "A balanced, measured build-up"
 SAU_military.12.c:0 "Prioritise internal security and loyalty"
 SAU_military.5.t:0 "The Strategic Deterrent"
 SAU_military.5.desc:0 "The Strategic Missile Force gives the Kingdom a weapon of last resort. What posture shall it take?"
 SAU_military.5.a:0 "Aim the missiles at Tehran"
 SAU_military.5.b:0 "Hold them as a silent deterrent"
 SAU_military.5.c:0 "Expand the missile arsenal"
 SAU_military.6.t:0 "Special Forces Doctrine"
 SAU_military.6.desc:0 "Our special forces are ready. Where shall their edge be turned?"
 SAU_military.6.a:0 "Counter-terrorism at home"
 SAU_military.6.b:0 "Power projection abroad"
 SAU_military.6.c:0 "Train with Western special forces"
 SAU_military.8.t:0 "The Marine Force"
 SAU_military.8.desc:0 "The new Marine force needs a role. What shall it be?"
 SAU_military.8.a:0 "An amphibious assault force"
 SAU_military.8.b:0 "Coastal and island defence"
 SAU_military.8.c:0 "A GCC rapid-reaction role"
 SAU_military.9.t:0 "Peace Sun"
 SAU_military.9.desc:0 "The Peace Sun programme has brought the F-15 Eagle to the Kingdom. How far shall we take it?"
 SAU_military.9.a:0 "Buy the maximum number of F-15s"
 SAU_military.9.b:0 "Keep a balanced air force"
 SAU_military.9.c:0 "Invest in pilot training"
 SAU_military.10.t:0 "The Al Salam Deal"
 SAU_military.10.desc:0 "The Eurofighter Typhoon offers a path beyond American jets. How shall we pursue it?"
 SAU_military.10.a:0 "Commit fully to the Typhoon"
 SAU_military.10.b:0 "Diversify away from Washington"
 SAU_military.10.c:0 "Push for technology transfer"
 SAU_military.11.t:0 "Command of the Skies"
 SAU_military.11.desc:0 "The Air Operations Command unifies the air force. What doctrine shall guide it?"
 SAU_military.11.a:0 "An offensive air doctrine"
 SAU_military.11.b:0 "A defensive air shield"
 SAU_military.11.c:0 "An integrated GCC air command"
 SAU_military.4.t:0 "Choosing the Main Battle Tank"
 SAU_military.4.desc:0 "The army needs a modern main battle tank. From which power shall we buy - or shall we build them at home? The choice shapes whom the Kingdom depends on."
 SAU_military.4.a:0 "American: the M1A2 Abrams"
 SAU_military.4.b:0 "Russian: the T-90"
 SAU_military.4.c:0 "French: the Leclerc"
 SAU_military.4.d:0 "German: the Leopard 2"
 SAU_military.4.e:0 "Build them at home"
 SAU_military.7.t:0 "Choosing the Frigate Supplier"
 SAU_military.7.desc:0 "The navy needs modern frigates to guard two seas. Whose shipyard shall build them - or shall we build our own?"
 SAU_military.7.a:0 "American frigates (MMSC)"
 SAU_military.7.b:0 "Russian frigates (Gorshkov)"
 SAU_military.7.c:0 "French frigates (Sawari)"
 SAU_military.7.d:0 "German frigates (MEKO)"
 SAU_military.7.e:0 "Domestic shipbuilding"
 SAU_military.13.t:0 "Choosing the Self-Propelled Artillery"
 SAU_military.13.desc:0 "The guns must keep pace with the armor. Whose self-propelled artillery shall we field - or shall we build our own?"
 SAU_military.13.a:0 "American: the M109 Paladin"
 SAU_military.13.b:0 "Russian: the 2S19 Msta"
 SAU_military.13.c:0 "French: the CAESAR"
 SAU_military.13.d:0 "German: the PzH 2000"
 SAU_military.13.e:0 "Build them at home"
 SAU_military.14.t:0 "Choosing the Rocket Artillery"
 SAU_military.14.desc:0 "Massed rocket fire can shatter an enemy advance. Whose launchers shall we acquire - or shall we build our own?"
 SAU_military.14.a:0 "American: the M270 MLRS"
 SAU_military.14.b:0 "Russian: the BM-30 Smerch"
 SAU_military.14.c:0 "French: the LRU"
 SAU_military.14.d:0 "German: the MARS II"
 SAU_military.14.e:0 "Build them at home"
 SAU_request_f15:0 "Request the F-15 from the United States"
 SAU_request_f15_desc:0 "Open negotiations with Washington to acquire the F-15 Strike Eagle. If the Americans agree, the §YF-15 Strike Eagle§! focus will unlock.\n\n§RThis is an exclusive choice:§! the first supplier to accept locks in our fighter, and the other three programmes (§YTornado GR4§!, §YPanavia Tornado§!, §YEurofighter Typhoon§!) will be closed for good. Choose wisely."
 SAU_request_typhoon:0 "Request the Eurofighter Typhoon"
 SAU_request_typhoon_desc:0 "Approach the European consortium (Germany) for the Eurofighter Typhoon under the Al Salam programme. If they approve the export, the §YAl Salam: Eurofighter Typhoon§! focus will unlock.\n\n§RThis is an exclusive choice:§! the first supplier to accept locks in our fighter, and the other three programmes (§YF-15 Strike Eagle§!, §YTornado GR4§!, §YPanavia Tornado§!) will be closed for good. Choose wisely."
 SAU_arms.1.t:0 "Saudi Request: the F-15 Strike Eagle"
 SAU_arms.1.d:0 "The Kingdom of Saudi Arabia has formally requested to purchase the F-15 Strike Eagle - our finest export fighter. Riyadh is a key Gulf ally and a major arms customer. Shall we approve the sale?"
 SAU_arms.1.a:0 "Approve the sale to Riyadh"
 SAU_arms.1.b:0 "Decline the request"
 SAU_arms.2.t:0 "Washington Approves the F-15 Deal"
 SAU_arms.2.d:0 "The United States has agreed to sell the F-15 Strike Eagle to the Kingdom. The deal is done - the Royal Saudi Air Force will soon fly the finest American jets."
 SAU_arms.2.a:0 "Excellent news."
 SAU_arms.3.t:0 "Washington Declines"
 SAU_arms.3.d:0 "The United States has declined to sell the F-15 at this time. We may renew our request after a while."
 SAU_arms.3.a:0 "A setback."
 SAU_arms.4.t:0 "Saudi Request: the Eurofighter Typhoon"
 SAU_arms.4.d:0 "Saudi Arabia has requested the Eurofighter Typhoon under the Al Salam programme. As a partner in the consortium, shall Germany approve the export to Riyadh?"
 SAU_arms.4.a:0 "Approve the export"
 SAU_arms.4.b:0 "Decline the request"
 SAU_arms.5.t:0 "The Typhoon Deal is Approved"
 SAU_arms.5.d:0 "The consortium has agreed to export the Eurofighter Typhoon to the Kingdom. The Al Salam programme can now proceed."
 SAU_arms.5.a:0 "Excellent news."
 SAU_arms.6.t:0 "The Typhoon Deal is Declined"
 SAU_arms.6.d:0 "The Europeans have declined to export the Typhoon for now. We may try again later."
 SAU_arms.6.a:0 "A setback."
 SAU_request_tornado:0 "Request the Tornado GR4 from the United Kingdom"
 SAU_request_tornado_desc:0 "Approach London for the Tornado GR4 strike aircraft, the backbone of the historic Al Yamamah programme. If the British agree, the §YTornado GR4§! focus will unlock.\n\n§RThis is an exclusive choice:§! the first supplier to accept locks in our fighter, and the other three programmes (§YF-15 Strike Eagle§!, §YPanavia Tornado§!, §YEurofighter Typhoon§!) will be closed for good. Choose wisely."
 SAU_request_panavia:0 "Request the Panavia Tornado from Italy"
 SAU_request_panavia_desc:0 "Approach Rome for the Panavia Tornado IDS, the multinational strike fighter. If the Italians agree, the §YPanavia Tornado§! focus will unlock.\n\n§RThis is an exclusive choice:§! the first supplier to accept locks in our fighter, and the other three programmes (§YF-15 Strike Eagle§!, §YTornado GR4§!, §YEurofighter Typhoon§!) will be closed for good. Choose wisely."
 SAU_arms.7.t:0 "Saudi Request: the Tornado GR4"
 SAU_arms.7.d:0 "The Kingdom of Saudi Arabia wishes to expand the Al Yamamah programme and purchase the upgraded Tornado GR4. Riyadh has been a loyal customer of British industry for decades. Shall we approve the sale?"
 SAU_arms.7.a:0 "Approve the sale to Riyadh"
 SAU_arms.7.b:0 "Decline the request"
 SAU_arms.8.t:0 "London Approves the Tornado Deal"
 SAU_arms.8.d:0 "The United Kingdom has agreed to supply the Tornado GR4 to the Kingdom under an expanded Al Yamamah agreement. Our strike squadrons will be the envy of the Gulf."
 SAU_arms.8.a:0 "Excellent news."
 SAU_arms.9.t:0 "London Declines"
 SAU_arms.9.d:0 "The United Kingdom has declined to expand the Tornado deal at this time. We may renew our request after a while."
 SAU_arms.9.a:0 "A setback."
 SAU_arms.10.t:0 "Saudi Request: the Panavia Tornado"
 SAU_arms.10.d:0 "Saudi Arabia has requested the Panavia Tornado IDS, the rugged multinational strike aircraft. As a partner in the consortium, shall Italy approve the export to Riyadh?"
 SAU_arms.10.a:0 "Approve the export"
 SAU_arms.10.b:0 "Decline the request"
 SAU_arms.11.t:0 "Rome Approves the Tornado Deal"
 SAU_arms.11.d:0 "Italy has agreed to export the Panavia Tornado IDS to the Kingdom. The consortium welcomes a valued new operator."
 SAU_arms.11.a:0 "Excellent news."
 SAU_arms.12.t:0 "Rome Declines"
 SAU_arms.12.d:0 "Italy has declined to export the Tornado for now. We may try again later."
 SAU_arms.12.a:0 "A setback."
 SAU_reform.1.t:0 "War Games: Lessons of the Gulf War"
 SAU_reform.1.desc:0 "Operation Desert Storm humbled every army that watched it. The Royal Saudi Land Forces performed adequately beside their coalition partners - but the General Staff knows the truth: without American airpower, logistics and command, the Kingdom's army was not ready.\n\nThe war games are over, and the verdict is in. Now the Kingdom must choose the model on which to rebuild its armed forces. Each path makes us stronger in one way and weaker in another - there is no free choice.\n\n§YHover each option to see exactly what it grants and what it costs.§!"
 SAU_reform.1.a:0 "American Training & Partnership"
 SAU_reform.1.b:0 "GCC Collective Defence"
 SAU_reform.1.c:0 "NATO-Style Professionalism"
 SAU_reform.1.d:0 "Domestic Self-Reliance"
 SAU_reform.2.t:0 "National Guard Readiness Drills"
 SAU_reform.2.desc:0 "The Saudi Arabian National Guard must decide what it is truly for. Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.2.a:0 "National Guard: Regime Guard"
 SAU_reform.2.b:0 "National Guard: Tribal Levies"
 SAU_reform.2.c:0 "National Guard: Internal Security"
 SAU_reform.3.t:0 "Abrams Gunnery Programme"
 SAU_reform.3.desc:0 "How shall the armoured corps fight with its new Abrams? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.3.a:0 "Armor: Shock & Breakthrough"
 SAU_reform.3.b:0 "Armor: Combined Arms"
 SAU_reform.3.c:0 "Armor: Defensive Wall"
 SAU_reform.4.t:0 "Live-Fire Artillery Exercise"
 SAU_reform.4.desc:0 "The gunners refine their craft - but in which direction? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.4.a:0 "Artillery: Massed Fires"
 SAU_reform.4.b:0 "Artillery: Precision Fires"
 SAU_reform.4.c:0 "Artillery: Shoot-and-Scoot"
 SAU_reform.5.t:0 "Apache Gunship Training"
 SAU_reform.5.desc:0 "What role should the Apache fleet master? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.5.a:0 "Army Aviation: Tank-Killers"
 SAU_reform.5.b:0 "Army Aviation: Close Support"
 SAU_reform.5.c:0 "Army Aviation: Recon & Raids"
 SAU_reform.6.t:0 "Special Forces Selection Course"
 SAU_reform.6.desc:0 "What shall the special forces be honed into? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.6.a:0 "Special Forces: Counter-Terror"
 SAU_reform.6.b:0 "Special Forces: Deep Raiders"
 SAU_reform.6.c:0 "Special Forces: Reconnaissance"
 SAU_reform.7.t:0 "Combined Fleet Exercise"
 SAU_reform.7.desc:0 "What mission should the Royal Saudi Navy be built around? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.7.a:0 "Navy: Gulf Sea Control"
 SAU_reform.7.b:0 "Navy: Blue-Water Ambition"
 SAU_reform.7.c:0 "Navy: Coastal Defence"
 SAU_reform.8.t:0 "Red Flag Air Combat Training"
 SAU_reform.8.desc:0 "How should Saudi fighter pilots be taught to win? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.8.a:0 "Air: Dogfight Mastery"
 SAU_reform.8.b:0 "Air: Beyond Visual Range"
 SAU_reform.8.c:0 "Air: Air Defence Doctrine"
 SAU_reform.9.t:0 "AWACS Battle Management Training"
 SAU_reform.9.desc:0 "How shall the E-3 fleet shape the battle? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.9.a:0 "AWACS: Air Battle Control"
 SAU_reform.9.b:0 "AWACS: Joint Ground Link"
 SAU_reform.9.c:0 "AWACS: Early Warning Net"
 SAU_reform.10.t:0 "Precision Strike Doctrine Course"
 SAU_reform.10.desc:0 "How will the Kingdom wield its smart weapons? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.10.a:0 "PGM: Precision Strike"
 SAU_reform.10.b:0 "PGM: Defence Suppression"
 SAU_reform.10.c:0 "PGM: Battlefield Interdiction"
 SAU_reform.11.t:0 "Stage I: Launch the Reform Programme"
 SAU_reform.11.desc:0 "The reform begins. How hard shall we push? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.11.a:0 "Reform: Crash Programme"
 SAU_reform.11.b:0 "Reform: Methodical Build-Up"
 SAU_reform.11.c:0 "Reform: Foreign Contractors"
 SAU_reform.12.t:0 "Stage II: Modernize the Combat Arms"
 SAU_reform.12.desc:0 "Which combat arm leads the modern force? Each path is a lasting trade-off - it makes us stronger one way and weaker another.\n\n§YHover an option to see exactly what it grants and costs.§!"
 SAU_reform.12.a:0 "Combat Arms: Armored Fist"
 SAU_reform.12.b:0 "Combat Arms: Firepower"
 SAU_reform.12.c:0 "Combat Arms: Professional Infantry"
 SAU_reform.13.t:0 "Stage III: Achieve a Fully Modern Force"
