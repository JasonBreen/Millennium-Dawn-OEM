 SAU_events.84.t:0 "A Project Misses Its Deadline"
 SAU_events.84.d:0 "Another of the Vision's flagship projects has blown past its deadline unfinished. The contractors are paid off, the cranes come down, and the press has its headline. Capital flees, and the doubts spread a little further."
 SAU_events.84.a:0 "Write it off."
 SAU_vision2030_category:0 "Vision 2030 Projects"
 SAU_vision_2030_expectations:0 "Vision 2030: The Promise"
 SAU_vision_2030_expectations_desc:0 "The megaprojects are announced with the eyes of the world upon them. Capital pours in and confidence runs high, but a promise this large hangs heavy over the budget and the leadership until it is kept."
 SAU_vision_2030_progress:0 "Vision 2030: Taking Shape"
 SAU_vision_2030_progress_desc:0 "The cranes are up across the Kingdom and the first projects have opened their doors. The doubters have grown quieter, and the Vision is beginning to look like a plan rather than a fantasy."
 SAU_vision_2030_delivered:0 "Vision 2030: Delivered"
 SAU_vision_2030_delivered_desc:0 "Against every prediction, the Kingdom has built its future in concrete and glass. NEOM glitters on the Red Sea, Riyadh is remade, and tourists arrive where only oil derricks once stood. Saudi Arabia no longer runs on crude alone."
 SAU_vision_2030_white_elephant:0 "Vision 2030: The White Elephants"
 SAU_vision_2030_white_elephant_desc:0 "The deadline came and the Vision did not. Half-finished towers rust in the desert, the promised cities stand empty, and hundreds of billions have little to show. The critics who called it a fantasy were right, and everyone knows it."
 SAU_proj_neom:0 "Build NEOM"
 SAU_proj_neom_desc:0 "The half-trillion-dollar flagship: a blank-slate region on the Red Sea coast meant to embody the post-oil future, larger than many countries. §Y(Cost: $150 billion, build ~730 days)§! §RDeadline: [?SAU_remain_neom|0] days left.§! §HTies up 10 civilian factories while under construction.§!"
 SAU_proj_neom_done_tt:0 "[SAU.GetFlag]§GNEOM's first districts rise from the desert. The showcase of the new Kingdom has broken ground.§! "
 SAU_proj_the_line:0 "Build THE LINE"
 SAU_proj_the_line_desc:0 "A 170-kilometer linear city, two mirrored walls 500 meters tall, no cars and no streets. The most audacious urban concept ever attempted. §Y(Cost: $200 billion, build ~900 days)§! §RDeadline: [?SAU_remain_the_line|0] days left.§! §HTies up 12 civilian factories while under construction.§!"
 SAU_proj_the_line_done_tt:0 "[SAU.GetFlag]§GThe first segments of THE LINE stand mirrored against the sky. The world is not sure whether to laugh or marvel.§! "
 SAU_proj_oxagon:0 "Build Oxagon"
 SAU_proj_oxagon_desc:0 "The world's largest floating industrial complex, a port and manufacturing hub at NEOM built around a clean-energy spine. §Y(Cost: $80 billion, build ~540 days)§! §RDeadline: [?SAU_remain_oxagon|0] days left.§! §HTies up 8 civilian factories while under construction.§!"
 SAU_proj_oxagon_done_tt:0 "[SAU.GetFlag]§GOxagon's port and factories come online, anchoring NEOM's industrial base.§! "
 SAU_proj_trojena:0 "Build Trojena"
 SAU_proj_trojena_desc:0 "A year-round mountain resort in the NEOM highlands, complete with outdoor skiing in the Arabian desert. §Y(Cost: $60 billion, build ~450 days)§! §RDeadline: [?SAU_remain_trojena|0] days left.§! §HTies up 5 civilian factories while under construction.§!"
 SAU_proj_trojena_done_tt:0 "[SAU.GetFlag]§GTrojena opens its slopes. Skiing in Arabia is no longer a joke.§! "
 SAU_proj_sindalah:0 "Build Sindalah"
 SAU_proj_sindalah_desc:0 "NEOM's luxury island in the Red Sea, the project's first piece to actually open to visitors. §Y(Cost: $40 billion, build ~270 days)§! §RDeadline: [?SAU_remain_sindalah|0] days left.§! §HTies up 4 civilian factories while under construction.§!"
 SAU_proj_sindalah_done_tt:0 "[SAU.GetFlag]§GSindalah welcomes its first yachts. NEOM has something to show the world at last.§! "
 SAU_proj_red_sea:0 "Build The Red Sea Project"
 SAU_proj_red_sea_desc:0 "An ultra-luxury tourism destination across dozens of pristine islands, built to a strict environmental standard. §Y(Cost: $80 billion, build ~540 days)§! §RDeadline: [?SAU_remain_red_sea|0] days left.§! §HTies up 7 civilian factories while under construction.§!"
 SAU_proj_red_sea_done_tt:0 "[SAU.GetFlag]§GThe Red Sea Project opens its first resorts. The Kingdom now sells its coastline, not just its oil.§! "
 SAU_proj_amaala:0 "Build Amaala"
 SAU_proj_amaala_desc:0 "A wellness and ultra-luxury tourism enclave on the northwestern Red Sea coast, the 'Riviera of the Middle East'. §Y(Cost: $50 billion, build ~450 days)§! §RDeadline: [?SAU_remain_amaala|0] days left.§! §HTies up 5 civilian factories while under construction.§!"
 SAU_proj_amaala_done_tt:0 "[SAU.GetFlag]§GAmaala receives its first guests. Wellness tourism takes root on the Saudi coast.§! "
 SAU_proj_qiddiya:0 "Build Qiddiya"
 SAU_proj_qiddiya_desc:0 "An entertainment, sports, and culture megacity outside Riyadh, with theme parks, stadiums, and a motorsport circuit. §Y(Cost: $80 billion, build ~540 days)§! §RDeadline: [?SAU_remain_qiddiya|0] days left.§! §HTies up 8 civilian factories while under construction.§!"
 SAU_proj_qiddiya_done_tt:0 "[SAU.GetFlag]§GQiddiya throws open its gates. Riyadh finally has somewhere to play.§! "
 SAU_proj_diriyah:0 "Build Diriyah"
 SAU_proj_diriyah_desc:0 "The restoration of the Kingdom's birthplace into a heritage and cultural district around the mudbrick city of At-Turaif. §Y(Cost: $50 billion, build ~450 days)§! §RDeadline: [?SAU_remain_diriyah|0] days left.§! §HTies up 5 civilian factories while under construction.§!"
 SAU_proj_diriyah_done_tt:0 "[SAU.GetFlag]§GDiriyah Gate opens. The Kingdom puts its own history on display.§! "
 SAU_proj_alula:0 "Build AlUla"
 SAU_proj_alula_desc:0 "The development of AlUla's ancient Nabataean tombs and oasis into a flagship cultural and heritage destination. §Y(Cost: $50 billion, build ~450 days)§! §RDeadline: [?SAU_remain_alula|0] days left.§! §HTies up 5 civilian factories while under construction.§!"
 SAU_proj_alula_done_tt:0 "[SAU.GetFlag]§GAlUla welcomes the world to Hegra. Saudi heritage tourism comes of age.§! "
 SAU_proj_new_murabba:0 "Build New Murabba"
 SAU_proj_new_murabba_desc:0 "A new downtown for Riyadh built around the Mukaab, a cube-shaped tower vast enough to hold twenty Empire State Buildings. §Y(Cost: $100 billion, build ~730 days)§! §RDeadline: [?SAU_remain_new_murabba|0] days left.§! §HTies up 10 civilian factories while under construction.§!"
 SAU_proj_new_murabba_done_tt:0 "[SAU.GetFlag]§GThe Mukaab rises over New Murabba. Riyadh has its own impossible landmark.§! "
 SAU_proj_king_salman_park:0 "Build King Salman Park"
 SAU_proj_king_salman_park_desc:0 "One of the world's largest urban parks, a vast green heart for the Saudi capital. §Y(Cost: $40 billion, build ~270 days)§! §RDeadline: [?SAU_remain_king_salman_park|0] days left.§! §HTies up 4 civilian factories while under construction.§!"
 SAU_proj_king_salman_park_done_tt:0 "[SAU.GetFlag]§GKing Salman Park opens its gates. Riyadh breathes a little greener.§! "
 SAU_proj_sports_blvd:0 "Build Sports Boulevard"
 SAU_proj_sports_blvd_desc:0 "A 135-kilometer recreational corridor across Riyadh for cycling, running, and riding. §Y(Cost: $30 billion, build ~270 days)§! §RDeadline: [?SAU_remain_sports_blvd|0] days left.§! §HTies up 4 civilian factories while under construction.§!"
 SAU_proj_sports_blvd_done_tt:0 "[SAU.GetFlag]§GThe Sports Boulevard opens. The capital takes to its bicycles.§! "
 SAU_proj_green_riyadh:0 "Build Green Riyadh"
 SAU_proj_green_riyadh_desc:0 "A program to plant millions of trees across the capital, cooling the city and softening the desert. §Y(Cost: $30 billion, build ~365 days)§! §RDeadline: [?SAU_remain_green_riyadh|0] days left.§! §HTies up 4 civilian factories while under construction.§!"
 SAU_proj_green_riyadh_done_tt:0 "[SAU.GetFlag]§GGreen Riyadh's saplings take hold. The capital's air begins to change.§! "
 SAU_proj_jeddah_central:0 "Build Jeddah Central"
 SAU_proj_jeddah_central_desc:0 "The redevelopment of Jeddah's waterfront into a modern downtown, with a stadium, marina, and cultural district. §Y(Cost: $60 billion, build ~450 days)§! §RDeadline: [?SAU_remain_jeddah_central|0] days left.§! §HTies up 6 civilian factories while under construction.§!"
 SAU_proj_jeddah_central_done_tt:0 "[SAU.GetFlag]§GJeddah Central reshapes the old port city's heart. The Red Sea gateway is reborn.§! "
 SAU_proj_soudah_peaks:0 "Build Soudah Peaks"
 SAU_proj_soudah_peaks_desc:0 "A mountain tourism destination atop the highest peaks of Asir, trading desert heat for cool green heights. §Y(Cost: $40 billion, build ~450 days)§! §RDeadline: [?SAU_remain_soudah_peaks|0] days left.§! §HTies up 5 civilian factories while under construction.§!"
 SAU_proj_soudah_peaks_done_tt:0 "[SAU.GetFlag]§GSoudah Peaks opens above the clouds. Asir becomes the Kingdom's summer retreat.§! "
 SAU_proj_roshn:0 "Build ROSHN"
 SAU_proj_roshn_desc:0 "The national housing developer building entire integrated communities to put millions of Saudis in modern homes. §Y(Cost: $60 billion, build ~365 days)§! §RDeadline: [?SAU_remain_roshn|0] days left.§! §HTies up 7 civilian factories while under construction.§!"
 SAU_proj_roshn_done_tt:0 "[SAU.GetFlag]§GROSHN's first communities are handed over. A generation of Saudis gets the keys.§! "
 SAU_v2030_expect_tt:0 "§YThe megaprojects are announced and the world is watching. Capital and confidence flow, but the promise weighs on the budget and the leadership. §RDeliver the projects, or this turns to backlash.§!"
 SAU_v2030_progress_tt:0 "§GVision 2030 is taking shape. The cranes are up and the doubters are quieter.§!"
 SAU_v2030_delivered_tt:0 "§GVision 2030 is delivered. The Kingdom has remade itself in concrete and glass, and the post-oil future has a skyline.§!"
 SAU_v2030_fail_tt:0 "§RThe white elephants of Vision 2030. Half-built towers and empty promises drain the treasury and the Kingdom's credibility. The critics were right.§!"
 SAU_events.82.t:0 "Vision 2030 Delivered"
 SAU_events.82.d:0 "The deadline arrives, and against every prediction the Kingdom has delivered. NEOM glitters on the Red Sea, Riyadh has been remade, and tourists arrive where only oil derricks once stood. Saudi Arabia has bought itself a future that does not run on crude."
 SAU_events.82.a:0 "A future built in concrete and glass."
 SAU_events.83.t:0 "The White Elephants"
 SAU_events.83.d:0 "The year is 2030, and the Vision is mostly unbuilt. Half-finished towers rust in the desert, the promised cities stand empty, and the hundreds of billions spent have little to show. The critics who called it a fantasy are taking their victory lap, and the people are listening."
 SAU_events.83.a:0 "The promises came due."
 SAU_recog_grant_tt:0 "[FROM.GetFlag]§GThey formally grant recognition to the State of Palestine, raising its international standing.§!"
 SAU_isr_talks_dead_tt:0 "§RThe talks are refused before they begin. Only the path of collapse remains.§!"
 SAU_isr_talks_alive_tt:0 "§RThe talks with Israel have not collapsed.§!"
 SAU_events.79.t:0 "An Overture from Riyadh"
 SAU_events.79.d:0 "Through Washington and Amman comes word that Saudi Arabia is ready to discuss normalization, openly and at the highest level. The price will be steep and the talks will be watched by the whole world. But no Arab hand this large has ever been extended."
 SAU_events.79.a:0 "Open the talks."
 SAU_events.79.b:0 "Nothing to discuss."
 SAU_events.80.t:0 "Saudi-Israeli Talks Begin"
 SAU_events.80.d:0 "Riyadh and Tel Aviv have confirmed it: formal talks on normalization of relations have begun. Delegations are already in the air. Every chancellery on Earth is redrawing its assumptions about the Middle East, and every enemy of the deal is starting its own clock."
 SAU_events.80.a:0 "The unthinkable, scheduled."
 SAU_events.81.t:0 "Israel Refuses the Talks"
 SAU_events.81.d:0 "Tel Aviv has declined to even open negotiations. The overture is dead on arrival, and the Kingdom's hand, extended before the whole world, hangs in the air. There will be no deal in this generation."
 SAU_events.81.a:0 "Their refusal is their answer."
 SAU_isr_unlock_backchannel_tt:0 "§HOur diplomats prepare the ground in third capitals. Israel is more likely to accept the Backchannel track (§G+10§H).§!"
 SAU_isr_unlock_price_tt:0 "§HThe Kingdom builds Arab and international backing for the initiative. Israel is more likely to accept the Arab Peace Initiative track (§G+10§H).§!"
 SAU_isr_unlock_sweeten_tt:0 "§HThe investment package is drawn up in detail. Israel is more likely to accept the Sweeten the Deal track (§G+10§H).§!"
 SAU_isr_unlock_aid_tt:0 "§YUnlocks the repeatable Palestinian Aid Package decision.§!"
 SAU_isr_unlock_recognition_tt:0 "§YUnlocks the Recognition Drive decision: lobby world capitals to recognize Palestine.§!"
 SAU_isr_us_mediation_tt:0 "§HWashington joins the talks as guarantor. Israel is noticeably more likely to accept each track.§!"
 SAU_isr_talks_clock:0 "Conclude the Talks with Israel"
 SAU_isr_talks_clock_desc:0 "From the moment Israel agrees to talk, the window is 120 days. Israel must accept the Arab Peace Initiative and at least one other track before patience, politics, and the region's enemies close it."
 SAU_isr_talks_backchannel:0 "Open the Backchannel"
 SAU_isr_talks_backchannel_desc:0 "Quiet men in third countries sound out what Tel Aviv might accept before either side says anything aloud."
 SAU_isr_talks_palestine:0 "Offer the Arab Peace Initiative"
 SAU_isr_talks_palestine_desc:0 "Put the 2002 initiative on the table in writing: full normalization with the Arab world in exchange for an independent Palestinian state on the 1967 lines."
 SAU_isr_talks_sweeten:0 "Sweeten the Deal"
 SAU_isr_talks_sweeten_desc:0 "Investment funds, open skies, and access to the Gulf's largest market. Show Tel Aviv what peace is worth."
 SAU_isr_talks_us_mediation:0 "Bring In Washington"
 SAU_isr_talks_us_mediation_desc:0 "Ask the United States to stand behind the talks as guarantor. Israel listens differently when Washington is in the room."
 SAU_pal_aid_package:0 "Palestinian Aid Package"
 SAU_pal_aid_package_desc:0 "Saudi money keeps the lights on in Ramallah: salaries, hospitals, and reconstruction, delivered quarter by quarter."
 SAU_pal_recognition_drive:0 "Recognition Drive: [FROM.GetFlag][FROM.GetName]"
 SAU_pal_recognition_drive_desc:0 "Lean on [FROM.GetName] with every tool of Saudi diplomacy: recognize the State of Palestine."
 SAU_events.76.t:0 "The Window Closes"
 SAU_events.76.d:0 "The talks with Israel have run out of time. Too many questions stayed open too long, and the moment has passed. The delegations pack quietly, and the old lines return to the map."
 SAU_events.76.a:0 "The moment has passed."
 SAU_events.77.t:0 "Breakthrough in the Talks"
 SAU_events.77.d:0 "Israel has accepted enough of our terms to make the deal real. What remains is the signing, and the history books."
 SAU_events.77.a:0 "Prepare the accords."
 SAU_events.78.t:0 "A Request from Riyadh"
 SAU_events.78.d:0 "Saudi Arabia formally asks us to recognize the State of Palestine. Riyadh's friendship, and its markets, lean on the answer. Israel will not thank us for saying yes."
 SAU_events.78.a:0 "Recognize the State of Palestine."
 SAU_events.78.b:0 "Our position is unchanged."
 SAU_recognized_palestine:0 "Recognized Palestine"
 SAU_recognition_anger:0 "Recognized Palestinian Statehood"
 SAU_Normalzation_with_zionist:0 "The Israeli Question"
 SAU_Normalzation_with_zionist_desc:0 "Every Arab capital has an answer to the Israeli question; none agree. Riyadh must now choose its own: peace without conditions, peace with a price, or no peace at all."
 SAU_Normalzation_with_zionist_4:0 "Normalization Without Conditions"
 SAU_Normalzation_with_zionist_4_desc:0 "Recognize Israel today and ask for nothing in return. The Americans will applaud, the markets will soar, and the Arab street will never forgive us."
 SAU_Normalzation_with_zionist_3:0 "Normalization with Conditions"
 SAU_Normalzation_with_zionist_3_desc:0 "Riyadh's price has not changed since the Arab Peace Initiative: recognition for statehood. If Israel wants the Kingdom's hand, it will accept an independent Palestine."
 SAU_Normalzation_with_zionist_2:0 "No Peace Without Palestine"
 SAU_Normalzation_with_zionist_2_desc:0 "There will be no embassy in Tel Aviv while Palestine remains occupied. The Kingdom holds the line the Arab world drew in 2002."
 SAU_Normalzation_with_zionist_11:0 "Open the Backchannel"
 SAU_Normalzation_with_zionist_11_desc:0 "Quiet men in third countries, deniable and patient, sound out what Tel Aviv might accept before either side says anything aloud."
 SAU_Normalzation_with_zionist_12:0 "The Arab Peace Initiative"
 SAU_Normalzation_with_zionist_12_desc:0 "The Kingdom's own plan, offered at Beirut in 2002 and never withdrawn: full normalization with the entire Arab world in exchange for an independent Palestine on the 1967 lines. Riyadh puts it back on the table, formally and in writing."
 SAU_Normalzation_with_zionist_13:0 "Sweeten the Deal"
 SAU_Normalzation_with_zionist_13_desc:0 "Investment funds, technology corridors, and open skies. Riyadh shows Tel Aviv what peace with the Gulf's largest economy is worth."
 SAU_Normalzation_with_zionist_15:0 "The Riyadh Accords"
 SAU_Normalzation_with_zionist_15_desc:0 "Israel has accepted the Arab Peace Initiative. Recognition for statehood on the 1967 lines, with the new Palestine guaranteed by Saudi Arabia and Jordan: the deal of the century, signed in Riyadh."
 SAU_Normalzation_with_zionist_16:0 "Embassies and Trade"
 SAU_Normalzation_with_zionist_16_desc:0 "Flights, trade missions, and capital flow between Riyadh and Tel Aviv. Peace begins to pay for itself."
 SAU_Normalzation_with_zionist_17:0 "Silicon and Sand"
 SAU_Normalzation_with_zionist_17_desc:0 "Israeli technology and Saudi capital make natural partners. Joint ventures in cyber, water, and agritech take root in both deserts."
 SAU_Normalzation_with_zionist_14:0 "The Talks Collapse"
 SAU_Normalzation_with_zionist_14_desc:0 "Israel would not pay the price, and Riyadh would not lower it. The delegations fly home, and the question returns to its old answer."
 SAU_Normalzation_with_zionist_18:0 "Double Down on Palestine"
 SAU_Normalzation_with_zionist_18_desc:0 "If Israel will not grant a state, the Kingdom will build one anyway: money, institutions, and Saudi weight behind Ramallah."
 SAU_Normalzation_with_zionist_19:0 "Rally the Arab League"
 SAU_Normalzation_with_zionist_19_desc:0 "The failed talks proved the point to every wavering capital. Riyadh gathers the League behind a single line: no normalization without Palestine."
 SAU_Normalzation_with_zionist_20:0 "The Fate of Palestine"
 SAU_Normalzation_with_zionist_20_desc:0 "Whether by treaty or by defiance, the Kingdom has bound itself to Palestine's future. The Custodian of the Two Holy Mosques does not abandon Jerusalem."
 SAU_Normalzation_with_zionist_5:0 "Champion the Palestinian Cause"
 SAU_Normalzation_with_zionist_5_desc:0 "Saudi money keeps the lights on in Ramallah and the cause alive in every Arab capital."
 SAU_Normalzation_with_zionist_6:0 "Strengthen the Resistance"
 SAU_Normalzation_with_zionist_6_desc:0 "The factions that resist occupation will not want for funds or friends while Riyadh stands behind them."
 SAU_Normalzation_with_zionist_7:0 "Boycott Israeli Goods"
 SAU_Normalzation_with_zionist_7_desc:0 "Not a riyal of Saudi money will touch an Israeli shelf. The Kingdom's market closes its doors."
 SAU_Normalzation_with_zionist_8:0 "Pressure the Normalizers"
 SAU_Normalzation_with_zionist_8_desc:0 "Any Arab government tempted by Tel Aviv's handshake will feel Riyadh's displeasure first. The ranks hold because the Kingdom holds them."
 SAU_Normalzation_with_zionist_9:0 "An Arab Consensus"
 SAU_Normalzation_with_zionist_9_desc:0 "From Rabat to Baghdad, the Kingdom forges one Arab voice on Israel: no recognition, no relations, no exceptions."
 SAU_Normalzation_with_zionist_10:0 "The Cause Above All"
 SAU_Normalzation_with_zionist_10_desc:0 "The Kingdom makes Palestine the measure of its leadership. Guardian of the Holy Mosques, guardian of the cause."
 SAU_no_norm_tt:0 "§RNormalization with Israel has not already occurred.§!"
 SAU_isr_success_tt:0 "§GAll three tracks are answered, Israel has accepted the Arab Peace Initiative (the two-state solution on the 1967 lines), and accepted at least one other track.§!"
 SAU_isr_fail_tt:0 "§RAll three tracks are answered, and Israel rejected the two-state solution or accepted too little.§!"
 SAU_isr_question_tt:0 "§YOpens three paths on Israel: unconditional normalization, normalization in exchange for a Palestinian state, or refusal.§!"
 SAU_isr_uncond_tt:0 "[ISR.GetFlag]§RWe recognize Israel with no conditions. Relations and trade open at once. §!§RThe Arab world calls it betrayal, and our own streets agree.§! §YLocks all support for Palestinian militias.§!"
 SAU_isr_cond_tt:0 "[ISR.GetFlag]§YRiyadh proposes opening normalization talks. If Israel agrees, the negotiation decisions unlock at once and §Rthe 120-day clock starts immediately§Y. Israel must accept the Arab Peace Initiative track plus one other before it runs out.§!"
 SAU_isr_track_tt:0 "[ISR.GetFlag]§YIsrael will weigh our approach and answer.§!"
 SAU_isr_price_tt:0 "[PAL.GetFlag]§HWe formally restate the Arab Peace Initiative: normalization in exchange for an independent Palestine on the 1967 lines.§!"
 SAU_isr_accords_tt:0 "[ISR.GetFlag][PAL.GetFlag]§GRecognition for statehood on the 1967 lines. Israel and the Kingdom open relations, and Palestine is released from Israeli authority as a §Yfully independent state§G under Saudi and Jordanian guarantee.§! §YLocks all support for Palestinian militias.§!"
 SAU_isr_trade_tt:0 "[ISR.GetFlag]§HTrade agreement and cross-investment with Israel.§!"
 SAU_isr_collapse_tt:0 "[ISR.GetFlag]§RThe talks are over. The refusal path reopens, and the Kingdom's position hardens.§!"
 SAU_isr_double_down_tt:0 "[PAL.GetFlag]§HSaudi money and influence flow into Palestine.§!"
 SAU_isr_rally_tt:0 "[ISR.GetFlag]§HEvery Arab League capital cools toward Israel.§!"
 SAU_isr_fate_tt:0 "[PAL.GetFlag]§HPalestine is rebuilt under Saudi patronage, and guaranteed by Riyadh if no peace was signed.§!"
 SAU_isr_refuse_tt:0 "[PAL.GetFlag]§HThe Kingdom publicly forecloses normalization. Palestine knows who stands with it.§!"
 SAU_isr_champion_tt:0 "[PAL.GetFlag]§HSaudi funding steadies Palestine and deepens our influence there.§!"
 SAU_isr_resistance_tt:0 "§HOur support for the Palestinian factions deepens. The militia decisions remain at our disposal.§!"
 SAU_isr_boycott_tt:0 "[ISR.GetFlag]§RThe Saudi market closes to Israel.§!"
 SAU_isr_pressure_tt:0 "§HArab capitals feel Riyadh's weight, and fall in line behind the cause.§!"
 SAU_isr_consensus_tt:0 "[ISR.GetFlag]§HThe Arab League hardens against Israel as one bloc.§!"
 SAU_isr_cause_tt:0 "[PAL.GetFlag]§HThe Kingdom binds its prestige to Palestine and guarantees its survival.§!"
 SAU_israel_tech_partnership:0 "Silicon and Sand"
 SAU_israel_tech_partnership_desc:0 "Saudi capital and Israeli technology, joined by the Riyadh Accords, push research forward in both kingdoms of the desert."
 SAU_custodian_of_the_cause:0 "Custodian of the Cause"
 SAU_custodian_of_the_cause_desc:0 "Riyadh has made Palestine the measure of its leadership of the Arab world, and the Arab street answers with loyalty."
 SAU_israel_normalization:0 "Normalization of Relations"
 SAU_betrayed_palestine:0 "Abandoned the Palestinian Cause"
 SAU_two_state_champion:0 "Champion of the Two-State Solution"
 SAU_talks_collapsed:0 "Failed Normalization Talks"
 SAU_boycott_israel:0 "Boycott"
 SAU_arab_consensus:0 "Arab Consensus Against Normalization"
 SAU_cause_solidarity:0 "Solidarity with Palestine"
 SAU_events.68.t:0 "A Quiet Approach from Riyadh"
 SAU_events.68.d:0 "Through intermediaries in a third capital, Saudi Arabia is asking whether Israel would entertain talks on normalization. No conditions have been named yet. The question is whether to listen."
 SAU_events.68.a:0 "Hear them out."
 SAU_events.68.b:0 "Nothing to discuss."
 SAU_events.71.t:0 "The Arab Peace Initiative"
 SAU_events.71.d:0 "Saudi Arabia has formally offered the Arab Peace Initiative: recognition, embassies, trade, and peace with the whole Arab world, in exchange for an independent Palestinian state on the 1967 lines. It is the largest prize ever offered, at the price Israel has refused for decades."
 SAU_events.71.a:0 "Accept the 1967 lines. A state for a peace."
 SAU_events.71.b:0 "The 1967 lines are impossible."
 SAU_events.72.t:0 "The Wealth of the Gulf"
 SAU_events.72.d:0 "Saudi negotiators sweeten the table: investment funds, open skies, technology corridors, and access to the Gulf's largest market. Peace with Riyadh would pay like no peace before it."
 SAU_events.72.a:0 "Take the deal."
 SAU_events.72.b:0 "Money is not the issue."
 SAU_events.69.t:0 "Positive Signals from Tel Aviv"
 SAU_events.69.d:0 "Israel's answer has come back warmer than expected. The track holds, and the talks inch forward."
 SAU_events.69.a:0 "Progress."
 SAU_events.70.t:0 "A Cold Reply"
 SAU_events.70.d:0 "Israel's answer has come back curt and cold. The track has stalled, and the talks dim with it."
 SAU_events.70.a:0 "Disappointing."
 SAU_events.73.t:0 "The Riyadh Accords"
 SAU_events.73.d:0 "Saudi Arabia and Israel have signed the Riyadh Accords: full normalization of relations in exchange for Israeli acceptance of an independent Palestinian state on the 1967 lines, guaranteed by Saudi Arabia and Jordan. The Arab Peace Initiative, dismissed for a generation, has redrawn the map of the Middle East in a single afternoon."
 SAU_events.73.a:0 "Peace for a state. History."
 SAU_events.74.t:0 "Saudi-Israeli Talks Collapse"
 SAU_events.74.d:0 "The talks between Riyadh and Tel Aviv have ended without agreement. Israel would not accept a Palestinian state; Saudi Arabia would not drop the demand. The boldest diplomatic opening in a generation closes with a door slamming."
 SAU_events.74.a:0 "The old lines return."
 SAU_events.75.t:0 "Saudi Arabia Recognizes Israel"
 SAU_events.75.d:0 "Without conditions, without a Palestinian state, and without warning, Saudi Arabia has recognized Israel and opened full relations. Washington celebrates, Tel Aviv exults, and the Arab street burns. The Custodian of the Two Holy Mosques has made the gamble of the century."
 SAU_events.75.a:0 "The gamble of the century."
 SAU_events.66.t:0 "Iran Seals the Strait of Hormuz"
 SAU_events.66.d:0 "Iranian mines, missile batteries, and fast-attack craft have closed the Strait of Hormuz to all shipping. A fifth of the world's oil now sits behind a wall of fire, tanker rates have gone vertical, and every economy on Earth is about to feel the narrowest waterway in the world."
 SAU_events.66.a:0 "The world holds its breath."
 SAU_events.67.t:0 "The Beijing Agreement"
 SAU_events.67.d:0 "In a ceremony few believed possible, Saudi Arabia and Iran have signed an agreement in Beijing restoring diplomatic relations after years of rivalry. Embassies will reopen and the proxy wars are to quiet. China brokered the deal, and the message to Washington is unmistakable: there is a new mediator in the Middle East."
 SAU_events.67.a:0 "A handshake in Beijing."
 SAU_events.61.t:0 "Lebanese Army Moves Against Hezbollah"
 SAU_events.61.d:0 "Lebanese Army columns are rolling south as Beirut moves to restore state authority over southern Lebanon. After decades of living beside a state within the state, the government has ordered its rebuilt army to disarm Hezbollah by force. Gulf capitals applaud; Tehran calls it treason against the resistance."
 SAU_events.61.a:0 "Order returns to the south."
 SAU_events.62.t:0 "The Arab Shield Rises"
 SAU_events.62.d:0 "In Riyadh, Saudi Arabia has proclaimed the Arab Shield, a collective defense alliance open to every Arab League state. Its founders call it an Arab answer to an age of foreign storms: an attack on one member is to be answered by all. The region's capitals now weigh the price of standing inside the Shield, or outside it."
 SAU_events.62.a:0 "A shield over the Arabs."
 SAU_events.63.t:0 "Dossier Exposes Iran's Hand in Yemen"
 SAU_events.63.d:0 "Saudi Arabia has laid before the Arab League a dossier of missile fragments, shipping manifests, and intercepted communications tracing the Houthi arsenal to Iran. Arab capitals are responding with uncommon unity, and Tehran's denials are finding few listeners."
 SAU_events.63.a:0 "The evidence speaks."
 SAU_events.64.t:0 "Protests Sweep the Axis of Resistance"
 SAU_events.64.d:0 "From Tehran to Beirut, crowds are in the streets against the governments of the Axis of Resistance. The protesters' grievances are local, but their funding, observers note, has a distinctly Gulf accent. The Axis blames foreign hands; the foreign hands deny everything."
 SAU_events.64.a:0 "The streets are restless."
 SAU_events.65.t:0 "The Mecca Summit"
 SAU_events.65.d:0 "The Islamic world has gathered in its holiest city at Saudi invitation, with Iran's delegation seated among the rest. Whatever is decided behind closed doors, the image is unmistakable: when the Ummah assembles, it assembles in Mecca, and Riyadh sits at the head of the table."
 SAU_events.65.a:0 "The Ummah has one address."
 SAU_baath_gone_tt:0 "§RRequires Saddam Falls, or the Ba'athists no longer ruling Iraq.§!"
 SAU_arm_lebanese_army:0 "Arm the Lebanese Army"
 SAU_arm_lebanese_army_desc:0 "Saudi rifles and Saudi training, shipment by shipment, rebuild the Lebanese Army into a force that answers to Beirut, not to Hezbollah."
 SAU_laf_strength_tt:0 "§HThe Lebanese Army grows stronger. Armament shipments delivered: §Y[?SAU_laf_strength|0]§H of §Y3§H needed before Beirut will consider moving on Hezbollah.§!"
 SAU_unleash_laf:0 "Unleash the Lebanese Army"
 SAU_unleash_laf_desc:0 "The army is rebuilt, paid, and armed. Now Riyadh asks Beirut for the only repayment that matters: disarm Hezbollah, by force if needed."
 SAU_laf_armed_req_tt:0 "§RThe Lebanese Army must receive at least 3 armament shipments.§!"
 SAU_laf_offensive:0 "Operation Cedar Resolve"
 SAU_laf_offensive_desc:0 "Flush with Saudi arms and money, the Lebanese Army takes the field against Hezbollah with a confidence it has not felt in decades."
 SAU_events.60.t:0 "A Mandate from Riyadh"
 SAU_events.60.d:0 "Saudi money rebuilt our army; Saudi rifles fill its armories. Now Riyadh asks the price: move against Hezbollah and break its state within the state. The army is readier than it has ever been. Whether Lebanon survives the attempt is another question."
 SAU_events.60.a:0 "The army moves on Hezbollah."
 SAU_events.60.b:0 "Lebanon will not bleed for Riyadh."
 SAU_unif_command_control_tt:0 "§HA unified command and control structure is established across the GCC armed forces.§!"
 SAU_unif_increase_autonomy_tt:0 "§HGreater regional autonomy eases sectarian grievances. Domestic influence grows and radicalization recedes.§!"
 SAU_unif_cross_border_tt:0 "§YRequires developed cross-border infrastructure in the border region (Infrastructure level 3 or higher).§!"
 SAU_unif_exploit_authority_tt:0 "§YRequires the Kingdom to be the leading foreign influence in every other GCC member state.§!"
 SAU_mod_construction:0 "Sponsor Industrial Construction"
 SAU_mod_construction_desc:0 "Pour treasury money into new factories and roads in the Eastern Province. Industry rises where the oil flows."
 SAU_mod_devfund:0 "Capitalise the Development Fund"
 SAU_mod_devfund_desc:0 "Endow the national development fund to open new building capacity in the Eastern Province."
 SAU_mod_workforce:0 "Train the National Workforce"
 SAU_mod_workforce_desc:0 "Vocational programs put more Saudis into skilled work, steadying society and national morale."
 SAU_King_fahd_death:0 "The Death of King Fahd"
 SAU_King_fahd_death_desc:0 "After a decade of frailty following his stroke, King Fahd passes in August 2005. The Kingdom mourns the king who weathered the Gulf War, and the crown passes at last to the regent who already rules in all but name."
 SAU_King_abdullah_Era:0 "The Era of King Abdullah"
 SAU_King_abdullah_Era_desc:0 "Abdullah bin Abdulaziz formally ascends the throne. Cautious reform, careful diplomacy, and vast oil wealth will define his reign."
 SAU_The_death_of_king_abdullah:0 "The Death of King Abdullah"
 SAU_The_death_of_king_abdullah_desc:0 "King Abdullah's reign ends, and with it an era of careful balance. The throne passes to Salman, and a far more ambitious generation waits behind him."
 SAU_aramco_ghawar_desc:0 "Ghawar is the largest conventional oil field on Earth, pumping millions of barrels a day from beneath the Eastern Province. It is the beating heart of Aramco and of the Kingdom itself."
 SAU_aramco_gas_desc:0 "The Master Gas System captures the gas once flared off above the oil fields and pipes it to power plants and industry, lighting Saudi cities with what used to burn into the sky."
 SAU_aramco_rastanura_desc:0 "Ras Tanura's export terminal and the Abqaiq processing complex form the throat through which Saudi crude reaches the world. No facilities on Earth move more oil."
 SAU_aramco_national_desc:0 "Completed in 1980, the buyout of American shareholders made Aramco wholly Saudi. The Kingdom's oil now answers to Riyadh alone."
 SAU_aramco_engineers_desc:0 "A generation of Saudi petroleum engineers, trained at KFUPM and abroad, has replaced the foreign hands that once ran the fields."
 SAU_aramco_production_desc:0 "Aramco's doctrine is volume: maximum sustainable capacity, spare barrels held ready, and the discipline to flood or starve the market at the Kingdom's command."
 SAU_aramco_downstream_desc:0 "Aramco follows its crude downstream into refineries and chemical plants, capturing the margin at every step from wellhead to gas pump."
 SAU_aramco_export_desc:0 "Aramco is built as an export machine, its terminals and tanker fleets tuned to deliver more crude to more markets than any rival."
 SAU_aramco_rnd_desc:0 "The EXPEC Advanced Research Centre in Dhahran leads the world in reservoir engineering, squeezing more oil from every field at lower cost."
 SAU_aramco_megafields_desc:0 "Shaybah in the Empty Quarter, Khurais, and offshore Manifa: vast new developments that prove the age of Saudi mega-projects is far from over."
 SAU_aramco_petrochem_desc:0 "PetroRabigh and SATORP, joint ventures with Sumitomo and Total, weld refining and petrochemicals into single integrated complexes on the Red Sea and the Gulf."
 SAU_aramco_opec_desc:0 "As OPEC's swing producer, the Kingdom alone can open or close the taps enough to move world prices. That spare capacity is a weapon no other producer holds."
 SAU_aramco_giant_desc:0 "Aramco stands as the most valuable company on Earth, its output, reserves, and profits without peer in corporate history."
 SAU_sabic_jubail_yanbu_desc:0 "The royal commission cities of Jubail and Yanbu turned empty coastline into two of the world's largest industrial complexes, the foundation of Saudi heavy industry."
 SAU_sabic_foreign_jv_desc:0 "Joint ventures with Shell, ExxonMobil, and Mitsubishi brought world-class technology into SABIC's plants while keeping the profits anchored in the Kingdom."
 SAU_sabic_ibn_affiliates_desc:0 "The Ibn Sina, Ibn Zahr, and Ibn Rushd affiliates spread SABIC's petrochemical output across plastics, methanol, and fibers."
 SAU_sabic_hadeed_desc:0 "Hadeed, SABIC's steel arm at Jubail, feeds Saudi construction with millions of tons of rebar and flat steel that once had to be imported."
 SAU_sabic_ge_plastics_desc:0 "The 2007 acquisition of GE Plastics for over eleven billion dollars vaulted SABIC into the front rank of global engineered-plastics producers overnight."
 SAU_sabic_agrinutrients_desc:0 "SABIC Agri-Nutrients turns Saudi gas into urea and ammonia, feeding farms across Asia and Africa and making the Kingdom a fertilizer power."
 SAU_sabic_rnd_desc:0 "SABIC's research centers in Riyadh, Bangalore, and Geleen keep its catalysts and polymers at the technological frontier."
 SAU_sabic_global_champion_desc:0 "SABIC ranks among the largest chemical companies on Earth, the proof that Saudi industry can compete far beyond the oil barrel."
 SAU_banking_649_secular_desc:0 "Interest is legal and openly priced. Conventional banking thrives and capital flows freely, whatever the clerics preach on Friday."
 SAU_banking_649_islamic_desc:0 "Riba is forbidden without exception. Finance flows through profit-sharing and murabaha structures, and the faithful bank with a clear conscience."
 SAU_banking_649_hybrid_desc:0 "Sukuk and Islamic windows operate beside quiet conventional lending. Officially compliant, pragmatically flexible."
 SAU_banking_650_secular_desc:0 "Banks lend against a fraction of their deposits, multiplying credit through the economy in the Western fashion."
 SAU_banking_650_islamic_desc:0 "Every deposit is backed by real assets. Credit grows slowly, but no Saudi bank can collapse in a run."
 SAU_banking_650_hybrid_desc:0 "Reserve requirements sit between the extremes: enough backing to reassure, enough leverage to grow."
 SAU_banking_651_secular_desc:0 "Markets trade options, futures, and whatever else they invent, with the regulator watching from a polite distance."
 SAU_banking_651_islamic_desc:0 "Gharar, excessive uncertainty, is banned. No derivatives, no short selling, no gambling dressed as finance."
 SAU_banking_651_hybrid_desc:0 "Derivatives trade within strict limits, hedging permitted, speculation policed."
 SAU_banking_652_secular_desc:0 "Banks lend to each other at benchmark interest rates, knitting Saudi finance into global money markets."
 SAU_banking_652_islamic_desc:0 "Interbank liquidity moves through commodity murabaha, keeping even overnight money within the bounds of the Sharia."
 SAU_banking_652_hybrid_desc:0 "Two interbank channels run side by side, conventional and Islamic, and every bank chooses its counter."
 SAU_banking_653_secular_desc:0 "SAMA regulates banking as an independent central bank, accountable to the market's confidence and little else."
 SAU_banking_653_islamic_desc:0 "SAMA shares authority with a Sharia supervisory council, and no banking license survives the scholars' veto."
 SAU_banking_653_hybrid_desc:0 "Conventional and Islamic banks answer to parallel supervisory tracks under one central bank roof."
 SAU_banking_654_strict_desc:0 "The Kingdom enforces full Islamic orthodoxy in finance. Purity has its price, but the faithful, at home and abroad, bring their wealth where the rules are real."
 SAU_banking_654_pragmatic_desc:0 "Riyadh sets itself up as the world's clearinghouse for Islamic finance: orthodox enough to be trusted, flexible enough to win the business of Kuala Lumpur and London alike."
 SAU_banking_655_full_desc:0 "Saudi banking adopts the Anglo-Saxon model wholesale. The clerics object; the capital markets do not."
 SAU_banking_655_gradual_desc:0 "Secularisation arrives one regulation at a time, slow enough that no Friday sermon can point to the day the system changed."
 SAU_eco_capital_bad_desc:0 "Saudi private wealth sits in London, Geneva, and New York. The Kingdom's richest men invest everywhere but home."
 SAU_eco_capital_good_desc:0 "Saudi capital stays and works in the Kingdom, funding factories and ventures instead of foreign penthouses."
 SAU_eco_industry_bad_desc:0 "Nearly everything on a Saudi shelf arrives by ship. Outside the oil sector, the Kingdom makes little it consumes."
 SAU_eco_industry_good_desc:0 "Saudi factories now supply what the Kingdom once imported, and the trade ledger shows it."
 SAU_eco_bureau_bad_desc:0 "Every license needs a stamp, every stamp needs a cousin. The bureaucracy strangles what the oil money funds."
 SAU_eco_bureau_good_desc:0 "Permits in days instead of years. A streamlined state lets Saudi business move at market speed."
 SAU_eco_labour_bad_desc:0 "Millions of expatriates do the Kingdom's work while young Saudis wait for government sinecures that no longer exist."
 SAU_eco_labour_good_desc:0 "Saudis fill Saudi jobs, from the shop floor to the executive suite. The payroll stays in the Kingdom."
 SAU_eco_diversify_bad_desc:0 "The state lives on oil rent and its citizens live on the state. One commodity price decides the Kingdom's fate."
 SAU_eco_diversify_good_desc:0 "Tourism, industry, logistics, and finance now carry real weight beside the oil barrel. The Kingdom's income no longer hangs on a single price."
 SAU_div_governance_desc:0 "Courts that rule on law instead of connections and ministries that answer for results. Good governance is the quietest reform and the deepest."
 SAU_div_construction_desc:0 "Cranes crowd every Saudi skyline as construction and real estate boom into pillars of the non-oil economy."
 SAU_div_tourism_desc:0 "Resorts, heritage sites, and entertainment districts open the Kingdom to visitors it once turned away, and their money stays."
 SAU_div_logistics_desc:0 "Ports, railways, and highways knit the Kingdom into the crossroads of three continents, moving goods instead of just oil."
 SAU_div_tech_desc:0 "Research parks and startup capital seed a Saudi technology sector that hires graduates the oil industry never could."
 SAU_div_defence_desc:0 "A domestic arms industry keeps defence spending inside the Kingdom, building factories and expertise instead of just buying them."
 SAU_div_energy_desc:0 "Solar fields in the desert sell the sunlight the Kingdom always had, freeing more oil for export and more budget for everything else."
 SAU_div_social_desc:0 "Schools, hospitals, and housing give ordinary Saudis a stake in the new economy, and a reason to believe in it."
 HOU_houthi_resilience_desc:0 "Ansar Allah has fought from these mountains for decades and buried every army sent against it. Dug into their highland strongholds, the Houthis do not break easily."
 SAU_India_one_IMEC_india_deal_desc:0 "The India-Middle East-Europe Economic Corridor links Indian ports through the Gulf to European markets by rail and sea. India stands at the corridor's eastern gate and profits with every shipment."
 SAU_hormuz_open_tt:0 "§GThe strait is open and our oil flows freely.§!\nIf Iran goes to war, shipping strains and this bonus shrinks.\nIf Iran fights §Ythe United States§! or §Ythe Kingdom§!, Tehran closes the strait."
 SAU_hormuz_strained_tt:0 "§YIran is at war and every tanker pays for it.§!\nExports recover once Iran is at peace.\nIf Iran fights §Ythe United States§! or §Ythe Kingdom§!, Tehran closes the strait outright."
 SAU_hormuz_closed_tt:0 "§RIran has sealed the Strait of Hormuz.§!\nOur exports are strangled until Iran's war with §Ythe United States§!, or with us, ends.\nUpdated weekly."
 SAU_islamic_rivalry_tt:0 "[PER.GetFlag]§RThe contest for the Islamic world begins.§! §YUnlocks the Islamic Rivalry decisions in the Foreign Policy category, with toggles to open or close the campaign against Iran.§!"
 SAU_anti_iran_prop_tt:0 "[PER.GetFlag]§RSaudi media turns its full weight on Tehran.§!"
 SAU_yemen_quagmire_tt:0 "[PER.GetFlag]§HEvery Arab League capital sees the proof of Iran's hand in Yemen. Their opinion of Iran falls.§!"
 SAU_battle_straits_tt:0 "§HWe commit to commanding the Gulf's chokepoints. §YUnlocks the Strait Patrols decision.§!"
 SAU_strait_crisis_tt:0 "§RRequires the Strait of Hormuz to be closed, or war with Iran.§!"
 SAU_command_gulf_tt:0 "[PER.GetFlag]§RWe claim mastery of the Gulf. Grants a war goal to subjugate Iran if we are not already at war.§!"
 SAU_silk_web_tt:0 "[PER.GetFlag]§HOur agents burrow into Iran. Intel on the Islamic Republic improves.§!"
 SAU_indirect_war_tt:0 "§HWe commit to the indirect struggle: proxies, money, and pressure instead of open war.§!"
 SAU_attack_iran_gulf_tt:0 "[PER.GetFlag]§HIranian influence recedes in every GCC capital.§!"
 SAU_spark_protest_tt:0 "[PER.GetFlag]§RUnrest spreads through Iran and every Axis of Resistance member.§!"
 SAU_sanction_bloc_tt:0 "§RSanctions bite every Axis of Resistance treasury. They will not thank us for it.§!"
 SAU_fund_laf_tt:0 "[LEB.GetFlag]§HSaudi money and rifles rebuild the Lebanese Army as a counterweight to Hezbollah.§!"
 SAU_taif_tt:0 "[LEB.GetFlag]§HThe spirit of Taif returns: Lebanon steadies under Saudi patronage.§!"
 SAU_chinese_mediation_tt:0 "[CHI.GetFlag]§YBeijing is asked to mediate between Riyadh and Tehran. If both sides agree, the rivalry gives way to detente.§!"
 SAU_beijing_needed_tt:0 "§RRequires the Beijing Agreement with Iran.§!"
 SAU_return_relation_tt:0 "[PER.GetFlag]§GEmbassies reopen and the rivalry's wounds begin to close.§!"
 SAU_mecca_summit_tt:0 "[PER.GetFlag]§GThe Islamic world gathers in Mecca under Saudi leadership.§!"
 SAU_basra_grid_tt:0 "[IRQ.GetFlag]§HIraq plugs into the Gulf grid. Iranian leverage over Baghdad fades; ours grows.§!"
 SAU_anti_iran_groups_tt:0 "[IRQ.GetFlag]§HSaudi weapons reach the groups resisting Iran's militias in Iraq.§!"
 SAU_strait_of_hormuz_open:0 "Strait of Hormuz: Open"
 SAU_strait_of_hormuz_open_desc:0 "Tankers sail the strait unmolested and the Kingdom's oil flows to every market. A fifth of the world's petroleum passes this narrow water, and ours leads it."
 SAU_strait_of_hormuz_strained:0 "Strait of Hormuz: Strained"
 SAU_strait_of_hormuz_strained_desc:0 "War on Iran's borders puts every insurer and shipmaster on edge. The oil still flows, but slower and dearer."
 SAU_strait_of_hormuz_closed:0 "Strait of Hormuz: Closed"
 SAU_strait_of_hormuz_closed_desc:0 "Iranian mines, missiles, and fast boats have shut the strait. The Kingdom's lifeline is severed: exports collapse, prices spiral, and the treasury bleeds. The blockade will not lift until Iran's war ends."
 SAU_fortified_kingdom:0 "Fortress Arabia"
 SAU_fortified_kingdom_desc:0 "Hardened bases, layered air defences, and a garrisoned coast. The Kingdom stands ready to weather any Iranian storm."
 SAU_hormuz_shield:0 "The Hormuz Shield"
 SAU_hormuz_shield_desc:0 "Saudi escorts shepherd every tanker through the strait. The convoys keep sailing, whatever Tehran intends."
 SAU_red_gulf_planning:0 "Operation Red Gulf"
 SAU_red_gulf_planning_desc:0 "The strike plan against Iran is drafted, rehearsed, and distributed. If the order comes, the Gulf burns red."
 SAU_islamic_leadership:0 "Leader of the Islamic World"
 SAU_islamic_leadership_desc:0 "From the Mecca Summit, the Ummah looks to Riyadh. The Custodian of the Two Holy Mosques speaks for the faith."
 SAU_islamic_rivalry:0 "Islamic Rivalry"
 SAU_exposed_iran:0 "Exposed Meddling in Yemen"
 SAU_beijing_agreement:0 "The Beijing Agreement"
 SAU_taif_spirit:0 "Spirit of Taif"
 SAU_events.54.t:0 "Iran Closes the Strait of Hormuz"
 SAU_events.54.d:0 "Iranian mines and missile boats have sealed the Strait of Hormuz. Our tankers ride at anchor with nowhere to go, and every barrel we cannot ship is money burning. The blockade will hold as long as Iran's war does."
 SAU_events.54.a:0 "They strangle us all."
 SAU_events.55.t:0 "The Strait Reopens"
 SAU_events.55.d:0 "The guns have quieted and the minesweepers have done their work. Tankers steam through Hormuz once more, and the Kingdom's lifeline is restored."
 SAU_events.55.a:0 "Let the oil flow."
 SAU_events.56.t:0 "A Request from Riyadh"
 SAU_events.56.d:0 "Saudi Arabia asks us to mediate between Riyadh and Tehran. Both shores of the Gulf sell us oil, and their quarrel threatens every tanker we depend on. Hosting the talks would crown Beijing as the indispensable power of the region."
 SAU_events.56.a:0 "Host the talks in Beijing."
 SAU_events.56.b:0 "This is not our quarrel."
 SAU_events.57.t:0 "An Invitation to Beijing"
 SAU_events.57.d:0 "China invites us to Beijing to sign an agreement with Saudi Arabia: restored relations, reopened embassies, and an end to the proxy bloodletting. The Saudis have already agreed. The pen waits for us."
 SAU_events.57.a:0 "Sign the agreement."
 SAU_events.57.b:0 "We will not sit with them."
 SAU_events.58.t:0 "The Beijing Agreement"
 SAU_events.58.d:0 "Under Chinese auspices, the Kingdom and the Islamic Republic have signed. Embassies will reopen, the proxies will quiet, and the Gulf breathes out. The rivalry is not over, but the knives are sheathed."
 SAU_events.58.a:0 "A new chapter."
 SAU_events.59.t:0 "Mediation Fails"
 SAU_events.59.d:0 "The talks have collapsed before they began. The rivalry continues, and the Gulf stays dangerous."
 SAU_events.59.a:0 "So be it."
 SAU_islamic_rivalry_category:0 "The Islamic Rivalry"
 SAU_islamic_rivalry_category_desc:0 "The contest with Iran for leadership of the Islamic world."
 SAU_islamic_rivalry_open:0 "Open the Campaign against Iran"
 SAU_islamic_rivalry_open_desc:0 "Set the Kingdom's apparatus to work against Tehran. Opens the Islamic Rivalry decisions."
 SAU_islamic_rivalry_close:0 "Suspend the Campaign against Iran"
 SAU_islamic_rivalry_close_desc:0 "Quietly stand down the campaign. Closes the Islamic Rivalry decisions until reopened."
 SAU_rivalry_propaganda_blitz:0 "Anti-Iranian Media Blitz"
 SAU_rivalry_propaganda_blitz_desc:0 "Flood the airwaves and the mosques with the case against Tehran."
 SAU_rivalry_back_separatists:0 "Back the Separatists"
 SAU_rivalry_back_separatists_desc:0 "The General Intelligence Presidency channels money and weapons to Ahwaz, Balochistan, and Kurdistan. Iran's periphery stirs."
 SAU_rivalry_strait_patrols:0 "Strait Patrols"
 SAU_rivalry_strait_patrols_desc:0 "Keep the fleet drilling in the narrow waters of Hormuz."
 SAU_arab_shield_invite_desc:0 "Extend an invitation to [FROM.GetNameDef] to join the Arab Shield. If they accept, they enter our faction and share in its collective defense. Can be repeated for any Arab League state still outside the alliance."
 SAU_arab_shield_invite:0 "Invite [FROM.GetFlag][FROM.GetNameDef] to the Arab Shield"
 SAU_arab_shield_pact_tt:0 "§HLeads the Arab Shield, a collective-defense alliance.§!\n§GInvite§! any Arab League member to join through the Arab Shield decisions.\nMembers share one faction and stand together against outside aggression."
 SAU_events.42.b:0 "Keep our distance."
 SAU_events.43.b:0 "Decline the pact."
 SAU_events.44.b:0 "Refuse the aid."
 SAU_events.45.b:0 "Reject the bribe."
 SAU_events.46.b:0 "Decline the arms."
 SAU_events.47.b:0 "Spare the Brotherhood."
 SAU_events.48.b:0 "Fund our own army."
 SAU_events.49.b:0 "Train alone."
 SAU_events.50.b:0 "Reject the bridge."
 SAU_events.51.b:0 "Develop it ourselves."
 SAU_events.52.b:0 "Keep Cairo Egyptian."
 SAU_events.53.b:0 "Go our own way."
 SAU_events.42.t:0 "A Hand from Riyadh"
 SAU_events.42.d:0 "Saudi Arabia extends a hand of friendship and partnership between the two pillars of the Arab world. Do we take it?"
 SAU_events.42.a:0 "A welcome gesture."
 SAU_events.43.t:0 "A Saudi Trade Pact"
 SAU_events.43.d:0 "Riyadh proposes a sweeping trade agreement and fresh investment, opening our markets to the Gulf. Do we sign?"
 SAU_events.43.a:0 "Good for business."
 SAU_events.44.t:0 "Saudi Aid Arrives"
 SAU_events.44.d:0 "Saudi Arabia offers billions in aid, new infrastructure, and a steadier economy in exchange for closer ties. Do we accept?"
 SAU_events.44.a:0 "We accept the aid."
 SAU_events.45.t:0 "Generous Saudi Funds"
 SAU_events.45.d:0 "Envoys from Riyadh quietly offer vast sums to the ministries that matter, no strings spoken aloud. Do we take the money?"
 SAU_events.45.a:0 "The money is welcome."
 SAU_events.46.t:0 "Saudi Arms Shipments"
 SAU_events.46.d:0 "Saudi Arabia offers to arm and train our military, with crates of weapons already waiting at the docks. Do we accept?"
 SAU_events.46.a:0 "Strengthen the army."
 SAU_events.47.t:0 "Riyadh Backs the Crackdown"
 SAU_events.47.d:0 "Riyadh offers its full weight and wallet to crush the Brotherhood for good. Do we let them in?"
 SAU_events.47.a:0 "Crush them."
 SAU_events.48.t:0 "Saudi Pays the Soldiers"
 SAU_events.48.d:0 "Saudi Arabia offers a standing subsidy to keep our army paid and in the field. Do we take their coin?"
 SAU_events.48.a:0 "Keep them paid."
 SAU_events.49.t:0 "Maneuvers in the Red Sea"
 SAU_events.49.d:0 "Riyadh proposes joint naval exercises across the Red Sea, binding our fleets together. Do we sail with them?"
 SAU_events.49.a:0 "Sail together."
 SAU_events.50.t:0 "The Causeway Rises"
 SAU_events.50.d:0 "Saudi Arabia proposes the King Salman Causeway, a bridge of steel linking our lands across the strait. Do we build it?"
 SAU_events.50.a:0 "A bridge between continents."
 SAU_events.51.t:0 "Saudi Capital in the Sinai"
 SAU_events.51.d:0 "Riyadh offers to pour capital into the Sinai: factories, roads, and jobs from the desert. Do we open the door?"
 SAU_events.51.a:0 "Build the Sinai."
 SAU_events.52.t:0 "The Gulf Buys Cairo"
 SAU_events.52.d:0 "Gulf investors seek to buy up Cairo's finest districts. The cash is enormous, but the skyline would answer to foreign landlords. Do we sell?"
 SAU_events.52.a:0 "Sell the skyline."
 SAU_events.53.t:0 "A Red Sea Riviera"
 SAU_events.53.d:0 "Saudi Arabia proposes joint Red Sea megaresorts to draw the world's tourists and wealth. Do we partner with them?"
 SAU_events.53.a:0 "Welcome the world."
 SAU_arab_shield_category:0 "The Arab Shield"
 SAU_arab_shield_target_free_tt:0 "§HThe invited nation must not already belong to another faction.§!"
 SAU_arab_shield_bond:0 "Brothers of the Arab Shield"
 SAU_egypt_milsupport_tt:0 "[EGY.GetFlag]§HWe arm and train the Egyptian military. Cairo gains weapons and experience; we gain a grateful general staff.§!"
 SAU_egypt_crush_mb_tt:0 "[EGY.GetFlag]§HWe bankroll Cairo's war on the Brotherhood. The regime hardens, the Islamists fade.§! Nationalist §G+5%§!, democratic §R-5%§!, stability §G+5%§!."
 SAU_egypt_libya_sudan_tt:0 "[LBA.GetFlag][SUD.GetFlag]§HWith Cairo, we back our friends in Libya and Sudan against the Islamists and the Turks. Saudi influence rises in both.§!"
 SAU_egypt_subsidy_tt:0 "[EGY.GetFlag]§HA standing Saudi subsidy keeps the Egyptian army in the field. §YWe pay for it.§!"
 SAU_egypt_redsea_training_tt:0 "[EGY.GetFlag]§HSaudi and Egyptian fleets drill together across the Red Sea. Both navies sharpen.§!"
 SAU_egypt_bridge_tt:0 "[EGY.GetFlag]§HThe King Salman Causeway rises across the Strait of Tiran, binding Arabia to Africa. §YA costly megaproject.§!"
 SAU_egypt_sinai_tt:0 "[EGY.GetFlag]§HSaudi capital pours into the Sinai: factories, roads, jobs. We invest, Cairo builds, our influence deepens.§!"
 SAU_egypt_realestate_tt:0 "[EGY.GetFlag]§HGulf money buys up Cairo's skyline. We profit handsomely; Egypt grows dependent on its landlords.§!"
 SAU_egypt_tourism_tt:0 "[EGY.GetFlag]§HShared Red Sea resorts draw the world's wealth to our shores. Prosperity for both crowns.§!"
 SAU_arab_shield_tt:0 "§HWe forge the Arab Shield, a defensive pact under Riyadh's banner. §YUnlocks decisions to invite the Arab world to join.§!"
 SAU_egypt_army_subsidy:0 "Saudi Military Subsidy"
 SAU_egypt_army_subsidy_desc:0 "Riyadh underwrites the Egyptian army's payroll and upkeep, keeping more divisions in fighting trim. Improves morale and reinforcement."
 SAU_red_sea_command:0 "Red Sea Naval Command"
 SAU_red_sea_command_desc:0 "Years of joint exercises have welded Saudi and Egyptian crews into a single Red Sea fighting force. Improves naval morale."
 SAU_king_salman_bridge:0 "The King Salman Causeway"
 SAU_king_salman_bridge_desc:0 "A bridge across the Strait of Tiran links Arabia to Africa, accelerating construction and trade across two continents."
 SAU_egypt_property_dependence:0 "Foreign-Owned Property"
 SAU_egypt_property_dependence_desc:0 "Gulf investors own Cairo's choicest real estate. Speculation drives up prices and leaves the economy beholden to its landlords. Hurts stability and consumer goods."
 SAU_red_sea_riviera:0 "The Red Sea Riviera"
 SAU_red_sea_riviera_desc:0 "Megaresorts along the Red Sea coast turn sand into gold, drawing tourists and revenue that ease the national ledger."
 SAU_arab_shield_pact:0 "The Arab Shield"
 SAU_arab_shield_pact_desc:0 "Riyadh stands at the head of a formal Arab defensive alliance, a shield raised against the storms of the age."
 SAU_arab_shield_member:0 "Member of the Arab Shield"
 SAU_arab_shield_member_desc:0 "This nation marches under the banner of the Arab Shield, sharing in its collective defense. Improves defense and morale."
 SAU_egypt_military_ties:0 "Saudi Military Patronage"
 arab_shield_alliance:0 "Arab Shield"
 SAU_events.41.t:0 "The Arab Shield"
 SAU_events.41.d:0 "[FROM.GetName] calls on us to join the Arab Shield, a defensive alliance to bind the Arab nations together against the storms of the age. They ask us to march beneath a common banner."
 SAU_events.41.a:0 "Join the Arab Shield."
 SAU_events.41.b:0 "We stand alone."
 SAU_Saudi_arabia_in_egypt_relationship:0 "Riyadh and Cairo"
 SAU_Saudi_arabia_in_egypt_relationship_desc:0 "Egypt is the heart of the Arab world: its largest army, its oldest state, its loudest voice. A Cairo that listens to Riyadh anchors the whole region. We will make Egypt a partner, then a dependent."
 SAU_egypt_relationship_tt:0 "[EGY.GetFlag]§HWe open a new era of friendship with Cairo. Relations improve both ways.§!"
 SAU_egypt_gateway_tt:0 "§YWe commit to deep engagement with Egypt.§!"
 SAU_egypt_econ_tt:0 "[EGY.GetFlag]§HA trade agreement binds our economies, and Saudi capital flows into Egypt. Both treasuries gain; we earn returns on our investment.§!"
 SAU_egypt_aid_tt:0 "[EGY.GetFlag]§HSaudi aid pours into Egypt: $20 billion, new infrastructure, and steadier ground under Cairo. Our influence grows with every riyal.§!"
 SAU_bribe_egypt_tt:0 "[EGY.GetFlag]§RWe buy Cairo outright. Egypt receives §G$100 billion§!, but graft spreads through its ministries. Saudi influence in Egypt §G+10%§!. §YWe foot the bill.§!"
 SAU_egypt_partnership:0 "Saudi-Egyptian Partnership"
 SAU_egypt_economic_ties:0 "Saudi Economic Support"
 SAU_arabia_iraq_tt:0 "§YOpens the Kingdom's strategy toward Iraq.§!"
 SAU_iraq_war_tt:0 "§YThe path forks on whether Saddam endures or falls.§!"
 SAU_saddam_endures_tt:0 "§RRequires Saddam to still hold power in Iraq.§!"
 SAU_saddam_fell_avail_tt:0 "§RRequires Saddam's regime to have fallen.§!"
 SAU_saddam_endures_path_tt:0 "§HWe commit to containing and undermining Saddam's Iraq.§!"
 SAU_saddam_fell_path_tt:0 "§HWe commit to courting the new Iraq.§!"
 SAU_prepare_defence_iraq_tt:0 "[IRQ.GetFlag]§HThe army fortifies the Iraqi frontier. +5% defense against Iraq while Saddam rules.§!"
 SAU_counter_baathist_tt:0 "[IRQ.GetFlag]§RWe turn the screws on the Baathist regime. Nationalist party popularity in Iraq §R-5%§!, Saudi influence on Iraq §G+2%§!.§!"
 SAU_memories_khafji_tt:0 "§YDecide the Kingdom's diplomatic stance toward Saddam's Iraq.§!"
 SAU_cooperative_iraq_tt:0 "[IRQ.GetFlag]§HWe fund Iraq's reconstruction and win its goodwill.§! (We pay for it.)"
 SAU_new_iraq_alignment_tt:0 "[IRQ.GetFlag]§HWe guarantee Iraq and pull it into our camp, away from Iran.§!"
 SAU_counter_iran_iraq_tt:0 "[PER.GetFlag]§RWe move to push Iranian influence out of Iraq. Iranian influence on Iraq §R-10%§!.§!"
 SAU_buy_iraqi_parliament_tt:0 "[IRQ.GetFlag]§HSaudi money buys lasting influence in Baghdad's politics.§!"
 SAU_events.40.t:0 "The Shadow of Saddam"
 SAU_events.40.d:0 "Saddam still rules in Baghdad, and the memory of Kuwait and Khafji hangs over the Gulf. The Kingdom must settle on how it will deal with this dangerous neighbor, before he decides to gamble again."
 SAU_events.40.a:0 "Containment: isolate and strangle the regime."
 SAU_events.40.b:0 "Cautious detente: lower the temperature, for now."
 SAU_events.40.c:0 "War footing: we will strike before he does."
 SAU_iraq_border_defense:0 "Northern Frontier Defenses"
 SAU_iraq_border_defense_desc:0 "The army is dug in along the Iraqi border, ready for any repeat of 1990. +10% defense against Iraq. Lifts once Saddam is gone."
 SAU_economic_tree_shortcut:0 "Economy Tree"
 SAU_foreign_tree_shortcut:0 "Foreign Policy Tree"
 SAU_internal_tree_shortcut:0 "Internal Policy Tree"
 SAU_military_tree_shortcut:0 "Military Tree"
 SAU_succession_tree_shortcut:0 "Succession Tree"
 HOU_houthi_resilience:0 "Ansar Allah Resilience"

 SAU_yemen_attack_buff:0 "Coordinated Offensive"
 SAU_yemen_attack_buff_desc:0 "Saudi planning and fire support give our forces a decisive edge on the attack. +15% attack against the Houthis."
 PER_houthi_defense_buff:0 "Mountain Fortifications"
 PER_houthi_defense_buff_desc:0 "Iranian-built defenses turn the highlands into a fortress. +15% defense against the government's forces."
 YEM_drop_south_yemen_name:0 "Reclaim the Name of Yemen"
 YEM_drop_south_yemen_name_desc:0 "Set aside the South Yemen identity and rule once more simply as Yemen."
 HOU_drop_north_yemen_name:0 "Reclaim the Name of Yemen"
 HOU_drop_north_yemen_name_desc:0 "Set aside the North Yemen identity and govern under our own banner once again."
 SAU_events.39.t:0 "Operation Decisive Storm Begins"
 SAU_events.39.d:0 "Saudi and coalition warplanes have struck targets across Houthi-held Yemen in a sweeping air campaign. Riyadh has declared its intention to restore the recognized government and roll back the Iranian-backed movement. The Middle East holds its breath."
 SAU_events.39.a:0 "The storm has broken."
 PER_houthi_raise_brigade:0 "Harden the Defenses"
 PER_houthi_raise_brigade_desc:0 "Send Quds Force engineers to dig the Houthis into the mountains. They will be far harder to dislodge from the ground they hold."
 PER_houthi_militia:0 "Mobilize Popular Militia"
 PER_houthi_militia_desc:0 "Call the tribes to arms. A flood of fresh manpower for the Houthi cause, cheap and endless."
 PER_houthi_old_weapons:0 "Smuggle Weapons to the Houthis"
 PER_houthi_old_weapons_desc:0 "Run a shipment of old rifles up through the Red Sea and across the border to the Houthi fighters."
 HOU_north_yemen:0 "North Yemen"
 HOU_north_yemen_DEF:0 "North Yemen"
 HOU_north_yemen_ADJ:0 "North Yemeni"
 YEM_south_yemen:0 "South Yemen"
 YEM_south_yemen_DEF:0 "South Yemen"
 YEM_south_yemen_ADJ:0 "South Yemeni"
 SAU_events.36.t:0 "A Proposal to Divide Yemen"
 SAU_events.36.d:0 "The Saudis propose an end to the war: a Yemen split in two. Our Houthi allies would keep the northern highlands as North Yemen, under our protection, while the south falls to Riyadh's clients. The fighting would stop, but the Houthis would step back from the Axis of Resistance. A bitter compromise, or a chance to consolidate?"
 SAU_events.36.a:0 "Accept. Half a Yemen is better than none."
 SAU_events.36.b:0 "Reject. The revolution will take all of Yemen."
 SAU_events.37.t:0 "Yemen Is Partitioned"
 SAU_events.37.d:0 "Tehran has agreed. The guns fall silent and a line is drawn across Yemen: a Saudi-aligned South ruling from Aden, and a Houthi North under Iranian guarantee. Two weak Yemens, neither free to tip the balance, so long as the other stands."
 SAU_events.37.a:0 "A workable peace."
 SAU_events.38.t:0 "Tehran Refuses"
 SAU_events.38.d:0 "The Iranians will not divide Yemen. The Houthis fight on, and so must we. There will be no negotiated partition, only victory or defeat."
 SAU_events.38.a:0 "Then we fight on."
 SAU_operation_decisive_storm:0 "Operation Decisive Storm (Amaliyat Asifat al-Hazm)"
 SAU_operation_decisive_storm_desc:0 "§YAmaliyat Asifat al-Hazm§! - the Storm of Resolve. Launch the coalition air campaign over Yemen. Saudi jets will pound Houthi positions across the territory they hold and throw an air umbrella over the government forces. This opens the way for our ongoing support to the Yemeni army."
 SAU_decisive_storm_tt:0 "[YEM.GetFlag]§HYemen gains §G+20% defense§!§H against the Houthis.§! [HOU.GetFlag]§RHouthi-held states are bombed.§! Unlocks the Yemeni support decisions."
 SAU_decisive_storm_air_cover:0 "Coalition Air Cover"
 SAU_decisive_storm_air_cover_desc:0 "Saudi and coalition aircraft rule the skies over Yemen, shielding the government's troops from Houthi offensives. +20% defense against the Houthis. The umbrella lifts once the war is won."
 SAU_yemen_raise_brigade:0 "Coordinate the Offensive"
 SAU_yemen_raise_brigade_desc:0 "Embed Saudi officers with the Yemeni command and plan a coordinated push. The government's forces gain a lasting edge on the attack against the Houthis."
 SAU_yemen_old_weapons:0 "Ship Surplus Weapons"
 SAU_yemen_old_weapons_desc:0 "Clear out the army's obsolete stockpiles and crate them off to Yemen. Old rifles still kill, and they cost us nothing we will miss."
 SAU_yemen_war_funds:0 "Fund the War Effort"
 SAU_yemen_war_funds_desc:0 "Wire money to Aden to pay salaries, buy fuel, and keep the government's soldiers in the field a while longer."
 SAU_arabia_yemen_tt:0 "§YOpens the Kingdom's strategy for the Yemeni question.§!"
 SAU_houthi_war_tt:0 "§RRequires the Houthis to exist and be at war with the Yemeni government.§!"
 SAU_yemeni_civil_war_tt:0 "[YEM.GetFlag]§HWe commit to backing the recognized government against the Houthis.§!"
 SAU_yemen_proxy_tt:0 "[YEM.GetFlag]§HYemen gains arms, manpower, and experience. We stay out of the fighting ourselves.§!"
 SAU_yemen_direct_tt:0 "[HOU.GetFlag]§HThe Houthis leave the Axis of Resistance.§! We gain military access through Yemen and a wargoal against the Houthis."
 SAU_yemen_peace_talks_tt:0 "§YSets the stage for the final settlement of the war: partition or total victory.§!"
 SAU_partition_yemen_tt:0 "[YEM.GetFlag]§HYemen is partitioned. The Saudi-aligned South takes the coast and Hadramaut; the Houthis keep the northern highlands. The South becomes a close ally under our guarantee.§!"
 SAU_houthi_defeated_tt:0 "§RRequires the Houthis to be defeated (capitulated or destroyed).§!"
 SAU_total_victory_yemen_tt:0 "[YEM.GetFlag]§HThe Houthis are annexed and cease to exist. A reunified Yemen stands as a firm Saudi ally under our guarantee.§!"
 SAU_tt_pipeline_oil_dependence:0 "§RIncreases Oil Dependence.§! The Kingdom commits further to exporting its oil."
 SAU_yemen_pipeline_t1:0 "Arabian Sea Pipeline (Tier I)"
 SAU_yemen_pipeline_t1_desc:0 "Saudi crude runs south through Al Mahrah to the Arabian Sea, bypassing the Strait of Hormuz. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_yemen_pipeline_t2:0 "Arabian Sea Pipeline (Tier II)"
 SAU_yemen_pipeline_t2_desc:0 "Saudi crude runs south through Al Mahrah to the Arabian Sea, bypassing the Strait of Hormuz. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_yemen_pipeline_t3:0 "Arabian Sea Pipeline (Tier III)"
 SAU_yemen_pipeline_t3_desc:0 "Saudi crude runs south through Al Mahrah to the Arabian Sea, bypassing the Strait of Hormuz. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_syria_pipeline_t1:0 "Levant Pipeline (Tier I)"
 SAU_syria_pipeline_t1_desc:0 "Saudi oil crosses Jordan and Syria to the Mediterranean, challenging Russian gas at the gates of Europe. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_syria_pipeline_t2:0 "Levant Pipeline (Tier II)"
 SAU_syria_pipeline_t2_desc:0 "Saudi oil crosses Jordan and Syria to the Mediterranean, challenging Russian gas at the gates of Europe. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_syria_pipeline_t3:0 "Levant Pipeline (Tier III)"
 SAU_syria_pipeline_t3_desc:0 "Saudi oil crosses Jordan and Syria to the Mediterranean, challenging Russian gas at the gates of Europe. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_iraq_pipeline_t1:0 "Europe Pipeline (Tier I)"
 SAU_iraq_pipeline_t1_desc:0 "Saudi oil flows north through Iraq toward Turkey and the European market Moscow guards so jealously. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_iraq_pipeline_t2:0 "Europe Pipeline (Tier II)"
 SAU_iraq_pipeline_t2_desc:0 "Saudi oil flows north through Iraq toward Turkey and the European market Moscow guards so jealously. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_iraq_pipeline_t3:0 "Europe Pipeline (Tier III)"
 SAU_iraq_pipeline_t3_desc:0 "Saudi oil flows north through Iraq toward Turkey and the European market Moscow guards so jealously. §GAdditional Income: up to $1.25B§! from your pipeline network. We pay every country the line crosses a transit fee of $1.25B each (§RAdditional Expense§!). Sabotage drops the line one tier, cutting both; a severed tier 1 line closes the route."
 SAU_pipeline_transit_YEM_t1:0 "Saudi Pipeline Transit (Tier I)"
 SAU_pipeline_transit_YEM_t1_desc:0 "Saudi oil crosses Yemen, and the transit fees swell the treasury. The pipeline lifts the nation's oil output. §GAdditional Income: $1.00B§!"
 SAU_pipeline_transit_YEM_t2:0 "Saudi Pipeline Transit (Tier II)"
 SAU_pipeline_transit_YEM_t2_desc:0 "Saudi oil crosses Yemen, and the transit fees swell the treasury. The pipeline lifts the nation's oil output. §GAdditional Income: $1.15B§!"
 SAU_pipeline_transit_YEM_t3:0 "Saudi Pipeline Transit (Tier III)"
 SAU_pipeline_transit_YEM_t3_desc:0 "Saudi oil crosses Yemen, and the transit fees swell the treasury. The pipeline lifts the nation's oil output. §GAdditional Income: $1.25B§!"
 SAU_pipeline_transit_JOR_t1:0 "Saudi Pipeline Transit (Tier I)"
 SAU_pipeline_transit_JOR_t1_desc:0 "Saudi oil crosses Jordan, and the transit fees swell the treasury. The pipeline lifts the nation's construction speed. §GAdditional Income: $1.00B§!"
 SAU_pipeline_transit_JOR_t2:0 "Saudi Pipeline Transit (Tier II)"
 SAU_pipeline_transit_JOR_t2_desc:0 "Saudi oil crosses Jordan, and the transit fees swell the treasury. The pipeline lifts the nation's construction speed. §GAdditional Income: $1.15B§!"
 SAU_pipeline_transit_JOR_t3:0 "Saudi Pipeline Transit (Tier III)"
