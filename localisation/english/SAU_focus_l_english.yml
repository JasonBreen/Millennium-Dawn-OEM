 SAU_internal_foregin_affairs_education:0 "Confront the Literacy Crisis"
 SAU_internal_foregin_affairs_education_desc:0 "In 2000, more than one in five Saudis cannot read - a §Hliteracy rate of just 79%§!. An oil kingdom cannot modernize on the backs of an illiterate workforce, and low literacy drags down research, productivity and the offices that run the state. The Kingdom launches a national drive to teach its people - and must choose between an §LAmerican-style§! system and a §Lfree, universal§! one.\n\n§GEvery education focus raises the literacy rate§! toward full literacy."
 SAU_Foregin_Affairs_Begin_Focus_Tree:0 "Saudi Foreign Policy"
 SAU_Foregin_Affairs_Begin_Focus_Tree_desc:0 "From the oil terminals of the Gulf to the holy cities of the Hejaz, the security of the House of Saud rests on the choices it makes abroad. Set the course of Saudi diplomacy: balance the great powers, master the region, and confront the rivals who would encircle the Kingdom."
 SAU_Regional_Policy:0 "A Regional Power"
 SAU_Regional_Policy_desc:0 "The Kingdom's first duty is to its own neighbourhood. Project Saudi power into the Levant, the Nile, Yemen and Mesopotamia, turning the lands around Arabia into a belt of clients and partners."
 SAU_Among_The_Major_Powers:0 "Among the Major Powers"
 SAU_Among_The_Major_Powers_desc:0 "Oil makes the Kingdom indispensable, but indispensability is not the same as safety. Reach beyond the region to the powers that shape the world order and decide which of them Riyadh will lean upon."
 SAU_the_Islamic_Rivalry:0 "The Islamic Rivalry"
 SAU_the_Islamic_Rivalry_desc:0 "Across the Gulf the Islamic Republic preaches revolution and arms its proxies from Beirut to Sanaa. The contest for leadership of the Muslim world will be fought in propaganda, in proxy wars, and perhaps on the waters of the Strait itself."

 SAU_Cooperation_With_The_West:0 "§CCooperation with the West§!"
 SAU_Cooperation_With_The_West_desc:0 "Washington and its allies have guaranteed the Gulf's security since the days of King Abdulaziz. Anchor the Kingdom firmly in the Western camp and trade the world's oil for the world's protection."
 SAU_Cooperation_Export_Oil_To_USA:0 "Oil for Security"
 SAU_Cooperation_Export_Oil_To_USA_desc:0 "The bargain is as old as the meeting aboard the USS Quincy: Saudi crude keeps the American economy turning, and American arms keep the Kingdom safe. Deepen the petrodollar partnership that underwrites the realm."
 SAU_Never_Trust_French:0 "Deal with The French"
 SAU_Never_Trust_French_desc:0 "Paris sells weapons to anyone and lectures everyone, but business is business. A carefully fenced investment pact lets the Kingdom profit from French industry while keeping better options within reach."
 SAU_UK_Strategic_Partnership:0 "A Partnership with Britain"
 SAU_UK_Strategic_Partnership_desc:0 "From the Al-Yamamah contracts to the training of Saudi officers, London has been a quieter but steadier friend than most. Formalise a strategic partnership with the United Kingdom."
 SAU_Non_NATO_Ally:0 "Major Non-NATO Ally"
 SAU_Non_NATO_Ally_desc:0 "Short of a treaty alliance, the closest a nation can stand beside the Atlantic powers is the status of a privileged partner. Secure for the Kingdom the standing of a major non-NATO ally."
 SAU_The_Strategic_Defense_USA:0 "The American Shield"
 SAU_The_Strategic_Defense_USA_desc:0 "Tie the Kingdom's defence irreversibly to the United States: basing, intelligence, and the unspoken guarantee that an attack on Riyadh is an attack on Washington's interests. The price is dependence on a single patron."
 SAU_Saudi_Spanish_Parthnership:0 "A Saudi-Spanish Partnership"
 SAU_Saudi_Spanish_Parthnership_desc:0 "Spanish yards build the Kingdom's new corvettes and Spanish firms its high-speed rail to Mecca. Cultivate Madrid as a useful European partner outside the usual circle."

 SAU_Cooperation_With_East:0 "§RCooperation With The East§!"
 SAU_Cooperation_With_East_desc:0 "The centre of gravity of the world economy is drifting toward Asia, and Asia is thirsty for oil. Open the Kingdom to the rising powers of the East and hedge against an unreliable West."
 SAU_Open_trade__China:0 "§GSaudi§!-§RChina§! Deal"
 SAU_Open_trade__China_desc:0 "Saudi Arabia Offer A Deal with China to invest in Kingdom's soil, which include a lot of Energy and More stuff, by China and Chinese Companies."
 SAU_Open_deal_with_SK:0 "A Deal with South Korea"
 SAU_Open_deal_with_SK_desc:0 "Korean shipyards, reactors and construction giants built much of the modern Gulf. Court Seoul as a partner in nuclear power, defence industry and the megaprojects of Vision 2030."
 SAU_IMEC_India:0 "The India-Middle East Corridor"
 SAU_IMEC_India_desc:0 "A new road of rail, ports and pipelines could run from Mumbai through Arabia to the heart of Europe. Make the Kingdom the indispensable link in the corridor that bypasses the chokepoints of Iran's reach."
 SAU_focus_Defensiv_Deal_with_Pakistan:0 "A Defensive Deal with Pakistan"
 SAU_focus_Defensiv_Deal_with_Pakistan_desc:0 "Pakistan fields the largest army in the Muslim world, and its bomb is the only one a Sunni state possesses. Bind Islamabad to the defence of the Two Holy Mosques."
 SAU_Comprehensive_Strategic_China:0 "A Strategic Partnership with China"
 SAU_Comprehensive_Strategic_China_desc:0 "Choose Beijing over Washington as the Kingdom's principal great-power partner. Chinese capital and Chinese arms come without sermons, but also without the old American guarantee."
 SAU_Investment_Deal_with_Russia:0 "OPEC+ Agreement"
 SAU_Investment_Deal_with_Russia_desc:0 "Moscow and Riyadh are rivals in the oil market and on opposite sides in Syria, yet together they can set the price of crude. Strike the bargain that keeps the cartel of two intact."

 SAU_The_Levant_Strategy:0 "The Levant Strategy"
 SAU_The_Levant_Strategy_desc:0 "Syria burns and Jordan teeters, and beyond them lies the road to the Mediterranean. Shape the Levant to Saudi advantage before Iran and its friends do it first."
 SAU_Fund_the_Free_Syrian_Army:0 "Fund the Free Syrian Army"
 SAU_Fund_the_Free_Syrian_Army_desc:0 "The uprising against the House of Assad is a chance to break Iran's bridge to the sea. Channel money and weapons to the rebels fighting in the name of a free Syria."
 SAU_spawn_foregin_troops_FSA:0 "Foreign Volunteers for the Rebels"
 SAU_spawn_foregin_troops_FSA_desc:0 "Money alone will not win the war. Open the pipelines that bring fighters and materiel across the borders to the opposition's front lines."
 SAU_Sabtoage_Anti-FSA_In_Syria:0 "Sabotage the Regime's Backers"
 SAU_Sabtoage_Anti-FSA_In_Syria_desc:0 "For every gun the Kingdom sends, Tehran and Moscow send two. Work in the shadows to disrupt the supply lines and proxies propping up Damascus."
 SAU_Freedom_or_deat:0 "Freedom or Death"
 SAU_Freedom_or_deat_desc:0 "The Syrian war has become a test of will between Riyadh and Tehran. Commit fully to the rebellion and stake Saudi prestige on the fall of the Assad regime."
 SAU_Total_Victory_in_Syria:0 "Victory in Syria"
 SAU_Total_Victory_in_Syria_desc:0 "Damascus falls, and with it Iran's land bridge to Hezbollah. A friendly government in Syria opens the Levant to Saudi influence and the Mediterranean to Saudi pipelines."
 SAU_Total_lost_in_Syria:0 "Defeat in Syria"
 SAU_Total_lost_in_Syria_desc:0 "The regime endures, propped up by Russian jets and Iranian militias. The Kingdom must cut its losses and salvage what influence it can from a war it could not win."
 SAU_The_Amman_Bailout_Jordan:0 "The Amman Bailout"
 SAU_The_Amman_Bailout_Jordan_desc:0 "The Hashemite Kingdom is a fragile buffer against the chaos to its north, and it is broke. Keep Jordan solvent and loyal with the Kingdom's chequebook."
 SAU_Fund_Jordani_army:0 "Fund the Jordanian Army"
 SAU_Fund_Jordani_army_desc:0 "A strong Jordanian army guards the Kingdom's long northern flank. Underwrite Amman's soldiers so that, when it matters, they answer to Riyadh."
 SAU_Energy_Subsidies_Jodan:0 "Energy Subsidies for Jordan"
 SAU_Energy_Subsidies_Jodan_desc:0 "Jordan has no oil of its own and feels every spike in the market. Bind the kingdom to Saudi generosity with cheap fuel and discounted crude."
 SAU_Neom_Aqaba_Synergy:0 "NEOM-Aqaba Synergy"
 SAU_Neom_Aqaba_Synergy_desc:0 "Where the Saudi megacity of NEOM meets the Jordanian port of Aqaba, a single economic zone could straddle the gulf between them. Knit the two shores into one engine of growth."
 SAU_Trans-Arabian_Pipeline:0 "The Trans-Arabian Pipeline"
 SAU_Trans-Arabian_Pipeline_desc:0 "The old Tapline once carried Saudi oil to the Mediterranean before war and politics closed it. With the Levant pacified, reopen the artery from the Eastern Province to the sea."

 SAU_Egypt:0 "Patron of Egypt"
 SAU_Egypt_desc:0 "Egypt is the Arab world's largest nation and its oldest centre of learning, and it is perpetually on the edge of bankruptcy. Make Cairo a dependent partner that lends the Kingdom the weight of the Arab masses."
 SAU_Finaical_Economic_Egy:0 "A Financial Lifeline to Cairo"
 SAU_Finaical_Economic_Egy_desc:0 "Egypt's economy lurches from one crisis to the next. Deposits in its central bank and cargoes of Saudi aid keep the most populous Arab state afloat, and in Riyadh's debt."
 SAU_Military_support_egypt:0 "Military Support for Egypt"
 SAU_Military_support_egypt_desc:0 "The Egyptian army is the backbone of the state and the guarantor of order on the Nile. Arm and fund it, and gain a say in the Arab world's largest military."
 SAU_Aid_to_Egypt:0 "Aid to Egypt"
 SAU_Aid_to_Egypt_desc:0 "Wheat, fuel and hard currency are the price of Egyptian loyalty. Sustain the flow of aid that keeps Cairo aligned with the Gulf."
 SAU_Bribe_Egyptian_Government:0 "Buy the Egyptian Government"
 SAU_Bribe_Egyptian_Government_desc:0 "Influence is cheaper than armies. Spread Saudi money through the ministries and palaces of Cairo until Egypt's policy becomes an extension of the Kingdom's."
 SAU_King_Salman_bridge_egypt:0 "The King Salman Bridge"
 SAU_King_Salman_bridge_egypt_desc:0 "A causeway across the Strait of Tiran would join Asia to Africa and bind Egypt to Arabia in steel and asphalt. Build the bridge that carries the King's name across the Red Sea."
 SAU_Investment_heavily_Sinai_egypt:0 "Develop the Sinai"
 SAU_Investment_heavily_Sinai_egypt_desc:0 "The Sinai is Egypt's neglected frontier and NEOM's neighbour. Pour Saudi capital into the peninsula and turn a lawless borderland into shared prosperity."
 SAU_Coordinate_in_Libya_sudan:0 "Coordinate in Libya and Sudan"
 SAU_Coordinate_in_Libya_sudan_desc:0 "From the Libyan coast to the Sudanese Nile, Riyadh and Cairo back the same generals against the same Islamists. Coordinate the two kingdoms' campaigns across North Africa."
 SAU_Crush_the_Muslim_Brotherhood_egypt:0 "Crush the Muslim Brotherhood"
 SAU_Crush_the_Muslim_Brotherhood_egypt_desc:0 "The Brotherhood's blend of piety and populism threatens every throne in the Gulf. Stand behind Cairo's war on the movement and drive it from public life."
 SAU_Subsidize_Egyptiaon_army:0 "Subsidise the Egyptian Army"
 SAU_Subsidize_Egyptiaon_army_desc:0 "An army that eats Saudi bread will march to Saudi tunes. Take over the financing of Egypt's officer corps and its sprawling military economy."
 SAU_Joint_Training_in_red_sea:0 "Joint Training in the Red Sea"
 SAU_Joint_Training_in_red_sea_desc:0 "Saudi and Egyptian fleets share one sea and one set of enemies. Hold joint exercises that turn two navies into a single Red Sea command."
 SAU_Monopolize_Egyptian_Real_Estate:0 "Monopolise Egyptian Real Estate"
 SAU_Monopolize_Egyptian_Real_Estate_desc:0 "From the new capital in the desert to the Mediterranean coast, Egypt is for sale to whoever has the cash. Let Saudi funds buy up the commanding heights of Egyptian property."
 SAU_The_Red_Sea_Tourism:0 "Red Sea Tourism"
 SAU_The_Red_Sea_Tourism_desc:0 "The reefs and beaches of the Red Sea could rival any in the world. Develop a tourism corridor from the Saudi coast to the Egyptian Riviera."
 SAU_The_Arab_Sheild_Pact:0 "The Arab Shield Pact"
 SAU_The_Arab_Sheild_Pact_desc:0 "With Egypt secured and the Red Sea a Saudi-Egyptian lake, formalise the military pact that makes Riyadh and Cairo the joint guardians of the Arab order."

 SAU_Arabia_Yemen:0 "Arabia and Yemen"
 SAU_Arabia_Yemen_desc:0 "Yemen is the Kingdom's soft underbelly: poor, populous and perpetually unstable on its southern border. Saudi Arabia cannot ignore what happens in Sanaa."
 SAU_Yemeni_Civil_war:0 "The Yemeni Civil War"
 SAU_Yemeni_Civil_war_desc:0 "The Houthis have seized the capital and driven the recognised government into exile, and an Iranian foothold is taking root on Arabia's doorstep. The Kingdom must decide how far it will go to reverse it."
 SAU_Support_The_Government_Proxy:0 "A Proxy War in Yemen"
 SAU_Support_The_Government_Proxy_desc:0 "Fight the war through others. Bankroll the exiled government, the southern militias and the tribes, and let Yemenis do the dying while Saudi jets watch from above."
 SAU_Support_The_Government_Direct:0 "Direct Intervention in Yemen"
 SAU_Support_The_Government_Direct_desc:0 "Send in the Saudi army. A direct campaign promises a faster decision and a clearer victory, and risks a quagmire that bleeds the Kingdom for years."
 SAU_The_Yemeni_Peace_Talks:0 "The Yemeni Peace Talks"
 SAU_The_Yemeni_Peace_Talks_desc:0 "Every war ends at a table. Bring the Yemeni factions to terms on conditions that leave the Kingdom's southern frontier secure."
 SAU_Partion_The_Yemen:0 "Partition Yemen"
 SAU_Partion_The_Yemen_desc:0 "A united Yemen has only ever been trouble. Split the country into a friendly south and a contained north, and manage the border on Saudi terms."
 SAU_Total_Victory_in_Civil_war:0 "Total Victory in the Civil War"
 SAU_Total_Victory_in_Civil_war_desc:0 "Crush the Houthis outright and restore a single government wholly beholden to Riyadh. Yemen becomes a Saudi protectorate in all but name."
 SAU_Open_pipeline_into_ArabiaSea:0 "A Pipeline to the Arabian Sea"
 SAU_Open_pipeline_into_ArabiaSea_desc:0 "A pacified Yemen offers what the Kingdom has always wanted: an export route to the Arabian Sea that bypasses the Strait of Hormuz entirely. Build the pipeline that frees Saudi oil from Iran's chokepoint."

 SAU_Arabia_Iraq:0 "Arabia and Iraq"
 SAU_Arabia_Iraq_desc:0 "Mesopotamia was once Arabia's shield against Persia; now it is contested ground between Riyadh and Tehran. The Kingdom must win back a country it long treated as an enemy."
 SAU_Iraq_war:0 "The Iraq War"
 SAU_Iraq_war_desc:0 "American tanks are rolling toward Baghdad, and the old order in Mesopotamia is about to be swept away. The Kingdom must prepare for whatever rises from the wreckage."
 SAU_Saddem_Still_in_power:0 "Saddam Endures"
 SAU_Saddem_Still_in_power_desc:0 "The Baathist regime survives the storm, wounded but unbroken. The old enemy remains across the northern border, and the Kingdom must live with the tyrant of Baghdad a while longer."
 SAU_Saddem_Fell:0 "Saddam Falls"
 SAU_Saddem_Fell_desc:0 "The statues come down and the regime collapses, leaving a vacuum where a great Arab state once stood. Riyadh must move before Tehran fills it."
 SAU_Prepare_Defenseiv_against_Saddem:0 "Prepare Defences against Saddam"
 SAU_Prepare_Defenseiv_against_Saddem_desc:0 "A cornered Saddam is a dangerous one. Fortify the northern frontier against the army that once stood in Kuwait, a day's drive from the oilfields."
 SAU_Memories_of_Khafji:0 "Memories of Khafji"
 SAU_Memories_of_Khafji_desc:0 "In 1991 Iraqi armour briefly seized a Saudi border town, a humiliation the Kingdom never forgot. Let the memory of Khafji steel the realm's defences against any repeat."
 SAU_Cooperative_with_new_Government:0 "Engage the New Baghdad"
 SAU_Cooperative_with_new_Government_desc:0 "A new government sits in Baghdad, Shia-led and courted by Tehran. Swallow old enmities and draw the new Iraq toward the Arab fold."
 SAU_Begin_countering_Iranian:0 "Counter Iranian Influence"
 SAU_Begin_countering_Iranian_desc:0 "Iran's militias and money have flooded into the vacuum left by Saddam. Begin the long campaign to pry Iraq loose from the Islamic Republic's grip."
 SAU_Counter_the_Baathist:0 "Counter the Baathist Remnant"
 SAU_Counter_the_Baathist_desc:0 "Whether Saddam fell or merely faltered, the Baath remains a force in Iraq's shadows. Deny the old regime's diehards any path back to power."
 SAU_New_Iraq_Alighment_with_us:0 "A New Iraqi Alignment"
 SAU_New_Iraq_Alighment_with_us_desc:0 "Years of patient diplomacy and patronage bear fruit: Baghdad tilts, at last, toward Riyadh. Anchor the new alignment before it can slip back toward Tehran."
 SAU_The_IPSA_reopen:0 "Reopen the IPSA Pipeline"
 SAU_The_IPSA_reopen_desc:0 "The Iraqi pipeline through Saudi Arabia once carried Baghdad's oil to the Red Sea before the Gulf War shut it. With Iraq friendly again, reopen the line and bind its economy to the Kingdom's."

 SAU_Anti_Iran_propandia:0 "Anti-Iranian Propaganda"
 SAU_Anti_Iran_propandia_desc:0 "The war for the Muslim world is fought as much on satellite channels as on battlefields. Wield the Kingdom's media empire to expose the Islamic Republic and rally the Sunni world against it."
 SAU_The_Silk_Web_Network:0 "The Silk Web Network"
 SAU_The_Silk_Web_Network_desc:0 "Information is a weapon, and the Kingdom intends to wield it. Weave a web of media outlets, clerics and online voices that carries Riyadh's message across the region."
 SAU_Fight_Iran_In_directly:0 "Fight Iran Indirectly"
 SAU_Fight_Iran_In_directly_desc:0 "Open battle with the Islamic Republic would ruin both sides. Instead, bleed Tehran through its proxies and its restless provinces, never quite crossing the line into open war."
 SAU_Spark_protest_inside_the_Axis:0 "Stir the Axis of Resistance"
 SAU_Spark_protest_inside_the_Axis_desc:0 "Iran's strength is a chain of proxies from Lebanon to Yemen, and every link has its discontents. Fund the protests and fractures that turn Tehran's allies into liabilities."
 SAU_Attack_iranian_influnce_in_Gulf:0 "Roll Back Iran in the Gulf"
 SAU_Attack_iranian_influnce_in_Gulf_desc:0 "From Bahrain's Shia majority to Iraq's militias, Iran probes every weakness along the Gulf's western shore. Push its influence back, capital by capital."
 SAU_Fortify_the_Kingdom:0 "Fortify the Kingdom"
 SAU_Fortify_the_Kingdom_desc:0 "If the cold war with Iran turns hot, the blow will fall on the Eastern Province and the Strait. Harden the realm's defences for the day deterrence fails."
 SAU_The_Yemen_Quagmire_exposed_iran:0 "The Yemen Quagmire"
 SAU_The_Yemen_Quagmire_exposed_iran_desc:0 "The war in Yemen has been costly, but it has also drawn Iran into a trap, exposed as the patron of the Houthi missiles falling on Riyadh. Turn the quagmire into a weapon of diplomacy."
 SAU_The_Battle_for_the_Straits:0 "The Battle for the Straits"
 SAU_The_Battle_for_the_Straits_desc:0 "Whoever commands the Strait of Hormuz commands a fifth of the world's oil. Prepare the Kingdom and its allies to break Iran's grip on the world's most important waterway."
 SAU_Hormouz_sheild:0 "The Hormuz Shield"
 SAU_Hormouz_sheild_desc:0 "Iran threatens to close the Strait at the first sign of war. Build the air and naval shield, with allied help, that keeps the tankers sailing whatever Tehran threatens."
 SAU_Operation_Red_Gulf:0 "Operation Red Gulf"
 SAU_Operation_Red_Gulf_desc:0 "Should the cold war ignite, the Kingdom must be ready to carry the fight to the Iranian shore. Draw up the plans for a decisive campaign in the waters of the Gulf."
 SAU_Supplies_from_Eastern_province:0 "Supplies from the Eastern Province"
 SAU_Supplies_from_Eastern_province_desc:0 "The oilfields and ports of the Eastern Province are both the prize and the arsenal of any Gulf war. Organise the region to sustain a prolonged confrontation with Iran."
 SAU_Iran_focuses_copy6_copy4:0 "Command of the Gulf"
 SAU_Iran_focuses_copy6_copy4_desc:0 "With Iran's navy broken and the Strait held open, the Kingdom stands master of the Gulf's waters. The long contest for the sea is won."
 SAU_Chinese_mediation:0 "Chinese Mediation"
 SAU_Chinese_mediation_desc:0 "Beijing, the great customer of both Riyadh and Tehran, offers to broker what the West never could. Let China mediate a thaw that freezes the cold war in place."
 SAU_Return_of_the_relationship:0 "Restoration of Relations"
 SAU_Return_of_the_relationship_desc:0 "Years of severed ties give way, cautiously, to reopened embassies. Manage the dangerous detente with the Islamic Republic without surrendering the Kingdom's interests."
 SAU_Mecca_summit:0 "The Mecca Summit"
 SAU_Mecca_summit_desc:0 "Let the rivals meet in Islam's holiest city, under the Kingdom's roof and on the Kingdom's terms. A summit at Mecca crowns Riyadh as the indispensable arbiter of the Muslim world."
 SAU_Buy_Iraqi_Parliament:0 "Buy the Iraqi Parliament"
 SAU_Buy_Iraqi_Parliament_desc:0 "Iraqi politics runs on patronage, and the Kingdom has deeper pockets than the mullahs. Purchase blocs and ministers until Baghdad's parliament leans toward Riyadh."
 SAU_Sacation_in_southern_bloc:0 "Sanction the Southern Bloc"
 SAU_Sacation_in_southern_bloc_desc:0 "Choke the finances of the Iran-aligned factions across the region. Sanctions and blacklists starve Tehran's friends of the money that keeps them loyal."
 SAU_Fund_LAF:0 "Fund the Lebanese Army"
 SAU_Fund_LAF_desc:0 "In Lebanon the national army is the only counterweight to Hezbollah's state within a state. Fund the LAF as a rival pole to Iran's militia."
 SAU_The_Taif_Agreement:0 "The Spirit of Taif"
 SAU_The_Taif_Agreement_desc:0 "The Saudi-brokered Taif Accord once ended Lebanon's civil war and gave the Kingdom a hand in Beirut. Revive that role and reclaim Lebanon from Iran's orbit."
 SAU_Basra_Grid_connection:0 "The Basra Grid Connection"
 SAU_Basra_Grid_connection_desc:0 "Iraq's south swelters through blackouts while importing Iranian power. Wire Basra into the Gulf grid and replace Iranian electricity with Saudi current."
 SAU_Armed_Anti_Iranian_groups:0 "Arm the Anti-Iranian Groups"
 SAU_Armed_Anti_Iranian_groups_desc:0 "From Baluchistan to Khuzestan, the Islamic Republic has restless minorities of its own. Arm them, and carry the long war into Iran's own territory."





 SAU_west_joint_training:0 "Joint American-Saudi Training"
 SAU_west_joint_training_desc:0 "US instructors and joint exercises drill the Saudi armed forces in modern combined-arms warfare. Hard-won mastery and experience flow through every branch of the military."
 SAU_west_free_trade:0 "Free Trade with the West"
 SAU_west_free_trade_desc:0 "Lower tariffs and sign trade pacts across the NATO bloc. Relations with the Western alliance warm, and an open trade deal binds their markets to the Kingdom."
 SAU_west_petrodollar:0 "Petrodollar Recycling"
 SAU_west_petrodollar_desc:0 "Saudi oil revenue is recycled into US Treasuries and shared American ventures. The Kingdom gains less up front, but Washington grows richer and more committed to the House of Saud."
 SAU_east_trade:0 "Trade Agreement with the East"
 SAU_east_trade_desc:0 "Asia's booming economies hunger for energy and offer cheap goods in return. The Kingdom throws open its markets to the East."
 SAU_east_energy_markets:0 "Asian Energy Markets"
 SAU_east_energy_markets_desc:0 "Saudi crude flows east to China and the rest of Asia. New customers mean new leverage and a quiet step away from dependence on the West."
 SAU_east_belt_road:0 "Belt and Road Investment"
 SAU_east_belt_road_desc:0 "Chinese state capital pours into Saudi ports, rail, and industrial cities. Beijing builds what the Kingdom needs, and asks no questions."
 SAU_succession_instability:0 "§RSuccession Instability§!"
 SAU_succession_instability_desc:0 "King Fahd has been incapacitated since his stroke in 1995, leaving Crown Prince Abdullah as the de facto ruler. The royal court is divided between Abdullah's supporters and the powerful Sudairi faction, creating an atmosphere of political uncertainty. Until the succession is formally resolved, the Kingdom's decision-making remains paralyzed by factional rivalries."
 SAU_unemployment_crisis_10:0 "The Unemployment Crisis (30% Jobless)"
 SAU_unemployment_crisis_10_desc:0 "Joblessness grips the Kingdom. A whole generation of young Saudis leaves school with nowhere to work, and the streets grow restless."
 SAU_unemployment_crisis_9:0 "The Unemployment Crisis (27% Jobless)"
 SAU_unemployment_crisis_9_desc:0 "Joblessness grips the Kingdom. A whole generation of young Saudis leaves school with nowhere to work, and the streets grow restless."
 SAU_unemployment_crisis_8:0 "The Unemployment Crisis (24% Jobless)"
 SAU_unemployment_crisis_8_desc:0 "Joblessness grips the Kingdom. A whole generation of young Saudis leaves school with nowhere to work, and the streets grow restless."
 SAU_unemployment_crisis_7:0 "The Unemployment Crisis (21% Jobless)"
 SAU_unemployment_crisis_7_desc:0 "Unemployment is receding as the reforms take hold, but the jobs gap is still wide and the pressure on the government has not lifted."
 SAU_unemployment_crisis_6:0 "The Unemployment Crisis (18% Jobless)"
 SAU_unemployment_crisis_6_desc:0 "Unemployment is receding as the reforms take hold, but the jobs gap is still wide and the pressure on the government has not lifted."
 SAU_unemployment_crisis_5:0 "The Unemployment Crisis (15% Jobless)"
 SAU_unemployment_crisis_5_desc:0 "Unemployment is receding as the reforms take hold, but the jobs gap is still wide and the pressure on the government has not lifted."
 SAU_unemployment_crisis_4:0 "The Unemployment Crisis (12% Jobless)"
 SAU_unemployment_crisis_4_desc:0 "Unemployment is receding as the reforms take hold, but the jobs gap is still wide and the pressure on the government has not lifted."
 SAU_unemployment_crisis_3:0 "The Unemployment Crisis (9% Jobless)"
 SAU_unemployment_crisis_3_desc:0 "The worst is over. Only pockets of joblessness remain as Saudis fill the jobs once held by foreign workers."
 SAU_unemployment_crisis_2:0 "The Unemployment Crisis (6% Jobless)"
 SAU_unemployment_crisis_2_desc:0 "The worst is over. Only pockets of joblessness remain as Saudis fill the jobs once held by foreign workers."
 SAU_unemployment_crisis_1:0 "The Unemployment Crisis (3% Jobless)"
 SAU_unemployment_crisis_1_desc:0 "The worst is over. Only pockets of joblessness remain as Saudis fill the jobs once held by foreign workers."
 SAU_employment_recovery:0 "Employment Recovery"
 SAU_employment_recovery_desc:0 "Years of labour reform are paying off. Saudis are entering the workforce in growing numbers, and the economy is finally creating jobs faster than the population grows."
 SAU_resolve_unemployment_tt:0 "§MThis Focus will Resolve Unemployment§!"

 SAU_aramco_01:0 "Saudi Aramco"
 SAU_aramco_01_desc:0 "The Saudi Arabian Oil Company is the world's largest petroleum enterprise, fully nationalized since 1980. Aramco controls the Kingdom's vast oil reserves and serves as the backbone of the Saudi economy, generating the majority of government revenue. While immensely profitable, the company operates with limited transparency and has yet to modernize its corporate structure."
 SAU_aramco_02:0 "Saudi Aramco - Expanded Operations"
 SAU_aramco_02_desc:0 "Aramco has expanded its operations beyond crude oil extraction, investing in refining capacity, petrochemical ventures, and international partnerships. The company's growing efficiency and diversified portfolio have strengthened its position as the cornerstone of the Saudi economy."
 SAU_aramco_03:0 "Saudi Aramco - Global Energy Leader"
 SAU_aramco_03_desc:0 "Saudi Aramco has transformed into a modern global energy giant. With a successful public listing, expanded downstream operations, and strategic international investments, the company now stands as one of the most valuable corporations in the world. Its revenues fuel not only the Kingdom's budget but also ambitious development programs across the nation."

 SAU_diversification:0 "§HEconomic Diversification§!"
 SAU_diversification_desc:0 "The Kingdom's drive to build a §Lnon-oil economy§! - the answer to the petrostate's dilemma. Each pillar you develop (governance, industry, tourism, technology, energy and more) appears here and §Glowers your oil dependence§!, turning a fragile petrostate into a resilient, diversified nation."
