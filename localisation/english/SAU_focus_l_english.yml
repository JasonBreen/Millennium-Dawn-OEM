l_english:
 SAU_events.85.t:0 "The King's Health Falters"
 SAU_events.85.d:0 "King Salman is failing. Aged and ailing, the Custodian of the Two Holy Mosques can no longer carry the burden of the throne, and the Kingdom looks to his ambitious son. As in the last years of King Fahd, a choice must be made: hand the crown to Mohammed bin Salman now, or let him rule in his father's name as Crown Prince and Prime Minister while Salman reigns in title alone."
 SAU_events.85.a:0 "Crown Mohammed bin Salman king."
 SAU_events.85.b:0 "Name him Crown Prince and Prime Minister."
 SAU_events.86.t:0 "The Death of King Salman"
 SAU_events.86.d:0 "King Salman bin Abdulaziz has passed. The regent steps out from behind the throne to claim it in full: Mohammed bin Salman is now King of Saudi Arabia, master of the Kingdom in name as he has long been in fact."
 SAU_events.86.a:0 "The King is dead. Long live the King."
 SAU_mbs_regent:0 "MBS: Crown Prince and Prime Minister"
 SAU_mbs_regent_desc:0 "King Salman reigns in name, but it is his son who rules. As Crown Prince and Prime Minister, Mohammed bin Salman drives Vision 2030, the reforms, and the purges from behind the throne, with all the energy his ailing father can no longer muster."
 SAU_vision2030_category_desc:0 "Saudi Arabia's giga-projects, each on its own deadline. Fund and finish them in time to make Vision 2030 a reality. Let the deadlines pass and the projects become costly monuments to ambition, dragging the Vision toward failure.\n\n There will be a Decisions to build each project, each Project have deadline when you hover around the Project, it update weakly if it is 1848, the next update for the Decision deadline will be 1841 (-7days)\n\n if you didn't do the project and deadline ended, it will result in debuff in the 2030 Vision, otherwise when you finished the project it will result in increase the buff instead"
 SAU_show_deadlines_dec:0 "Show Project Deadlines"
 SAU_show_deadlines_dec_desc:0 "Display the countdown for every Vision 2030 project so their deadlines can be tracked at a glance. The clocks run whether they are shown or not."
 SAU_hide_deadlines_dec:0 "Hide Project Deadlines"
 SAU_hide_deadlines_dec_desc:0 "Tuck the project countdowns out of sight to declutter the decisions panel. The deadlines keep running in the background."
 SAU_proj_neom_deadline:0 "Deadline: NEOM"
 SAU_proj_neom_deadline_desc:0 "Vision 2030 has set a deadline for §HNEOM§!. Fund and complete it in time and the Kingdom's momentum grows. Miss it, and a factory closes its doors, billions are written off, and the Vision slips a step closer to failure."
