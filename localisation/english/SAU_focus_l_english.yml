 SAU_tadawul_market_t7_desc:0 "The §LSaudi Stock Exchange§! takes its first steps. Trades clear, regulators write rules, and the world begins to take note. Each new reform deepens the market: more capital flows, more revenue accrues, more confidence builds. §HTadawul grows with every focus the Kingdom completes.§!"
 SAU_tadawul_market_t8:0 "§GTadawul, the Saudi Stock Exchange LVL 8§!"
 SAU_tadawul_market_t8_desc:0 "The §LSaudi Stock Exchange§! takes its first steps. Trades clear, regulators write rules, and the world begins to take note. Each new reform deepens the market: more capital flows, more revenue accrues, more confidence builds. §HTadawul grows with every focus the Kingdom completes.§!"
 SAU_tadawul_market_t9:0 "§MTadawul, the Saudi Stock Exchange LVL 9§!"
 SAU_tadawul_market_t9_desc:0 "The §LSaudi Stock Exchange§! takes its first steps. Trades clear, regulators write rules, and the world begins to take note. Each new reform deepens the market: more capital flows, more revenue accrues, more confidence builds. §HTadawul grows with every focus the Kingdom completes.§!"
 SAU_tadawul_market_t10:0 "§MTadawul, the Saudi Stock Exchange LVL 10§!"
 SAU_tadawul_market_t10_desc:0 "§MThe Kingdom's exchange has reached the apex of its reform programme.§! All laws are passed, all regulators are seated, all listings are made. §LTadawul§! is the §Mlargest exchange in MENA§! - more capital under management than the rest of the Arab world combined."
 SAU_tadawul.1.t:0 "§HRoyal Decree M/30 - Implementation§!"
 SAU_tadawul.1.d:0 "The §LCapital Market Law§! is signed. Now we must decide: who shall sit at the head of the new §LCapital Market Authority§!? The technocrats demand independence; the §HRoyal Court§! demands oversight; foreign advisors offer their experience. The choice will define the kingdom's financial architecture for a generation."
 SAU_tadawul.1.a:0 "Independent technocrats."
 SAU_tadawul.1.b:0 "Royal oversight is essential."
 SAU_tadawul.1.c:0 "Bring in foreign experts."

 SAU_tadawul.2.t:0 "§HThe 2007 Legal Reforms§!"
 SAU_tadawul.2.d:0 "Formal incorporation reshapes the corporate landscape. Joint-Stock Companies, Limited Liability Companies - the §LKingdom§! must choose its model. The §LAnglo-Saxon§! framework offers efficiency at the cost of foreign influence; the §LSharia-first§! framework offers legitimacy at the cost of speed; the §Lhybrid§! takes a measured middle path."
 SAU_tadawul.2.a:0 "The Anglo-Saxon framework."
 SAU_tadawul.2.b:0 "The Sharia-first framework."
 SAU_tadawul.2.c:0 "A hybrid model."

 SAU_modernisation_balance_of_power_category:0 "§HKingdom's Future§!"
 SAU_modernisation_balance_of_power_category_desc:0 "Two visions struggle for the soul of the §LKingdom of Saudi Arabia§!. The §Rtraditionalist§! camp - the §LCouncil of Senior Scholars§!, the §Lroyal court§!, the §Ltribal elders§! - guards the old ways. The §Gliberalisation§! camp - the technocrats, the foreign-trained engineers, the §LVision 2030§! advocates - presses for openness, reform, and a place at the modern world's table. The balance shifts with every focus completed and every decision taken."

 SAU_traditionalist_bop_left_side:0 "§HTraditionalist§!"
 SAU_traditionalist_bop_left_side_desc:0 "The §LWahhabi clergy§!, conservative princes, and tribal sheikhs. They preserve the Kingdom's character but resist the changes the world demands."
 SAU_liberalisation_bop_right_side:0 "§HLiberalisation§!"
 SAU_liberalisation_bop_right_side_desc:0 "The §Ltechnocrats§!, foreign-trained engineers, and reformist princes. They open the Kingdom's doors - at the cost of disturbing the established order."

 SAU_modernisation_bop_centre_range:0 "§YBalanced Kingdom§!"
 SAU_modernisation_bop_centre_range_desc:0 "Neither tradition nor reform dominates. The Kingdom holds steady - for now."

 SAU_traditionalist_bop_low_range:0 "§HMild Traditionalism§!"
 SAU_traditionalist_bop_low_range_desc:0 "The clergy and conservatives have a §Yslight upper hand§!. The Kingdom moves cautiously."
 SAU_traditionalist_bop_medium_range:0 "§HConservative Kingdom§!"
 SAU_traditionalist_bop_medium_range_desc:0 "Tradition is the §Hguiding hand§!. Reform proposals are weighed against centuries of precedent - and usually found wanting."
 SAU_traditionalist_bop_advanced_range:0 "§HOrthodox Kingdom§!"
 SAU_traditionalist_bop_advanced_range_desc:0 "The §LCouncil of Senior Scholars§! sets the agenda. Modernisers are §Ymarginalised§! or §Yexiled§!. The Kingdom looks inward."
 SAU_traditionalist_bop_win_range:0 "§RClerical Theocracy§!"
 SAU_traditionalist_bop_win_range_desc:0 "The §Lulema§! rule in all but name. The world calls; the Kingdom does not answer. Tradition has §Rwon§!, and the price is paid in lost decades."

 SAU_liberalisation_bop_low_range:0 "§HCautious Reform§!"
 SAU_liberalisation_bop_low_range_desc:0 "The reformers have a §Gtoehold§!. New offices, new schools, new ideas trickle through the cracks."
 SAU_liberalisation_bop_medium_range:0 "§HVision 2030§!"
 SAU_liberalisation_bop_medium_range_desc:0 "The §LCrown Prince§!'s programme is the new orthodoxy. Universities expand, tourism opens, women drive."
 SAU_liberalisation_bop_advanced_range:0 "§HRapid Liberalisation§!"
 SAU_liberalisation_bop_advanced_range_desc:0 "Reform piles on reform. The §Lulema§! grumble; the §Ltribes§! grumble; but the §Gpace§! does not slow. The Kingdom is changing faster than its people can metabolise."
 SAU_liberalisation_bop_win_range:0 "§MOpen Kingdom§!"
 SAU_liberalisation_bop_win_range_desc:0 "Saudi Arabia is §Munrecognisable§! from the Kingdom of 2000. Foreign capital, foreign tourism, foreign culture. The reformers have §Gwon§! - but the §Yclerics§! have not forgotten."

 SAU_modernisation_balance_of_power_category_cat:0 "§HKingdom's Future§!"

 SAU_bop_note:0 "§HHow the Kingdom's Future Shifts§!"
 SAU_bop_note_desc:0 "The §HKingdom's Future§! balance cannot be moved by direct decision. It shifts with §Lfocuses completed§! in the Tadawul, SAGIA, and other branches; with §Lkey events§!; and with the §Lreforms§! the King chooses to enact. This is the long, slow tide of history - not a button to press."

 SAU_debug_bop_left:0 "§Y[DEBUG] Shift toward Traditionalist§!"
 SAU_debug_bop_left_desc:0 "Modder/debug tool only. Shifts the §HKingdom's Future§! balance §R-0.05 to the left§! (toward Traditionalism). Visible only when the game is launched with -debug."

 SAU_debug_bop_right:0 "§Y[DEBUG] Shift toward Liberalisation§!"
 SAU_debug_bop_right_desc:0 "Modder/debug tool only. Shifts the §HKingdom's Future§! balance §G+0.05 to the right§! (toward Liberalisation). Visible only when the game is launched with -debug."

 SAU_debug_water_pride_up:0 "§Y[DEBUG] Force Water Pride +1 Tier§!"
 SAU_debug_water_pride_up_desc:0 "Modder/debug tool. Forces the §HSovereign Waters§! spirit one tier up regardless of stability. Visible only with -debug."
 SAU_debug_water_pride_down:0 "§Y[DEBUG] Force Water Pride -1 Tier§!"
 SAU_debug_water_pride_down_desc:0 "Modder/debug tool. Forces the §HSovereign Waters§! spirit one tier down regardless of stability. Visible only with -debug."

 SAU_royal_ulema_alliance_high:0 "§HRoyal-Ulema Alliance§!"
 SAU_royal_ulema_alliance_high_desc:0 "The §LCouncil of Senior Scholars§! grants the throne its full blessing. Friday sermons echo the King's name with reverence; the religious establishment is wholly in lockstep with the dynasty. The kingdom moves as §Gone body, one mind§!."
 SAU_royal_ulema_alliance_content:0 "§HRoyal-Ulema Alliance§!"
 SAU_royal_ulema_alliance_content_desc:0 "The §LUlema§! and the §HHouse of al Saud§! cooperate productively. Routine fatwas favour the throne; routine policies respect the clergy. Neither side has cause for complaint."
 SAU_royal_ulema_alliance_neutral:0 "§HRoyal-Ulema Alliance§!"
 SAU_royal_ulema_alliance_neutral_desc:0 "Throne and clergy maintain a §Yformal§! relationship - civil but distant. Each pursues its own concerns; neither hinders nor helps the other. A delicate balance held by tradition alone."
 SAU_royal_ulema_alliance_strained:0 "§RRoyal-Ulema Strain§!"
 SAU_royal_ulema_alliance_strained_desc:0 "The §LUlema§! whisper against the throne in their private circles. Sermons hint at corruption. The dynasty's religious legitimacy is §Rfraying§!, and every reform is met with silent resistance."

 SAU_royal_ulema_alliance_neutral_tt:0 "§YThrone-Ulema relationship is balanced - no bonus or penalty.§! \n§Ybalance of power change = 0.00§!"

 SAU_banking_system:0 "§HBanking System§!"
 SAU_banking_system_desc:0 "The Kingdom's financial sector. Each banking-law focus gives the player a §Lsecular§!, §Lislamic§!, or §Lhybrid§! choice; the result lives here as a §Hsub-system§!. The total modifier comes from the sum of all chosen sub-systems."
