 SAU_events.11.t:0 "[SAU.GetFlag]Oil for Security"
 SAU_events.11.d:0 "Riyadh offers Washington a standing bargain: a reliable flow of Saudi oil to American markets in exchange for closer security cooperation. The Kingdom awaits an answer."
 SAU_events.12.t:0 "[SAU.GetFlag]A Saudi-British Partnership"
 SAU_events.12.d:0 "Saudi Arabia proposes a long-term partnership with Britain. Oil revenue would pay for British industry and expertise, reviving the spirit of Al-Yamamah."
 SAU_events.13.t:0 "[SAU.GetFlag]A Franco-Saudi Investment Pact"
 SAU_events.13.d:0 "Setting old suspicions aside, Riyadh offers Paris a sweeping investment pact: Saudi capital for French industry, and French expertise for the Kingdom. Both governments stand to gain."
 SAU_events.13.a:0 "A profitable arrangement."
 SAU_events.14.t:0 "[SAU.GetFlag]A Major Non-NATO Ally"
 SAU_events.14.d:0 "Saudi Arabia requests designation as a Major Non-NATO Ally. Washington would guarantee the Kingdom, and American forces would gain basing rights on Saudi soil."
 SAU_events.15.t:0 "[SAU.GetFlag]A Saudi-Spanish Partnership"
 SAU_events.15.d:0 "Riyadh approaches Madrid with a naval offer: Spanish yards would build for the Royal Saudi Navy, and Saudi money would flow into Spanish industry."
 SAU_events.16.t:0 "[SAU.GetFlag]The American Shield"
 SAU_events.16.d:0 "The Kingdom asks Washington for an expanded air-defence umbrella. Patriot batteries would ring Saudi cities and oil fields, paid for in full by Riyadh."
 SAU_oil_for_security_focus_tt:0 "[USA.GetFlag]§HIf the United States accepts the offer, we will gain a Fossil Fuel Powerplant, oil revenue, Stability, and the Oil for Security National Spirit§!"

 SAU_UK_partnership_focus_tt:0 "[ENG.GetFlag]§HIf Britain accepts the offer, we will gain a Investment Return National Spirit for the two countries!"
 SAU_UK_stratgic_friendship_UKOne:0 "The Saudi-British Partnership"
 SAU_never_trust_french_focus_tt:0 "[FRA.GetFlag]§HFrance will be offered an investment pact: both nations gain a National Spirit§!"
 SAU_MNNA_focus_tt:0 "[USA.GetFlag]§HIf the United States accepts, We will get Major Non NATO Ally National Spirit§!"
 SAU_spain_partnership_focus_tt:0 "[SPR.GetFlag]§HIf Spain accepts the offer, we will gain a Naval Dockyard in Jeddah§!"
 SAU_american_shield_focus_tt:0 "[USA.GetFlag]§HIf the United States accepts, we will gain two levels of Anti-Air protection in Riyadh§!"
 SAU_french_investment_pact:0 "Franco-Saudi Investment Pact"
 SAU_french_investment_pact_desc:0 "French and Saudi capital flows both ways under a state-backed pact. Total, Airbus, and Thales set up shop in the Kingdom while Saudi funds buy into French industry."
 SAU_french_investment_pact_FRA:0 "Saudi-French Investment Pact"
 SAU_french_investment_pact_FRA_desc:0 "A state-backed pact opens Saudi markets to French industry and brings Gulf capital into France."
 SAU_oil_for_security_pact:0 "Oil for Security"
 SAU_oil_for_security_pact_desc:0 "The Kingdom keeps American markets supplied with oil, and Washington underwrites Saudi security. The arrangement anchors the riyal, the dollar, and the House of Saud alike."
 SAU_oil_for_security_pact_USA:0 "Oil for Security"
 SAU_oil_for_security_pact_USA_desc:0 "Riyadh guarantees the flow of oil to American markets: cheap, reliable fuel in exchange for the American security umbrella."
 SAU_IMEC_india_deal_new:0 "The IMEC Corridor"
 SAU_IMEC_india_deal_new_desc:0 "The India-Middle East-Europe corridor channels Indian trade through Saudi ports and rail. The Kingdom collects the tolls of a new Silk Road."
 SAU_OPEC_Russia_deal_new:0 "OPEC+ Coordination"
 SAU_OPEC_Russia_deal_new_desc:0 "Riyadh and Moscow set production quotas together. Two oil superpowers steering one market."
