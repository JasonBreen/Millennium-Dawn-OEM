 SAU_research_modifier_01:0 "Rising Literacy"
 SAU_research_modifier_01_desc:0 "As more Saudis learn to read, the Kingdom's classrooms and laboratories begin to stir.\n\n§G+2%§! Research Speed"
 SAU_research_modifier_02:0 "An Educated Generation"
 SAU_research_modifier_02_desc:0 "A generation raised in modern schools enters the workforce.\n\n§G+5%§! Research Speed"
 SAU_research_modifier_03:0 "A Knowledge Economy"
 SAU_research_modifier_03_desc:0 "Universities, research centres and skilled graduates drive innovation across the Kingdom.\n\n§G+7.5%§! Research Speed"
 SAU_research_modifier_04:0 "A Knowledge Society"
 SAU_research_modifier_04_desc:0 "The Kingdom of Saudi Arabia stands among the educated nations of the world.\n\n§G+10%§! Research Speed"
 SAU_research_maxed_tt:0 "§GResearch Speed is already at its maximum (+10%).§!"

 SAU_Intelligence_category:0 "§GGeneral Intelligence Presidency§!"
 SAU_Intelligence_category_desc:0 "The General Intelligence Presidency (GIP) is the Kingdom's primary intelligence agency, responsible for both domestic and foreign intelligence gathering and analysis. It plays a crucial role in national security, counterterrorism, and strategic planning.\n\n§GUnlocking the GIP§! will allow you to make decisions that enhance your intelligence capabilities, providing valuable insights and advantages in both domestic and international affairs.\n\nA Decisions will Open when you Reach §G70%§! GIP Network Penetration in a Country, and will be more likely to appear the higher your penetration is. They will be unavailable if your penetration falls below 70%."
 SAU_intel_expand_gip:0 "Expand the General Intelligence Presidency"
 SAU_intel_expand_gip_desc:0 "Recruit and train fresh GIP operatives, broadening the Kingdom's reach at home and abroad."
 SAU_intel_recruit_operative_tt:0 "§GRecruit a new GIP operative§!"
 SAU_intel_agency_full_tt:0 "§RAll operative slots are full§! - funds are redirected into the agency"
 SAU_intel_mabahith:0 "Strengthen the Mabahith"
 SAU_intel_mabahith_desc:0 "Reinforce the secret police. Tighter surveillance and a firmer grip on dissent shore up internal stability and reassure the religious establishment."
 SAU_intel_counterterror:0 "Counter-Terrorism Directorate"
 SAU_intel_counterterror_desc:0 "Coordinate raids and intelligence operations against al-Qaeda and jihadist cells. The crackdown bolsters stability and rallies the House of Saud behind the GIP, and strikes directly at any foreign fighters operating in the Kingdom."
 SAU_intel_foreign_stations:0 "Foreign Station Network"
 SAU_intel_foreign_stations_desc:0 "Open GIP stations abroad to roll back Iranian influence and extend Saudi reach across the region."
 SAU_intel_surveillance_tech:0 "Acquire Advanced Surveillance Technology"
 SAU_intel_surveillance_tech_desc:0 "Purchase cutting-edge monitoring and data systems. A costly one-time investment that permanently upgrades the agency."
 SAU_intel_counterintel_sweep:0 "Counter-Intelligence Sweep"
 SAU_intel_counterintel_sweep_desc:0 "Hunt foreign agents and harden the GIP against penetration, permanently strengthening counter-intelligence."
 SAU_cyber_defensive_op:0 "Defensive Cyber Operation"
 SAU_cyber_defensive_op_desc:0 "Harden the Kingdom and sabotage the target's offensive systems for §Y90 days§!. Their forces fight §Y10% weaker on the attack§! against us, while the GIP shields our own networks. Requires a §G70%§! network on the target."
 SAU_cyber_offensive_op:0 "Offensive Cyber Operation"
 SAU_cyber_offensive_op_desc:0 "Turn the network into a weapon. A §Y90-day§! GIP cyber strike cripples the target's command and defenses: their divisions fight §Y10% weaker on defense§! and their industry stalls. Requires a §G70%§! network on the target."
 SAU_cyber_defensive_posture:0 "Cyber Defensive Posture"
 SAU_cyber_defensive_posture_desc:0 "GIP hardening operations are shielding the Kingdom's networks and slowing hostile intelligence collection."
 SAU_cyber_offensive_target:0 "Under Saudi Cyber Assault"
 SAU_cyber_offensive_target_desc:0 "GIP cyber operations have crippled command and defensive coordination, and disrupted industry."
 SAU_cyber_defensive_target:0 "Saudi Cyber Countermeasures"
 SAU_cyber_defensive_target_desc:0 "GIP cyber defenses have degraded offensive coordination and command."
 creation_of_GIP_tt:0 "§GIt will Unlock Intelligence related Decisions!§!"

 SAU_Pakistan_training_SaudiTroops_in_region:0 "[PAK.GetFlag] Pakistani Military Advisors"
 SAU_Pakistan_training_SaudiTroops_in_region_desc:0 "Pakistani military advisors and troops have been actively training and assisting Saudi forces for more than 40 years, with the official advisory and training mission still ongoing. This extensive security partnership is anchored by a bilateral security protocol formalized in 1982."
 SAU_Pakistan_Training_tt:0 "§HIf We§! §RRemove§! §Hthe Military Access From Pakistan, we will Lost the National Spirit§!"

 SAU_American_exist_in_Saudi_Arabia_1:0 "[USA.GetFlag] The Amercain Military presence"
 SAU_American_exist_in_Saudi_Arabia_1_desc:0 "The United States does not operate permanent, standalone military bases in Saudi Arabia, but it does maintain a significant and active military presence in the country. U.S. troops and assets are hosted at existing Saudi military installations to provide logistical support, intelligence, and air defense"
 SAU_American_exist_in_Saudi_Arabia_1_tt:0 "§HIf We§! §RRemove§! §Hthe Military Access From United States, we will Lost the National Spirit§!"


 SAU_Foregin_affairs_decisions_tt:0 "§GUnlock§! §YForeign Affairs Decision§!."
 SAU_Foregin_affairs_category:0 "§GSaudi Foreign affairs§!"
 SAU_Foregin_affairs_category_desc:0 "§G Saudi Arabia Foreign Affairs§!\nThe Kingdom's foreign policy is defined by a delicate diplomatic balancing act. As a regional power and the custodian of Islam's holiest sites, we must navigate complex alliances, secure our economic interests, and maintain stability in the Middle East. Whether we align closely with our traditional Western allies, pivot towards emerging Eastern markets, or assert ourselves as an independent regional hegemon, our diplomatic corps will pave the way.\n\n To Open More Decision Related to the Foregin Affairs, you must completed Focuses or get a Speical Event while moving forward\n\n All the Decisions will Show up Again after a year since you selection it."
 SAU_Foreign_affairs_unlocked:0 "§HForeign Affairs Unlocked§!"
