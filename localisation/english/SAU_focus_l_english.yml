 SAU_div_pif_invest:0 "PIF Strategic Investment"
 SAU_div_pif_invest_desc:0 "The §HPublic Investment Fund§! deploys its sovereign capital into the domestic economy - new factories, building capacity and jobs in Riyadh. The single greatest lever of §Gdiversification away from oil§!, but it costs the treasury dearly."
 SAU_div_giga_project:0 "Fund a Giga-Project"
 SAU_div_giga_project_desc:0 "Pour billions into the §HNEOM§! region in the north-west: a futuristic city rising from the desert. Enormous construction capacity and a major step §Gaway from oil§! - at a staggering price."
 SAU_div_renewables:0 "Expand Renewable Capacity"
 SAU_div_renewables_desc:0 "Build out §Hsolar and wind§! in the Empty Quarter. Clean power frees crude for export and §Gloosens the economy's dependence on oil§!."
 SAU_div_digital:0 "Grow the Digital Economy"
 SAU_div_digital_desc:0 "Back §Hfintech, e-commerce and start-ups§!. A young, connected population builds a non-oil economy that §Gpays its own way§! and reduces reliance on crude."
 SAU_div_tourism_event:0 "Host a Global Tourism Event"
 SAU_div_tourism_event_desc:0 "Open the §HRed Sea coast§! to the world - resorts, festivals and pilgrims. Tourist spending floods the treasury and §Gdiversifies§! the Kingdom's income beyond the barrel."
 SAU_div_arms:0 "Localise Arms Production"
 SAU_div_arms_desc:0 "Build out §HSAMI§! and the domestic defence industry. Saudi-made arms cut import bills, employ engineers and §Gbroaden the industrial base§! beyond oil."

 SAU_oil_increase_output:0 "Increase Oil Output"
 SAU_oil_increase_output_desc:0 "Open the valves wider. The Eastern Province pumps more crude - §Gmore oil and more revenue§! now, but the economy leans §Reven harder§! on the barrel."
 SAU_oil_new_field:0 "Develop a New Oil Field"
 SAU_oil_new_field_desc:0 "Sink the wells in the Empty Quarter. A costly venture that adds a major new §Goil deposit§! - and deepens the Kingdom's reliance on it."
 SAU_oil_conserve:0 "Conserve the Reserves"
 SAU_oil_conserve_desc:0 "Throttle back production to preserve the fields for the future. You forgo revenue now, but §Gloosen the economy's grip on oil§! and steady the nation."
 SAU_oil_embargo:0 "Proclaim an Oil Embargo"
 SAU_oil_embargo_desc:0 "As in §H1973§!, wield oil as a weapon: cut off the §LWest and the friends of Israel§! (the §LUnited States, Britain, France, Germany, the Netherlands§!). Their economies reel under the shock; the Arab and Muslim world cheers the Kingdom's defiance.\n\nYou lose your Western export revenue and Washington's goodwill - but win §Hprestige, unity and the clergy's blessing§!."


 SAU_oil_embargoed:0 "§ROil Embargo§!"
 SAU_oil_embargoed_desc:0 "Saudi Arabia and its OPEC partners have cut off the oil. Fuel queues, factory shutdowns and soaring prices grip the economy until the embargo is lifted."

 SAU_oil_dependence_t5:0 "§RThe Oil Economy§! - Total Petrostate"
 SAU_oil_dependence_t5_desc:0 "§HOil dependence: §Y[?oil_dependence|0]§!§H / 100§!\n\nThe Kingdom lives and dies by the barrel. Oil is §Galmost all§! of the budget - immensely profitable, but §Rdangerously exposed§! to any collapse in the world price.\n§YOil dependence changes only through your focuses and decisions - oil choices raise it, diversification lowers it. The Kingdom begins deeply dependent; only sustained reform brings it down, and it stays where you leave it.§!"
 SAU_oil_dependence_t4:0 "§RThe Oil Economy§! - Oil-Dependent"
 SAU_oil_dependence_t4_desc:0 "§HOil dependence: §Y[?oil_dependence|0]§!§H / 100§!\n\nNon-oil sectors are growing, but crude still pays for nearly everything. A price crash would still hurt - badly."
 SAU_oil_dependence_t3:0 "§YThe Oil Economy§! - Diversifying"
 SAU_oil_dependence_t3_desc:0 "§HOil dependence: §Y[?oil_dependence|0]§!§H / 100§!\n\nThe economy is broadening. Oil remains the largest pillar, but no longer the only one that matters."
 SAU_oil_dependence_t2:0 "§YThe Oil Economy§! - Broad-Based"
 SAU_oil_dependence_t2_desc:0 "§HOil dependence: §Y[?oil_dependence|0]§!§H / 100§!\n\nIndustry, services and technology now carry real weight. An oil shock is survivable, not catastrophic."
 SAU_oil_dependence_t1:0 "§GThe Oil Economy§! - Diversified"
 SAU_oil_dependence_t1_desc:0 "§HOil dependence: §Y[?oil_dependence|0]§!§H / 100§!\n\nA modern, diversified economy. Oil is one export among many - the Kingdom is §Gresilient§! to whatever the price of crude may do. Vision 2030, achieved."

 SAU_hajj_management_01:0 "Custodian of the Two Holy Mosques"
 SAU_hajj_management_01_desc:0 "As guardians of Mecca and Medina, the Saudi government oversees the annual Hajj pilgrimage, welcoming roughly two million Muslims from around the world each year. The pilgrimage generates significant revenue through tourism, transportation, and hospitality, while granting the Kingdom unparalleled religious prestige across the Muslim world."
 SAU_hajj_management_02:0 "Expanded Holy Sites Infrastructure"
 SAU_hajj_management_02_desc:0 "Major investments in the Grand Mosque expansion, modern transportation networks, and improved accommodation facilities have increased the Hajj capacity significantly. The holy cities can now welcome millions more pilgrims annually, boosting both revenue and the Kingdom's standing as the spiritual heart of Islam."
 SAU_hajj_management_03:0 "Grand Pilgrimage Megaprojects"
 SAU_hajj_management_03_desc:0 "The holy cities have been transformed through ambitious megaprojects including the Masjid al-Haram expansion, high-speed rail links, and world-class hospitality districts. With capacity exceeding five million pilgrims per year and year-round Umrah tourism flourishing, the Two Holy Mosques have become both a spiritual beacon and a major economic engine for the Kingdom."

 SAU_hajj_revenue_01_tt:0 "§GHajj pilgrimage revenue: ~2 million pilgrims/year§!"
 SAU_hajj_revenue_02_tt:0 "§GHajj pilgrimage revenue: ~3-4 million pilgrims/year§!"
 SAU_hajj_revenue_03_tt:0 "§GHajj pilgrimage revenue: ~5+ million pilgrims/year§!"

 SAU_events.1.t:0 "Death of King Fahd"
 SAU_events.1.d:0 "King Fahd bin Abdulaziz Al-Saud, Custodian of the Two Holy Mosques, has passed away after years of declining health following his stroke in 1995. Crown Prince Abdullah, who has been ruling the Kingdom de facto for nearly a decade, will now ascend to the throne as King. The succession crisis that has loomed over the Kingdom for years has finally been resolved."
 SAU_events.1.a:0 "May Allah have mercy on his soul."

 SAU_sabic_01:0 "SABIC"
 SAU_sabic_01_desc:0 "The Saudi Basic Industries Corporation is a major petrochemical manufacturer. While still growing, SABIC contributes to industrial diversification and provides employment beyond the oil sector."
 SAU_sabic_02:0 "SABIC - Expanded Operations"
 SAU_sabic_02_desc:0 "SABIC has grown its product portfolio and manufacturing capacity. Advanced materials and specialty chemicals now supplement its petrochemical base, strengthening the Kingdom's industrial output."
 SAU_sabic_03:0 "SABIC - Global Industrial Champion"
 SAU_sabic_03_desc:0 "With international acquisitions and a diversified product line, SABIC has become one of the world's leading chemical companies. Its success demonstrates that Saudi industry can compete globally beyond oil."

 SAU_economic_cities:0 "Economic Cities Initiative"
 SAU_economic_cities_desc:0 "King Abdullah Economic City and other planned urban centers are attracting investment in offices, industry, and services. These purpose-built cities serve as engines of non-oil economic growth."

 SAU_renewable_energy_initiative:0 "Renewable Energy Initiative"
 SAU_renewable_energy_initiative_desc:0 "Solar farms and wind installations across the Kingdom's vast deserts are beginning to reduce domestic energy consumption of crude oil, freeing up more barrels for export."
 SAU_renewable_energy_tt:0 "§GSolar and wind energy reduces domestic oil consumption§!"

 SAU_islamic_finance_hub:0 "Islamic Finance Hub"
 SAU_islamic_finance_hub_desc:0 "Saudi Arabia's growing Sharia-compliant banking sector attracts deposits and investment from across the Muslim world. Sukuk bonds and halal investment funds are establishing the Kingdom as a center of Islamic finance."

 SAU_logistics_hub:0 "Logistics Hub"
 SAU_logistics_hub_desc:0 "Jeddah Islamic Port and expanded airport facilities position Saudi Arabia as a key logistics crossroads between Asia, Africa, and Europe. Efficient trade infrastructure boosts export revenues."

 SAU_oil_workforce:0 "Oil Workforce Development"
 SAU_oil_workforce_desc:0 "Trained Saudi nationals are replacing foreign workers in the petroleum sector. A skilled domestic workforce improves operational efficiency and keeps wages circulating in the local economy."

 SAU_modern_infrastructure:0 "Modern Infrastructure"
 SAU_modern_infrastructure_desc:0 "The Riyadh Metro and nationwide highway expansion are transforming the Kingdom's transportation networks. Modern infrastructure reduces costs, attracts investment, and improves quality of life."

 SAU_tourism_sector:0 "Tourism Sector"
 SAU_tourism_sector_desc:0 "From the ancient ruins of AlUla to the Red Sea coast, Saudi Arabia is opening its doors to international tourists. A nascent but growing tourism industry adds a new pillar to the Kingdom's economy."

 SAU_knowledge_economy:0 "Knowledge Economy"
 SAU_knowledge_economy_desc:0 "Investment in universities, vocational training, and research institutions is building the human capital needed for a post-oil economy. Saudi graduates are entering technology, engineering, and business fields in growing numbers."

 SAU_diversified_economy:0 "Diversified Economy"
 SAU_diversified_economy_desc:0 "Saudi Arabia has broken free from total oil dependence. Industry, technology, tourism, finance, and services now form a broad economic base. The Kingdom's economy is more resilient, productive, and prepared for the future."

 SAU_sagia_initiative:0 "§HSAGIA Initiative§!"
 SAU_sagia_initiative_desc:0 "Established by royal decree in §YApril 2000§!, the §LSaudi Arabian General Investment Authority§! is the Kingdom's first dedicated body for attracting foreign capital. Its mandate: §Hsimplify§! the labyrinth of business law, give investors a §Hsingle point of contact§!, and signal to the world that the Kingdom is §Gopen for business§!."
 SAU_sagia_initiative_02:0 "§HSAGIA - Investment Reforms§!"
 SAU_sagia_initiative_02_desc:0 "§LSAGIA§!'s reform agenda is reshaping the investment climate. Ownership rules have §Gloosened§!, licensing wait times have §Gcollapsed§!, and foreign businesses are arriving in growing numbers. The Kingdom is no longer a §Yclosed market§! - it is becoming a §Gdestination§!."
 SAU_sagia_initiative_03:0 "§HSAGIA - Foreign Capital Hub§!"
 SAU_sagia_initiative_03_desc:0 "With §Hstrategic sectors§! opened, §Htax incentives§! in place, and §Heconomic cities§! rising along the coasts, Saudi Arabia has become one of the region's premier destinations for foreign direct investment. Capital flows in from §LLondon§!, §LTokyo§!, §LMumbai§!, and beyond."
 SAU_sagia_initiative_04:0 "§MSAGIA - Investment Powerhouse§!"
 SAU_sagia_initiative_04_desc:0 "The Kingdom has completed its transformation. Saudi Arabia now stands as a §Mglobal investment powerhouse§!: a §Hdiversified economy§!, an §Hopen market§!, and a §Gmagnet§! for the world's capital and talent. The age of the §Yclosed kingdom§! is over."

 SAU_water_crisis_02:0 "§HSevere Water Crisis§!"
 SAU_water_crisis_02_desc:0 "Saudi Arabia's aquifers are being §Ydrained§! at unsustainable rates. The §LSaq Aquifer§! and §LWajid Aquifer§! - fossil water millennia in the making - are emptying within a generation. Industry runs on §Ydesalinated water§!, agriculture devours what little remains, and the cost of every glass is paid in §Yconsumer goods§!, §Yefficiency§!, and §Ypublic patience§!."
 SAU_water_crisis_01:0 "§HManaged Water Crisis§!"
 SAU_water_crisis_01_desc:0 "The Kingdom has not §Ysolved§! its water problem - no nation in this region can. But aggressive desalination expansion, §Hsmarter agricultural policy§!, and §Hpublic discipline§! have brought the crisis to a §Gmanageable§! level. The water still runs."

 SAU_water_pride_dynamic_tt:0 "§GAbove 50% stability§!: pride translates into political capital and population growth.\n§YBelow 50% stability§!: pride curdles into resentment and political drag.\n§HUpdates monthly. 9 tiers, per-10% stability. Removed only if the House of al Saud falls.§!"

 SAU_national_water_pride_plus4:0 "§HSovereign Waters§! - §GTriumphant§!"
 SAU_national_water_pride_plus4_desc:0 "The Kingdom is at its §Gzenith§!. The §HHouse of al Saud§! is celebrated in every mosque and majlis; the §LSaudi-owned§! water program is held up worldwide as proof that the desert can be made to bloom by national hands. Pride is at §Gabsolute peak§!."

 SAU_national_water_pride_plus3:0 "§HSovereign Waters§! - §GConfident§!"
 SAU_national_water_pride_plus3_desc:0 "Stability is §Gdeep§!, the dynasty is §Gsecure§!, and the national water program is a §Hpoint of pride§! at home and abroad. Engineers from §LKAUST§! are courted by Gulf neighbors; the Treasury reaps the rewards."

 SAU_national_water_pride_plus2:0 "§HSovereign Waters§! - §GThriving§!"
 SAU_national_water_pride_plus2_desc:0 "The Kingdom is §Gstable§! and the water program runs §Gsmoothly§!. The §HHouse of al Saud§! commands the respect of its subjects; the §LSaudi-owned§! desalination plants are a quiet badge of competence."

 SAU_national_water_pride_plus1:0 "§HSovereign Waters§! - §GSatisfied§!"
 SAU_national_water_pride_plus1_desc:0 "Stability holds. The water program is doing its job; the dynasty's reputation is intact. Pride translates into a §Gmodest§! political dividend - small, but felt."

 SAU_national_water_pride_neutral:0 "§HSovereign Waters§! - §YSteady§!"
 SAU_national_water_pride_neutral_desc:0 "The Kingdom is §Ybalanced on a knife's edge§!. Stability hovers around 50%; the water program neither lifts the regime up nor drags it down. The next tremor in either direction will tip the scale."

 SAU_national_water_pride_minus1:0 "§HSovereign Waters§! - §YDoubtful§!"
 SAU_national_water_pride_minus1_desc:0 "Whispers spread that the §LSaudi-owned§! water program could have been done §Yfaster§! by foreign hands. Stability is §Yslipping§!, and the once-proud project is starting to look like a §Yliability§!."

 SAU_national_water_pride_minus2:0 "§HSovereign Waters§! - §RStrained§!"
 SAU_national_water_pride_minus2_desc:0 "Stability is §Yfraying§! and the §Lnational water program§! is openly criticized in private circles. Pride curdles into resentment; the dynasty's image is starting to §Rcrack§!."

 SAU_national_water_pride_minus3:0 "§HSovereign Waters§! - §RBackfiring§!"
 SAU_national_water_pride_minus3_desc:0 "The Kingdom is in §Rserious trouble§! and the water program has become a §Rsymbol§! of mismanagement. Every dry tap is laid at the dynasty's feet. The pride that once buoyed the throne now §Rerodes§! it."

 SAU_national_water_pride_minus4:0 "§HSovereign Waters§! - §RCatastrophic§!"
 SAU_national_water_pride_minus4_desc:0 "The Kingdom is in §Rfree fall§!. The water program is a §Rhated§! emblem of a regime that promised sovereignty and delivered shortage. The §HHouse of al Saud§! pays for every drop in lost legitimacy. Only a §Hrestoration of stability§! - or the §Rfall of the dynasty§! - will end this nightmare."

 SAU_events.2.t:0 "King Abdullah Ascends the Throne"
 SAU_events.2.d:0 "Abdullah bin Abdulaziz Al-Saud has been formally proclaimed King of Saudi Arabia and Custodian of the Two Holy Mosques. Having served as de facto ruler since 1995, his formal ascension brings stability and continuity to the Kingdom. King Abdullah is known for his cautious reformist tendencies and his efforts to promote interfaith dialogue."
 SAU_events.2.a:0 "Long live the King!"

 SAU_tadawul_market:0 "§GTadawul, the Saudi Stock Exchange LVL 0§!"
 SAU_tadawul_market_desc:0 "The §LSaudi Stock Exchange§! takes its first steps. Trades clear, regulators write rules, and the world begins to take note. Each new reform deepens the market: more capital flows, more revenue accrues, more confidence builds. §HTadawul grows with every focus the Kingdom completes.§!"
 SAU_tadawul_market_t1:0 "§GTadawul, the Saudi Stock Exchange LVL 1§!"
 SAU_tadawul_market_t1_desc:0 "The §LSaudi Stock Exchange§! takes its first steps. Trades clear, regulators write rules, and the world begins to take note. Each new reform deepens the market: more capital flows, more revenue accrues, more confidence builds. §HTadawul grows with every focus the Kingdom completes.§!"
 SAU_tadawul_market_t2:0 "§GTadawul, the Saudi Stock Exchange LVL 2§!"
 SAU_tadawul_market_t2_desc:0 "The §LSaudi Stock Exchange§! takes its first steps. Trades clear, regulators write rules, and the world begins to take note. Each new reform deepens the market: more capital flows, more revenue accrues, more confidence builds. §HTadawul grows with every focus the Kingdom completes.§!"
