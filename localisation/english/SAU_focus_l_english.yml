 SAU_pipeline_transit_SYR_t1:0 "Saudi Pipeline Transit (Tier I)"
 SAU_pipeline_transit_SYR_t1_desc:0 "Saudi oil crosses Syria, and the transit fees swell the treasury. The pipeline lifts the nation's construction and stability. §GAdditional Income: $1.00B§!"
 SAU_pipeline_transit_SYR_t2:0 "Saudi Pipeline Transit (Tier II)"
 SAU_pipeline_transit_SYR_t2_desc:0 "Saudi oil crosses Syria, and the transit fees swell the treasury. The pipeline lifts the nation's construction and stability. §GAdditional Income: $1.15B§!"
 SAU_pipeline_transit_SYR_t3:0 "Saudi Pipeline Transit (Tier III)"
 SAU_pipeline_transit_SYR_t3_desc:0 "Saudi oil crosses Syria, and the transit fees swell the treasury. The pipeline lifts the nation's construction and stability. §GAdditional Income: $1.25B§!"
 SAU_pipeline_transit_IRQ_t1:0 "Saudi Pipeline Transit (Tier I)"
 SAU_pipeline_transit_IRQ_t1_desc:0 "Saudi oil crosses Iraq, and the transit fees swell the treasury. The pipeline lifts the nation's oil output. §GAdditional Income: $1.00B§!"
 SAU_pipeline_transit_IRQ_t2:0 "Saudi Pipeline Transit (Tier II)"
 SAU_pipeline_transit_IRQ_t2_desc:0 "Saudi oil crosses Iraq, and the transit fees swell the treasury. The pipeline lifts the nation's oil output. §GAdditional Income: $1.15B§!"
 SAU_pipeline_transit_IRQ_t3:0 "Saudi Pipeline Transit (Tier III)"
 SAU_pipeline_transit_IRQ_t3_desc:0 "Saudi oil crosses Iraq, and the transit fees swell the treasury. The pipeline lifts the nation's oil output. §GAdditional Income: $1.25B§!"
 SAU_pipeline_transit_TUR_t1:0 "Saudi Pipeline Transit (Tier I)"
 SAU_pipeline_transit_TUR_t1_desc:0 "Saudi oil crosses Turkey, and the transit fees swell the treasury. The pipeline lifts the nation's steel and chromium output. §GAdditional Income: $1.00B§!"
 SAU_pipeline_transit_TUR_t2:0 "Saudi Pipeline Transit (Tier II)"
 SAU_pipeline_transit_TUR_t2_desc:0 "Saudi oil crosses Turkey, and the transit fees swell the treasury. The pipeline lifts the nation's steel and chromium output. §GAdditional Income: $1.15B§!"
 SAU_pipeline_transit_TUR_t3:0 "Saudi Pipeline Transit (Tier III)"
 SAU_pipeline_transit_TUR_t3_desc:0 "Saudi oil crosses Turkey, and the transit fees swell the treasury. The pipeline lifts the nation's steel and chromium output. §GAdditional Income: $1.25B§!"
 SAU_repair_pipeline_yemen:0 "Repair the Arabian Sea Pipeline"
 SAU_repair_pipeline_yemen_desc:0 "Sabotage has knocked the line down a tier. Send the engineers to restore it to full capacity."
 SAU_repair_pipeline_syria:0 "Repair the Levant Pipeline"
 SAU_repair_pipeline_syria_desc:0 "Restore the western line to its former throughput after the saboteurs' work."
 SAU_repair_pipeline_iraq:0 "Repair the Europe Pipeline"
 SAU_repair_pipeline_iraq_desc:0 "Rebuild the damaged section and bring the northern line back up a tier."
 SAU_pipeline_sabotage_category:0 "Sabotage Saudi Pipelines"
 SAU_sabotage_pipeline_yemen:0 "Strike the Arabian Sea Pipeline"
 SAU_sabotage_pipeline_yemen_desc:0 "Send saboteurs against the Saudi line through southern Yemen. If they get through, the oil stops and the Kingdom loses its southern route."
 SAU_sabotage_pipeline_syria:0 "Strike the Levant Pipeline"
 SAU_sabotage_pipeline_syria_desc:0 "Target the Saudi pipeline crossing toward the Mediterranean. A successful hit severs the line and strips the Kingdom of the route."
 SAU_sabotage_pipeline_iraq:0 "Strike the Europe Pipeline"
 SAU_sabotage_pipeline_iraq_desc:0 "Hit the pipeline carrying Saudi oil through Iraq toward Europe. Cut it, and Riyadh's challenge to Moscow collapses with it."
 SAU_tt_sabotage_chance:0 "§Y50% chance§! to sever the pipeline. If it succeeds, Saudi Arabia loses the route and all its benefits."
 SAU_events.34.t:0 "The Levant Pipeline Is Severed"
 SAU_events.34.d:0 "Saboteurs have struck the pipeline running west toward the Mediterranean. The oil has stopped, and the route is lost until it can be rebuilt."
 SAU_events.34.a:0 "A costly blow."
 SAU_events.35.t:0 "The Europe Pipeline Is Severed"
 SAU_events.35.d:0 "Our line to Europe has been cut. Saboteurs blew a critical section, and the oil no longer reaches the West. Moscow breathes easier tonight."
 SAU_events.35.a:0 "Rebuild what we can."
 SAU_pipeline_turkey_extend:0 "Extend the Pipeline to Turkey"
 SAU_pipeline_turkey_extend_desc:0 "The oil reaches Iraq, but Europe lies beyond. Persuade Ankara to carry the line onward, and Saudi crude will pour straight into Moscow's backyard."
 SAU_tt_via_jordan:0 "§HThe route runs through Jordan first. Amman must agree before Damascus is approached.§!"
 SAU_tt_extend_turkey:0 "[TUR.GetFlag]§HTurkey will be asked to carry the pipeline into Europe. They must accept.§!"
 SAU_events.29.t:0 "A Pipeline Across Jordan"
 SAU_events.29.d:0 "Riyadh asks to run a pipeline through our kingdom toward the Mediterranean. The transit fees alone would steady our finances, and the Saudis are generous friends."
 SAU_events.29.a:0 "Open the route."
 SAU_events.29.b:0 "Decline the Saudis."
 SAU_events.30.t:0 "An Offer from Riyadh"
 SAU_events.30.d:0 "With Jordan agreed, the Saudis propose carrying their oil through our land to the sea. A free and prosperous Syria would profit handsomely, and Riyadh's friendship is worth having."
 SAU_events.30.a:0 "Welcome the pipeline."
 SAU_events.30.b:0 "Syria is not for sale."
 SAU_events.32.t:0 "A Saudi Proposal"
 SAU_events.32.d:0 "Our old rivals in Riyadh wish to run their oil through our territory to the sea. They will pay handsomely in transit fees. Pride is one thing, but the treasury is empty."
 SAU_events.32.a:0 "Take their money."
 SAU_events.32.b:0 "Never. Let them choke on Hormuz."
 SAU_events.33.t:0 "The Road to Europe"
 SAU_events.33.d:0 "Saudi Arabia asks us to carry their pipeline onward into Europe. We would become the gatekeeper of Gulf oil to the West, collecting our toll on every barrel, and Moscow would not thank us for it."
 SAU_events.33.a:0 "Become the bridge to Europe."
 SAU_events.33.b:0 "We will not provoke Russia."
 SAU_pipeline_transit_YEM:0 "Saudi Pipeline Transit"
 SAU_pipeline_transit_YEM_desc:0 "Saudi crude crosses Yemen to the sea, and the transit fees flow into Aden's coffers. The new infrastructure also opens up the nation's own oil fields. Additional Income and increased oil output."
 SAU_pipeline_transit_JOR:0 "Saudi Pipeline Transit"
 SAU_pipeline_transit_JOR_desc:0 "Saudi oil crosses the Hashemite Kingdom on its way to the Mediterranean. The transit fees fund a building boom across Jordan. Additional Income and faster construction."
 SAU_pipeline_transit_SYR:0 "Saudi Pipeline Transit"
 SAU_pipeline_transit_SYR_desc:0 "The pipeline brings Damascus its cut of every barrel and the capital to rebuild a shattered nation. Additional Income, faster construction, and improved stability."
 SAU_pipeline_transit_IRQ:0 "Saudi Pipeline Transit"
 SAU_pipeline_transit_IRQ_desc:0 "Iraq becomes the bridge between the Gulf and the West, collecting transit fees and reviving its own oil sector. Additional Income and increased oil output."
 SAU_pipeline_transit_TUR:0 "Saudi Pipeline Transit"
 SAU_pipeline_transit_TUR_desc:0 "Turkey is the gatekeeper of Gulf oil to Europe, and it taxes every barrel that passes. The trade revives Anatolian industry. Additional Income and increased steel and chromium output."
 SAU_pipeline_yemen:0 "The Arabian Sea Pipeline"
 SAU_pipeline_yemen_desc:0 "With southern Yemen in friendly hands, lay the pipeline through Al Mahrah to the open sea. Beware: while Yemen burns, the line can be cut."
 SAU_pipeline_syria_fsa:0 "The Levant Pipeline (Free Syria)"
 SAU_pipeline_syria_fsa_desc:0 "A liberated Syria welcomes Saudi capital. Offer Damascus the pipeline and reach the Mediterranean."
 SAU_pipeline_syria_assad:0 "Negotiate the Levant Pipeline"
 SAU_pipeline_syria_assad_desc:0 "The Assad regime still holds Damascus. Reaching the sea here means dealing with the devil, and paying his price."
 SAU_pipeline_iraq:0 "The Europe Pipeline"
 SAU_pipeline_iraq_desc:0 "With Saddam gone, run the pipeline north through Iraq and Turkey, straight into the European market Moscow guards so jealously."
 SAU_pipeline_iraq_talks:0 "Open Talks with Baghdad"
 SAU_pipeline_iraq_talks_desc:0 "Saddam rules in Baghdad, and he has no love for the House of Saud. Sound him out anyway. He is unlikely to oblige."
 SAU_tt_not_houthi:0 "§RThe Houthis must not control southern Yemen.§!"
 SAU_tt_saddam_talks:0 "§HBaghdad will receive our proposal. Saddam is not expected to agree.§!"
 SAU_events.22.t:0 "A Pipeline to the Sea"
 SAU_events.22.d:0 "The Saudis ask to run a pipeline through our southern provinces to the Arabian Sea. The transit fees would fill our treasury, and Riyadh would owe us a favor it cannot easily repay."
 SAU_events.22.a:0 "Let the oil flow south."
 SAU_events.22.b:0 "Our land is not a Saudi highway."
 SAU_events.23.t:0 "A Saudi Proposal"
 SAU_events.23.d:0 "Our old rivals in Riyadh wish to run their oil through our territory. They will pay handsomely in transit fees. Pride is one thing, but the treasury is empty."
 SAU_events.23.a:0 "Take their money."
 SAU_events.23.b:0 "Never. Let them choke on Hormuz."
 SAU_events.24.t:0 "The Pipeline to Europe"
 SAU_events.24.d:0 "Saudi Arabia offers to run its oil through our land toward Turkey and Europe. Iraq would become the bridge between the Gulf and the West, and the transit revenue would rebuild the nation."
 SAU_events.24.a:0 "Build the pipeline."
 SAU_events.24.b:0 "Decline the offer."
 SAU_events.25.t:0 "A Saudi Envoy in Baghdad"
 SAU_events.25.d:0 "The House of Saud sends envoys proposing a pipeline through our soil. They forget who rules here. Iraq bows to no one, least of all to Riyadh."
 SAU_events.25.a:0 "Send them home empty-handed."
 SAU_events.26.t:0 "The Oil Flows"
 SAU_events.26.d:0 "Welders lay the final section and the valves are thrown open. Saudi crude now flows along a new artery to the sea, and the Kingdom's grip on the world's energy tightens."
 SAU_events.26.a:0 "Excellent."
 SAU_events.27.t:0 "The Route Is Closed"
 SAU_events.27.d:0 "The deal has fallen through. For now, this route to the sea remains beyond our reach, and Hormuz remains our only door."
 SAU_events.27.a:0 "We will find another way."
 SAU_events.28.t:0 "The Pipeline Is Severed"
 SAU_events.28.d:0 "War has reached the pipeline. Saboteurs have blown a section to ruin and the oil has stopped flowing. Until southern Yemen is secured, the Arabian Sea route is lost."
 SAU_events.28.a:0 "A costly setback."
 SAU_Pipelines_for_Saudi_arabia:0 "The Great Pipeline Game"
 SAU_Pipelines_for_Saudi_arabia_desc:0 "Every barrel the Kingdom sells must crawl through the Strait of Hormuz, a chokepoint one Iranian mine could close. To break free, Riyadh will lay export pipelines to the open sea and to Europe itself, challenging Moscow's grip on the continent's energy. Three routes beckon: south through Yemen to the Arabian Sea, west through Syria to the Mediterranean, and north through Iraq and Turkey into Europe. Each runs through a war zone, and each is a contest the Russians mean to win."
 SAU_pipelines_focus_tt:0 "§YUnlocks the pipeline decisions. Each route opens only when the lands it crosses are friendly or conquered.§!"
 SAU_yemen_pipeline:0 "The Arabian Sea Pipeline"
 SAU_yemen_pipeline_desc:0 "Saudi crude now flows south through Al Mahrah to the Arabian Sea, slipping past the Strait of Hormuz entirely. The route is profitable but exposed, only as safe as southern Yemen itself."
 SAU_syria_pipeline:0 "The Levant Pipeline"
 SAU_syria_pipeline_desc:0 "With a friendly Damascus, Saudi oil reaches the Mediterranean and the European market beyond. A direct challenge to Russian gas, laid through a liberated Syria."
 SAU_syria_pipeline_assad:0 "The Damascus Transit Deal"
 SAU_syria_pipeline_assad_desc:0 "The Assad regime permits the pipeline, for a price. Damascus skims its transit fees off the top, but the oil still reaches the sea."
 SAU_iraq_pipeline:0 "The Europe Pipeline"
 SAU_iraq_pipeline_desc:0 "From the Saudi fields through Iraq and Turkey, the Kingdom's oil pours straight into Europe. This is the prize Moscow feared: a rival at the gates of its largest market."
 SAU_pipeline_empire:0 "Crossroads of Energy"
 SAU_pipeline_empire_desc:0 "Every route is open. The Kingdom sits astride the flow of oil from the Gulf to three seas, and the old dependence on a single vulnerable strait is broken forever."
 SAU_events.21.t:0 "A New Front Rises in the Holy Land"
 SAU_events.21.d:0 "A previously unknown movement calling itself [ROOT.SAU_GetFrontName] has announced its existence across the West Bank and within Israel's own borders. In coordinated statements it vows armed resistance until liberation, claiming a wave of recent attacks as its own. Intelligence services scramble to trace its origins, its funding, and its reach."
 SAU_events.21.a:0 "Watch developments closely."
 SAU_front_name_1:0 "Jaysh al-Islam"
 SAU_front_name_2:0 "Ansar al-Haramayn"
 SAU_front_name_3:0 "Kata'ib al-Aqsa"
 SAU_front_name_4:0 "Liwa al-Tawhid"
 SAU_front_name_default:0 "the Islamic Front"
 SAU_events.20.t:0 "A Name for the Front"
 SAU_events.20.d:0 "The fighters are gathered, the funds are flowing, and a new force is born to carry the fight to Israel. It must have a name to rally under, a banner that hides our hand while it speaks to the faithful."
 SAU_events.20.a:0 "Jaysh al-Islam (Army of Islam)"
 SAU_events.20.b:0 "Ansar al-Haramayn (Defenders of the Two Holy Mosques)"
 SAU_events.20.c:0 "Kata'ib al-Aqsa (Al-Aqsa Brigades)"
 SAU_events.20.d:0 "Liwa al-Tawhid (Brigade of Monotheism)"
 SAU_events.17.t:0 "Rockets Strike Our Towns"
 SAU_events.17.d:0 "Militants of [ROOT.SAU_GetFrontName] have loosed a barrage of rockets across the border. Sirens wail over our towns as families scramble for shelter and the damage is tallied."
 SAU_events.17.a:0 "We will answer this."
 SAU_events.18.t:0 "Bombing in Our Cities"
 SAU_events.18.d:0 "A coordinated bombing campaign by [ROOT.SAU_GetFrontName] has torn through our cities. The dead are counted as the public demands the government act."
 SAU_events.18.a:0 "The cowards will pay."
 SAU_events.19.t:0 "Incursion Across the Border"
 SAU_events.19.d:0 "Fighters of [ROOT.SAU_GetFrontName] have crossed the frontier, striking military depots before melting back into the night. Our forces scramble to respond."
 SAU_events.19.a:0 "Reinforce the border."
 SAU_if_rocket_barrage:0 "Rocket Barrage on Israeli Towns"
 SAU_if_rocket_barrage_desc:0 "Order the Front to rain rockets across the border. Israeli towns scramble for shelter, the economy stutters, and the world watches."
 SAU_if_suicide_bombing:0 "Unleash a Bombing Campaign"
 SAU_if_suicide_bombing_desc:0 "Send the Front's cells deep into Israeli cities. Each strike shatters public morale and forces a costly security clampdown."
 SAU_if_cross_border_raid:0 "Cross-Border Raid"
 SAU_if_cross_border_raid_desc:0 "Launch an armed incursion to hit Israeli military depots and outposts. The boldest option, and the one most likely to provoke a fierce response."
 SAU_proxy_aggression:0 "Sponsor of Terror"
 SAU_proxy_aggression_desc:0 "We are bankrolling attacks against their people. They will not soon forget it."
 SAU_fsa_send_cash:0 "Wire Funds to the Free Syrian Army"
 SAU_fsa_send_cash_desc:0 "Open a covert pipeline of Saudi cash to the rebel command. Money buys loyalty, salaries, and silence where rifles cannot."
 SAU_fsa_smuggle_weapons:0 "Smuggle Weapons to the Rebels"
 SAU_fsa_smuggle_weapons_desc:0 "Route crates of small arms through the Jordanian border to the Free Syrian Army. Every shipment hardens the rebels against the regime."
 SAU_fsa_foreign_fighters:0 "Open the Foreign Fighter Pipeline"
 SAU_fsa_foreign_fighters_desc:0 "Quietly wave through the volunteers gathering in the Gulf and beyond. Fresh manpower keeps the uprising bleeding the regime."
 SAU_pal_fund_development:0 "Fund Palestinian Development"
 SAU_pal_fund_development_desc:0 "Pour Saudi money into roads, schools, and clinics across the territories. A stable, prosperous Palestine is the foundation of any two-state peace."
 SAU_pal_sponsor_peace:0 "Sponsor the Peace Process"
 SAU_pal_sponsor_peace_desc:0 "Position the Kingdom as the indispensable broker between the parties. Saudi diplomacy, not the gun, will define the settlement."
 SAU_pal_invest_gaza:0 "Invest in Gaza and the West Bank"
 SAU_pal_invest_gaza_desc:0 "Bankroll factories and infrastructure in the Palestinian heartland. Jobs and industry blunt the appeal of the militants."
 SAU_militia_back_hamas:0 "Bankroll Hamas"
 SAU_militia_back_hamas_desc:0 "Make Hamas the spearhead of the resistance and Riyadh its paymaster. The movement gains arms, fighters, and a reason to look to the Kingdom over Tehran."
 SAU_militia_back_dflp:0 "Fund the Democratic Front"
 SAU_militia_back_dflp_desc:0 "Cultivate the secular factions as a counterweight inside Palestinian politics. A divided resistance is one the Kingdom can steer."
 SAU_militia_islamic_front:0 "Forge a Saudi-Loyal Islamic Front"
 SAU_militia_islamic_front_desc:0 "Build a new Islamist faction owing its existence to Saudi gold. Loyal, disciplined, and answerable to Riyadh alone."
 SAU_syria_victory_avail_tt:0 "The Syrian regime must be defeated or driven from power."
 SAU_syria_defeat_avail_tt:0 "The Free Syrian Army must be crushed while the regime still stands."
 SAU_Palestine:0 "Champion the Palestinian Cause"
 SAU_Palestine_desc:0 "No issue stirs the Arab street like Palestine. By taking up its banner the Kingdom claims the moral leadership of the Muslim world and outflanks its rivals in Tehran."
 SAU_Palestine_2:0 "Bankroll the Resistance"
 SAU_Palestine_2_desc:0 "Words are cheap. Channel real money and arms to the Palestinian factions so that Saudi influence, not Iranian, shapes the struggle."
 SAU_Palestine_3:0 "Arm the Militants"
 SAU_Palestine_3_desc:0 "Back the armed factions outright. Riyadh becomes the paymaster of the gun, contesting Tehran for the loyalty of every fighter in Gaza."
 SAU_Palestine_4:0 "Broker a Two-State Peace"
 SAU_Palestine_4_desc:0 "Position the Kingdom as the indispensable mediator. A Saudi-brokered settlement would crown Riyadh the statesman of the Arab world."
 SAU_Palestine_3_1:0 "Guardian of Al-Aqsa"
 SAU_Palestine_3_1_desc:0 "Whichever path was taken, the Kingdom now stands as the foremost patron of the Palestinian people, its prestige across the Ummah unrivalled."
 SAU_levant_strategy_tt:0 "§YOpens the Saudi strategy for Jordan, Palestine, and Syria.§!"
 SAU_amman_bailout_tt:0 "[JOR.GetFlag]§HJordan gains Political Power and Stability, and its opinion of us rises sharply.§!"
 SAU_palestine_support_tt:0 "[PAL.GetFlag]§HPalestine's opinion of us improves and the AI is steered toward our camp.§!"
 SAU_fund_fsa_tt:0 "[FSA.GetFlag]§HThe Free Syrian Army warms to us and looks to Riyadh for support.§!"
 SAU_fund_jordan_army_tt:0 "[JOR.GetFlag]§HThe Jordanian Army gains experience and treats us as its patron.§!"
 SAU_palestine_aid_tt:0 "[PAL.GetFlag]§HArms and money flow to the Palestinian factions; their opinion of us climbs.§!"
 SAU_sabotage_syria_tt:0 "[SYR.GetFlag]§HCovert operations turn the AI against the Syrian regime.§!"
 SAU_fsa_volunteers_tt:0 "[FSA.GetFlag]§HForeign volunteers swell the rebel ranks with fresh manpower and experience.§!"
 SAU_energy_jordan_tt:0 "[JOR.GetFlag]§HA standing trade agreement binds Jordan to Saudi energy; its stability and goodwill grow.§!"
 SAU_palestine_diplomacy_tt:0 "[PAL.GetFlag]§HRiyadh becomes the protector and peace broker of the Palestinian cause.§!"
 SAU_palestine_armed_tt:0 "[HAM.GetFlag]§HThe armed factions take Saudi money and arms, looking to Riyadh over Tehran.§!"
 SAU_freedom_or_death_tt:0 "[FSA.GetFlag]§HThe Kingdom commits fully: heavy support for the rebels and open hostility to the regime.§!"
 SAU_syria_victory_tt:0 "[FSA.GetFlag]§HA friendly Syria emerges and Iran's land bridge is severed.§!"
 SAU_syria_defeat_tt:0 "§RThe regime endures. The Kingdom counts its losses and withdraws.§!"
 SAU_neom_aqaba_zone:0 "NEOM-Aqaba Economic Zone"
 SAU_neom_aqaba_zone_desc:0 "The Saudi megacity of NEOM and the Jordanian port of Aqaba operate as a single cross-border economic zone, accelerating construction and feeding the treasury."
 SAU_guardian_of_palestine:0 "Guardian of Palestine"
 SAU_guardian_of_palestine_desc:0 "By championing the Palestinian cause the Kingdom has earned standing across the Muslim world, lending the throne legitimacy at home and abroad."
 SAU_syria_landbridge_severed:0 "Iran's Land Bridge Severed"
 SAU_syria_landbridge_severed_desc:0 "A friendly government in Damascus has cut Tehran's overland route to Hezbollah. The strategic victory emboldens the Kingdom and steadies the realm."
 SAU_syrian_quagmire:0 "The Syrian Quagmire"
 SAU_syrian_quagmire_desc:0 "Years of funding a losing war have drained the treasury and the public's patience. The regime survives, and Riyadh has little to show for the blood and treasure spent."
 SAU_FA_rapprochement_with_the_regime:0 "Rapprochement with the Regime"
 SAU_FA_rapprochement_with_the_regime_desc:0 "The tide of the war in Syria has started to turn against the opposition. It would be in our interests to mend relations with a government that we will realistically have to engage with for years to come."
 SAU_FA_end_the_special_relationship:0 "End the Special Relationship"
 SAU_FA_end_the_special_relationship_desc:0 "While our ties with Pakistan may have served us well in the past, the time has come for us to make a choice between preserving our relationship with Pakistan and pursuing closer ties to its larger rival."
 SAU_FA_improve_relations_with_iran:0 "Improve Relations With Iran"
 SAU_FA_improve_relations_with_iran_desc:0 "Iran is too significant a power to ignore. While our foreign and domestic allies may oppose an improvement of relations with Iran, for now we should focus on diplomatic pragmatism and deal with the potential repercussions of our foreign policy shift later."
 SAU_FA_reject_foreign_interference:0 "Reject Foreign Interference"
 SAU_FA_reject_foreign_interference_desc:0 "The Middle East has for decades been governed by collaborationist governments dependent on foreign powers for their revenue and security. The people of the region are clamoring for a change to the status quo, a process that we can begin in earnest in [ROOT.GetNameDef] by decoupling ourselves from foreign influence."
 SAU_FA_support_iranian_separatists:0 "Support Iranian Separatists"
 SAU_FA_support_iranian_separatists_desc:0 "Iran's struggles with various separatist movements predate the Islamic Republic. Azeris, Arabs, Balochis and Kurds have all struggled against the discrimination of Tehran in their efforts to achieve greater autonomy. Arabs and Balochis in particular make for natural allies, the former due to our ethnic affinity, the latter due to our shared Sunni identity."
 SAU_FA_deepen_military_cooperation:0 "Deepen Military Cooperation"
 SAU_FA_deepen_military_cooperation_desc:0 "The Pakistani military is one of the most experienced and well-trained militaries in the Muslim world. We can benefit from this expertise and experience by ramping up our military cooperation with our Pakistani partner. However, this cooperation will prevent us from pursuing closer ties to Pakistan's bitter rival."
 SAU_FA_oil_refineries_in_pakistan:0 "Oil Refineries in Pakistan"
 SAU_FA_oil_refineries_in_pakistan_desc:0 "Our decades of experience with oil means that we can offer our Pakistani partners useful technical know-how regarding the refining of crude oil. This cooperation improve our relations with Pakistan as well as help support Pakistan's growing economy."
 SAU_FA_amplify_sectarian_rhetoric:0 "Amplify Sectarian Rhetoric"
 SAU_FA_amplify_sectarian_rhetoric_desc:0 "Sectarianism, despite what Western media may suggest, is not a permanent feature of Middle Eastern politics. Nonetheless, recent events have indeed exacerbated tensions between Sunni and Shia across the region, tensions that provide us with a useful opportunity to undermine Shia Iran."
 SAU_FA_back_the_syrian_opposition:0 "Arm the Opposition"
 SAU_FA_back_the_syrian_opposition_desc:0 "[SYR.GetLeader] is a brutal dictator but also, more importantly, a threat to our interests in the region. We should send support to opposition groups who could rid the region of this menace."
 SAU_FA_security_guarantees_turkey:0 "Security Guarantees"
 SAU_FA_security_guarantees_turkey_desc:0 "Now that our relations with Turkey have grown exceptionally close, perhaps it is time for us to negotiate a treaty where both of our countries guarantee the other's sovereignty. This will certainly help ward off any hostile forces that may threaten either us or our new allies."
 SAU_FA_confront_iranian_partners:0 "Blockade Persian Partners"
 SAU_FA_confront_iranian_partners_desc:0 "The Gulf Cooperation Council was envisioned as a united front against common threats to the Arab monarchies of the Gulf. This unity has been fractured by differing approaches towards the threat posed by Iran, with some of our erstwhile partners pursuing amicable relations with our deadly enemy. This can be tolerated no longer."
 SAU_FA_denounce_iranian_meddling:0 "Denounce Iranian Meddling"
 SAU_FA_denounce_iranian_meddling_desc:0 "We cannot simply allow Iran to run amok in the region without voicing our discontent. The inaction of our allies is what has contributed to this lamentable state of affairs, so we must take it upon ourselves to step up and denounce the Persian threat."
 SAU_FA_combat_iranian_influence:0 "Combat Iranian Influence"
 SAU_FA_combat_iranian_influence_desc:0 "Iran's influence has been growing in both Sunni and Shia states alike. We should use our own influence to resist Iran's attempts at soft power expansion or face an extension of Iran's so-called \"Resistance Axis\" and the Shia Crescent."
 SAU_FA_peace_in_the_middle_east:0 "Peace in the Middle East"
 SAU_FA_peace_in_the_middle_east_desc:0 "Our peace proposal, not too long ago, was met with snorts of derision in Washington, London, Moscow and beyond. But we have achieved what every international mediator has so far failed to do - peace between Israel and Palestine. From this point on, [FROM.GetName] will forever be associated with shrewd diplomacy and the betterment of millions of lives."
 SAU_FA_improve_trade_relations:0 "Improve Trade Relations"
 SAU_FA_improve_trade_relations_desc:0 "India's massive population means that it has a similarly massive market for our exports. It would therefore be wise for us to strengthen our trading partnership with this economic powerhouse."
 SAU_FA_influence_muslim_europe:0 "Influence Muslim Europe"
 SAU_FA_influence_muslim_europe_desc:0 "The Ottoman Empire's expansion into Europe has left a footprint on that continent in the form of several Muslim majority nations. While many of the Muslims in these countries adopt a very different approach to their faith compared to Muslims in our country, we can still use our common religion as a basis for extending our influence into this region."
 SAU_FA_denounce_the_opposition:0 "Abandon the Opposition"
 SAU_FA_denounce_the_opposition_desc:0 "It is unwise for a government like ours, one that is subject to the same terrorist threats as that of Syria, to continue to support an opposition movement that contains dangerous extremist elements."
 SAU_FA_invite_russian_advisors:0 "Invite Russian Advisors"
 SAU_FA_invite_russian_advisors_desc:0 "The Russian military has centuries of expertise at its disposal, expertise that we could benefit from by inviting Russian advisors to train our own armed forces."
 SAU_FA_friendship_with_russia:0 "Friendship with Russia"
 SAU_FA_friendship_with_russia_desc:0 "Russia lacks the hegemonic heft of the United States, meaning that while it cannot guarantee our security to the same extent that the US could it does not share America's imperialist aspirations. A security partnership with Russia will therefore be more equitable and less unpopular with the [ROOT.GetAdjective] public."
 SAU_FA_attack_foreign_stooges:0 "Demand the Expulsion of Foreign Troops"
 SAU_FA_attack_foreign_stooges_desc:0 "Many countries host military bases for foreign nations with imperial aspirations in the region. Whether it is American or Russian troops that these countries host on their soil, they must order them to leave immediately or face the consequences."
 SAU_FA_combat_saudi_influence:0 "Criticize the Occupation"
 SAU_FA_combat_saudi_influence_desc:0 "Regrettably, many Arab states have chosen to avoid making overt condemnations of Israel to avoid negatively impacting diplomatic relations. We should make no such consideration, and condemn the illegal Israeli occupation in the strongest terms possible."
 SAU_FA_influence_north_africa:0 "Influence North Africa"
 SAU_FA_influence_north_africa_desc:0 "North Africa, particularly the countries of the Maghreb, has traditionally been somewhat detached from the politics of the Middle East, maintaining stronger ties to Europe in the north and sub-Saharan Africa in the south. However, given the increasing geopolitical rivalry taking place in our immediate sphere of influence, it may be worth bolstering our involvement in this region."
 SAU_FA_affirm_pakistani_ties:0 "Affirm Pakistani Ties"
 SAU_FA_affirm_pakistani_ties_desc:0 "As one of the largest Muslim-majority countries in the world, Pakistan is a country that has cultural, economic and geopolitical value to us. We should therefore ensure that our ties with the Pakistanis are as strong as they possibly can be."
 SAU_FA_distance_from_america:0 "Distance from America"
 SAU_FA_distance_from_america_desc:0 "We can no longer ignore the growing pressure from our population to reduce our dependence on the United States for our security. It is time for us to adopt a radically different approach to our foreign policy, one that will free [ROOT.GetNameDef] from neo-imperial domination."
 SAU_FA_war_with_imperialism:0 "War on Imperialism"
 SAU_FA_war_with_imperialism_desc:0 "Unfortunately we have yet to bring about the liberation of the Muslim and Arab peoples of the region, as foreign troops continue to occupy land that is rightfully ours. The only option that remains available to us is to drive them out by force and overthrow the puppet governments that host them."
 SAU_FA_back_the_brotherhood:0 "Back the Brotherhood"
 SAU_FA_back_the_brotherhood_desc:0 "Egypt, as the birthplace of the Muslim Brotherhood, is a symbolically significant arena for the battle between secular authoritarianism and Islamist democracy, a battle that we should formulate a position on. The Brotherhood, which enjoys a strong following across the region, may be a useful conduit for our overseas influence."
 SAU_FA_influence_south_asia:0 "Influence South Asia"
 SAU_FA_influence_south_asia_desc:0 "To the East lies a region rich in history and culture, one which once boasted one of the most powerful Muslim empires in the history of the world. Today the Indian subcontinent suffers from a bitter rivalry between India and Pakistan. This rivalry means that we must be careful about our diplomatic overtures, as there is only so far that we can improve relations with one side without antagonizing the other."
 SAU_FA_influence_the_levant:0 "Influence Iraq and al-Sham"
 SAU_FA_influence_the_levant_desc:0 "Iraq and the Levant is home to multiple opportunities for cooperation as well as threats to contain. Located at the intersection between several spheres of influence, it is a region that we cannot afford to ignore."
 SAU_FA_draw_closer_to_india:0 "Draw Closer to India"
 SAU_FA_draw_closer_to_india_desc:0 "While we have traditionally had closer ties to Pakistan, India is too large a military and economic power for us to ignore. We should therefore pursue amicable relations with India, even as we continue to maintain ties to its most hated enemy."
 SAU_FA_non_aggression_pact:0 "Invite the Quds Force"
 SAU_FA_non_aggression_pact_desc:0 "Since the Iranian Revolution in 1979 the Islamic Republic has pursued an interventionist foreign policy that relies on backing allied states and armed groups to contain Iran's enemies and extend its own influence. We should support Iran in this endeavor and allow our territory to be used as a base for the activities of Iran's infamous Quds force."
 SAU_FA_security_guarantees:0 "Security Guarantees"
 SAU_FA_security_guarantees_desc:0 "Now that relations with Pakistan have been substantially strengthened, we can bind our two nations together with security guarantees. From this day forward, [ROOT.GetNameDef] and Pakistan will not simply be close partners, but also strong allies."
 SAU_FA_mass_arms_purchases:0 "Secure American Protection"
 SAU_FA_mass_arms_purchases_desc:0 "America has rhetorically supported our security in the past and came to our defence during the Gulf War, demonstrating its commitment to Middle Eastern stability. However, before we pursue a more active foreign policy in the region we should first secure a firm American commitment to come to our defence in the event of an external attack."
 SAU_FA_back_the_strongman:0 "Back the Strongman"
 SAU_FA_back_the_strongman_desc:0 "Egypt is governed best when it is under the control of a single, strong leader backed up by one of the most powerful militaries in the Middle East. We should continue to support stability and secular rule in this key Arab country, along with a regional order that favors American-backed autocracy over destabilizing democracy."
 SAU_FA_intervene_in_syria:0 "Topple Assad"
 SAU_FA_intervene_in_syria_desc:0 "The revolution is underway. We should guarantee its success by pushing for the deployment of boots on the ground. If we play our cards right, those boots could be American ones rather than our own. Undermining the Syrian regime would remove a key Iranian ally and backer of Hezbollah, and pave the way for the establishment of a government that is receptive of [ROOT.GetAdjective] interests."
 SAU_FA_befriend_the_turks:0 "Befriend the Turks"
 SAU_FA_befriend_the_turks_desc:0 "[befriend_the_turks_description]"
 SAU_FA_strengthen_us_ties:0 "Strengthen US Ties"
 SAU_FA_strengthen_us_ties_desc:0 "America and [ROOT.GetNameDef] may seem likely unlikely allies given our vastly different regime types, but our regional interests are remarkably similar. We should reinforce a partnership which has done nothing but support our national interests and regional security. Even if some [ROOT.GetAdjective]s resent this special relationship, it is one that we cannot do without."
 SAU_FA_war_with_hezbollah:0 "War with Hezbollah"
 SAU_FA_war_with_hezbollah_desc:0 "Hezbollah has been a tool of Iranian foreign policy for years, one that has sought to subvert and challenge the rule of governments like ours by encouraging revolutionary sentiments among Shia minorities across the region. Our hostility to Hezbollah is shared by Israel, who have suffered from raids and indiscriminate attacks on their territory. We are therefore natural allies against Hezbollah."
 SAU_FA_expel_us_interests:0 "Expel US Interests"
 SAU_FA_expel_us_interests_desc:0 "US troops are resented, even hated, by the people of [ROOT.GetNameDef]. The Americans must be made to leave our country so that they cannot continue to use it as a staging ground for their imperial ambitions."
 SAU_FA_secret_cooperation:0 "Secret Cooperation"
 SAU_FA_secret_cooperation_desc:0 "Israel is the most technologically advanced nation in the Middle East. Secretly negotiating an agreement to share military technology between our two countries will undoubtedly help enhance our own capabilities, as well as deepen our cooperation with the IDF, the force in the Middle East that is the most capable of finishing Hezbollah off once and for all and resisting the growing Persian threat."
 SAU_FA_live_and_let_live:0 "Support Lebanon"
 SAU_FA_live_and_let_live_desc:0 "Lebanon is a country that has suffered from decades of internal division. We should support its government as much as we can rather than impose unrealistic expectations on this fragile state."
 SAU_FA_contain_the_turks:0 "Contain the Turks"
 SAU_FA_contain_the_turks_desc:0 "We cannot allow Turkey to pursue its interests in the Middle East. [TUR.GetLeader]'s support of political Islam risks strengthening a dangerous populist movement, one that may seek to overthrow our government."
 SAU_FA_grant_recognition:0 "Grant Recognition"
 SAU_FA_grant_recognition_desc:0 "Most of the Muslim world has refused to recognize the legitimacy of the state of Israel. This lack of recognition has hampered the improvement of relations between us and the Israelis, and it is therefore in our interest to break with the rest of the Muslim world in recognizing Israel, signalling our desire for closer cooperation with the Jewish state."
 SAU_FA_favor_resistance:0 "Support a Free Palestine"
 SAU_FA_favor_resistance_desc:0 "The Palestinians have been cursed with statelessness, their plight serving as a constant reminder of the failures of the international community. The brutality of the Israeli occupation and the tacit abandonment of the Palestinian cause by Arab governments has left the Palestinians alone and without an ally to depend on. We could be that ally."
 SAU_FA_back_an_intifada:0 "Back an Intifada"
 SAU_FA_back_an_intifada_desc:0 "The Palestinian people demand to be heard. An Intifada will remind the world that their suffering is not to be tolerated and show Israel that their occupation of Palestine is not sustainable."
 SAU_FA_behead_the_snake:0 "Behead the Snake"
 SAU_FA_behead_the_snake_desc:0 "The Americans must be made aware of the threat that Iran poses to both of our nations. The country's nuclear program, its support for subversive elements across the region, and its radical, extremist ideology demand a rapid and decisive armed response. We should make it clear to the United States that they must either cut off the head of the snake that is the Islamic Republic of Iran, or risk destruction."
 SAU_FA_pressure_lebanon:0 "Pressure Lebanon"
 SAU_FA_pressure_lebanon_desc:0 "While our relations with the Lebanese have historically been good, we can no longer ignore the Lebanese government's tolerance of Hezbollah, a dangerous terrorist organization backed by Iran. We should put pressure on Lebanon to distance itself from the Iranian sphere of influence."
 SAU_FA_war_with_israel:0 "War with Israel"
 SAU_FA_war_with_israel_desc:0 "The Intifada has given us further evidence that there is no limits to Israel's brutality. We cannot simply sit by and watch as the Palestinian people are mercilessly slaughtered."
 SAU_FA_align_with_iran:0 "Undermine Neighbors"
 SAU_FA_align_with_iran_desc:0 "The Shia of the Arabian Gulf have long been oppressed by hostile monarchies. We should encourage these oppressed minorities to agitate against their governments."
 SAU_FA_antagonize_iran:0 "Antagonize Iran"
 SAU_FA_antagonize_iran_desc:0 "Since 1979 the Arab monarchies have faced an existential threat in the form of the Islamic Republic of Iran. While at times relations have been lukewarm, we have always understood that Iran's revolutionary brand of political Islam threatens the stability of the region and, by extension, our own government."
 SAU_FA_sanction_turkey:0 "Sanction Turkey"
 SAU_FA_sanction_turkey_desc:0 "Despite our warnings Turkey has continued to meddle in the Arab world. We have no choice but to use coercive measures to dissuade Turkey from furthering its imperialist ambitions."
 SAU_FA_the_arab_street:0 "The Arab Street"
 SAU_FA_the_arab_street_desc:0 "Across the Arab world there is has been a historical discrepancy between policies of governments and the views of their people. When it comes to the Israel-Palestine issue, relations with the United States, political Islam and democratization, there are few Arab governments with the bravery to translate public opinion into foreign policy. We can be the ones to change this state of affairs."
 SAU_FA_the_war_within:0 "War in the Arabian Peninsula"
 SAU_FA_the_war_within_desc:0 "The Gulf Cooperation Council has become a hollow shell of regional cooperation. Regrettably, we have no choice now but to settle our differences with our neighbors and former friends through violent means."
 SAU_FA_sanction_sudan:0 "Sanction Sudan"
 SAU_FA_sanction_sudan_desc:0 "[SUD.GetLeader]'s leadership has been plagued by international controversy. Under his rule, Sudan has been accused of being a state sponsor of terror as well as a major human rights abuser. Western nations have subsequently sanctioned this rogue state, an example that we should follow."
 SAU_FA_jordanian_ties:0 "Sideline the Palestinians"
 SAU_FA_jordanian_ties_desc:0 "Ultimately campaigning for the Palestinian cause serves little geopolitical purpose. Rigidly sticking to the pro-Palestinian line has prevented us from cooperating with Israel, a state with which we share many common enemies. However, sidelining the Palestinians will undoubtedly be resisted our population, who remain overwhelmingly anti-Zionist."
 SAU_FA_support_hamas:0 "Arms for Hamas"
 SAU_FA_support_hamas_desc:0 "The Oslo Accords of 1993 and its subsequent failure has significantly damaged the reputation of the mainstream Palestinian nationalist movement at the expense of their Islamist rivals, Hamas. Hamas is therefore the Palestinian actor that we should throw our support behind to undermine Israel."
 SAU_FA_russian_bases:0 "Russian Bases"
 SAU_FA_russian_bases_desc:0 "Allowing Russia to establish military bases in our territory would serve both our countries' interests. Russia would gain a useful base of operations in a strategically important region and we, for our part, would gain a greater commitment to our security from our newfound ally."
 SAU_FA_algerian_ties:0 "Side with Algeria"
 SAU_FA_algerian_ties_desc:0 "Algeria and Morocco have, since independence, competed for dominance and clashing repeatedly. This animosity makes it exceedingly difficult to maintain good relations with both simultaneously. Improving relations with Algeria may be in our interest due to that country's extensive experience fighting Islamist rebels, experience that we can draw upon."
 SAU_FA_cash_for_land:0 "Cash for Land"
 SAU_FA_cash_for_land_desc:0 "When it comes to issues as emotive as Israeli settlements and Palestinian refugees, cold hard cash may seem an inappropriate solution. Nonetheless, financial compensation is a point that our peace proposal depends on, and as such we must be willing to put up the funds necessary to compensate and support the resettlement of hundreds of thousands, even millions of people."
 SAU_FA_turkish_bases:0 "Turkish Bases"
 SAU_FA_turkish_bases_desc:0 "As part of our strengthening of relations with the Turks, we should invite [TUR.GetLeader] to establish a Turkish military base on our territory. Not only will this help further improve relations between our two countries, but it will also help strengthen our security against external threats given Turkey's incentive to protect its new military base."
 SAU_FA_moroccan_ties:0 "Side with Morocco"
 SAU_FA_moroccan_ties_desc:0 "Algeria and Morocco have, since independence, competed for dominance and clashing repeatedly. This animosity makes it exceedingly difficult to maintain good relations with both simultaneously. Being a monarchy rather than a republic, Morocco is the more natural partner for us and our relations have therefore been strong in the past."
 SAU_FA_indian_bases:0 "Indian Bases"
 SAU_FA_indian_bases_desc:0 "Having thrown our lot in with India as opposed to Pakistan, it would make sense for us to cement our alliance with the Indians by giving them permission to establish military bases in our territory. Doing so will not only produce tangible signs of our close partnership, but will also give India a compelling reason to remain invested in our security."
 SAU_FA_war_in_libya:0 "Libyan Arms Shipments"
 SAU_FA_war_in_libya_desc:0 "For much of its history Libya has been a site of foreign contestation. Italy, Britain, Russia and the United States vied for influence in the pre-Qaddafi Libya, attempting to benefit from the country's strategic location and high quality oil deposits. However, the West's diminished involvement in the country has offered regional powers like ourselves an opportunity to shape Libyan politics to our advantage."
 SAU_FA_host_talks:0 "An Impartial Arbiter"
 SAU_FA_host_talks_desc:0 "When it comes to peace between Israel and Palestine, many have tried. All have failed. We should use our political capital to make a fresh attempt to bring about peace in the Middle East by crafting a proposal that is acceptable to both sides."
 SAU_FA_aid_sudan:0 "Aid Sudan"
 SAU_FA_aid_sudan_desc:0 "Sudan's Islamist government has historically leant towards Iran given the two states' ideological affinity. However, this relationship has done little to support Sudan's ailing economy which has suffered under Western sanctions since the late 90s. We can help secure a Sudanese realignment by providing the economic support that Iran has been unable to offer."
