 SAU_banking.1.t:0 "§HThe Standardized Interest Law§!"
 SAU_banking.1.d:0 "The Kingdom must take a position on §Lriba§! - the prohibition of interest. §LSecular reformers§! argue conventional interest-bearing accounts attract foreign capital and modernize banking. The §LCouncil of Senior Scholars§! demands a strict prohibition consistent with Sharia. A §Hhybrid§! allows sukuk for the public, informal interest behind closed doors."
 SAU_banking.1.a:0 "Allow conventional interest-bearing accounts."
 SAU_banking.1.b:0 "Strict riba prohibition - Sharia is supreme."
 SAU_banking.1.c:0 "Sukuk in public, pragmatic interest in private."

 SAU_banking.2.t:0 "§HFractional Reserve Mandates§!"
 SAU_banking.2.d:0 "How much credit can banks create from each riyal of deposits? The §LWestern model§! uses §Hfractional reserve banking§! - 10:1 leverage, more credit, more growth, more risk. The §LIslamic alternative§! demands §Hfull asset backing§! - every loan tied to real wealth, slower but stable. The §Hhybrid§! sets moderate reserve requirements."
 SAU_banking.2.a:0 "Modern fractional reserve - growth at the cost of stability."
 SAU_banking.2.b:0 "Asset-backed only - stable but slower."
 SAU_banking.2.c:0 "Moderate reserve requirements."

 SAU_banking.3.t:0 "§HThe Anti-Speculation Directives§!"
 SAU_banking.3.d:0 "How tightly should the Kingdom regulate §Lspeculation, derivatives, and futures§!? The §LWestern view§! sees these as vital risk-management tools. The §LIslamic view§! condemns them as §Lgharar§! (excessive uncertainty) - little better than gambling. A §Hhybrid§! permits regulated derivatives only."
 SAU_banking.3.a:0 "Light regulation - allow derivatives and futures."
 SAU_banking.3.b:0 "Strict prohibition - no gharar, no gambling."
 SAU_banking.3.c:0 "Regulated derivatives only - balanced approach."

 SAU_banking.4.t:0 "§HThe Interbank Lending Code§!"
 SAU_banking.4.d:0 "When banks lend to each other, on what terms? The §LWestern model§! uses §Hconventional interest-rate corridors§! (LIBOR-style). The §LIslamic alternative§! routes interbank flows through §Hmurabaha§! - asset-backed cost-plus financing. A §Hhybrid§! allows both, sectorally."
 SAU_banking.4.a:0 "Conventional interest-based interbank market."
 SAU_banking.4.b:0 "Murabaha-based Islamic interbank market."
 SAU_banking.4.c:0 "Hybrid - both, run separately."

 SAU_banking.5.t:0 "§HThe Banking Control Law§!"
 SAU_banking.5.d:0 "Who oversees the Kingdom's banks? The §LWestern model§! makes §LSAMA§! (Saudi Arabian Monetary Agency) an §Hindependent technocratic regulator§!. The §LIslamic alternative§! pairs SAMA with a §HSharia oversight council§! - clergy with binding veto power. A §Hhybrid§! is two parallel structures."
 SAU_banking.5.a:0 "SAMA - independent secular regulator."
 SAU_banking.5.b:0 "SAMA + Sharia council with binding veto."
 SAU_banking.5.c:0 "Hybrid - two parallel structures."

 SAU_banking.6.t:0 "§HBastion of Islamic Finance§!"
 SAU_banking.6.d:0 "The Kingdom commits fully to §HIslamic finance§!. But how strictly? §LStrict orthodoxy§! - no compromise, every transaction Sharia-blessed - earns the unconditional support of the §LUlema§! and stability for generations. §LPragmatic Islamic§! - global Islamic finance hub, attracting Muslim capital from §LMalaysia§!, §LIndonesia§!, §LIran§!, the §LGulf§! - sacrifices a degree of purity for influence."
 SAU_banking.6.a:0 "Strict orthodoxy - no compromise."
 SAU_banking.6.b:0 "Pragmatic - lead the global Islamic finance market."

 SAU_banking.7.t:0 "§MThe Secularization of Finance§!"
 SAU_banking.7.d:0 "The Kingdom breaks with tradition and §Hsecularizes§! its financial sector. The §LFull Anglo-Saxon§! path adopts every Western instrument - §Hderivatives§!, §Hbonds§!, §Hmargin trading§! - draws maximum foreign capital but enrages the §LUlema§!. The §LGradual§! path keeps a Sharia veneer over Western practice - less revenue, less backlash."
 SAU_banking.7.a:0 "Full Anglo-Saxon - all instruments allowed."
 SAU_banking.7.b:0 "Gradual - Western practice with Sharia veneer."

 SAU_economy.1.t:0 "§HThe Oil Boom§!"
 SAU_economy.1.d:0 "Crude climbs from $25 to over §G$140 a barrel§!. Petrodollars flood the treasury faster than the Kingdom can count them. The §2003-2008 windfall§! is a once-in-a-generation chance - and how it is spent will shape the Kingdom for decades. The Council debates: §Lsave it, build with it, or share it§!?"
 SAU_economy.1.a:0 "§HEstablish a Sovereign Wealth Fund.§! Bank the windfall and invest it for the future."
 SAU_economy.1.b:0 "§HFund Grand Megaprojects.§! Pour the cash into factories and cities at home."
 SAU_economy.1.c:0 "§HDistribute it to the People.§! Subsidies and bonuses buy loyalty and calm."

 SAU_economy.2.t:0 "§RSaudi Arabia Cuts Off Our Oil§!"
 SAU_economy.2.d:0 "Riyadh has joined an Arab oil embargo against us. Tankers sit idle in the Gulf, our refineries are running dry, and prices at the pump are spiralling out of control. Factories idle and motorists queue for hours.\n\nThe Saudis say the taps will stay shut until our policy toward the region changes. Our economy will feel the squeeze for as long as the embargo holds."
 SAU_economy.2.a:0 "§RAn outrageous blow!§!"
 SAU_economy.2.b:0 "Find new suppliers and ride it out."

 SAU_economy.3.t:0 "§HSaudi Arabia Wields the Oil Weapon§!"
 SAU_economy.3.d:0 "In an echo of §H1973§!, the Kingdom of Saudi Arabia has proclaimed an embargo on oil shipments to the West and the friends of Israel. The §LUnited States, Britain, France, Germany and the Netherlands§! now face fuel shortages, rationing and soaring prices.\n\nAcross the Arab and Muslim world, crowds hail Riyadh's defiance. In Western capitals, governments scramble for alternative suppliers and warn of recession. Oil, once merely a commodity, has become a weapon of statecraft."
 SAU_economy.3.a:0 "§GOil is our sword.§!"
 SAU_economy.3.b:0 "§RWe will weather this storm.§!"
 SAU_economy.3.c:0 "A dangerous escalation."

 SAU_economy.4.t:0 "§RThe Pull of Oil§!"
 SAU_economy.4.d:0 "Even as the Kingdom diversifies, the gravity of crude never lets go. Every ministry, every budget line, every easy petrodollar tugs the economy back toward the barrel. Vested interests, cheap energy and the path of least resistance all pull in one direction.\n\nWithout constant effort, the Kingdom slides back toward dependence on oil."
 SAU_economy.4.a:0 "§YThe barrel always calls.§! (§ROil Dependence +2§!)"

 SAU_bop_events.1.t:0 "§HEconomic Change§!"
 SAU_bop_events.1.d:0 "Technocrats in the Ministry of Economy press for §Lderegulation, privatisation and open markets§!. The old guard warns that moving too fast will unravel the social contract the Kingdom is built on. The Council must signal a direction."
 SAU_bop_events.1.a:0 "§GEmbrace market reform.§! Let the private sector lead."
 SAU_bop_events.1.b:0 "§RProtect the established order.§! Change can wait."
 SAU_bop_events.2.t:0 "§HWomen in the Workforce§!"
 SAU_bop_events.2.d:0 "A new generation of educated Saudi women want to work, and the economy needs them. Reformers see untapped talent; the §LUlema§! and conservative families see a line that must not be crossed."
 SAU_bop_events.2.a:0 "§GExpand opportunities for women.§! The economy needs every talent."
 SAU_bop_events.2.b:0 "§RUphold traditional roles.§! Preserve the family structure."
 SAU_bop_events.3.t:0 "§HSatellite Dishes and the Internet§!"
 SAU_bop_events.3.d:0 "Satellite television and the early internet pour foreign ideas into Saudi living rooms. Liberals welcome the opening to the world; traditionalists demand the state filter what reaches the faithful."
 SAU_bop_events.3.a:0 "§GAllow open access.§! The Kingdom cannot hide from the world."
 SAU_bop_events.3.b:0 "§RFilter and censor.§! Guard the public morals."
 SAU_bop_events.4.t:0 "§HThe Religious Police§!"
 SAU_bop_events.4.d:0 "The §LCommittee for the Promotion of Virtue§! patrols the streets enforcing dress, prayer and the mixing of sexes. City-dwellers and businesses chafe at their power; the clergy consider them the guardians of the nation's soul."
 SAU_bop_events.4.a:0 "§GCurb their authority.§! Rein in the patrols."
 SAU_bop_events.4.b:0 "§RReaffirm their mandate.§! Virtue must be enforced."

 SAU_banking_system:0 "§HBanking System§!"
 SAU_banking_system_desc:0 "The Kingdom's financial sector. Each banking-law focus gives the player a §Lsecular§!, §Lislamic§!, or §Lhybrid§! choice; the result lives here as a §Hsub-system§!. The total modifier comes from the sum of all chosen sub-systems."
