 SAU_opec_cut_production:0 "Cut Oil Production"
 SAU_opec_cut_production_desc:0 "As OPEC's swing producer, the Kingdom trims output to §Graise the world oil price§!. Each barrel sells for more - a windfall for the treasury. Usable every 180 days."
 SAU_opec_flood_market:0 "Flood the Oil Market"
 SAU_opec_flood_market_desc:0 "Open the taps and §Rcrash the price§!. You sell cheap and lose revenue now - but rival exporters (§LRussia, Iran, Iraq, Venezuela§!) see their economies bleed. A geopolitical weapon, usable once a year."

 SAU_domestic_external_category:0 "§HSaudi Domestic & External Affairs§!"
 SAU_domestic_external_category_desc:0 "The Kingdom's levers over its home front, its oil, and its future beyond it.\n\n§HHow these decisions appear:§!\n§GDomestic§! measures - construction drives, the development fund and workforce reform - unlock with §Y'Economic Liberalization'§!.\n§GOil§! moves - raising output, new fields, conserving reserves, the oil embargo and the OPEC levers - unlock with §Y'Saudi Aramco'§! and its export doctrine.\n§GDiversification§! projects - PIF investment, giga-projects, renewables, the digital economy, tourism and the defence industry - unlock as you complete the §Y'Vision 2030'§! tree.\n\n§HSome decisions ask more of you:§! a §Ynew oil field§! needs the Aramco production strategy; the §Yoil embargo§! can only be proclaimed §Gin peacetime§! while your oil economy is running. Each costs time and treasury, and most push your §Hoil dependence§! up or down."

 SAU_unlock_oil_decisions_tt:0 "§GUnlocks§! the oil decisions in §HSaudi Domestic & External Affairs§!: §Yraise output, develop new fields, conserve reserves, and the oil embargo§!."
 SAU_unlock_mod_decisions_tt:0 "§GUnlocks§! the modernisation decisions in §HSaudi Domestic & External Affairs§!: §Yconstruction drive, development fund, and workforce reform§!."
 SAU_unlock_opec_decisions_tt:0 "§GUnlocks§! the OPEC decisions in §HSaudi Domestic & External Affairs§!: §Ycut production and flood the market§!."
 SAU_enable_newfield_decision_tt:0 "§GEnables§! the §YDevelop a New Oil Field§! decision in §HSaudi Domestic & External Affairs§!."

 SAU_unlock_pif_decision_tt:0 "§GUnlocks§! the §YPIF Strategic Investment§! decision in §HSaudi Domestic & External Affairs§!."
 SAU_unlock_giga_decision_tt:0 "§GUnlocks§! the §YVision 2030§! megaproject decisions in the §HVision 2030§! category. §RThe Kingdom is now committed: deliver the projects, or face the backlash of broken promises.§!"
 SAU_unlock_renewables_decision_tt:0 "§GUnlocks§! the §YExpand Renewable Capacity§! decision in §HSaudi Domestic & External Affairs§!."
 SAU_unlock_digital_decision_tt:0 "§GUnlocks§! the §YGrow the Digital Economy§! decision in §HSaudi Domestic & External Affairs§!."
 SAU_unlock_tourism_decision_tt:0 "§GUnlocks§! the §YHost a Global Tourism Event§! decision in §HSaudi Domestic & External Affairs§!."
 SAU_unlock_arms_decision_tt:0 "§GUnlocks§! the §YLocalise Arms Production§! decision in §HSaudi Domestic & External Affairs§!."

