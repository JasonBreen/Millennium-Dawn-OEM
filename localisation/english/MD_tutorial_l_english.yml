 MD_TUTORIAL_OVERVIEW_TITLE: "How MD Thinks About Power"
 MD_TUTORIAL_OVERVIEW_LEFT: "Millennium Dawn treats the state as more than factories and divisions. Shared systems track how money, parties, foreign leverage, research capacity, and global institutions shape national power. Because these mechanics are implemented in common GUI and scripted code, they form a baseline layer for many countries."
 MD_TUTORIAL_OVERVIEW_RIGHT: "The central idea is interdependence. Economic health shapes political stability, politics shapes diplomatic room to act, and foreign pressure can erode sovereignty without a formal war. MD is built to model modern statecraft as connected systems rather than isolated bonuses."
 MD_TUTORIAL_ECONOMY_TITLE: "The Economy as State Capacity"
 MD_TUTORIAL_ECONOMY_LEFT: "MD's economy system models the state as a set of financial flows. Treasury is liquid state cash, debt is future money pulled into the present, and international investments are capital placed abroad. The budget screen sits above these values as the government's main economic posture."
 MD_TUTORIAL_ECONOMY_RIGHT: "Taxes and the central bank policy rate are macroeconomic levers rather than simple modifiers. They describe how strongly the state extracts resources from society and how expensive credit is across the economy. In MD, economic management is meant to feel like steering a modern national balance sheet."
 MD_TUTORIAL_POLITICS_TITLE: "Politics as Coalition Management"
 MD_TUTORIAL_POLITICS_LEFT: "MD politics assumes that power is distributed across parties and coalitions, not held by a single abstract ideology. The politics screen tracks the ruling party, coalition partners, coalition strength, and the relative weight of party positions. Government legitimacy is therefore a question of alignment and coalition arithmetic."
 MD_TUTORIAL_POLITICS_RIGHT: "Party-management tools represent how states and elites shape the competitive field. Boosting, attacking, banning, allowing, and changing the election threshold all change who can realistically participate in power. The system is less about election flavor and more about managing regime structure."
 MD_TUTORIAL_INFLUENCE_TITLE: "Influence as Informal Power"
 MD_TUTORIAL_INFLUENCE_LEFT: "Influence represents the share of a country's political space controlled by outside powers. What remains is domestic independence: the state's own ability to act without foreign sponsors. The ranked influencer list shows which external actors are winning that contest."
 MD_TUTORIAL_INFLUENCE_RIGHT: "As influence rises, foreign leverage changes from pressure into control. Aid builds dependency, political manipulation reshapes alignment, exploitation turns influence into material gain, and puppeting formalizes outside dominance. MD uses influence to model modern informal empire."
 MD_TUTORIAL_RESEARCH_TITLE: "Research as National Development"
 MD_TUTORIAL_RESEARCH_LEFT: "Research slots in MD represent national scientific capacity rather than a mostly fixed tech limit. The extra slot system ties them to overall economic size and development level, so both wealth and modernization matter. Scientific growth is treated as something a country builds, not something it simply starts with."
 MD_TUTORIAL_RESEARCH_RIGHT: "The two growth paths distinguish between having more research institutions and having better research equipment. Code also links research-slot growth to education expenditure, which means scientific expansion carries a real state cost. Research is therefore part of development policy, not free snowballing."
 MD_TUTORIAL_MILITARY_TITLE: "The Military as a Modern Force System"
 MD_TUTORIAL_MILITARY_LEFT: "MD's military layer is built around modern force types and specialized battalions. IFVs, APCs, MBTs, air assault units, and many other categories give formations a more contemporary structure than vanilla HOI4. Battalions are meant to represent different battlefield roles, not just generic width fillers."
 MD_TUTORIAL_MILITARY_RIGHT: "Because combat widths vary by battalion, template design is not a solved vanilla formula. Production also reflects modern logistical burden, including oil and a wider range of equipment groups. Military power in MD is an industrial, technological, and supply problem as much as a manpower problem."
 MD_TUTORIAL_ADVANCED_TITLE: "Power Beyond the Battlefield"
 MD_TUTORIAL_ADVANCED_LEFT: "International Systems groups arenas that sit above ordinary bilateral diplomacy. Space, counter-terror operations, PMCs, the United Nations, and cyber warfare model forms of power that operate through institutions, networks, and specialized capabilities. That is why they share one umbrella screen."
 MD_TUTORIAL_ADVANCED_RIGHT: "The Energy screen does the same for electricity. Instead of treating power as an invisible background number, MD models generation, consumption, fulfillment, and infrastructure as a dedicated national system. Together these screens show that modern states project power through systems as much as through armies."
