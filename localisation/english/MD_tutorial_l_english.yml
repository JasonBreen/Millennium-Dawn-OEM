 MD_TUTORIAL_OVERVIEW_TITLE: "Power Ranking"
 MD_TUTORIAL_OVERVIEW_LEFT: "Every country in Millennium Dawn is assigned a power ranking national spirit that reflects its position on the world stage. This ranking determines your Political Power generation, influence capabilities, law change costs, interest rates, and more."
 MD_TUTORIAL_OVERVIEW_RIGHT: "Power ranking is recalculated twice per year and is based on two factors:\n- GDP: Your total economic output from buildings and other sources.\n- Domestic Independence: The portion of your influence pool you control (not held by foreign powers)."
 MD_TUTORIAL_ECONOMY_TITLE: "Economy Guide"
 MD_TUTORIAL_ECONOMY_LEFT: "Millennium Dawn includes a detailed modern economy system covering revenue, government expenditure, debt, employment, electricity, and more.\n\nGDP (Gross Domestic Product) is calculated from active buildings and other factors. It represents the size of a country's economy and affects:\n- Country rank national spirits (Superpower, Great Power, Minor Power, etc.)\n- Number of research slots\n- Interest rates (via the debt-to-GDP ratio)"
 MD_TUTORIAL_ECONOMY_RIGHT: "GDP per Capita is GDP divided by total population, and indicates the wealth of a nation's population.\n\nThis means poor nations grow their population faster and build cheaply, but have lower research speed. Rich nations research faster and are more stable, but face higher costs for construction and workforce.\n\nThe central bank policy rate contributes half its value to the interest rate. This means raising the policy rate to fight inflation also increases the cost of servicing debt - a tradeoff between controlling inflation and managing debt."
 MD_TUTORIAL_POLITICS_TITLE: "Politics Guide"
 MD_TUTORIAL_POLITICS_LEFT: "Millennium Dawn features a detailed political system with 5 ideology groups, 24 subideologies, multi-party elections, coalition governments, approval ratings, and political laws."
 MD_TUTORIAL_POLITICS_RIGHT: "Government popularity (also called approval rating) is a dynamic variable that tracks how much public support your ruling coalition has.\n\nGovernment popularity is calculated from the combined party popularity of all parties in your ruling coalition.\n\nWhen no single party wins more than 50% in an election, a coalition must be formed. The largest party leads the coalition and can invite other parties to join.\n\nHigher coalition strength provides better stability, political power, and drift defense bonuses. Weak coalitions are unstable and vulnerable to collapse."
 MD_TUTORIAL_INFLUENCE_TITLE: "Influence Guide"
 MD_TUTORIAL_INFLUENCE_LEFT: "Influence is one of the core diplomatic mechanics in Millennium Dawn. It represents the political, economic, and cultural leverage that countries hold over one another. By building influence in a target nation, you can shape its politics, extract economic benefits, and ultimately turn it into a subject state.\n\nEvery country has a pool of influence that totals 100%. This is divided between domestic independence (the country's own sovereignty) and the influence shares held by foreign nations."
 MD_TUTORIAL_INFLUENCE_RIGHT: "As your influence percentage in a target country grows, new actions become available.\n\nAt high influence levels (above ~50%), you can attempt to stage a coup in the target country.\n\nAt very high influence (above ~81%), you can force a country into becoming your satellite state.\n\nOnce a country is your subject, you can apply economic exploitation, extracting tribute income from the target at the cost of their economic growth."
 MD_TUTORIAL_RESEARCH_TITLE: "GDP and GDP per Capita"
 MD_TUTORIAL_RESEARCH_LEFT: "GDP (Gross Domestic Product) is calculated from active buildings and other factors. It represents the size of a country's economy and affects:\n- Number of research slots\n\nGDP per Capita is GDP divided by total population, and indicates the wealth of a nation's population."
 MD_TUTORIAL_RESEARCH_RIGHT: "Research Speed: Bonus increases with wealth (kicks in above ~$51k GDP/C).\n\nThis means poor nations grow their population faster and build cheaply, but have lower research speed. Rich nations research faster and are more stable, but face higher costs for construction and workforce.\n\nEducation spending is influenced by population size, number of research slots, and nuclear, air, land, and naval facilities."
 MD_TUTORIAL_MILITARY_TITLE: "Military Equipment Requirements"
 MD_TUTORIAL_MILITARY_LEFT: "Microchips and Advanced Composites are required to produce modern military equipment. The main categories include:\n- Guided missiles\n- Ballistic missiles\n- Nuclear missiles\n- Advanced artillery\n- Advanced tank chassis\n- Advanced aircraft\n- Ship combat modules"
 MD_TUTORIAL_MILITARY_RIGHT: "Without sufficient Microchip or Advanced Composite stockpiles, production of these equipment types will stall or slow significantly. Nations planning a modern military buildup should establish Microchip and Advanced Composite production well before they need to ramp up equipment manufacturing."
 MD_TUTORIAL_ADVANCED_TITLE: "International Systems Guide"
 MD_TUTORIAL_ADVANCED_LEFT: "Millennium Dawn features a range of international organizations, alliances, and systems that shape diplomacy, security, and economics on the world stage.\n\nThe UNSC is the most powerful body in the UN. It has 15 members: 5 permanent (P5) and 10 elected.\n\nThe General Assembly includes all recognized UN member states."
 MD_TUTORIAL_ADVANCED_RIGHT: "Millennium Dawn features a comprehensive space program and satellite system. Countries can develop space programs, research satellite technologies, build and launch satellites into orbit, and gain powerful military and civilian bonuses from orbital coverage.\n\nThe cyberwarfare system allows countries to conduct digital operations against rivals.\n\nPMCs allow you to hire professional military units for treasury funds rather than using your own manpower and equipment."
