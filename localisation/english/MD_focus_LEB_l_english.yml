 # Meeting Walid Jumblatt
 Leb.decision.1.t: "An Audience With Walid Jumblatt"
 Leb.decision.1.d: "The Druze chieftain receives us in the mountains of the Chouf. Jumblatt's calculations are famously fluid — he has fought against, with, and around every faction Lebanon has produced. Today he is listening. Tomorrow's posture will depend on what we offer."
 Leb.decision.1.a: "Promise investment in the Druze regions"
 Leb.decision.1.b: "Highlight Syrian oppression of the Druze"
 Leb.decision.1.c: "Push him to break ties with Hezbollah"

 # Meeting Samir Geagea
 Leb.decision.2.t: "An Audience With Samir Geagea"
 Leb.decision.2.d: "From his cell beneath the Defence Ministry, Geagea remains the symbol — and the de facto leader — of the Lebanese Forces. The Christian community watches his silences as closely as his statements. A word from him would move thousands."
 Leb.decision.2.a: "Promise electoral reform"
 Leb.decision.2.b: "Pledge to disarm Hezbollah"
 Leb.decision.2.c: "Share intelligence on Syrian operations"

 # Meeting Nabih Berri
 Leb.decision.3.t: "An Audience With Nabih Berri"
 Leb.decision.3.d: "The Speaker has built his career on the patronage of two masters — Damascus and the Shia south. He is no friend of ours. But the south is poor, the rebuilding is slow, and Syria's promises have grown thin. Even Berri can be moved."
 Leb.decision.3.a: "Channel reconstruction funds to the south"
 Leb.decision.3.b: "Grant him a position as mediator"
 Leb.decision.3.c: "Threaten to expose corruption"

 # Damascus's Dove (event chain)
 Leb.storyevent.1.t: "Damascus's Dove"
 Leb.storyevent.1.d: "A man claiming to be a senior officer of Syrian military intelligence has reached out through an intermediary. He says he wishes to defect — and to bring with him files on every Syrian asset operating inside our borders. The offer is precisely as plausible as it is dangerous."
 Leb.storyevent.1.a: "Send a trusted intermediary"
 Leb.storyevent.1.b: "Refuse the meeting"
 Leb.storyevent.1.c: "Test him by changing the location"

 Leb.storyevent.11.t: "A Body in the Quarry"
 Leb.storyevent.11.d: "Our intermediary was found in a quarry outside Zahle, two rounds in the back of the head. The defection — if there was ever any defection on offer — has died with him. Whoever sent the warning has just been clearly understood."
 Leb.storyevent.11.a: "Bury our man quietly"

 Leb.storyevent.12.t: "An Empty Apartment"
 Leb.storyevent.12.d: "The defector's apartment in Damascus has been emptied. Neighbours speak of a midnight visit by men who did not knock. He will not be calling again. Whether he was real, or a probe, we will never know."
 Leb.storyevent.12.a: "Note the lesson"

 Leb.storyevent.13.t: "A Last-Minute Change"
 Leb.storyevent.13.d: "Our man insists on a different café, at a different hour, with no advance notice given to anyone — not even to us. If he is genuine, this is the behaviour of a frightened defector. If he is not, the trap has just become considerably harder to spring."
 Leb.storyevent.13.a: "Agree to the dead drop"
 Leb.storyevent.13.b: "Refuse"
 Leb.storyevent.13.c: "Propose a car-to-car handoff instead"

 Leb.storyevent.14.t: "Burned in Daylight"
 Leb.storyevent.14.d: "The handoff was watched. Our courier made it home, but the documents he was meant to receive never arrived — and within hours, three of our assets inside Damascus had vanished. The Syrians knew. They have known for some time."
 Leb.storyevent.14.a: "Tighten our security"

 # Fateful February (event chain)
 Leb.storyevent.2.t: "Fateful February"
 Leb.storyevent.2.d: "The threat assessments arriving on our desks no longer use conditional language. The hotel, the car, the route, the day — every detail of the prime minister's coming week has been mapped by hands other than ours. A decision must be made, and made today."
 Leb.storyevent.2.a: "Go to ground and disappear"
 Leb.storyevent.2.b: "Double the escort"
 Leb.storyevent.2.c: "Send a decoy"

 Leb.storyevent.21.t: "The Route to Parliament"
 Leb.storyevent.21.d: "The session cannot be missed. The question is how the prime minister reaches the chamber — through the warren of side streets that intelligence knows by heart, or down the corniche where every camera in Beirut can see he is alive."
 Leb.storyevent.21.a: "Take the underground circuitous route"
 Leb.storyevent.21.b: "Announce the public corniche route"

 Leb.storyevent.22.t: "The Saint George Hotel"
 Leb.storyevent.22.d: "A van containing the equivalent of a thousand kilograms of TNT detonated as the convoy passed the Saint George Hotel. The prime minister was killed instantly, along with twenty-two others. The crater is twenty metres across. The country has just changed."
 Leb.storyevent.22.a: "Bury him as a martyr"

 Leb.storyevent.23.t: "An Empty Cadillac"
 Leb.storyevent.23.d: "The decoy detonated the bomb. The prime minister, three streets away, heard the explosion through his open window and watched a column of smoke rise above the Saint George. He is alive. Someone in Damascus is presently composing a most difficult cable."
 Leb.storyevent.23.a: "Move him to a safehouse"

 Leb.storyevent.24.t: "A Warning From Within"
 Leb.storyevent.24.d: "A source inside the Saint George — a waiter on the lunch shift — has sent word through a cousin in the security detail. The hotel staff have been told to expect 'visitors' this week. The instruction came from a number that does not appear in any directory."
 Leb.storyevent.24.a: "Heed the warning and avoid the hotel"
 Leb.storyevent.24.b: "Defy them and have lunch there"

 Leb.storyevent.25.t: "The Vote Is Cast"
 Leb.storyevent.25.d: "The prime minister entered the chamber to a standing ovation from his own bloc and a wall of stony faces from the other. He spoke for thirty-eight minutes. The vote passed. He walked out alive. Beirut, for one afternoon, belongs to us."
 Leb.storyevent.25.a: "Press the advantage"

 Leb.storyevent.26.t: "Lunch at the Saint George"
 Leb.storyevent.26.d: "Photographs of the prime minister at his usual table — laughing, untroubled, surrounded by colleagues — were on every front page by morning. The defiance has been noticed. So has the implication: we know what was planned, and we are not afraid."
 Leb.storyevent.26.a: "Let the message stand"
