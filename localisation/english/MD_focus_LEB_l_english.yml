l_english:
 # Decision Category
 Lebanese_resistance_decisions: "Lebanese Resistance"

 # Decisions
 fund_independent_media: "Fund Independent Media"
 fund_independent_media_desc: "Channel funds to publishers and editors willing to print stories Damascus would prefer remain unwritten. Quietly builds public sympathy at the cost of the Hariri network's discretionary reserves."

 bribe_pro_syrian_mps: "Bribe Pro-Syrian MPs"
 bribe_pro_syrian_mps_desc: "Offer envelopes and ministerial favours to the legislators most loyal to Damascus. A few well-placed defections will buy us breathing room in parliament — and a foothold for the Hariri bloc."

 build_shadow_cabinet: "Build a Shadow Cabinet"
 build_shadow_cabinet_desc: "Quietly assemble the ministers, advisors, and lieutenants we will need on the day Syrian troops leave. A government in waiting cannot be improvised."

 meet_walid_jumblatt: "Meet With Walid Jumblatt"
 meet_walid_jumblatt_desc: "Sit down with the leader of the Progressive Socialist Party. The Druze have suffered under occupation as much as anyone — the question is what they will accept in exchange for breaking with Damascus."

 meet_samir_geagea: "Meet With Samir Geagea"
 meet_samir_geagea_desc: "Approach the imprisoned Lebanese Forces leader. Geagea's Christian base distrusts us, but his hatred of Syrian rule is uncomplicated. Common ground may be possible."

 meet_nabih_berri: "Meet With Nabih Berri"
 meet_nabih_berri_desc: "Reach out to the Amal Movement's chairman. Berri owes much of his position to Syrian patronage, but the Shia south has needs Damascus has failed to meet."

 divert_investments_to_periphery: "Divert Investments to the Periphery"
 divert_investments_to_periphery_desc: "Redirect development funds out of central Beirut and into the long-neglected south and Beqaa. Earns goodwill where it matters most — and starves the patronage networks that bind the capital to Syria."

