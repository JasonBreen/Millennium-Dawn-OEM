### Events
 chi_tai_pressure.1.t: "The Taiwan Question: Opening Moves"
 chi_tai_pressure.1.d: "The State Council has authorised a sustained campaign to erode American support for Taiwan. Economic leverage, diplomatic isolation, and military signalling are all available instruments. The question is how hard to push — and how fast."
 chi_tai_pressure.1.a: "Apply maximum economic pressure. We will make the cost of supporting Taiwan unbearable."
 chi_tai_pressure.1.b: "Begin with measured diplomatic overtures. Patience yields better results than confrontation."

 chi_tai_pressure.2.t: "Washington Weighs Its Options"
 chi_tai_pressure.2.d: "Beijing's pressure campaign has landed in Washington at an awkward moment. The administration faces competing factions: hawks demanding a firm reaffirmation of the Taiwan commitment, and pragmatists worried about the economic consequences of antagonising China."
 chi_tai_pressure.2.a: "Reaffirm our commitment to Taiwan. China's pressure only strengthens our resolve."
 chi_tai_pressure.2.b: "Acknowledge China's concerns. We can find a formula that reduces tensions without abandoning Taiwan."

 chi_tai_pressure.3.t: "Escalation: China Raises the Stakes"
 chi_tai_pressure.3.d: "Washington's rejection has landed badly in Zhongnanhai. The leadership is under pressure to demonstrate that defiance carries costs. Two options are on the table: build a diplomatic coalition against American Taiwan policy, or signal military resolve through exercises in the strait."
 chi_tai_pressure.3.a: "Build an international coalition. Diplomatic isolation is more sustainable than confrontation."
 chi_tai_pressure.3.b: "Conduct Taiwan Strait exercises. Washington must understand the military dimension of our commitment."

 chi_tai_pressure.4.t: "Washington Offers a Partial Concession"
 chi_tai_pressure.4.d: "After internal debate, the administration has signalled a willingness to reduce — but not eliminate — arms sales to Taiwan. The offer is framed as a gesture toward stability. Beijing must decide whether to accept the partial gain or press for full withdrawal."
 chi_tai_pressure.4.a: "Accept the concession. A partial gain is still a gain."
 chi_tai_pressure.4.b: "Reject the offer. Full withdrawal of support is the only acceptable outcome."

 chi_tai_pressure.5.t: "America at the Crossroads"
 chi_tai_pressure.5.d: "China's sustained pressure campaign has forced a final decision in Washington. The intelligence community warns that further concessions risk emboldening Beijing across the entire Indo-Pacific. But the economic cost of confrontation is also real. The administration must choose."
 chi_tai_pressure.5.a: "Withdraw formal support for Taiwan. The relationship with Beijing is too important to sacrifice."
 chi_tai_pressure.5.b: "Reaffirm our commitment to Taiwan in full. We will not be bullied into abandonment."

 chi_tai_pressure.6.t: "Washington Steps Back from Taiwan"
 chi_tai_pressure.6.d: "In a quiet but momentous shift, the United States has signalled that it will no longer provide active military and diplomatic backing for Taiwan's separate status. The announcement is framed in bureaucratic language, but its strategic meaning is unmistakable: Taiwan stands alone."
 chi_tai_pressure.6.a: "A historic achievement. The path to reunification is now open."

 chi_tai_pressure.7.t: "Washington Reaffirms Its Commitment"
 chi_tai_pressure.7.d: "The United States has rejected China's pressure campaign and publicly reaffirmed its commitment to Taiwan's security. The administration has announced a new arms package for Taipei and convened emergency consultations with Japan and Australia. Beijing's campaign has failed — and has hardened opposition in Washington."
 chi_tai_pressure.7.a: "A setback, but not a defeat. We will reassess our approach."


 china_sar.23.t: "Proposal: Cross-Strait Services Trade Agreement"
 china_sar.23.d: "Beijing has put forward the Cross-Strait Services Trade Agreement, opening major service sectors on both sides to freer trade and investment. The proposal would grant mainland firms access to Taiwan's banking, healthcare, and retail sectors. Supporters argue it would deepen economic integration; critics warn it hands Beijing structural leverage over Taiwan's economy."
 china_sar.23.a: "Sign the agreement. Economic integration serves our long-term interests."
 china_sar.23.b: "Reject the agreement. The concessions are too deep and the oversight too weak."

 china_sar.24.t: "Cross-Strait Business Networks"
 china_sar.24.d: "Pro-Beijing business networks have expanded into Taiwan's financial and media sectors, backed by mainland capital and facilitated by a series of opaque investment agreements. The government must decide how to respond to a growing influence that blurs the line between commerce and politics."
 china_sar.24.a: "Welcome cross-strait exchanges. Economic ties are a foundation for stability."
 china_sar.24.b: "Monitor the networks, but do not restrict them. Overreaction would harm legitimate trade."
 china_sar.24.c: "Impose restrictions on mainland-linked investment in sensitive sectors."

 china_sar.25.t: "The 92 Consensus Question"
 china_sar.25.d: "Mainland China has formally proposed reviving the 1992 Consensus as the diplomatic basis for cross-strait talks. The formula is deliberately ambiguous: Beijing interprets it as a commitment to the goal of reunification under one China, while the KMT traditionally accepted it under the formula 'one China, respective interpretations.'. The DPP has long rejected it as a political trap. Taiwan must respond."
 china_sar.25.a: "Accept the consensus formula. 'One China, respective interpretations' preserves our position while opening a path to dialogue."
 china_sar.25.b: "Acknowledge the spirit of dialogue without endorsing the formula explicitly. We seek peace, not a political commitment."
 china_sar.25.c: "Reject the consensus. Any formula that implies acceptance of 'one China' undermines our sovereign status."

 china_sar.26.t: "Pro-Independence Forces Win in Taiwan"
 china_sar.26.d: "The pro-independence camp has secured a majority in Taiwan's elections. The incoming government has made clear it will not accept the 92 Consensus and intends to chart a more assertive course on Taiwan's international status. Cross-strait relations enter a period of cooling."
 china_sar.26.a: "A setback. We will reassess our approach to Taipei."

 china_sar.27.t: "Beijing's Interference Operations Exposed"
 china_sar.27.d: "Taiwan's National Security Bureau has uncovered evidence of PRC-linked operations to influence domestic politics — including media investment through proxies, funding of pro-engagement political figures, and cultivation of business networks used to channel political messaging. The findings have been leaked to the press and are generating public outrage."
 china_sar.27.a: "Expel the implicated cultural attachés and issue a formal protest. We will not tolerate foreign manipulation of our democracy."

 china_sar.28.t: "Taiwan Expels Chinese Officials"
 china_sar.28.d: "Taipei has formally expelled several cultural and commercial attachés following the exposure of Beijing's political influence operations. The move draws applause from Taiwan's democratic allies and a sharp public rebuke from the Ministry of Foreign Affairs in Beijing."
 china_sar.28.a: "Absorb the diplomatic cost. The operation's exposure sets our work back, but the broader strategy remains sound."


 TAI_foreign_interference: "Foreign Interference Uncovered"
 TAI_foreign_interference_desc: "Taiwan's security services have exposed a mainland-backed influence operation targeting domestic media and political circles. Public trust in cross-strait engagement has taken a blow, and democratic pressure is mounting on the government to take a harder line with Beijing."


 TAI_media_infiltration: "Media Network Infiltration"
 TAI_media_infiltration_desc: "Fund and expand pro-Beijing media ownership and editorial influence networks within Taiwan. Cultivate a friendlier information environment for cross-strait engagement."

 TAI_business_council_funding: "Cross-Strait Business Council Funding"
 TAI_business_council_funding_desc: "Provide financial backing to KMT-aligned business associations and cross-strait chambers of commerce. Strengthen the pro-engagement constituency within Taiwan's economic elite."

 TAI_cultural_exchange_program: "Cross-Strait Cultural Exchange Programme"
 TAI_cultural_exchange_program_desc: "Sponsor academic exchanges, cultural festivals, and youth dialogue programmes across the strait. Build people-to-people ties that soften political resistance to closer relations."

 TAI_cross_strait_infrastructure_investment: "Cross-Strait Infrastructure Investment"
 TAI_cross_strait_infrastructure_investment_desc: "Channel mainland capital into infrastructure projects on Taiwan, positioning Chinese investment as a source of economic opportunity and deepening material interdependence between the two economies."
