 ### IDEAS ###
 HKG_CHI_economic_support: "Beijing Economic Support Package"
 HKG_CHI_economic_support_desc: "Beijing has provided targeted economic assistance to Hong Kong, boosting industrial capacity and stabilizing public confidence in the city's long-term outlook."
 HKG_under_press_controls: "Restricted Press Environment"
 HKG_under_press_controls_desc: "Beijing's imposition of press controls has significantly curtailed media freedom in Hong Kong, reducing Political Power gains and eroding public stability."
 HKG_national_security_law_idea: "National Security Law"
 HKG_national_security_law_idea_desc: "Beijing's National Security Law has fundamentally altered Hong Kong's political landscape, criminalizing a broad range of dissent. The law entrenches Beijing's authority but fuels deep social resentment."
 HKG_brain_drain: "Brain Drain"
 HKG_brain_drain_desc: "Political repression and economic uncertainty are driving a sustained emigration of Hong Kong's professional class, weakening the city's manpower base and construction capacity."
 HKG_bay_area_boom: "Greater Bay Area Boom"
 HKG_bay_area_boom_desc: "Hong Kong is benefiting from deep integration with the Pearl River Delta economic cluster, driving industrial capacity and reducing consumer prices through mainland economies of scale."
 HKG_protest_movement: "Active Protest Movement"
 HKG_protest_movement_desc: "A sustained protest movement is channeling public discontent into political activity, generating Political Power through civic mobilization while weighing on overall stability."
 MAC_diversification_boom: "Diversification Initiative"
 MAC_diversification_boom_desc: "A major economic diversification program is underway in Macau, reducing the city's dependence on gaming revenue and improving consumer market efficiency."
 MAC_diversification_success: "Diversified Economy"
 MAC_diversification_success_desc: "Macau has successfully diversified beyond the casino industry. The convention, technology, and services sectors now provide stable, broad-based economic growth."
 MAC_lusophone_heritage_protected: "Protected Lusophone Heritage"
 MAC_lusophone_heritage_protected_desc: "Beijing's formal protection of Macau's Portuguese cultural heritage has strengthened civic identity and boosted the city's international standing."
 TIB_unrest: "Tibetan Unrest"
 TIB_unrest_desc: "Growing repression has sparked coordinated civil disobedience and protest across Tibet. The unrest raises resistance targets and creates an undercurrent of instability."
 TIB_religious_protections: "Religious Protections Granted"
 TIB_religious_protections_desc: "Beijing's decision to ease restrictions on Buddhist practice has significantly improved social cohesion in Tibet, reducing resistance and boosting public confidence."
 TIB_infrastructure_investment: "Infrastructure Investment Program"
 TIB_infrastructure_investment_desc: "A major infrastructure investment program is transforming Tibet's connectivity and construction capacity through road, rail, and energy projects."
 ETK_surveillance_state: "Comprehensive Surveillance State"
 ETK_surveillance_state_desc: "Beijing has imposed an all-encompassing surveillance and re-education apparatus on East Turkestan, severely restricting political power and fueling resistance while ostensibly maintaining order."
 ETK_development_zones: "Development Zones"
 ETK_development_zones_desc: "Beijing's industrial development zones have improved East Turkestan's infrastructure and manufacturing capacity, though the benefits accrue primarily to the integrated Han economic sector."
 TAI_cross_strait_economic_ties: "Cross-Strait Economic Ties"
 TAI_cross_strait_economic_ties_desc: "Taiwan's economy has become more intertwined with the mainland through trade, investment, and supply chain links, reducing consumer costs but creating political dependencies."
 TAI_cross_strait_autonomy_guarantee: "Cross-Strait Autonomy Guarantee"
 TAI_cross_strait_autonomy_guarantee_desc: "Beijing has formally committed to preserving Taiwan's distinct political and legal system under a 'One Country, Two Systems' arrangement, stabilizing public opinion and expanding political latitude."
 TAI_civil_defense_readiness: "Civil Defense Readiness"
 TAI_civil_defense_readiness_desc: "Taiwan's civil defense mobilization program has raised war support and improved reserve preparedness, strengthening the island's resilience against military coercion."
 TAI_diplomatic_recognition_push: "International Diplomatic Drive"
 TAI_diplomatic_recognition_push_desc: "Taiwan's semiconductor diplomacy and international outreach have raised its global profile, generating Political Power through expanded recognition and partnership."
 TAI_military_pressure: "Under Military Pressure"
 TAI_military_pressure_desc: "China's sustained military exercises and ADIZ incursions have created a climate of tension, eroding Stability but reinforcing Taiwan's civil defense culture and war support."
 TAI_political_consolidation_chi: "Beijing Political Consolidation"
 TAI_political_consolidation_chi_desc: "Beijing is systematically consolidating political control over Taiwan's administrative and civic institutions, restricting independent political activity and deepening mainland alignment."
 CHI_HKG_investment_returns: "Hong Kong Investment Returns"
 CHI_HKG_investment_returns_desc: "Beijing's investments in Hong Kong's Greater Bay Area integration are generating steady returns, contributing modest but consistent gains to China's political position."


