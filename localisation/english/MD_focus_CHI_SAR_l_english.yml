l_english:
 CHI_SAR_one_china_framework: "One Country Framework"
 CHI_SAR_one_china_framework_desc: "China's sovereignty over the Special Administrative Regions rests on a legal and political framework rooted in the 'One Country' principle. Formalizing this framework sets the foundation for Beijing's engagement with Hong Kong, Macau, and the broader network of autonomous regions under Chinese administration."

 CHI_SAR_liaison_office_reform: "Liaison Office Expansion"
 CHI_SAR_liaison_office_reform_desc: "The Central People's Government Liaison Offices in Hong Kong and Macau serve as Beijing's primary instruments of influence. Expanding their mandate and staffing strengthens Beijing's political foothold in both territories."

 CHI_SAR_national_security_framework: "National Security Framework"
 CHI_SAR_national_security_framework_desc: "Enacting comprehensive national security legislation in the SARs curtails political opposition and tightens Beijing's control over press, assembly, and governance. Existing legal protections are superseded by mainland security norms."

 CHI_SAR_patriotic_education: "Patriotic Education Campaign"
 CHI_SAR_patriotic_education_desc: "Introducing revised curricula across all SARs under Chinese administration cultivates loyalty to the mainland and erodes local identities. The campaign targets schools, media, and civic institutions."

 CHI_SAR_two_systems_commitment: "Commitment to Two Systems"
 CHI_SAR_two_systems_commitment_desc: "Beijing reaffirms the 'One Country, Two Systems' formula, pledging to preserve the distinct legal, economic, and social frameworks of Hong Kong and Macau. This earns goodwill but constrains direct integration."

 CHI_SAR_one_system_declaration: "One System Declaration"
 CHI_SAR_one_system_declaration_desc: "Beijing formally abandons the 'Two Systems' principle, declaring that full integration with mainland norms is the final objective. This inflames international opinion but accelerates Beijing's control over the SARs."

 CHI_SAR_integrate_HKG: "Integrate Hong Kong"
 CHI_SAR_integrate_HKG_desc: "With Beijing's influence firmly entrenched and local resistance neutralized, Hong Kong is formally absorbed into the People's Republic. The territory's remaining autonomy is dissolved and its institutions merged with those of Guangdong Province."

 CHI_SAR_integrate_MAC: "Integrate Macau"
 CHI_SAR_integrate_MAC_desc: "Macau, long the most compliant of the SARs, is brought under full mainland administration. Its special economic status is retained under a new Special Economic Zone designation."

 CHI_SAR_greater_china_dividend: "Greater China Dividend"
 CHI_SAR_greater_china_dividend_desc: "Maintaining a network of autonomous regions under Beijing's umbrella generates substantial economic and diplomatic dividends. Trade routes, investment flows, and political legitimacy all benefit from the architecture of Greater China."

 CHI_SAR_defense_industry_access: "Defense Industry Access"
 CHI_SAR_defense_industry_access_desc: "Under the Two Systems framework, Beijing authorizes select SAR entities to participate in contracts with Chinese defense and industrial organizations, deepening economic integration while providing the SAR with access to cutting-edge production capacity."

 CHI_HKG_greater_bay_area: "Greater Bay Area Initiative"
 CHI_HKG_greater_bay_area_desc: "The Guangdong-Hong Kong-Macao Greater Bay Area project links Hong Kong's financial sector with the Pearl River Delta's industrial base. Joint infrastructure investments and harmonized regulations accelerate regional economic integration."

 CHI_HKG_financial_integration: "Financial Market Integration"
 CHI_HKG_financial_integration_desc: "Deepening the stock connect programs and harmonizing financial regulations between Hong Kong and the mainland increases cross-border capital flows and strengthens Hong Kong's role as China's primary international financial hub."

 CHI_HKG_media_freedom: "Press and Media Freedoms"
 CHI_HKG_media_freedom_desc: "Hong Kong's press freedoms and open internet access are reaffirmed as a distinctive feature of the 'Two Systems' arrangement. This strengthens civil society and international confidence in Hong Kong's autonomy, though it frustrates Beijing's ambitions."

 CHI_HKG_rule_of_law: "Legal Alignment with Beijing"
 CHI_HKG_rule_of_law_desc: "Hong Kong's common law tradition is progressively harmonized with mainland legal norms. Extradition arrangements and security cooperation are tightened, increasing Beijing's reach into Hong Kong's judicial system."

 CHI_HKG_political_alignment: "Political Alignment"
 CHI_HKG_political_alignment_desc: "Following a decade of gradual convergence, Hong Kong's political system is brought into closer alignment with Beijing's governance model. Pro-Beijing candidates dominate the legislature, and formal opposition parties are effectively excluded."

 CHI_MAC_pearl_river_delta: "Pearl River Delta Connectivity"
 CHI_MAC_pearl_river_delta_desc: "Macau's position at the mouth of the Pearl River makes it a natural node for regional connectivity. Joint infrastructure projects , including ferry links, bridge expansions, and logistics hubs , embed Macau more deeply in the Greater Bay Area economy."

 CHI_MAC_gaming_diversification: "Gaming Sector Diversification"
 CHI_MAC_gaming_diversification_desc: "Macau's economy remains dangerously dependent on the casino industry. Joint investment in technology, financial services, and light manufacturing aims to diversify revenue streams and reduce vulnerability to disruptions in tourism."

 CHI_MAC_financial_services: "Financial Services Hub"
 CHI_MAC_financial_services_desc: "Developing Macau as a specialist financial services center for Portuguese-speaking markets gives Beijing a unique channel for investment into Latin America and Africa. Renminbi-denominated instruments are launched to attract regional capital."

 CHI_MAC_infrastructure_link: "Infrastructure Link"
 CHI_MAC_infrastructure_link_desc: "Completing road, rail, and utilities connections between Macau and the mainland standardizes infrastructure and simplifies logistical integration. The Hong Kong–Zhuhai–Macau Bridge project becomes the keystone of regional connectivity."

 CHI_MAC_guangdong_integration: "Guangdong Integration"
 CHI_MAC_guangdong_integration_desc: "Macau's administrative and economic institutions are progressively aligned with Guangdong Province. Joint development zones, shared municipal services, and harmonized regulations blur the administrative boundary between Macau and the mainland."

 CHI_TIB_plateau_development: "Plateau Development Program"
 CHI_TIB_plateau_development_desc: "Beijing commits to an ambitious infrastructure and economic development drive across the Tibetan plateau. Roads, power grids, and agricultural modernization projects are presented as the foundation of stability and prosperity."

 CHI_TIB_railway_modernization: "Qinghai-Tibet Railway Expansion"
 CHI_TIB_railway_modernization_desc: "Extending and upgrading the Qinghai-Tibet Railway network improves freight capacity and troop mobility across the plateau. New branch lines connect remote county seats to the main line, accelerating both economic development and strategic integration."

 CHI_TIB_sinification: "Sinification Program"
 CHI_TIB_sinification_desc: "Mandarin-language education, Han migration incentives, and the suppression of Tibetan cultural institutions are intensified. Beijing frames this as modernization; Tibetan communities characterize it as cultural erasure."

 CHI_TIB_autonomy_preservation: "Cultural Autonomy Preservation"
 CHI_TIB_autonomy_preservation_desc: "Beijing agrees to preserve Tibetan language instruction, religious institutions, and traditional governance structures within the Autonomous Region. International pressure and internal stability concerns motivate the concession."

 CHI_TIB_silk_road_gateway: "Silk Road Gateway"
 CHI_TIB_silk_road_gateway_desc: "Tibet's geographic position linking South Asia to Central China is leveraged as part of the Belt and Road Initiative. New trade corridors through Nepal and Bangladesh integrate the plateau into China's continental infrastructure strategy."

 CHI_ETK_corridor_investment: "Xinjiang Corridor Investment"
 CHI_ETK_corridor_investment_desc: "Xinjiang sits at the heart of the China-Pakistan Economic Corridor and Central Asian trade routes. Massive infrastructure investment transforms the region into a logistics hub, though security concerns and population displacement remain unresolved."

 CHI_ETK_resource_extraction: "Resource Extraction Program"
 CHI_ETK_resource_extraction_desc: "Xinjiang holds vast reserves of oil, natural gas, and rare minerals. A coordinated extraction program brings Han-majority state enterprises into the region, deepening economic integration while fueling ethnic tension over resource revenue distribution."

 CHI_ETK_sinification: "Xinjiang Sinification"
 CHI_ETK_sinification_desc: "Mass detention facilities, compulsory Mandarin education, and restrictions on Islamic practice form the backbone of a systematic effort to reshape Uyghur and Kazakh cultural identity. International condemnation intensifies but does not deter the policy."

 CHI_ETK_cultural_accommodation: "Cultural Accommodation Policy"
 CHI_ETK_cultural_accommodation_desc: "Under domestic and international pressure, Beijing moderates its most aggressive policies in Xinjiang. Minority-language education is partially restored and certain religious practices are tolerated, though comprehensive surveillance infrastructure remains in place."

 CHI_ETK_BRI_hub: "BRI Regional Hub"
 CHI_ETK_BRI_hub_desc: "Xinjiang is formally designated the primary Belt and Road gateway to Central and South Asia. Urumqi becomes a logistics and finance center for Chinese operations across the region, transforming the security burden of Xinjiang into a strategic asset."

 CHI_TAI_economic_miracle: "Taiwan Economic Integration"
 CHI_TAI_economic_miracle_desc: "Under the SAR framework, Taiwan's advanced semiconductor, electronics, and financial industries are connected to the mainland economy. Cross-strait supply chains deepen interdependence, making formal separation increasingly costly."

 CHI_TAI_tech_cooperation: "Technology Cooperation"
 CHI_TAI_tech_cooperation_desc: "Joint research programs between Taiwanese and mainland universities and technology firms accelerate development in semiconductors, AI, and telecommunications. Beijing gains access to Taiwan's high-tech expertise; Taiwan gains access to mainland scale."

 CHI_TAI_financial_integration: "Cross-Strait Financial Integration"
 CHI_TAI_financial_integration_desc: "Taiwan's banking sector is progressively opened to mainland capital, and the New Taiwan Dollar is linked to the Renminbi. Financial integration increases mainland leverage over Taiwan's economy while delivering growth dividends to both sides."

 CHI_TAI_governance_alignment: "Governance Alignment"
 CHI_TAI_governance_alignment_desc: "Taiwan's administrative structures are reformed to more closely resemble Beijing's model of governance. Electoral institutions are restructured, and the role of mainland-aligned parties is strengthened."

 CHI_TAI_autonomous_governance: "Taiwan Autonomous Governance Compact"
 CHI_TAI_autonomous_governance_desc: "Beijing and Taipei agree to a formal governance compact that preserves Taiwan's democratic institutions and judicial independence within the SAR framework. Taipei retains control of domestic affairs while Beijing sets foreign and defense policy."

 CHI_MON_steppe_resources: "Steppe Resource Development"
 CHI_MON_steppe_resources_desc: "Mongolia's vast mineral wealth , coal, copper, and rare earths , attracts Chinese investment under a joint development framework. Infrastructure connecting Mongolian mining sites to Chinese railways accelerates extraction and export."

 CHI_MON_northern_corridor: "Northern Strategic Corridor"
 CHI_MON_northern_corridor_desc: "Developing a road and rail corridor through Mongolia creates a direct land link between China and Russia, bypassing maritime chokepoints. The corridor serves both commercial and strategic purposes."

 CHI_MON_sinification: "Sinicization of Mongolia"
 CHI_MON_sinification_desc: "Han migration, Mandarin-language integration, and the erosion of traditional Mongolian institutions reshape the demographic and cultural character of the region. Mongolian identity movements emerge in response but are suppressed."

 CHI_MON_nomadic_culture: "Nomadic Heritage Preservation"
 CHI_MON_nomadic_culture_desc: "Beijing commits to a formal preservation program for Mongolia's nomadic heritage, including protected grazing lands, Mongolian-language education, and cultural festivals. The policy earns goodwill domestically and improves relations with Ulaanbaatar."

 CHI_MON_strategic_partnership: "Northern Strategic Partnership"
 CHI_MON_strategic_partnership_desc: "The completion of the corridor, resource deals, and cultural integration solidifies Mongolia's role as a strategic partner of the People's Republic. Joint military exercises, economic planning, and diplomatic coordination bind Ulaanbaatar to Beijing's orbit."

 CHI_SAR_influence_campaign: "Comprehensive Influence Campaign"
 CHI_SAR_influence_campaign_desc: "Beijing launches a coordinated political, economic, and cultural offensive across all administered territories. Central government liaison offices are expanded, loyalty programs funded, and pro-Beijing civic organizations granted preferential access."

 CHI_SAR_integrate_TIB: "Integrate Tibet"
 CHI_SAR_integrate_TIB_desc: "With Beijing's authority unquestioned and resistance neutralized, Tibet is formally incorporated into the People's Republic as a standard administrative region. The Tibet Autonomous Region designation is dissolved and governance transferred to Sichuan and Qinghai provincial structures."

 CHI_SAR_integrate_ETK: "Integrate Xinjiang"
 CHI_SAR_integrate_ETK_desc: "Having completed the sinification of Xinjiang and neutralized separatist movements, Beijing abolishes the Xinjiang Uyghur Autonomous Region designation. The territory is reorganized under direct provincial administration, completing three decades of Han resettlement policy."

 CHI_SAR_integrate_MON: "Integrate Mongolia"
 CHI_SAR_integrate_MON_desc: "Mongolia's economic dependence on Chinese capital, infrastructure, and markets has reached the point of no return. Beijing formalizes the relationship by dissolving the autonomous framework and absorbing Mongolia's territory into Inner Mongolia Province."

 CHI_TAI_soft_power: "Cross-Strait Soft Power Offensive"
 CHI_TAI_soft_power_desc: "Beijing pursues Taiwan's reintegration through economic incentives, cultural exchange, and diplomatic isolation of Taipei. Cross-strait trade is deepened and Taiwanese business elites cultivated as intermediaries for mainland interests."

 CHI_TAI_hard_power: "Taiwan Military Pressure Campaign"
 CHI_TAI_hard_power_desc: "Beijing opts for strategic deterrence , military exercises in the Taiwan Strait, airspace incursions, and amphibious readiness demonstrations signal that the use of force remains a credible option."

 CHI_TAI_economic_coercion: "Economic Coercion of Taiwan"
 CHI_TAI_economic_coercion_desc: "Beijing weaponizes Taiwan's dependence on mainland markets. Targeted import restrictions, tourism curbs, and financial pressure are applied to pro-independence sectors of the Taiwanese economy."

 CHI_TAI_military_preparation: "Cross-Strait Military Buildup"
 CHI_TAI_military_preparation_desc: "The PLA accelerates amphibious lift capacity, anti-access systems, and air superiority in the strait region. Exercises simulate full-scale landing operations, signaling readiness for a forced reunification scenario."
 CHI_TAI_cross_strait_framework: "Cross-Strait Framework"
 CHI_TAI_cross_strait_framework_desc: "Having established economic leverage over Taiwan, Beijing formally offers a 'One Country, Two Systems' framework. Taipei must choose between cooperation and confrontation."
 CHI_TAI_strait_ultimatum: "Taiwan Strait Ultimatum"
 CHI_TAI_strait_ultimatum_desc: "With PLA forces in position and Beijing's patience exhausted, China issues a final ultimatum demanding Taiwan's acceptance of reunification terms."
 CHI_TAI_political_consolidation: "Political Consolidation"
 CHI_TAI_political_consolidation_desc: "Beijing begins systematically consolidating political control over Taiwan's institutions, placing loyalists in key positions and restricting independent political activity."
 CHI_TAI_administrative_merger: "Administrative Integration"
 CHI_TAI_administrative_merger_desc: "Beijing moves to formally integrate Taiwan's administrative systems with the mainland, harmonizing legal frameworks, economic regulation, and civil governance."

 CHI_SAR_integrate_TAI: "Reunify Taiwan"
 CHI_SAR_integrate_TAI_desc: "The process of reunification , whether achieved through economic exhaustion or military capitulation , is completed. Taiwan's democratic institutions are dissolved and its territory incorporated into Fujian Province, completing the ambition held since 1949."

 CHI_SAR_international_legitimacy: "International Legitimacy Through Two Systems"
 CHI_SAR_international_legitimacy_desc: "Beijing presents the One Country, Two Systems framework as proof that China can govern diverse societies without coercion. Diplomatic investment in this narrative strengthens China's position in multilateral forums and improves relations with liberal democracies."

 CHI_SAR_sar_prosperity_program: "SAR Prosperity Program"
 CHI_SAR_sar_prosperity_program_desc: "Beijing commits targeted investment to raise living standards across all administered autonomous regions. Infrastructure grants, tax relief, and industrial subsidies are paired with political messaging that ties prosperity to stability under central authority."

 CHI_SAR_united_front_diplomacy: "United Front Diplomacy"
 CHI_SAR_united_front_diplomacy_desc: "The United Front Work Department expands its outreach to overseas Chinese communities, sympathetic foreign politicians, and business networks. A coordinated influence operation builds support for Beijing's narrative on the SAR question in key capitals."

 CHI_SAR_model_governance: "Model Governance Showcase"
 CHI_SAR_model_governance_desc: "Beijing promotes its SAR governance model as a success story , stable, prosperous territories administered with pragmatic flexibility within a unified sovereign framework. The model is offered as a template for post-conflict settlements elsewhere."

 CHI_HKG_national_security_law: "National Security Law"
 CHI_HKG_national_security_law_desc: "Beijing enacts sweeping national security legislation that criminalizes secession, subversion, terrorism, and collusion with foreign powers in Hong Kong. The law's broad provisions effectively silence organized political opposition and press freedom."

 CHI_HKG_protest_crackdown: "2019 Protest Suppression"
 CHI_HKG_protest_crackdown_desc: "Mass protests against the extradition bill and Beijing's encroachments are met with escalating police force and legal prosecution of organizers. The protest movement is broken through arrests, exile, and the chilling effect of new security legislation."

 CHI_HKG_electoral_reform: "Pro-Beijing Electoral Overhaul"
 CHI_HKG_electoral_reform_desc: "Hong Kong's electoral system is restructured to ensure only 'patriots' , candidates vetted for loyalty to Beijing , can stand for office. The legislature is transformed from a contested arena into a rubber-stamp body aligned with central government priorities."

 CHI_HKG_brain_drain_crisis: "Retain Hong Kong's Talent"
 CHI_HKG_brain_drain_crisis_desc: "Faced with mass emigration of professionals, academics, and capital following Beijing's security crackdown, Hong Kong's government launches targeted retention programs , housing incentives, salary supplements, and expanded residency rights for skilled returnees."

 CHI_HKG_SAR_defend_autonomy: "Defend Hong Kong's Autonomy"
 CHI_HKG_SAR_defend_autonomy_desc: "Hong Kong's government mobilizes its civil service, bar associations, and independent judiciary to defend the original terms of the Joint Declaration. Legal challenges, international lobbying, and civic engagement form the front line of this rearguard action."

 CHI_HKG_SAR_umbrella_legacy: "Institutionalize the Umbrella Movement"
 CHI_HKG_SAR_umbrella_legacy_desc: "The legacy of the 2014 Umbrella Movement is channeled into formal civic structures , community boards, youth policy councils, and electoral watchdog bodies that maintain democratic norms despite Beijing's pressure."

 CHI_HKG_SAR_capital_retention: "Capital and Talent Retention Drive"
 CHI_HKG_SAR_capital_retention_desc: "Hong Kong launches targeted programs to stem the outflow of financial capital and professional talent. Visa reforms, tax incentives, and investment guarantees aim to reassure global firms that Hong Kong remains a reliable international financial center."

 CHI_HKG_SAR_resist_integration: "Active Resistance to Integration"
 CHI_HKG_SAR_resist_integration_desc: "Hong Kong's political establishment, civil society, and judiciary coordinate a sustained campaign of institutional resistance to Beijing's integration agenda. Legal challenges, international coalitions, and civil disobedience impose a political cost on every step of encroachment."

 CHI_HKG_SAR_pragmatic_cooperation: "Pragmatic Engagement Policy"
 CHI_HKG_SAR_pragmatic_cooperation_desc: "Hong Kong's government opts for managed cooperation with Beijing , accepting certain constraints on political activity in exchange for guaranteed economic autonomy and continued access to mainland markets."

 CHI_MAC_SAR_local_governance: "Assert Local Governance"
 CHI_MAC_SAR_local_governance_desc: "Macau's civil service and Legislative Assembly reassert their constitutional role as the primary governing authority over local affairs, pushing back against the expanding mandate of the Central Liaison Office."

 CHI_MAC_SAR_lusophone_ties: "Lusophone World Connections"
 CHI_MAC_SAR_lusophone_ties_desc: "Macau strengthens its historical ties with Portugal and the Portuguese-speaking world, developing trade missions, cultural programs, and investment channels that give Macau a distinctive international role Beijing cannot easily replicate."

 CHI_MAC_SAR_gaming_regulation: "Autonomous Gaming Regulation"
 CHI_MAC_SAR_gaming_regulation_desc: "Macau asserts full local control over gaming concession licensing, revenue sharing, and regulatory enforcement , resisting mainland pressure to redirect casino revenues toward Beijing's preferred investment priorities."

 CHI_MAC_SAR_resist_absorption: "Resist Administrative Absorption"
 CHI_MAC_SAR_resist_absorption_desc: "Macau's government challenges Beijing's incremental erosion of its administrative autonomy, building alliances with international observers and the Portuguese government to maintain external pressure on the terms of the Joint Declaration."

 CHI_MAC_SAR_economic_pragmatism: "Economic Integration Pragmatism"
 CHI_MAC_SAR_economic_pragmatism_desc: "Macau accepts deeper economic integration with the Greater Bay Area in exchange for firmer guarantees on its legal and administrative autonomy. The deal trades political symbolism for tangible economic dividends."

 CHI_TIB_SAR_preserve_identity: "Preserve Tibetan Identity"
 CHI_TIB_SAR_preserve_identity_desc: "Tibet's government and monasteries coordinate a systematic effort to preserve Tibetan language, religious practice, and cultural traditions in the face of Han migration and state-mandated sinification."

 CHI_TIB_SAR_exile_network: "Diaspora and Exile Network"
 CHI_TIB_SAR_exile_network_desc: "The Tibetan government-in-exile in Dharamsala, supported by diaspora communities across Europe and North America, provides diplomatic, financial, and organizational support to institutions inside Tibet."

 CHI_TIB_SAR_monastic_schools: "Monastic Education System"
 CHI_TIB_SAR_monastic_schools_desc: "Despite state restrictions, monasteries maintain clandestine educational programs in Tibetan language, history, and Buddhist philosophy. The network serves as the primary vehicle for cultural transmission across generations."

 CHI_TIB_SAR_peaceful_resistance: "Nonviolent Resistance"
 CHI_TIB_SAR_peaceful_resistance_desc: "Following the Dalai Lama's Middle Way approach, Tibet pursues genuine autonomy rather than independence through sustained nonviolent resistance, international advocacy, and dialogue. The approach earns international legitimacy but tests local patience."

 CHI_TIB_SAR_armed_struggle: "Armed Resistance"
 CHI_TIB_SAR_armed_struggle_desc: "Inspired by the Khampa resistance of the 1950s and 1960s, a faction within the Tibetan resistance concludes that nonviolence alone cannot dislodge Beijing's control. Underground cells organize, drawing on diaspora networks for training and materiel."

 CHI_ETK_SAR_cultural_survival: "Underground Cultural Networks"
 CHI_ETK_SAR_cultural_survival_desc: "Uyghur, Kazakh, and Kyrgyz communities in Xinjiang maintain clandestine networks for preserving language, religious practice, and cultural memory despite the comprehensive surveillance infrastructure of the state."

 CHI_ETK_SAR_diaspora_support: "International Diaspora Advocacy"
 CHI_ETK_SAR_diaspora_support_desc: "The World Uyghur Congress and Central Asian diaspora communities lobby Western governments, international organizations, and the UN Human Rights Council for action on Xinjiang's mass detention and cultural erasure."

 CHI_ETK_SAR_economic_self_reliance: "Local Economic Self-Reliance"
 CHI_ETK_SAR_economic_self_reliance_desc: "Minority-owned enterprises, informal trade networks, and community cooperative structures are developed as an alternative to the Han-dominated state economy, reducing dependence on government employment and central subsidies."

 CHI_ETK_SAR_nonviolent_resistance: "Civic Advocacy Campaign"
 CHI_ETK_SAR_nonviolent_resistance_desc: "Xinjiang's minority communities channel their resistance through documented testimony, international legal proceedings, and targeted economic advocacy. The strategy builds a record of abuses intended to sustain international pressure over the long term."

 CHI_ETK_SAR_independence_cells: "Independence Underground"
 CHI_ETK_SAR_independence_cells_desc: "A network of East Turkestan independence cells, drawing on veterans of the Afghan and Syrian conflicts, organizes in the mountains and across the border in Central Asia. The movement is small, fractured, and under constant surveillance , but it persists."

 CHI_TAI_SAR_democratic_resilience: "Democratic Resilience"
 CHI_TAI_SAR_democratic_resilience_desc: "Taiwan's democratic institutions , its independent judiciary, free press, and competitive elections , are reinforced as the primary bulwark against Beijing's political warfare. Cross-party consensus on democratic norms provides a stable foundation for resistance."

 CHI_TAI_SAR_semiconductor_leverage: "Semiconductor Strategic Leverage"
 CHI_TAI_SAR_semiconductor_leverage_desc: "Taiwan's dominance in advanced semiconductor fabrication , through TSMC and its supply chain , is recognized as a strategic deterrent. Disrupting Taiwan's chip industry would devastate global supply chains, providing implicit protection against Beijing's military options."

 CHI_TAI_SAR_international_outreach: "Unofficial Diplomatic Network"
 CHI_TAI_SAR_international_outreach_desc: "Taiwan expands its network of de facto embassies, trade offices, and cultural institutes to maintain substantive diplomatic relationships despite formal isolation. Security partnerships, technology agreements, and arms purchases are conducted through these channels."

 CHI_TAI_SAR_accommodate_beijing: "Gradual Accommodation with Beijing"
 CHI_TAI_SAR_accommodate_beijing_desc: "Taiwan's government pursues a pragmatic accommodation strategy , maintaining economic ties, reducing cross-strait friction, and accepting informal constraints on sovereignty claims in exchange for peaceful coexistence within the SAR framework."

 CHI_TAI_SAR_assert_independence: "Assert De Facto Independence"
 CHI_TAI_SAR_assert_independence_desc: "Taiwan's government takes deliberate steps to assert its de facto sovereignty , renaming institutions, strengthening separate international identity, and making clear that formal independence is the terminal objective of its political program."

 CHI_MON_SAR_national_identity: "Mongolian National Identity"
 CHI_MON_SAR_national_identity_desc: "Mongolia's government invests in a national identity program centered on nomadic heritage, the Mongol script, and the legacy of Chinggis Khan , constructing a distinctly Mongolian cultural foundation that resists absorption into Chinese or Russian spheres."

 CHI_MON_SAR_russian_ties: "Russia as Strategic Counterweight"
 CHI_MON_SAR_russian_ties_desc: "Mongolia deepens political, military, and economic ties with Moscow to offset Chinese dominance. Russian energy investment, military cooperation agreements, and diplomatic coordination give Ulaanbaatar leverage in its dealings with Beijing."

 CHI_MON_SAR_mining_sovereignty: "Mineral Sovereignty"
 CHI_MON_SAR_mining_sovereignty_desc: "Mongolia reasserts state control over its vast mineral resources , coal, copper, and rare earths , renegotiating extraction agreements to ensure majority local ownership, transparent revenue sharing, and reduced dependence on Chinese capital."

 CHI_MON_SAR_balanced_dependency: "Managed Dependency Strategy"
 CHI_MON_SAR_balanced_dependency_desc: "Mongolia accepts the structural realities of its geographic position , landlocked between two major powers , and pursues a deliberate strategy of balancing Chinese economic dependence with Russian security ties and Western diplomatic engagement."

 CHI_MON_SAR_break_free: "Break from Chinese Orbit"
 CHI_MON_SAR_break_free_desc: "Mongolia's government makes a decisive strategic pivot , seeking full sovereignty from Chinese economic and political influence through accelerated diversification, alternative trade routes through Russia, and direct engagement with the international community."

 ### DECISION CATEGORIES ###
 CHI_SAR_demands: "SAR Governance Demands"
 CHI_SAR_demands_desc: "China may use its political leverage to impose restrictions or invest in its Special Administrative Regions, adjusting the balance between autonomy and integration."
 HKG_CHI_relations: "Relations with Beijing"
 HKG_CHI_relations_desc: "Hong Kong may petition Beijing for concessions, organize civil society pressure, or accept tighter controls in exchange for economic support."
 MAC_CHI_relations: "Relations with Beijing"
 MAC_CHI_relations_desc: "Macau may request economic or cultural support from Beijing, or pursue expanded resort development through Chinese-backed investment."
 TIB_CHI_relations: "Relations with Beijing"
 TIB_CHI_relations_desc: "Tibet may appeal to Beijing for religious or development concessions, or mobilize popular pressure to assert greater autonomy."
 ETK_CHI_relations: "Relations with Beijing"
 ETK_CHI_relations_desc: "East Turkestan may request economic development aid or cultural rights from Beijing, though demands carry significant political risk."
 CHI_TAI_soft_power_category: "Cross-Strait Soft Power"
 CHI_TAI_soft_power_category_desc: "China may use economic incentives, cultural exchange, and political outreach to deepen ties with Taiwan and increase Beijing's influence on the island."
 CHI_TAI_military_pressure_category: "Cross-Strait Military Pressure"
 CHI_TAI_military_pressure_category_desc: "China may conduct military exercises, ADIZ incursions, and missile tests to intimidate Taiwan, raise war support, and compel political concessions."
 TAI_cross_strait_defense: "Cross-Strait Defense"
 TAI_cross_strait_defense_desc: "Taiwan may strengthen its international partnerships, invest in arms procurement, and mobilize civil defense to deter Chinese pressure."

 ### CHI DEMANDS , HKG ###
 CHI_demand_HKG_press_controls: "Demand Press Controls"
 CHI_demand_HKG_press_controls_desc: "Beijing demands that Hong Kong tighten media regulations and restrict critical press coverage. This will undermine Hong Kong's autonomous governance and increase unrest."
 CHI_demand_HKG_extradition: "Demand Extradition Legislation"
 CHI_demand_HKG_extradition_desc: "Beijing pushes Hong Kong to pass extradition legislation that allows suspects to be transferred to mainland courts. The move is deeply unpopular and risks triggering mass protests."
 CHI_demand_HKG_electoral_vetting: "Demand Electoral Vetting"
 CHI_demand_HKG_electoral_vetting_desc: "Beijing demands that Hong Kong implement candidate vetting for legislative elections to ensure only 'patriots' hold office. This severely curtails political pluralism."
 CHI_demand_HKG_national_security_law: "Impose National Security Law"
 CHI_demand_HKG_national_security_law_desc: "Beijing imposes a sweeping National Security Law on Hong Kong, criminalizing secession, subversion, and foreign interference. The law grants Beijing unprecedented power over the city."
 CHI_invest_HKG_greater_bay_area: "Fund Greater Bay Area Integration"
 CHI_invest_HKG_greater_bay_area_desc: "Beijing funds infrastructure and economic links connecting Hong Kong to the Pearl River Delta megacity cluster, boosting growth and tying the city's economy more closely to the mainland."

 ### CHI DEMANDS , MAC ###
 CHI_demand_MAC_regulatory_alignment: "Demand Regulatory Alignment"
 CHI_demand_MAC_regulatory_alignment_desc: "Beijing demands that Macau align its financial and business regulations more closely with mainland standards, reducing the city's independent regulatory environment."
 CHI_demand_MAC_cultural_sinicization: "Demand Cultural Sinicization"
 CHI_demand_MAC_cultural_sinicization_desc: "Beijing pressures Macau to reduce the prominence of Portuguese cultural heritage and promote Mandarin in schools, public life, and civic institutions."
 CHI_demand_MAC_security_cooperation: "Demand Security Cooperation"
 CHI_demand_MAC_security_cooperation_desc: "Beijing demands closer security and intelligence cooperation with Macau, integrating the city's law enforcement apparatus with mainland agencies."
 CHI_invest_MAC_integrated_resort_zone: "Fund Integrated Resort Expansion"
 CHI_invest_MAC_integrated_resort_zone_desc: "Beijing approves and funds an expansion of Macau's integrated resort and convention industry, diversifying the economy and deepening economic dependence on Chinese tourism."

 ### CHI DEMANDS , TIB ###
 CHI_demand_TIB_religious_restrictions: "Impose Religious Restrictions"
 CHI_demand_TIB_religious_restrictions_desc: "Beijing intensifies restrictions on Tibetan Buddhist practice, regulating monastic activity, reincarnation procedures, and religious education."
 CHI_demand_TIB_settlement_expansion: "Expand Han Settlement"
 CHI_demand_TIB_settlement_expansion_desc: "Beijing accelerates Han Chinese settlement programs in Tibet, altering the demographic and cultural composition of the region."
 CHI_demand_TIB_security_crackdown: "Conduct Security Crackdown"
 CHI_demand_TIB_security_crackdown_desc: "Beijing launches a sweeping security operation in Tibet, targeting dissidents, monasteries, and civil society. The crackdown fuels resentment and international criticism."
 CHI_invest_TIB_infrastructure: "Invest in Tibetan Infrastructure"
 CHI_invest_TIB_infrastructure_desc: "Beijing funds major infrastructure projects in Tibet, including rail, road, and energy connections. While economically beneficial, the investment also deepens integration with the mainland."

 ### CHI DEMANDS , ETK ###
 CHI_demand_ETK_reeducation: "Expand Re-education Programs"
 CHI_demand_ETK_reeducation_desc: "Beijing expands its extra-judicial detention and 're-education' infrastructure in East Turkestan, systematically suppressing Uyghur cultural and religious identity."
 CHI_demand_ETK_surveillance_expansion: "Expand Surveillance Infrastructure"
 CHI_demand_ETK_surveillance_expansion_desc: "Beijing installs biometric checkpoints, facial recognition networks, and social credit monitoring across East Turkestan, creating one of the world's most intensive surveillance systems."
 CHI_demand_ETK_labor_transfer: "Implement Labor Transfer Programs"
 CHI_demand_ETK_labor_transfer_desc: "Beijing mandates large-scale transfer of Uyghur workers to factories elsewhere in China, disrupting communities and accelerating cultural assimilation."
 CHI_invest_ETK_development_zones: "Establish Development Zones"
 CHI_invest_ETK_development_zones_desc: "Beijing invests in industrial development zones in East Turkestan, nominally to raise living standards but primarily benefiting Han settlers and deepening economic dependency."

 ### HKG REQUESTS ###
 HKG_request_economic_support: "Request Economic Support"
 HKG_request_economic_support_desc: "Hong Kong petitions Beijing for targeted economic assistance to sustain growth and relieve fiscal pressure. Beijing's response will shape the city's autonomy and economic outlook."
 HKG_request_autonomy_guarantee: "Request Autonomy Guarantee"
 HKG_request_autonomy_guarantee_desc: "Hong Kong's government formally requests that Beijing reaffirm its commitment to the 'One Country, Two Systems' framework and the Basic Law. The response will define the limits of Hong Kong's political future."
 HKG_request_universal_suffrage: "Request Universal Suffrage"
 HKG_request_universal_suffrage_desc: "Hong Kong formally appeals to Beijing to implement the universal suffrage provisions promised in the Basic Law. This is a politically charged demand that Beijing is unlikely to grant without conditions."
 HKG_organize_protest: "Organize Civil Protest"
 HKG_organize_protest_desc: "Hong Kong's civil society organizes mass demonstrations against Beijing's encroachment on the city's autonomy. Protests energize the democratic movement but risk a harsh response from the mainland."

 ### MAC REQUESTS ###
 MAC_request_economic_diversification: "Request Economic Diversification Support"
 MAC_request_economic_diversification_desc: "Macau requests Beijing's support to diversify its economy beyond gaming, developing convention, tourism, and technology sectors."
 MAC_request_cultural_preservation: "Request Cultural Heritage Protection"
 MAC_request_cultural_preservation_desc: "Macau requests that Beijing formally protect its Lusophone cultural heritage, including Portuguese-language education and historic preservation."
 MAC_request_integrated_resort_expansion: "Request Resort Expansion Approval"
 MAC_request_integrated_resort_expansion_desc: "Macau requests Beijing's approval to expand its integrated resort and convention sector, attracting additional international investment."

 ### TIB REQUESTS ###
 TIB_request_religious_freedom: "Appeal for Religious Freedom"
 TIB_request_religious_freedom_desc: "Tibet's government appeals to Beijing to ease restrictions on Buddhist practice, including monastic regulation and the recognition of reincarnations."
 TIB_request_development_aid: "Request Development Aid"
 TIB_request_development_aid_desc: "Tibet requests increased development funding from Beijing to improve living standards, infrastructure, and economic opportunity for the Tibetan population."
 TIB_organize_protest: "Organize Popular Protest"
 TIB_organize_protest_desc: "Tibetan civil society and monasteries coordinate public demonstrations against Chinese restrictions. The protests boost domestic morale but invite repression."

 ### ETK REQUESTS ###
 ETK_request_economic_development: "Request Economic Investment"
 ETK_request_economic_development_desc: "East Turkestan requests that Beijing direct economic investment toward the region's indigenous population rather than exclusively benefiting Han settler enterprises."
 ETK_request_cultural_rights: "Appeal for Cultural Rights"
 ETK_request_cultural_rights_desc: "East Turkestan formally appeals to Beijing to restore cultural rights for the Uyghur population, including language education and religious practice. Beijing's response carries high stakes."

 ### TAIWAN , CHI SOFT POWER DECISIONS ###
 CHI_fund_TAI_probeijing_parties: "Fund Pro-Beijing Political Parties"
 CHI_fund_TAI_probeijing_parties_desc: "Beijing covertly channels funds to Taiwan's pro-unification parties, financing campaign infrastructure and media outreach to shift domestic political discourse."
 CHI_TAI_investment_incentives: "Offer Cross-Strait Investment Incentives"
 CHI_TAI_investment_incentives_desc: "Beijing offers preferential investment terms and market access to Taiwanese businesses, creating economic dependency and softening public attitudes toward reunification."
 CHI_TAI_tourism_visa_program: "Expand Cross-Strait Tourism Program"
 CHI_TAI_tourism_visa_program_desc: "Beijing expands visa-free tourism between Taiwan and the mainland, promoting people-to-people ties and gently shifting public perceptions."
 CHI_TAI_academic_exchange: "Fund Academic Exchange Programs"
 CHI_TAI_academic_exchange_desc: "Beijing funds scholarship and research exchange programs with Taiwanese universities, building soft power relationships among Taiwan's educated elite."

 ### TAIWAN , CHI MILITARY PRESSURE DECISIONS ###
 CHI_PLAAF_ADIZ_incursion: "PLAAF ADIZ Incursion"
 CHI_PLAAF_ADIZ_incursion_desc: "The People's Liberation Army Air Force conducts deliberate incursions into Taiwan's Air Defense Identification Zone, demonstrating military reach and testing Taiwan's defenses."
 CHI_PLA_strait_exercise: "PLA Taiwan Strait Exercise"
 CHI_PLA_strait_exercise_desc: "The PLA conducts large-scale naval and amphibious exercises in the Taiwan Strait, simulating elements of a potential invasion and sending a stark warning to Taipei."
 CHI_TAI_missile_test: "Conduct Ballistic Missile Test"
 CHI_TAI_missile_test_desc: "China conducts ballistic missile tests over the waters near Taiwan, drawing international condemnation but signaling Beijing's willingness to use force."
 CHI_TAI_economic_embargo_threat: "Threaten Economic Embargo"
 CHI_TAI_economic_embargo_threat_desc: "Beijing issues formal warnings of economic sanctions and supply chain disruptions if Taiwan continues to resist reunification overtures."
 CHI_TAI_ultimatum_decision: "Issue Formal Reunification Ultimatum"
 CHI_TAI_ultimatum_decision_desc: "Beijing issues a formal ultimatum to Taipei, demanding acceptance of the 'One Country, Two Systems' framework. Taiwan must decide whether to submit or face the consequences."

 ### TAIWAN , TAI DEFENSE DECISIONS ###
 TAI_strengthen_usa_ties: "Strengthen U.S.-Taiwan Relations"
 TAI_strengthen_usa_ties_desc: "Taiwan invests in diplomatic and economic ties with Washington, reinforcing the implicit security guarantee and complicating Beijing's reunification calculus."
 TAI_arms_purchase: "Purchase U.S. Arms Package"
 TAI_arms_purchase_desc: "Taiwan purchases a major arms package from the United States, acquiring advanced air defense systems, anti-ship missiles, and other defensive equipment."
 TAI_semiconductor_diplomacy: "Leverage Semiconductor Diplomacy"
 TAI_semiconductor_diplomacy_desc: "Taiwan uses its dominant position in global semiconductor manufacturing as a diplomatic asset, deepening ties with major powers who depend on Taiwanese chips."
 TAI_civil_defense_mobilization: "Civil Defense Mobilization"
 TAI_civil_defense_mobilization_desc: "Taiwan launches a civil defense initiative, training reservists, prepositioning supplies, and raising public awareness of emergency preparedness."

