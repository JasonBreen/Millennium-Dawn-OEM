l_english:
 CHI_SAR_one_china_framework: "One Country Framework"
 CHI_SAR_one_china_framework_desc: "China's sovereignty over the Special Administrative Regions rests on a legal and political framework rooted in the 'One Country' principle. Formalizing this framework sets the foundation for Beijing's engagement with Hong Kong, Macau, and the broader network of autonomous regions under Chinese administration."

 CHI_SAR_liaison_office_reform: "Liaison Office Expansion"
 CHI_SAR_liaison_office_reform_desc: "The Central People's Government Liaison Offices in Hong Kong and Macau serve as Beijing's primary instruments of influence. Expanding their mandate and staffing strengthens Beijing's political foothold in both territories."

 CHI_SAR_national_security_framework: "National Security Framework"
 CHI_SAR_national_security_framework_desc: "Enacting comprehensive national security legislation in the SARs curtails political opposition and tightens Beijing's control over press, assembly, and governance. Existing legal protections are superseded by mainland security norms."

 CHI_SAR_patriotic_education: "Patriotic Education Campaign"
 CHI_SAR_patriotic_education_desc: "Introducing revised curricula across all SARs under Chinese administration cultivates loyalty to the mainland and erodes local identities. The campaign targets schools, media, and civic institutions."

 CHI_SAR_two_systems_commitment: "Commitment to Two Systems"
 CHI_SAR_two_systems_commitment_desc: "Beijing reaffirms the 'One Country, Two Systems' formula, pledging to preserve the distinct legal, economic, and social frameworks of Hong Kong and Macau. This earns goodwill but constrains direct integration."

 CHI_SAR_one_system_declaration: "One System Declaration"
 CHI_SAR_one_system_declaration_desc: "Beijing formally abandons the 'Two Systems' principle, declaring that full integration with mainland norms is the final objective. This inflames international opinion but accelerates Beijing's control over the SARs."

 CHI_SAR_integrate_HKG: "Integrate Hong Kong"
 CHI_SAR_integrate_HKG_desc: "With Beijing's influence firmly entrenched and local resistance neutralized, Hong Kong is formally absorbed into the People's Republic. The territory's remaining autonomy is dissolved and its institutions merged with those of Guangdong Province."

 CHI_SAR_integrate_MAC: "Integrate Macau"
 CHI_SAR_integrate_MAC_desc: "Macau, long the most compliant of the SARs, is brought under full mainland administration. Its special economic status is retained under a new Special Economic Zone designation."

 CHI_SAR_greater_china_dividend: "Greater China Dividend"
 CHI_SAR_greater_china_dividend_desc: "Maintaining a network of autonomous regions under Beijing's umbrella generates substantial economic and diplomatic dividends. Trade routes, investment flows, and political legitimacy all benefit from the architecture of Greater China."

 CHI_SAR_defense_industry_access: "Defense Industry Access"
 CHI_SAR_defense_industry_access_desc: "Under the Two Systems framework, Beijing authorizes select SAR entities to participate in contracts with Chinese defense and industrial organizations, deepening economic integration while providing the SAR with access to cutting-edge production capacity."

 CHI_HKG_greater_bay_area: "Greater Bay Area Initiative"
 CHI_HKG_greater_bay_area_desc: "The Guangdong-Hong Kong-Macao Greater Bay Area project links Hong Kong's financial sector with the Pearl River Delta's industrial base. Joint infrastructure investments and harmonized regulations accelerate regional economic integration."

 CHI_HKG_financial_integration: "Financial Market Integration"
 CHI_HKG_financial_integration_desc: "Deepening the stock connect programs and harmonizing financial regulations between Hong Kong and the mainland increases cross-border capital flows and strengthens Hong Kong's role as China's primary international financial hub."

 CHI_HKG_media_freedom: "Press and Media Freedoms"
 CHI_HKG_media_freedom_desc: "Hong Kong's press freedoms and open internet access are reaffirmed as a distinctive feature of the 'Two Systems' arrangement. This strengthens civil society and international confidence in Hong Kong's autonomy, though it frustrates Beijing's ambitions."

 CHI_HKG_rule_of_law: "Legal Alignment with Beijing"
 CHI_HKG_rule_of_law_desc: "Hong Kong's common law tradition is progressively harmonized with mainland legal norms. Extradition arrangements and security cooperation are tightened, increasing Beijing's reach into Hong Kong's judicial system."

 CHI_HKG_political_alignment: "Political Alignment"
 CHI_HKG_political_alignment_desc: "Following a decade of gradual convergence, Hong Kong's political system is brought into closer alignment with Beijing's governance model. Pro-Beijing candidates dominate the legislature, and formal opposition parties are effectively excluded."

 CHI_MAC_pearl_river_delta: "Pearl River Delta Connectivity"
 CHI_MAC_pearl_river_delta_desc: "Macau's position at the mouth of the Pearl River makes it a natural node for regional connectivity. Joint infrastructure projects — including ferry links, bridge expansions, and logistics hubs — embed Macau more deeply in the Greater Bay Area economy."

 CHI_MAC_gaming_diversification: "Gaming Sector Diversification"
 CHI_MAC_gaming_diversification_desc: "Macau's economy remains dangerously dependent on the casino industry. Joint investment in technology, financial services, and light manufacturing aims to diversify revenue streams and reduce vulnerability to disruptions in tourism."

 CHI_MAC_financial_services: "Financial Services Hub"
 CHI_MAC_financial_services_desc: "Developing Macau as a specialist financial services center for Portuguese-speaking markets gives Beijing a unique channel for investment into Latin America and Africa. Renminbi-denominated instruments are launched to attract regional capital."

 CHI_MAC_infrastructure_link: "Infrastructure Link"
 CHI_MAC_infrastructure_link_desc: "Completing road, rail, and utilities connections between Macau and the mainland standardizes infrastructure and simplifies logistical integration. The Hong Kong–Zhuhai–Macau Bridge project becomes the keystone of regional connectivity."

 CHI_MAC_guangdong_integration: "Guangdong Integration"
 CHI_MAC_guangdong_integration_desc: "Macau's administrative and economic institutions are progressively aligned with Guangdong Province. Joint development zones, shared municipal services, and harmonized regulations blur the administrative boundary between Macau and the mainland."

 CHI_TIB_plateau_development: "Plateau Development Program"
 CHI_TIB_plateau_development_desc: "Beijing commits to an ambitious infrastructure and economic development drive across the Tibetan plateau. Roads, power grids, and agricultural modernization projects are presented as the foundation of stability and prosperity."

 CHI_TIB_railway_modernization: "Qinghai-Tibet Railway Expansion"
 CHI_TIB_railway_modernization_desc: "Extending and upgrading the Qinghai-Tibet Railway network improves freight capacity and troop mobility across the plateau. New branch lines connect remote county seats to the main line, accelerating both economic development and strategic integration."

 CHI_TIB_sinification: "Sinification Program"
 CHI_TIB_sinification_desc: "Mandarin-language education, Han migration incentives, and the suppression of Tibetan cultural institutions are intensified. Beijing frames this as modernization; Tibetan communities characterize it as cultural erasure."

 CHI_TIB_autonomy_preservation: "Cultural Autonomy Preservation"
 CHI_TIB_autonomy_preservation_desc: "Beijing agrees to preserve Tibetan language instruction, religious institutions, and traditional governance structures within the Autonomous Region. International pressure and internal stability concerns motivate the concession."

 CHI_TIB_silk_road_gateway: "Silk Road Gateway"
 CHI_TIB_silk_road_gateway_desc: "Tibet's geographic position linking South Asia to Central China is leveraged as part of the Belt and Road Initiative. New trade corridors through Nepal and Bangladesh integrate the plateau into China's continental infrastructure strategy."

 CHI_ETK_corridor_investment: "Xinjiang Corridor Investment"
 CHI_ETK_corridor_investment_desc: "Xinjiang sits at the heart of the China-Pakistan Economic Corridor and Central Asian trade routes. Massive infrastructure investment transforms the region into a logistics hub, though security concerns and population displacement remain unresolved."

 CHI_ETK_resource_extraction: "Resource Extraction Program"
 CHI_ETK_resource_extraction_desc: "Xinjiang holds vast reserves of oil, natural gas, and rare minerals. A coordinated extraction program brings Han-majority state enterprises into the region, deepening economic integration while fueling ethnic tension over resource revenue distribution."

 CHI_ETK_sinification: "Xinjiang Sinification"
 CHI_ETK_sinification_desc: "Mass detention facilities, compulsory Mandarin education, and restrictions on Islamic practice form the backbone of a systematic effort to reshape Uyghur and Kazakh cultural identity. International condemnation intensifies but does not deter the policy."

 CHI_ETK_cultural_accommodation: "Cultural Accommodation Policy"
 CHI_ETK_cultural_accommodation_desc: "Under domestic and international pressure, Beijing moderates its most aggressive policies in Xinjiang. Minority-language education is partially restored and certain religious practices are tolerated, though comprehensive surveillance infrastructure remains in place."

 CHI_ETK_BRI_hub: "BRI Regional Hub"
 CHI_ETK_BRI_hub_desc: "Xinjiang is formally designated the primary Belt and Road gateway to Central and South Asia. Urumqi becomes a logistics and finance center for Chinese operations across the region, transforming the security burden of Xinjiang into a strategic asset."

 CHI_TAI_economic_miracle: "Taiwan Economic Integration"
 CHI_TAI_economic_miracle_desc: "Under the SAR framework, Taiwan's advanced semiconductor, electronics, and financial industries are connected to the mainland economy. Cross-strait supply chains deepen interdependence, making formal separation increasingly costly."

 CHI_TAI_tech_cooperation: "Technology Cooperation"
 CHI_TAI_tech_cooperation_desc: "Joint research programs between Taiwanese and mainland universities and technology firms accelerate development in semiconductors, AI, and telecommunications. Beijing gains access to Taiwan's high-tech expertise; Taiwan gains access to mainland scale."

 CHI_TAI_financial_integration: "Cross-Strait Financial Integration"
 CHI_TAI_financial_integration_desc: "Taiwan's banking sector is progressively opened to mainland capital, and the New Taiwan Dollar is linked to the Renminbi. Financial integration increases mainland leverage over Taiwan's economy while delivering growth dividends to both sides."

 CHI_TAI_governance_alignment: "Governance Alignment"
 CHI_TAI_governance_alignment_desc: "Taiwan's administrative structures are reformed to more closely resemble Beijing's model of governance. Electoral institutions are restructured, and the role of mainland-aligned parties is strengthened."

 CHI_TAI_autonomous_governance: "Taiwan Autonomous Governance Compact"
 CHI_TAI_autonomous_governance_desc: "Beijing and Taipei agree to a formal governance compact that preserves Taiwan's democratic institutions and judicial independence within the SAR framework. Taipei retains control of domestic affairs while Beijing sets foreign and defense policy."

 CHI_MON_steppe_resources: "Steppe Resource Development"
 CHI_MON_steppe_resources_desc: "Mongolia's vast mineral wealth — coal, copper, and rare earths — attracts Chinese investment under a joint development framework. Infrastructure connecting Mongolian mining sites to Chinese railways accelerates extraction and export."

 CHI_MON_northern_corridor: "Northern Strategic Corridor"
 CHI_MON_northern_corridor_desc: "Developing a road and rail corridor through Mongolia creates a direct land link between China and Russia, bypassing maritime chokepoints. The corridor serves both commercial and strategic purposes."

 CHI_MON_sinification: "Sinicization of Mongolia"
 CHI_MON_sinification_desc: "Han migration, Mandarin-language integration, and the erosion of traditional Mongolian institutions reshape the demographic and cultural character of the region. Mongolian identity movements emerge in response but are suppressed."

 CHI_MON_nomadic_culture: "Nomadic Heritage Preservation"
 CHI_MON_nomadic_culture_desc: "Beijing commits to a formal preservation program for Mongolia's nomadic heritage, including protected grazing lands, Mongolian-language education, and cultural festivals. The policy earns goodwill domestically and improves relations with Ulaanbaatar."

 CHI_MON_strategic_partnership: "Northern Strategic Partnership"
 CHI_MON_strategic_partnership_desc: "The completion of the corridor, resource deals, and cultural integration solidifies Mongolia's role as a strategic partner of the People's Republic. Joint military exercises, economic planning, and diplomatic coordination bind Ulaanbaatar to Beijing's orbit."
