l_english:
 china_sar_tree: "Chinese Special Administrative Regions Focus Tree"
 CHI_SAR_one_china_framework: "One China Framework"
 CHI_SAR_one_china_framework_desc: "Beijing reaffirms the constitutional basis for its authority over all Special Administrative Regions and territories. The framework establishes unified policy direction from the centre while acknowledging the distinct administrative arrangements of each region."

 CHI_SAR_liaison_office_reform: "Liaison Office Reform"
 CHI_SAR_liaison_office_reform_desc: "The State Council reorganises its SAR liaison offices into a more integrated coordinating network. Streamlined communication channels between Beijing and the SARs allow for faster policy implementation and reduce administrative friction."

 CHI_SAR_national_security_framework: "National Security Architecture"
 CHI_SAR_national_security_framework_desc: "A unified national security apparatus is extended to cover all SAR territories. Coordination between People's Liberation Army garrisons, state security bureaux, and local police forces is formalised under central oversight."

 CHI_SAR_two_systems_commitment: "Commitment to Two Systems"
 CHI_SAR_two_systems_commitment_desc: "Beijing formally reaffirms the \"One Country, Two Systems\" principle for all eligible SARs. High-degree autonomy is guaranteed within the constitutional framework, signalling a preference for accommodation over integration."

 CHI_SAR_research_sharing: "SAR Research Cooperation"
 CHI_SAR_research_sharing_desc: "Beijing establishes joint research programmes connecting mainland universities and state laboratories with SAR institutions. The initiative deepens academic and technological ties while expanding China's overall research capacity."

 CHI_SAR_military_corporation_sharing: "Defence Industry Integration"
 CHI_SAR_military_corporation_sharing_desc: "SAR-based defence contractors and engineering firms are incorporated into the mainland procurement network. Shared production standards and supply chains increase output capacity for the People's Liberation Army."

 CHI_SAR_one_system_declaration: "One System Declaration"
 CHI_SAR_one_system_declaration_desc: "The State Council signals a policy shift toward deeper integration of SAR governance with mainland systems. Separate legal and administrative frameworks will be gradually harmonised with the People's Republic over the coming years."

 ### HONG KONG ###

 CHI_HKG_greater_bay_area: "Greater Bay Area Initiative"
 CHI_HKG_greater_bay_area_desc: "Beijing and Hong Kong jointly launch the Guangdong-Hong Kong-Macao Greater Bay Area project, linking eleven cities into a single innovation and finance corridor. The scheme represents China's most ambitious regional integration programme since the Shenzhen Special Economic Zone."

 CHI_HKG_financial_integration: "Financial System Integration"
 CHI_HKG_financial_integration_desc: "Cross-border capital flow mechanisms are expanded under the Stock Connect and Bond Connect schemes. Hong Kong's role as the primary offshore renminbi hub is formalised, deepening interdependence with mainland financial markets."

 CHI_HKG_express_rail_link: "Express Rail Link"
 CHI_HKG_express_rail_link_desc: "The Guangzhou-Shenzhen-Hong Kong Express Rail Link is completed, connecting Hong Kong directly to China's high-speed rail network. Journey times between Hong Kong and major mainland cities are cut dramatically, accelerating the movement of people and commerce."

 CHI_HKG_individual_visit_scheme: "Individual Visit Scheme"
 CHI_HKG_individual_visit_scheme_desc: "Beijing expands the Individual Visit Scheme, allowing mainland residents from additional cities to travel to Hong Kong without group tour restrictions. The influx of mainland tourists and shoppers provides a substantial boost to Hong Kong's retail and service sectors."

 CHI_HKG_shenzhen_hk_stock_connect: "Shenzhen-Hong Kong Stock Connect"
 CHI_HKG_shenzhen_hk_stock_connect_desc: "A mutual market access programme links the Hong Kong and Shenzhen stock exchanges, allowing investors on both sides to trade in each other's listed equities. The scheme further cements Hong Kong's indispensable role as the gateway for cross-border capital flows."

 CHI_HKG_electoral_reform: "Electoral System Reform"
 CHI_HKG_electoral_reform_desc: "Beijing overhauls Hong Kong's Legislative Council election framework, reducing the directly elected seats and introducing a candidate vetting mechanism to ensure only \"patriots\" stand for office. The reform definitively shifts political power away from the pro-democracy opposition."

 CHI_HKG_media_freedom: "Press Freedom Safeguards"
 CHI_HKG_media_freedom_desc: "In a concession to civil society pressure, Beijing agrees to statutory protections for editorial independence in Hong Kong. International media organisations interpret the guarantee as a signal that the \"two systems\" model will be honoured through 2047."

 CHI_HKG_censorship: "Internet and Media Censorship"
 CHI_HKG_censorship_desc: "Beijing directs Hong Kong authorities to align the city's internet and broadcast regulations with mainland standards. Websites hosting content deemed politically sensitive are blocked, and editors at major newspapers face pressure to self-censor."

 CHI_HKG_moral_national_education: "Moral and National Education"
 CHI_HKG_moral_national_education_desc: "A new compulsory national education curriculum is introduced in Hong Kong schools, emphasising loyalty to the Communist Party and a mainland-centric view of Chinese history. The policy generates significant public opposition but proceeds under central direction."

 CHI_HKG_national_security_law: "Article 23 National Security Law"
 CHI_HKG_national_security_law_desc: "Hong Kong enacts national security legislation as required by Article 23 of the Basic Law, criminalising secession, subversion, terrorism, and collusion with foreign powers. The law marks the effective end of the city's separate political culture."

 CHI_HKG_lok_ma_chau_loop: "Lok Ma Chau Loop Development"
 CHI_HKG_lok_ma_chau_loop_desc: "A dedicated innovation and technology zone is established on the Lok Ma Chau Loop, a parcel of land on the Shenzhen border earmarked for joint development. The park is intended to attract research institutions and technology firms seeking proximity to both Hong Kong and the mainland."

 CHI_HKG_2030_study: "Hong Kong 2030+ Strategic Study"
 CHI_HKG_2030_study_desc: "The Hong Kong government publishes its long-term spatial planning strategy, identifying sites for new development areas, transport corridors, and industrial land. The study frames Hong Kong's physical growth within the context of Greater Bay Area integration."

 CHI_HKG_palace_museum: "Hong Kong Palace Museum"
 CHI_HKG_palace_museum_desc: "A branch of Beijing's Palace Museum is established in Hong Kong's West Kowloon Cultural District, displaying artefacts on loan from the Forbidden City collection. The project is presented as a cultural bridge between Hong Kong and the mainland, drawing significant international attention."

 CHI_HKG_zhuhai_macau_bridge: "Hong Kong-Zhuhai-Macao Bridge"
 CHI_HKG_zhuhai_macau_bridge_desc: "The world's longest sea-crossing bridge-tunnel system is completed, linking Hong Kong, Zhuhai, and Macao across the Pearl River Estuary. The structure dramatically reduces overland travel times between the three cities and serves as the physical spine of Greater Bay Area integration."

 CHI_HKG_lok_ma_chau_station: "Lok Ma Chau Station Expansion"
 CHI_HKG_lok_ma_chau_station_desc: "The Lok Ma Chau border crossing is upgraded with expanded passenger and freight facilities, reducing congestion at one of Hong Kong's busiest land entry points. Improved logistics throughput accelerates cross-boundary commerce and commuter flows."

 CHI_SAR_integrate_HKG: "Hong Kong Integration"
 CHI_SAR_integrate_HKG_desc: "With Hong Kong's political and economic systems fully aligned with the mainland, Beijing formally dissolves the SAR's separate administrative status. The former colony is incorporated as a directly administered municipality of the People's Republic."

 ### MACAO ###

 CHI_MAC_pearl_river_delta: "Pearl River Delta Integration"
 CHI_MAC_pearl_river_delta_desc: "Macao is formally incorporated into the Pearl River Delta economic zone, with infrastructure investment targeted at reducing its economic isolation. The Hong Kong-Zhuhai-Macao Bridge becomes the backbone of a new cross-boundary transport network."

 CHI_MAC_lotus_flower_economy: "Lotus Flower Economy"
 CHI_MAC_lotus_flower_economy_desc: "Macao launches an economic rebranding initiative anchored in the territory's distinctive identity as a Portuguese-Chinese SAR. Rather than targeting a single sector, the strategy repositions Macao as a \"world centre of tourism and leisure\" — a brand that frames all downstream diversification efforts and aligns with Beijing's vision for the Greater Bay Area."

 CHI_MAC_financial_services: "Offshore Financial Services Hub"
 CHI_MAC_financial_services_desc: "Macao's regulatory framework is updated to attract offshore banking, bond issuance, and renminbi settlement business. The territory's Portuguese legal heritage is marketed as an advantage for Lusophone investors seeking mainland exposure."

 CHI_MAC_infrastructure_link: "Cross-Border Infrastructure Link"
 CHI_MAC_infrastructure_link_desc: "A new border crossing and light rail extension connects Macao's Cotai development zone directly to the Guangdong-Macao In-Depth Cooperation Zone on Hengqin Island. The project physically integrates Macao's economic footprint with the mainland."

 CHI_MAC_guangdong_integration: "Guangdong Integration Accord"
 CHI_MAC_guangdong_integration_desc: "A comprehensive cooperation agreement with Guangdong Province aligns Macao's planning, legal, and financial regulations with mainland standards. Officials describe the accord as a model for the peaceful convergence of SAR and mainland governance."

 CHI_SAR_integrate_MAC: "Macao Full Integration"
 CHI_SAR_integrate_MAC_desc: "Following decades of deepening economic and legal harmonisation, Macao's SAR status is dissolved. The territory is absorbed into the Guangdong provincial administrative system, completing the final stage of the 1999 handover."

 CHI_MAC_gaming_diversification: "Gaming Revenue Diversification"
 CHI_MAC_gaming_diversification_desc: "Macao's government moves to reduce its overwhelming dependence on casino gaming by licensing integrated resorts, convention facilities, and cultural tourism attractions. The diversification strategy is modelled on Singapore's economic transition and backed by preferential concession terms."

 CHI_MAC_cultural_autonomy_push: "Portuguese Heritage Movement"
 CHI_MAC_cultural_autonomy_push_desc: "Civil organisations campaign to preserve Macao's distinct Portuguese-Chinese cultural identity against accelerating mainland integration. Demands include statutory protection for the Portuguese language, the Macanese community, and the territory's unique legal pluralism."

 MAC_lusophone_connections: "Lusophone Gateway Strategy"
 MAC_lusophone_connections_desc: "Macao positions itself as an indispensable bridge between China and the Lusophone world by expanding its Forum for Economic and Trade Cooperation. International recognition of this unique role provides a political argument for maintaining high-degree autonomy."

 ### TIBET ###

 CHI_TIB_plateau_development: "Plateau Development Fund"
 CHI_TIB_plateau_development_desc: "The State Council launches a large-scale investment programme for the Tibet Autonomous Region, targeting infrastructure, housing, and public services. The programme mirrors the Western Development Strategy but is framed domestically as a poverty alleviation initiative."

 CHI_TIB_railway_modernization: "Qinghai-Tibet Railway Extension"
 CHI_TIB_railway_modernization_desc: "A second phase of the Qinghai-Tibet Railway is approved, extending the line to Shigatse and eventually Nyingchi near the Indian border. The project reduces Tibet's logistical isolation and accelerates the movement of Han settlers and security forces."

 CHI_TIB_release_falun_gong: "Falun Gong Amnesty"
 CHI_TIB_release_falun_gong_desc: "In a calculated gesture of openness, Beijing releases imprisoned Falun Gong practitioners and eases restrictions on the movement's religious activities in the Tibet Autonomous Region. The concession draws cautious praise from Western governments and signals a softer approach to religious dissent."

 CHI_TIB_return_dalai_lama: "Return of the Dalai Lama"
 CHI_TIB_return_dalai_lama_desc: "After extended back-channel negotiations, Beijing and the Dalai Lama's representatives reach an agreement permitting the Tibetan spiritual leader to return to Lhasa in a ceremonial capacity. The accord stops short of political autonomy but generates significant goodwill in international capitals."

 CHI_TIB_sinification: "Patriotic Education Campaign"
 CHI_TIB_sinification_desc: "The party launches a systematic programme of ideological re-education in Tibetan monasteries and schools, requiring denunciations of the Dalai Lama and pledges of loyalty to the motherland. The campaign is modelled on the 1990s \"Strike Hard\" initiative and managed by specially deployed work teams."

 CHI_TIB_autonomy_preservation: "Genuine Autonomy Framework"
 CHI_TIB_autonomy_preservation_desc: "In response to international pressure and recurring unrest, Beijing opens negotiations with Dalai Lama representatives on expanding cultural and religious autonomy. The Strasbourg Proposal and the Middle Way Approach serve as the basis for back-channel discussions."

 CHI_TIB_cultural_integration: "Sinicisation of Governance"
 CHI_TIB_cultural_integration_desc: "Han officials are appointed to senior positions across Tibet's administrative, judicial, and security apparatus. Mandarin replaces Tibetan as the language of government, and the curriculum in all state schools is standardised with mainland content."

 CHI_SAR_integrate_TIB: "Tibet Full Integration"
 CHI_SAR_integrate_TIB_desc: "With religious authority neutralised, administrative structures fully aligned, and demographic transformation complete, the Tibet Autonomous Region's residual SAR status is dissolved. Tibet is reincorporated as an ordinary province under direct central government administration."

 CHI_TIB_buddhist_cultural_zone: "Buddhist Cultural Preservation Zone"
 CHI_TIB_buddhist_cultural_zone_desc: "A designated preservation zone is established around the Potala Palace and Jokhang Temple, granting limited formal recognition to Tibetan Buddhism as a cultural heritage institution. Critics describe the concession as a tourist-oriented compromise that avoids substantive religious freedom."

 CHI_TIB_silk_road_gateway: "Himalayan Silk Road Gateway"
 CHI_TIB_silk_road_gateway_desc: "Tibet's geographic position at the junction of Belt and Road South Asian corridors is leveraged for investment in border infrastructure, hydropower, and trade logistics. The initiative integrates Tibet's economy with Nepal and South Asian markets while deepening mainland dependency."

 CHI_TIB_monastery_economy: "Monastery Economy"
 CHI_TIB_monastery_economy_desc: "Tibetan monastic institutions, historically the backbone of the regional economy, are permitted to operate commercial enterprises within the SAR framework. Pilgrimage tourism, traditional medicine production, and artisan industries generate revenue supporting both monasteries and local communities."

 CHI_TIB_plateau_resources: "Plateau Mineral Survey"
 CHI_TIB_plateau_resources_desc: "The Tibet Autonomous Region launches an independent survey identifying significant lithium, copper, and chromite deposits on the Tibetan Plateau. SAR authorities negotiate revenue-sharing arrangements retaining a portion of extraction income within the regional budget."

 ### XINJIANG ###

 CHI_ETK_corridor_investment: "Belt and Road Corridor Investment"
 CHI_ETK_corridor_investment_desc: "Xinjiang is designated the primary overland gateway of the Belt and Road Initiative, attracting massive state investment in rail, pipeline, and highway infrastructure. The China-Pakistan Economic Corridor's northern terminus at Kashgar transforms the region's economic geography."

 CHI_ETK_resource_extraction: "Energy and Mineral Extraction"
 CHI_ETK_resource_extraction_desc: "The Tarim Basin's oil and gas reserves are expanded under a state development programme prioritising pipeline construction and refining capacity. Xinjiang's share of national oil production increases significantly, though revenue transfers to the centre remain a persistent grievance."

 CHI_ETK_silk_road_commerce: "Silk Road Commerce Initiative"
 CHI_ETK_silk_road_commerce_desc: "Xinjiang's traditional Uyghur merchant networks are formally incorporated into regional trade policy, with preferential licensing for cross-border commerce with Central Asian republics. The policy revives a historical pattern of Uyghur-mediated trade dating to the Tang Dynasty."

 CHI_ETK_oilfield_development: "Tarim Basin Oilfield Development"
 CHI_ETK_oilfield_development_desc: "The Xinjiang SAR government negotiates joint venture agreements with national energy companies for Tarim Basin exploration, securing an unprecedented share of extraction royalties for regional infrastructure. The oilfields are among the largest in China and underpin the region's fiscal independence."

 CHI_ETK_strike_hard_campaign: "Strike Hard Campaign"
 CHI_ETK_strike_hard_campaign_desc: "The \"Strike Hard, Maximum Pressure\" campaign targeting Uyghur separatist networks is relaunched at unprecedented scale, incorporating digital surveillance, mass detention, and the systematic suppression of religious practice. International human rights organisations document widespread abuses."

 CHI_ETK_education_centres: "Vocational Skills Education Centres"
 CHI_ETK_education_centres_desc: "A network of extrajudicial detention facilities, described officially as \"Vocational Skills Education and Training Centres,\" is established across Xinjiang. A comprehensive digital surveillance grid covering facial recognition, DNA databases, and smartphone monitoring is deployed throughout the region."

 CHI_ETK_total_survaillance_infrastructure: "Total Surveillance Infrastructure"
 CHI_ETK_total_survaillance_infrastructure_desc: "A region-wide surveillance grid is constructed across Xinjiang, integrating facial recognition cameras, biometric checkpoints, and mandatory smartphone monitoring software. The system grants authorities near-total visibility over population movements and online activity."

 CHI_SAR_integrate_ETK: "Xinjiang Full Integration"
 CHI_SAR_integrate_ETK_desc: "Following the near-total suppression of separatist activity and the displacement of traditional Uyghur social structures, Xinjiang's SAR administrative framework is dissolved. The region is reorganised under standard provincial administration with no special ethnic autonomy provisions."

 CHI_ETK_autonomy_statute: "Xinjiang Autonomy Statute"
 CHI_ETK_autonomy_statute_desc: "A new regional autonomy statute grants Xinjiang's Muslim communities formal rights to religious practice, Uyghur-medium education, and customary law in personal matters. The statute is endorsed by a select group of international Islamic organisations."
 CHI_ETK_islamic_governance_framework: "Islamic Governance Framework"
 CHI_ETK_islamic_governance_framework_desc: "Beijing adopts a more conciliatory approach in Xinjiang, permitting regulated Islamic religious practice, expanding Uyghur-language education, and appointing more Uyghur officials to local government. The policy mirrors the relative leniency of the pre-2017 period."
 CHI_ETK_BRI_hub: "Kashgar Special Economic Zone"
 CHI_ETK_BRI_hub_desc: "Kashgar is designated a Special Economic Zone with preferential tax treatment and streamlined customs procedures for Belt and Road transit trade. The zone positions Xinjiang as a commercial hub linking Central Asia, South Asia, and the Middle East."


 ### TAIWAN ###

 CHI_TAI_combat_the_traitors: "Combat the Traitors"
 CHI_TAI_combat_the_traitors_desc: "Beijing adopts an uncompromising stance toward Taiwan, officially designating pro-independence leaders as traitors and signalling that reunification by force remains an active option. The declaration sharply increases cross-strait tensions and places the PLA on heightened readiness."

 CHI_TAI_recognition_blockades: "Diplomatic Recognition Blockade"
 CHI_TAI_recognition_blockades_desc: "China intensifies pressure on Taiwan's remaining diplomatic allies, offering aid packages and infrastructure investment to induce governments to switch recognition to Beijing. Each defection reduces Taiwan's international standing and narrows its space to resist reunification demands."

 CHI_TAI_cut_us_support: "Severing US-Taiwan Ties"
 CHI_TAI_cut_us_support_desc: "Beijing conducts a sustained influence campaign targeting American political and business circles, lobbying against arms sales and formal contacts with Taipei. The operation is designed to erode the credibility of the US commitment to Taiwan's security."

 CHI_TAI_outward_island_infrastructure: "Outer Island Military Infrastructure"
 CHI_TAI_outward_island_infrastructure_desc: "Following the seizure of Taiwan, the People's Liberation Army begins constructing fortified naval and air facilities on the outer islands. The new bases extend China's power projection reach deep into the western Pacific and substantially alter the regional balance of force."

 CHI_TAI_cross_strait_policy: "Cross-Strait Policy Review"
 CHI_TAI_cross_strait_policy_desc: "The State Council commissions a comprehensive review of cross-strait policy, examining diplomatic, economic, and military options for reunification. The review sets the political agenda for China's approach to Taiwan for the coming decade."

 CHI_TAI_economic_track: "Cross-Strait Economic Track"
 CHI_TAI_economic_track_desc: "Beijing opens a structured economic dialogue with Taipei focused on trade facilitation, industrial cooperation, and long-term market access. The goal is to build enough mutual benefit that political talks become harder to resist."

 CHI_TAI_political_track: "Cross-Strait Political Track"
 CHI_TAI_political_track_desc: "Parallel to economic engagement, Beijing establishes a dedicated political track aimed at reviving dialogue mechanisms, lowering tensions, and preparing the ground for a negotiated settlement acceptable to both sides."

 CHI_TAI_expand_cross_strait_trade: "Expand Cross-Strait Trade"
 CHI_TAI_expand_cross_strait_trade_desc: "Building on the logic of ECFA and later service-trade talks, Beijing offers new commercial concessions and reduced barriers for Taiwanese firms operating on the mainland. The policy is designed to make economic cooperation visibly profitable to Taiwan's political and business elites."

 CHI_TAI_mainland_market_access: "Mainland Market Access"
 CHI_TAI_mainland_market_access_desc: "China grants Taiwanese investors and exporters preferential access to selected mainland sectors, especially advanced manufacturing and services. The arrangement mirrors real-world efforts to bind Taiwan more closely to the mainland economy through opportunity rather than force."

 CHI_TAI_business_delegations: "Cross-Strait Business Delegations"
 CHI_TAI_business_delegations_desc: "Semi-official trade groups, chambers of commerce, and major industrial actors resume regular cross-strait visits. These delegations create a politically safer way to deepen practical cooperation while building constituencies in Taiwan that benefit from stable relations."

 CHI_TAI_transport_links: "Direct Transport Links"
 CHI_TAI_transport_links_desc: "Direct flights, shipping arrangements, and logistics coordination are expanded to reduce the practical separation between the two sides. Faster commercial and passenger movement lowers the political cost of ongoing engagement and further normalises cross-strait exchange."

 CHI_TAI_semiconductor_coordination: "Semiconductor Coordination"
 CHI_TAI_semiconductor_coordination_desc: "Taipei agrees to limited strategic coordination in high-tech supply chains, especially semiconductors and precision manufacturing. The arrangement reflects the real economic interdependence between Taiwan's chip sector and mainland demand, while stopping short of outright political union."

 CHI_TAI_investment_safeguards: "Investment Safeguards"
 CHI_TAI_investment_safeguards_desc: "Taiwanese negotiators insist that deeper economic integration must be paired with legal and regulatory guarantees protecting local firms and institutions. This approach draws on real domestic concerns that cross-strait investment must not become a vehicle for political absorption."

 CHI_TAI_joint_industrial_planning: "Joint Industrial Planning"
 CHI_TAI_joint_industrial_planning_desc: "Planners on both sides begin coordinating infrastructure, industrial supply chains, and technology-intensive sectors. The process transforms scattered business links into something closer to a managed cross-strait development strategy."

 CHI_TAI_deep_economic_integration: "Deep Economic Integration"
 CHI_TAI_deep_economic_integration_desc: "After years of accumulated agreements, cross-strait commerce is formalised into a dense framework of investment, logistics, and industrial interdependence. By this stage, economic separation has become increasingly expensive for both sides, especially for Taiwan."

 CHI_TAI_resume_party_contacts: "Resume Party Contacts"
 CHI_TAI_resume_party_contacts_desc: "Beijing reactivates channels with parties and organisations in Taiwan willing to discuss a less confrontational cross-strait relationship. The approach is rooted in the real pattern of CCP-KMT dialogue and other unofficial political contacts that have periodically substituted for state-to-state diplomacy."
 CHI_TAI_pro_china_party_networks_mission: "Pro-China Party Networks"
 CHI_TAI_pro_china_party_networks_mission_desc: "China's cross-strait business and political networks actively cultivate support for pro-unification parties in Taiwan. As long as our influence remains substantial, these efforts gradually shift public opinion toward the Pan-Blue coalition."

 CHI_TAI_offer_confidence_measures: "Offer Confidence Measures"
 CHI_TAI_offer_confidence_measures_desc: "Beijing proposes a package of practical de-escalation steps, including regular communication channels and restraint in public signalling. The intention is to convince Taiwanese moderates that engagement can reduce risk without immediately forcing a sovereignty decision."

 CHI_TAI_legislative_exchange_forum: "Legislative Exchange Forum"
 CHI_TAI_legislative_exchange_forum_desc: "Delegations of legislators, advisers, and policy specialists begin meeting through semi-official channels to discuss trade, transport, and administrative coordination. Such forums give cross-strait engagement a parliamentary and procedural face, softening the image of top-down pressure."

 CHI_TAI_local_government_dialogue: "Local Government Dialogue"
 CHI_TAI_local_government_dialogue_desc: "City administrations, county governments, and subnational officials open practical talks on transport, tourism, and investment. This reflects a real-world pattern in which municipal and local links often moved forward even when formal central-level relations were tense."

 CHI_TAI_reaffirm_the_1992_consensus: "Reaffirm the 1992 Consensus"
 CHI_TAI_reaffirm_the_1992_consensus_desc: "Taiwanese moderates choose to explicitly return to the framework that there is one China, while preserving their own interpretation of that principle. The formula is controversial at home, but it remains the most realistic basis for serious cross-strait negotiations."

 CHI_TAI_suspend_independence_initiatives: "Suspend Independence Initiatives"
 CHI_TAI_suspend_independence_initiatives_desc: "Taipei quietly halts measures that would push the island toward formal separation in law or diplomacy. This does not end self-government, but it signals that Taiwan is prepared to stabilise the situation rather than escalate it."

 CHI_TAI_back_channel_settlement: "Back-Channel Settlement"
 CHI_TAI_back_channel_settlement_desc: "Semi-official organisations on both sides move from confidence-building to substantive political bargaining. Drawing on the model of ARATS-SEF style contacts, they draft a settlement framework designed to make peaceful reunification appear orderly, gradual, and materially beneficial."

 CHI_TAI_peaceful_reunification_accord: "Peaceful Reunification Accord"
 CHI_TAI_peaceful_reunification_accord_desc: "After years of incremental diplomatic progress, Beijing and Taipei sign a historic framework agreement providing for Taiwan's accession to the People's Republic as a Special Administrative Region. The agreement guarantees Taiwan's existing democratic institutions and legal system for a fifty-year transitional period."

 CHI_TAI_military_buildup: "Cross-Strait Military Buildup"
 CHI_TAI_military_buildup_desc: "The People's Liberation Army accelerates procurement of amphibious assault ships, landing craft, and long-range precision missiles configured for a Taiwan Strait contingency. Joint exercises simulate the seizure of offshore islands and the suppression of Taiwanese air defences."

 CHI_TAI_amphibious_doctrine: "Joint Island Landing Doctrine"
 CHI_TAI_amphibious_doctrine_desc: "The PLA Marine Corps and Eastern Theatre Command publish a revised joint operational doctrine for combined arms amphibious assaults. The doctrine is classified but widely analysed by foreign intelligence agencies as a direct blueprint for a Taiwan contingency."

 CHI_TAI_blockade_declaration: "Taiwan Strait Blockade"
 CHI_TAI_blockade_declaration_desc: "The PLA Navy declares a naval exclusion zone around Taiwan, severing commercial shipping lanes and cutting off fuel and raw material imports. The blockade is accompanied by extended air exercises and ballistic missile tests, triggering an international crisis."

 CHI_TAI_operation_storm: "Operation Storm"
 CHI_TAI_operation_storm_desc: "The People's Liberation Army launches its long-planned amphibious campaign against Taiwan. Missile strikes neutralise air defences and command infrastructure while landing forces cross the strait under air and naval cover. The operation marks the most significant military action in Asia since the Korean War."

 CHI_TAI_economic_miracle: "Taiwan Economic Miracle Integration"
 CHI_TAI_economic_miracle_desc: "Taiwan's advanced semiconductor industry, financial sector, and technology ecosystem are formally integrated into the national economic planning framework. The acquisition represents a transformative gain in China's technological capability, particularly in chip fabrication."

 ### INNER MONGOLIA ###

 CHI_OMG_steppe_development: "Nei Mongol Development Initiative"
 CHI_OMG_steppe_development_desc: "The State Council launches a targeted development programme for the Inner Mongolia Autonomous Region, investing in energy infrastructure, logistics corridors, and industrial parks. The initiative integrates Inner Mongolia more deeply into the national economic network while addressing persistent rural poverty."

 CHI_OMG_northern_corridor: "Northern Corridor Infrastructure"
 CHI_OMG_northern_corridor_desc: "A new expressway and rail freight corridor linking Inner Mongolia to the Beijing-Tianjin-Hebei agglomeration is approved, reducing transit times for coal, rare earth minerals, and agricultural products. The corridor underpins Inner Mongolia's role as the energy hinterland of northern China."

 CHI_OMG_mandarin_education: "Mandarin-Medium Education Policy"
 CHI_OMG_mandarin_education_desc: "The regional government announces a phased transition requiring all primary and secondary schools to teach core subjects in Mandarin rather than Mongolian. The policy, modelled on similar measures in Tibet and Xinjiang, triggers widespread protests across Inner Mongolia's cities and pastoral communities."

 CHI_OMG_cultural_recognition: "Mongolian Cultural Recognition"
 CHI_OMG_cultural_recognition_desc: "Beijing formally recognises the Mongolian cultural and linguistic identity of the Inner Mongolia SAR, guaranteeing Mongolian-medium education, state broadcasting, and official script status. The policy represents a deliberate departure from the assimilationist approach applied in Tibet and Xinjiang."

 CHI_OMG_han_settlement_program: "Han Settlement Programme"
 CHI_OMG_han_settlement_program_desc: "State-sponsored migration from Hebei, Shaanxi, and Gansu accelerates the demographic transformation of Inner Mongolia. New townships are established on former pastoral land, and preferential employment policies further entrench Han majority status in urban areas."

 CHI_SAR_integrate_OMG: "Inner Mongolia Full Integration"
 CHI_SAR_integrate_OMG_desc: "Following demographic and cultural transformation, Inner Mongolia's SAR status is dissolved and the region is restructured as a standard provincial-level administrative division. Formal recognition of Mongolian autonomy is replaced with general ethnic minority protection provisions applicable across the PRC."

 CHI_OMG_greater_mongolia_vision: "Pan-Mongolian Vision"
 CHI_OMG_greater_mongolia_vision_desc: "Advocates within Inner Mongolia's cultural movement articulate a vision of closer ties with the independent Mongolian state, invoking shared history, language, and nomadic heritage. Beijing tolerates the cultural framing while maintaining strict limits on any political implications."

 OMG_steppe_livestock_industry: "Steppe Livestock Modernisation"
 OMG_steppe_livestock_industry_desc: "Inner Mongolia's traditional cashmere, mutton, and dairy industries are restructured under a cooperative model linking herder families to national supply chains. The programme improves household incomes while preserving elements of the pastoral lifestyle."

 CHI_OMG_steppe_mining_industry: "Steppe Mining Industry"
 CHI_OMG_steppe_mining_industry_desc: "Inner Mongolia's chromium and mineral deposits are brought under a coordinated extraction programme. State-backed enterprises establish processing facilities and export corridors, converting subsoil wealth into industrial capacity for the wider Chinese economy."

 OMG_mongolian_mining_expansion: "Rare Earth and Coal Expansion"
 OMG_mongolian_mining_expansion_desc: "Inner Mongolia contains some of the world's largest deposits of rare earth elements and a third of China's coal reserves. SAR authorities expand extraction operations and negotiate royalty agreements directing a greater share of mineral revenues toward regional infrastructure and education."

 CHI_OMG_mongolian_mining_expansion: "Rare Earth and Coal Expansion"
 CHI_OMG_mongolian_mining_expansion_desc: "Inner Mongolia contains some of the world's largest deposits of rare earth elements and a third of China's coal reserves. SAR authorities expand extraction operations and negotiate royalty agreements directing a greater share of mineral revenues toward regional infrastructure and education."

 CHI_MON_diplomatic_outreach: "Mongolian Diplomatic Outreach"
 CHI_MON_diplomatic_outreach_desc: "Beijing launches a diplomatic initiative toward Ulaanbaatar, combining economic incentives with cultural appeals to shared Mongolian heritage. High-level visits, preferential trade terms, and an expanded Chinese cultural presence set the stage for deeper engagement."

 CHI_MON_economic_partnership: "Steppe Economic Partnership"
 CHI_MON_economic_partnership_desc: "A comprehensive economic partnership agreement grants Mongolia preferential access to Chinese markets, investment, and infrastructure financing. Mongolia's mineral exports — copper, coal, and rare earths — find a primary customer in China, creating significant economic interdependence."

 CHI_MON_reunification_offer: "Mongolian Reunification Offer"
 CHI_MON_reunification_offer_desc: "China extends a formal offer to Mongolia to reunify as a Special Administrative Region, promising high-degree autonomy, preservation of Mongolia's political system, and full economic integration. The proposal invokes historical precedent and positions China as the natural partner for Mongolian prosperity."

 MON_CHI_economic_partnership_idea: "Sino-Mongolian Economic Integration"
 MON_CHI_economic_partnership_idea_desc: "Preferential trade access and Chinese market integration have made Mongolia heavily dependent on exports to China. Mining revenues increase, but so does structural dependency on Chinese demand."

 MON_CHI_cultural_sphere_idea: "Within China's Cultural Orbit"
 MON_CHI_cultural_sphere_idea_desc: "Chinese state media, cultural programming, and diaspora networks have established a significant soft-power presence inside Mongolia. Resistance to further Chinese influence is weakened as a result."
 chi_mon_reunification.1.t: "Beijing's Cultural Outreach"
 chi_mon_reunification.1.d: "China and Inner Mongolia have launched a coordinated cultural influence campaign inside Mongolia, promoting shared Mongolian heritage while steering public opinion toward closer integration. Beijing frames the effort as cultural exchange, but the implications are unmistakably political."
 chi_mon_reunification.1.a: "We have no choice but to acknowledge this."

 chi_mon_reunification.2.t: "A Union With Inner Mongolia?"
 chi_mon_reunification.2.d: "An official delegation from Beijing and Hohhot has arrived in Ulaanbaatar with a formal proposal: Mongolia is invited to join the People's Republic as a Special Administrative Region under a one country, two systems framework. The offer comes with economic guarantees and promises of cultural autonomy — but also with the full weight of Chinese influence behind it."
 chi_mon_reunification.2.a: "We accept the offer."
 chi_mon_reunification.2.b: "Mongolia will remain independent."

 chi_mon_reunification.3.t: "Mongolia Refuses Reunification"
 chi_mon_reunification.3.d: "Ulaanbaatar has formally rejected the reunification proposal. The Mongolian government cites national sovereignty and public opposition, though diplomatic channels remain open. Beijing acknowledges the decision but makes clear that the offer stands."
 chi_mon_reunification.3.a: "We will try again."

 CHI_MON_reunification_retry: "Repeat the Reunification Offer"
 CHI_MON_reunification_retry_desc: "Mongolia rejected our previous proposal. We can approach Ulaanbaatar again once diplomatic conditions have been allowed to settle."

 CHI_han_settlement_small: "Small Han Resettlement Programme"
 CHI_han_settlement_small_desc: "A modest state-sponsored programme relocates Han families from densely populated inland provinces to new townships in Nei Mongol, supported by employment incentives and land allocation schemes."
 CHI_han_settlement_medium: "Medium Han Resettlement Programme"
 CHI_han_settlement_medium_desc: "A larger organised resettlement effort moves tens of thousands of Han workers and their families into Nei Mongol. New industrial zones and agricultural parcels are designated to absorb the incoming population."
 CHI_han_settlement_large: "Mass Han Resettlement Programme"
 CHI_han_settlement_large_desc: "A large-scale demographic engineering campaign transfers hundreds of thousands of Han settlers into Nei Mongol in a single coordinated wave. The long-term impact on the region's ethnic composition is substantial, though local resistance rises sharply in the near term."

