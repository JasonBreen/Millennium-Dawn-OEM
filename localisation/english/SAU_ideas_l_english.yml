l_english:
 SAU_succession_instability:0 "§RSuccession Instability§!"
 SAU_succession_instability_desc:0 "King Fahd has been incapacitated since his stroke in 1995, leaving Crown Prince Abdullah as the de facto ruler. The royal court is divided between Abdullah's supporters and the powerful Sudairi faction, creating an atmosphere of political uncertainty. Until the succession is formally resolved, the Kingdom's decision-making remains paralyzed by factional rivalries."

 SAU_aramco_01:0 "Saudi Aramco"
 SAU_aramco_01_desc:0 "The Saudi Arabian Oil Company is the world's largest petroleum enterprise, fully nationalized since 1980. Aramco controls the Kingdom's vast oil reserves and serves as the backbone of the Saudi economy, generating the majority of government revenue. While immensely profitable, the company operates with limited transparency and has yet to modernize its corporate structure."
 SAU_aramco_02:0 "Saudi Aramco - Expanded Operations"
 SAU_aramco_02_desc:0 "Aramco has expanded its operations beyond crude oil extraction, investing in refining capacity, petrochemical ventures, and international partnerships. The company's growing efficiency and diversified portfolio have strengthened its position as the cornerstone of the Saudi economy."
 SAU_aramco_03:0 "Saudi Aramco - Global Energy Leader"
 SAU_aramco_03_desc:0 "Saudi Aramco has transformed into a modern global energy giant. With a successful public listing, expanded downstream operations, and strategic international investments, the company now stands as one of the most valuable corporations in the world. Its revenues fuel not only the Kingdom's budget but also ambitious development programs across the nation."

 SAU_diversification:0 "§HEconomic Diversification§!"
 SAU_diversification_desc:0 "The Kingdom's drive to build a §Lnon-oil economy§! - the answer to the petrostate's dilemma. Each pillar you develop (governance, industry, tourism, technology, energy and more) appears here and §Glowers your oil dependence§!, turning a fragile petrostate into a resilient, diversified nation."
