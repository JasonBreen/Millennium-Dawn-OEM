 SAU_research_modifery_01:0 "§HDiversification§! - Research & Development"
 SAU_research_modifery_01_desc:0 "Targeted funding for universities and research institutes is accelerating the Kingdom's drive to build a knowledge economy beyond oil."
 SAU_research_modifery_02:0 "§HDiversification§! - World-Class Research"
 SAU_research_modifery_02_desc:0 "Flagship institutions like KAUST have made Saudi Arabia a rising regional center for science and innovation, drawing talent from across the world."

