 SAU_economy:0 "§HThe Saudi Economy§!"
 SAU_economy_desc:0 "The Saudi economy of the year 2000: §Loil-rich but undiversified§!, weighed down by capital flight, import dependence, bureaucratic red tape, expatriate-labour reliance and addiction to a single commodity. Each focus in the §HEconomic Tree§! repairs one weakness and builds the SABIC industrial base. Complete the tree and a §Rheavy debuff§! becomes a §Gbalanced, diversified economy§!.\n\n§YBelow: every economic sub-system, red where still broken, green once reformed.§!"
