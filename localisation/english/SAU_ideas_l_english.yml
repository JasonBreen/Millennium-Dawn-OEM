 SAU_econ_industry_first:0 "§HEconomic Model§! - Industry First"
 SAU_econ_industry_first_desc:0 "Steel mills, smelters and fabricators lead the Kingdom's growth. Heavy industry booms - but it eats consumer goods and manpower."
 SAU_econ_services:0 "§HEconomic Model§! - Services First"
 SAU_econ_services_desc:0 "Banking, logistics, finance and tourism. The Kingdom bets that desks employ more Saudis than factories ever will - lighter on industry, heavier on knowledge."
 SAU_econ_mixed:0 "§HEconomic Model§! - A Mixed Path"
 SAU_econ_mixed_desc:0 "Industry and services rise together; neither dominates. Less spectacular than betting on one, but far more resilient."

 SAU_military_doctrine:0 "The Saudi Military"
 SAU_military_doctrine_desc:0 "The armed forces of the Kingdom - a modern, well-funded military built as a balanced counterweight to Iran. Each military focus adds a sub-system below; together they form the Kingdom's overall fighting power."
 SAU_military_category:0 "§HArmed Forces Modernization§!"
 SAU_military_category_desc:0 "The long programme to rebuild the Kingdom's armed forces after the shock of §LOperation Desert Storm§! - from a military that needed §LAmerican§! airpower, logistics and command to fight, into a modern force and a true counterweight to §LIran§!.\n\n§HHow it works:§!\nEvery reform is a §Ydecision§! unlocked by a military §Yfocus§!. Each opens a §Gchoice of doctrines§! - and every doctrine is a deliberate §Rtrade-off§!, strengthening the forces one way while costing them another. You may re-run a reform later to §Yswitch doctrine§!.\n\n§HThe three Stages:§!\nReadiness advances in stages - §RUnmodernized§! → §YIn Reform§! → §YModernizing§! → §GModernized§!. Each Stage reveals its own batch of reforms, and you must §Ycomplete all of them§! before the next Stage will open. It all begins by winning the §LWar Games: Lessons of the Gulf§!.\n\nEvery doctrine you choose feeds into the §LThe Saudi Military§! national spirit, where the combined effect is shown."
 SAU_forces_unmodernized:0 "Unmodernized Armed Forces"
 SAU_forces_unmodernized_desc:0 "Decades of reliance on foreign contractors and outdated doctrine have left the armed forces unready. Use the §YModernize the Armed Forces§! decision to reform them, step by step."
 SAU_forces_reforming:0 "Forces in Reform"
 SAU_forces_reforming_desc:0 "The first reforms are taking hold and the worst of the old weaknesses are fading. Keep modernizing."
 SAU_forces_modernizing:0 "Modernizing Forces"
 SAU_forces_modernizing_desc:0 "Training, doctrine and equipment are catching up to Western standards. The forces are now a match for their neighbours."
 SAU_forces_modernized:0 "Modernized Armed Forces"
 SAU_forces_modernized_desc:0 "A fully modern, professional military - the equal of any in the region and a true counterweight to Iran."
 SAU_mod_gulf_lessons:0 "War Games: Lessons of the Gulf"
 SAU_mod_gulf_lessons_desc:0 "Stage a major exercise to test the army against the hard lessons of 1991 - and decide which model to rebuild it on.\n\n§YOpens with:§! Lessons of the Gulf War.\n§GOpens a choice of four doctrines§! - American, GCC, NATO or Domestic - each with its own strengths and a drawback. Run the war games again later to §Yswitch doctrine§!."
 SAU_gulf_war_lessons:0 "Lessons of the Gulf War"
 SAU_gulf_war_lessons_desc:0 "The shock of 1991 laid bare the gulf between the Kingdom's arsenal and a modern war. The General Staff is still studying the lessons - and has not yet chosen the model on which to rebuild the army.\n\n§G+5%§! Army Experience Gain\n§G+5%§! Planning Speed\n\n§YRun the 'War Games: Lessons of the Gulf' decision to choose a doctrine.§!"
 SAU_doctrine_american:0 "Doctrine: American Partnership"
 SAU_doctrine_american_desc:0 "Train with US forces, buy American, and fight the American way. The most capable path - at the price of dependence and quiet domestic resentment.\n\n§G+10%§! Army Experience Gain\n§G+10%§! Air Experience Gain\n§G+5%§! Division Organisation\n§R-10%§! Political Power Gain"
 SAU_doctrine_gcc:0 "Doctrine: GCC Collective Defence"
 SAU_doctrine_gcc_desc:0 "Anchor the Kingdom's defence in the Gulf Cooperation Council and the Peninsula Shield Force. Formidable on home soil, but committee-bound and cautious on the attack.\n\n§G+15%§! Division Defence on Core Territory\n§G+5%§! Recruitable Population\n§R-5%§! Division Attack"
 SAU_doctrine_nato:0 "Doctrine: NATO Professionalism"
 SAU_doctrine_nato_desc:0 "Adopt NATO standards: a professional officer corps, combined-arms planning and rigorous staff work. Superb command and control - but an expensive force to maintain.\n\n§G+10%§! Planning Speed\n§G+10%§! Max Planning\n§G+5%§! Division Organisation\n§R+5%§! Consumer Goods Use"
 SAU_doctrine_domestic:0 "Doctrine: Domestic Self-Reliance"
 SAU_doctrine_domestic_desc:0 "Build an indigenous defence industry and a force that owes nothing to foreign suppliers. Proud and self-sufficient, if a step behind the cutting edge.\n\n§G+10%§! Arms Factory Output\n§G+5%§! Division Recovery Rate\n§R-5%§! Army Experience Gain"
 SAU_mod_sang_drills:0 "National Guard Readiness Drills"
 SAU_mod_sang_drills_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! Saudi Arabian National Guard.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage I reform - finish all three Stage I reforms to unlock Stage II.]§!"
 SAU_mod_abrams_gunnery:0 "Abrams Gunnery Programme"
 SAU_mod_abrams_gunnery_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! M1A2 Abrams Main Battle Tank.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage I reform - finish all three Stage I reforms to unlock Stage II.]§!"
 SAU_mod_artillery_livefire:0 "Live-Fire Artillery Exercise"
 SAU_mod_artillery_livefire_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! M109 Self-Propelled Artillery.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage II reform - finish all three Stage II reforms to unlock Stage III.]§!"
 SAU_mod_apache_training:0 "Apache Gunship Training"
 SAU_mod_apache_training_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! Army Aviation and Apache Gunships.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage II reform - finish all three Stage II reforms to unlock Stage III.]§!"
 SAU_mod_sf_selection:0 "Special Forces Selection Course"
 SAU_mod_sf_selection_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! Special Forces Command.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage III reform - the final batch.]§!"
 SAU_mod_fleet_exercise:0 "Combined Fleet Exercise"
 SAU_mod_fleet_exercise_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! The Royal Saudi Naval Forces.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage II reform - finish all three Stage II reforms to unlock Stage III.]§!"
 SAU_mod_red_flag:0 "Red Flag Air Combat Training"
 SAU_mod_red_flag_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! The Royal Saudi Air Force.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage I reform - finish all three Stage I reforms to unlock Stage II.]§!"
 SAU_mod_awacs_battle:0 "AWACS Battle Management Training"
 SAU_mod_awacs_battle_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! E-3 Sentry AWACS.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage III reform - the final batch.]§!"
 SAU_mod_pgm_doctrine:0 "Precision Strike Doctrine Course"
 SAU_mod_pgm_doctrine_desc:0 "Run the programme to choose how this part of the armed forces fights.\n\n§YOpens with:§! Precision-Guided Munitions.\n§GOpens a choice of three doctrines§!, each with a strength and a drawback. Re-run later to §Yswitch§!. §H[Stage III reform - the final batch.]§!"
 SAU_mod_reform:0 "Stage I: Launch the Reform Programme"
 SAU_mod_reform_desc:0 "§HStage I of III - the first phase of modernization.§!\n\n§GTo run it:§! complete the §YThe General Staff§! focus, then win the §YWar Games: Lessons of the Gulf§! (choose a Gulf War doctrine).\n\n§GWhat happens:§! the armed forces go from §RUnmodernized§! to §YIn Reform§!, and three new reforms appear - §YNational Guard, Abrams Gunnery and Red Flag§!.\n\n§RImportant:§! you must then complete §Rall three§! of those reforms before §YStage II§! will unlock. Fires once."
 SAU_mod_modernize:0 "Stage II: Modernize the Combat Arms"
 SAU_mod_modernize_desc:0 "§HStage II of III - re-equipping the combat arms.§!\n\n§RThis stays locked until you complete all three Stage I reforms:§!\n  §Y» National Guard Readiness Drills\n  » Abrams Gunnery Programme\n  » Red Flag Air Combat Training§!\n(pick a doctrine in each).\n\n§GWhat happens:§! the armed forces go from §YIn Reform§! to §YModernizing§!, and three new reforms appear - §YArtillery, Apache and the Combined Fleet§!. You must complete all three before §YStage III§! will unlock. Fires once."
 SAU_mod_complete:0 "Stage III: Achieve a Fully Modern Force"
 SAU_mod_complete_desc:0 "§HStage III of III - a fully modern force.§!\n\n§RThis stays locked until you complete all three Stage II reforms:§!\n  §Y» Live-Fire Artillery Exercise\n  » Apache Gunship Training\n  » Combined Fleet Exercise§!\n(pick a doctrine in each).\n\n§GWhat happens:§! the armed forces reach §GFully Modernized§! - a true counterweight to Iran - and the final reforms appear: §YSpecial Forces, AWACS and Precision Strike§!. Fires once."
 SAU_sp_sang_regime:0 "National Guard: Regime Guard"
 SAU_sp_sang_regime_desc:0 "First and last, the SANG shields the throne and the two holy cities.\n§G+10%§! Core Territory Defence\n§G+5%§! Stability\n§R-5%§! Division Attack"
 SAU_sp_sang_tribal:0 "National Guard: Tribal Levies"
 SAU_sp_sang_tribal_desc:0 "Loyal tribal manpower swells the ranks, if not their polish.\n§G+10%§! Recruitable Population\n§G+5%§! Division Recovery Rate\n§R-5%§! Division Organisation"
 SAU_sp_sang_security:0 "National Guard: Internal Security"
 SAU_sp_sang_security_desc:0 "A watchful guard against subversion and unrest at home.\n§G-25%§! Enemy Subversive Activity\n§G+5%§! Stability\n§R-5%§! War Support"
 SAU_sp_abrams_shock:0 "Armor: Shock & Breakthrough"
 SAU_sp_abrams_shock_desc:0 "Fast, hard-hitting armoured thrusts to shatter the enemy line.\n§G+10%§! Core Territory Attack\n§G+5%§! Division Speed\n§R-5%§! Division Organisation"
 SAU_sp_abrams_combined:0 "Armor: Combined Arms"
 SAU_sp_abrams_combined_desc:0 "Tanks, infantry and artillery fighting as one balanced team.\n§G+5%§! Division Attack\n§G+5%§! Division Defence\n§G+5%§! Division Organisation\n§R+10%§! Army Training Time"
 SAU_sp_abrams_defensive:0 "Armor: Defensive Wall"
 SAU_sp_abrams_defensive_desc:0 "Dug-in armour as an immovable shield for the Kingdom.\n§G+10%§! Division Defence\n§G+10%§! Entrenchment Speed\n§R-10%§! Division Speed"
 SAU_sp_arty_mass:0 "Artillery: Massed Fires"
 SAU_sp_arty_mass_desc:0 "Overwhelming barrages to pulverise the enemy, supply be damned.\n§G+10%§! Core Territory Attack\n§R+10%§! Supply Consumption"
 SAU_sp_arty_precision:0 "Artillery: Precision Fires"
 SAU_sp_arty_precision_desc:0 "Fewer, smarter rounds on exactly the right target.\n§G+7.5%§! Division Attack\n§G+5%§! Army Experience Gain\n§R+5%§! Consumer Goods Use"
 SAU_sp_arty_mobile:0 "Artillery: Shoot-and-Scoot"
 SAU_sp_arty_mobile_desc:0 "Fire and displace before the enemy can reply.\n§G+5%§! Division Speed\n§G+5%§! Division Organisation\n§R-5%§! Division Defence"
 SAU_sp_apache_antiarmor:0 "Army Aviation: Tank-Killers"
 SAU_sp_apache_antiarmor_desc:0 "Hellfire-armed hunters to gut an armoured advance.\n§G+7.5%§! Core Territory Attack\n§G+5%§! Division Attack\n§R-5%§! Air Experience Gain"
 SAU_sp_apache_closeair:0 "Army Aviation: Close Support"
 SAU_sp_apache_closeair_desc:0 "Gunships overhead to steady and protect the ground troops.\n§G+5%§! Division Organisation\n§G+5%§! Division Recovery Rate\n§R+10%§! Air Accidents"
 SAU_sp_apache_recon:0 "Army Aviation: Recon & Raids"
 SAU_sp_apache_recon_desc:0 "Eyes forward and lightning raids deep behind the line.\n§G+7.5%§! Division Speed\n§G+5%§! Planning Speed\n§R-5%§! Division Defence"
 SAU_sp_sf_counterterror:0 "Special Forces: Counter-Terror"
 SAU_sp_sf_counterterror_desc:0 "A small, lethal force for hostage rescue and counter-terror.\n§G+10%§! Special Forces Attack\n§G+5%§! Special Forces Defence\n§R-3%§! Special Forces Cap"
 SAU_sp_sf_raiders:0 "Special Forces: Deep Raiders"
 SAU_sp_sf_raiders_desc:0 "More operators striking deep, at some cost to their durability.\n§G+5%§! Special Forces Cap\n§G+7.5%§! Special Forces Attack\n§R-5%§! Special Forces Defence"
 SAU_sp_sf_recon:0 "Special Forces: Reconnaissance"
 SAU_sp_sf_recon_desc:0 "Silent eyes that make the whole army see further.\n§G+5%§! Special Forces Cap\n§G+5%§! Planning Speed\n§R-5%§! Special Forces Attack"
 SAU_sp_fleet_gulf:0 "Navy: Gulf Sea Control"
 SAU_sp_fleet_gulf_desc:0 "Dominate the close, crowded waters of the Arabian Gulf.\n§G+10%§! Screen Attack\n§G+5%§! Naval Coordination\n§R-10%§! Naval Range"
 SAU_sp_fleet_bluewater:0 "Navy: Blue-Water Ambition"
 SAU_sp_fleet_bluewater_desc:0 "Reach out beyond the Gulf into the open ocean.\n§G+15%§! Naval Range\n§G+5%§! Capital Ship Attack\n§R-5%§! Naval Morale"
 SAU_sp_fleet_coastal:0 "Navy: Coastal Defence"
