 SAU_succession_category:0 "§HThe Succession Question§!"
 SAU_succession_category_desc:0 "King Fahd lies incapacitated. The Allegiance Council must choose the next §HCrown Prince§!. Each candidate represents a different vision for the kingdom's future."

 SAU_appoint_abdullah_crown_prince:0 "§LAppoint Abdullah§! as Crown Prince"
 SAU_appoint_abdullah_crown_prince_desc:0 "§LAbdullah bin Abdulaziz§! (b. 1924) — §Lde facto regent§! since 1995. The §Greformer§!, beloved by the desert tribes. Cautious modernization, national dialogue, careful relations with the §Lulema§!."

 SAU_appoint_sultan_crown_prince:0 "§LAppoint Sultan§! as Crown Prince"
 SAU_appoint_sultan_crown_prince_desc:0 "§LSultan bin Abdulaziz§! (b. 1928) — Defense Minister since 1962. Senior §Lal-Sudairi§!. The §Gsoldier-prince§! who runs the armed forces and the §LAl-Yamamah§! arms pipeline. The §LPentagon§!'s favorite Saudi."

 SAU_appoint_talal_crown_prince:0 "§LAppoint Talal§! as Crown Prince §M(Alt-Historical)§!"
 SAU_appoint_talal_crown_prince_desc:0 "§LTalal bin Abdulaziz§! (b. 1931) — the §M\"Red Prince\"§!. Once exiled to §LCairo§! for advocating a §Lconstitutional monarchy§!. A §Yshocking§! choice — but one that could open the kingdom to a future no Saud has yet imagined."

 SAU_appoint_bandar_crown_prince:0 "§LAppoint Bandar§! as Crown Prince §M(Alt-Historical)§!"
 SAU_appoint_bandar_crown_prince_desc:0 "§LBandar bin Sultan§! (b. 1949) — §LAmbassador to Washington§! since 1983. The §Gspymaster§!, friend of the §LBush family§!, master of §Hcovert action§!. A §Mgrandson§! of Ibn Saud rather than a son — an unprecedented generational leap."

 SAU_appoint_nayef_crown_prince:0 "§LAppoint Nayef§! as Crown Prince"
 SAU_appoint_nayef_crown_prince_desc:0 "§LNayef bin Abdulaziz§! (b. 1934) — Interior Minister since 1975. Architect of the §LMabahith§!. The §Giron hand§! the §Lulema§! trust and the dissidents fear. Security over reform; control over openness."

 SAU_appoint_salman_crown_prince:0 "§LAppoint Salman§! as Crown Prince"
 SAU_appoint_salman_crown_prince_desc:0 "§LSalman bin Abdulaziz§! (b. 1935) — §LGovernor of Riyadh§! for 48 years. The §Gpatient prince§!. Pragmatic, pious, administratively brilliant. And his son §LMohammed§! — ambitious in ways the kingdom is only beginning to grasp."

 SAU_research_modifier_01:0 "Rising Literacy"
 SAU_research_modifier_01_desc:0 "As more Saudis learn to read, the Kingdom's classrooms and laboratories begin to stir.\n\n§G+2%§! Research Speed"
 SAU_research_modifier_02:0 "An Educated Generation"
 SAU_research_modifier_02_desc:0 "A generation raised in modern schools enters the workforce.\n\n§G+5%§! Research Speed"
 SAU_research_modifier_03:0 "A Knowledge Economy"
 SAU_research_modifier_03_desc:0 "Universities, research centres and skilled graduates drive innovation across the Kingdom.\n\n§G+7.5%§! Research Speed"
 SAU_research_modifier_04:0 "A Knowledge Society"
 SAU_research_modifier_04_desc:0 "The Kingdom of Saudi Arabia stands among the educated nations of the world.\n\n§G+10%§! Research Speed"
 SAU_research_maxed_tt:0 "§GResearch Speed is already at its maximum (+10%).§!"

 SAU_Intelligence_category:0 "§GGeneral Intelligence Presidency§!"
 SAU_Intelligence_category_desc:0 "The General Intelligence Presidency (GIP) is the Kingdom's primary intelligence agency, responsible for both domestic and foreign intelligence gathering and analysis. It plays a crucial role in national security, counterterrorism, and strategic planning.\n\n§GUnlocking the GIP§! will allow you to make decisions that enhance your intelligence capabilities, providing valuable insights and advantages in both domestic and international affairs."
 SAU_intel_expand_gip:0 "Expand the General Intelligence Presidency"
 SAU_intel_expand_gip_desc:0 "Recruit and train fresh GIP operatives, broadening the Kingdom's reach at home and abroad."
 SAU_intel_recruit_operative_tt:0 "§GRecruit a new GIP operative§!"
 SAU_intel_agency_full_tt:0 "§RAll operative slots are full§! - funds are redirected into the agency"
 SAU_intel_mabahith:0 "Strengthen the Mabahith"
 SAU_intel_mabahith_desc:0 "Reinforce the secret police. Tighter surveillance and a firmer grip on dissent shore up internal stability and reassure the religious establishment."
 SAU_intel_counterterror:0 "Counter-Terrorism Directorate"
 SAU_intel_counterterror_desc:0 "Coordinate raids and intelligence operations against al-Qaeda and jihadist cells. The crackdown bolsters stability and rallies the House of Saud behind the GIP, and strikes directly at any foreign fighters operating in the Kingdom."
 SAU_intel_foreign_stations:0 "Foreign Station Network"
 SAU_intel_foreign_stations_desc:0 "Open GIP stations abroad to roll back Iranian influence and extend Saudi reach across the region."
 SAU_intel_surveillance_tech:0 "Acquire Advanced Surveillance Technology"
 SAU_intel_surveillance_tech_desc:0 "Purchase cutting-edge monitoring and data systems. A costly one-time investment that permanently upgrades the agency."
 SAU_intel_counterintel_sweep:0 "Counter-Intelligence Sweep"
 SAU_intel_counterintel_sweep_desc:0 "Hunt foreign agents and harden the GIP against penetration, permanently strengthening counter-intelligence."
 creation_of_GIP_tt:0 "§GIt will Unlock Intelligence related Decisions!§!"