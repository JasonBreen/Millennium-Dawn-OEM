 # MILITARY MODERNISATION — Focus names & descriptions
 GRE_vision_2030: "Military Vision"
 GRE_vision_2030_desc: "Our armed forces have fallen behind. Years of austerity and outdated Cold War thinking have left us with aging equipment, bloated structures and a military that no longer reflects the threats we face. With this plan we commit to the most ambitious defense reform in modern Greek history, transforming the Hellenic Armed Forces into a capable and modern fighting force."
 GRE_armored_transition: "Armored Transition"
 GRE_armored_transition_desc: "The BMP-1 and M48 Patton have served their time. By retiring our Cold War armor and transitioning to the Leopard 2 in its specially modified Hellenic variant, we will field a tank force that can match any adversary in the region and finally give our armored brigades the cutting edge they deserve."
 GRE_pzh_2000: "PzH 2000 Howitzers"
 GRE_pzh_2000_desc: "Our artillery must be able to keep pace with modern armored warfare. By fielding the PzH 2000 self-propelled howitzer, we will give our forces precision fire at range and ensure that our ground commanders are never left without effective indirect fire support."
 GRE_m270_mlrs: "M270 MLRS"
 GRE_m270_mlrs_desc: "Covering island landings and striking coastal targets across the Aegean requires firepower that reaches far beyond the front line. The M270 multiple launch rocket system will give our army that reach, providing strategic fire support wherever it is needed most."
 GRE_puls_rocket: "PULS Rocket System"
 GRE_puls_rocket_desc: "Through the EURO-PULS joint program with Israel and our European partners, we will field a precision rocket artillery system capable of striking targets at extended range. Any adversary operating in the Aegean must now account for the threat of accurate long range fire from Greek soil."
 GRE_special_warfare_command: "Special Warfare Command"
 GRE_special_warfare_command_desc: "By unifying our EKAM units, raider brigades, combat divers and paratroopers under a single Special Warfare Command, we will create an elite force capable of operating across our islands and beyond. In modern warfare, small and lethal units decide outcomes that entire divisions cannot."
 GRE_archipelagos_strategy: "Archipelagos Strategy"
 GRE_archipelagos_strategy_desc: "Our thousands of islands are not a liability. Properly defended and integrated into a coherent doctrine, they become a layered barrier that no enemy fleet can cross without suffering severe losses. We will turn the geography of the Aegean into our greatest strategic advantage."
 GRE_f16_modernisation: "F-16 Modernisation"
 GRE_f16_modernisation_desc: "By upgrading 83 of our F-16s to the Block 70/72 Viper standard locally through the Hellenic Aerospace Industry, we will sustain a formidable fighter fleet while building the domestic expertise that will later underpin our F-35 maintenance capability. Greece does this work itself."
 GRE_intl_flight_training: "International Flight Training Center"
 GRE_intl_flight_training_desc: "By opening our flight training facilities to allied and partner nations, we will generate goodwill, deepen military relationships and sharpen our own pilots against international standards. Those who learn to fly in Greek skies will remember who taught them."
 GRE_new_transport_helicopters: "New Transport Helicopters"
 GRE_new_transport_helicopters_desc: "Rapid movement between our islands is the backbone of any credible island defense. By fielding 35 UH-60M Black Hawks alongside our MH-60R Seahawks, we will give our forces the lift capacity to reinforce any threatened position before an adversary can consolidate."
 GRE_f35_program: "F-35 Program Collaboration"
 GRE_f35_program_desc: "By joining the F-35 program we will field a fifth generation stealth fighter that no adversary in our region can match. The contract signed in July 2024 marks a turning point for the Hellenic Air Force, giving our pilots a decisive edge in any future confrontation over the Aegean."
 GRE_patriot_air_defense: "Patriot Air Defense Systems"
 GRE_patriot_air_defense_desc: "Our aging Nike Hercules batteries can no longer defend against modern threats. By upgrading to the Patriot PAC-3 with MSE interceptors, we will finally give Greece a credible defense against ballistic missiles and ensure that our critical infrastructure can be protected from above."
 GRE_centauros_anti_drone: "Centauros Anti-Drone System"
 GRE_centauros_anti_drone_desc: "Developed by the Hellenic Aerospace Industry and proven in Red Sea operations, the Centauros C-UAS system will be deployed across our islands, naval bases and airfields. Drone warfare is the defining threat of modern conflict and we intend to lead in countering it."
 GRE_achilles_shield: "Achilles Shield"
 GRE_achilles_shield_desc: "By integrating our Patriot batteries, Centauros drone defenses and coastal missile systems into a unified network covering the entire Aegean, we will create an anti-access zone that makes any offensive operation against Greek territory extraordinarily costly. This is our shield and it will hold."
 GRE_kimon_class_frigate: "Kimon Class Frigate"
 GRE_kimon_class_frigate_desc: "After years of cancelled programs and deferred ambitions, we have signed with Naval Group for three FDI HN frigates with an option for a fourth. The Kimon class will give the Hellenic Navy a first rank surface combatant capable of standing up to any fleet in the region."
 GRE_hydra_class_upgrade: "Hydra-class Modernisation"
 GRE_hydra_class_upgrade_desc: "The Hydra-class frigates — MEKO 200HN vessels built at Skaramangas in the 1990s — form the backbone of the Hellenic Navy's surface combatant force. This programme funds a comprehensive mid-life upgrade covering radar systems, electronic warfare suites, and anti-ship missile integration, ensuring the class remains combat-effective well into the coming decades."
 GRE_elli_class: "Elli-class Replacement Programme"
 GRE_elli_class_desc: "The ageing Elli-class frigates, originally Dutch Van Speijk-class vessels transferred to Greece in the 1980s, have long exceeded their operational lifespan. This focus authorises procurement of replacement hulls, either through domestic construction at Skaramangas or through a foreign acquisition programme, to restore the Hellenic Navy's frigate strength."
 GRE_roussen_attack_craft: "Roussen Class Fast Attack Craft"
 GRE_roussen_attack_craft_desc: "The Aegean is not an open ocean. It is our battlefield. The Roussen class is built for it: fast, missile armed and lethal at close range. We commission a new generation of attack craft to deny any hostile fleet access to Greek waters."
 GRE_fremm_frigate: "FREMM Multipurpose Frigates"
 GRE_fremm_frigate_desc: "Our fleet needs more hulls. We must choose between acquiring proven Italian FREMM frigates quickly or investing in a fifth FDI from Naval Group. Each path offers different advantages in speed, capability and alliance relationships. The decision will shape our navy for decades."
 GRE_submarine_expansion: "Type 214 Procurement Program"
 GRE_submarine_expansion_desc: "The Hellenic Navy's Papanikolis class, represent the cutting edge of conventional undersea warfare. Air-independent propulsion gives our boats the endurance to stalk adversaries silently for weeks without surfacing. By expanding and sustaining this program, Greece will deepen its undersea dominance of the Aegean and ensure that any hostile fleet faces an invisible, lethal threat beneath every wave."
 GRE_bluewhale_submarines: "BlueWhale Submarines"
 GRE_bluewhale_submarines_desc: "By acquiring autonomous unmanned submarines from Israeli Aerospace, we will add an asymmetric capability that no regional adversary has an answer for. These systems operate without crew and without risk, giving our navy a persistent undersea presence that cannot be deterred by political cost."
 GRE_defense_manufacturing: "Local Manufacturing Mandate"
 GRE_defense_manufacturing_desc: "By enshrining the 25 percent local content requirement into law, we will ensure that every major defense program contributes to the growth of our domestic industry. EAS, HAI and our shipyards will grow stronger with each contract signed, reducing our dependence on foreign suppliers."
 GRE_research_hubs: "Research Hubs"
 GRE_research_hubs_desc: "By building formal collaboration between our universities, the Hellenic Aerospace Industry and the Ministry of Defense, we will create a pipeline of innovation that strengthens our armed forces from within."
 GRE_defense_innovation_center: "Hellenic Defense Innovation Center"
 GRE_defense_innovation_center_desc: "By establishing a dedicated innovation center that connects startups, academic institutions and defense industry partners, we will accelerate the development of next generation military technologies in Greece."
 GRE_communication_satellites: "Communication Satellites"
 GRE_communication_satellites_desc: "By deploying dedicated military communications satellites, we will achieve persistent overhead coverage of the Aegean and give all branches of our armed forces a secure and resilient communications backbone."
 GRE_theon_international: "Theon International Expansion"
 GRE_theon_international_desc: "Theon International has built a global reputation for high quality night vision and optical systems. By supporting the expansion of this Greek company into new export markets, we will generate revenue, build defense relationships and demonstrate that Greek industry can compete at the highest level."
 GRE_industrial_synergy: "Industrial Synergy"
 GRE_industrial_synergy_desc: "Our defense programs are strongest when our industries work together. By creating formal coordination between HAI, our shipyards, EAS and our research institutions, we will build a self-reinforcing industrial base that makes every program faster, cheaper and more capable than the last."
 GRE_irix_loitering: "IRIX Loitering Munitions"
 GRE_irix_loitering_desc: "Hellenic Defence Systems has partnered with Paramount Industries to produce the IRIX, the first loitering munition manufactured in Greece. With a range of up to 100 kilometers, we will equip our forces with a precision strike capability that can reach deep into enemy territory. We will no longer depend on foreign suppliers for this critical battlefield technology."
 GRE_lora_ballistic: "LORA Ballistic Missile System"
 GRE_lora_ballistic_desc: "We must ensure that any adversary thinking of threatening our sovereignty understands the consequences. By acquiring the LORA ballistic missile system from Israel Aerospace Industries, we will gain a long range precision strike capability that fundamentally shifts the balance in the Aegean. A range of 400 kilometers leaves our opponents with very little room to feel safe."
 GRE_iniochos: "Iniochos Exercise Program"
 GRE_iniochos_desc: "Our annual Iniochos exercise at Andravida has grown into one of Europe's premier multinational air training events. By expanding participation and increasing the complexity of scenarios, we will sharpen our pilots against the best in the world while deepening the relationships that matter most. Those who train with us will stand with us."
 GRE_grypas_ucav: "Grypas UCAV Program"
 GRE_grypas_ucav_desc: "The Hellenic Aerospace Industry has developed the Grypas, our first domestically designed combat drone. By investing in this program we will build a sovereign unmanned strike capability free from foreign export restrictions and political conditions. What we build ourselves, we control ourselves."
 GRE_strategic_transport_fleet: "Strategic Transport Fleet"
 GRE_strategic_transport_fleet_desc: "Our island defense strategy is only as strong as our ability to reinforce and resupply it. By modernizing our C-27J fleet and acquiring additional C-130H transport aircraft, we will ensure that no garrison goes unsupported and no island is left isolated in a crisis. Mobility is the foundation of our island doctrine."
 GRE_constellation_co_production: "Constellation Class Co-Production"
 GRE_constellation_co_production_desc: "Together with the United States we have begun planning the co-production of the FFG-62 Constellation class frigate. This partnership will not only add world class warships to our fleet but will develop the expertise and industrial capacity of our shipyards at Skaramangas and Elefsina for generations tGFo come."
 GRE_eyes_of_poseidon: "Eyes of Poseidon"
 GRE_eyes_of_poseidon_desc: "We cannot defend what we cannot see. By integrating maritime patrol aircraft, coastal radar stations and satellite imagery into a unified surveillance network, we will ensure complete situational awareness over the Aegean and Ionian seas. No vessel will enter our waters without our knowledge."
 GRE_souda_bay_expansion: "Souda Bay Naval Base Expansion"
 GRE_souda_bay_expansion_desc: "Souda Bay is the most strategically valuable port in the Mediterranean and we must fully leverage its potential. By expanding our cooperation with the United States and NATO at this facility, we will strengthen our alliances, secure long term defense commitments and cement Greece's role as the indispensable southern anchor of the Atlantic Alliance."
 GRE_alexandroupolis_strategic_hub: "Alexandroupolis Strategic Hub"
 GRE_alexandroupolis_strategic_hub_desc: "The port of Alexandroupolis has emerged as a vital NATO logistics corridor to Eastern Europe, bypassing the Bosphorus entirely. By investing in its infrastructure and deepening cooperation with our Bulgarian and Romanian partners, we will transform this northern port into a permanent strategic asset that gives Greece real leverage within the Alliance."
 GRE_spike_atgm_integration: "Spike ATGM Integration"
 GRE_spike_atgm_integration_desc: "Our infantry and armored vehicles require a modern anti-tank guided missile capability that can engage targets well beyond direct line of sight. By integrating the Spike family of missiles across our ground forces and naval patrol vessels, we will give every commander a precision strike option that closes the gap between detection and destruction."
 GRE_stinger_manpads: "MANPADS Modernisation"
 GRE_stinger_manpads_desc: "Our island garrisons and forward deployed units face aerial threats that no large air defense battery can cover cost effectively. By modernizing and expanding our Stinger MANPADS inventory, we will give every infantry unit and patrol vessel an organic air defense capability against drones, helicopters and low flying aircraft."
 GRE_infantry_digitisation: "Infantry Digitisation Program"
 GRE_infantry_digitisation_desc: "A modern soldier must share the same operational picture as the pilot overhead and the frigate offshore. By equipping our infantry units with integrated battlefield management systems, encrypted communications and digital targeting equipment, we will ensure that our ground forces can operate as a connected node in our networked force rather than an isolated element on the ground."
 GRE_sovereign_waters: "Sovereign Waters"
 GRE_sovereign_waters_desc: "For decades we have watched others challenge our sovereign rights in the Aegean and Eastern Mediterranean while we lacked the naval strength to enforce them. With our fleet modernized and our island defenses in place, we are now in a position to assert what international law has always granted us. Our exclusive economic zone is ours to develop, and our navy will ensure it stays that way."
 GRE_rheinmetall_greece: "Rheinmetall in Greece"
 GRE_rheinmetall_greece_desc: "Rheinmetall has expressed clear interest in establishing local assembly and maintenance arrangements in Greece as part of any future procurement agreement. We will formalize this partnership and integrate Rheinmetall's production capabilities into our domestic defense industry. A permanent German industrial presence on Greek soil will strengthen our land forces modernization and anchor Greece as a defense manufacturing hub in southeastern Europe."
 GRE_joint_operations_reform: "Joint Operations Reform"
 GRE_joint_operations_reform_desc: "Our three branches have spent decades operating as separate services with separate doctrines and separate command cultures. We will establish a unified joint operations framework that forces the army, navy and air force to plan, train and fight as a single instrument of state power. This is the foundation on which every modernisation effort must rest."
 GRE_new_army_doctrine: "From Mass to Maneuver"
 GRE_new_army_doctrine_desc: "The Hellenic Army was built to hold a line in Thrace with as many men as possible for as long as possible. That doctrine belongs to a war that never came. We will restructure around smaller, faster brigade groups that can deploy rapidly across the Aegean and respond to threats before they become crises. Quantity will no longer substitute for capability."
 GRE_nco_reform: "The Backbone of the Army"
 GRE_nco_reform_desc: "Greek officers have historically been expected to make every decision down to platoon level because the non-commissioned officer corps was never given the authority or training to act independently. We will build a professional NCO corps that can lead, adapt and execute without waiting for orders from above. An army that thinks at every level is an army that wins."
 GRE_thrace_to_aegean: "Reorienting the Army"
 GRE_thrace_to_aegean_desc: "For forty years our ground forces faced northeast toward the Evros river and the threat of armored columns crossing into Thrace. That threat has not disappeared but it is no longer our only concern. We will formally reorient our primary deployment posture toward the islands and coastlines of the Aegean where sovereignty is tested every day. The army that defends Greece must be able to fight on water as much as on land."
 GRE_joint_fires_doctrine: "Combined Arms School"
 GRE_joint_fires_doctrine_desc: "Artillery, armor, infantry and close air support have operated in separate silos for too long. We will institutionalize combined arms warfare as the standard method of Greek military operations, forcing every unit to train with every other. A Greek soldier who has never seen a Rafale provide suppression before his assault is not ready for modern war."
 GRE_sead_doctrine: "Suppression of Enemy Defenses"
 GRE_sead_doctrine_desc: "Greek pilots are among the most experienced in NATO at defensive counter-air over the Aegean but offensive strike operations against defended targets remain an underdeveloped capability. We will develop and exercise a dedicated SEAD doctrine that uses the Rafale's SCALP and Meteor to systematically degrade enemy air defense networks before any strike package enters hostile airspace. Greece must be able to reach targets, not just intercept threats."
 GRE_iniochos_as_doctrine: "Lessons from Iniochos"
 GRE_iniochos_as_doctrine_desc: "Every year Iniochos brings together pilots from twenty nations who fly against each other and learn what actually works in contested airspace. We have been running this exercise for years without fully translating its lessons into standing doctrine. We will formalize the findings of each Iniochos cycle into updated tactics, techniques and procedures that are immediately adopted across the Hellenic Air Force. What we learn in training must survive contact with doctrine."
 GRE_cas_doctrine: "Close Air Support Integration"
 GRE_cas_doctrine_desc: "The Hellenic Air Force and the Hellenic Army have rarely trained together at the level required for effective close air support in high-intensity combat. We will build a permanent joint training pipeline and standardized communication protocols so that ground commanders and fighter pilots speak the same language when lives depend on it. An air force that cannot support its army is only half an air force."
 GRE_aegean_fortress_doctrine: "The Aegean as Our Sea"
 GRE_aegean_fortress_doctrine_desc: "The Aegean is not an open ocean. It is a labyrinth of six thousand islands, narrow straits, shallow banks and choke points that a well-prepared defender can turn into a killing ground. We will build a navy that makes every approach to Greek territory a calculated risk that no rational adversary will want to take. The Aegean will be ours not because we can outgun the enemy but because we know every inch of it and they do not."
 GRE_aegean_fortress_doctrine_tt: "[GREadmiraldefenseeffect]"
 GRE_aegean_fortress_doctrine_effect: "Admirals: §G30% chance§! to gain §Y+1 Defense§! on level up."
 GRE_submarine_wolf_packs: "Submarine Warfare Doctrine"
 GRE_submarine_wolf_packs_desc: "The submarine is the most dangerous weapon in the Aegean because the sea is too shallow for an enemy to hide but deep enough in the right places for ours. We will train our submarine crews to operate in coordinated groups sharing targeting data and covering each other's patrol areas so that no surface force can transit the Aegean without being stalked from below. A fleet that cannot find our submarines cannot safely move."
 GRE_missile_corvette_network: "The Roussen Network"
 GRE_missile_corvette_network_desc: "Our Roussen class missile corvettes are fast, lethal and perfectly suited to the confined waters of the Aegean but they have never operated as a coordinated network. We will integrate them with coastal radar stations, island-based sensors and submarine contact reports into a single targeting picture that allows any corvette to engage any surface threat in the Aegean within minutes of detection. Speed and coordination will compensate for size."
 GRE_aegean_minefield_doctrine: "The Mined Straits"
 GRE_aegean_minefield_doctrine_desc: "Greece has maintained a significant naval mining capability since the Second World War but has never fully integrated it into a coherent operational doctrine. We will develop pre-planned minefields for every major approach into the Aegean with laid patterns that can be activated within hours of an order, turning the straits into barriers that even a superior fleet cannot safely cross. The mine does not need to destroy a ship. It only needs to make the commander think twice."
 GRE_sea_denial_complete: "Fortress Aegean"
 GRE_sea_denial_complete_desc: "The Aegean Sea is now a Greek operational domain in the fullest sense of the term. Every layer of our maritime defense, submarines below, corvettes on the surface, frigates at range, mines at the straits and coastal missiles on every significant island, has been integrated into a single doctrine of sea denial. We have not built the largest navy in the Mediterranean. We have built the most dangerous one for anyone who tries to take what is ours."
 GRE_eastern_med_doctrine: "Beyond the Aegean"
 GRE_eastern_med_doctrine_desc: "Greek interests do not end at the Dodecanese. Our EEZ rights south of Crete, our commitment to Cyprus, our energy partnerships with Israel and Egypt and our role as a NATO anchor in the Eastern Mediterranean all require a navy that can operate far from home ports for extended periods. We will build a fleet that is credible not just in the Aegean but across the entire Eastern Mediterranean theatre. Greece must be present where its interests are."
 GRE_asw_training: "Hunting Submarines"
 GRE_asw_training_desc: "Anti-submarine warfare is the most demanding and most neglected skill in the Hellenic Navy. Our new frigates carry world-class ASW sensors and torpedoes but the crews who operate them need years of dedicated training before they can use them effectively. We will build a permanent ASW training programme drawing on the expertise of our own submarine force to teach our surface crews how an enemy submarine thinks, moves and hides. The best way to hunt a submarine is to understand one."
 GRE_fleet_coordination: "Single Naval Command"
 GRE_fleet_coordination_desc: "Operating across the Eastern Mediterranean requires a level of coordination that fragmented squadron commands cannot provide. We will restructure the Hellenic Navy under a single operational command authority with real-time awareness of every surface ship, submarine and maritime patrol aircraft at sea. A fleet that fights as one is worth far more than the sum of its individual ships."
 GRE_eastern_med_taskforce: "Mediterranean Operational Mastery"
 GRE_eastern_med_taskforce_desc: "The Aegean is ours. The Mediterranean must be too. We restructure our training pipeline, reform fleet command rotations and run extended green-water deployments until our task forces can find, track and destroy any hostile fleet across the full length of the Mediterranean. Presence is power. We intend to have both."

 #National Spirits
 GRE_landforces_modifier: "Hellenic Army"
 GRE_landforces_modifier_desc: "Greece fields a battle-hardened land force shaped by decades of Aegean tension. Our army is trained, equipped and positioned to defend every meter of Greek soil."
 GRE_airforce_modifier: "Hellenic Air Force"
 GRE_airforce_modifier_desc: "The Hellenic Air Force controls the skies over the Aegean. Our pilots are among the most experienced in NATO, forged by daily intercepts and contested airspace."
 GRE_navy_modifier: "Hellenic Navy"
 GRE_navy_modifier_desc: "Greece is a maritime nation. Our fleet of frigates, submarines and fast attack craft patrols waters that have been Greek since antiquity."
 GRE_cold_war_giant_1: "Cold War Army"
 GRE_cold_war_giant_1_desc: "Our army was built to stop a Soviet thrust through the Balkans — massive, dug in and designed for attrition. That war never came. We now field oversized formations that are expensive to man, slow to maneuver and trained for a battlefield that no longer exists."
 GRE_aircraft_bad_1: "Cold War Air Force"
 GRE_aircraft_bad_1_desc: "Our air fleet is a patchwork of Cold War acquisitions. Large airframes are costly to produce and our pilots lack the doctrine and range to project power beyond the Aegean. Strategic aviation and airborne surveillance remain critical gaps."
 GRE_navy_bad_1: "Cold War Navy"
 GRE_navy_bad_1_desc: "Our fleet is large on paper but fragmented in practice. Secondhand hulls from three different navies mean three different logistic chains. We burn fuel we cannot afford, our anti-air coverage has critical gaps and our officers are trained for coastal patrol rather than fleet command."
 GRE_defense_industry_modifier: "Arsenal of the Aegean"
 GRE_defense_industry_modifier_desc: "From the shipyards of Skaramangas to the arms factories of Piraeus, Greek industry has supplied the Hellenic Armed Forces for generations. We do not depend on others to defend ourselves."
 GRE_research_hubs_idea_tt: "[GREresearchhubidea]"
 GRE_archipelagos_defense_plan: "Shield of the Aegean"

 # Decisions
 GRE_defense_innovation_research_mission: "Defense Innovation Research Cycle"
 GRE_defense_innovation_research_mission_desc: "The Hellenic Defense Innovation Center drives continuous research across all branches of the armed forces. Every 100 days, a breakthrough may emerge in armor, artillery, infantry systems, aviation, or naval technology."
 GRE_aegean_survey: "Aegean Seabed Survey"
 GRE_aegean_survey_desc: "We map what is ours. A full geological survey of the Aegean seabed will establish the extent of our hydrocarbon reserves and lay the groundwork for extraction."
 GRE_aegean_surveyed: "Aegean Waters Mapped"
 GRE_aegean_extraction: "Aegean Oil Extraction"
 GRE_aegean_extraction_desc: "The surveys are complete. We begin extracting from the Aegean fields. Greek oil from Greek waters for the Greek economy."
 GRE_aegean_extracting: "Aegean Oil Extracted"
 GRE_aegean_offshore_industry: "Aegean Offshore Industry"
 GRE_aegean_offshore_industry_desc: "Extraction generates industry. We build the supporting infrastructure to process and distribute what we pull from the Aegean seabed."
 GRE_crete_survey: "South Cretan Seabed Survey"
 GRE_crete_survey_desc: "The waters south of Crete hold significant untapped potential. We extend our survey operations into the Ionian and Levantine basins."
 GRE_crete_surveyed: "Cretan Waters Mapped"
 GRE_crete_extraction: "South Cretan Oil Extraction"
 GRE_crete_extraction_desc: "The deepest Greek waters yield the greatest reserves. We begin extraction south of Crete and secure the economic future of the nation."
 GRE_crete_extracting: "Cretan Oil Extracted"
 GRE_crete_offshore_industry: "South Cretan Offshore Industry"
 GRE_crete_offshore_industry_desc: "The southern fields are producing. We build the industrial capacity to turn raw extraction into lasting economic output."

 #Opinion Modifier
 TUR_naval_expansion_response: "Naval Expansion Programme"
 TUR_naval_expansion_response_desc: "In response to Greek maritime assertiveness, Turkey accelerates its naval construction programme. Dockyards operate at increased capacity to close the gap in the Eastern Mediterranean."
