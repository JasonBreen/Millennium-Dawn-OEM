l_english:

 GRE_hellenic_economy: "The Hellenic Economy"
 GRE_hellenic_economy_desc: "Greece stands at a crossroads. Our ancient land gave birth to democracy and civilization. Now the economy looms on a knife's edge. Mounting debt, unemployment, and Eurozone ascension threaten disaster. Yet we have advantages: strategic position, merchant fleet, and tourism drawing millions to our shores."
 GRE_debt_mounts: "The Debt Mounts"
 GRE_debt_mounts_desc: "Our debt has ballooned to nearly 300 billion dollars, among the highest per capita. Interest payments consume vast portions of our budget, leaving little for investment. Foreign bankers grow restless, the EU demands answers. We must act before this crisis consumes us."
 GRE_greek_bonds: "Greek Bonds"
 GRE_greek_bonds_desc: "Greek bonds are synonymous with risk in international markets. Yet bonds remain vital for raising capital without surrendering sovereignty. By issuing new government securities, we can fund infrastructure and reforms. We must convince investors Greece is a sound bet."
 GRE_solve_evasion: "Solve Tax Evasion"
 GRE_solve_evasion_desc: "Billions of our revenue slips through our fingers annually due to tax evasion. By strengthening tax collection, investing in technology, and cracking down on offshore accounts we can assure that the loopholes are closed and our budget is further stabilized."
 GRE_convert_to_euro: "Convert to the Euro"
 GRE_convert_to_euro_desc: "The Euro represents both opportunity and peril. By adopting it, we tie our fate to Europe. Our drachma fluctuated wildly; the Euro promises stability. But we surrender monetary control. Do we embrace Europe or maintain financial independence?"
 GRE_skouries_mines: "Skouries Mines"
 GRE_skouries_mines_desc: "Beneath Halkidiki lies the Skouries copper-gold deposit, one of Europe's largest. Foreign corporations seek extraction rights, promising wealth and jobs. Environmentalists warn of devastation. We must balance economic needs with protecting our sacred earth."
 GRE_local_manufacturing: "Local Manufacturing"
 GRE_local_manufacturing_desc: "Greek factories sit silent while foreign goods flood our markets. We have skilled workers and craftsmanship traditions. We lack the will to invest in ourselves. By supporting local manufacturers with incentives and contracts, we can rebuild industry and provide employment."
 GRE_military_industrial: "Hellenic Arms Industry Subsidization"
 GRE_military_industrial_desc: "Despite being state-owned since the 1970s, Hellenic Arms Industry is heavily subsidized in the interest of national defense. Focusing additional and targeted subsidies can help the company expand and potentially look at acquiring the privately-owned Pyrkal to further expand its capabilities."
 GRE_agriculture_sector: "Agriculture Sector"
 GRE_agriculture_sector_desc: "Greek farmers have worked rocky soil since Mycenae, coaxing olives, grapes, and grains from unyielding land. Today agriculture faces EU quotas, foreign competition, aging farmers. Yet our products remain unrivaled—Kalamata olives, Feta cheese, Assyrtiko wine. We must protect farmers and invest in modern techniques."
 GRE_power_corporations: "Power Corporations"
 GRE_power_corporations_desc: "Energy powers the modern world. He who controls wires and pipelines controls destiny. Greece depends on imported oil and gas, leaving us vulnerable. By developing domestic energy, power plants, grids, and distribution, we can achieve energy independence. These corporations will be among the most powerful."
 GRE_austerity_measures: "Austerity Measures"
 GRE_austerity_measures_desc: "Reduced pensions, raised taxes, eliminated benefits—these are creditor demands. Without austerity, we face bankruptcy; with it, we face wrath. Protests will erupt, strikes will paralyze Athens. We must make hard choices."
 GRE_debt_refactoring: "Strategic Debt Restructuring"
 GRE_debt_refactoring_desc: "Our debt is currently crushing us and we cannot reasonably continue the pacing we have laid out. The issuance of bonds for quick cash did not help us nearly as much as planned and we need to strategically... restructure some debt in other vehicles and avenues to ensure proper stability. "
 GRE_ilarionas_hydro: "Ilarionas Hydroelectric"
 GRE_ilarionas_hydro_desc: "In northern Greece's mountains, the Ilarionas river rushes with tremendous force. Hydroelectric power is clean, renewable, and reliable. Unlike solar or wind, it works when needed, storing energy in reservoirs. This project will power hundreds of thousands while respecting mountain villages."
 GRE_telecomms: "OTE Investments"
 GRE_telecomms_desc: "Diverting some state-funds to the company Hellenic Telecommunications Organization (OTE) in the form of subsidies and other targeted programs we can expand our access to network infrastructure all across our country."
 GRE_new_railways: "Athens-Thessaloniki Rail Line Revitalization"
 GRE_new_railways_desc: "Revitalizing the Athenian-Thessaloniki rail line and expanding the available lines and trains between the two major cities can help spur additional productivity across the region and emphasize additional economic development in the mainland."
 GRE_highway_initiatives: "Extend the AX Highways"
 GRE_highway_initiatives_desc: "The dense and heavily mountainous mainland ensures that developing our country's infrastructure is a challenge and deeply complex issue. Despite this challenge we must continue to expand the highways both for our defense and our economic prosperity. There are a large number of proposed AX highways that are available for construction, but we will need to divert funds from other parts of the government to handle the construction in the meantime."
 GRE_hellas_gold: "Deepen the Kassandra Mines"
 GRE_hellas_gold_desc: "" # TODO: Add a description
 GRE_euboea_bauxite_deposits: "Euboea Bauxite Deposits"
 GRE_euboea_bauxite_deposits_desc: "" # TODO: Add a description
 GRE_industrial_lignite_mining: "Industrial Lignite Mining"
 GRE_industrial_lignite_mining_desc: "" # TODO: Add a description
 GRE_rare_element_prospecting: "Rare Element Prospecting"
 GRE_rare_element_prospecting_desc: "" # TODO: Add a description
 GRE_transport_sector: "Transport Sector"
 GRE_transport_sector_desc: "Buses, trams, metros, ferries form the circulatory system of Greek economic life. Without efficient transport, goods cannot reach markets, workers cannot reach jobs, tourists cannot reach beaches. By modernizing fleets, expanding routes, and integrating systems, we can serve all Greeks."
 GRE_vintage_wines: "Vintage Wines"
 GRE_vintage_wines_desc: "Since Dionysus taught winemaking, Greece has produced wines fit for gods. Assyrtiko, Agiorgitiko, Xinomavro rival the finest French vintages. Too few outside Greece know our heritage. By promoting wines internationally, investing in vineyards, and developing wine tourism, we can make Greek wine a global brand."
 GRE_tobacco_plantations: "Tobacco Plantations"
 GRE_tobacco_plantations_desc: "For centuries, Greek tobacco has been prized worldwide. Though smoking declines in the West, demand remains strong elsewhere, providing vital income to farmers. We must support cultivators while helping them transition to new crops where possible."
 GRE_gas_oil_plants: "Gas and Oil Plants"
 GRE_gas_oil_plants_desc: "The refineries of Aspropyrgos and Eleusis process crude oil, turning black gold into fuels. Yet facilities age, pollution settles, and efficiency lags. By investing in new refining capacity, cleaner technologies, and expanded storage, we can remain a regional energy hub."
 GRE_aegean_pipelines: "Aegean Pipelines"
 GRE_aegean_pipelines_desc: "The Aegean Sea has been a trade highway since the Minoans. Today we can make it an energy highway. Pipelines through Aegean islands connecting to Turkey, the Balkans, and Central Europe would transform Greece into an energy corridor. Geopolitics are complex, investments enormous, but rewards immense."
 GRE_trim_the_fat: "Trim the Fat"
 GRE_trim_the_fat_desc: "Government has grown bloated, inefficient, and corrupt. Ministries overflow with unnecessary employees, contracts go to friends and family, bureaucracy strangles initiative. We must slim down—not through reckless cuts, but by eliminating waste, automating tasks, and demanding accountability."
 GRE_debt_swaps: "Yen Debt Swaps"
 GRE_debt_swaps_desc: "In international finance, creative instruments provide relief. By swapping debt into yen-denominated bonds, we can reduce Eurozone volatility exposure. This requires sophisticated engineering and trusted banking partners, but offers a path to manage debt without political pain."
 GRE_western_shipping_magnate: "Western Shipping Magnate"
 GRE_western_shipping_magnate_desc: "Greek shipowners control a massive portion of the world's merchant fleet. From Piraeus magnates to sailors, this industry is woven into our fabric. By supporting Greek shipping with incentives, port facilities, and maritime education, we can ensure the seas remain Greek."
 GRE_olympic_airways: "Olympic Airways"
 GRE_olympic_airways_desc: "Founded by Aristotle Onassis, Olympic Airways connected Greece to the world in an age of glamour. Though the airline has struggled, the Olympic name still evokes magic. By revitalizing our carrier, we can ensure visitors arrive with their first impression being Greek hospitality."
 GRE_trainose: "TrainOSE"
 GRE_trainose_desc: "The Greek railway system, once neglected, has seen new life. TrainOSE operates passenger and freight services connecting Athens to Thessaloniki, the Peloponnese to the mainland. By expanding routes, improving schedules, and investing in rolling stock, we can make rail a genuine alternative."
 GRE_cotton_plantations: "Cotton Plantations"
 GRE_cotton_plantations_desc: "Greek cotton from Thessaly and Macedonia is among the world's finest. Strong fibers, brilliant whiteness, perfect for textiles. Our cotton once clothed armies and adorned runways. By supporting farmers and investing in manufacturing, we can recapture this heritage."
 GRE_fisheries_expansion: "Fisheries Expansion"
 GRE_fisheries_expansion_desc: "The Aegean and Ionian Seas teem with life. Greek fishermen have worked these waters for millennia, facing overfishing, pollution, and foreign competition. By expanding our fleet, developing aquaculture, and enforcing sustainable quotas, we can ensure the sea continues to feed our nation."
 GRE_aegean_wind_banks: "Aegean Wind Banks"
 GRE_aegean_wind_banks_desc: "The Aegean winds have powered ships and ground grain for millennia. Now they can power our homes. Wind farms on islands can generate enormous clean energy, reducing dependence on imported oil and coal. The wind never stops; it's as reliable as the sun."
 GRE_prinos_basin: "Prinos Basin"
 GRE_prinos_basin_desc: "Off Thassos lies the Prinos offshore oil field—Greece's largest domestic crude source. Though production has declined, new exploration and enhanced recovery could breathe life into this asset. Developing it would reduce imports, create jobs, and provide a domestic refining foundation."
 GRE_resolution_crisis: "Resolution Crisis"
 GRE_resolution_crisis_desc: "For too long, we've merely managed our economic crisis—treating symptoms while the disease festers. The time has come for true resolution: a comprehensive plan addressing debt, growth, banking, and reform. This requires sacrifice from all, but offers the only path to prosperity."
 GRE_merchant_marine: "Merchant Marine"
 GRE_merchant_marine_desc: "The Greek merchant marine is a strategic asset of the first magnitude. Our ships transport oil, goods, and passengers across every ocean, projecting influence worldwide. By maintaining this fleet, training sailors, and supporting shipyards, we preserve a legacy stretching to Jason and the Argonauts."
 GRE_harbor_renovations: "Harbor Renovations"
 GRE_harbor_renovations_desc: "From ancient Piraeus to the smallest fishing harbor, Greek ports are gateways to the world. Many have fallen into disrepair—cracked concrete, rusted cranes, outdated equipment. By investing in modernization—deeper berths, better handling, improved facilities—we can remain competitive in global trade."
 GRE_urban_railways: "Urban Railways"
 GRE_urban_railways_desc: "Expanding urban railways is paramount for our future. The system doesn't reach many neighborhoods, and other cities lack metro service. By expanding throughout Greece, we can reduce congestion, decrease pollution, and improve quality of life for millions."
 GRE_helleniq_energy: "HelleniQ Energy"
 GRE_helleniq_energy_desc: "In the modern economy, energy is power. Ensuring that HelleniQ Energy remains on top is paramount for the continued success of the Greek economy."
 GRE_north_macedonian_pipelines: "Construct the Thessaloniki-Skopje Pipeline"
 GRE_north_macedonian_pipelines_desc: "Our northern neighbors in [FYR.GetName] have brought proposals and potential deals about the establishment of a pipeline between Thessaloniki and Skopje to help ensure mutual energy reliance for the region."
 GRE_turkish_pipeline: "Turkey-Greece Gas Pipeline"
 GRE_turkish_pipeline_desc: "Constructing an extended pipeline from the city of Karacabey to Komotini will help transport gas from the eastern half of Turkey and the Caucasus to European markets. Delivering additional economic growth and establish deeper mutual economic and energy ties between us and the Turks."
 GRE_ionian_solar: "Ionian Solar"
 GRE_ionian_solar_desc: "The Ionian islands bask in endless summer sunshine. By installing massive solar farms on Corfu, Lefkada, and Zakinthos, we can tap this renewable resource, reducing emissions and dependence on imported fossil fuels. The sun is free; we must only harness it."
 GRE_drydock_renovations: "Drydock Renovations"
 GRE_drydock_renovations_desc: "A navy requires more than ships. It needs facilities to maintain them. The drydocks of Salamis and elsewhere have served the Hellenic Navy for generations, but age and neglect have taken their toll. By modernizing with deeper basins, heavier lifts, and modern equipment, we ensure our fleet remains operational."

 greece_focus: "Greek Focus Tree"
 #opinion_modifiers
 earthquake_diplomacy: "Earthquake Diplomacy"
 airspace_violations: "Airspace Violations"
 #ideas
 GRE_debt_crisis: "Debt Crisis"
 GRE_debt_crisis_desc: "Greece has 300 billion dollars in external debt - one of the largest in the world. This has created a huge problem for us, as the debt is rapidly rising and creating massive problems for our economy. We will have to find a way to solve the debt problem before it gets out of hand."
 GRE_legacy: "Greek Legacy"
 GRE_legacy_desc: "Greece has a rich history, the rise and fall of many empires. After the loss of Byzantium we lost control of our homeland. Ever since 1821 we have promised such a loss would never befall the Greek people again."
 GRE_constitutional_crisis: "Constitutional Crisis"
 GRE_constitutional_crisis_desc: "The Constitution is the last thing we need to deal with before finally solidifying ourselves in power and rebuilding Greece the way we envision it."
 #industry ideas
 GRE_glass_cannon: "Glass Cannon Economics"
 GRE_glass_cannon_desc: "The [GRE.GetAdjective] economy thrives during periods of growth, but quickly unravels when faced with downturns. This vulnerability stems from our heavy dependence on foreign investment, tourism, and imported goods. To secure our future, we must strengthen our economic resilience, or risk being left behind or worse, collapsing under the weight of debt and mismanagement."
 GRE_com_promote_local: "Local Business Promotion"
 GRE_com_promote_local_desc: "We have instituted laws that allow us to promote local business and commerce to support the backbone of our economic growth."
 GRE_booming_arms: "Booming Arms Industry"
 GRE_booming_arms_desc: "A common side-effect of subsidizing an entire industry."
 GRE_efficient_elvo: "Efficient Government Industry"
 GRE_efficient_elvo_desc: "The government-owned industries are exceptionally well-managed."
 GRE_resources: "Resource Deposits Nationalized"
 GRE_resources_desc: "We have nationalized all of the natural resource deposits in Greece for utilization by the state. This allows us to better allocate resources to our factories instead of other wasteful things."
 GRE_construction_focus: "Construction Material Focus"
 GRE_construction_focus_desc: "By prioritising the construction materials industry we can ensure that we will always have a surplus of such materials for our projects."
 GRE_austerity_idea: "Austerity Tensions"
 GRE_austerity_idea_desc: "As we continue to implement austerity measures, the people of Greece are becoming increasingly discontented. This discontent is growing and will eventually lead to riots if we do not act quickly. The worse that the situation becomes the more likely it is to devolve into something so much more serious."
 #dynamic modifiers
 GRE_drift_modifiers: "Political Drift"
 GRE_debt_modifier: "The Debt Crisis"
 GRE_debt_modifier_desc: "The debt crisis has harsher effects depending on how we manage our money. However, spending more money to create jobs will benefit us in the long term."
 #fascist ideas
 GRE_immigrants_barred: "Immigration Suspended"
 GRE_immigrants_barred_desc: "The government has suspended all immigration into Greece until further notice. That notice may or may not ever come."
 GRE_metaxism_idea: "Metaxism"
 GRE_metaxism_idea_desc: "Metaxism refers to the fascist ideology found in Greece between 1936 and 1941, that largely rescued Greece from the internal turmoil it was facing until the Germans invaded."
 GRE_indoctrinate_youth: "Indoctrinate the youth"
 GRE_indoctrinate_youth_desc: "The democratic governments have sadly left the youth of our country without a future. We must therefore earn the trust of the youth to successfully take national leadership."
 #communist ideas
 GRE_wild_unions: "Wild Labour Unions"
 GRE_wild_unions_desc: "We gave unions power and they are using it - we see no problem with this."
 GRE_wild_unions_2: "Wild Labour Unions"
 GRE_wild_unions_2_desc: "The labour unions were given great freedom during our climb to power. Now that we are victorious we appeal to them only to ensure we have the heart of the people before completely securing our power base."
 GRE_wild_unions_3: "Wild Labour Unions"
 GRE_wild_unions_3_desc: "The labour unions are simply unbearable, we cannot stand them any longer! They began as a nuisance, but they have become an obstruction to the will of the state, they must be pacified or destroyed!"
 GRE_press_opposition: "Media Opposition"
 GRE_press_opposition_desc: "The media has not depicted us in the best of light ever since we restored order to the government, but it is only logical that the weak should fear the strong."
 GRE_one_party: "One-Party State"
 GRE_one_party_desc: "After declaring that KKE is the only political party permitted in Greece, we have the power to do whatever we want, but at the cost of blood to be shed to ensure our people are subservient."
 GRE_reorganize_army_idea: "Reorganizing the Army"
 GRE_reorganize_army_idea_desc: "We can not simply defund the army to the point of dysfunction. The time may come where we will need powerful armed forces, and for this eventuality we will ensure our army is loyal and ready."
 GRE_new_army_idea: "A New Army"
 GRE_new_army_idea_desc: "We have seen great success in the police taking over the role of the primary defensive force. However, we know they are not equipped enough to the point where they can repel foreign invasion. We will build a new army focused solely on the defense of Greece to ensure the safety of our people."
 GRE_red_army_idea: "A Red Army"
 GRE_red_army_idea_desc: "We have instilled ideological fanaticism deep into not only the ranks of our army, but the civilian population as well, ensuring we will have the manpower and loyalty needed to field a formidable army."
 GRE_cracked_foundation: "A Cracked Foundation"
 GRE_cracked_foundation_desc: "The foundation of the state has been contradicted so many times at this point that if we continue down our current path we could face a terrible new revolution. \n\n§RIf our stability falls below 30%, we will face revolution in Greece!§!"
 GRE_militarist_education_idea: "Militarist Education"
 GRE_militarist_education_idea_desc: "The education system has instilled values of the military into its curriculum, allowing for a greater state of readiness in case of sudden attacks."
 GRE_elam: "National Popular Front Resurgence"
 GRE_elam_desc: "The National Popular Front has greatly expanded its efforts across the board to sway the mind of the average voter. We suspect Greece is the cause of this 'disruption'."

 # Decisions
 # Austerity Measures Decisions
 GRE_debt_crisis_category: "The Greek Debt Crisis"
 GRE_debt_crisis_category_desc: "Despite our economic growth our debt continues to mounting to larger and larger amounts whether it be from ineffective government spending, maturing bonds that we need to pay, or just regular budget concerns. We need to cope with our debt before it becomes a problem... or it can be a tool for ensuring our continued prosperity into the new millennia."
