 # Cyprus Dispute Decisions
 GRE_CYP_category: "The Cyprus Dispute"
 GRE_CYP_category_desc: "Since 1974, Cyprus has been divided between the Turkish Republic of Northern Cyprus and the Republic of Cyprus, following a Greek-backed coup that nearly united the island with Greece. In response, Turkey invaded, resulting in the ongoing partition of Cyprus—the second longest military occupation in the modern era, surpassed only by that in Israel.\n\n§YGreek-Cypriot Strength:§! §C[?145.GRE_SUPPORT]%§!\n§YTurkish-Cypriot Strength:§! §C[?146.GRE_SUPPORT]%§!\n\n§CThe first side to reach 100 strength will unify Cyprus under their rule!§!"
 GRE_guarantee_turkish_property: "Spark Unification Protests across Cyprus"
 GRE_guarantee_turkish_property_desc: "By creating the desire for unity, we will create chaos all across Cyprus, giving us the opportunity to grow our own strength while the Turks are busy dealing with the protests"
 GRE_please_south: "Please the Greek Cypriots"
 GRE_please_south_desc: "By continuing to please the Greek Cypriots, we can ensure that they will be more likely to support us in our quest to unify Cyprus and ultimately the goal of Enosis."
 GRE_please_north: "Anti-Turkish Propaganda"
 GRE_please_north_desc: "Reinforcing that the Turkish Cypriots are not Greek nor are they Cypriots. They are colonizers and invaders that must be driven out of Cyprus."
 TUR_CYP_incite_riot: "Incite Riots in Southern Cyprus"
 TUR_CYP_incite_riot_desc: "It is time we start to incite riots in Southern Cyprus to ensure that the Greeks are not able to gain political clout in the region."
 TUR_CYP_propaganda_north: "Northern Anti-Greek Propaganda"
 TUR_CYP_propaganda_north_desc: "Reinforcing and spreading propaganda to the Northern Cypriots to ensure that they are not swayed by the Greeks is paramount to our success in the region."
 TUR_CYP_propaganda_south: "Southern Anti-Greek Propaganda"
 TUR_CYP_propaganda_south_desc: "Reinforcing and spreading propaganda to the Southern Cypriots to ensure that they are not swayed by the Greeks is paramount to our success in the region."
 TUR_attack_CYP_strength: "Attack Greek-Cypriot Strength"
 TUR_attack_CYP_strength_desc: "By attacking the Greek-Cypriot strength, we can ensure that they are not able to gain political clout in the region."
 GRE_attack_turkish_strength: "Attack Turkish-Cypriot Strength"
 GRE_attack_turkish_strength_desc: "By attacking the Turkish-Cypriot strength, we can ensure that they are not able to gain political clout in the region."
