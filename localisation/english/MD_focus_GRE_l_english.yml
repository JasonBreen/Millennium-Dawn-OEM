 # MILITARY MODERNISATION — Focus names & descriptions
 GRE_vision_2030: "Military Vision"
 GRE_vision_2030_desc: "Our armed forces have fallen behind after years of austerity and outdated Cold War thinking. We have aging equipment, bloated structures, and a military that doesn't reflect the threats we face. This plan is the most ambitious defense reform in modern Greek history."
 GRE_armored_transition: "Armored Transition"
 GRE_armored_transition_desc: "The BMP-1 and M48 Patton have served their time. Retiring our Cold War armor and transitioning to the Leopard 2 in its Hellenic variant will give our armored brigades a tank force that can match anyone in the region."
 GRE_pzh_2000: "PzH 2000 Howitzers"
 GRE_pzh_2000_desc: "Our artillery needs to keep up with modern armored warfare. The PzH 2000 self-propelled howitzer would give our forces precision fire at range and make sure our ground commanders always have effective indirect fire support."
 GRE_m270_mlrs: "M270 MLRS"
 GRE_m270_mlrs_desc: "Covering island landings and striking coastal targets across the Aegean requires firepower that goes beyond the front line. The M270 multiple launch rocket system would give our army that kind of reach."
 GRE_puls_rocket: "PULS Rocket System"
 GRE_puls_rocket_desc: "Through the EURO-PULS joint program with Israel and our European partners, we can field a precision rocket artillery system capable of hitting targets at extended range. This would make any adversary in the Aegean think twice."
 GRE_special_warfare_command: "Special Warfare Command"
 GRE_special_warfare_command_desc: "Unifying our EKAM units, raider brigades, combat divers, and paratroopers under a single Special Warfare Command would give us an elite force that can operate across our islands and beyond. In modern warfare, small and lethal units can decide outcomes that entire divisions cannot."
 GRE_archipelagos_strategy: "Archipelagos Strategy"
 GRE_archipelagos_strategy_desc: "Our thousands of islands are not a liability. With proper defense and a coherent doctrine, they become a layered barrier that no enemy fleet can cross without taking heavy losses. We should use the geography of the Aegean to our advantage."
 GRE_f16_modernisation: "F-16 Modernisation"
 GRE_f16_modernisation_desc: "Upgrading 83 of our F-16s to the Block 70/72 Viper standard through the Hellenic Aerospace Industry would keep our fighter fleet in good shape while also building the domestic expertise we need for future F-35 maintenance."
 GRE_intl_flight_training: "International Flight Training Center"
 GRE_intl_flight_training_desc: "Opening our flight training facilities to allied nations would build goodwill, deepen military ties, and give our own pilots experience training against international standards."
 GRE_new_transport_helicopters: "New Transport Helicopters"
 GRE_new_transport_helicopters_desc: "Quick transport between our islands is essential for island defense. Fielding 35 UH-60M Black Hawks alongside our MH-60R Seahawks would give us the lift capacity to reinforce any threatened position before the enemy can dig in."
 GRE_f35_program: "F-35 Program Collaboration"
 GRE_f35_program_desc: "Joining the F-35 program gives us a fifth generation stealth fighter that no one in the region can match. The contract signed in July 2024 is a major milestone for the Hellenic Air Force and puts our pilots ahead of anyone else in the Aegean."
 GRE_patriot_air_defense: "Patriot Air Defense Systems"
 GRE_patriot_air_defense_desc: "Our Nike Hercules batteries are too old to deal with modern threats. Upgrading to the Patriot PAC-3 with MSE interceptors would finally give Greece a real defense against ballistic missiles and protect our critical infrastructure."
 GRE_centauros_anti_drone: "Centauros Anti-Drone System"
 GRE_centauros_anti_drone_desc: "The Centauros C-UAS system was developed by the Hellenic Aerospace Industry and proven in Red Sea operations. Deploying it across our islands, naval bases, and airfields is a priority. Drones are the biggest threat in modern warfare and we need to be able to counter them."
 GRE_achilles_shield: "Achilles Shield"
 GRE_achilles_shield_desc: "Integrating our Patriot batteries, Centauros drone defenses, and coastal missile systems into one unified network covering the entire Aegean would create an anti-access zone that makes any attack on Greek territory extremely costly."
 GRE_kimon_class_frigate: "Kimon Class Frigate"
 GRE_kimon_class_frigate_desc: "After years of cancelled programs, we have finally signed with Naval Group for three FDI HN frigates with an option for a fourth. The Kimon class will give the Hellenic Navy a proper surface combatant that can stand up to any fleet in the region."
 GRE_hydra_class_upgrade: "Hydra-class Modernisation"
 GRE_hydra_class_upgrade_desc: "The Hydra-class frigates are MEKO 200HN vessels built at Skaramangas in the 1990s and they form the backbone of our surface combatant force. A mid-life upgrade to their radar, electronic warfare suites, and anti-ship missiles would keep them combat-effective for decades to come."
 GRE_elli_class: "Elli-class Replacement Programme"
 GRE_elli_class_desc: "The Elli-class frigates are old Dutch Van Speijk-class vessels transferred to us in the 1980s and they have long exceeded their lifespan. We need replacement hulls, either built domestically at Skaramangas or acquired from abroad, to restore our frigate strength."
 GRE_roussen_attack_craft: "Roussen Class Fast Attack Craft"
 GRE_roussen_attack_craft_desc: "The Aegean is not an open ocean, it is tight waters perfect for fast attack craft. The Roussen class is built for exactly this: fast, missile-armed, and lethal at close range. A new generation of these craft could deny any hostile fleet access to Greek waters."
 GRE_fremm_frigate: "FREMM Multipurpose Frigates"
 GRE_fremm_frigate_desc: "Our fleet needs more ships. We can either acquire proven Italian FREMM frigates quickly or invest in a fifth FDI from Naval Group. Each option has different advantages in terms of speed, capability, and alliance relationships."
 GRE_submarine_expansion: "Type 214 Procurement Program"
 GRE_submarine_expansion_desc: "The Papanikolis class represents the best in conventional submarine warfare. Air-independent propulsion lets our boats stay underwater for weeks without surfacing. Expanding and sustaining this program would strengthen our control of the Aegean's undersea domain."
 GRE_bluewhale_submarines: "BlueWhale Submarines"
 GRE_bluewhale_submarines_desc: "Autonomous unmanned submarines from Israeli Aerospace would add a capability that no one in the region can match. These systems operate without crew and without risk, giving our navy a persistent undersea presence."
 GRE_defense_manufacturing: "Local Manufacturing Mandate"
 GRE_defense_manufacturing_desc: "A 25 percent local content requirement for all major defense programs would ensure that our domestic industry benefits from every contract. EAS, HAI, and our shipyards would grow stronger and we would reduce our dependence on foreign suppliers."
 GRE_research_hubs: "Research Hubs"
 GRE_research_hubs_desc: "Formal collaboration between our universities, the Hellenic Aerospace Industry, and the Ministry of Defense would create a pipeline of innovation for the armed forces."
 GRE_defense_innovation_center: "Hellenic Defense Innovation Center"
 GRE_defense_innovation_center_desc: "A dedicated innovation center connecting startups, universities, and defense industry partners would help speed up the development of next-generation military technology in Greece."
 GRE_communication_satellites: "Communication Satellites"
 GRE_communication_satellites_desc: "Dedicated military communications satellites would give us persistent overhead coverage of the Aegean and a secure communications backbone for all branches of the armed forces."
 GRE_theon_international: "Theon International Expansion"
 GRE_theon_international_desc: "Theon International has a strong global reputation for night vision and optical systems. Supporting their expansion into new export markets would generate revenue and build defense relationships while showing that Greek industry can compete at the highest level."
 GRE_industrial_synergy: "Industrial Synergy"
 GRE_industrial_synergy_desc: "Our defense programs work best when our industries cooperate. Formal coordination between HAI, our shipyards, EAS, and our research institutions would make every program faster, cheaper, and more capable."
 GRE_irix_loitering: "IRIX Loitering Munitions"
 GRE_irix_loitering_desc: "Hellenic Defence Systems has partnered with Paramount Industries to produce the IRIX, the first loitering munition made in Greece. With a range of up to 100 kilometers, it gives our forces a precision strike capability that can reach deep into enemy territory without relying on foreign suppliers."
 GRE_lora_ballistic: "LORA Ballistic Missile System"
 GRE_lora_ballistic_desc: "The LORA ballistic missile system from Israel Aerospace Industries would give us a long-range precision strike capability with a 400 kilometer range. That kind of reach changes the balance in the Aegean significantly and gives any potential adversary something serious to think about."
 GRE_iniochos: "Iniochos Exercise Program"
 GRE_iniochos_desc: "The annual Iniochos exercise at Andravida has become one of Europe's top multinational air training events. Expanding participation and making the scenarios more complex will sharpen our pilots and strengthen our military relationships with allied nations."
 GRE_grypas_ucav: "Grypas UCAV Program"
 GRE_grypas_ucav_desc: "The Hellenic Aerospace Industry has developed the Grypas, our first domestically designed combat drone. Investing in this program means we get an unmanned strike capability that is not dependent on foreign export restrictions or political conditions."
 GRE_strategic_transport_fleet: "Strategic Transport Fleet"
 GRE_strategic_transport_fleet_desc: "Our island defense is only as good as our ability to resupply and reinforce it. Modernizing our C-27J fleet and acquiring additional C-130H transports would make sure no garrison goes unsupported and no island gets left isolated in a crisis."
 GRE_constellation_co_production: "Constellation Class Co-Production"
 GRE_constellation_co_production_desc: "Together with the United States we have begun planning co-production of the FFG-62 Constellation class frigate. This partnership adds world-class warships to our fleet and develops the expertise and capacity of our shipyards at Skaramangas and Elefsina."
 GRE_eyes_of_poseidon: "Eyes of Poseidon"
 GRE_eyes_of_poseidon_desc: "We can't defend what we can't see. Integrating maritime patrol aircraft, coastal radar stations, and satellite imagery into a unified surveillance network would give us full awareness of the Aegean and Ionian seas."
 GRE_souda_bay_expansion: "Souda Bay Naval Base Expansion"
 GRE_souda_bay_expansion_desc: "Souda Bay is one of the most strategically valuable ports in the Mediterranean. Expanding our cooperation with the United States and NATO at this facility would strengthen our alliances and cement Greece's role as a key anchor on NATO's southern flank."
 GRE_alexandroupolis_strategic_hub: "Alexandroupolis Strategic Hub"
 GRE_alexandroupolis_strategic_hub_desc: "The port of Alexandroupolis has become a vital NATO logistics corridor to Eastern Europe, bypassing the Bosphorus entirely. Investing in its infrastructure and working more closely with Bulgaria and Romania would turn it into a permanent strategic asset."
 GRE_spike_atgm_integration: "Spike ATGM Integration"
 GRE_spike_atgm_integration_desc: "Our infantry and armored vehicles need a modern anti-tank guided missile that can hit targets beyond line of sight. Integrating the Spike missile family across our ground forces and naval patrol vessels would give every commander a precision strike option."
 GRE_stinger_manpads: "MANPADS Modernisation"
 GRE_stinger_manpads_desc: "Our island garrisons and forward units face aerial threats that big air defense batteries can't cover cost-effectively. Modernizing and expanding our Stinger MANPADS inventory would give every infantry unit and patrol vessel an organic air defense capability."
 GRE_infantry_digitisation: "Infantry Digitisation Program"
 GRE_infantry_digitisation_desc: "Modern soldiers need to share the same operational picture as the pilot overhead and the frigate offshore. Equipping our infantry with battlefield management systems, encrypted comms, and digital targeting equipment would connect them into the larger network instead of leaving them operating in isolation."
 GRE_sovereign_waters: "Sovereign Waters"
 GRE_sovereign_waters_desc: "For decades others have challenged our sovereign rights in the Aegean and Eastern Mediterranean and we didn't have the navy to do much about it. With a modernized fleet and proper island defenses, we can now assert what international law has always granted us. Our exclusive economic zone is ours."
 GRE_rheinmetall_greece: "Rheinmetall in Greece"
 GRE_rheinmetall_greece_desc: "Rheinmetall wants to set up local assembly and maintenance in Greece as part of future procurement deals. Formalizing this partnership and integrating their production into our domestic defense industry would strengthen our land forces modernization and make Greece a defense manufacturing hub in southeastern Europe."
 GRE_joint_operations_reform: "Joint Operations Reform"
 GRE_joint_operations_reform_desc: "Our three branches have spent decades operating separately with their own doctrines and command cultures. A unified joint operations framework that makes the army, navy, and air force plan, train, and fight together is essential. Everything else we want to do depends on this."
 GRE_new_army_doctrine: "From Mass to Maneuver"
 GRE_new_army_doctrine_desc: "The Hellenic Army was built to hold a line in Thrace with as many men as possible. That war never came. We need to restructure around smaller, faster brigade groups that can deploy across the Aegean quickly and respond to threats before they become crises."
 GRE_nco_reform: "The Backbone of the Army"
 GRE_nco_reform_desc: "Greek officers have always been expected to make every decision down to platoon level because NCOs were never given the authority or training to act on their own. Building a professional NCO corps that can lead and adapt without waiting for orders from above would make the army far more effective."
 GRE_thrace_to_aegean: "Reorienting the Army"
 GRE_thrace_to_aegean_desc: "For forty years our ground forces faced northeast toward the Evros river. That threat hasn't disappeared, but it is no longer our only concern. We should reorient our primary deployment toward the islands and coastlines of the Aegean, where sovereignty is tested every day."
 GRE_joint_fires_doctrine: "Combined Arms School"
 GRE_joint_fires_doctrine_desc: "Artillery, armor, infantry, and close air support have operated in separate silos for too long. Combined arms warfare needs to become the standard, with every unit training together. Our soldiers need to know how to work with air support, not just read about it."
 GRE_sead_doctrine: "Suppression of Enemy Defenses"
 GRE_sead_doctrine_desc: "Our pilots are among the most experienced in NATO for defensive counter-air over the Aegean, but offensive strikes against defended targets are still underdeveloped. We need a dedicated SEAD doctrine using the Rafale's SCALP and Meteor to take out enemy air defenses before strike packages go in."
 GRE_iniochos_as_doctrine: "Lessons from Iniochos"
 GRE_iniochos_as_doctrine_desc: "Every year Iniochos brings together pilots from twenty nations to learn what works in contested airspace. We have been running this exercise for years without fully translating the lessons into doctrine. The findings from each cycle should be formalized into updated tactics and procedures and adopted across the Hellenic Air Force."
 GRE_cas_doctrine: "Close Air Support Integration"
 GRE_cas_doctrine_desc: "The Hellenic Air Force and the Hellenic Army have rarely trained together at the level needed for effective close air support. A permanent joint training pipeline and standardized communication protocols are needed so ground commanders and fighter pilots can actually work together when it matters."
 GRE_aegean_fortress_doctrine: "The Aegean as Our Sea"
 GRE_aegean_fortress_doctrine_desc: "The Aegean is not an open ocean. It is a maze of six thousand islands, narrow straits, shallow banks, and choke points. A well-prepared defender can make this geography extremely dangerous for any attacking fleet. We need a navy that makes every approach to Greek territory a risk no one would want to take."
 GRE_aegean_fortress_doctrine_tt: "[GREadmiraldefenseeffect]"
 GRE_aegean_fortress_doctrine_effect: "Admirals: §G30% chance§! to gain §Y+1 Defense§! on level up."
 GRE_submarine_wolf_packs: "Submarine Warfare Doctrine"
 GRE_submarine_wolf_packs_desc: "Submarines are the most dangerous weapon in the Aegean. The water is too shallow for an enemy to hide but deep enough in the right places for ours. Training our crews to operate in coordinated groups, sharing targeting data and covering each other's patrol areas, would mean no surface fleet can move through the Aegean without being tracked from below."
 GRE_missile_corvette_network: "The Roussen Network"
 GRE_missile_corvette_network_desc: "Our Roussen class missile corvettes are fast and lethal, perfect for the Aegean, but they have never operated as a coordinated network. Integrating them with coastal radar, island sensors, and submarine contact reports into a single targeting picture would let any corvette engage any surface threat within minutes."
 GRE_aegean_minefield_doctrine: "The Mined Straits"
 GRE_aegean_minefield_doctrine_desc: "Greece has had a naval mining capability since World War II but it has never been properly integrated into doctrine. Pre-planned minefields for every major approach into the Aegean, ready to be activated within hours, would turn the straits into barriers that even a superior fleet can't safely cross."
 GRE_sea_denial_complete: "Fortress Aegean"
 GRE_sea_denial_complete_desc: "The Aegean Sea is now fully a Greek operational domain. Every layer of our maritime defense — submarines, corvettes, frigates, mines, and coastal missiles — has been integrated into a single doctrine of sea denial. We may not have the largest navy in the Mediterranean, but we have the most dangerous one for anyone trying to push into our waters."
 GRE_eastern_med_doctrine: "Beyond the Aegean"
 GRE_eastern_med_doctrine_desc: "Greek interests don't end at the Dodecanese. Our EEZ rights south of Crete, our commitment to Cyprus, and our energy partnerships with Israel and Egypt all require a navy that can operate far from home for extended periods. We need a fleet that is credible across the entire Eastern Mediterranean, not just the Aegean."
 GRE_asw_training: "Hunting Submarines"
 GRE_asw_training_desc: "Anti-submarine warfare is the most demanding and most neglected skill in the Hellenic Navy. Our new frigates have excellent ASW sensors and torpedoes but the crews need dedicated training to use them properly. A permanent ASW training programme that draws on our own submarine force would teach surface crews how enemy submarines actually operate."
 GRE_fleet_coordination: "Single Naval Command"
 GRE_fleet_coordination_desc: "Operating across the Eastern Mediterranean needs coordination that fragmented squadron commands can't provide. Restructuring the Hellenic Navy under a single operational command with real-time awareness of every ship, submarine, and patrol aircraft would make the fleet far more effective as a whole."
 GRE_eastern_med_taskforce: "Mediterranean Operational Mastery"
 GRE_eastern_med_taskforce_desc: "With the Aegean secured, we need to extend our reach across the Mediterranean. Restructuring our training pipeline, reforming fleet rotations, and running extended deployments will build the capability to track and engage any hostile fleet across the full length of the Mediterranean."

 #National Spirits
 GRE_landforces_modifier: "Hellenic Army"
 GRE_landforces_modifier_desc: "Greece fields a battle-hardened land force shaped by decades of Aegean tension. Our army is trained, equipped and positioned to defend every meter of Greek soil."
 GRE_airforce_modifier: "Hellenic Air Force"
 GRE_airforce_modifier_desc: "The Hellenic Air Force controls the skies over the Aegean. Our pilots are among the most experienced in NATO, forged by daily intercepts and contested airspace."
 GRE_navy_modifier: "Hellenic Navy"
 GRE_navy_modifier_desc: "Greece is a maritime nation. Our fleet of frigates, submarines and fast attack craft patrols waters that have been Greek since antiquity."
 GRE_cold_war_giant_1: "Cold War Army"
 GRE_cold_war_giant_1_desc: "Our army was built to stop a Soviet push through the Balkans. That war never came. We now have oversized formations that are expensive to man, slow to move, and trained for a battlefield that no longer exists."
 GRE_aircraft_bad_1: "Cold War Air Force"
 GRE_aircraft_bad_1_desc: "Our air fleet is a patchwork of Cold War era aircraft. Large airframes are expensive to maintain and our pilots lack the doctrine to project power beyond the Aegean. Strategic aviation and surveillance are major gaps."
 GRE_navy_bad_1: "Cold War Navy"
 GRE_navy_bad_1_desc: "Our fleet looks big on paper but it is a mess in practice. Secondhand hulls from three different navies mean three different logistics chains. Fuel costs are too high, anti-air coverage has gaps, and our officers are trained for coastal patrol rather than fleet operations."
 GRE_defense_industry_modifier: "Arsenal of the Aegean"
 GRE_defense_industry_modifier_desc: "From the shipyards of Skaramangas to the arms factories around Piraeus, Greek industry has been supplying the armed forces for generations. We have our own defense industry and we should use it."
 GRE_research_hubs_idea_tt: "[GREresearchhubidea]"
 GRE_archipelagos_defense_plan: "Shield of the Aegean"

 # Decisions
 GRE_defense_innovation_research_mission: "Defense Innovation Research Cycle"
 GRE_defense_innovation_research_mission_desc: "The Hellenic Defense Innovation Center drives continuous research across all branches of the armed forces. Every 100 days, a breakthrough may emerge in armor, artillery, infantry systems, aviation, or naval technology."
 GRE_aegean_survey: "Aegean Seabed Survey"
 GRE_aegean_survey_desc: "We map what is ours. A full geological survey of the Aegean seabed will establish the extent of our hydrocarbon reserves and lay the groundwork for extraction."
 GRE_aegean_surveyed: "Aegean Waters Mapped"
 GRE_aegean_extraction: "Aegean Oil Extraction"
 GRE_aegean_extraction_desc: "The surveys are complete. We begin extracting from the Aegean fields. Greek oil from Greek waters for the Greek economy."
 GRE_aegean_extracting: "Aegean Oil Extracted"
 GRE_aegean_offshore_industry: "Aegean Offshore Industry"
 GRE_aegean_offshore_industry_desc: "Extraction generates industry. We build the supporting infrastructure to process and distribute what we pull from the Aegean seabed."
 GRE_crete_survey: "South Cretan Seabed Survey"
 GRE_crete_survey_desc: "The waters south of Crete hold significant untapped potential. We extend our survey operations into the Ionian and Levantine basins."
 GRE_crete_surveyed: "Cretan Waters Mapped"
 GRE_crete_extraction: "South Cretan Oil Extraction"
 GRE_crete_extraction_desc: "The deepest Greek waters yield the greatest reserves. We begin extraction south of Crete and secure the economic future of the nation."
 GRE_crete_extracting: "Cretan Oil Extracted"
 GRE_crete_offshore_industry: "South Cretan Offshore Industry"
 GRE_crete_offshore_industry_desc: "The southern fields are producing. We build the industrial capacity to turn raw extraction into lasting economic output."

 #Opinion Modifier
 TUR_naval_expansion_response: "Naval Expansion Programme"
 TUR_naval_expansion_response_desc: "In response to Greek maritime assertiveness, Turkey accelerates its naval construction programme. Dockyards operate at increased capacity to close the gap in the Eastern Mediterranean."

 # Creditor Decision Category
 GRE_creditor_management_category: "Greek Debt Management"
 GRE_creditor_management_category_desc: "As a holder of Greek sovereign debt, we can adjust interest rates, call in portions of the debt, or forgive it entirely. Our current holdings generate regular interest income from Athens."

 # Creditor Negotiation Decisions
 GRE_propose_debt_deal: "Propose Debt Deal"
 GRE_propose_debt_deal_desc: "Propose that a foreign nation take on a portion of our national debt in exchange for regular interest payments. We will transfer 10% of our current debt to the selected creditor."
 GRE_propose_large_debt_deal: "Propose Major Debt Deal"
 GRE_propose_large_debt_deal_desc: "Propose that a foreign nation take on a substantial portion of our debt. We will transfer 25% of our current debt to the selected creditor, but at greater diplomatic cost."
 GRE_repay_creditor: "Repay Creditor"
 GRE_repay_creditor_desc: "Make a lump-sum payment to reduce our outstanding debt to this creditor by 10% of the amount owed."

 # Creditor Management Decisions
 GRE_creditor_raise_interest: "Raise Greek Interest Rate"
 GRE_creditor_raise_interest_desc: "Increase the interest rate we charge Greece on their debt by 0.5%. This will increase our income from Greek debt payments but may strain relations."
 GRE_creditor_lower_interest: "Lower Greek Interest Rate"
 GRE_creditor_lower_interest_desc: "Decrease the interest rate we charge Greece on their debt by 0.5%. This will reduce our income but improve relations with Athens."
 GRE_creditor_call_in_debt: "Call In Greek Debt"
 GRE_creditor_call_in_debt_desc: "Demand that Greece immediately repay 20% of the debt they owe us. This is a severe diplomatic action that may damage relations."
 GRE_creditor_forgive_debt: "Forgive Greek Debt"
 GRE_creditor_forgive_debt_desc: "Write off 25% of the debt Greece owes us as a gesture of goodwill. This will significantly improve relations with Athens."

 # Creditor Events
 greece_debt.10.t: "Greek Debt Proposal"
 greece_debt.10.d: "[FROM.GetName] has approached us with a proposal to take on a portion of their national debt. In exchange, we would receive regular interest payments on the held amount. The proposed sum is modest but represents a reliable income stream."
 greece_debt.10.a: "Accept the terms"
 greece_debt.10.b: "We are not interested"
 greece_debt.10.c: "Only at a higher rate"

 greece_debt.11.t: "Major Greek Debt Proposal"
 greece_debt.11.d: "[FROM.GetName] has approached us with a substantial proposal to absorb a large portion of their national debt. The amount is significant and represents considerable financial exposure, but the interest payments would be substantial."
 greece_debt.11.a: "Accept the terms"
 greece_debt.11.b: "The risk is too great"
 greece_debt.11.c: "Only at a premium rate"

 greece_debt.12.t: "Debt Deal Accepted"
 greece_debt.12.d: "[FROM.GetName] has agreed to take on a portion of our national debt. We will make regular interest payments to them, but our overall debt burden has been restructured."
 greece_debt.12.a: "A necessary arrangement"

 greece_debt.13.t: "Debt Deal Rejected"
 greece_debt.13.d: "[FROM.GetName] has declined our proposal to hold a portion of our debt. We must look elsewhere for relief or find other means to address our financial situation."
 greece_debt.13.a: "We will find another way"

 greece_debt.14.t: "Counter-Offer Received"
 greece_debt.14.d: "[FROM.GetName] is willing to hold our debt, but only at a higher interest rate than we initially proposed. The increased cost of servicing this debt must be weighed against the immediate relief it provides."
 greece_debt.14.a: "Accept the higher rate"
 greece_debt.14.b: "The terms are unacceptable"

 greece_debt.15.t: "Interest Rate Adjusted"
 greece_debt.15.d: "[FROM.GetName] has adjusted the interest rate on the debt they hold. Our payment obligations have changed accordingly."
 greece_debt.15.a: "Noted"

 greece_debt.16.t: "Debt Called In"
 greece_debt.16.d: "[FROM.GetName] is demanding immediate repayment of a portion of the debt we owe them. Failure to comply will damage our relationship and international credibility."
 greece_debt.16.a: "Pay what they demand"
 greece_debt.16.b: "We cannot afford this"

 greece_debt.17.t: "Debt Forgiven"
 greece_debt.17.d: "[FROM.GetName] has generously written off a portion of the debt we owe them. This unexpected relief eases our financial burden considerably."
 greece_debt.17.a: "A welcome relief"

 greece_debt.18.t: "Greek Debt Fully Repaid"
 greece_debt.18.d: "[FROM.GetName] has fully repaid all outstanding debt owed to us. While we lose a source of interest income, the repayment demonstrates fiscal responsibility."
 greece_debt.18.a: "The account is settled"

 # Existing debt event fix
 greece_debt.2.t: "Debt Swap Proposal"
 greece_debt.2.d: "[FROM.GetName] requests that we consider taking on a portion of their national debt through a swap arrangement."

 # Creditor Tooltips
 GRE_eligible_creditor_tt: "Must not be at war with Greece, be independent, not already a creditor, and have opinion above -50"
 GRE_debt_ratio_above_50_tt: "Debt-to-GDP ratio must be above 50%"
 GRE_debt_ratio_above_90_tt: "Debt-to-GDP ratio must be above 90%"
 GRE_has_positive_treasury_tt: "Must have treasury above 10"
 GRE_interest_rate_below_cap_tt: "Interest rate must be below 8%"
 GRE_interest_rate_above_min_tt: "Interest rate must be above 0.5%"
 GRE_creditor_holds_significant_debt_tt: "Must hold more than 10 in Greek debt"
 GRE_deferred_to_creditors_tt: "Deferred costs distributed proportionally to creditor nations"

 # Prospecting
 GRE_prospecting_category: "Greek Resource Prospecting"
 GRE_prospecting_category_desc: "Our geological surveys have identified promising mineral deposits across the Greek mainland and islands. With the right excavation technology and infrastructure, we can develop these sites into productive mines."
 GRE_prospecting_unlocked_tt: "Unlocks resource prospecting decisions"
 GRE_transport_sector_idea: "Hellenic Transport Network"

 GRE_halkidiki_prospecting: "Halkidiki Mining Expansion"
 GRE_halkidiki_prospecting_desc: "The Halkidiki peninsula in Northern Greece holds significant chromium and gold deposits. The Skouries and Stratoni mining districts can be expanded with modern excavation techniques."
 GRE_peloponnese_bauxite: "Peloponnese Bauxite Extraction"
 GRE_peloponnese_bauxite_desc: "The Distomon mines and Fokis district contain substantial bauxite reserves. Progressive extraction can supply our aluminium industry for decades."
 GRE_thessaly_mining: "Thessaly Nickel Mining"
 GRE_thessaly_mining_desc: "The Larymna nickel laterite deposits in Thessaly represent one of the largest nickel reserves in Europe. Systematic extraction will yield steel and chromium byproducts."
 GRE_aegean_mining: "Aegean Island Mineral Extraction"
 GRE_aegean_mining_desc: "The volcanic islands of the Aegean, particularly Milos and Naxos, contain bentonite, perlite, and emery deposits that can be commercially exploited."
 GRE_pipeline_infrastructure: "Pipeline Infrastructure"

 # Chinese Investment Events
 greece.28.t: "Chinese Industrial Investment Proposal"
 greece.28.d: "[FROM.GetName] has approached us about investing in their industrial base. They propose that we fund the construction of a factory in Thessaly in exchange for commercial influence over their growing economy."
 greece.28.a: "A sound investment"
 greece.28.b: "We have no interest in Greek industry"

 greece.29.t: "Chinese Investment Accepted"
 greece.29.d: "China has agreed to fund our industrial expansion in Thessaly. A new factory will be constructed with Chinese capital, deepening our economic ties with Beijing."
 greece.29.a: "Excellent news"

 greece.30.t: "Chinese Investment Declined"
 greece.30.d: "China has declined our proposal for industrial investment. We can still proceed with the construction ourselves, though it will come at our own expense."
 greece.30.a: "We will fund it ourselves"
 greece.30.b: "The project is not viable without foreign capital"

 greece.31.t: "Piraeus Port Investment Proposal"
 greece.31.d: "[FROM.GetName] proposes Chinese investment in the port of Piraeus. COSCO Shipping would acquire a controlling stake in the port authority, funding major infrastructure upgrades in exchange for commercial control over one of the Mediterranean's busiest ports."
 greece.31.a: "Piraeus is a strategic asset worth investing in"
 greece.31.b: "We will not invest in Greek ports"

 greece.32.t: "COSCO Acquires Piraeus Stake"
 greece.32.d: "China has agreed to invest in Piraeus. COSCO Shipping will fund port expansion, adding new dockyard capacity and infrastructure. Chinese influence in our economy grows, but so does our port capacity."
 greece.32.a: "The port will thrive"

 greece.33.t: "China Declines Piraeus Investment"
 greece.33.d: "China has declined to invest in Piraeus. We can still modernize the port ourselves, but without Chinese capital the cost falls entirely on our treasury."
 greece.33.a: "We will modernize Piraeus ourselves"
 greece.33.b: "The port can wait"

 greece.34.t: "Greek Real Estate Development Proposal"
 greece.34.d: "[FROM.GetName] has approached us about developing commercial real estate in the Attica region. Chinese developers would fund construction of shopping centres, hotels, and office buildings in exchange for long-term leases and commercial presence."
 greece.34.a: "Greek property is an attractive investment"
 greece.34.b: "We are not interested in Greek real estate"

 greece.35.t: "Chinese Real Estate Investment Accepted"
 greece.35.d: "Chinese developers will fund major construction projects across Attica. New commercial and residential capacity will transform the region, though Chinese commercial presence grows significantly."
 greece.35.a: "Construction begins"

 greece.36.t: "China Declines Real Estate Investment"
 greece.36.d: "China has declined to invest in our real estate sector. We can still proceed with development using domestic capital."
 greece.36.a: "We will develop it ourselves"
 greece.36.b: "The development can wait"

 greece.37.t: "Nationwide Infrastructure Investment Proposal"
 greece.37.d: "[FROM.GetName] proposes a comprehensive infrastructure programme across Greece. Chinese state enterprises would fund airports, factories, and office construction nationwide in exchange for substantial commercial influence."
 greece.37.a: "Greece is ripe for development"
 greece.37.b: "The scope of this proposal concerns us"

 greece.38.t: "Chinese Nationwide Investment Accepted"
 greece.38.d: "China has committed to a nationwide infrastructure programme. New airports, factories, and commercial buildings will be constructed across Greece at Chinese expense."
 greece.38.a: "A transformative partnership"

 greece.39.t: "China Declines Nationwide Investment"
 greece.39.d: "China has declined our nationwide investment proposal. We can still build the infrastructure ourselves, though the cost will be considerable."
 greece.39.a: "We will build it ourselves"
 greece.39.b: "Too costly without foreign support"

 greece.40.t: "Elliniko Development Proposal"
 greece.40.d: "[FROM.GetName] proposes Chinese investment in the former Elliniko International Airport site. The massive coastal development project would transform abandoned runways into a modern urban district with infrastructure improvements across Attica and the Peloponnese."
 greece.40.a: "The Elliniko project has great potential"
 greece.40.b: "We will not invest in this project"

 greece.41.t: "Chinese Elliniko Investment Accepted"
 greece.41.d: "China has agreed to fund the Elliniko redevelopment project. Infrastructure improvements will extend across both Attica and the Peloponnese."
 greece.41.a: "A landmark project begins"

 greece.42.t: "China Declines Elliniko Investment"
 greece.42.d: "China has declined to invest in the Elliniko redevelopment. We can still proceed with the project using our own funds, or we can shelve the plans."
 greece.42.a: "We will fund it ourselves"
 greece.42.b: "Shelve the project for now"

 # Aegean Pipeline - Turkey Events
 greece.43.t: "Joint Aegean Energy Exploitation"
 greece.43.d: "[FROM.GetName] has proposed a joint energy exploitation agreement for the Aegean Sea. They suggest shared access to undersea oil and gas deposits, with both nations benefiting from extraction. Accepting would improve relations but grant Greece access to Aegean resources."
 greece.43.a: "A shared Aegean benefits us all"
 greece.43.b: "The Aegean is Turkish sovereign territory"

 greece.44.t: "Turkey Accepts Aegean Energy Deal"
 greece.44.d: "Turkey has agreed to joint exploitation of Aegean energy resources. Both nations will benefit from the extraction, easing tensions over contested maritime boundaries. Our share of the oil flows into the Aegean Islands."
 greece.44.a: "A diplomatic triumph"

 greece.45.t: "Turkey Rejects Aegean Energy Deal"
 greece.45.d: "Turkey has rejected our proposal for joint Aegean energy exploitation. We can proceed unilaterally, though this will strain relations further. Alternatively, we can abandon the project to avoid confrontation."
 greece.45.a: "We will extract from our own waters"
 greece.45.b: "Abandon the project"

 # ICBC Loan Events
 greece.46.t: "ICBC Loan Request"
 greece.46.d: "[FROM.GetName] has approached the Industrial and Commercial Bank of China seeking a substantial loan. They propose that ICBC extend credit equal to 10% of their GDP, deepening our financial ties with Athens and expanding Chinese banking presence in the Mediterranean."
 greece.46.a: "Extend the loan"
 greece.46.b: "The risk is too great"

 greece.47.t: "ICBC Loan Approved"
 greece.47.d: "The Industrial and Commercial Bank of China has approved our loan application. Chinese capital flows into our treasury, providing a significant injection of funds. Our financial dependence on Beijing deepens, but the immediate relief is welcome."
 greece.47.a: "The funds are secured"

 greece.48.t: "ICBC Loan Denied"
 greece.48.d: "China has declined to extend an ICBC loan. Without Chinese banking support, we must seek alternative sources of capital or manage within our existing means."
 greece.48.a: "We will manage"

 # North Macedonian Pipeline Events
 greece.49.t: "Greek Pipeline Proposal"
 greece.49.d: "[FROM.GetName] proposes constructing a joint oil pipeline connecting Greek extraction sites to our territory. The arrangement would provide us with a share of the energy output in exchange for transit rights and construction cooperation."
 greece.49.a: "A mutually beneficial arrangement"
 greece.49.b: "We have no interest in this project"

 greece.50.t: "North Macedonia Accepts Pipeline"
 greece.50.d: "North Macedonia has agreed to the joint pipeline project. Construction will proceed with shared costs, and both nations will benefit from the energy infrastructure connecting our territories."
 greece.50.a: "Construction begins"

 greece.51.t: "North Macedonia Rejects Pipeline"
 greece.51.d: "North Macedonia has declined our pipeline proposal. We can still construct the pipeline through our own territory, though at reduced capacity without the northern connection."
 greece.51.a: "Build it ourselves"
 greece.51.b: "Abandon the project"

 # Turkish Pipeline Events
 greece.52.t: "Greek Pipeline Proposal"
 greece.52.d: "[FROM.GetName] proposes a joint energy pipeline connecting Greek oil infrastructure to Turkish territory. The deal would provide transit revenue and shared energy access, potentially easing tensions in the region."
 greece.52.a: "Energy cooperation could ease tensions"
 greece.52.b: "We will not cooperate with Greece on this"

 greece.53.t: "Turkey Accepts Pipeline Deal"
 greece.53.d: "Turkey has agreed to the joint pipeline project. Energy cooperation between Athens and Ankara marks a rare moment of pragmatism. Both nations will benefit from the shared infrastructure."
 greece.53.a: "A step toward stability"

 greece.54.t: "Turkey Rejects Pipeline Deal"
 greece.54.d: "Turkey has rejected our pipeline proposal. We can proceed with construction through our own territory, though Turkish opposition may complicate matters diplomatically."
 greece.54.a: "Build it through our territory"
 greece.54.b: "Abandon the project"

