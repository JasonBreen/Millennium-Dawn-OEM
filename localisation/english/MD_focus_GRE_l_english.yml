l_english:

 GRE_hellenic_economy: "The Hellenic Economy"
 GRE_hellenic_economy_desc: "The Greek economy is in a difficult position. Mounting debt, unemployment, and the question of Eurozone entry are all pressing concerns. However, we have a strong merchant fleet, a strategic position, and tourism that brings millions of visitors every year. We should make the most of what we have."
 GRE_debt_mounts: "The Debt Mounts"
 GRE_debt_mounts_desc: "Our debt has ballooned to nearly 300 billion dollars, one of the highest per capita in the world. Interest payments eat up a huge part of our budget, leaving little room for investment. Foreign bankers are getting restless and the EU wants answers. We need to act before this gets worse."
 GRE_greek_bonds: "Greek Bonds"
 GRE_greek_bonds_desc: "Greek bonds have become synonymous with risk in international markets. Still, bonds are one of the few ways to raise capital without giving up sovereignty. If we issue new government securities, we can fund infrastructure and reforms. We just need to convince investors that Greece is worth the gamble."
 GRE_solve_evasion: "Solve Tax Evasion"
 GRE_solve_evasion_desc: "Billions in revenue are lost every year to tax evasion. If we strengthen our tax collection, invest in better technology, and crack down on offshore accounts, we can close the loopholes and get our budget back on track."
 GRE_convert_to_euro: "Convert to the Euro"
 GRE_convert_to_euro_desc: "The Euro is both an opportunity and a risk. Adopting it ties our economy to Europe's, which means more stability than the drachma ever had, but we lose control of our own monetary policy. It is up to us whether the trade-off is worth it."
 GRE_skouries_mines: "Skouries Mines"
 GRE_skouries_mines_desc: "The Skouries copper-gold deposit in Halkidiki is one of the largest in Europe. Foreign corporations want the extraction rights and are promising jobs and wealth. Environmentalists are against it. We will need to decide what matters more."
 GRE_local_manufacturing: "Local Manufacturing"
 GRE_local_manufacturing_desc: "Greek factories are sitting idle while foreign goods flood our markets. We have skilled workers and good craftsmanship traditions but we haven't been investing in ourselves. Supporting local manufacturers with incentives and contracts could rebuild the industry and create jobs."
 GRE_military_industrial: "Hellenic Arms Industry Subsidization"
 GRE_military_industrial_desc: "Despite being state-owned since the 1970s, Hellenic Arms Industry is heavily subsidized in the interest of national defense. Focusing additional and targeted subsidies can help the company expand and potentially look at acquiring the privately-owned Pyrkal to further expand its capabilities."
 GRE_agriculture_sector: "Agriculture Sector"
 GRE_agriculture_sector_desc: "Greek agriculture has a long history but today it faces EU quotas, foreign competition, and an aging workforce. Our products like Kalamata olives, Feta cheese, and Assyrtiko wine are still some of the best in the world. We should protect our farmers and invest in modern farming techniques."
 GRE_power_corporations: "Power Corporations"
 GRE_power_corporations_desc: "Greece depends heavily on imported oil and gas, which leaves us vulnerable. Developing domestic energy production, power plants, grids, and distribution could give us energy independence. These corporations will become some of the most important in the country."
 GRE_austerity_measures: "Austerity Measures"
 GRE_austerity_measures_desc: "Creditors are demanding reduced pensions, higher taxes, and eliminated benefits. Without austerity we face bankruptcy, but with it we face public anger. Protests and strikes are inevitable. There are no easy choices here."
 GRE_debt_refactoring: "Strategic Debt Restructuring"
 GRE_debt_refactoring_desc: "The bond auctions bought us time, but that is not enough. Creditors are getting impatient and interest payments are draining the treasury. We need to restructure our debt — renegotiate terms, extend maturities, and show our partners that giving us room to breathe means we can actually pay them back."
 GRE_ilarionas_hydro: "Ilarionas Hydroelectric"
 GRE_ilarionas_hydro_desc: "The Ilarionas river in northern Greece has tremendous hydroelectric potential. Hydroelectric power is clean, renewable, and works on demand unlike solar or wind. This project could power hundreds of thousands of homes."
 GRE_telecomms: "OTE Investments"
 GRE_telecomms_desc: "Millions of Greeks in island villages and mountain towns still lack reliable phone and internet access. State investment in OTE could connect these areas to the rest of the country, giving farmers access to markets and students access to universities."
 GRE_new_railways: "Athens-Thessaloniki Rail Line Revitalization"
 GRE_new_railways_desc: "The Athens-Thessaloniki corridor is the backbone of mainland Greece, but the rail line is painfully slow. Modern rolling stock and upgraded track could cut travel times in half and give the provincial economy a real boost."
 GRE_highway_initiatives: "Extend the AX Highways"
 GRE_highway_initiatives_desc: "The mountains that once divided the ancient city-states still isolate communities and hurt commerce today. The proposed AX highway network would cut through the Pindus range and connect the western coast to Thessaly. It will be expensive, but the economic benefits could be worth it."
 GRE_hellas_gold: "Deepen the Kassandra Mines"
 GRE_hellas_gold_desc: "The Kassandra mining district has substantial chromium reserves that haven't been fully exploited yet. Deepening existing operations and investing in extraction equipment would bring this wealth to market and reduce our import dependency."
 GRE_euboea_bauxite_deposits: "Euboea Bauxite Deposits"
 GRE_euboea_bauxite_deposits_desc: "Euboea has significant bauxite deposits, which is the primary ore for aluminium. Large-scale extraction could supply our industrial base and cut down on expensive imports."
 GRE_industrial_lignite_mining: "Industrial Lignite Mining"
 GRE_industrial_lignite_mining_desc: "Western Macedonia has vast lignite reserves that can be processed into synthetic fuel. Industrial-scale mining would help with our energy dependency and give us a domestic alternative to imported oil."
 GRE_rare_element_prospecting: "Rare Element Prospecting"
 GRE_rare_element_prospecting_desc: "Greece has the geological diversity to potentially hold undiscovered rare earth and strategic mineral deposits. A proper surveying programme could identify new extraction sites and open up a lucrative market."
 GRE_transport_sector: "Transport Sector"
 GRE_transport_sector_desc: "Buses, trams, metros, and ferries are essential for the Greek economy to function. Without efficient transport, goods can't reach markets, workers can't reach jobs, and tourists can't get around. Modernizing fleets, expanding routes, and integrating the system would benefit everyone."
 GRE_vintage_wines: "Vintage Wines"
 GRE_vintage_wines_desc: "Greece has been making excellent wine for thousands of years. Assyrtiko, Agiorgitiko, and Xinomavro can rival some of the finest French vintages. The problem is that too few people outside of Greece know about them. Promoting our wines internationally and developing wine tourism could turn Greek wine into a proper global brand."
 GRE_tobacco_plantations: "Tobacco Plantations"
 GRE_tobacco_plantations_desc: "For centuries, Greek tobacco has been prized worldwide. Though smoking declines in the West, demand remains strong elsewhere, providing vital income to farmers. We must support cultivators while helping them transition to new crops where possible."
 GRE_gas_oil_plants: "Gas and Oil Plants"
 GRE_gas_oil_plants_desc: "The refineries at Aspropyrgos and Eleusis are our main oil processing centres, but the facilities are aging and efficiency is falling behind. Investing in new refining capacity, cleaner technology, and expanded storage could keep us competitive as a regional energy hub."
 GRE_aegean_pipelines: "Aegean Pipelines"
 GRE_aegean_pipelines_desc: "The Aegean has always been a trade route. Now it could become an energy corridor. Pipelines through the Aegean islands connecting to Turkey, the Balkans, and Central Europe would be a massive project with complicated geopolitics, but the rewards could be just as massive."
 GRE_trim_the_fat: "Trim the Fat"
 GRE_trim_the_fat_desc: "The government has become bloated and inefficient. Ministries are overstaffed, contracts go to friends and family, and red tape is choking everything. We need to slim down by cutting waste, automating where we can, and holding people accountable."
 GRE_debt_swaps: "Yen Debt Swaps"
 GRE_debt_swaps_desc: "Swapping our debt into yen-denominated bonds could reduce our exposure to Eurozone volatility. It requires good banking partners and some financial engineering, but it is one way to manage the debt without as much political fallout."
 GRE_western_shipping_magnate: "Western Shipping Magnate"
 GRE_western_shipping_magnate_desc: "Greek shipowners control a huge part of the world's merchant fleet. Shipping is one of our most important industries. Supporting it with incentives, better port facilities, and maritime education will keep Greek shipping competitive on the world stage."
 GRE_olympic_airways: "Olympic Airways"
 GRE_olympic_airways_desc: "Founded by Aristotle Onassis, Olympic Airways was once the pride of Greek aviation. The airline has struggled in recent years but the name still carries weight. Revitalizing the carrier could bring tourists in and keep them coming back."
 GRE_trainose: "TrainOSE"
 GRE_trainose_desc: "The Greek railway system, once neglected, has seen new life. TrainOSE operates passenger and freight services connecting Athens to Thessaloniki, the Peloponnese to the mainland. By expanding routes, improving schedules, and investing in rolling stock, we can make rail a genuine alternative."
 GRE_cotton_plantations: "Cotton Plantations"
 GRE_cotton_plantations_desc: "Greek cotton from Thessaly and Macedonia is among the best in the world. Strong fibers and excellent quality make it great for textiles. Supporting our cotton farmers and investing in manufacturing could bring this industry back to where it should be."
 GRE_fisheries_expansion: "Fisheries Expansion"
 GRE_fisheries_expansion_desc: "The Aegean and Ionian Seas are full of marine life, but overfishing, pollution, and foreign competition are serious problems. Expanding our fleet, developing aquaculture, and enforcing sustainable quotas should help keep the fishing industry alive."
 GRE_aegean_wind_banks: "Aegean Wind Banks"
 GRE_aegean_wind_banks_desc: "The Aegean is one of the windiest areas in Europe. Wind farms on the islands could generate a lot of clean energy and reduce our dependence on imported oil and coal. The wind is always blowing out there."
 GRE_prinos_basin: "Prinos Basin"
 GRE_prinos_basin_desc: "The Prinos offshore oil field near Thassos is our largest domestic crude source. Production has been declining but new exploration and better recovery techniques could turn things around. Developing it further would reduce imports and create jobs."
 GRE_resolution_crisis: "Resolution Crisis"
 GRE_resolution_crisis_desc: "We have been managing the crisis for too long instead of actually solving it. It is time for a proper plan that deals with debt, growth, banking, and reform all at once. It won't be easy, but it is the only way forward."
 GRE_merchant_marine: "Merchant Marine"
 GRE_merchant_marine_desc: "The Greek merchant marine is one of our most important strategic assets. Our ships carry oil, goods, and passengers across every ocean. Maintaining the fleet, training sailors, and supporting our shipyards is essential to keeping this industry strong."
 GRE_harbor_renovations: "Harbor Renovations"
 GRE_harbor_renovations_desc: "Many of our ports have fallen into disrepair. Cracked concrete, rusted cranes, and outdated equipment are common. Investing in deeper berths, better cargo handling, and improved facilities would help us stay competitive in global trade."
 GRE_urban_railways: "Urban Railways"
 GRE_urban_railways_desc: "Expanding urban railways is paramount for our future. The system doesn't reach many neighborhoods, and other cities lack metro service. By expanding throughout Greece, we can reduce congestion, decrease pollution, and improve quality of life for millions."
 GRE_helleniq_energy: "HelleniQ Energy"
 GRE_helleniq_energy_desc: "HelleniQ controls every refinery in the country and most of the fuel distribution network. If we expand their operations into upstream extraction, Greece could become an actual energy producer instead of just buying everything on the spot market."
 GRE_north_macedonian_pipelines: "Construct the Thessaloniki-Skopje Pipeline"
 GRE_north_macedonian_pipelines_desc: "[FYR.GetName] needs gas and we need customers. A pipeline from Thessaloniki to Skopje could make Greece a transit hub for Balkan energy. Both nations would benefit from more stable prices and closer economic ties."
 GRE_turkish_pipeline: "Turkey-Greece Gas Pipeline"
 GRE_turkish_pipeline_desc: "Caucasian gas flows through Turkey but stops at the border. A pipeline from Karacabey to Komotini would carry it into European markets through Greek territory, earning us transit fees and tying Ankara into a partnership with real economic stakes."
 GRE_ionian_solar: "Ionian Solar"
 GRE_ionian_solar_desc: "The Ionian islands get a lot of sunshine. Installing solar farms on Corfu, Lefkada, and Zakinthos would let us take advantage of that and reduce our dependence on imported fossil fuels."
 GRE_drydock_renovations: "Drydock Renovations"
 GRE_drydock_renovations_desc: "Our drydocks at Salamis and other naval facilities have been serving the fleet for a long time, but age and neglect are catching up. Modernizing them with deeper basins, heavier lifts, and updated equipment is necessary to keep the fleet operational."

 greece_focus: "Greek Focus Tree"
 #opinion_modifiers
 earthquake_diplomacy: "Earthquake Diplomacy"
 airspace_violations: "Airspace Violations"
 #ideas
 GRE_debt_crisis: "Debt Crisis"
 GRE_debt_crisis_desc: "Greece has 300 billion dollars in external debt - one of the largest in the world. This has created a huge problem for us, as the debt is rapidly rising and creating massive problems for our economy. We will have to find a way to solve the debt problem before it gets out of hand."
 GRE_legacy: "Greek Legacy"
 GRE_legacy_desc: "Greece has a rich history, the rise and fall of many empires. After the loss of Byzantium we lost control of our homeland. Ever since 1821 we have promised such a loss would never befall the Greek people again."
 GRE_constitutional_crisis: "Constitutional Crisis"
 GRE_constitutional_crisis_desc: "The old constitution was written for a very different Greece. Its checks and balances are now getting in the way of the reforms the country needs. Rewriting it is risky, but half-measures have already failed us."
 #industry ideas
 GRE_glass_cannon: "Glass Cannon Economics"
 GRE_glass_cannon_desc: "The [GRE.GetAdjective] economy does well during growth but falls apart quickly in a downturn. We rely too heavily on foreign investment, tourism, and imports. Unless we strengthen our economic resilience, we risk collapsing under the weight of debt and mismanagement."
 GRE_com_promote_local: "Local Business Promotion"
 GRE_com_promote_local_desc: "Foreign chains have been pushing out the small shops and family businesses that used to be the backbone of Greek commerce. Tax breaks and procurement preferences for domestic firms should help put money back into local communities."
 GRE_booming_arms: "Booming Arms Industry"
 GRE_booming_arms_desc: "State subsidies have given the defence sector plenty of capital to work with. Production lines are running at full capacity, export orders are growing, and Greek-made equipment is starting to find buyers across the Mediterranean."
 GRE_efficient_elvo: "Efficient Government Industry"
 GRE_efficient_elvo_desc: "After years of restructuring, ELVO has gone from a bloated state enterprise to a much leaner operation. Procurement has been streamlined, management improved, and the workforce is now producing military vehicles at competitive costs."
 GRE_resources: "Resource Deposits Nationalized"
 GRE_resources_desc: "We have nationalized all of the natural resource deposits in Greece for utilization by the state. This allows us to better allocate resources to our factories instead of other wasteful things."
 GRE_construction_focus: "Construction Material Focus"
 GRE_construction_focus_desc: "Greece has plenty of marble, limestone, and aggregate quarries. Expanding domestic cement and steel production would help keep construction costs down and create more jobs for Greek workers."
 GRE_austerity_idea: "Austerity Tensions"
 GRE_austerity_idea_desc: "As we continue to implement austerity measures, the people of Greece are becoming increasingly discontented. This discontent is growing and will eventually lead to riots if we do not act quickly. The worse the situation becomes, the more likely it is to devolve into something far more serious."
 #dynamic modifiers
 GRE_drift_modifiers: "Political Drift"
 GRE_debt_modifier: "The Debt Crisis"
 GRE_debt_modifier_desc: "The debt crisis has harsher effects depending on how we manage our money. However, spending more money to create jobs will benefit us in the long term."
 #fascist ideas
 GRE_immigrants_barred: "Immigration Suspended"
 GRE_immigrants_barred_desc: "The government has suspended all immigration into Greece until further notice. That notice may or may not ever come."
 GRE_metaxism_idea: "Metaxism"
 GRE_metaxism_idea_desc: "Metaxism refers to the fascist ideology found in Greece between 1936 and 1941, that largely rescued Greece from the internal turmoil it was facing until the Germans invaded."
 GRE_indoctrinate_youth: "Indoctrinate the Youth"
 GRE_indoctrinate_youth_desc: "The democratic governments have sadly left the youth of our country without a future. We must therefore earn the trust of the youth to successfully take national leadership."
 #communist ideas
 GRE_wild_unions: "Wild Labour Unions"
 GRE_wild_unions_desc: "We gave unions power and they are using it - we see no problem with this."
 GRE_wild_unions_2: "Wild Labour Unions"
 GRE_wild_unions_2_desc: "The labour unions were given great freedom during our climb to power. Now that we are victorious we appeal to them only to ensure we have the heart of the people before completely securing our power base."
 GRE_wild_unions_3: "Wild Labour Unions"
 GRE_wild_unions_3_desc: "The labour unions are simply unbearable, we cannot stand them any longer! They began as a nuisance, but they have become an obstruction to the will of the state, they must be pacified or destroyed!"
 GRE_press_opposition: "Media Opposition"
 GRE_press_opposition_desc: "The media has not depicted us in the best of light ever since we restored order to the government, but it is only logical that the weak should fear the strong."
 GRE_one_party: "One-Party State"
 GRE_one_party_desc: "After declaring that KKE is the only political party permitted in Greece, we have the power to do whatever we want, but at the cost of blood to be shed to ensure our people are subservient."
 GRE_reorganize_army_idea: "Reorganizing the Army"
 GRE_reorganize_army_idea_desc: "We can not simply defund the army to the point of dysfunction. The time may come where we will need powerful armed forces, and for this eventuality we will ensure our army is loyal and ready."
 GRE_new_army_idea: "A New Army"
 GRE_new_army_idea_desc: "We have seen great success in the police taking over the role of the primary defensive force. However, we know they are not equipped enough to the point where they can repel foreign invasion. We will build a new army focused solely on the defense of Greece to ensure the safety of our people."
 GRE_red_army_idea: "A Red Army"
 GRE_red_army_idea_desc: "We have instilled ideological fanaticism deep into not only the ranks of our army, but the civilian population as well, ensuring we will have the manpower and loyalty needed to field a formidable army."
 GRE_cracked_foundation: "A Cracked Foundation"
 GRE_cracked_foundation_desc: "The foundation of the state has been contradicted so many times at this point that if we continue down our current path we could face a terrible new revolution. \n\n§RIf our stability falls below 30%, we will face revolution in Greece!§!"
 GRE_militarist_education_idea: "Militarist Education"
 GRE_militarist_education_idea_desc: "The education system has instilled values of the military into its curriculum, allowing for a greater state of readiness in case of sudden attacks."
 GRE_elam: "National Popular Front Resurgence"
 GRE_elam_desc: "The National Popular Front has greatly expanded its efforts across the board to sway the mind of the average voter. We suspect Greece is the cause of this 'disruption'."

 # Decisions
 # Austerity Measures Decisions
 GRE_debt_crisis_category: "The [GRE.GetAdjective] Debt Crisis"
 GRE_debt_crisis_category_desc: "Despite our economic growth our debt continues to mount to larger and larger amounts, whether from ineffective government spending, maturing bonds, or regular budget shortfalls. We need to cope with our debt before it becomes a crisis — or turn it into a tool for ensuring our continued prosperity into the new millennium.\n\nCurrent GDP-to-Debt Ratio: [?debt_ratio|%Y]"
 GRE_austerity_tension_mission: "Austerity Tensions"
 GRE_austerity_tension_mission_desc: "Spending cuts and tax increases have made people angry. If we don't ease the tensions soon, things will get worse and the austerity situation will spiral."
 GRE_austerity_placate_decision: "Placate the Protestors"
 GRE_austerity_placate_decision_desc: "Government outreach and targeted relief can take the edge off public frustration. Reducing the visible pressure of austerity should help restore Stability and bring tensions back down."

 GRE_austerity_mission_active: "\nCurrent austerity tension is §R[gre_austerity_tension]§!"

 GRE_generic_decisions_category: "[GRE.GetNameWithFlag] Political Decisions"
 GRE_generic_decisions_category_desc: "Political decisions available to the Greek government."
 GRE_rename_istanbul: "Rename Istanbul"
 GRE_rename_istanbul_desc: "With Constantinople under Greek control, the government formally restores the city's historic name. The renaming carries deep cultural significance and lifts national morale."
 GRE_archipelago_air_base_rapid_repair: "Air Base Rapid Repair Programme"
 GRE_archipelago_air_base_rapid_repair_desc: "Setting up dedicated repair crews and pre-positioned equipment at island air bases means damage from enemy strikes can be fixed faster, keeping our air power operational."
 GRE_archipelago_anti_air_rapid_repair: "Anti-Air Battery Maintenance Protocols"
 GRE_archipelago_anti_air_rapid_repair_desc: "Mobile maintenance teams at island air defence sites with standardised parts and training would let us restore damaged batteries faster and keep our air defence network intact."
 GRE_archipelago_bunker_repair_protocols: "Island Fortification Repair Corps"
 GRE_archipelago_bunker_repair_protocols_desc: "Specialised engineering units across the archipelago focused on rapid bunker restoration. Damaged fortifications can be brought back to full effectiveness quickly."
 GRE_archipelago_naval_base_repair_protocols: "Naval Base Maintenance Initiative"
 GRE_archipelago_naval_base_repair_protocols_desc: "Pre-positioned repair materials and skilled technicians at island naval facilities means damaged port infrastructure can be fixed faster and maritime operations kept running."
 GRE_archipelago_coastal_obstacle_network: "Coastal Obstacle Network"
 GRE_archipelago_coastal_obstacle_network_desc: "Underwater obstacles, minefields, and barriers across potential landing zones would make it much harder for any enemy naval assault to reach our shores."
 GRE_archipelago_supply_disruption: "Core Territory Supply Denial"
 GRE_archipelago_supply_disruption_desc: "Pre-planned logistics disruption on our island cores would make it harder for any occupying enemy to maintain supply lines or exploit local resources."
 GRE_archipelago_coastal_battery_expansion: "Coastal Battery Expansion Programme"
 GRE_archipelago_coastal_battery_expansion_desc: "Expanding our coastal artillery installations beyond what the terrain normally allows. Island geography shouldn't limit our ability to defend the shoreline."
 GRE_archipelago_island_fortress_expansion: "Island Fortress Expansion Programme"
 GRE_archipelago_island_fortress_expansion_desc: "Funding engineering work to build bunkers beyond what current terrain limits allow. Our islands can support stronger fortifications than the current doctrine assumes."
 GRE_archipelago_attrition_doctrine: "Archipelago Attrition Doctrine"
 GRE_archipelago_attrition_doctrine_desc: "Codifying tactics that use island terrain to bleed any attacking force. Enemy units in the open would face higher attrition and constant harassment from our prepared positions."
 GRE_archipelago_supply_interdiction: "Island Supply Interdiction Operations"
 GRE_archipelago_supply_interdiction_desc: "Training and positioning units to actively deny enemy forces access to local resources. Any enemy operating on our islands would find their supply sources systematically cut off."
 GRE_archipelago_missile_battery_expansion: "Island Missile Defence Expansion"
 GRE_archipelago_missile_battery_expansion_desc: "Additional funding to build missile defence sites beyond the normal terrain limits across the archipelago. More engineering investment means we can get past the usual terrain restrictions."
 GRE_archipelago_air_defense_expansion: "Expanded Air Defence Network"
 GRE_archipelago_air_defense_expansion_desc: "Raising the construction ceiling for anti-air installations above the standard terrain limits. Even smaller islands could get dense air defence coverage."
 GRE_archipelago_decision_active: "An archipelago defence programme is already underway"
 GRE_archipelago_set1_A_chosen: "Air Base Rapid Repair Programme completed"
 GRE_archipelago_set1_B_chosen: "Anti-Air Battery Maintenance Protocols completed"
 GRE_archipelago_set2_A_chosen: "Island Fortification Repair Corps completed"
 GRE_archipelago_set2_B_chosen: "Naval Base Maintenance Initiative completed"
 GRE_archipelago_set3_A_chosen: "Coastal Obstacle Network completed"
 GRE_archipelago_set3_B_chosen: "Core Territory Supply Denial completed"
 GRE_archipelago_set4_A_chosen: "Coastal Battery Expansion Programme completed"
 GRE_archipelago_set4_B_chosen: "Island Fortress Expansion Programme completed"
 GRE_archipelago_set5_A_chosen: "Archipelago Attrition Doctrine completed"
 GRE_archipelago_set5_B_chosen: "Island Supply Interdiction Operations completed"
 GRE_archipelago_set6_A_chosen: "Island Missile Defence Expansion completed"
 GRE_archipelago_set6_B_chosen: "Expanded Air Defence Network completed"
 GRE_lie_about_financial_records_decision: "Adjust Financial Records Favorably"
 GRE_lie_about_financial_records_decision_desc: "Despite our constant economic growth our outdated currency and other economic woes are preventing us from finalizing our economic agreements with the European Union."
 GRE_negotiate_debt_swap_deals_decision: "Negotiate Debt Swap Deals"
 GRE_negotiate_debt_swap_deals_decision_desc: "Open negotiations with a foreign power to restructure our debt through currency swaps. By shifting our obligations to another nation's central bank, we may find more favorable repayment terms."
 GRE_defer_payments_decision: "Defer Focus Payments"
 GRE_defer_payments_decision_desc: "Rather than paying upfront for economic programmes, defer the costs into our national debt. This preserves our treasury at the expense of growing our obligations."
 GRE_do_not_defer_payments_decision: "Resume Direct Payments"
 GRE_do_not_defer_payments_decision_desc: "Stop deferring costs and return to paying for economic programmes directly from the treasury."

