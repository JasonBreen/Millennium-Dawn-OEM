 GRE_homelessness_crisis_category: "The Athenian Homelessness Crisis"
 GRE_homelessness_crisis_category_desc: "In the aftermath of the 1999 Earthquake in Athens thousands of Greek citizens are now homeless. Aid and repairs are currently underway in the city, but we can choose to help the initiative along to complete the repair of the urban and residential districts."
 GRE_reconstruction_efforts_in_athens_decision: "Fund Additional Reconstruction Efforts in Athens"
 GRE_reconstruction_efforts_in_athens_decision_desc: "The earthquake has left scars all across Athens. Crumbled apartment blocks, damaged infrastructure, and neighborhoods reduced to rubble. While initial repairs have begun, the scale of devastation demands more than the current relief funds permits. By directing additional funds toward reconstruction, we can accelerate the rebuilding of Athens and restoring the capital to its former glory."
 GRE_issue_relief_funds_to_victims_decision: "Issue Relief Funds to Earthquake Victims"
 GRE_issue_relief_funds_to_victims_decision_desc: "Beyond the physical destruction, the earthquake has left countless families without means. Savings wiped out, businesses destroyed, breadwinners injured or worse, these are not mere statistics. They are our fellow Greeks, citizens who now face an uncertain future through no fault of their own. By issuing direct relief funds to the victims, we can provide immediate assistance for food, clothing, temporary housing, and the first steps toward rebuilding shattered lives."
 GRE_petition_turkey_for_support_decision: "Petition [TUR.GetName] for Support"
 GRE_petition_turkey_for_support_decision_desc: "Petition [TUR.GetNameWithFlag] for support with our post-Earthquake recovery. Hopefully, they can find it in their hearts to support us in our time of need."

