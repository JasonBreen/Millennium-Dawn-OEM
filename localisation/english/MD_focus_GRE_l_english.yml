 GRE_rename_istanbul: "Rename Istanbul"
 GRE_rename_istanbul_desc: ""
 GRE_archipelago_air_base_rapid_repair: "Air Base Rapid Repair Programme"
 GRE_archipelago_air_base_rapid_repair_desc: "Establish dedicated repair crews and pre-positioned equipment across island air bases. Damage from enemy strikes can be repaired faster, keeping our air power operational during sustained attacks."
 GRE_archipelago_anti_air_rapid_repair: "Anti-Air Battery Maintenance Protocols"
 GRE_archipelago_anti_air_rapid_repair_desc: "Deploy mobile maintenance teams to island air defence sites. Standardised components and training allow faster restoration of damaged batteries, preserving our air defence network."
 GRE_archipelago_bunker_repair_protocols: "Island Fortification Repair Corps"
 GRE_archipelago_bunker_repair_protocols_desc: "Establish engineering units specialised in rapid bunker restoration across the archipelago. Hardened positions can be quickly returned to full effectiveness after taking fire."
 GRE_archipelago_naval_base_repair_protocols: "Naval Base Maintenance Initiative"
 GRE_archipelago_naval_base_repair_protocols_desc: "Pre-position repair materials and skilled technicians at island naval facilities. Damaged port infrastructure can be restored faster, maintaining maritime operations under fire."
 GRE_archipelago_coastal_obstacle_network: "Coastal Obstacle Network"
 GRE_archipelago_coastal_obstacle_network_desc: "Extend underwater obstacles, minefields, and barrier systems across potential landing zones. Enemy naval assault forces face a more hazardous approach to our shores."
 GRE_archipelago_supply_disruption: "Core Territory Supply Denial"
 GRE_archipelago_supply_disruption_desc: "Implement pre-planned logistics disruption measures on our island cores. Any occupying enemy force will find supply lines disrupted and local resources harder to exploit."
 GRE_archipelago_coastal_battery_expansion: "Coastal Battery Expansion Programme"
 GRE_archipelago_coastal_battery_expansion_desc: "Invest in expanding coastal artillery installations beyond standard terrain limits. Island geography alone should not cap our ability to defend the shoreline."
 GRE_archipelago_island_fortress_expansion: "Island Fortress Expansion Programme"
 GRE_archipelago_island_fortress_expansion_desc: "Fund engineering work to raise inland bunker construction limits above standard terrain constraints. Our islands can support stronger fortification lines than current doctrine allows."
 GRE_archipelago_attrition_doctrine: "Archipelago Attrition Doctrine"
 GRE_archipelago_attrition_doctrine_desc: "Codify tactics that exploit island terrain to raise the cost of any enemy offensive. Exposed enemy units face higher attrition and constant harassment from prepared positions."
 GRE_archipelago_supply_interdiction: "Island Supply Interdiction Operations"
 GRE_archipelago_supply_interdiction_desc: "Train and position units to actively deny enemy forces access to local resources. Enemies operating on our island cores find local supply sources systematically compromised."
 GRE_archipelago_missile_battery_expansion: "Island Missile Defence Expansion"
 GRE_archipelago_missile_battery_expansion_desc: "Allocate funds for raising missile defence site construction limits across the archipelago. Terrain restrictions are mitigated through additional engineering investment."
 GRE_archipelago_air_defense_expansion: "Expanded Air Defence Network"
 GRE_archipelago_air_defense_expansion_desc: "Raise the construction ceiling for anti-air installations on our islands above standard terrain limits. Dense air defence coverage becomes achievable even on smaller islands."
 GRE_archipelago_decision_active: "An archipelago defence programme is already underway"
