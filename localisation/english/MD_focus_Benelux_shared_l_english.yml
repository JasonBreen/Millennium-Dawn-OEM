l_english:
 benelux_cooperation_opinion_tt: "The other Benelux members are independent and hold an opinion of us above 40"

 BNL_benelux_consultation: "Benelux Consultation"
 BNL_benelux_consultation_desc: "Regular intergovernmental consultation between Belgium, the Netherlands and Luxembourg is the foundation of Benelux cooperation. By institutionalising these summits we can coordinate economic, scientific and political policy across the three nations."
 BNL_customs_union: "Benelux Customs Union"
 BNL_customs_union_desc: "The 1944 London Customs Convention bound the three governments-in-exile to a common external tariff. Reviving and deepening it removes internal duties and turns the Benelux into a single trading bloc."
 BNL_customs_union_tt: "Lowers consumer goods cost and increases exports"
 BNL_single_market: "Single Market"
 BNL_single_market_desc: "Free movement of goods and services lets producers in all three countries reach a unified market without barriers, raising industrial output and lowering the price of consumer goods."
 BNL_single_market_tt: "Increases factory output and lowers consumer goods cost"
 BNL_labour_mobility: "Free Movement of Labour"
 BNL_labour_mobility_desc: "Workers may live and work anywhere in the Benelux. A shared labour pool eases shortages and speeds construction across the union."
 BNL_labour_mobility_tt: "Increases construction speed and adds manpower"
 BNL_capital_integration: "Capital Market Integration"
 BNL_capital_integration_desc: "Aligning financial regulation lets capital flow freely between the three economies, improving investment and the efficiency of industry."
 BNL_capital_integration_tt: "Improves factory efficiency growth and adds to the treasury"
 BNL_port_cooperation: "Rotterdam and Antwerp"
 BNL_port_cooperation_desc: "Rotterdam and Antwerp are the two largest ports in Europe. Coordinating the ARA cluster instead of competing turns Benelux logistics into a single world-class gateway."
 BNL_port_cooperation_tt: "Improves production line efficiency and construction speed"
 BNL_freight_corridors: "Freight Corridors"
 BNL_freight_corridors_desc: "Dedicated rail links such as the Betuweroute and the Iron Rhine connect the seaports to the European hinterland. Joint investment in these corridors strengthens the industrial backbone of the union."
 BNL_freight_corridors_tt: "Improves construction speed and production line efficiency"
 BNL_north_sea_wind: "North Sea Wind"
 BNL_north_sea_wind_desc: "Under the North Seas Energy Cooperation the Benelux jointly develops offshore wind. Pooling grid connections turns the North Sea into a shared renewable power source."
 BNL_north_sea_wind_tt: "Builds renewable energy infrastructure and improves construction speed"
 BNL_gas_hub: "Benelux Gas Hub"
 BNL_gas_hub_desc: "The Groningen field and the LNG terminal at Zeebrugge make the Benelux a gas trading hub. Coordinating supply through the Pentalateral Energy Forum secures the union's energy."
 BNL_gas_hub_tt: "Builds fossil fuel power and improves construction speed"
 BNL_economic_union_treaty: "Treaty of the Benelux Economic Union"
 BNL_economic_union_treaty_desc: "The 1958 Treaty establishing the Benelux Economic Union, renewed in 2008 as the Benelux Union, completes the single internal market and guarantees the free movement of persons, goods, services and capital."
 BNL_economic_union_treaty_tt: "Major boost to industrial output, factory efficiency and consumer goods cost"
 BNL_research_cooperation: "Joint Research Agreements"
 BNL_research_cooperation_desc: "Shared research programmes let the three countries pool funding and avoid duplicating effort, accelerating technological progress across the union."
 BNL_research_cooperation_tt: "Increases research speed"
 BNL_university_network: "University Network"
 BNL_university_network_desc: "Delft, Leuven, Eindhoven and Wageningen anchor a dense academic network. Linking their programmes and degrees creates a shared pool of talent and knowledge."
 BNL_university_network_tt: "Increases research speed"
 BNL_hightech_triangle: "High-Tech Triangle"
 BNL_hightech_triangle_desc: "Brainport Eindhoven, home to ASML and NXP, and imec in Leuven form the heart of European semiconductor research. Joint backing of this cluster keeps the Benelux at the frontier of high technology."
 BNL_hightech_triangle_tt: "Increases research speed and grants a research bonus to computing technology"
 BNL_space_cooperation: "Space Cooperation"
 BNL_space_cooperation_desc: "The European Space Agency's technical heart, ESTEC, sits at Noordwijk. Coordinating Benelux contributions to European space efforts builds advanced engineering capacity."
 BNL_space_cooperation_tt: "Increases research speed"
 BNL_nuclear_research: "Nuclear Research"
 BNL_nuclear_research_desc: "Petten in the Netherlands and the SCK CEN at Mol in Belgium, with its MYRRHA reactor project, lead European research into reactors and medical isotopes. A joint programme advances the union's nuclear science."
 BNL_nuclear_research_tt: "Increases research speed and grants a research bonus to nuclear reactors"
 BNL_innovation_area: "Benelux Innovation Area"
 BNL_innovation_area_desc: "Binding the research network, the high-tech cluster and the nuclear and space programmes into a single innovation area makes the Benelux one of the most research-intensive regions on earth."
 BNL_innovation_area_tt: "Grants a research slot and a major research speed bonus"
 BNL_benelux_parliament: "Benelux Parliament"
 BNL_benelux_parliament_desc: "The Benelux Interparliamentary Consultative Council gives the union a shared political forum. Strengthening it lays the groundwork for deeper integration between the three states."
 BNL_benelux_parliament_tt: "Increases political power and raises Benelux integration"
 BNL_open_borders: "Open Borders"
 BNL_open_borders_desc: "The Benelux abolished internal border controls decades before Schengen, which was itself signed near the tripoint in Luxembourg. Open borders bind the three societies ever closer together."
 BNL_open_borders_tt: "Increases stability and raises Benelux integration"
 BNL_benelux_court: "Benelux Court of Justice"
 BNL_benelux_court_desc: "A shared court harmonises law across the three jurisdictions and settles disputes between them, giving the union a common legal order."
 BNL_benelux_court_tt: "Increases political power and raises Benelux integration"
 BNL_shared_foreign_policy: "Common Foreign Policy"
 BNL_shared_foreign_policy_desc: "By coordinating their positions within the European Union and NATO, the three states speak with one voice and carry far greater weight than any could alone."
 BNL_shared_foreign_policy_tt: "Grants political power and raises Benelux integration"
 BNL_political_union: "Political Union"
 BNL_political_union_desc: "With a shared parliament, court and foreign policy in place, the three governments begin to merge their political institutions into a genuine union."
 BNL_political_union_tt: "Increases political power and stability and strongly raises Benelux integration"
 BNL_treaty_of_union: "Treaty of Union"
 BNL_treaty_of_union_desc: "The final step. Once the three peoples are sufficiently integrated, the organising state may invite its partners to form a single Benelux nation. The partners must consent, and unification through the Benelux formable decisions follows."
 BNL_treaty_of_union_tt: "Opens the path to a unified Benelux state"
 BNL_treaty_of_union_accept_tt: "If they accept, they become our subject, allowing the Benelux to be formed through the formable nation decisions"
 BNL_form_benelux_tt: "We invite the other Benelux members to join a unified state. Once they consent, use the Benelux formable nation decisions to complete unification."
 BNL_integration_increased_tt: "Benelux integration increased"
 BNL_integration_requirement_tt: "Benelux integration is above 100"

 BNL_benelux_defence: "Benelux Defence Declaration"
 BNL_benelux_defence_desc: "The 2012 Benelux Declaration committed Belgium, the Netherlands and Luxembourg to pool their defence efforts, share costs and increase joint military output. It is the framework under which the three armed forces deepen their cooperation."
 BNL_benelux_defence_tt: "Raises army organisation across the Benelux and grants the organiser political power"
 BNL_benelux_air_policing: "Benelux Air Policing"
 BNL_benelux_air_policing_desc: "Since 2017 Belgium and the Netherlands take turns guarding the airspace of all three countries under a single Quick Reaction Alert, with the right to intercept across each other's borders."
 BNL_benelux_air_policing_tt: "Improves air interception across the Benelux and grants the organiser air experience"
 BNL_air_defence_command: "Air Command and Control Centre"
 BNL_air_defence_command_desc: "A shared air command and control centre integrates the radar picture and ground-based air defences of the three nations into one coordinated system."
 BNL_air_defence_command_tt: "Improves air interception across the Benelux and grants the organiser air experience"
 BNL_binational_air_command: "Binational Air Command"
 BNL_binational_air_command_desc: "Merging the operational air commands lets the Benelux air forces plan and fly their missions as a single organisation, sharing bases, controllers and procedures."
 BNL_binational_air_command_tt: "Improves air interception and army organisation across the Benelux and grants the organiser air experience"
 BNL_mrtt_fleet: "Multinational MRTT Fleet"
 BNL_mrtt_fleet_desc: "The pooled fleet of Airbus A330 Multi Role Tanker Transports, based at Eindhoven and shared between the Benelux partners and other European states, provides air-to-air refuelling and strategic airlift to every member."
 BNL_mrtt_fleet_tt: "Improves industrial efficiency across the Benelux and grants the organiser air experience"
 BNL_eatc: "European Air Transport Command"
 BNL_eatc_desc: "Headquartered at Eindhoven, the European Air Transport Command pools the military transport, refuelling and aeromedical aircraft of its members under one command."
 BNL_eatc_tt: "Improves industrial efficiency across the Benelux and grants the organiser air experience"
 BNL_belux_a400m: "BELUX A400M Unit"
 BNL_belux_a400m_desc: "Belgium and Luxembourg operate their A400M transports as a single binational unit at Melsbroek, served by a shared training centre. Either nation may organise this focus."
 BNL_belux_a400m_tt: "Improves industrial efficiency across the Benelux and grants the organiser air experience"
 BNL_f35_cooperation: "Joint F-35 Sustainment"
 BNL_f35_cooperation_desc: "Belgium and the Netherlands coordinate the training and maintenance of their F-35 fleets, sharing facilities and expertise across the two air forces."
 BNL_f35_cooperation_tt: "Improves air interception across the Benelux and grants the organiser air experience"
 BNL_benesam: "BENESAM Naval Accord"
 BNL_benesam_desc: "The Belgian-Netherlands naval cooperation accord, rooted in 1948 and formalised in 1995, integrates the training, logistics and maintenance of the two navies while each keeps sovereignty over deployment."
 BNL_benesam_tt: "Raises naval morale across the Benelux and grants the organiser naval experience"
 BNL_admiral_benelux: "Admiral Benelux"
 BNL_admiral_benelux_desc: "A single binational naval staff at Den Helder commands the operations of the Belgian and Dutch fleets, with the two navy commanders sharing the joint headquarters."
 BNL_admiral_benelux_tt: "Raises naval morale across the Benelux and grants the organiser naval experience"
 BNL_vlissingen_class: "Vlissingen-class Mine-hunters"
 BNL_vlissingen_class_desc: "The Dutch half of the joint Replacement Mine Counter Measures programme. The Vlissingen-class are stand-off, drone-based mine-hunters built by Naval Group. Only the Netherlands can organise this focus."
 BNL_vlissingen_class_tt: "Designs the Vlissingen-class mine-hunter for the organiser and raises naval morale across the Benelux"
 BNL_city_class: "City-class Mine-hunters"
 BNL_city_class_desc: "The Belgian half of the joint Replacement Mine Counter Measures programme. The City-class are sister ships of the Dutch Vlissingen-class, built to the same stand-off design. Only Belgium can organise this focus."
 BNL_city_class_tt: "Designs the City-class mine-hunter for the organiser and raises naval morale across the Benelux"
 BNL_aswf_frigate: "Anti-Submarine Warfare Frigate"
 BNL_aswf_frigate_desc: "Belgium and the Netherlands jointly replace their M-class frigates with a new anti-submarine warfare design, sharing development, radar and combat systems."
 BNL_aswf_frigate_tt: "Raises naval morale across the Benelux and grants the organiser naval experience"
 BNL_para_school: "Benelux Paratrooper School"
 BNL_para_school_desc: "The Benelux paratrooper schools are consolidated into a single training centre at Schaffen, qualifying the airborne troops of all three nations to a common standard."
 BNL_para_school_tt: "Raises army morale and training across the Benelux and grants the organiser army experience"
 BNL_csomtg: "Combined Special Operations Task Group"
 BNL_csomtg_desc: "Belgium and the Netherlands stand up a combined special operations maritime task group, ready to deploy together on land and at sea for rapid NATO missions."
 BNL_csomtg_tt: "Raises army organisation and training across the Benelux and grants the organiser army experience"

 benelux.1.t: "A Benelux Treaty of Union"
 benelux.1.d: "[FROM.GetName] proposes that we set aside our separate sovereignty and join a single Benelux state. Decades of shared institutions have prepared the ground, but surrendering nationhood is no small step."
 benelux.1.a: "We will join the union"
 benelux.1.b: "We remain our own nation"
 benelux.2.t: "Our Partner Accepts the Union"
 benelux.2.d: "[FROM.GetName] has agreed to join a unified Benelux. With our partner now bound to us, we can complete the formation of the union."
 benelux.2.a: "A new nation is born"
 benelux.3.t: "Our Partner Declines the Union"
 benelux.3.d: "[FROM.GetName] is not yet willing to give up its independence. The union will have to wait, or be built on firmer ground."
 benelux.3.a: "We will be patient"
