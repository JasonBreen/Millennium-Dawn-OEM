l_english:
 GCC_endorse_EGY: "Endorse [EGY.GetName] for GCC Membership"
 GCC_endorse_EGY_desc: "Throw our weight behind Egypt's bid to join the Gulf Cooperation Council. Once every member endorses them, the Dominant Member may extend a formal invitation."
 GCC_invite_EGY: "Invite [EGY.GetName] into the GCC"
 GCC_invite_EGY_desc: "Every member of the Council has endorsed Egypt. As the Dominant Member, extend a formal invitation to join the Gulf Cooperation Council."
 GCC_all_members_endorse_EGY_tt: "Every GCC member must endorse Egypt first."
