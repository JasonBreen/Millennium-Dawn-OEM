 gcc_invite.1.t: "An Invitation from the Gulf"
 gcc_invite.1.d: "[FROM.GetName], speaking for the Gulf Cooperation Council, has extended a formal invitation for us to join the union. Membership would bind our economy and security to the wealthiest bloc in the Arab world. The Council awaits our answer."
 gcc_invite.1.a: "We accept. Long live the Council."
 gcc_invite.1.b: "We must decline, for now."
 gcc_invite.2.t: "The GCC Welcomes a New Member"
 gcc_invite.2.d: "In a ceremony in Riyadh, the Gulf Cooperation Council has formally admitted a new member state, expanding the union beyond the shores of the Gulf for the first time. The bloc's reach, and its ambitions, grow."
 gcc_invite.2.a: "A historic day."
 gcc_invite.3.t: "The Invitation Is Declined"
 gcc_invite.3.d: "Our invitation has been turned down. The Council's expansion will have to wait for a more willing partner, or a change of heart."
 gcc_invite.3.a: "So be it."
