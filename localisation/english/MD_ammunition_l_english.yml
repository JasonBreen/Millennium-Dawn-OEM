l_english:
 MD_ammunition_type: "Ammunition"
 MD_ammunition_type_desc: "Ammunition covers small arms cartridges, artillery shells, rockets, and vehicle cannon rounds required to sustain combat operations. It is continuously expended during unit operations and combat, and must be replenished from military production."
 MD_Ammunition_1: "Standard Ammunition"
 MD_Ammunition_1_desc: "Standard military-grade ammunition produced by modern defense industries."
