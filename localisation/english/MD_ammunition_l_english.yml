l_english:
 MD_infantry_ammo_type: "Infantry Ammunition"
 MD_infantry_ammo_type_desc: "Small arms cartridges, light machine gun belts, and grenade launcher rounds for dismounted infantry. Expended continuously during combat operations."
 MD_infantry_ammo_1: "Standard Infantry Ammunition"
 MD_infantry_ammo_1_desc: "NATO and non-NATO standardized infantry calibers produced by modern defense industries."

 MD_vehicle_ammo_type: "Vehicle Ammunition"
 MD_vehicle_ammo_type_desc: "Autocannon rounds, main gun shells, and coaxial ammunition for armored vehicles. Higher unit cost reflects precision manufacturing requirements."
 MD_vehicle_ammo_1: "Standard Vehicle Ammunition"
 MD_vehicle_ammo_1_desc: "Armored vehicle calibers including 20mm and 30mm autocannon rounds and tank main gun shells."

 MD_artillery_ammo_type: "Artillery Ammunition"
 MD_artillery_ammo_type_desc: "High-explosive shells, propellant charges, and guided projectiles for tube artillery systems. The largest share of a division's logistical footprint in sustained combat."
 MD_artillery_ammo_1: "Standard Artillery Ammunition"
 MD_artillery_ammo_1_desc: "155mm and 105mm shells alongside propellant charges compatible with modern NATO and Warsaw Pact-derived artillery systems."

 MD_mlrs_ammo_type: "MLRS Rockets"
 MD_mlrs_ammo_type_desc: "Unguided and precision-guided rockets for multiple-launch rocket systems. Devastatingly effective against area targets but expensive to produce in volume."
 MD_mlrs_ammo_1: "Standard MLRS Rockets"
 MD_mlrs_ammo_1_desc: "122mm to 300mm battlefield rockets compatible with modern self-propelled multiple-launch platforms."
