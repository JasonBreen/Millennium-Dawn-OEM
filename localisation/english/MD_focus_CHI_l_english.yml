 # --- Style Choice (2) ---
 CHI_Predatory_Lending_Doctrine: "The Hambantota Doctrine"
 CHI_Predatory_Lending_Doctrine_desc: "When Sri Lanka could not service its Hambantota Port loan, it signed a 99-year lease transferring operational control to a Chinese state enterprise in 2017. China formalizes this model: projects are structured from the outset so that strategic assets become collateral, convertible to long-term access rights upon default."
 CHI_Win_Win_Cooperation: "Community of Shared Future"
 CHI_Win_Win_Cooperation_desc: "After mounting international criticism of debt-trap financing, China reforms its lending terms post-2018 - introducing concessional rates, local labor requirements, and debt sustainability assessments. The \"win-win\" framing repositions BRI as a vehicle for mutual development rather than strategic leverage."

 # --- Specializations (2) ---
 CHI_Digital_Silk_Road_Initiative: "Digital Silk Road Initiative"
 CHI_Digital_Silk_Road_Initiative_desc: "Since 2015 Huawei and ZTE have built 4G and 5G networks, submarine cables, and smart-city surveillance platforms across more than 80 countries. The Digital Silk Road creates deep technological dependencies and gives China preferential access to telecommunications infrastructure in partner states."
 CHI_Health_Silk_Road: "Health Silk Road"
 CHI_Health_Silk_Road_desc: "Formalized by a memorandum of understanding in January 2017, the Health Silk Road extends Chinese medical assistance, hospital construction, and pharmaceutical supply chains to BRI partner states. The framework gained prominence during the Covid-19 pandemic, when vaccine diplomacy reinforced China's position as a health development partner."

 # --- Late-game (4) ---
 CHI_Petroyuan_Settlement: "Petroyuan Initiative"
 CHI_Petroyuan_Settlement_desc: "China launches yuan-denominated crude oil futures on the International Energy Exchange in March 2018, creating a mechanism for BRI energy exporters to settle contracts in renminbi rather than US dollars. Sustained adoption would erode petrodollar dominance and reduce China's exposure to US financial sanctions."
 CHI_BRI_Forum_Beijing: "Belt and Road Forum for Cooperation"
 CHI_BRI_Forum_Beijing_desc: "The Belt and Road Forum for International Cooperation, held in Beijing in 2017, 2019, and 2023, convenes heads of state and senior officials from more than 100 countries to coordinate project pipelines, sign framework agreements, and project Chinese leadership of the global development agenda."
 CHI_Renminbi_Internationalization: "Yuan as Reserve Currency"
 CHI_Renminbi_Internationalization_desc: "China launches the Cross-Border Interbank Payment System in 2015 to clear renminbi transactions outside the SWIFT network, and the International Monetary Fund admits the yuan to its Special Drawing Rights basket in 2016. BRI trade settlement in renminbi steadily increases China's currency weight in global reserves."
 CHI_Polar_Silk_Road: "Polar Silk Road"
 CHI_Polar_Silk_Road_desc: "China's January 2018 Arctic Policy White Paper declares China a \"near-Arctic state\" and endorses the development of transpolar shipping routes as a northern extension of the Maritime Silk Road. Melting sea ice is making the Northern Sea Route commercially viable, cutting transit times between China and Europe by up to two weeks."

 # --- Capstones (3) ---
 CHI_Eurasian_Land_Bridge: "Eurasian Land Bridge Complete"
 CHI_Eurasian_Land_Bridge_desc: "The first regular Yiwu-London freight train service in 2017 demonstrated that an unbroken overland rail corridor from eastern China to Western Europe was commercially operational. Full Eurasian integration means Chinese manufacturers can reach European markets in eighteen days rather than the thirty-five required by sea."
 CHI_African_Continental_Integration: "Chinese-African Century"
 CHI_African_Continental_Integration_desc: "By 2024 China had become Africa's largest single trading partner, with bilateral trade exceeding $254 billion annually. Decades of BRI investment in ports, railways, and special economic zones have made Chinese infrastructure and capital indispensable to the African Union's continental integration agenda."
 CHI_Pax_Sinica: "Pax Sinica"
 CHI_Pax_Sinica_desc: "The term coined by scholars Hugh White and David Shambaugh describes a Sino-centric international order in which Chinese economic weight, infrastructure dependency, and political alignment displace the liberal rules-based order as the organizing principle of global affairs. Achieving Pax Sinica represents the culmination of China's century of rejuvenation."

