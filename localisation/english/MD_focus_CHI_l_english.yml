 ## National Committee — Button Tooltips
 CHI_nc_dept_org_tt: "§YOrganization Department§!\nOversees cadre appointments, party membership, and personnel management across all levels of government."
 CHI_nc_dept_pub_tt: "§YPublicity Department§!\nControls state media, propaganda, ideological education, and public opinion guidance."
 CHI_nc_dept_ufwd_tt: "§YUnited Front Work Department§!\nManages relations with non-communist parties, ethnic minorities, religious groups, and overseas Chinese communities."
 CHI_nc_dept_intl_tt: "§YInternational Department§!\nConducts party-to-party diplomacy, manages relations with foreign political parties, and coordinates international liaison work."
 CHI_nc_dept_cplac_tt: "§YCentral Political and Legal Affairs Commission§!\nOversees domestic security, law enforcement, courts, and the maintenance of social stability."
 CHI_nc_dept_social_tt: "§YSociety Work Department§!\nCoordinates grassroots governance, community-level party building, and social organization management."
 CHI_nc_dept_nsc_tt: "§YNational Security Commission§!\nCoordinates national security strategy, intelligence oversight, and crisis response across party, state, and military institutions."

 ## National Committee — Locked Department Tooltips
 CHI_nc_social_locked_tt: "The Society Work Department will be established at the §Y20th National Congress§!."
 CHI_nc_nsc_locked_tt: "The National Security Commission will be established at the §Y18th National Congress§!."

 ## National Committee — Decision Category
 CHI_national_commitee_decisions_category: "National Committee"
 CHI_national_commitee_decisions_category_desc: "The Central Committee of the Chinese Communist Party governs party affairs between National Congresses. Every five years, a new Congress convenes to elect committee members, appoint secretaries, and set the political direction of the party."

 ## National Committee — Congress Missions
 CHI_current_congress_mission_desc: "The National Congress is in session. Committee appointments are being finalized."
 CHI_16_national_congress_mission_desc: "The 16th National Congress of the Chinese Communist Party will convene in 2002, marking a generational leadership transition."
 CHI_17_national_congress_mission_desc: "The 17th National Congress will convene in 2007 to consolidate the current leadership's agenda."
 CHI_18_national_congress_mission_desc: "The 18th National Congress will convene in 2012, expected to bring significant leadership changes."
 CHI_19_national_congress_mission_desc: "The 19th National Congress will convene in 2017 to review the party's direction and reaffirm its leadership."
 CHI_20_national_congress_mission_desc: "The 20th National Congress will convene in 2022 amid questions about leadership continuity and term limits."
 CHI_21_national_congress_mission_desc: "The 21st National Congress will convene in 2027 to chart the party's course for the next era."

