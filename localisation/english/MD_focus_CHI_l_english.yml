 CHI_bri_active_spirit: "Belt and Road Active"
 CHI_bri_active_spirit_desc: "The Belt and Road Initiative is officially launched, channeling political capital into a unified framework for trans-Eurasian infrastructure and trade."
 petroyuan_settlement: "Petroyuan Settlement Network"
 petroyuan_settlement_desc: "Cross-border energy contracts increasingly settle in renminbi, freeing Chinese industry from dollar-clearing chokepoints and accelerating domestic construction."
 rmb_reserve_currency: "Renminbi as Reserve Currency"
 rmb_reserve_currency_desc: "The yuan has joined the basket of world reserve currencies, opening export markets and giving Chinese banks the resilience to underwrite global recovery loans."
 chinese_african_century: "Chinese-African Century"
 chinese_african_century_desc: "Decades of FOCAC investment have made China the indispensable partner of the African continent, reshaping demographics, trade flows, and political alignment."
 eurasian_land_bridge: "Eurasian Land Bridge"
 eurasian_land_bridge_desc: "An unbroken rail and pipeline corridor links the Pacific to the Atlantic, with Chinese standards, gauges, and customs procedures setting the rhythm of overland trade."
 arctic_observer_status: "Arctic Observer Status"
 arctic_observer_status_desc: "China's seat on the Arctic Council and its Polar Silk Road infrastructure open up new shipping lanes and resource frontiers in the high north."
 pax_sinica: "Pax Sinica"
 pax_sinica_desc: "China stands at the apex of a global order it shaped on its own terms, with the Belt and Road as the connective tissue of a new international system."
 CPEC_recipient: "China-Pakistan Economic Corridor"
 CPEC_recipient_desc: "Chinese capital, contractors, and security partners are remaking Pakistan's transport and energy backbone from Gwadar to the Khunjerab Pass."
 chinese_surveillance_systems: "Chinese Surveillance Systems"
 chinese_surveillance_systems_desc: "Imported safe-city platforms, facial recognition cameras, and digital identity tools harden the regime against dissent and foreign intelligence operations."
 focac_partner: "FOCAC Partnership"
 focac_partner_desc: "Membership in the Forum on China-Africa Cooperation gives the country preferential access to Chinese markets, concessional loans, and triennial summit diplomacy."
 CHI_lithium_supply_chain_locked: "Lithium Triangle Supply Chain"
 CHI_lithium_supply_chain_locked_desc: "Long-term offtake agreements with Argentine, Bolivian, and Chilean producers secure Chinese battery makers the lithium they need, smoothing efficiency curves and adding headroom to civilian industry."
 CHI_monroe_inverted: "Monroe Doctrine Inverted"
 CHI_monroe_inverted_desc: "China has displaced Washington as the principal external partner of Latin America, anchoring a hemispheric realignment that lowers the cost of relations and pulls regional opinion toward Beijing."
 CHI_sanctions_immunity_partial: "Yuan-Settled Trade Lifeline"
 CHI_sanctions_immunity_partial_desc: "Renminbi-denominated energy and goods contracts with sanctioned partners blunt the impact of Western financial pressure, easing consumer pressure and keeping export channels open."
 CHI_petrodollar_breaks: "Petrodollar Parity Reached"
 CHI_petrodollar_breaks_desc: "Gulf oil priced in yuan, central-bank swap lines across the Global South, and SWIFT alternatives have eroded the dollar's reserve premium, translating monetary leverage into political power and demographic confidence."
 CHI_pacific_security_lead: "Pacific Security Leadership"
 CHI_pacific_security_lead_desc: "Forward access agreements and rotational deployments across the Pacific Islands extend the operational reach of the PLA Navy and accelerate the basing infrastructure that sustains it."
 CHI_pacific_diplomatic_setback: "Pacific Diplomatic Setback"
 CHI_pacific_diplomatic_setback_desc: "A high-profile failure in the Pacific Islands has hardened regional capitals against Beijing's overtures, raising the political cost of every subsequent diplomatic initiative."
 CHI_pacific_basing_rights: "Second Island Chain Basing"
 CHI_pacific_basing_rights_desc: "Negotiated basing and replenishment rights deep in the Second Island Chain give the PLA Navy strategic reach, shorter logistics tails, and faster dockyard turnarounds for blue-water deployments."
 CHI_eu_market_access: "Comprehensive EU Market Access"
 CHI_eu_market_access_desc: "Ratification of a comprehensive investment framework with Brussels opens deep access to European consumer and capital markets, lifting export ceilings and softening the political climate for Chinese firms across the bloc."
 CHI_BRI_secretary_wang_jiarui_idea: "Wang Jiarui, BRI Strategic Lead"
 CHI_BRI_secretary_wang_jiarui_idea_desc: "Veteran International Department head Wang Jiarui personally steers the Belt and Road portfolio, lifting returns and securing a steady stream of monthly revenue from active projects."
 CHI_BRI_secretary_dai_bingguo_idea: "Dai Bingguo, BRI Risk Management"
 CHI_BRI_secretary_dai_bingguo_idea_desc: "Former State Councillor Dai Bingguo applies his diplomatic instincts to project vetting, sharply reducing the rate at which BRI loans go into default."
 CHI_BRI_secretary_song_tao_idea: "Song Tao, BRI Implementation"
 CHI_BRI_secretary_song_tao_idea_desc: "Song Tao's hands-on management of party-to-party ties and project delivery accelerates BRI construction timelines across every region."
 CHI_BRI_secretary_liu_jianchao_idea: "Liu Jianchao, BRI Outreach"
 CHI_BRI_secretary_liu_jianchao_idea_desc: "Liu Jianchao's outreach to foreign parties and elites expands the funnel of recipient applications, drawing in additional partner countries each month."
 CHI_BRI_secretary_liu_jieyi_idea: "Liu Jieyi, BRI Diplomatic Yield"
 CHI_BRI_secretary_liu_jieyi_idea_desc: "Liu Jieyi's UN and multilateral experience converts BRI projects into outsized influence at international fora, multiplying the diplomatic returns of every commitment."
 CHI_BRI_secretary_li_jinjun_idea: "Li Jinjun, Southeast Asia Portfolio"
 CHI_BRI_secretary_li_jinjun_idea_desc: "Former ambassador Li Jinjun coordinates Southeast Asian engagement, deepening the political payoff of Mekong and ASEAN-tier BRI projects."
 CHI_BRI_secretary_liu_haixing_idea: "Liu Haixing, Europe and Middle East Portfolio"
 CHI_BRI_secretary_liu_haixing_idea_desc: "Liu Haixing's network across European capitals and Gulf states amplifies the influence return of BRI investments in the 17+1 mechanism and Middle Eastern energy corridors."
 CHI_BRI_secretary_guo_yezhou_idea: "Guo Yezhou, BRI Coercive Diplomacy"
 CHI_BRI_secretary_guo_yezhou_idea_desc: "Guo Yezhou's harder-edged style of party diplomacy makes recipient governments more willing to accept predatory lending terms when the alternative is no project at all."
 CHI_BRI_secretary_qian_hongshan_idea: "Qian Hongshan, Africa Portfolio"
 CHI_BRI_secretary_qian_hongshan_idea_desc: "Qian Hongshan's stewardship of the Africa portfolio raises the political and economic yield of every FOCAC commitment and continental project."
 CHI_BRI_secretary_li_jun_idea: "Li Jun, BRI Returns Optimization"
 CHI_BRI_secretary_li_jun_idea_desc: "Li Jun applies a financier's eye to the global BRI book, squeezing additional returns out of existing projects across every region."
 CHI_BRI_presence_tier_1: "BRI Global Presence: Emerging"
 CHI_BRI_presence_tier_1_desc: "A handful of signed Belt and Road agreements lift China's diplomatic standing among trade partners and grant a modest political dividend at home."
 CHI_BRI_presence_tier_2: "BRI Global Presence: Established"
 CHI_BRI_presence_tier_2_desc: "An expanding portfolio of Belt and Road projects reinforces Beijing's image as a reliable infrastructure financier and broadens the inflow of foreign workers and students."
 CHI_BRI_presence_tier_3: "BRI Global Presence: Continental"
 CHI_BRI_presence_tier_3_desc: "Belt and Road corridors now span continents. Cheap imports stabilise consumer goods supply, while the diplomatic prestige of the network amplifies political leverage."
 CHI_BRI_presence_tier_4: "BRI Global Presence: Hegemonic"
 CHI_BRI_presence_tier_4_desc: "The Belt and Road has become a defining axis of the global economy. Chinese standards, currencies, and contractors dominate emerging-market infrastructure."
 CHI_BRI_presence_tier_5: "BRI Global Presence: Pax Sinica"
 CHI_BRI_presence_tier_5_desc: "China sits at the centre of a tributary network of infrastructure, finance, and migration flows that underwrites domestic prosperity and projects authority worldwide."
 bri_partner_tier_1: "BRI Participant"
 bri_partner_tier_1_desc: "An initial Belt and Road project has broken ground. Chinese construction crews accelerate domestic building work and lend credibility to the government's development agenda."
 bri_partner_tier_2: "BRI Partner"
 bri_partner_tier_2_desc: "Multiple BRI projects are now active across the country. Chinese engineering, infrastructure financing, and political backing visibly reinforce state capacity."
 bri_partner_tier_3: "BRI Strategic Partner"
 bri_partner_tier_3_desc: "Belt and Road investments anchor the national economy. Chinese capital underwrites construction, infrastructure, and consumer supply in exchange for deep diplomatic alignment."
 bri_partner_tier_4: "BRI Debt Dependency"
 bri_partner_tier_4_desc: "Defaulted loans have been restructured on Chinese terms. Strategic assets, fiscal autonomy, and military readiness are now compromised by Beijing's leverage."
 CHI_bri_state_infrastructure: "BRI Infrastructure Project"
 CHI_bri_state_infrastructure_desc: "A Belt and Road infrastructure project — port, railway, highway, or pipeline — accelerates regional construction, dockyard work, and supply throughput."
 CHI_bri_state_industrial: "BRI Industrial Project"
 CHI_bri_state_industrial_desc: "A Chinese-backed special economic zone or industrial park has expanded local factory capacity, resource extraction, and repair infrastructure."
 CHI_bri_state_information: "BRI Digital Project"
 CHI_bri_state_information_desc: "Chinese telecom backbone, surveillance equipment, and data-sharing arrangements deepen intelligence gathering and accelerate research throughput."
 CHI_bri_state_infrastructure_controlled: "Chinese-Controlled Infrastructure"
 CHI_bri_state_infrastructure_controlled_desc: "Following default and asset seizure, the project is now operated under Chinese ownership. Naval and logistical access serve PLA expeditionary planning."
 CHI_bri_state_industrial_controlled: "Chinese-Controlled Industrial Zone"
 CHI_bri_state_industrial_controlled_desc: "Chinese ownership of the zone is permanent. Output flows directly to mainland supply chains, with extraterritorial protections for managers and workers."
 CHI_bri_state_information_controlled: "Chinese-Controlled Digital Backbone"
 CHI_bri_state_information_controlled_desc: "The communications and surveillance infrastructure is fully integrated with Chinese state monitoring. Local intelligence resistance and research throughput rise sharply."
 CHI_bri_state_workers_exploited: "Cheap Labor Compact"
 CHI_bri_state_workers_exploited_desc: "Migrant labour and weakened protections raise factory throughput at the cost of domestic stability and consumer welfare."
 CHI_bri_state_workers_protected: "Workers Rights Compact"
 CHI_bri_state_workers_protected_desc: "Stronger labour standards lift morale and long-run efficiency at the cost of headline output growth."
 CHI_bri_state_energy_fossil: "Coal-Fired Capacity"
 CHI_bri_state_energy_fossil_desc: "Chinese-built coal plants supply cheap power, but pollution and respiratory illness depress population growth and recruitable manpower."
 CHI_bri_state_energy_clean: "Clean Energy Capacity"
 CHI_bri_state_energy_clean_desc: "Solar, hydro, and nuclear capacity built under BRI supplies clean power, raising population growth and stability without local environmental cost."
 CHI_BRI_management: "Belt and Road Initiative"
 CHI_BRI_management_desc: "The Belt and Road Initiative is China's foremost instrument of economic statecraft, channeling credit into ports, railways, energy corridors, and digital infrastructure across partner nations worldwide. Each project reinforces physical connectivity and political leverage simultaneously.\n\n§YTreasury:§! ¥[?CHI_bri_treasury|0]B  |  Monthly: +[?CHI_bri_monthly_income|0] income, +[?CHI_bri_monthly_returns|0] returns\n§YProjects:§! [?CHI_bri_active_projects|0]/[?CHI_bri_project_slots|0] active  |  §G[?CHI_bri_completed_projects|0]§! completed  |  §R[?CHI_bri_defaulted_projects|0]§! defaulted\n§YGlobal Presence:§! [?CHI_bri_global_presence|0]  |  §GWin-Win [?CHI_bri_winwin_score|0]§!  ·  §RPredatory [?CHI_bri_predatory_score|0]§!"
 CHI_BRI_recipient_actions: "Belt and Road Initiative"
 CHI_BRI_recipient_actions_desc: "Apply for Belt and Road Initiative project funding from the People's Republic of China."
 CHI_FOCAC_Summit: "Convene FOCAC Summit"
 CHI_FOCAC_Summit_desc: "Host a triennial Forum on China-Africa Cooperation summit. Strengthens opinion across African partners and signals continued commitment to the African development agenda. Costs treasury and political capital, with a three-year cooldown."
 CHI_BRI_Forum_Triennial: "Host Belt and Road Forum"
 CHI_BRI_Forum_Triennial_desc: "Stage the triennial Belt and Road Forum in Beijing. Heads of state from across the network gather to renew commitments and announce new flagship projects. Major treasury outlay with a three-year cooldown."
 CHI_Debt_Restructuring: "Restructure Partner Debt"
 CHI_Debt_Restructuring_desc: "Offer concessional restructuring to a defaulting Belt and Road partner. Clears the default flag and improves bilateral relations. Available only on the Win-Win Cooperation path."
 CHI_Asset_Seizure: "Seize Strategic Asset"
 CHI_Asset_Seizure_desc: "Convert defaulted infrastructure into Chinese-controlled holdings via long-term lease or equity transfer. Available only on the Predatory Lending path."
 CHI_Surveillance_Export: "Export Surveillance Architecture"
 CHI_Surveillance_Export_desc: "Deploy Chinese surveillance and digital monitoring systems to a non-democratic partner. Strengthens authoritarian alignment and embeds Chinese telecoms standards."
 BRI_apply_for_port_project: "Apply for BRI Port Project"
 BRI_apply_for_port_project_desc: "Request Chinese investment in a deepwater port, container terminal, or maritime logistics hub on our coast."
 BRI_apply_for_railway_project: "Apply for BRI Railway Project"
 BRI_apply_for_railway_project_desc: "Request a high-speed or freight rail corridor connecting our economy to the wider Belt and Road network."
 BRI_apply_for_pipeline_project: "Apply for BRI Pipeline Project"
 BRI_apply_for_pipeline_project_desc: "Request Chinese financing for an oil, gas, or refined-products pipeline tying our resource base to BRI offtakers."
 BRI_apply_for_telecom_project: "Apply for BRI Telecom Project"
 BRI_apply_for_telecom_project_desc: "Request Chinese investment in a 5G backbone, fibre rollout, or data centre cluster under the Digital Silk Road."
 BRI_apply_for_sez_project: "Apply for BRI Special Economic Zone"
 BRI_apply_for_sez_project_desc: "Request a Chinese-anchored Special Economic Zone with industrial parks, customs facilities, and concessional tax treatment."
 BRI_apply_for_mining_project: "Apply for BRI Mining Project"
 BRI_apply_for_mining_project_desc: "Request Chinese investment in extractive operations: copper, lithium, rare earths, bauxite, or iron ore."
 BRI_apply_for_powerplant_project: "Apply for BRI Power Plant Project"
 BRI_apply_for_powerplant_project_desc: "Request Chinese financing for a coal, hydro, solar, or nuclear power station to alleviate domestic energy shortages."
 BRI_apply_for_prestige_project: "Apply for BRI Prestige Project"
 BRI_apply_for_prestige_project_desc: "Request a flagship signature project: a stadium, parliament building, presidential palace, or convention centre. Politically valuable, economically secondary."
 BRI_request_loan_extension: "Request Loan Extension"
 BRI_request_loan_extension_desc: "Petition Beijing for restructured terms on a defaulted Belt and Road obligation."


 # Belt and Road Initiative Events
 chi_bri.1.t: "One Belt, One Road"
 chi_bri.1.d: "In September 2013, President Xi Jinping stood before an audience in Astana, Kazakhstan, and sketched an audacious vision: a Silk Road Economic Belt linking China to Europe, Central Asia, and Africa. The initiative would come to be known as the Belt and Road, the largest infrastructure programme in history."
 chi_bri.1.a: "Begin the work"

 chi_bri.10.t: "[FROM.GetName] Requests a Belt and Road Project"
 chi_bri.10.d: "A formal application has arrived from [FROM.GetName]. Their delegation is seeking Chinese financing and expertise for an infrastructure or industrial project. Beijing must weigh the strategic value of the partnership against the financial and political terms it is prepared to offer."
 chi_bri.10.a: "Offer concessional terms"
 chi_bri.10.b: "Offer commercial terms"
 chi_bri.10.c: "Impose predatory terms"
 chi_bri.10.d: "Decline the application"

 chi_bri.11.t: "Belt and Road Project Concluded"
 chi_bri.11.d: "Construction has wrapped up on the latest Belt and Road project in [FROM.GetName]. Finance ministers, engineers, and local officials have gathered for the handover ceremony. The question is whether the final ledger reflects a success, a compromise, or a costly setback."
 chi_bri.11.a: "A successful completion"
 chi_bri.11.b: "Cost overruns absorbed"
 chi_bri.11.c: "The borrower has defaulted"

 CHI_New_World_Order: "New World Order"
 CHI_New_World_Order_desc: "China's information dominance and media reach have laid the groundwork for a fundamental challenge to the Western-led international order. Beijing now leverages its influence networks, state media, and covert tools to promote a multipolar world in which its own norms and governance models set the global agenda."
 CHI_Responsible_Stakeholder: "Responsible Stakeholder"
 CHI_Responsible_Stakeholder_desc: "Beijing embraces the international community's call to become a constructive participant in global institutions. By deepening trade ties and reducing friction in multilateral forums, China positions itself as an indispensable partner rather than a revisionist challenger."

 chi_bri.12.t: "Belt and Road Loan in Default"
 chi_bri.12.d: "The government of [THIS.GetName] has informed Beijing that it cannot service its Belt and Road debt. The outstanding obligation represents a significant liability, and China must decide how to respond. Restructuring buys goodwill; seizing assets secures leverage; writing off the debt earns lasting gratitude."
 chi_bri.12.a: "Restructure the debt"
 chi_bri.12.b: "Seize the collateral"
 chi_bri.12.c: "Forgive the debt entirely"
 chi_bri.12.e: "Align with Chinese Foreign Policy"

 chi_bri.13.t: "Request for Loan Extension"
 chi_bri.13.d: "[FROM.GetName] has petitioned Beijing to restructure its outstanding Belt and Road obligations, citing fiscal constraints and unforeseen circumstances. The request carries both a humanitarian dimension and a strategic calculation."
 chi_bri.13.a: "Grant the extension"
 chi_bri.13.b: "Refuse the extension"

 chi_bri.15.t: "Mega-Project: Where to Build?"
 chi_bri.15.d: "Beijing has approved a flagship mega-project for [FROM.GetName]. Unlike ordinary Belt and Road works, this undertaking will be Chinese-managed and carry Chinese strategic interests directly. The choice of location will define the project's purpose for decades to come."
 chi_bri.15.a: "Gwadar Port (Balochistan)"
 chi_bri.15.b: "Balochistan Special Economic Zone"
 chi_bri.15.c: "Lahore Railway Corridor (Punjab)"
 chi_bri.15.d: "Hambantota Port (Southern Province)"
 chi_bri.15.e: "Colombo Port City (Western Province)"
 chi_bri.15.f: "Mombasa-Nairobi SGR Terminal"
 chi_bri.15.g: "Coastal strategic facility"

 chi_bri.20.t: "Hambantota: The 99-Year Lease"
 chi_bri.20.d: "Unable to service the debts accrued during construction, the government of Sri Lanka is facing a stark choice. China Merchants Port Holdings has proposed a 99-year lease on Hambantota Port in exchange for debt relief. Critics call it debt-trap diplomacy; proponents call it pragmatic statecraft."
 chi_bri.20.a: "Accept the lease terms"
 chi_bri.20.b: "Refuse to surrender the port"

 chi_bri.21.t: "Gwadar: A Request for Naval Facilities"
 chi_bri.21.d: "With the China-Pakistan Economic Corridor fully operational, the PLA Navy has approached Islamabad with a quiet but significant request: the right to use Gwadar as a logistics and resupply point. The decision would transform CPEC from an economic corridor into a strategic foothold."
 chi_bri.21.a: "Grant China naval access"
 chi_bri.21.b: "Politely decline"

 chi_bri.22.t: "Doraleh: China's First Overseas Base"
 chi_bri.22.d: "Djibouti has hosted foreign military installations for decades, but Beijing's proposal is of a different character. The planned facility at Doraleh would be the People's Liberation Army's first permanent overseas base, a milestone that Western strategists have long feared and Chinese planners long pursued."
 chi_bri.22.a: "Grant China basing rights"
 chi_bri.22.b: "Reject the proposal"

 chi_bri.30.t: "Beijing's Petroyuan Threatens Dollar Hegemony"
 chi_bri.30.d: "China's announcement of yuan-denominated oil futures has sent shockwaves through Washington. If petroyuan pricing gains traction among OPEC members and BRI partners, the dollar's reserve-currency status faces its most serious challenge in generations. Congress is demanding a response."
 chi_bri.30.a: "Respond forcefully with sanctions"
 chi_bri.30.b: "Monitor the situation for now"

 chi_bri.40.t: "Belt and Road Forum Opens in Beijing"
 chi_bri.40.d: "Heads of government and finance ministers from across Asia, Africa, and Europe have converged on Beijing for the triennial Belt and Road Forum. The gathering is part summit, part trade fair, and part geopolitical theatre. China's choices this week will set the tone for the next phase of the initiative."
 chi_bri.40.a: "Announce a bold new initiative"
 chi_bri.40.b: "Host a bilateral signing wave"
 chi_bri.40.c: "Lead with reform and transparency"

 chi_bri.41.t: "Bilateral Signing Ceremonies"
 chi_bri.41.d: "The forum's great halls are lined with flags and cameras as delegations queue to sign cooperation agreements with Beijing. Each signature cements a relationship; each handshake is a photograph for domestic audiences at home and abroad."
 chi_bri.41.a: "Proceed with signings"

 chi_bri.42.t: "Forum Press Conference"
 chi_bri.42.d: "Journalists from around the world have assembled for the forum's closing press conference. The framing China chooses now will dominate international coverage and set expectations for the next three years of Belt and Road diplomacy."
 chi_bri.42.a: "Strike an assertive, sovereign tone"
 chi_bri.42.b: "Emphasise cooperation and mutual gain"

 chi_bri.43.t: "Belt and Road Forum: Final Assessment"
 chi_bri.43.d: "The delegations have departed and the banners have come down. Diplomats and economists are tallying the outcomes: agreements signed, pledges made, influence accumulated. The Belt and Road Forum has once again reshaped perceptions of China's global role."
 chi_bri.43.a: "Publish the results"

 chi_bri.50.t: "Pax Sinica Established"
 chi_bri.50.d: "China's Belt and Road network now spans every inhabited continent. The web of infrastructure, debt, and diplomatic obligation that Beijing has woven over decades has crystallised into something unprecedented: an international order shaped in the image of Chinese interests. Historians will debate whether to call it hegemony or partnership. The world will simply call it a fact."
 chi_bri.50.a: "Declare a new era of Chinese leadership"

 chi_bri.70.t: "Africa Embraces the Chinese Century"
 chi_bri.70.d: "The cumulative effect of more than a decade of Forum on China-Africa Cooperation summits, Belt and Road projects, and debt-relief diplomacy has produced a decisive shift. Across the continent, governments that once hedged between Beijing and Washington are consolidating around China as their primary partner. A generation of African leaders has grown up with Chinese infrastructure, Chinese credit, and Chinese advisors."
 chi_bri.70.a: "Announce the African-Chinese Partnership Era"

 chi_bri.71.t: "Flagship Projects for Africa"
 chi_bri.71.d: "To cement the new era, Beijing has earmarked funding for a round of flagship mega-projects across its African partner network. These will not be ordinary infrastructure grants; they will be Chinese-anchored developments carrying long-term strategic rights and preferential access clauses."
 chi_bri.71.a: "Dispatch project teams"

 chi_bri.80.t: "FOCAC Summit Convenes"
 chi_bri.80.d: "The Forum on China-Africa Cooperation has convened its latest plenary in Beijing. Finance ministers, heads of state, and development bank officials have gathered to review the state of Sino-African ties and chart the path forward. The summit's opening announcement will define whether this gathering is remembered for generosity or leverage."
 chi_bri.80.a: "Announce a debt write-off"
 chi_bri.80.b: "Lock in collateral clauses"
