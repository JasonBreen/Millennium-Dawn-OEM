 # TAK 1  Lips and Teeth
 CHI_Lips_and_Teeth: "Lips and Teeth"
 CHI_Lips_and_Teeth_desc: "The historic characterization of Sino-North Korean relations 'as close as lips and teeth' has guided Chinese policy since the Korean War. Formalizing this doctrine commits China to the Kim regime's survival, deepening ties with Pyongyang at the cost of broader Korean reconciliation."
 CHI_Dandong_Lifeline: "The Dandong Lifeline"
 CHI_Dandong_Lifeline_desc: "Dandong, China's border city, handles the overwhelming majority of North Korea's external trade. Restoring and expanding this pipeline provides Pyongyang with economic oxygen and cements Chinese leverage over the regime."
 CHI_Mount_Paektu_Understanding: "Mount Paektu Understanding"
 CHI_Mount_Paektu_Understanding_desc: "A secret bilateral understanding, concluded in the shadow of Mount Paektu  the mythologized birthplace of the Kim dynasty  formalizes Chinese security consultations with North Korean military command."
 CHI_Fortress_of_the_East: "Fortress of the East"
 CHI_Fortress_of_the_East_desc: "Transforming North Korea into an impenetrable buffer state serves Chinese strategic depth. Beijing backs a doctrine of total military preparedness that makes any push against Pyongyang prohibitively costly."
 CHI_Pyongyang_Pivot: "The Pyongyang Pivot"
 CHI_Pyongyang_Pivot_desc: "Rather than hardening the regime, China encourages a cautious economic opening modeled on Deng Xiaoping's reforms. A more prosperous North Korea would be a more stable neighbor  and a more tractable partner."
 CHI_Yalu_Defense_Pact: "Yalu Defense Pact"
 CHI_Yalu_Defense_Pact_desc: "A formal defense arrangement along the Yalu River binds Chinese and North Korean military planning, granting Beijing guaranteed access while pledging mutual defense."
 CHI_Nuclear_Insurance: "Nuclear Insurance"
 CHI_Nuclear_Insurance_desc: "Beijing extends de facto recognition of North Korea's nuclear arsenal as a deterrent, not a liability. By accepting Pyongyang as a nuclear state, China provides insurance against regime collapse while drawing international condemnation."
 CHI_Rason_SEZ_Expansion: "Rason SEZ Expansion"
 CHI_Rason_SEZ_Expansion_desc: "The Rason Special Economic Zone on North Korea's northeast coast offers a test case for economic modernization. Chinese investment can unlock port access and resource flows while demonstrating the viability of gradual reform."
 CHI_Normalise_the_Hermit: "Normalize the Hermit"
 CHI_Normalise_the_Hermit_desc: "With reforms taking root, China sponsors North Korea's formal reintegration into regional economic and diplomatic channels  ending decades of isolation and positioning Beijing as the architect of Pyongyang's opening."

 # Variable tooltips
 CHI_korea_alignment: "[CHI.GetAdjectiveCap]-Korean Alignment"
 CHI_korea_alignment_tt: "$CHI_korea_alignment$: $RIGHT|+=1$"
 CHI_top_influencer_koreas_tt: "China must be the leading foreign influence on both North and South Korea."

 CHI_security_guarantee: "Chinese Security Guarantee"
 CHI_security_guarantee_desc: "Beijing has pledged to treat an attack on North Korea as an attack on China. The guarantee provides Pyongyang with breathing room and reinforces the regime's dependence on Chinese patronage."
 CHI_oil_pipeline_opened: "Dandong Pipeline"
 CHI_oil_pipeline_opened_desc: "The Dandong-Sinuiju oil pipeline has been reopened at Chinese expense. Fuel shortages are eased, and Chinese economic leverage over Pyongyang is reinforced."
 CHI_joint_command_consultations: "Joint Command Consultations"
 CHI_joint_command_consultations_desc: "Regular strategic consultations between Chinese and North Korean military commands are improving coordination and reducing the risk of miscalculation."
 CHI_fortress_doctrine: "Fortress Korea Doctrine"
 CHI_fortress_doctrine_desc: "North Korea's military posture has been reorganized around a total-defense doctrine backed by Chinese material support. Any attacker faces an attritional campaign at enormous cost."
 CHI_reform_pressure: "Chinese Reform Pressure"
 CHI_reform_pressure_desc: "China has made clear that its continued support is conditional on limited economic liberalization. The pressure is creating internal debate within the Korean Workers' Party."
 CHI_mutual_defense_pact: "Sino-Korean Mutual Defense Pact"
 CHI_mutual_defense_pact_desc: "A formal mutual defense arrangement binds Chinese and North Korean strategic planning. Pyongyang gains a binding security umbrella; Beijing gains guaranteed access and influence over the Korean People's Army."
 CHI_rason_investment_flow: "Rason Investment Programme"
 CHI_rason_investment_flow_desc: "Chinese capital is flowing into the Rason Special Economic Zone, funding infrastructure, industrial capacity, and port facilities. The experiment is producing visible results."
 CHI_rason_port_access: "Rason Port Access"
 CHI_rason_port_access_desc: "Chinese vessels now have reliable access to Rason's deep-water port, providing the People's Liberation Army Navy with a strategic foothold in the Sea of Japan."
 NKO_normalised_state: "Normalized State"
 NKO_normalised_state_desc: "North Korea has rejoined regional diplomatic and economic channels under Chinese sponsorship. The isolation of the Hermit Kingdom is formally at an end."
 CHI_diplomatic_engagement: "Korean Diplomatic Engagement"
 CHI_diplomatic_engagement_desc: "China has committed to an active diplomatic role on the Korean Peninsula, facilitating direct contacts between the parties and offering Beijing's good offices as a neutral forum."
 CHI_unification_fund: "Chinese Unification Fund"
 CHI_unification_fund_desc: "Beijing has pledged significant resources to a fund designed to offset the economic costs of Korean reconciliation. The commitment gives China a structural role in any unification process."
 CHI_unification_creditor: "Korea Unification Creditor"
 CHI_unification_creditor_desc: "China is now the principal creditor of the Korean unification framework. The financial exposure creates both risk and leverage in the outcome of the peninsula's future."
 NKO_reconstruction_preparation: "Reconstruction Preparation"
 NKO_reconstruction_preparation_desc: "North Korean planners, supported by Chinese technical advisers, are quietly preparing the economic integration framework that unification would require."
 JAP_unification_partnership: "Unification Partnership"
 JAP_unification_partnership_desc: "Japan has agreed to participate in the Chinese-sponsored economic framework for Korean unification, contributing financial resources and technical expertise."
 KOR_chinese_economic_ties: "Chinese Economic Partnership"
 KOR_chinese_economic_ties_desc: "A deepened trade and investment relationship with China is improving South Korea's economic performance and creating interdependencies that reinforce diplomatic cooperation."

