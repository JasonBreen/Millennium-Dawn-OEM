 # ============================================================
 # Belt and Road Initiative (BRI) Focus Tree
 # ============================================================

 # --- Stem (4) ---
 CHI_Belt_and_Road_Launch: "One Belt, One Road"
 CHI_Belt_and_Road_Launch_desc: "In September 2013, Xi Jinping announced the Silk Road Economic Belt in Astana, followed weeks later by the 21st Century Maritime Silk Road in Jakarta. Together they became China's signature infrastructure diplomacy vision, projecting investment across more than 140 countries."
 CHI_AIIB_Founding: "Asian Infrastructure Investment Bank"
 CHI_AIIB_Founding_desc: "Established in 2015 with 57 founding members despite vigorous opposition from Washington, the Asian Infrastructure Investment Bank provides multilateral financing for infrastructure across Asia and beyond. Its founding demonstrated that China could build credible international institutions outside the Bretton Woods framework."
 CHI_Silk_Road_Fund: "Silk Road Fund"
 CHI_Silk_Road_Fund_desc: "Capitalized at $40 billion in December 2014 from China's foreign exchange reserves and sovereign wealth funds, the Silk Road Fund provides equity financing for BRI projects that commercial banks and multilateral lenders will not carry alone."
 CHI_Project_Coordination_Cell: "BRI Project Coordination Group"
 CHI_Project_Coordination_Cell_desc: "The International Department of the Central Committee, known as Zhonglianbu, chairs a cross-ministry coordination group that screens applications, assigns project managers, and monitors delivery timelines across all BRI corridors."

 CHI_Maritime_Silk_Road_Indian_Ocean: "String of Pearls Strategy"
 CHI_Maritime_Silk_Road_Indian_Ocean_desc: "A chain of port investments and logistics facilities across the Indian Ocean littoral - including Hambantota in Sri Lanka in 2017 and Doraleh in Djibouti the same year - extends China's commercial and potential naval reach from the South China Sea to the Horn of Africa. Critics describe the pattern as a String of Pearls encircling India."
 CHI_Central_Asia_Connectivity: "Silk Road Economic Belt"
 CHI_Central_Asia_Connectivity_desc: "The Silk Road Economic Belt runs overland through Central Asia, anchored by the Khorgos Gateway dry port on the Kazakhstan border, which opened in 2015 as a rail-road transhipment hub linking Chinese rail gauge to the Russian broad gauge network. Freight volumes along the corridor grow as transit times undercut sea shipping for time-sensitive cargo."
 CHI_Mekong_Riparian_Cooperation: "Lancang-Mekong Cooperation"
 CHI_Mekong_Riparian_Cooperation_desc: "The Lancang-Mekong Cooperation mechanism, established in 2016, organizes joint infrastructure development, water resource management, and trade facilitation among the six riparian states sharing the Mekong river system. China's upstream dam construction and navigation improvement projects give it considerable leverage over downstream neighbors."
 CHI_seventeen_plus_one_mechanism: "16+1 Cooperation Framework"
 CHI_seventeen_plus_one_mechanism_desc: "Established in 2012 as the 16+1 platform for China-Central and Eastern European cooperation, the grouping expanded to 17+1 when Greece joined in 2019. It channels Chinese investment into European Union and candidate-state infrastructure, raising concerns in Brussels about member-state alignment drift and regulatory circumvention."

 # --- Cluster A: Latin America ---
 CHI_Forum_China_CELAC: "China-CELAC Cooperation Forum"
 CHI_Forum_China_CELAC_desc: "The Community of Latin American and Caribbean States provides China with a multilateral channel bypassing the Organization of American States, which Washington has long dominated. The first ministerial forum in 2015 established a three-year cooperation plan covering infrastructure, trade, and agricultural investment. Beijing sees the framework as a vehicle to erode United States institutional primacy in its own hemisphere."
 CHI_Lithium_Triangle_Accord: "Lithium Triangle Accord"
 CHI_Lithium_Triangle_Accord_desc: "Argentina, Bolivia, and Chile together hold more than half of the world's recoverable lithium reserves. Long-term offtake agreements and equity stakes in extraction ventures give Chinese battery and electric vehicle manufacturers reliable access to the raw material that defines the next energy paradigm. The accords insulate Chinese supply chains from Western purchasing coalitions."
 CHI_Petrocaribe_Successor: "Successor to Petrocaribe"
 CHI_Petrocaribe_Successor_desc: "Venezuela's preferential oil programme for Caribbean and Central American states collapsed under sanctions and economic mismanagement. China steps in as the stabilizing creditor, extending oil-backed loans to Caracas, Havana, and Managua in exchange for long-term supply pledges. The arrangement deepens Beijing's ties to governments already isolated from Western capital markets."
 CHI_Five_Stars_Highway: "Five-Country Highway Corridor"
 CHI_Five_Stars_Highway_desc: "A transcontinental road corridor linking Brazilian Atlantic ports to Peruvian Pacific terminals crosses five countries and shortens overland transit by weeks. The project is the flagship of China's South American logistics ambition, duplicating the economic logic of the Panama Canal at continental scale. Chinese construction firms and financing institutions carry the entire development burden."
 CHI_Beidou_Latin_Constellation: "Beidou Latin Constellation"
 CHI_Beidou_Latin_Constellation_desc: "Ground stations for China's Beidou navigation system, established in Argentina and Venezuela, extend the constellation's precision to the Western Hemisphere and reduce regional dependence on United States GPS infrastructure. The dual-use facilities underpin civilian agriculture and surveying contracts while providing strategic positioning data. Washington treats the installations as a direct challenge to its signals-intelligence dominance in the Americas."
 CHI_Monroe_Doctrine_Inverted: "Monroe Doctrine Inverted"
 CHI_Monroe_Doctrine_Inverted_desc: "Decades of patient investment, diplomatic outreach, and infrastructure credit have repositioned China as Latin America's indispensable external partner, a role the United States once treated as its exclusive domain. Washington's ability to mobilize hemispheric coalitions against Beijing has eroded to the point where the Monroe Doctrine is no longer enforced in practice. The shift represents a structural realignment rather than a temporary fluctuation in regional opinion."

 # --- Cluster B: MENA ---
 CHI_Arab_League_Cooperation_Forum: "China-Arab States Forum"
 CHI_Arab_League_Cooperation_Forum_desc: "The China-Arab States Cooperation Forum, established in 2004, convenes foreign ministers from all 22 Arab League members to coordinate BRI project pipelines, trade policy, and political alignment. Regular ministerial meetings give China a standing institutional channel into the Middle East that bypasses Western-led frameworks. Arab states in turn gain leverage over their traditional partners through demonstrated access to Chinese capital."
 CHI_Suez_Eastern_Bank: "Suez Eastern Industrial Zone"
 CHI_Suez_Eastern_Bank_desc: "The China-Egypt Suez Economic and Trade Cooperation Zone on the eastern bank of the canal hosts Chinese manufacturing, logistics, and energy firms under preferential Egyptian regulatory terms. The zone locks in a strategic foothold at one of the world's most critical maritime chokepoints, reducing transit costs and giving Chinese enterprises a base for North African and European market access. Egypt earns hard-currency revenue and political association with a major power."
 CHI_TwentyFive_Year_Iran_Accord: "25-Year China-Iran Partnership"
 CHI_TwentyFive_Year_Iran_Accord_desc: "Signed in March 2021, the Comprehensive Strategic Partnership commits China to 400 billion United States dollars of investment in Iranian infrastructure, energy, and manufacturing over 25 years in exchange for discounted oil supplies. The accord gives Tehran a lifeline under United States sanctions and gives Beijing discounted hydrocarbons and a forward position in the Persian Gulf. Washington, Tel Aviv, and the Gulf monarchies all view the agreement as a direct threat to their regional security calculus."
 CHI_Vision_2030_Partnership: "Vision 2030 Investment Partnership"
 CHI_Vision_2030_Partnership_desc: "Saudi Arabia's Vision 2030 diversification agenda and China's appetite for Gulf capital and contract work converge in a sprawling partnership covering clean energy, tourism infrastructure, and advanced manufacturing. Chinese firms win major NEOM and Red Sea project contracts while Beijing secures preferential crude supply and a widening yuan settlement share. The arrangement gives Riyadh strategic optionality without formally breaking its security dependence on Washington."
 CHI_Beijing_Communique: "Beijing Peace Communique"
 CHI_Beijing_Communique_desc: "China positions itself as the broker of a historic Saudi-Iranian normalization, with the two regional rivals agreeing to restore diplomatic relations under Chinese mediation in March 2023. The communique demonstrates that Beijing can deliver geopolitical outcomes Washington cannot or will not, cementing its credibility as an alternative security guarantor. Regional opinion shifts measurably toward Chinese diplomatic leadership."
 CHI_Gulf_Yuan_Settlement: "Gulf Yuan Settlement Mechanism"
 CHI_Gulf_Yuan_Settlement_desc: "Gulf Cooperation Council states begin pricing a significant share of crude oil exports in renminbi, routed through the Cross-Border Interbank Payment System rather than SWIFT. Combined with central-bank swap lines and sovereign wealth fund RMB allocations, the shift steadily erodes the petrodollar's structural advantage. The United States loses a lever of financial coercion it has exercised since 1974."

 # --- Cluster C: Pacific ---
 CHI_Pacific_Island_Forum_Pivot: "Pacific Island Forum Pivot"
 CHI_Pacific_Island_Forum_Pivot_desc: "China accelerates its diplomatic offensive across Pacific Island states, offering debt-light infrastructure grants, fisheries agreements, and diplomatic recognition packages. The Forum itself becomes a contested arena as Beijing cultivates swing votes and sponsored observers. Australia and New Zealand, which have historically dominated Pacific institutional frameworks, find their leadership challenged at every ministerial session."
 CHI_Honiara_Security_Pact: "Honiara Security Agreement"
 CHI_Honiara_Security_Pact_desc: "The security framework signed with the Solomon Islands in April 2022 allows the People's Liberation Army Navy to berth, resupply, and conduct operations from Honiara, less than 2,000 kilometres from the Australian mainland. Canberra reacts with alarm, accelerating AUKUS timelines and lobbying Washington for increased Pacific deterrence posture. The pact gives China its first acknowledged security footprint east of the First Island Chain."
 CHI_Tonga_Tuna_Concession: "Pacific Fisheries Concessions"
 CHI_Tonga_Tuna_Concession_desc: "Exclusive access agreements with Tonga, Vanuatu, and Fiji grant Chinese distant-water fishing fleets preferential rights across vast exclusive economic zones in the central and western Pacific. In exchange, Beijing funds port upgrades, refrigeration facilities, and maritime surveillance capacity that ties recipient governments into long-term infrastructure dependency. The fisheries deals are the leading economic edge of a broader Pacific engagement strategy."
 CHI_Eight_Country_Initiative: "Eight-Country Pacific Initiative"
 CHI_Eight_Country_Initiative_desc: "A consolidated security and economic framework proposed to eight Pacific Island states would have given China a region-wide policing, fisheries monitoring, and data network agreement in a single signature. The initiative tests whether Beijing's accumulated diplomatic capital across the Pacific can be converted into a collective arrangement rivalling the regional architecture Australia has maintained since the 1990s. Success or failure determines whether China leads or merely participates in Pacific institutional design."
 CHI_Second_Island_Chain_Reach: "Second Island Chain Projection"
 CHI_Second_Island_Chain_Reach_desc: "PLA Navy access rights negotiated across the Melanesian and Polynesian Pacific bring forward operating bases within striking distance of Guam, Hawaii, and the sea lanes connecting the United States to its East Asian allies. The projection breaks the strategic logic of the Second Island Chain that American planners have relied on since the Cold War. Australia loses the geographic buffer it has treated as a strategic constant."

 # --- Cluster D: Western Europe ---
 CHI_Rome_Memorandum: "Rome BRI Memorandum"
 CHI_Rome_Memorandum_desc: "Italy's signature on a Belt and Road Memorandum of Understanding in March 2019 was the first by a G7 member, fracturing Western consensus on containing Chinese infrastructure diplomacy in Europe. The agreement covers port, rail, and digital infrastructure cooperation, with Trieste and Genoa positioned as the northern Adriatic and Ligurian terminals for Chinese cargo. Brussels and Washington pressed Rome to withdraw, but the immediate commercial appeal of Chinese investment proved politically durable."
 CHI_Piraeus_Model: "Piraeus Port Model"
 CHI_Piraeus_Model_desc: "COSCO's acquisition of a majority stake in the Port of Piraeus in 2016 transformed Greece's principal commercial harbour into the busiest container port in the Mediterranean and a template for Chinese port management across Europe. The model delivers measurable economic returns to host governments while embedding Chinese operational control at strategic chokepoints. Minor equity stakes extended to Lisbon and Hamburg keep those capitals engaged without triggering the regulatory scrutiny that a majority acquisition would invite."
 CHI_Comprehensive_Agreement_Investment: "EU-China Investment Agreement"
 CHI_Comprehensive_Agreement_Investment_desc: "The Comprehensive Agreement on Investment, concluded after seven years of negotiations in December 2020, would grant Chinese firms improved access to European services markets in exchange for stronger commitments on state-aid transparency and forced technology transfer. The European Parliament suspended ratification in 2021 following mutual sanctions, but the economic logic of the deal persists. A ratified agreement would significantly lower barriers for Chinese capital across the bloc's single market."
 CHI_Geneva_Carve_Out: "Geneva Bilateral Framework"
 CHI_Geneva_Carve_Out_desc: "Switzerland's tradition of commercial neutrality makes it a natural entry point for Chinese capital seeking European market access that avoids European Union regulatory scrutiny. A bilateral free trade agreement updated in 2023 and a series of financial market memoranda give Chinese banks and sovereign funds a Geneva foothold that operates under lighter oversight than any comparable EU jurisdiction. The arrangement suits both parties: Bern earns fee income and transaction volume, while Beijing gains a credible Western financial address."

 # --- BRI Tooltip Keys ---
 CHI_petrocaribe_usa_tt: "Washington reassesses its posture toward Venezuela and allied oil clients in the Caribbean basin."
 CHI_beidou_latam_usa_tt: "Washington initiates a counter-program to challenge Chinese navigation infrastructure in Latin America."
 CHI_iran_accord_usa_tt: "Washington tightens secondary sanctions in response to the deepening China-Iran strategic alignment."
 CHI_honiara_aus_tt: "Canberra accelerates its Pacific deterrence posture and requests increased United States forward presence."
 CHI_second_island_aus_tt: "Canberra and Washington reassess Pacific basing arrangements as PLA access reshapes the Second Island Chain calculus."

