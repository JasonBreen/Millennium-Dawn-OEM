 CHI_korean_peninsula_category: "Korean Peninsula"
 CHI_korean_peninsula_category_desc: "China's strategic decisions regarding the Korean Peninsula."
 CHI_KPA_Officer_Exchange: "KPA Officer Exchange Programme"
 CHI_KPA_Officer_Exchange_desc: "Dispatch PLA officers to Pyongyang for joint training and planning sessions with Korean People's Army counterparts. Each cycle deepens military interoperability and Chinese leverage over North Korean command."
 CHI_MSS_Pyongyang_Station: "MSS Pyongyang Station"
 CHI_MSS_Pyongyang_Station_desc: "Expand the Ministry of State Security station in Pyongyang to increase intelligence coverage of the North Korean leadership and early-warning capability for regime instability."
 CHI_NKO_Rason_SEZ_Investment: "Rason SEZ Investment"
 CHI_NKO_Rason_SEZ_Investment_desc: "Commit direct funding to the Rason Special Economic Zone. The investment unlocks port access and demonstrates the viability of North Korean economic reform."
 CHI_MSS_Quiet_Removal_Operation: "Quiet Removal Operation"
 CHI_MSS_Quiet_Removal_Operation_desc: "The Ministry of State Security has identified a hardline faction in Pyongyang obstructing the reform agenda. A discreet operation can remove the obstacle and clear the path for further liberalization."
 CHI_Track_II_Diplomacy: "Track II Diplomacy"
 CHI_Track_II_Diplomacy_desc: "Fund informal academic and think-tank exchanges between Chinese, American, and Korean specialists. Each round builds mutual understanding and prepares the ground for formal negotiations."
 CHI_Press_NKO_on_Nuclear: "Press Pyongyang on Nuclear Restraint"
 CHI_Press_NKO_on_Nuclear_desc: "Apply direct diplomatic pressure on North Korea to freeze nuclear testing and limit deployments. Progress is incremental but demonstrates to Washington that Beijing is a serious partner on non-proliferation."

 # =====================
 # Korean Peninsula Rework  Events
 # =====================
 CHI_foreign.001.t: "Beijing Backs Pyongyang"
 CHI_foreign.001.d: "China has formally reaffirmed its commitment to the Kim regime, describing the relationship as 'as close as lips and teeth.' The signal leaves no ambiguity about where Beijing stands."
 CHI_foreign.001.a: "This threatens regional stability."
 CHI_foreign.002.t: "The Paektu Understanding"
 CHI_foreign.002.d: "Beijing and Pyongyang have concluded a secret security understanding in the mountains north of Paektu. The arrangement deepens military coordination between the two states."
 CHI_foreign.002.a: "A new chapter in the alliance."
 CHI_foreign.003.t: "Fortress Korea"
 CHI_foreign.003.d: "With Chinese backing, North Korea has announced the adoption of the Fortress Korea defense doctrine  total military preparedness, with Chinese material support behind every fortification."
 CHI_foreign.003.a: "We stand ready to defend."
 CHI_foreign.004.t: "China Fortifies the North"
 CHI_foreign.004.d: "China has formalized its military support for North Korea's defensive posture. The balance of power on the peninsula has shifted against Seoul."
 CHI_foreign.004.a: "We must strengthen our own defenses."
 CHI_foreign.005.t: "A Visit to Shenzhen"
 CHI_foreign.005.d: "Chinese officials have invited the North Korean delegation to observe Shenzhen's special economic zone  a model for cautious, controlled economic opening. The visit offers a choice between transformation and isolation."
 CHI_foreign.005.a: "Embrace the Shenzhen model."
 CHI_foreign.005.b: "Our system needs no foreign prescriptions."
 CHI_foreign.006.t: "The Yalu Defense Pact"
 CHI_foreign.006.d: "Beijing and Pyongyang have signed a formal defense pact along the Yalu River. China will treat an armed attack on North Korea as a direct threat to Chinese strategic interests."
 CHI_foreign.006.a: "The shield of China is ours."
 CHI_foreign.007.t: "The Yalu Pact: A New Red Line"
 CHI_foreign.007.d: "China has signed a formal defense arrangement with North Korea. The pact creates a new red line for American military planners  any advance toward Pyongyang risks direct Chinese intervention."
 CHI_foreign.007.a: "We note Beijing's escalation."
 CHI_foreign.008.t: "Beijing Recognizes Pyongyang's Arsenal"
 CHI_foreign.008.d: "China has extended de facto recognition of North Korea as a nuclear state, providing international cover for Pyongyang's arsenal and directly challenging the non-proliferation regime."
 CHI_foreign.008.a: "This is an unacceptable provocation."
 CHI_foreign.009.t: "China Endorses Northern Nuclear Status"
 CHI_foreign.009.d: "Beijing has signaled that it accepts North Korea's nuclear weapons as a permanent feature of the regional landscape, undermining Seoul's position on denuclearization."
 CHI_foreign.009.a: "We will not be intimidated."
 CHI_foreign.010.t: "The Hermit Steps Out"
 CHI_foreign.010.d: "Under Chinese sponsorship, North Korea has opened diplomatic and economic contacts with regional partners. The country's enforced isolation is ending  on Beijing's terms."
 CHI_foreign.010.a: "A new era of cautious engagement."
 CHI_foreign.011.t: "North Korea Normalizes"
 CHI_foreign.011.d: "China has sponsored North Korea's re-entry into regional channels. Tokyo must now navigate a more diplomatically active Pyongyang."
 CHI_foreign.011.a: "We welcome North Korea's opening."
 CHI_foreign.011.b: "We view this development with concern."
 CHI_foreign.012.t: "A Signal from Beijing"
 CHI_foreign.012.d: "Chinese officials have quietly suggested that Washington reconsider its approach to the Korean question, implying that a diplomatic initiative may be forthcoming. The signal could be an opening or a feint."
 CHI_foreign.012.a: "We will watch carefully."
 CHI_foreign.013.t: "The Chinese Approach"
 CHI_foreign.013.d: "A Chinese envoy has proposed establishing a discreet back channel on the Korean Peninsula between Beijing and Washington. Chinese diplomatic overtures to America on Korea are rare  this one may be genuine."
 CHI_foreign.013.a: "Open the back channel."
 CHI_foreign.013.b: "We are not interested in Beijing's terms."
 CHI_foreign.014.t: "Joint Statement Framework"
 CHI_foreign.014.d: "The groundwork for a joint statement on the Korean Peninsula's future is in place. Beijing has tabled a draft framework for review."
 CHI_foreign.014.a: "Review the draft."
 CHI_foreign.015.t: "Six-Party Talks Reconvened"
 CHI_foreign.015.d: "China has succeeded in bringing all six parties back to the table. The framework is fragile but represents the first structured diplomatic engagement on the peninsula in years."
 CHI_foreign.015.a: "The talks begin."
 CHI_foreign.016.t: "The Six-Party Framework Revives"
 CHI_foreign.016.d: "At Beijing's invitation, all six parties have convened. American engagement will be critical to any meaningful outcome."
 CHI_foreign.016.a: "Engage constructively."
 CHI_foreign.017.t: "Invited to the Six-Party Table"
 CHI_foreign.017.d: "China has convened the Six-Party Talks. Pyongyang faces a choice between engagement and deepening isolation."
 CHI_foreign.017.a: "Attend under protest."
 CHI_foreign.018.t: "The Six-Party Talks Resume"
 CHI_foreign.018.d: "Beijing has reconvened the Six-Party framework. South Korea's participation is essential  Seoul's positions on denuclearization and security guarantees will shape the outcome."
 CHI_foreign.018.a: "Engage with clear conditions."
 CHI_foreign.019.t: "Six-Party Talks: Japan Included"
 CHI_foreign.019.d: "Japan has been included in the Six-Party framework. Tokyo's security concerns  abductions, missile trajectories, nuclear contingencies  make its participation both necessary and complicated."
 CHI_foreign.019.a: "Attend and press our concerns."
 CHI_foreign.020.t: "Russia Joins the Six-Party Table"
 CHI_foreign.020.d: "Beijing has included Moscow in its revived Six-Party framework. Russian participation adds another dimension to the negotiations."
 CHI_foreign.020.a: "Participate in the framework."
 CHI_foreign.021.t: "US Forces: A Question of Presence"
 CHI_foreign.021.d: "As part of the post-armistice security architecture, China has raised the question of American military presence on the peninsula. Two options are on the table."
 CHI_foreign.021.a: "Withdraw forces from Korea entirely."
 CHI_foreign.021.b: "Redeploy to Japan  maintain a regional presence."
 CHI_foreign.022.t: "Three Security Questions"
 CHI_foreign.022.d: "The post-armistice architecture raises three questions Beijing and Washington must answer: the future of American forces, the denuclearization timeline, and security guarantees for Pyongyang. Each answer shapes the final settlement."
 CHI_foreign.022.a: "Raise the question of American troop withdrawal."
 CHI_foreign.022.b: "Propose a phased denuclearization roadmap."
 CHI_foreign.022.c: "Offer security guarantees to Pyongyang."
 CHI_foreign.023.t: "The G2 Declaration"
 CHI_foreign.023.d: "China and the United States have issued a joint declaration defining their shared responsibilities as the world's two leading powers  with the Korean Peninsula as their first shared test."
 CHI_foreign.023.a: "A new chapter in great-power relations."
 CHI_foreign.024.t: "Beijing Backs Seoul"
 CHI_foreign.024.d: "China has signaled its acceptance of a Seoul-centric settlement of the Korean question  a historic shift in Beijing's position that Pyongyang must now reckon with."
 CHI_foreign.024.a: "We consider our options carefully."
 CHI_foreign.025.t: "Beijing Endorses South Korea"
 CHI_foreign.025.d: "China has formally endorsed South Korea as the leading partner in any unification process. Seoul must decide how to respond to Beijing's unexpected alignment."
 CHI_foreign.025.a: "Accept China's support."
 CHI_foreign.026.t: "The Dragon Steps Back"
 CHI_foreign.026.d: "Beijing has signaled that it will not obstruct Korean unification under southern leadership. The historic constraint on Pyongyang's reunification calculus has been lifted."
 CHI_foreign.026.a: "Consider our position."
 CHI_foreign.027.t: "China's Strategic Payoff"
 CHI_foreign.027.d: "China's patient diplomatic strategy on the Korean Peninsula has delivered results. Washington must acknowledge Beijing as an indispensable partner in the region's emerging order."
 CHI_foreign.027.a: "Acknowledge China's contribution."
 CHI_foreign.028.t: "China Speaks  Pyongyang Listens"
 CHI_foreign.028.d: "Beijing has made clear its expectations for North Korean behavior. Pyongyang's response will define the real limits of Chinese influence over the regime."
 CHI_foreign.028.a: "Comply with Beijing's expectations."
 CHI_foreign.029.t: "The Tsinghua Faction Memo"
 CHI_foreign.029.d: "A leaked memorandum from advisers at Tsinghua University has ignited debate within the Chinese leadership. The document argues that continued support for the Kim regime is strategically counterproductive  and that Chinese interests are better served by engaging Seoul."
 CHI_foreign.029.a: "The argument has merit. Proceed with reconsideration."
 CHI_foreign.029.b: "The faction overreaches. Maintain the current line."

 # Phase II — Korean Peninsula Rework

 # Anchor
 CHI_Peninsula_Strategy: "The Peninsula Strategy"
 CHI_Peninsula_Strategy_desc: "China stands at a crossroads on the Korean Peninsula. Decades of calculated ambiguity must give way to a deliberate strategic posture. Beijing will choose its path carefully, knowing that each option carries irreversible consequences for the regional order."

 # Path A — Lips and Teeth Doctrine
 CHI_Lips_and_Teeth_Doctrine: "Lips and Teeth Doctrine"
 CHI_Lips_and_Teeth_Doctrine_desc: "China reaffirms the historic bond with North Korea. The two countries are, as always, as close as lips and teeth. Pyongyang's survival is a Chinese strategic imperative, and Beijing will act accordingly regardless of international pressure."
 CHI_The_610_Northeast_Directive: "The 610 Northeast Directive"
 CHI_The_610_Northeast_Directive_desc: "The CCP's Northeast Command activates emergency mobilization protocols across Manchuria and Liaoning. Border forces are reinforced, strategic reserves are repositioned, and infrastructure in the borderland is hardened to support any future contingency on the peninsula."
 CHI_Oppose_Strategic_Flexibility: "Oppose Strategic Flexibility"
 CHI_Oppose_Strategic_Flexibility_desc: "Washington's doctrine of 'strategic flexibility' — permitting American forces in South Korea to deploy beyond the peninsula — represents an unacceptable encroachment on Chinese security interests. Beijing formally demands its rollback."
 CHI_The_THAAD_Response: "The THAAD Response"
 CHI_The_THAAD_Response_desc: "The deployment of the THAAD anti-missile system in South Korea degrades China's nuclear deterrent. Beijing responds with economic coercion: restricting Chinese tourism, boycotting Korean entertainment products, and pressuring Korean firms operating in China."
 CHI_Exercise_Paektu_Honor: "Exercise Paektu Honor"
 CHI_Exercise_Paektu_Honor_desc: "China signals restraint through a bilateral military exercise emphasizing defensive postures at the Yalu River. The message to Washington is clear: Beijing can manage Pyongyang without an American escalatory response."
 CHI_KPA_Offensive_Readiness: "KPA Offensive Readiness"
 CHI_KPA_Offensive_Readiness_desc: "China quietly endorses a shift in the Korean People's Army's posture from defense-in-depth to forward offensive readiness. Equipment transfers accelerate, and joint planning sessions are expanded. The peninsula moves closer to the edge."
 CHI_The_2025_Blue_Sky_Operation: "Blue Sky Operation"
 CHI_The_2025_Blue_Sky_Operation_desc: "China and North Korea launch a coordinated military campaign against South Korea. The Blue Sky Operation will test China's willingness to bear the international cost of Korean unification by force."

 # Path B — The Chinese Correction
 CHI_The_Chinese_Correction: "The Chinese Correction"
 CHI_The_Chinese_Correction_desc: "The Kim dynasty's erratic behavior has become a strategic liability. China decides that a managed transition — quiet, surgical, and irreversible — is preferable to another generation of blackmail diplomacy from Pyongyang."
 CHI_The_Jang_Faction_Rehabilitation: "The Jang Faction Rehabilitation"
 CHI_The_Jang_Faction_Rehabilitation_desc: "Jang Song-thaek's purge and execution in 2013 eliminated Beijing's most reliable interlocutor in Pyongyang. China now rehabilitates his surviving network in exile, cultivating a cadre of reform-minded Korean officials who owe their futures to Beijing."
 CHI_The_Princeling_Network: "The Princeling Network"
 CHI_The_Princeling_Network_desc: "Chinese intelligence penetrates the KPA's officer corps through the children of Pyongyang's elite who were educated in China. These princelings, shaped by their years in Beijing, represent China's most reliable lever inside the North Korean state."
 CHI_Operation_New_Dawn: "Operation New Dawn"
 CHI_Operation_New_Dawn_desc: "The moment has come. Chinese-backed officers within the KPA move against the Kim family compound. What follows will be brief, violent, and decisive. The North Korean state will survive; its leadership will not."
 CHI_The_Beijing_Settlement: "The Beijing Settlement"
 CHI_The_Beijing_Settlement_desc: "With the coup consolidated, China brokers the terms of North Korea's new political reality. The transition government in Pyongyang accepts Beijing's arbitration, and the Korean Workers' Party is restructured under Chinese supervision."
 CHI_Economic_Reintegration: "Economic Reintegration"
 CHI_Economic_Reintegration_desc: "China begins the long process of integrating North Korea's economy into its own industrial sphere. Investment flows north; raw materials and labor flow south. The Korean tributary relationship, dormant for a century, is effectively restored."

 # Path C — The Seoul Gambit
 CHI_The_Seoul_Gambit: "The Seoul Gambit"
 CHI_The_Seoul_Gambit_desc: "China makes a calculated bet that a deeper relationship with Seoul can deliver more lasting security than indefinite commitment to Pyongyang. Approaching South Korea as a strategic partner rather than an adversarial neighbor is a break with decades of Chinese Korea policy."

 # Path D — The Nine Dots Consensus
 CHI_The_Nine_Dots_Consensus: "The Nine Dots Consensus"
 CHI_The_Nine_Dots_Consensus_desc: "Rather than choosing sides between Pyongyang and Seoul, China charts a calibrated middle course: maintaining ties with the North without guaranteeing the regime's survival, deepening economic links with the South without abandoning strategic ambiguity. Beijing bets that holding both threads simultaneously is the only approach that can eventually produce a stable peninsula."
 CHI_Strengthen_Relations_with_the_South: "The Jeju Channel"
 CHI_Strengthen_Relations_with_the_South_desc: "Open a standing consultation channel with Seoul through quiet back-channel diplomacy on Jeju. Beijing treats the ROK as a legitimate strategic partner in its own right, not a buffer state managed through Pyongyang."
 CHI_Maintain_Commitment_to_Denuclearization: "The Yongbyon Communiqué"
 CHI_Maintain_Commitment_to_Denuclearization_desc: "Publish a formal communiqué committing China to North Korean denuclearization. Private channels reinforce the message to Pyongyang: Beijing's diplomatic cover is conditional, not unconditional. Washington and Seoul take note of the shift."
 CHI_FTA_2015: "China-South Korea Free Trade Agreement"
 CHI_FTA_2015_desc: "The 2015 China-South Korea Free Trade Agreement is fully implemented. Tariff reductions, joint logistics corridors, and expanded agricultural and electronics trade deepen bilateral interdependence and give Seoul a material stake in stable relations with Beijing."
 CHI_The_Roh_Moohyun_Framework: "The 10.4 Declaration Revival"
 CHI_The_Roh_Moohyun_Framework_desc: "Revive the spirit of the 2007 October 4 Declaration and endorse a graduated engagement framework with North Korea. Joint agricultural projects, limited tourism, and controlled cross-border trade are pursued without preconditions."
 CHI_Takeshima_Solidarity: "The Liancourt Rocks Communiqué"
 CHI_Takeshima_Solidarity_desc: "China formally backs South Korea's claim over the Liancourt Rocks, framing the dispute as a shared grievance against Japan's refusal to acknowledge its imperial legacy. The wedge between Seoul and Tokyo widens, shifting Korean public opinion away from Washington's Pacific alliance architecture."
 CHI_Sunshine_Policy_Revival: "Sunshine Policy Revival"
 CHI_Sunshine_Policy_Revival_desc: "China coordinates with Seoul to revive the inter-Korean engagement framework that collapsed after 2010. Joint cultural exchanges, reunited family visit programs, and reopened hotlines reconstruct the basic infrastructure of communication between the two Koreas, with Beijing serving as an indispensable facilitator."
 CHI_The_Panmunjom_Architecture: "The Panmunjom Architecture"
 CHI_The_Panmunjom_Architecture_desc: "China convenes a new multilateral dialogue at Panmunjom, the site of the 1953 Armistice and the 2018 inter-Korean summit. The framework brings Seoul and Pyongyang to the same table under Chinese facilitation, committing all parties to a phased process of tension reduction backed by Chinese diplomatic guarantees. The international community credits Beijing with delivering what Washington could not."
 CHI_The_Final_Compromise: "The Final Compromise"
 CHI_The_Final_Compromise_desc: "After years of patient diplomacy, China brokers a final settlement accepted by both Koreas. Neither unification nor permanent division, the arrangement establishes a shared economic zone, demilitarized border crossings, and a joint Chinese-Korean monitoring commission. Beijing emerges as the indispensable guarantor of peace on the peninsula."

 CHI_Back_Channel_to_Foggy_Bottom: "Back Channel to Foggy Bottom"
 CHI_Back_Channel_to_Foggy_Bottom_desc: "Chinese and American diplomatic teams establish a discreet back channel through embassy back rooms and Track II interlocutors. Both sides acknowledge privately that the Korean question cannot be resolved without mutual accommodation."
 CHI_The_2022_Reset: "The [GetYear] Reset"
 CHI_The_2022_Reset_desc: "Drawing on the Bali G20 framework established in [GetYear], China and the United States formally revive the Six-Party architecture. China assumes the role of honest broker between Washington, Seoul, and Pyongyang for the first time in over a decade."

 # Path C1 — G2 Pathway
 CHI_Post_Armistice_Architecture: "Post-Armistice Architecture"
 CHI_Post_Armistice_Architecture_desc: "China and the United States jointly propose a replacement for the 1953 Armistice — a comprehensive peace framework that would formally end the Korean War and establish regional security guarantees acceptable to all parties."
 CHI_Economic_Framework_for_Unity: "Economic Framework for Unity"
 CHI_Economic_Framework_for_Unity_desc: "The two Koreas and their great-power patrons sketch an economic integration roadmap. Chinese investment in North Korean infrastructure, South Korean technology transfers, and American financial guarantees form the foundations of a possible unified Korea."
 CHI_The_G2_Declaration: "The G2 Declaration"
 CHI_The_G2_Declaration_desc: "At a summit in Washington and Beijing, Chinese and American leaders jointly declare their commitment to a peaceful, unified Korean peninsula under Korean governance. The G2 Declaration signals a new era of great-power management of East Asian security."
 CHI_Let_Seoul_Lead: "Let Seoul Lead"
 CHI_Let_Seoul_Lead_desc: "China signals its acceptance of South Korean leadership in any eventual unification process. Seoul's democratic institutions and economic weight make it the natural anchor of a unified Korea. Beijing steps back to let the Koreans determine their own future."

 # Path C2 — Without Washington
 CHI_The_Pivot_Reversed: "The Pivot Reversed"
 CHI_The_Pivot_Reversed_desc: "America's pivot to Asia has overextended Washington's commitments and created a strategic opening. China moves to fill the vacuum left as U.S. credibility erodes, positioning itself as Seoul's most capable and willing security partner."
 CHI_Indo_Pacific_Strategy_Collapsed: "Indo-Pacific Strategy Collapsed"
 CHI_Indo_Pacific_Strategy_Collapsed_desc: "South Korea's withdrawal from the U.S.-Japan-Philippines trilateral framework severs a critical link in Washington's Indo-Pacific chain. Japan is left to manage its security anxieties alone, and American credibility across the region is shaken."
 CHI_Seoul_Under_Our_Umbrella: "Seoul Under Our Umbrella"
 CHI_Seoul_Under_Our_Umbrella_desc: "China and South Korea formalize a strategic partnership framework. Chinese security guarantees replace the U.S. alliance, PLAN access to Jeju Island is negotiated, and American forces begin their long-anticipated redeployment from the peninsula."
 CHI_The_Beijing_Peace_Guarantee: "The Beijing Peace Guarantee"
 CHI_The_Beijing_Peace_Guarantee_desc: "China underwrites a final settlement between the two Koreas. The Beijing Peace Guarantee commits China to defending any unified Korea's sovereignty against external interference."

 # Phase II Ideas
 CHI_610_directive_active: "610 Northeast Directive"
 CHI_610_directive_active_desc: "The CCP's Northeast Command has activated emergency mobilization protocols. Security forces along the Yalu River are reinforced, and provincial authorities operate under expanded emergency powers."
 CHI_nko_offensive_readiness: "KPA Offensive Readiness"
 CHI_nko_offensive_readiness_desc: "With Chinese logistical backing, the Korean People's Army has shifted from a defensive posture to one optimized for rapid offensive operations southward across the 38th parallel."
 CHI_nko_blue_sky_mobilization: "Blue Sky Mobilization"
 CHI_nko_blue_sky_mobilization_desc: "The KPA has entered full combat mobilization in coordination with Chinese strategic objectives. All leave has been cancelled and forward units are moving to their assault positions."
 CHI_international_sanctions: "International Sanctions"
 CHI_international_sanctions_desc: "China's support for North Korean military aggression has triggered a sweeping international sanctions regime. Trade access is restricted, foreign investment dries up, and diplomatic isolation deepens."
 CHI_informal_sanctions: "Informal THAAD Sanctions"
 CHI_informal_sanctions_desc: "China has imposed informal economic sanctions on South Korea in response to the THAAD deployment. Chinese tourists are redirected, Korean goods face non-tariff barriers, and Korean businesses in China report official harassment."
 CHI_kpa_intelligence_penetration: "KPA Intelligence Penetration"
 CHI_kpa_intelligence_penetration_desc: "Chinese intelligence services have cultivated a network of assets within the Korean People's Army. Real-time awareness of North Korean military planning and internal politics gives Beijing an unprecedented lever over Pyongyang."
 CHI_nko_chinese_economic_sphere: "Chinese Economic Sphere"
 CHI_nko_chinese_economic_sphere_desc: "North Korea's economy has been formally incorporated into China's industrial sphere. Chinese state enterprises manage key sectors, currency peg arrangements are normalized, and the Korean won is tied to the renminbi."
 CHI_nko_infrastructure_investment: "Chinese Infrastructure Investment"
 CHI_nko_infrastructure_investment_desc: "Chinese construction brigades are rebuilding North Korean infrastructure at scale. Roads, railways, ports, and power grids are upgraded under contracts that bind North Korean resources to Chinese industrial chains for a generation."
 CHI_korean_tributary: "Korean Tributary Relationship"
 CHI_korean_tributary_desc: "North Korea's political subordination to Beijing has recreated, in modern institutional form, the tributary relationship that governed Sino-Korean relations before 1895. Chinese access to Korean ports, markets, and strategic space is formally guaranteed."
 CHI_kor_strategic_autonomy_doctrine: "Strategic Autonomy Doctrine"
 CHI_kor_strategic_autonomy_doctrine_desc: "South Korea has adopted a strategic autonomy doctrine that distances Seoul from Washington's Indo-Pacific architecture. Korea's defense posture is reoriented toward self-reliance and regional multilateralism rather than U.S. alliance management."
 CHI_kor_exit_trilateral: "Exit from Trilateral Framework"
 CHI_kor_exit_trilateral_desc: "South Korea has withdrawn from the U.S.-Japan-Philippines trilateral defense framework. The decision reflects Seoul's judgment that the framework's anti-China orientation is incompatible with its economic interests and strategic autonomy goals."

 # Phase II Decisions
 CHI_boycott_lotte: "Boycott Lotte"
 CHI_boycott_lotte_desc: "Organize a popular boycott of Lotte Group properties in China in response to Lotte's lease of land for the THAAD deployment site."
 CHI_kpop_media_ban: "K-Pop Media Ban"
 CHI_kpop_media_ban_desc: "Restrict the broadcast and distribution of Korean entertainment content in China. The ban targets Korean Wave cultural products as leverage against Seoul's security alignment choices."
 CHI_tour_group_freeze: "Tour Group Freeze"
 CHI_tour_group_freeze_desc: "Suspend organized Chinese tour groups to South Korea. The suspension removes a major source of South Korean tourism revenue and signals Beijing's willingness to use economic tools coercively."
 CHI_lift_thaad_sanctions: "Lift THAAD Sanctions"
 CHI_lift_thaad_sanctions_desc: "Formally lift the informal economic sanctions imposed in response to the THAAD deployment. The decision signals a willingness to normalize relations with Seoul."
 CHI_rcep_deepening: "RCEP Deepening"
 CHI_rcep_deepening_desc: "Propose accelerated implementation of RCEP commitments to regional partners. Deeper economic integration with the Asia-Pacific consolidates China's position as the region's indispensable economic partner."
 CHI_semiconductor_coop_with_kor: "Semiconductor Cooperation with Korea"
 CHI_semiconductor_coop_with_kor_desc: "Establish a joint semiconductor research and manufacturing initiative with South Korea. Access to Korean chip fabrication expertise accelerates Chinese technological development."
 CHI_us_korea_cost_signaling: "U.S.-Korea Cost Signaling"
 CHI_us_korea_cost_signaling_desc: "Signal to Washington and Seoul that their security alliance carries mounting economic and diplomatic costs. Targeted pressure measures remind both parties that the status quo is not cost-free."

 # Phase II Events — CHI_foreign namespace
 CHI_foreign.030.t: "The THAAD Retaliation"
 CHI_foreign.030.d: "Beijing's response to South Korea's THAAD deployment has escalated from diplomatic protest to economic coercion. Chinese authorities are directing restrictions on Korean business operations, entertainment products, and tourism — a calibrated campaign designed to impose costs without triggering a formal sanctions regime."
 CHI_foreign.030.a: "This represents an unacceptable politicization of commercial relations."
 CHI_foreign.030.b: "The pressure is regrettable but sustainable. We stand firm."
 CHI_foreign.031.t: "Beijing Signals Restraint"
 CHI_foreign.031.d: "China has signaled through military-to-military channels that the Yalu River exercises are defensive in orientation. The message from Beijing is clear: China will manage North Korea's behavior and does not require American escalation to maintain regional stability."
 CHI_foreign.031.a: "Acknowledge the signal. Maintain current posture."
 CHI_foreign.031.b: "China's assurances are not credible. Reinforce our Korean commitment."
 CHI_foreign.032.t: "Buildup at the Yalu"
 CHI_foreign.032.d: "Satellite imagery confirms a significant reorganization of North Korean ground forces toward offensive dispositions along the 38th parallel. Chinese logistical trains are supporting the repositioning. The Korean People's Army appears to be preparing for something beyond routine exercises."
 CHI_foreign.032.a: "Alert our Korean garrison. Request urgent consultations with Seoul."
 CHI_foreign.032.b: "Monitor the situation. Avoid provocative responses."
 CHI_foreign.033.t: "Article 9 Under Debate"
 CHI_foreign.033.d: "The North Korean force buildup along the 38th parallel has reignited debate in Japan's Diet over Article 9 and the constitutional limits of Japan's self-defense posture. Defense hawks are pressing for an emergency reinterpretation of collective self-defense commitments."
 CHI_foreign.033.a: "Begin contingency planning. Consult with Washington."
 CHI_foreign.033.b: "Constitutional constraints are absolute. Proceed through diplomatic channels only."
 CHI_foreign.034.t: "War on the Peninsula"
 CHI_foreign.034.d: "North Korean forces, with Chinese logistical and material support, have crossed the demilitarized zone. China has not formally entered the conflict but its fingerprints are on every aspect of the North Korean war machine."
 CHI_foreign.034.a: "Activate our mutual defense commitments with South Korea."
 CHI_foreign.034.b: "Convene an emergency Security Council session."
 CHI_foreign.035.t: "Chaos in Pyongyang"
 CHI_foreign.035.d: "Unconfirmed reports of gunfire and military movement within the Pyongyang security perimeter suggest something extraordinary is occurring in North Korea's capital. Chinese state media is silent. The situation is dangerously unclear."
 CHI_foreign.035.a: "Go to maximum alert. Prepare contingency forces."
 CHI_foreign.035.b: "Make no move until the situation clarifies."
 CHI_foreign.036.t: "The Pyongyang Coup"
 CHI_foreign.036.d: "Chinese-backed officers have staged a coup against Kim Jong-un. The Kim family has been removed from power. A transitional council is forming in Pyongyang under figures known to be Beijing's interlocutors. China appears to be midwifing a managed succession."
 CHI_foreign.036.a: "Issue a formal statement condemning interference in North Korean sovereignty."
 CHI_foreign.036.b: "Open back-channel contact with the transitional council."
 CHI_foreign.037.t: "A New Pyongyang"
 CHI_foreign.037.d: "The coup in North Korea brings both opportunity and danger for Japan. A China-aligned transitional government in Pyongyang may be more predictable than Kim Jong-un, but a Chinese client state on the Korean peninsula represents a significant strategic challenge for Tokyo."
 CHI_foreign.037.a: "Express concern to Beijing through diplomatic channels."
 CHI_foreign.037.b: "Wait and observe. The situation is too fluid for strong statements."
 CHI_foreign.038.t: "The Beijing Settlement"
 CHI_foreign.038.d: "China has announced the terms of the post-coup political settlement in Pyongyang. The new North Korean government is constitutionally restructured, economically integrated into Chinese supply chains, and strategically subordinated to Beijing's Korea policy."
 CHI_foreign.038.a: "Formally protest the unilateral restructuring of North Korean governance."
 CHI_foreign.038.b: "Accept the new reality. Seek accommodation with Beijing's Korea policy."
 CHI_foreign.040.t: "Seoul Drifts"
 CHI_foreign.040.d: "South Korea's adoption of a strategic autonomy doctrine and its decision to engage China as a primary security partner represents a profound realignment of the Indo-Pacific balance. The U.S.-Korea alliance, sustained since 1953, faces its most serious strain in decades."
 CHI_foreign.040.a: "This realignment is unacceptable. Signal consequences to Seoul."
 CHI_foreign.040.b: "Accept the drift. The alliance cannot be maintained by compulsion."
 CHI_foreign.041.t: "Which China?"
 CHI_foreign.041.d: "South Korea's pivot toward Beijing has forced Pyongyang into an uncomfortable calculation. A China-Seoul partnership that excludes North Korea is strategically more threatening than America's presence in the south."
 CHI_foreign.041.a: "Express cautious interest in the changing configuration."
 CHI_foreign.041.b: "Reject the framing. China is not abandoning North Korea."
 CHI_foreign.042.t: "Tokyo Alone"
 CHI_foreign.042.d: "South Korea's withdrawal from the trilateral U.S.-Japan-Korea security framework leaves Japan isolated within what remains of the Indo-Pacific architecture. Without Seoul's participation, Japan's security relationships with Washington lack a critical pillar."
 CHI_foreign.042.a: "Begin urgent consultations with Washington on compensatory measures."
 CHI_foreign.042.b: "Assess whether bilateral Japan-Korea security arrangements are achievable."
 CHI_foreign.043.t: "The Framework Frays"
 CHI_foreign.043.d: "South Korea's withdrawal from the trilateral security framework has triggered anxiety in Manila about the durability of American security commitments across the Indo-Pacific. Philippine officials have begun quiet reassessment of their own alliance posture."
 CHI_foreign.043.a: "Reassure our Philippine partners of our commitment."
 CHI_foreign.043.b: "Begin a strategic review of Indo-Pacific commitments."
 CHI_foreign.044.t: "The Indo-Pacific Strategy Collapses"
 CHI_foreign.044.d: "South Korea's exit from the trilateral framework effectively dismantles the Indo-Pacific architecture that Washington spent a decade building. China has achieved through patient diplomacy what it could never have achieved through confrontation."
 CHI_foreign.044.a: "Launch an immediate diplomatic offensive to rebuild the framework."
 CHI_foreign.044.b: "Accept the strategic setback. Recalibrate around remaining partners."
 CHI_foreign.045.t: "Troops Come Home"
 CHI_foreign.045.d: "South Korea's formal endorsement of Chinese security guarantees has made the continued presence of U.S. ground forces on the peninsula politically untenable. Seoul has requested a timetable for American military redeployment from Korean territory."
 CHI_foreign.045.a: "Accept the request. Begin an orderly redeployment."
 CHI_foreign.045.b: "Refuse. American forces remain on the peninsula at Washington's discretion."
 CHI_foreign.046.t: "The Alliance Hollow"
 CHI_foreign.046.d: "The U.S. redeployment from Korea renders the U.S.-Japan security alliance strategically incomplete. Japan's southern flank is exposed, and the assumptions underpinning Japanese defense planning for the past seven decades require fundamental revision."
 CHI_foreign.046.a: "Begin emergency consultations with Washington on Japan's security posture."
 CHI_foreign.046.b: "Accelerate indigenous defense capacity development."
 CHI_foreign.047.t: "The Beijing Guarantee"
 CHI_foreign.047.d: "China has offered South Korea a formal security guarantee underwriting any future unification settlement. The Beijing Guarantee commits China to defending a unified Korea's sovereignty — in exchange for strategic arrangements that effectively transform Korea into a Chinese-aligned state."
 CHI_foreign.047.a: "Accept the guarantee. Korea's future cannot depend on distant patrons."
 CHI_foreign.047.b: "Reject the offer. Korean sovereignty cannot be traded for Chinese patronage."
 CHI_foreign.048.t: "The Guarantee and the North"
 CHI_foreign.048.d: "China's offer of a security guarantee for a unified Korea has forced a moment of clarity in Pyongyang. North Korean leadership must choose between resistance and accommodation — knowing that resistance without Chinese backing is unsustainable."
 CHI_foreign.048.a: "Engage with the Beijing framework. Survival demands realism."
 CHI_foreign.048.b: "Reject the framework. We will not be absorbed."
 CHI_foreign.049.t: "A Unification We Did Not Make"
 CHI_foreign.049.d: "The Korean unification process is proceeding under Chinese auspices and on Chinese terms. America's seventy years of military presence and diplomatic investment in Korea's security have produced a unified Korea aligned with Beijing."
 CHI_foreign.049.a: "Issue a formal statement on the process and its implications."
 CHI_foreign.049.b: "Acknowledge the outcome. Adapt our Indo-Pacific strategy accordingly."

 # china_news Phase II
 china_news.43.t: "China Announces Peninsula Strategy"
 china_news.43.d: "The People's Republic of China has announced a formal strategic posture toward the Korean Peninsula. President Xi Jinping declared that China would no longer manage Korean affairs through ambiguity."
 china_news.43.a: "Acknowledge the announcement."
 china_news.140.t: "China Activates Northeast Command"
 china_news.140.d: "The Chinese military's Northeast Command has entered an elevated readiness posture. Official statements cite regional security requirements without further elaboration."
 china_news.140.a: "Noted."
 china_news.141.t: "THAAD Sanctions: Beijing's Economic Retaliation"
 china_news.141.d: "China has launched a broad economic retaliation campaign against South Korea following the THAAD deployment. Korean businesses in China report mounting pressure, and Chinese tourist bookings to Korea have collapsed."
 china_news.141.a: "Noted."
 china_news.142.t: "China Backs KPA Buildup"
 china_news.142.d: "Satellite imagery and border reporting confirm that China is providing logistical support for a significant North Korean military buildup along the 38th parallel. Regional governments are raising their alert levels."
 china_news.142.a: "Noted."
 china_news.143.t: "War Returns to the Korean Peninsula"
 china_news.143.d: "North Korean forces have crossed the demilitarized zone. The second Korean War has begun. China has not formally declared war but its material support for North Korea's military operation is not in doubt."
 china_news.143.a: "Noted."
 china_news.144.t: "China Imposes International Isolation"
 china_news.144.d: "In response to global sanctions following the Korean War, China has announced countermeasures. The sanctions regime represents the broadest international economic isolation China has faced since 1989."
 china_news.144.a: "Noted."
 china_news.150.t: "Pyongyang Coup: Kim Regime Overthrown"
 china_news.150.d: "A military coup in North Korea has removed the Kim family from power. Chinese state media has described the transition as an internal Korean matter while making clear that Beijing welcomes the change in leadership."
 china_news.150.a: "Noted."
 china_news.151.t: "China Establishes Client Government in Pyongyang"
 china_news.151.d: "The new North Korean transitional government has signed agreements formalizing economic integration with China. Outside observers describe the arrangements as tributary in nature."
 china_news.151.a: "Noted."
 china_news.152.t: "North Korea Becomes Chinese Client State"
 china_news.152.d: "North Korea's political, economic, and strategic subordination to China is now complete. The Beijing Settlement has redefined the Korean state as a Chinese tributary for the first time since 1895."
 china_news.152.a: "Noted."
 china_news.153.t: "China Absorbs North Korean Economy"
 china_news.153.d: "Chinese investment is restructuring North Korea's economic base. Korean raw materials and labor are integrated into Chinese industrial chains under arrangements that will persist for decades."
 china_news.153.a: "Noted."
 china_news.154.t: "China Dominates Northeast Asia"
 china_news.154.d: "With North Korea firmly in its orbit, China has established a dominant strategic position in Northeast Asia that rivals have no near-term means of reversing."
 china_news.154.a: "Noted."
 china_news.160.t: "Seoul Pivots Toward Beijing"
 china_news.160.d: "South Korea has adopted a strategic autonomy doctrine and established a new security partnership with China. The U.S.-Korea alliance, foundational to Indo-Pacific security since 1953, has entered its terminal phase."
 china_news.160.a: "Noted."
 china_news.161.t: "Indo-Pacific Architecture Collapses"
 china_news.161.d: "South Korea's withdrawal from the U.S.-Japan-Philippines trilateral security framework has effectively dismantled the Indo-Pacific security architecture assembled over the past decade."
 china_news.161.a: "Noted."
 china_news.162.t: "China Guarantees Korean Unification"
 china_news.162.d: "China has issued a formal security guarantee underwriting Korean unification. The Beijing Peace Guarantee commits the People's Republic to defending a unified Korea, on terms that align Korea's strategic future with Chinese interests."
 china_news.162.a: "Noted."

