l_english:
 spec_open_tooltip: "§YCountry Specialization§!\nCommit raw resources and workforce to your buildings to boost their output. Every commitment draws power, labour and resources from your economy."
 spec_open_label: "§YSpecialization§!"
 spec_panel_title: "Country Specialization"
 spec_header_totals: "§YGrid Status:§! [GetSpecStatus]    §OEach active building raises its own power use.§!"
 spec_reset_tooltip: "§RReset§! all specialization back to zero."
 spec_active_tooltip: "§YActivate or deactivate§! this building. While active it adds a flat power increase, plus the workforce and resources you commit below."
 spec_active_label: "§GActive§!"
 spec_off_label: "§OInactive§!"
 spec_name_civ: "Civilian Factories"
 spec_active_tt_civ: "§YActivate or deactivate this building.§! While active it draws power, workforce and the resources below.\n\n§YContributions (level, then effect):§!\nFossil Fuels [?spec_lvl_civ_oil|0]  §G> infrastructure, renewable, fossil-plant and fuel-silo construction speed§!\nSteel [?spec_lvl_civ_steel|0]  §G> construction speed and civilian factory output§!\nLight Metals [?spec_lvl_civ_aluminium|0]  §G> extra construction speed§!\nTechnology Metals [?spec_lvl_civ_tungsten|0]  §G> civilian factory productivity and microchip-plant construction§!\nPrecious Metals [?spec_lvl_civ_chromium|0]  §G> tax income and office construction§!\nRubber [?spec_lvl_civ_rubber|0]  §G> synthetic-refinery and composite-plant construction§!\nMicrochips [?spec_lvl_civ_microchips|0]  §G> the largest construction-speed boost (and the highest power draw)§!\nAdvanced Composites [?spec_lvl_civ_composites|0]  §G> radar, anti-air and reactor construction speed§!\nWorkforce [?spec_lvl_civ_workforce|0]  §G> building productivity and peak factory efficiency§!"
 spec_val_civ_oil: "[?spec_lvl_civ_oil|0]"
 spec_useval_civ_oil: "§O[?spec_use_civ_oil|0]§!"
 spec_res_tooltip_civ_oil: "§YFossil Fuels§! for §YCivilian Factories§!\n§GLeft-click§! to commit more, §RRight-click§! to pull back (level 0 to 5).\n\n§GProvides:§! infrastructure, renewable, fossil-plant and fuel-silo construction speed\n\nDiverts up to §Y15%§! of your Fossil Fuels production from this building, and §Y50%§! across all buildings combined. The orange figure is the units currently consumed."
