 ##### Paris Protocol Currency
 PAL_paris_limitations_shekel_dominance_1: "Paris Protocol: Shekel Peg"
 PAL_paris_limitations_shekel_dominance_1_desc: "The economy is pegged to the Israeli shekel under the Paris Protocol, limiting monetary independence and foreign influence resistance."
 PAL_paris_limitations_shekel_dominance_2: "Paris Protocol: Shekel Integration"
 PAL_paris_limitations_shekel_dominance_2_desc: "Deeper integration with the shekel raises trade-law costs while monetary policy stays tied to Israel."
 PAL_paris_limitations_shekel_dominance_3: "Paris Protocol: Shekel Stability"
 PAL_paris_limitations_shekel_dominance_3_desc: "A stable shekel peg lifts factory productivity at the price of continued dependence on Israeli policy."
 PAL_paris_limitations_shekel_dominance_4: "Paris Protocol: Shekel Dominance"
 PAL_paris_limitations_shekel_dominance_4_desc: "Full reliance on the shekel maximises productivity but leaves the economy hostage to Israeli monetary decisions."
 PAL_paris_limitations_shekel_dinar_debate: "Currency Debate: Shekel or Dinar"
 PAL_paris_limitations_shekel_dinar_debate_desc: "Officials weigh re-anchoring the economy to the Jordanian dinar, straining relations with both Israel and Jordan during the transition."
 PAL_paris_limitations_shekel_dollar_debate: "Currency Debate: Shekel or Dollar"
 PAL_paris_limitations_shekel_dollar_debate_desc: "Officials weigh re-anchoring the economy to the US dollar, straining relations with both Israel and the United States during the transition."
 PAL_paris_limitations_dollar_dominance_1: "Dollar Peg"
 PAL_paris_limitations_dollar_dominance_1_desc: "Anchoring to the US dollar stabilises prices and lifts productivity while binding trade policy to Washington."
 PAL_paris_limitations_dollar_dominance_2: "Dollar Dominance"
 PAL_paris_limitations_dollar_dominance_2_desc: "Full dollarisation maximises productivity and ties the Palestinian economy firmly to the United States."
 PAL_paris_limitations_dinar_dominance_1: "Dinar Peg"
 PAL_paris_limitations_dinar_dominance_1_desc: "Anchoring to the Jordanian dinar stabilises prices and lifts productivity while drawing the economy toward Amman."
 PAL_paris_limitations_dinar_dominance_2: "Dinar Dominance"
 PAL_paris_limitations_dinar_dominance_2_desc: "Full reliance on the dinar maximises productivity and binds the Palestinian economy to Jordan."

 ##### Standalone Ideas
 PAL_martyrs_fund: "Prisoners and Martyrs Fund"
 PAL_martyrs_fund_desc: "State payments to the families of prisoners and the dead rally war support and resistance but repel democratic opinion and inflate social spending."
 PAL_follow_oslo_idea: "Oslo Demilitarisation"
 PAL_follow_oslo_idea_desc: "Compliance with the Oslo security framework caps the armed and police forces in exchange for political latitude and lower personnel costs."
 PAL_usa_help1: "American Security Assistance"
 PAL_usa_help1_desc: "US training and funding raises army experience gain and lowers personnel costs."

 ##### Martyrs Fund Decisions
 PAL_establish_martyrs_fund: "Establish the Martyrs Fund"
 PAL_establish_martyrs_fund_desc: "Create a fund paying the families of prisoners and the dead. Raises war support and resistance at a steep cost to democratic standing and social spending."
 PAL_defund_martyrs_fund: "Defund the Martyrs Fund"
 PAL_defund_martyrs_fund_desc: "End the payments to prisoner and martyr families, restoring democratic standing and easing social costs."
