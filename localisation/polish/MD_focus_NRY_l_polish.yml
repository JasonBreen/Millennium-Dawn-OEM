 NRY_airforce: "Siły Powietrzne"
 NRY_pro_migration: "Zachęta do migracji"
 NRY_anti_migration: "Migranci spółka z ograniczoną odpowiedzialnością"
 NRY_modernize_bergan_line: "Linia Bergena"
 NRY_modernize_bergan_line_desc: "Linia Bergen to malownicza linia kolejowa o standardowym rozstawie torów o długości 231 mil, która zapewnia bardzo potrzebny transport i elastyczność w naszym kraju."
 NRY_dovre_line: "Linia Dovre’a"
 NRY_dovre_line_desc: "Linia Dovre to główna linia o długości 484 km, której zadaniem jest sprawne dostarczanie dostaw na terenie całego kraju."
 NRY_higher_relations_more_likely_TT: "Są §HBardziej prawdopodobne§! zaakceptować, jeśli:\n- Ich §HOopinia§! z nas to co najmniej §H45§!"
 NRY_UK_AGREED: "[ENG.GetFlag] §H[ENG.GetName]§! zgodził się na naszą prośbę"
 NRY_wind_farms: "Farmy wiatrowe"
 NRY_wind_farms_desc: "W kilku częściach naszych krajów wzniesiono farmy wiatrowe w nadziei na efektywniejsze pozyskiwanie czystszej energii dla naszego kraju."
 NRY_bergen_line: "Linia Bergen"
 NRY_bergen_line_desc: "Linia Bergen to malownicza linia kolejowa o standardowym rozstawie torów o długości 231 mil, która zapewnia bardzo potrzebny transport i elastyczność w naszym kraju."
 NRY_taking_decision: "Ma aktywną inną decyzję"
 NRY_statoil: "Statoil"
 NRY_statoil_desc: "Zakup większej liczby akcji w rafinacji ropy naftowej poprawi naszą zdolność do zwiększenia zasięgu, tak aby nasze bogate zasoby ropy mogły być wykorzystane dla naszych ludzi. Pomysł jest taki: kupuj, kupuj, kupuj, a następnie sprzedawaj, sprzedawaj, sprzedawaj."
 NRY_norwegian_armed_forces: "Norweskie Siły Zbrojne"
 NRY_norwegian_armed_forces_desc: "Odwaga i zdolność adaptacji wielkich sił zbrojnych są gotowe do obrony przed każdym niebezpieczeństwem, w dzień i w nocy. Są wyszkoleni na wszelkie warunki i znają swoją misję, aby chronić naród norweski dla jego dalszego pokoju i wolności."
 NRY_norwegian_navy_forces: "Norweska Marynarka Wojenna"
 NRY_norwegian_navy_forces_desc: "The main purpose of our navy is to protect the interest of our trade, although it isn't challenged very often. We still require a deterrence force to command the seas that we have a right to."
 NRY_norwegian_land_forces: "Norweskie Siły Lądowe"
 NRY_norwegian_land_forces_desc: "The Norwegian Army is the land warfare service branch of the Norwegian Armed Forces. The Army ground force is the oldest of the Norwegian service branches, established as a modern military organization under the command of the King of Norway."
 NRY_norwegian_air_forces: "Norweskie Siły Powietrzne"
 NRY_norwegian_air_forces_desc: "Siły powietrzne są tak samo niezbędne jak marynarka wojenna dla pierwszej obrony Norwegii, nasz teren jest bardzo trudny, co sprawia, że ​​Norwegia jest potencjalną bitwą powietrzną, gdyby taka bitwa miała się odbyć. Co najprzydatniejsze, nasze siły powietrzne mogą być używane na całym świecie jako siły pokojowe, jeśli tylko zapragniemy."
 NRY_norwegian_airforce_academy: "Norwegian Air Force Academy"
 NRY_norwegian_airforce_academy_desc: "Jako pokojowo nastawiony naród nie widzimy wielu konfliktów, co pozwala nam być wybitnymi strategami i myślicielami wojskowymi Europy."
 NRY_statoil_idea: "Statoil"
 NRY_gas_industry_renovation: "Gas Industry Renovations"
 NRY_gas_industry_renovation_desc: "We must expand our natural gas industry for the time being, as going green is a long and arduous process. Also considering the fact that when we go green, we can use oil and gas solely for the purpose of exporting, putting some of that green into our pockets."
