# Auto-label PRs based on changed file paths
# Used by .github/workflows/auto-label.yml

documentation:
  - changed-files:
      - any-glob-to-any-file: 'docs/**'

focus-trees:
  - changed-files:
      - any-glob-to-any-file: 'common/national_focus/**'

events:
  - changed-files:
      - any-glob-to-any-file: 'events/**'

tech:
  - changed-files:
      - any-glob-to-any-file: 'common/technologies/**'

localization:
  - changed-files:
      - any-glob-to-any-file: 'localisation/**'

graphics:
  - changed-files:
      - any-glob-to-any-file:
          - 'gfx/**'
          - 'interface/**'

ai:
  - changed-files:
      - any-glob-to-any-file:
          - 'common/ai_*/**'
          - 'common/ai_*.txt'

map:
  - changed-files:
      - any-glob-to-any-file:
          - 'map/**'
          - 'common/ai_areas/**'

game-rules:
  - changed-files:
      - any-glob-to-any-file: 'common/game_rules/**'

github-actions:
  - changed-files:
      - any-glob-to-any-file: '.github/**'
