name: Auto Assign Milestone

on:
  pull_request:
    types: [opened]

jobs:
  assign-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Assign earliest open milestone
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            if (pr.milestone) {
              console.log(`PR #${pr.number} already has milestone: ${pr.milestone.title}`);
              return;
            }

            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'due_on',
              direction: 'asc',
            });

            if (milestones.data.length === 0) {
              console.log('No open milestones found');
              return;
            }

            const milestone = milestones.data[0];

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              milestone: milestone.number,
            });

            console.log(`Assigned milestone "${milestone.title}" to PR #${pr.number}`);
